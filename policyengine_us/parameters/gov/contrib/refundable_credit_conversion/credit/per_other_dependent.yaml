description: Flat refundable credit amount per "other dependent" — a member of the tax unit who qualifies as an EITC-qualifying child but does NOT qualify under the CTC definition (e.g., children aged 17-18, full-time students 19-23). The count is the population-aggregate difference between EITC-qualifying and CTC-qualifying children, not a per-person classification.
metadata:
  unit: currency-USD
  period: year
  label: Refundable credit conversion per-other-dependent flat amount
