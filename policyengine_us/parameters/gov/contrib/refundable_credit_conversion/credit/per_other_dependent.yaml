description: Flat refundable credit amount per "other dependent" — a member of the tax unit who qualifies as an EITC-qualifying child but does NOT qualify under the CTC definition (e.g., children aged 17-18, full-time students 19-23). Lets the reform pay a smaller per-child amount for non-CTC kids alongside the per-CTC-dependent amount.
metadata:
  unit: currency-USD
  period: year
  label: Flat credit amount per other dependent (EITC-qualifying, not CTC-qualifying)
