description: Nebraska provides this credit amount per qualifying child under LB 157.
# Note: Per Section 3(3), the Department adjusts this amount annually starting 2027
# using the same CPI percentage applied to NE income tax brackets (§77-2715.03).

values:
  2026-01-01: 1_000

uprating:
  parameter: gov.irs.uprating
  rounding:
    type: nearest
    interval: 10

metadata:
  unit: currency-USD
  period: year
  label: Nebraska LB 157 Child Tax Credit amount
  reference:
