description: Marin County counts these income sources as gross income under the General Relief program.
values:
  2025-07-01:
    # Income from a job of any type.
    - irs_employment_income
    - self_employment_income
    - sstb_self_employment_income
    # Income from rental property.
    - rental_income
    # Interest, dividends, capital gains, estates, and trusts.
    - interest_income
    - dividend_income
    - capital_gains
    - estate_income
    # Retirement and pension income.
    - pension_income
    - retirement_distributions
    - railroad_benefits
    # Unemployment Insurance Benefits.
    - unemployment_compensation
    # State Disability Insurance.
    - ca_state_disability_insurance
    # Disability and workers' compensation benefits.
    - disability_benefits
    - workers_compensation
    # Veterans benefits.
    - veterans_benefits
    # Support payments and other cash assistance.
    - alimony_income
    - child_support_received
    - gi_cash_assistance
    - strike_benefits
    # Social Security retirement, survivors, and disability benefits.
    - social_security
    - survivor_benefits
    - life_insurance_benefits
    # SSI/SSP is excluded: recipients are categorically ineligible for General
    # Relief, so SSI is not counted as income for the grant computation.
    # CalWORKs (California TANF) cash aid is also countable available income, but
    # it is a unit-level benefit (ca_tanf) added directly in
    # ca_marin_general_relief_net_income rather than in this person-level list.
metadata:
  unit: list
  period: year
  label: Marin County General Relief income sources
  reference:
    - title: Marin County General Relief Program Policies and Standards, Section II.I Income
      href: https://marin.granicus.com/DocumentViewer.php?file=marin_ce4ed1aaf509aaf7176c360d26f8f1c6.pdf#page=11
