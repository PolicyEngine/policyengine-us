description: Marin County limits liquid assets to this amount for married couples under the General Relief program.
values:
  # The Standards of Aid regulation (Section II.H) shows the pre-reform $400 limit.
  2025-01-01: 400
  # Raised to $800 effective July 1, 2025 per the county news release and HHS page.
  2025-07-01: 800

