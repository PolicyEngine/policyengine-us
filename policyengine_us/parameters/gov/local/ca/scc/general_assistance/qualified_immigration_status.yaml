description: Santa Clara County uses these immigration statuses as qualified non-citizens under the General Assistance program.
values:
  2016-04-01:
    - CITIZEN
    - LEGAL_PERMANENT_RESIDENT
    - REFUGEE
    - ASYLEE
    - DEPORTATION_WITHHELD  # "entitled to remain indefinitely" per GA 141
    - CUBAN_HAITIAN_ENTRANT
    - PAROLED_ONE_YEAR
