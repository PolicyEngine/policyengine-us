description: Regular federal medical assistance percentage (FMAP) for Medicaid, by state. Applied to non-expansion Medicaid expenditures. Published annually by HHS in the Federal Register. Values reflect the base section 1905(b) FMAP and do not include temporary enhancements (ARPA/FFCRA) or the disaster-recovery adjustment under section 1905(aa).
