description: The Department of Health and Human Services sets the Basic Health Program income floor at this share of the federal poverty guidelines for US citizens and qualified immigrants, per 42 USC 18051(b)(2)(B). People below this line are generally Medicaid-eligible in expansion states or in the Medicaid coverage gap in non-expansion states.

values:
  2015-01-01: 1.33

