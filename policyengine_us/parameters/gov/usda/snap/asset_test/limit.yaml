description: The USDA restricts SNAP to households with assets not exceeding this value.
standard:
  description: Maximum value of SNAP-visible assets for households without elderly or disabled members
  values:
    2015-10-01: 2_250
    2021-10-01: 2_500
    2022-10-01: 2_750
    2024-10-01: 3_000

elderly_disabled:
  description: Maximum value of SNAP-visible assets for households with elderly or disabled members
  values:
    2015-10-01: 3_250
    2017-10-01: 3_500
    2021-10-01: 3_750
    2022-10-01: 4_250
    2024-10-01: 4_500

metadata:
  unit: currency-USD
  period: year
