description: Oklahoma sets the annual unemployment insurance taxable wage base at this amount under the Unemployment Insurance program.

values:
  2022-01-01: 24_800
  2023-01-01: 25_700
  2024-01-01: 27_000
  2025-01-01: 28_200
  2026-01-01: 25_000

