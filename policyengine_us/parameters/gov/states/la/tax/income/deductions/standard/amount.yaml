SINGLE:
  2025-01-01: 12_500
  # 2026 amount applies the December-to-December 2025 CPI-U increase:
  # 12,500 * (324.054 / 315.605), rounded to the nearest dollar.
  2026-01-01: 12_835
SURVIVING_SPOUSE:
  2025-01-01: 25_000
  2026-01-01: 25_670
SEPARATE:
  2025-01-01: 12_500
  2026-01-01: 12_835
# The legal code defines the HoH and Joint amounts as 200% of the 
