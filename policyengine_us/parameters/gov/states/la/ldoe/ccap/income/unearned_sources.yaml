description: Louisiana counts these recurring unearned income sources of all household members under the Child Care Assistance Program.
values:
  2022-02-01:
    - social_security
    - ssi
    - veterans_benefits
    - pension_income
    - disability_benefits
    - unemployment_compensation
    - workers_compensation
    - child_support_received
    - alimony_income
  # LR 51:529 (April 20, 2025) repealed child support or alimony and adoption
  # subsidy payments from the countable list; adoption subsidies are not tracked
  # as a separate input at the moment, so only the first repeal affects the model.
  2025-04-20:
    - social_security
    - ssi
    - veterans_benefits
    - pension_income
    - disability_benefits
    - unemployment_compensation
    - workers_compensation

