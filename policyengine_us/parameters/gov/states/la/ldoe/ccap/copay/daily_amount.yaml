description: Louisiana charges this daily co-payment per child under the Child Care Assistance Program, based on household income as a share of the state median income.
metadata:
  type: single_amount
  threshold_unit: /1
  amount_unit: currency-USD
  period: day
  label: Louisiana CCAP daily co-payment by share of state median income
  reference:
    - title: LDOE 2026 Sliding Fee Scale (effective February 1, 2026; printed band tops equal these shares of the state median income, rounded to whole dollars)
      href: https://www.louisianabelieves.com/docs/default-source/early-childhood/ccap-sliding-fee-scale.pdf
    - title: LDOE 2025 Sliding Fee Scale (effective February 3, 2025, archived)
      href: https://web.archive.org/web/20250302135951/https://doe.louisiana.gov/docs/default-source/early-childhood/ccap-sliding-fee-scale.pdf
    - title: LDOE 2024 Sliding Fee Scale (effective February 1, 2024, archived)
      href: https://web.archive.org/web/20240625175822/https://louisianabelieves.com/docs/default-source/early-childhood/ccap-sliding-fee-scale.pdf
    - title: LDOE 2023 Sliding Fee Scale (archived)
      href: https://web.archive.org/web/20230327170902/https://www.louisianabelieves.com/docs/default-source/early-childhood/ccap-sliding-fee-scale.pdf?sfvrsn=a5728c1f_29
    - title: LDOE 2022 Sliding Fee Scale (archived)
      href: https://web.archive.org/web/20220209001401/https://www.louisianabelieves.com/docs/default-source/early-childhood/ccap-sliding-fee-scale.pdf?sfvrsn=2
