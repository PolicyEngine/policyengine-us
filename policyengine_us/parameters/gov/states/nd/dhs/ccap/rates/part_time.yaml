description: North Dakota provides these part-time monthly maximum reimbursement rates by provider type and age group under the Child Care Assistance Program.

# Statewide flat part-time (less than 25 hours/week) monthly maximums.
#
# 2022-10-01: DN 241 (10-2022) Sliding Fee Schedule, "State Provider Rates"
# (Allowable Monthly Maximums for Part-Time Care, Category Two). Listed amounts
# are rounded down to whole dollars per the schedule note "State provider rates
# will be rounded down when the rate is not a full dollar amount".
#
# 2026-01-01: 2025 Market Rate Survey. All part-time rates are set at the 50th
# percentile of market rate.

