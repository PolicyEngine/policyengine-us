description: North Dakota pays providers this additional monthly amount per infant or toddler under the Child Care Assistance Program.

# Infant/toddler bonus, paid to North Dakota licensed, tribally licensed, or
# military licensed providers as a separate payment on top of the service-month
# subsidy, for children attending 40 or more hours per month. Effective
# January 1, 2026. Preschool and school-age children receive no bonus.

