description: North Dakota provides these full-time monthly maximum reimbursement rates by provider type and age group under the Child Care Assistance Program.

# Statewide flat full-time (25+ hours/week) monthly maximums effective
# January 1, 2026, from the 2025 Market Rate Survey. Infant and toddler rates
# are set at the 75th percentile of market rate; preschool and school-age rates
# at the 50th percentile.

