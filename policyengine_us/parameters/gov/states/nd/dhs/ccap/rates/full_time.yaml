description: North Dakota provides these full-time monthly maximum reimbursement rates by provider type and age group under the Child Care Assistance Program.

# Statewide flat full-time (25+ hours/week) monthly maximums.
#
# 2022-10-01: DN 241 (10-2022) Sliding Fee Schedule, "State Provider Rates"
# (Allowable Monthly Maximums for Full Time Care, Category One). Listed amounts
# are rounded down to whole dollars per the schedule note "State provider rates
# will be rounded down when the rate is not a full dollar amount".
#
# 2026-01-01: 2025 Market Rate Survey. Infant and toddler rates are set at the
# 75th percentile of market rate; preschool and school-age rates at the 50th
# percentile.

