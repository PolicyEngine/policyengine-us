description: North Dakota pays providers this additional share of the state maximum rate by quality rating step under the Child Care Assistance Program.

# Quality Rating and Improvement System (QRIS) step bonus, paid to providers as
# a separate payment on top of the service-month subsidy. Per 400-28-100-30
# (revised 6/1/2023, ML #3819): step 2 = +5%, step 3 = +10%, step 4 = +15% of
# the state maximum rate. Effective January 1, 2026 the step 2 bonus is
# eliminated and steps 3 and 4 drop to +5% and +10%.

