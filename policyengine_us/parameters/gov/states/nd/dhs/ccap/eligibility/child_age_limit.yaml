description: North Dakota limits eligibility to children below this age under the Child Care Assistance Program.

# Children are eligible through the month of their 13th birthday (under 13).
# Effective April 1, 2026, eligibility runs through the month the child turns
# 12 (under 12), aligning to state law. The 2020 entry is placed at
# PolicyEngine's backdating floor.
values:
  2020-01-01: 13
  2026-04-01: 12

