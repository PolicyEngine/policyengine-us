description: North Dakota classifies child care of at least this many hours per week as full-time under the Child Care Assistance Program.

# Full-time level of care is 25 or more hours per week; part-time is 1 to fewer
# than 25 hours per week (400-28-80-50).
values:
  2020-01-01: 25

metadata:
  unit: hour
  period: week
  label: North Dakota CCAP full-time minimum weekly hours
  reference:
    - title: North Dakota CCAP Policy Manual, Determining Level of Care 400-28-80-50
      href: https://www.nd.gov/dhs/policymanuals/40028/40028.htm
