description: Missouri funds this share of the base reimbursement rate by federal poverty guideline ratio under the Child Care Subsidy program.
# Traditional families (at or below 150% FPL) are funded at the full base rate.
# Transitional Child Care families are funded at a reduced share:
# Level 1 (above 150% up to 185%) = 80%, Level 2 (above 185% up to 215%) = 60%,
# Level 3 (above 215% up to 242%) = 50%.
