description: Missouri assigns a sliding fee tier by monthly adjusted gross income for a household of eleven under the Child Care Subsidy program.
# Amount is the sliding fee tier index used by copay/daily_fee. Tier 0 is
# the $1/year minimum; tiers 1-7 are the traditional ladder; tiers 8-10 are
# Transitional Child Care Levels 1-3.
