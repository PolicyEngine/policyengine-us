description: Missouri charges this daily sliding fee per child for a part unit of care by sliding fee tier under the Child Care Subsidy program.
# Tier index from copay/tier/size_N. Tier 0 is the $1/year minimum (no daily
# fee). Tiers 1-7 are the traditional ladder; tiers 8-10 are Transitional Child
# Care Levels 1-3.
