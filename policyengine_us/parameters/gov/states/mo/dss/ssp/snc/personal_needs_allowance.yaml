description: Missouri provides this amount as the additional monthly Personal Needs Allowance for recipients residing in a non-Medicaid skilled or intermediate care facility under the Supplemental Nursing Care program. The PNA component became effective 2015-01-01 per MO DSS Appendix J; we don't model pre-2015 PNA history at the moment.
values:
  2000-07-01: 0
  2015-01-01: 50
