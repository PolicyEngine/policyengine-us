description: Indiana sets the weekly copayment as this share of monthly countable income, by income as a percentage of the federal poverty guideline, for new enrollees under the Child Care and Development Fund program.

# Year 1-3 (new enrollee) tier of the Sliding Fee Schedule. PolicyEngine does not
# track years-on-program at the moment, so only the new-enrollee tier is modeled.
# Brackets are keyed on income as a ratio of the federal poverty guideline; each
# band's lower bound is exclusive of the prior band's ceiling, so thresholds are
# shifted by 0.0001 (e.g. a family at exactly 100% FPL lands in the zero bracket).

brackets:
  - threshold:
      2026-04-05: 0
    amount:
      2026-04-05: 0  # 100% FPL or below
  - threshold:
      2026-04-05: 1.0001  # 101-109% FPL
    amount:
      2026-04-05: 0.0116
  - threshold:
      2026-04-05: 1.1001  # 110-118% FPL
    amount:
      2026-04-05: 0.014
  - threshold:
      2026-04-05: 1.1901  # 119-135% FPL
    amount:
      2026-04-05: 0.0163
  - threshold:
      2026-04-05: 1.3601  # 136-140% FPL
    amount:
      2026-04-05: 0.0163
  - threshold:
      2026-04-05: 1.4101  # 141-150% FPL
    amount:
      2026-04-05: 0.0186
  - threshold:
      2026-04-05: 1.5101  # 151-160% FPL
    amount:
      2026-04-05: 0.0209
  - threshold:
      2026-04-05: 1.6101  # 161-170% FPL
    amount:
      2026-04-05: 0.0233
  - threshold:
      2026-04-05: 1.7101  # 171-200% FPL
    amount:
      2026-04-05: 0.0302
  - threshold:
      2026-04-05: 2.0101  # 201-225% FPL
    amount:
      2026-04-05: 0.0372
  - threshold:
      2026-04-05: 2.2601  # 226% FPL to maximum state median income
    amount:
      2026-04-05: 0.0442

