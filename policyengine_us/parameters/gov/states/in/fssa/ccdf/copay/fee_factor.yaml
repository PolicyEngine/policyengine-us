description: Indiana sets the weekly copayment as this share of monthly countable income, by income as a percentage of the federal poverty guideline, for new enrollees under the Child Care and Development Fund program.

# Year 1-3 (new enrollee) tier of the Sliding Fee Schedule. PolicyEngine does not
# track years-on-program at the moment, so only the new-enrollee tier is modeled.
# Brackets are keyed on income as a ratio of the federal poverty guideline. The
# published dollar bands span (prior band's ceiling, own ceiling], so each
# threshold sits just above the prior band's ceiling (+0.0001); an income exactly
# at a band's ceiling stays in that band (e.g. exactly 100% FPL lands in the zero
# bracket, exactly 109% in the 101-109% band).

brackets:
  - threshold:
      2026-04-05: 0
    amount:
      2026-04-05: 0  # 100% FPL or below
  - threshold:
      2026-04-05: 1.0001  # 101-109% FPL
    amount:
      2026-04-05: 0.0116
  - threshold:
      2026-04-05: 1.0901  # 110-118% FPL
    amount:
      2026-04-05: 0.014
  - threshold:
      2026-04-05: 1.1801  # 119-135% FPL
    amount:
      2026-04-05: 0.0163
  - threshold:
      2026-04-05: 1.3501  # 136-140% FPL
    amount:
      2026-04-05: 0.0163
  - threshold:
      2026-04-05: 1.4001  # 141-150% FPL
    amount:
      2026-04-05: 0.0186
  - threshold:
      2026-04-05: 1.5001  # 151-160% FPL
    amount:
      2026-04-05: 0.0209
  - threshold:
      2026-04-05: 1.6001  # 161-170% FPL
    amount:
      2026-04-05: 0.0233
  - threshold:
      2026-04-05: 1.7001  # 171-200% FPL
    amount:
      2026-04-05: 0.0302
  - threshold:
      2026-04-05: 2.0001  # 201-225% FPL
    amount:
      2026-04-05: 0.0372
  - threshold:
      2026-04-05: 2.2501  # 226% FPL to maximum state median income
    amount:
      2026-04-05: 0.0442

