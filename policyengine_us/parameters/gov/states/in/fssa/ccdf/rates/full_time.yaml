description: Indiana provides these full-time weekly reimbursement rates by provider type, Paths to QUALITY level, and age group under the Child Care and Development Fund program.

# Marion County Fiscal Year 2023 rates (effective July 30, 2023), used as a
# statewide proxy ceiling. Only full-time (weekly) rates are modeled. Provider
# families that publish no separate Paths to QUALITY Level 1 row (every family
# except Registered Ministry) carry their base row's value at PTQ_1; families that
# publish only a base row (Exempt Center, Accredited Exempt Center, Exempt Home)
# carry their base value across all Paths to QUALITY levels.
# OECOSL cut reimbursement rates effective October 5, 2025 (infants and
# toddlers -10%, preschoolers -15%, school age including kindergarten -35%).
# The official post-cut dollar tables are only published on the Provider
# Portal, so the 2025-10-05 entries are derived from the FY2023 Marion values
# (x 0.90 / 0.85 / 0.65 by age group) per the OECOSL announcement.

metadata:
  period: week
  unit: currency-USD
  label: Indiana CCDF full-time weekly reimbursement rates
  breakdown:
    - in_ccdf_provider_type
    - in_ccdf_ptq_level
    - in_ccdf_age_group
  reference:
    - title: Marion County CCDF Reimbursement Rates, Fiscal Year 2023 (Licensed Center p. 1, Licensed Home and Registered Ministry p. 2, Exempt providers p. 3)
      href: https://www.in.gov/fssa/carefinder/files/MarionReimbRateCCDF.pdf#page=1
    - title: OECOSL press release, Updated Child Care Voucher Rates (Sept. 4, 2025; percentage cuts by age group)
      href: https://www.in.gov/fssa/carefinder/files/Updated-Child-Care-Voucher-Rates-.pdf
    - title: OECOSL bulletin, CCDF reimbursement rate changes effective Oct. 5, 2025
      href: https://content.govdelivery.com/accounts/INOECOSL/bulletins/3f4db24

