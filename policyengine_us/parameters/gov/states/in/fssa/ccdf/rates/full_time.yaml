description: Indiana provides these full-time weekly reimbursement rates by provider type, Paths to QUALITY level, and age group under the Child Care and Development Fund program.

# Marion County Fiscal Year 2023 rates (effective July 30, 2023), used as a
# statewide proxy ceiling. Only full-time (weekly) rates are modeled. Provider
# families that publish no separate Paths to QUALITY Level 1 row (every family
# except Registered Ministry) carry their base row's value at PTQ_1; families that
# publish only a base row (Exempt Center, Accredited Exempt Center, Exempt Home)
# carry their base value across all Paths to QUALITY levels.

metadata:
  period: week
  unit: currency-USD
  label: Indiana CCDF full-time weekly reimbursement rates
  breakdown:
    - in_ccdf_provider_type
    - in_ccdf_ptq_level
    - in_ccdf_age_group
  reference:
    - title: Marion County CCDF Reimbursement Rates, Fiscal Year 2023, Licensed Center
      href: https://www.in.gov/fssa/carefinder/files/MarionReimbRateCCDF.pdf#page=1
    - title: Marion County CCDF Reimbursement Rates, Fiscal Year 2023, Licensed Home and Registered Ministry
      href: https://www.in.gov/fssa/carefinder/files/MarionReimbRateCCDF.pdf#page=2
    - title: Marion County CCDF Reimbursement Rates, Fiscal Year 2023, Registered Ministry and Exempt providers
      href: https://www.in.gov/fssa/carefinder/files/MarionReimbRateCCDF.pdf#page=3

