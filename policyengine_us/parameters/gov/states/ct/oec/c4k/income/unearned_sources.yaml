description: Connecticut counts these unearned income sources as countable income under the Care 4 Kids program. These sources are summed across all family members (adults and children) because RCSA 17b-749-05(b)(1)(A) counts "unearned income of all adult and child family members", and the child-earnings exclusion in 17b-749-05(b)(2)(E) applies only to earned income.
values:
  2020-01-01:
    - social_security
    - pension_income
    - unemployment_compensation
    - workers_compensation
    - alimony_income
    - rental_income
    - veterans_benefits
    - disability_benefits

