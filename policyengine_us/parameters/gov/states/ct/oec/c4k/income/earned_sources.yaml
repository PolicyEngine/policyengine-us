description: Connecticut counts these earned income sources as countable income under the Care 4 Kids program. Per RCSA 17b-749-05(b)(2)(E), the earnings of a family member who is under 18 and is not the parent of a child for whom assistance is requested are excluded. We sum these sources only for members aged 18 or older or who are the tax-unit head or spouse (i.e. the parent/applicant of the child receiving assistance).
values:
  2020-01-01:
    - employment_income
    - self_employment_income
    - farm_operations_income

