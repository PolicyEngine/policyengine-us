description: Arkansas counts these income sources for adults under the School Readiness Assistance program.
values:
  2025-10-01:
    - employment_income
    - self_employment_income
    - tip_income
    - social_security_retirement
    - social_security_disability
    - social_security_survivors
    - ssi
    - unemployment_compensation
    - workers_compensation
    - alimony_income
    - pension_income
    - interest_income
    - dividend_income
    - rental_income
    - military_retirement_pay
    - veterans_benefits
    # The following are counted per FSU Procedural Manual Section 4.3.1-4.3.2
    # but have no matching variables:
    # - PTO and stipends (VISTA, AmeriCorps, Job Corps, OJT)
    # - regular bonuses, commissions
    # - armed forces pay (other than retirement)
    # - piece-rate, in-kind, contractual income
    # - annuities, regular contributions
    # Children's SSI and Social Security are excluded; the formula filters
    # contributions by age before summing.

metadata:
  unit: list
  period: year
  label: Arkansas SRA countable income sources
  reference:
