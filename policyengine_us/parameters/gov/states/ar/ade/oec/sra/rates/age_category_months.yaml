description: Arkansas sets these age thresholds in months for age categories under the School Readiness Assistance program.
# The rate sheets group rates by Infant / Toddler / Preschool / School-Aged
# but do NOT specify month boundaries within those labels. The encoded
# month boundaries (Infant <=17 mo, Toddler 18-35 mo, Preschool 36-71 mo,
# School-Aged 72+ mo) are peer-state conventions, not Arkansas sources,
# and are flagged for future verification with OEC.

brackets:
  - threshold:
      2025-10-01: 0
    amount:
      2025-10-01: 0  # INFANT (0-17 months)
  - threshold:
      2025-10-01: 18
    amount:
      2025-10-01: 1  # TODDLER (18-35 months)
  - threshold:
      2025-10-01: 36
    amount:
      2025-10-01: 2  # PRESCHOOL (36-71 months)
  - threshold:
      2025-10-01: 72
    amount:
      2025-10-01: 3  # SCHOOL_AGED (72+ months)

metadata:
  type: single_amount
  threshold_unit: month
  amount_unit: /1
  period: year
  label: Arkansas SRA age category month thresholds
  reference:
    - title: SRA Sliding Fee Scale with Rates and Copays - Statewide Full Time (Nov 1, 2025) - age category labels
      href: https://dese.ade.arkansas.gov/Files/SRA_Sliding_Fee_Scale_with_Rates_&_Copays--Statewide_Full_Time_20251101_OEC.pdf
