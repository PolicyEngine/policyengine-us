description: Arkansas classifies child care attendance as full-time under the School Readiness Assistance program when weekly hours meet or exceed this threshold.
# The full-time vs part-time hour cut-point is undocumented in Arkansas
# sources; this 30-hour default mirrors peer-state conventions (NH uses
# 31+ hours for FT; RI uses 30/45) and is flagged for future verification.
values:
  2025-10-01: 30

metadata:
  unit: hour
  period: year
  label: Arkansas SRA full-time weekly hours threshold
  reference:
    - title: SRA Sliding Fee Scale with Rates and Copays - Statewide Full Time (Nov 1, 2025)
      href: https://dese.ade.arkansas.gov/Files/SRA_Sliding_Fee_Scale_with_Rates_&_Copays--Statewide_Full_Time_20251101_OEC.pdf
    - title: SRA Sliding Fee Scale with Rates and Copays - Statewide Part Time (Nov 1, 2025)
      href: https://dese.ade.arkansas.gov/Files/SRA_Sliding_Fee_Scale_with_Rates_&_Copays--Statewide_Part_Time_20251101_OEC.pdf
