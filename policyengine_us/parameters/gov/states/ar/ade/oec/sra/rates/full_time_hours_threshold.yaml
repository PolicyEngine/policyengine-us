description: Arkansas sets this weekly hours threshold for full-time child care under the School Readiness Assistance program.
# FSU Procedural Manual §5.4.6 defines Full Time as 7+ hours per day. We
# approximate as a per-week threshold of 35 (= 5 days * 7 hr/day) because
# the model carries `childcare_hours_per_week`, not per-day hours. This
# approximation misclassifies attendance patterns that diverge from a
# 5-day week (e.g., 4 days * 8 hr = 32 hr/wk would be FT under FSU but
# PT here).
values:
  2025-10-01: 35

metadata:
  unit: hour
  period: year
  label: Arkansas SRA full-time weekly hours threshold
  reference:
    - title: FSU Procedural Manual (June 2023), Section 5.4.6 Authorization Care Types
      href: https://dese.ade.arkansas.gov/Files/FSU-Procedural-Manual-June-2023_UPDATED_20230629075344.pdf#page=30
