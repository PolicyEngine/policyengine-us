description: Arkansas caps the total family copay at this share of gross monthly income under the School Readiness Assistance program.
# CCDF rules cap copays at 7% of gross family income; Arkansas's CCDF State
# Plan §3.1.1 self-certifies a stricter 4% maximum. The cap applies per
# family, regardless of the number of children participating in CCDF.
values:
  2025-11-01: 0.04

