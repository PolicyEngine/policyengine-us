description: Arkansas excludes these income sources from countable income under the School Readiness Assistance program.
values:
  2025-10-01:
    # - tanf  # Transitional Employment Assistance (TEA) payments
    - child_support_received
    - eitc  # Tax refunds including EITC
    # Children's SSI and Social Security are excluded; handled by the
    # countable-income formula via age filter rather than by listing them.
    # The following are also excluded per FSU Manual Section 4.3.3
    # but have no matching variables or do not need explicit listing:
    # - Work Pays payments
    # - Irregular non-recurring lump sums (Christmas bonuses, insurance,
    #   capital gains)
    # - Earned/unearned income of children under 18
    # - Loans, grants, scholarships, work-study earnings
    # - Graduate / doctoral education earnings
    # - Montgomery GI Bill / VEAP educational income
    # - Reimbursement of work-related expenses
    # - Foster Care board payments
    # - Adoption subsidy
    # - HUD rental assistance value
    # - Utility assistance value
    # - Disaster assistance
    # - Tribal income

metadata:
  unit: list
  period: year
  label: Arkansas SRA excluded income sources
  reference:
    - title: FSU Procedural Manual (June 2023), Section 4.3.3 Excluded Income
      href: https://dese.ade.arkansas.gov/Files/FSU-Procedural-Manual-June-2023_UPDATED_20230629075344.pdf#page=20
