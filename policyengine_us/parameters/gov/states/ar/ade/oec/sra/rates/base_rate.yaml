description: Arkansas provides these daily base reimbursement rates under the School Readiness Assistance program.
# Source rate sheets have no Part-Time Night/Weekend row. PT NIGHT_WEEKEND
# cells below mirror PT REGULAR as a fallback so the (zone × age × care_type
# × time) lookup is complete; this is a modeling choice, not a source value.
