description: Arkansas provides these daily base reimbursement rates under the School Readiness Assistance program.
# Source rate sheets have no Part-Time Night/Weekend row. Per the October 7 2025
# Provider Call ("Weekend and night time rates are set at a standard 10% increase
# of typical rates"), PT NIGHT_WEEKEND cells below are derived as PT REGULAR × 1.10.
# Note: under the Nov 1 2025 schedule, Benton/Washington and Statewide rates
# converge for Preschool ($33 FT / $16.50 PT) and School-Aged ($28 FT / $14 PT) —
# the regional premium only applies to Infant and Toddler. Verified at 1200 DPI
# against the four Nov-2025 Sliding Fee Scale PDFs.
metadata:
  period: day
  unit: currency-USD
  label: Arkansas SRA daily base rates
  breakdown:
    - ar_sra_zone
    - ar_sra_age_category
    - ar_sra_care_type
    - ar_sra_time_category
  reference:
    - title: SRA Sliding Fee Scale with Rates and Copays - Statewide Full Time (Nov 1, 2025)
      href: https://dese.ade.arkansas.gov/Files/SRA_Sliding_Fee_Scale_with_Rates_&_Copays--Statewide_Full_Time_20251101_OEC.pdf
    - title: SRA Sliding Fee Scale with Rates and Copays - Statewide Part Time (Nov 1, 2025)
      href: https://dese.ade.arkansas.gov/Files/SRA_Sliding_Fee_Scale_with_Rates_&_Copays--Statewide_Part_Time_20251101_OEC.pdf
    - title: SRA Sliding Fee Scale with Rates and Copays - Benton/Washington Full Time (Nov 1, 2025)
      href: https://dese.ade.arkansas.gov/Files/SRA_Sliding_Fee_Scale_with_Rates_&_Copays--Benton-Washington_Co_Full_Time_20251101_OEC.pdf
    - title: SRA Sliding Fee Scale with Rates and Copays - Benton/Washington Part Time (Nov 1, 2025)
      href: https://dese.ade.arkansas.gov/Files/SRA_Sliding_Fee_Scale_with_Rates_&_Copays--Benton-Washington_Co_Part_Time_20251101_OEC.pdf

