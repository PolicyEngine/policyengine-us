description: Florida treats child care of at least this many hours per week as full-time for the School Readiness copay scale.
# Florida sets no statewide full-time/part-time hours cutoff. Fla. Admin. Code
# 6M-4.500(1)(b) and (1)(j) base reimbursement on "a child's care level and unit
# of care as defined by the coalition established rate schedule" -- so the
# full-time vs part-time "unit of care" boundary is set locally by each Early
# Learning Coalition, not by a statewide weekly-hours figure. The statewide
# sliding fee schedule likewise has separate full-time/part-time copay columns
# but publishes no hours cutoff. We use the 30 hours/week full-time convention
# shared by other state child care subsidy programs (e.g., NJ and RI CCAP) as a
# modeling stand-in; we don't track each coalition's unit-of-care definition at
# the moment.
values:
  2025-10-01: 30

metadata:
  unit: hour
  period: year
  label: Florida School Readiness full-time care hours threshold
  reference:
    - title: Fla. Admin. Code 6M-4.500(1)(b), (1)(j), Child Attendance and Provider Reimbursements -- reimbursement by care level and "unit of care as defined by the coalition established rate schedule" (full-time/part-time boundary is coalition-defined; no statewide hours cutoff)
      href: https://www.flrules.org/gateway/RuleNo.asp?id=6M-4.500
