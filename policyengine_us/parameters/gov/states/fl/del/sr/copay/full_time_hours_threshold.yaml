description: Florida treats child care of at least this many hours per week as full-time for the School Readiness copay scale.
# No Florida source defines the weekly-hours boundary between full-time and
# part-time care: the statewide sliding fee schedule has separate full-time and
# part-time copay percentage columns but publishes no hours cutoff, and the
# operational care-level rule 6M-4.500 returns a 403 to automated access, so we
# cannot confirm or contradict a Florida figure at the moment. We assume the
# 30 hours/week full-time convention shared by other state child care subsidy
# programs (e.g., NJ and RI CCAP); this is an unverified cross-state CCDF
# convention, not a Florida-corroborated value.
values:
  2025-10-01: 30

metadata:
  unit: hour
  period: year
  label: Florida School Readiness full-time care hours threshold
  reference:
    - title: Fla. Admin. Code 6M-4.500, Provider Reimbursement and Care Levels (full-time/part-time boundary not accessible; 403-blocked)
      href: https://www.flrules.org/gateway/RuleNo.asp?id=6M-4.500
