description: Florida assigns this School Readiness care level (as an index into the fl_sr_care_level enum, 0=Infant through 6=School Age) by the child's age in years.
# The reimbursement schedule's care levels are single-year age bands: it lists
# distinct "2 Year Old" and "Preschool 3/4/5" levels, so Toddler is the one-year-old
# band (not the 18-36 month licensing definition). Children aged 5 map to Preschool 5
# and ages 6 and older to School Age; we classify by age rather than kindergarten
# enrollment at the moment.
metadata:
  type: single_amount
  threshold_unit: year
  amount_unit: "/1"
  period: year
  label: Florida School Readiness care level index by age
  reference:
    - title: School Readiness Reimbursement Rates, Fiscal Year 2025-2026 (SPB 2502, Fla. Senate Committee on Appropriations) — per-county schedule, all 67 counties; care level categories
      href: https://www.flsenate.gov/PublishedContent/Session/2025/Conference/9/RelatedDocument/School%20Readiness%20Reimbursement%20Rates_1411.pdf#page=1
    - title: School Readiness Reimbursement Rates, Fiscal Year 2026-2027 (Conference Report for HB 5001E, Fla. House Budget Committee) — care level categories
      href: https://www.flsenate.gov/PublishedContent/Session/2026E/Conference/11/RelatedDocument/School%20Readiness%20Reimbursement%20Rates%205-26-26_1750.pdf#page=1

