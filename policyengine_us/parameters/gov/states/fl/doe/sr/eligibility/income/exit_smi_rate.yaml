description: Florida limits enrolled families in the School Readiness program to gross income at or below this share of the state median income at redetermination.
# 85% SMI is the upper threshold for continued School Readiness eligibility per the
# October 1, 2025 sliding fee schedule footnote and 6M-4.200(2)(b)(3)a., (4)(a).
values:
  2025-10-01: 0.85

metadata:
  unit: /1
  period: year
