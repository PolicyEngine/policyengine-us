description: Florida caps the family copay at this share of family income under the School Readiness program.
# Federal CCDF rules cap copays at 7% of family income (45 CFR 98.45(l)(3)). The
# cap applies per family. Because the sliding fee scale percentages top out at 6.0%
# full-time, this cap is rarely binding for a single child but guarantees
# affordability across the household.
values:
  2025-10-01: 0.07

