description: Nevada provides these daily reimbursement rates for child care centers under the Child Care and Development Program, by region, age group, and provider quality star rating.
metadata:
  period: day
  unit: currency-USD
  label: Nevada CCDP child care center daily rates
  breakdown:
    - nv_ccdp_region
    - nv_ccdp_age_group
    - nv_ccdp_provider_star_rating
  reference:
    - title: Nevada Child Care Policy Manual, MS 633.2 Licensed Provider Daily Rates (Center), Clark and Washoe areas (p.107)
      href: https://www.dss.nv.gov/siteassets/dwss.nv.gov/content/care/Child_Care_Manual_July_2024.pdf#page=107

# Manual MS 633.2 Licensed Provider Daily Rates (Center), per day, by Nevada
# Silver State Stars QRIS tier (STAR_1 = base, through STAR_5). MOST_POPULOUS =
# Clark area; LOWEST_PERCENTILE = Washoe area, used as the representative
# lowest-percentile rate for every non-Clark county (the Manual's lower
# Carson/Douglas and Rural area rates are not separately modeled). The CCDF
# State Plan FFY 2025-2027 base table matches the STAR_1 column; the per-star
# increments come from MS 633.2.
MOST_POPULOUS:
  INFANT:
