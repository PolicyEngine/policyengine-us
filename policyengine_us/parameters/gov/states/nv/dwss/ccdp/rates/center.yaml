description: Nevada provides these daily base reimbursement rates for child care centers under the Child Care and Development Program.
metadata:
  period: day
  unit: currency-USD
  label: Nevada CCDP child care center daily rates
  breakdown:
    - nv_ccdp_region
    - nv_ccdp_age_group
  reference:
    - title: Nevada Child Care Policy Manual, MS 633.2 Licensed Provider Daily Rates (1-Star base), Clark and Washoe areas (p.107)
      href: https://www.dss.nv.gov/siteassets/dwss.nv.gov/content/care/Child_Care_Manual_July_2024.pdf#page=107

# Manual MS 633.2 Licensed Provider Daily Rates, 1-Star (base) tier, per day.
# MOST_POPULOUS = Clark area; LOWEST_PERCENTILE = Washoe area, used as the
# representative lowest-percentile rate for every non-Clark county (the Manual's
# lower Carson/Douglas and Rural area rates are not separately modeled). QRIS
# star tiers 2-5 are an enhancement we don't track at the moment. (The CCDF
# State Plan FFY 2025-2027 base table matches these values except Clark center
# school-age, which it lists at $48 vs the Manual's $46.)
MOST_POPULOUS:
  INFANT:
    2024-10-01: 62.50
  TODDLER:
    2024-10-01: 57
  PRESCHOOL:
    2024-10-01: 51.50
  SCHOOL_AGE:
    2024-10-01: 46
LOWEST_PERCENTILE:
  INFANT:
    2024-10-01: 53.50
  TODDLER:
    2024-10-01: 52.50
  PRESCHOOL:
    2024-10-01: 47.50
  SCHOOL_AGE:
    2024-10-01: 42.50
