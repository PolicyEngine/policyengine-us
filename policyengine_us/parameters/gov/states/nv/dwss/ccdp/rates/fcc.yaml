# Manual MS 633.2 Licensed Provider Daily Rates (Family), 1-Star (base) tier,
# per day. MOST_POPULOUS = Clark area; LOWEST_PERCENTILE = Washoe area, used as
# the representative lowest-percentile rate for every non-Clark county. QRIS
# star tiers 2-5 are not tracked at the moment.
MOST_POPULOUS:
  INFANT:
    2024-10-01: 45
  TODDLER:
    2024-10-01: 45
  PRESCHOOL:
    2024-10-01: 46.50
  SCHOOL_AGE:
    2024-10-01: 46
LOWEST_PERCENTILE:
  INFANT:
    2024-10-01: 40.50
  TODDLER:
    2024-10-01: 40
  PRESCHOOL:
    2024-10-01: 40
  SCHOOL_AGE:
    2024-10-01: 40
