description: Ohio applies this multiplier to the family's federal-poverty-band maximum monthly income to determine the weekly copayment under the Publicly Funded Child Care program.

metadata:
  type: single_amount
  threshold_unit: /1
  amount_unit: /1
  period: year
  label: Ohio PFCC copayment multiplier
  reference:
    - title: OAC 5180:2-16-05 Appendix A — Copayment Calculation Table
      href: https://codes.ohio.gov/assets/laws/administrative-code/pdfs/5180/2/16/5180$2-16-05_PH_FF_A_APP5_20221201_0903.pdf#page=1

# The formula rounds the family's percentage of the federal poverty guideline
# up to the next five percent, then looks up the multiplier for that band. Each
# band label below is the rounded band (1.05 = 105% FPG, etc.), but the
# thresholds are shifted down by 1e-4 (1.05 -> 1.0499, ...) so that a rounded
# ratio landing exactly on a band, which float32 stores as e.g. 1.0499999,
# still lands in that band rather than the prior one. The 0.05 spacing must stay
# in lockstep with the np.ceil(..., 0.05) rounding in oh_ccap_copay.py.
