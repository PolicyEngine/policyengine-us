description: Iowa uses this share of the federal poverty level as the minimum income threshold for supplement for Medicare and Medicaid eligibles under the State Supplementary Assistance program.

values:
  # Iowa Code 249.3(4)(g): "income of at least one hundred twenty percent of
  # the federal poverty level". This 120% FPL test has been in statute since
  # 2004 Iowa Acts ch. 1085 (§4) when SMME was created.
  2011-01-01: 1.2

