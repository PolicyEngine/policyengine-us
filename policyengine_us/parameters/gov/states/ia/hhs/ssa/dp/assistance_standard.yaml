BLIND_WITH_AGED_OR_DISABLED_SPOUSE_AND_DEPENDENT:
  # 2011 Iowa HHS total; SSA 2011 Table 1 shows both-blind couple total $1,399;
  # footnote a reduces the total by $22 when only one spouse is blind, giving $1,377.
  2011-01-01: 1_377
  2017-01-01: 1_504
  2018-01-01: 1_534
  2025-01-01: 1_975
  # Iowa HHS's 2026 page publishes this configuration at $3,031 — a +53.5% jump
  # vs 2025 ($1,975), out of step with the ~2.85% COLA applied to every other
  # DP configuration and in conflict with the "-$22 when only one spouse is blind"
  # footnote rule that holds for 2011/2017/2018/2025. The $3,031 value appears
  # to be an Iowa HHS publication error (likely a transposed digit from an
  # intended $2,031). Encoded as the COLA-consistent total $2,031, which
  # preserves the 14-year footnote pattern; revisit if Iowa HHS corrects the
  # page or issues a General Letter confirming the higher figure.
  2026-01-01: 2_031
