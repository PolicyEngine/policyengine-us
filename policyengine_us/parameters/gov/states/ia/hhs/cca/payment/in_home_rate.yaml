description: Iowa pays this maximum half-day-unit rate for in-home child care (Table 5) under the Child Care Assistance program, the same for basic and special-needs care across all age groups. The published Provider Rate Letter (Table 5) sets the rate at $36.25 per half-day unit; the regulation describes it as the minimum wage amount (Iowa minimum wage of $7.25 per hour times the 5-hour unit equals $36.25).
values:
  2024-07-01: 36.25

