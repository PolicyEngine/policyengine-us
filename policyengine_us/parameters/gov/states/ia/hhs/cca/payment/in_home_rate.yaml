description: Iowa pays this maximum half-day-unit rate for in-home child care (Table 5) under the Child Care Assistance program. The rule sets the rate at the minimum wage amount (Iowa minimum wage of $7.25 per hour times the 5-hour unit equals $36.25), the same for basic and special-needs care across all age groups.
values:
  2024-07-01: 36.25

