description: Iowa caps initial Child Care Assistance income at this share of Iowa's median family income (MFI) when that cap is lower than the federal poverty level standard. Iowa publishes no standalone MFI figure, so the model uses the federal CCDF State Median Income (SMI) table as a proxy for the statutory MFI standard.
values:
  2024-07-01: 0.85

metadata:
  unit: /1
  period: year
  label: Iowa CCA median family income cap (share of MFI)
  reference:
    - title: IAC 441-170.2(1)"a"(1) — Income (85% of Iowa median family income)
      href: https://www.legis.iowa.gov/docs/iac/chapter/441.170.pdf#page=3
