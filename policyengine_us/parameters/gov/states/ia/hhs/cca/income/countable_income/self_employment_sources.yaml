description: Iowa counts the net profit from these self-employment income sources under the Child Care Assistance program; a net self-employment loss cannot offset other earned or unearned income, so the formula floors their per-person total at zero.
values:
  2024-07-01:
    - self_employment_income
    - sstb_self_employment_income
    - farm_operations_income

