description: Iowa counts these earned income sources under the Child Care Assistance program. Iowa excludes the earnings of a child age 14 or younger and the earnings of a child 18 or younger who is a full-time student, so these sources are summed only for persons who are not excluded minors.
values:
  2024-07-01:
    - employment_income
    - self_employment_income
    - sstb_self_employment_income
    - farm_operations_income

