description: Iowa counts these wage and salary income sources under the Child Care Assistance program. Iowa excludes the earnings of a child age 14 or younger and the earnings of a child 18 or younger who is a full-time student, so these sources are summed only for persons who are not excluded minors; self-employment sources are listed separately because a net self-employment loss cannot offset other income.
values:
