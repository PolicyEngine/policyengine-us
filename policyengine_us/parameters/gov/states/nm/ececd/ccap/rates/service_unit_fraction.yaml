description: New Mexico multiplies the full-time provider rate by this fraction for each service unit under the Child Care Assistance Program.
# Per the rate flyer service-unit definitions: Full time (30+ hrs/wk) pays
# 100% of the full-time rate, Part time 1 (8-29 hrs/wk) 75%, Part time 2
# (split custody, 8-19 hrs/wk) 50%, and Part time 3 (7 or fewer hrs/wk) 25%.
metadata:
  unit: /1
  period: year
  label: New Mexico CCAP service unit fraction
  breakdown:
    - nm_ccap_service_unit
  reference:
    - title: ECECD Child Care Assistance Rates, Definitions (Effective August 2023)
      href: https://www.nmececd.org/wp-content/uploads/2024/05/Cost-Model-Reimbursement-Rate-Flyer-English-and-Spanish-Revised-May-2024.pdf#page=1

FULL_TIME:
  2023-08-01: 1
PART_TIME_1:
  2023-08-01: 0.75
PART_TIME_2:
  2023-08-01: 0.5
PART_TIME_3:
  2023-08-01: 0.25
