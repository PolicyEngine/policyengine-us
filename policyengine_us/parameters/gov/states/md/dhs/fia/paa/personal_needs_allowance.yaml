description: Maryland provides this amount as the personal needs allowance under the Public Assistance to Adults program.

values:
  # 2011 PNA derived from SSA 2011 Maryland Table 1: REHAB combined need
  # = $82, and REHAB cost-of-care = $0, so combined need = PNA.
  2011-01-01: 82
  2022-01-01: 84
  2022-07-01: 93
  2023-07-01: 98
  # The $102 value is confirmed by IM 26-04 as the rate immediately preceding
  # the 2025-07-01 increase to $106. The originating transmittal has not yet
  # been located, so the 2024-07-01 effective date is a placeholder mirroring
  # Maryland's annual mid-year COLA cycle. Refine when the source is found.
  2024-07-01: 102
  2025-07-01: 106

metadata:
  unit: currency-USD
  period: month
  label: Maryland PAA personal needs allowance
