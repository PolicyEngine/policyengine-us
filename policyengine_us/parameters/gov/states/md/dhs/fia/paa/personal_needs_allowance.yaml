description: Maryland provides this amount as the personal needs allowance under the Public Assistance to Adults program.

values:
  # 2011 PNA derived from SSA 2011 Maryland Table 1: REHAB combined need
  # = $82, and REHAB cost-of-care = $0, so combined need = PNA.
  2011-01-01: 82
  2022-01-01: 84
  2022-07-01: 93
  2023-07-01: 98
  2024-07-01: 102
  2025-07-01: 106

