# 2009-01-01 values from COMAR 07.03.07.04(B)(2) (CARE Home Levels A-D) and
# (C)(2) (Licensed Assisted Living). 2018-01-01 values first documented in
# AT 18-11 and unchanged through every subsequent COLA Mass Mod (AT 19-08,
# 20-10, 21-18, 22-09, 23-02 — all say "PAA Rates remain the same").
# REHAB_RESIDENCE provider_rate is $0 because PAA Manual §900.3 / AT 23-02
# treat MDH Rehabilitative Residence as PNA-only (the $54/day cost is paid
# directly by MHA, not by PAA). Do not "fix" REHAB to 54 * 30.
CARE_HOME_LEVEL_A:
  2009-01-01: 740
  2018-01-01: 776
CARE_HOME_LEVEL_B:
  2009-01-01: 849
  2018-01-01: 875
CARE_HOME_LEVEL_C:
  2009-01-01: 1_137
  2018-01-01: 1_173
CARE_HOME_LEVEL_D:
  2009-01-01: 1_340
  2018-01-01: 1_376
ASSISTED_LIVING:
