description: Maryland provides these weekly UNIT_3 (full-time) reimbursement rates for licensed family child care homes under the Child Care Scholarship program. UNIT_2 and UNIT_1 rates are derived in the formula by multiplying by unit_count / 3 per COMAR 13A.14.06.11.

