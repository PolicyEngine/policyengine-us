description: Maryland's UNIT_3 (full-time) rate corresponds to three units of service per day per COMAR 13A.14.06.11. UNIT_2 and UNIT_1 rates are derived by multiplying the UNIT_3 rate by unit_count / 3 (i.e., 2/3 and 1/3 respectively).

