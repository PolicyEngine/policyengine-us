description: Maryland freezes the State Median Income (SMI) base year for Child Care Scholarship income eligibility on a fiscal-year schedule. A value of 0 means use the current-year SMI; otherwise use the SMI parameterized for that calendar year. Maryland's fiscal year starts July 1.
