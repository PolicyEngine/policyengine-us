      href: https://mgaleg.maryland.gov/2024RS/Chapters_noln/CH_717_sb0362E.pdf#page=19
    - title: MSDE Tuesday Tidbits bulletin (May 23, 2022) - introduction of $1/$2/$3 flat schedule
