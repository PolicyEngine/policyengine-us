description: Maryland sets this amount as the weekly copayment by service unit under the Child Care Scholarship program. The flat $1/$2/$3 schedule replaced the historical COMAR 13A.14.06.12 regional matrix via MSDE policy in May 2022 and was frozen at January 1, 2024 levels by Chapter 717 of 2024 (SB 362).

metadata:
  unit: currency-USD
  period: week
  label: Maryland CCS weekly copayment by service unit
