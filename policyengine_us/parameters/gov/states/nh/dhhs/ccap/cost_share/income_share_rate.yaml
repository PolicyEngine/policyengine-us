description: New Hampshire sets this share of family income as the weekly cost share by federal poverty guideline ratio under the Child Care Scholarship Program.

brackets:
  - threshold:
      2024-01-01: 0
    amount:
      2024-01-01: 0  # Steps 1-2: no income-based share
  - threshold:
      2024-01-01: 1.3801  # > 138% FPG
    amount:
      2024-01-01: 0.07  # Step 3: 7% of family income

