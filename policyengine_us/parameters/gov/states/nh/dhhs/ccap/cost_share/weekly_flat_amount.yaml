description: New Hampshire provides this flat weekly cost share amount by federal poverty guideline ratio under the Child Care Scholarship Program.

brackets:
  - threshold:
      2024-01-01: 0
    amount:
      2024-01-01: 0  # Step 1: <= 100% FPG, $0/week
  - threshold:
      2024-01-01: 1.0001  # > 100% FPG
    amount:
      2024-01-01: 5  # Step 2: $5/week
  - threshold:
      2024-01-01: 1.3801  # > 138% FPG
    amount:
      2024-01-01: 0  # Step 3: no flat amount

