description: Hawaii sets this co-payment percentage of the department's maximum rate allowable under the Child Care Subsidy program, by the family's gross income as a share of the federal poverty guidelines.

metadata:
  type: single_amount
  threshold_unit: /1
  amount_unit: /1
  period: year
  label: Hawaii CCAP co-payment rate by FPG ratio
  reference:
    # HAR 17-798.2-14(b)(4): co-payment = (percentage of the department's
    # maximum rate allowable) based on the family's monthly gross income.
    - title: HAR 17-798.2-14(b)(4)
      href: https://humanservices.hawaii.gov/bessd/files/2013/01/HAR-17-798.2-Child-Care-Services-Rules.pdf#page=29
    # Operative sliding fee scale (single-page scanned chart, eff 2020-01-02)
    # mapping each FPG band to its co-payment percentage.
    - title: Hawaii DHS Child Care Gross Income Eligibility Limits and Sliding Fee Scale, effective 2020-01-02
      href: https://childcaresubsidyapplication.dhs.hawaii.gov/Child-Care-Gross-Income-Eligibility-Limits-and-Sliding-Fee-Scale

# Bands are "above X%" boundaries (e.g., 101-115% means above 100% up to
# 115% FPG), so each threshold is shifted by 0.0001 to keep families at
# exactly the band top in the lower band.
brackets:
