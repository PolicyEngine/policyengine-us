description: Hawaii assigns this before-or-after-school-care hours tier under the Child Care Subsidy program, based on monthly hours of care.

metadata:
  type: single_amount
  threshold_unit: hour
  amount_unit: /1
  period: year
  label: Hawaii CCAP before-or-after-school-care hours tier
  reference:
    - title: HAR 17-798.2-12, Exhibit I, Child Care Rate Table, effective 2017-08-01
      href: https://humanservices.hawaii.gov/wp-content/uploads/2018/04/Child-Care-Rate-Table-2017-08-01.pdf

# Amount = index into the hi_ccap_hours_tier enum:
#   0 = FULL_TIME, 1 = TWO_THIRDS, 2 = ONE_THIRD, 3 = CASUAL.
# Before/after-school-care monthly-hour bands (Exhibit I):
#   Full-Time = 45+, Two-Thirds = 30-44, One-Third = 15-29, Casual = 1-14.
# Band lower bounds are inclusive, so exact thresholds keep each value in
# the correct band (e.g., exactly 15 hours = One-Third, 14 = Casual).
brackets:
  - threshold:
      2017-08-01: 0
    amount:
      2017-08-01: 3  # CASUAL (1-14 hours)
  - threshold:
      2017-08-01: 15
    amount:
      2017-08-01: 2  # ONE_THIRD (15-29 hours)
  - threshold:
      2017-08-01: 30
    amount:
      2017-08-01: 1  # TWO_THIRDS (30-44 hours)
  - threshold:
      2017-08-01: 45
    amount:
      2017-08-01: 0  # FULL_TIME (45+ hours)
