description: Hawaii assigns this before-or-after-school-care hours tier under the Child Care Subsidy program, based on monthly hours of care.

metadata:
  type: single_amount
  threshold_unit: hour
  amount_unit: /1
  period: year
  label: Hawaii CCAP before-or-after-school-care hours tier
  reference:
    - title: Hawaii Administrative Rules 17-798.3 Child Care Payments, Exhibit I (effective 2020-01-02)
      href: https://humanservices.hawaii.gov/bessd/files/2021/09/CHAPTER-17-798.3-Child-Care-Payments.pdf#page=71

# Amount = index into the hi_ccap_hours_tier enum: 0 = FULL_TIME, 1 = PART_TIME.
# Before/after-school-care monthly-hour bands (Exhibit I, eff 2020-01-02):
#   Full-Time = 45+, Part-Time = 1-44.
# Band lower bounds are inclusive (exactly 45 hours = Full-Time, 44 = Part-Time).
brackets:
  - threshold:
      2020-01-02: 0
    amount:
      2020-01-02: 1  # PART_TIME (1-44 hours)
  - threshold:
      2020-01-02: 45
    amount:
      2020-01-02: 0  # FULL_TIME (45+ hours)
