description: Mississippi sets this minimum weekly activity hours requirement under the Child Care Payment Program.
# Parents or caretakers must work at least this many hours per week, or be
# enrolled full-time in education or approved job training (or a combination).
values:
  2021-11-01: 25

metadata:
  unit: hour
  period: week
  label: Mississippi CCPP minimum weekly activity hours
  reference:
    - title: Mississippi CCPP Policy Manual, Rule 5.5 (Proof of Work/Education or Training)
      href: https://www.mdhs.ms.gov/wp-content/uploads/2026/01/CCPP-Policy-Manual_Final_1142025.pdf#page=30
