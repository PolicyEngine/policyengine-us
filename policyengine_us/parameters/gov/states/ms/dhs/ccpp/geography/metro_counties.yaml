description: Mississippi designates these counties as metropolitan for payment rates under the Child Care Payment Program.
# The 17 Mississippi counties in a Metropolitan Statistical Area under the OMB
# February 2013 delineation (the basis for the 2013 NCHS Urban-Rural scheme the
# Market Rate Survey uses). Every other Mississippi county is treated as
# non-metro. Grouped by MSA: Jackson, Gulfport-Biloxi-Pascagoula, Hattiesburg,
# and the Mississippi portion of Memphis.
values:
  2023-07-01:
