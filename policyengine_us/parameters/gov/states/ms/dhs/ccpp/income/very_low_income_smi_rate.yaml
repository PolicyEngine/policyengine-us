description: Mississippi uses this share of state median income to split the co-payment bands under the Child Care Payment Program.
# Families at or below 50% of state median income use the lower co-payment band;
# families above 50% (up to the 85% entry limit) use the higher band.
values:
  2021-11-01: 0.5

