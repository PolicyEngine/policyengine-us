description: Mississippi caps family size at this number when determining the co-payment rate under the Child Care Payment Program.
# The published fee scale's largest family-size row is "6 or more", so families
# of 6+ all use the size-6 co-payment percentage.
values:
  2021-11-01: 6

metadata:
  unit: person
  period: year
  label: Mississippi CCPP co-payment maximum family size
  reference:
