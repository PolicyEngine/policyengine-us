description: Mississippi provides these maximum weekly payment rates for special-needs children in licensed child care centers under the Child Care Payment Program.
# Flat all-ages special-needs rate effective July 2023 (2024 Market Rate Survey
# Table 1, p.9). This rate is the same for metro and non-metro facilities, but is
# keyed by location for structural consistency with the standard center rates.
