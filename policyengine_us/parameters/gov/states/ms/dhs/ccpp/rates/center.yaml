description: Mississippi provides these maximum weekly payment rates for licensed child care centers under the Child Care Payment Program.
# Operative "Current CCPP Rates" schedule effective July 2023 (2024 Market Rate
# Survey Table 1, p.9). Rates vary by the facility's location (metro / non-metro);
# we use the household's county as a proxy for facility location. Special-needs
# children are paid the flat all-ages special-needs rate (see special_needs_center).
