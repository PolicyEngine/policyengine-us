description: Mississippi provides these maximum weekly payment rates for registered family child care homes under the Child Care Payment Program.
# Operative "Current CCPP Rates" schedule effective July 2023 (2024 Market Rate
# Survey Table 2, p.10). Rates vary by the facility's location (metro / non-metro);
# we use the household's county as a proxy for facility location. Special-needs
# children are paid the flat all-ages special-needs rate (see special_needs_home).
metadata:
  period: week
  unit: currency-USD
  label: Mississippi CCPP family home weekly rates
  breakdown:
    - ms_ccpp_facility_location
    - ms_ccpp_age_group
