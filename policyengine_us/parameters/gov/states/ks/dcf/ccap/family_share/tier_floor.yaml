description: Kansas assesses the family share deduction against this federal poverty guideline multiple, based on the family's income as a share of the federal poverty guideline, under the Child Care Assistance Program.
metadata:
  type: single_amount
  threshold_unit: /1
  amount_unit: /1
  period: year
  label: Kansas CCAP family share income tier floor
  reference:
    - title: KEESM Appendix F-1 — Monthly Family Income and Family Share Deduction Schedule (Income Limit tiers)
      href: https://content.dcf.ks.gov/ees/KEESM/Appendix/F-1MonthlyFamilyIncomeandFamilyShareDeductionSchedule.pdf
    - title: KEESM 7541 — The Family Share Deduction (on the keesm7540 page)
      href: https://content.dcf.ks.gov/ees/keesm/Current/keesm7540.htm

brackets:
  - threshold:
      # Countable income can be negative (self-employment loss), so the first
      # bracket starts at -inf to make the $0-deduction clamp explicit.
      2026-05-01: -.inf
    amount:
      2026-05-01: 0
  - threshold:
      # Each F-1 tier runs up to and including its bound, so the next tier
      # starts above it.
      2026-05-01: 1.0001
    amount:
      2026-05-01: 1.0
  - threshold:
      2026-05-01: 1.1001
    amount:
      2026-05-01: 1.1
