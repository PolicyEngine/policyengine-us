# Group IV non-shared living: basic allowance + $135/month shelter standard
# per K.A.R. 30-4-101. Group IV covers Douglas, Harvey, and Johnson counties —
# Johnson is the most populous county in Kansas, making this the cross-state
# research convention used by CBPP and the Urban Welfare Rules Database.
# Group III ($109 shelter; Butler, Jefferson, Leavenworth, McPherson, Miami,
# Osage, Reno, Rice, Riley, Sedgwick, Shawnee) yields $403 for a family of 3.
