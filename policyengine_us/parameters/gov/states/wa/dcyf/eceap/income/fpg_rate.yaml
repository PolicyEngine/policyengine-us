description: Washington limits income to this fraction of the federal poverty guideline when determining ECEAP enrollment eligibility. Families below 110% FPL have priority enrollment under RCW 43.216.505; families between 110% and 130% FPL are allowed for enrollment on a space-available basis under RCW 43.216.512 with no risk factor required. PolicyEngine does not simulate space allocation, so this parameter holds the broader 130% ceiling.

values:
  2021-07-25: 1.3

