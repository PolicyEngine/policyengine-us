description: Washington uses this indicator to determine whether the federal poverty guideline (vs state median income) is the income eligibility basis for the Early Childhood Education and Assistance Program. The Fair Start for Kids Act (2021 c 199) replaced FPG-based thresholds with state median income; sections 204-206 took effect July 1, 2025.

values:
  2021-07-25: true
  2025-07-01: false

metadata:
  unit: bool
  period: year
  label: Washington ECEAP uses federal poverty guideline as income basis
  reference:
    - title: RCW 43.216.505 Eligible children (effective date note - sections 204-206 of 2021 c 199 take effect July 1, 2025)
      href: https://app.leg.wa.gov/RCW/default.aspx?cite=43.216.505
