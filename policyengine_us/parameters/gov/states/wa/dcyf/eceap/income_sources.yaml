description: Washington counts these income sources when determining family income for the Early Childhood Education and Assistance Program.

values:
  2021-07-25:
    - market_income
    - tanf_reported
    - ssi_reported
    - social_security
    - child_support_received
    - unemployment_compensation
    - veterans_benefits
    - workers_compensation

