description: Washington provides this monthly copayment amount based on the household's income as a share of the State Median Income under the Working Connections Child Care program.
metadata:
  type: single_amount
  threshold_unit: /1
  amount_unit: currency-USD
  period: month
  label: Washington WCCC monthly copayment by SMI tier
  reference:
    - title: WAC 110-15-0075(2)
      href: https://app.leg.wa.gov/wac/default.aspx?cite=110-15-0075

brackets:
  # At or below 20% SMI: waived
  - threshold:
      2024-11-01: 0
    amount:
      2024-11-01: 0
  # Above 20% and at or below 36% SMI
  - threshold:
      2024-11-01: 0.2001
    amount:
      2024-11-01: 65
  # Above 36% and at or below 50% SMI
  - threshold:
      2024-11-01: 0.3601
    amount:
      2024-11-01: 90
  # Above 50% and at or below 60% SMI
  - threshold:
      2024-11-01: 0.5001
    amount:
      2024-11-01: 165
  # Above 60% and at or below 65% SMI (reapplication)
  # or above 60% and at or below 75% SMI (state-registered apprenticeship)
  - threshold:
      2024-11-01: 0.6001
    amount:
      2024-11-01: 215
