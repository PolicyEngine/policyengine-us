description: Washington considers these immigration statuses eligible for the Refugee Cash Assistance program.

# PAROLED_ONE_YEAR is treated as RCA-eligible starting 2021-09-30 to cover
# Afghan (P.L. 117-43 § 2502, enacted 2021-09-30) and Ukrainian (P.L. 117-128
# and P.L. 118-42 Div. G § 209(f)) humanitarian parolees, who are statutorily
# treated as refugees for federal benefit purposes. The qualified-alien hook
# for parolees is 8 USC 1641(b)(4) (NOT 1641(b)(8), which covers Compact-of-
# Free-Association residents). The refugee-equivalence treatment itself
# comes from P.L. 117-43 § 2502(b)(1) (Afghan) and P.L. 117-128 § 401
# (Ukrainian). PolicyEngine does not distinguish these populations from
# other INA 212(d)(5) parolees, so this over-grants RCA to the small
# population of non-humanitarian parolees. PAROLED_ONE_YEAR is also
# bar-exempt for federal TANF (see
# parameters/gov/hhs/tanf/bar_exempt_immigration_statuses.yaml), so a
# humanitarian-parolee family with a child receives TANF rather than RCA;
# RCA picks up adults without children and pre-TANF cases via the
# 12-month ORR window.
#
# CONDITIONAL_ENTRANT corroboration: qualified-alien status flows from
# 8 USC 1641(b)(6); ORR refugee-program eligibility flows from
# 45 CFR 401.2's definition of an eligible refugee.
values:
  1996-08-22:
    - REFUGEE
    - ASYLEE
    - CUBAN_HAITIAN_ENTRANT
    - DEPORTATION_WITHHELD
    - CONDITIONAL_ENTRANT
  2021-09-30:
    - REFUGEE
    - ASYLEE
    - CUBAN_HAITIAN_ENTRANT
    - DEPORTATION_WITHHELD
    - CONDITIONAL_ENTRANT
    - PAROLED_ONE_YEAR

