description: Washington provides this amount as the supplement under the State Supplementary Payment program.

# NOTE: After 2023-07-01, the MEDICAL_INSTITUTION rate is computed as the
# Washington Apple Health institutional personal needs allowance (PNA) minus
# the $30 federal SSI institutional PNA. Annual updates follow the Apple Health
# PNA tables (WAC 182-513-1105(5)) and are adopted under WAC 388-478-0057.
# Do NOT apply mechanical SSA COLA factors to the prior $70 base — that yields
# $72.24 for 2024, which is incorrect (the correct value is $73.20, derived
# from the 2024 institutional PNA of $103.20 minus $30).

