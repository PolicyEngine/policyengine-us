# Statewide approximation of the share of a property tax bill that consists of
# excess (voter-approved) levies, the state property tax (RCW 84.52.065), and
# RCW 84.55.050 lid-lift portions whose ballot identifies this exemption.
# Pre-2018: only excess + lid-lift (state Part 2 did not yet exist) — ~20%.
# 2018-2026: adds the additional state school levy Part 2 — ~30%.
# 2027+: ESSB 6162 consolidates the state levy into a single rate, so this
# tier exempts the entire state property tax — ~45%.
# PolicyEngine's real_estate_taxes is a single number; this share allocates it
# between fully-exempt and regular components.
