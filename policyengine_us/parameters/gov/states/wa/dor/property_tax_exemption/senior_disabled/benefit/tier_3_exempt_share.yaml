description: Washington sets this share of total real estate taxes as fully exempt for tier-3 claimants under the Senior Citizens and Disabled Persons Property Tax Exemption program.
values:
  2008-01-01: 0.2
  2018-01-01: 0.3
  2027-01-01: 0.45

metadata:
  unit: /1
  period: year
  label: Washington senior/disabled property tax exemption full-exempt share
  reference:
