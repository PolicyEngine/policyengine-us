  label: New York TANF maximum monthly shelter allowance (NYC schedule)
  reference:
    - title: N.Y. Comp. Codes R. & Regs. Tit. 18 § 352.3 - Local agency maximum monthly shelter allowance schedule with children (New York City schedule)
      href: https://www.law.cornell.edu/regulations/new-york/18-NYCRR-352.3

# NYC shelter allowance with children, 18 NYCRR 352.3(a) Schedule SA-2.
# This implementation uses the NYC schedule as the model default since:
#   (1) NYC accounts for the majority of New York's TANF caseload
#   (2) CBPP and Urban WRD report the NYC figure as the NY benchmark
# County-specific shelter allowances ($259-$447 range outside NYC) can be
# layered on as a future enhancement when county data is available.
