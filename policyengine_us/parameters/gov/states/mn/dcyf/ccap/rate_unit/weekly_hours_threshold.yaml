description: Minnesota pays the weekly child care rate when authorized care exceeds this many hours per week under the Child Care Assistance Program.
# Section 9.9 rate-UNIT billing rule: more than 35 hours/week with a single
# provider pays the weekly rate. Distinct from the Minn. Stat. 142E.17 subd. 6
# statutory 30-hour floor for accessing the weekly rate basis - do not change 35
# to 30.
values:
  2025-01-01: 35

metadata:
  unit: hour
  period: week
  label: Minnesota CCAP weekly rate hours-per-week threshold
  reference:
    - title: Minnesota CCAP Policy Manual, Chapter 9.9 (Determination of Payment Amounts)
      href: https://www.dhs.state.mn.us/main/groups/manuals/documents/pub/mndhs-063513.pdf#page=287
    - title: Minn. Stat. 142E.17 (hourly, daily, and weekly rate basis)
      href: https://www.revisor.mn.gov/statutes/cite/142E.17
