description: Minnesota provides this food portion of the Transitional Standard under the Minnesota Family Investment Program.
# MFIP is a combined cash+food program. This parameter models the food portion
# of the Transitional Standard. It is used internally to compute the full
# Transitional Standard (cash + food) for FWL and benefit calculations per
# MN Stat. 142G.17, Subd. 5 & 7. The food portion is then subtracted from
# the final benefit because PolicyEngine models SNAP separately.

metadata:
  unit: currency-USD
  period: month
  breakdown:
    - range(0, 20)
  breakdown_labels:
    - Assistance unit size
  label: Minnesota MFIP Transitional Standard food portion
  reference:
