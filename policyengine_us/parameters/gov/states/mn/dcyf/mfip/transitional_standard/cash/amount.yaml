description: Minnesota provides this cash portion of the Transitional Standard under the Minnesota Family Investment Program.
# NOTE: MFIP is a combined cash+food program. This parameter models only the
# cash portion. The food portion is in a separate parameter. The full
# Transitional Standard (cash + food) is used in FWL and benefit calculation
# per MN Stat. 142G.17, Subd. 5 & 7. The food portion is then subtracted
# from the final benefit because PolicyEngine models SNAP separately.

