description: Minnesota provides this multiple of the federal Supplemental Security Income individual benefit rate as the housing allowance under the Minnesota Supplemental Aid program. Per Minn. Stat. § 256D.44 Subd. 5(g)(1), the allowance equals one-half of the maximum federal SSI payment amount for a single individual in effect on July 1 each year. The same amount is paid regardless of which Subd. 5(g) eligibility pathway qualifies the recipient (institution-relocation / HCBS-waiver / shelter > 40% income, or chronic homelessness / housing stabilization).

values:
  1989-01-01: 0.5

