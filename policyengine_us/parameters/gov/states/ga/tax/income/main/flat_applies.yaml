description: Georgia applies the flat-tax structure when this indicator is true; when false, the per-filing-status progressive bracket structure under gov.states.ga.tax.income.main.{single,joint,separate,head_of_household,surviving_spouse} applies instead.

values:
  2021-01-01: false
  2024-01-01: true

