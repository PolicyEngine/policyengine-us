description: Georgia subtracts these sources from adjusted gross income.
# Georgia HB463 (2025-2026), Section 2-4 adds qualified overtime
# compensation (O.C.G.A. section 48-7-27(a)(16)) and cash tips
# (O.C.G.A. section 48-7-27(a)(17)) to Georgia AGI subtractions for tax
# years 2026 through 2028. Both provisions self-repeal December 31, 2028,
# so a 2029-01-01 entry removes both variables from the list.
values:
  2021-01-01:
    - us_govt_interest
    - ga_retirement_exclusion
    - taxable_social_security
    - ga_investment_in_529_plan_deduction
  2022-01-01:
    - us_govt_interest
    - ga_retirement_exclusion
    - ga_military_retirement_exclusion
    - taxable_social_security
    - ga_investment_in_529_plan_deduction
  2026-01-01:
    - us_govt_interest
    - ga_retirement_exclusion
    - ga_military_retirement_exclusion
    - taxable_social_security
    - ga_investment_in_529_plan_deduction
    - ga_qualified_overtime_exclusion
    - ga_cash_tip_exclusion
  2029-01-01:
    - us_govt_interest
    - ga_retirement_exclusion
    - ga_military_retirement_exclusion
    - taxable_social_security
    - ga_investment_in_529_plan_deduction

