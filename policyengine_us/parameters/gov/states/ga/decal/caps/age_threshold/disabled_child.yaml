description: Georgia limits the Childcare and Parent Services program to disabled children up through this age.
values:
  # Policy Manual §6.4.3 sets the disabled-child age at 17; the CCDF State Plan
  # §2.2.1(b)(i) sets it at 18. We follow the more recent, more restrictive
  # Policy Manual value of 17.
  2026-03-02: 17

metadata:
  unit: year
  period: year
  label: Georgia CAPS disabled child age threshold
  reference:
    - title: Georgia CAPS Policy Manual, Section 6.4.3 (Age Requirement)
      href: https://caps.decal.ga.gov/assets/downloads/CAPS/0-CAPS_Policy-Manual.pdf#page=30
    - title: Georgia CCDF Plan FFY 2025-2027, Section 2.2.1 (Age of children served)
      href: https://www.decal.ga.gov/documents/attachments/CCDFStatePlan25-27.pdf#page=16
