description: Vermont provides up to this amount as the housing allowance in Chittenden County under the Reach Up program.

# The 2001-07-01 effective date is inferred from Act 147 of 2001
# (Reach Up program creation, replacing ANFC). The current rule
# revision (Rule 2246, 08/01/2024 bulletin 23-28) does not
# document the original establishment date of the $450 amount.
values:
  2001-07-01: 450

