description: Utah adds these modeled nontaxable income sources to adjusted gross income under the Homeowner's/Renter's Relief program.
values:
  2024-01-01:
    - alimony_income
    - child_support_received
    - railroad_benefits
    - strike_benefits
    - tax_exempt_interest_income
    - tax_exempt_pension_income
    - tax_exempt_retirement_distributions
    - traditional_401k_contributions
    - traditional_403b_contributions
    - traditional_ira_contributions
    - self_employed_pension_contributions
    - veterans_benefits
    - workers_compensation
metadata:
  unit: list
  period: year
  label: Utah homeowner's/renter's relief modeled nontaxable income sources
  reference:
    - title: Utah Code Section 59-2a-101
      href: https://le.utah.gov/xcode/Title59/Chapter2A/C59-2a_2026010120250507.pdf#page=5
