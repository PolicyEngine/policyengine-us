description: South Carolina provides these maximum weekly payment rates for family, friend, and neighbor care under the Child Care Scholarship Program.
# All 4 FFN subtypes (FRI, FNI, FRO, FNO) have identical rates.
# Urban and rural rates are also identical for FFN providers.
# Rates use a simplified 2-tier age structure: under 3 and 3+.
