description: South Carolina applies this state and local tax cap to the State Tax addback worksheet, holding to the pre-One Big Beautiful Bill Act federal SALT cap because SC has not conformed to the 2025 federal SALT cap increase.

SINGLE:
  2018-01-01: 10_000
JOINT:
  2018-01-01: 10_000
SEPARATE:
  2018-01-01: 5_000
HEAD_OF_HOUSEHOLD:
  2018-01-01: 10_000
SURVIVING_SPOUSE:
  2018-01-01: 10_000

