description: South Carolina, which conforms to the Internal Revenue Code as amended through December 31, 2024, does not adopt the One Big Beautiful Bill Act's increase to the federal standard deduction. This parameter holds the pre-OBBBA federal standard deduction amount that SC effectively recognizes, based on the TCJA statutory base (IRC § 63(c)(7) as enacted by Pub. L. 115-97 § 11021) inflation-adjusted under IRC § 63(c)(4). Pre-2025 values mirror the federal standard deduction; 2025 onward continues the pre-OBBBA inflation trajectory via uprating.

