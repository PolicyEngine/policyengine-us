description: >-
  South Carolina uses this standard deduction amount for
  federal non-conformity purposes under the One Big Beautiful
  Bill Act. These are the pre-OBBBA indexed values; the
  difference from the federal standard deduction is added back
  on SC1040 line 1e.

SINGLE:
  2025-01-01: 15_000
JOINT:
  2025-01-01: 30_000
HEAD_OF_HOUSEHOLD:
  2025-01-01: 22_500
SEPARATE:
  2025-01-01: 15_000
SURVIVING_SPOUSE:
  2025-01-01: 30_000

