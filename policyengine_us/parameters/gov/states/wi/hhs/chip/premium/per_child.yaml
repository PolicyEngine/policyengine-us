description: Wisconsin charges this BadgerCare Plus monthly premium per CHIP-eligible child, based on the tax unit's modified adjusted gross income as a fraction of the federal poverty line. The total for all children is also capped at 5 percent of the assistance group's income under the federal cost-sharing cap.
