description: Alaska sets these Child Care Assistance Program maximum reimbursement rates for licensed group home providers. F/T month and P/T month rates are monthly amounts; F/T day and P/T day rates are daily amounts. The Municipality of Anchorage does not have licensed group homes as a provider type — rates for Anchorage are encoded as zero per the rate schedule.
