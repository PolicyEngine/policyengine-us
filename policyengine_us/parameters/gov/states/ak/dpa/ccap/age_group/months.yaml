description: Alaska sets these age group boundaries (in months) for the Child Care Assistance Program rate schedule. Brackets map a child's age in months to an age-group index — INFANT (0-12 months), TODDLER (13-35 months), PRESCHOOL (36-59 months), SCHOOL_AGE (60+ months).
