description: Alaska provides this amount as the monthly State Median Income by family size under the Child Care Assistance Program. Values come from the Family Income and Contribution Schedule (FICS), which is derived from a 5-year American Community Survey rolling average and is revised when new ACS estimates and the state's CCDF plan are released. The FICS does not publish a 1-person value; the smallest published family size is 2.
