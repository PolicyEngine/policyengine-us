description: Alaska counts these unearned income sources for the Child Care Assistance Program. Royalties and ANCSA distributions are enumerated in the manual but we don't track them as separate income sources at the moment.
values:
  2022-02-21:
    - child_support_received
    - alimony_income
    - social_security
    - unemployment_compensation
    - veterans_benefits
    - rental_income
    - pension_income

metadata:
  unit: list
  period: year
  label: Alaska CCAP countable unearned income sources
