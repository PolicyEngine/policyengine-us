description: Alaska uses these unearned income sources for countable income under the Child Care Assistance Program.
values:
  2022-02-21:
    - child_support_received
    - alimony_income
    - social_security
    - ssi
    - unemployment_compensation
    - veterans_benefits
    - rental_income
    - pension_income

