description: Alaska counts these unearned income sources for the Child Care Assistance Program.
values:
  2022-02-21:
    - child_support_received
    - alimony_income
    - social_security
    - ssi
    - unemployment_compensation
    - veterans_benefits
    - rental_income
    - pension_income

