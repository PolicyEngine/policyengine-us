description: Montana limits gross income to this share of the federal poverty guideline under the Best Beginnings Child Care Scholarship program.
# (S2) ARM 37.80.202 body text states a 150% basic / 185% graduated structure. The
# implemented 185% standard / 200% graduated numbers come from the 2025 operational
# Best Beginnings Sliding Fee Scale, which is the operational source of truth: ARM
# sets the framework; the scale sets the operational 185%/200% numbers. The scale
# runs standard eligibility through 185% FPG and graduated eligibility (non-TANF
# over-income families) through 200% FPG, so 200% is the outer eligibility ceiling.
#
# (S1) The graduated 185-200% FPG band is recipient-only. Per the Best Beginnings
# Sliding Fee Scale: "Graduated eligibility continues eligibility for Non-TANF
# families that are deemed over-income for the Non-TANF program. A family must
# already be on the Non-TANF program. At annual redetermination, the family would be
# eligible for Graduated Eligibility." ARM 37.80.202(2) grants graduated eligibility
# "at annual redetermination." We don't currently track CCAP enrollment status and
# cannot distinguish new applicants from continuing recipients in a single-period
# simulation, so the model applies the 200% ceiling to everyone. This over-grants
# eligibility to new applicants in the 185-200% FPG band (a documented modeling
# limitation).
#
# (S6) The graduated-eligibility STRUCTURE dates to 2016-11-01, while the FPG share
# value reflects the 2025 Sliding Fee Scale (2025 Federal Register poverty
# guidelines). The 2016-11-01 effective date documents the structure's start; the
# operational value is sourced from the 2025 scale.
values:
  2016-11-01: 2

