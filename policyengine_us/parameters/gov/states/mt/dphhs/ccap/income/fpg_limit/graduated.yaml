description: Montana limits gross income to this share of the federal poverty guideline for graduated eligibility at redetermination under the Best Beginnings Child Care Scholarship program.
# ARM 37.80.202(2): a non-TANF household whose income exceeds 150% and is below
# 185% of the FPG qualifies for graduated eligibility at annual redetermination
# (12-month eligibility period). We proxy "at redetermination / continuing
# recipient" with the mt_ccap_enrolled input; first-time applicants use the
# initial 150% share (see initial.yaml).
values:
  2016-11-01: 1.85

metadata:
  unit: /1
  period: year
  label: Montana CCAP graduated income limit share of federal poverty guideline
  reference:
    - title: Mont. Admin. R. 37.80.202(2)
      href: https://rules.mt.gov/gateway/ruleno.asp?RN=37.80.202
    - title: Mont. Admin. R. 37.80.202(2) — Cornell LII
      href: https://www.law.cornell.edu/regulations/montana/Mont-Admin-r-37.80.202
