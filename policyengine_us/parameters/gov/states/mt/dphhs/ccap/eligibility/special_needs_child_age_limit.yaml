description: Montana limits eligibility to children with special needs under this age under the Best Beginnings Child Care Scholarship program.
# The manual references child eligibility in Policy Section 1-6 (not available); this
# is the CCDF special-needs age limit (45 CFR 98.20, younger than 19).
values:
  2016-11-01: 19

