description: Montana sets this share of gross monthly income as the copayment by federal poverty guideline ratio under the Best Beginnings Child Care Scholarship program.
# Sliding fee scale rows are in 5-point % FPG steps; each rate tier applies to income
# above the prior step's top up to and including the named step (e.g., the 1.0% tier
# covers income above 100% FPG through 110% FPG). Thresholds use the "+ 0.0001" shift
# so a family exactly at a step's top stays in the lower tier. The top tier (7.0%)
# runs through 200% FPG (graduated eligibility); above 200% the household is not
# eligible (gated separately by the income limit).
metadata:
  type: single_amount
  threshold_unit: /1
  amount_unit: /1
  period: year
  label: Montana CCAP copayment rate by FPG ratio
  reference:
    - title: Best Beginnings Child Care Scholarship Sliding Fee Scale (effective 07-01-2025)
      href: https://dphhs.mt.gov/assets/ecfsd/childcare/policymanual/SlidingFeeScale07012023.pdf

