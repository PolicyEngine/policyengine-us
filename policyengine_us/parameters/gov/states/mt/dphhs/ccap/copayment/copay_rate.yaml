description: Montana sets this share of gross monthly income as the copayment under the Best Beginnings Child Care Scholarship program.
# The copayment share varies by the family's federal poverty guideline ratio.
# Sliding fee scale rows are in 5-point % FPG steps. Per the scale footnote ("the
# co-payments listed are minimums and correspond to the lowest level for each income
# range"), each labeled % is the FLOOR of its rate tier: a tier applies from its named
# step (inclusive) up to the next tier's step. For example, the 1.0% tier covers 105%
# FPG (inclusive) up to but not including 115% FPG. PolicyEngine single_amount is "at
# or above threshold," and the scale places a family exactly at a step into the higher
# tier (e.g. 105% -> 1.0%), so thresholds use the named % directly with no shift. The
# published scale's top tier (7.0%) runs through 200% FPG, but income eligibility caps
# at 185% FPG for non-TANF families (ARM 37.80.202(2)), so the tiers above 185% are
# unreachable for eligible families and retained only to mirror the published scale.
#
# (S6) The graduated-eligibility STRUCTURE dates to 2016-11-01, but these copay
# percentages come from the 2025 Best Beginnings Sliding Fee Scale (2025 Federal
# Register poverty guidelines). The brackets carry a 2025-07-01 effective date to
# document that the percentages are sourced from the 2025 scale, distinct from the
# structure's 2016-11-01 start.
metadata:
  type: single_amount
  threshold_unit: /1
  amount_unit: /1
  period: year
  label: Montana CCAP copayment rate by FPG ratio
  reference:
    - title: Best Beginnings Child Care Sliding Fee Scale (effective 2025-07-01)
      href: https://dphhs.mt.gov/assets/ecfsd/childcare/policymanual/SlidingFeeScale07012023.pdf

