description: New Jersey allows partial benefits equal to the weekly benefit rate plus a 20% earnings disregard, expressed here as a (1 + disregard) multiplier on the weekly benefit rate. The reduced payable benefit is `multiplier * weekly_benefit_rate - weekly_gross_wages`, floored at 0 and capped at the full weekly benefit rate.

