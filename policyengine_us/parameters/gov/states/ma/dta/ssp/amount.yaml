description: Massachusetts provides this payment amount under the State Supplement program, based on applicants living arrangement, SSI category, and number of people.
metadata:
  unit: currency-USD
  period: month
  label: Massachusetts SSP payment amount
  breakdown:
  - ma_state_living_arrangement
  - ssi_category
