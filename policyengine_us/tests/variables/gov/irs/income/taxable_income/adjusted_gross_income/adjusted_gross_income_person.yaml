- name: Per-person AGI reflects actual UC recipient when UC is on spouse only
  period: 2025
  input:
    people:
      head:
        age: 75
        unemployment_compensation: 0
      spouse:
        age: 40
        employment_income: 10_000
        unemployment_compensation: 19_000
    tax_units:
      tax_unit:
        members: [head, spouse]
    marital_units:
      marital_unit:
        members: [head, spouse]
    families:
      family:
        members: [head, spouse]
    spm_units:
      spm_unit:
        members: [head, spouse]
    households:
      household:
        members: [head, spouse]
  output:
    adjusted_gross_income_person: [0, 29_000]

- name: Per-person AGI reflects proportional UC allocation when both spouses have UC
  period: 2025
  input:
    people:
      head:
        age: 50
        employment_income: 30_000
        unemployment_compensation: 4_000
      spouse:
        age: 48
        employment_income: 20_000
        unemployment_compensation: 12_000
    tax_units:
      tax_unit:
        members: [head, spouse]
    marital_units:
      marital_unit:
        members: [head, spouse]
    families:
      family:
        members: [head, spouse]
    spm_units:
      spm_unit:
        members: [head, spouse]
    households:
      household:
        members: [head, spouse]
  output:
    adjusted_gross_income_person: [34_000, 32_000]
