- name: Case 4, AGI limit blocks EITC when AGI exceeds limit.
  period: 2023
  absolute_error_margin: 10
  reforms: policyengine_us.reforms.winship.winship_reform
  input:
    gov.contrib.individual_eitc.in_effect: true
    gov.contrib.individual_eitc.agi_eitc_limit: 19_000
    people:
      person1:
        employment_income: 20_000
        is_tax_unit_head: true
      person2:
        employment_income: 0
        is_tax_unit_spouse: true
      person3:
        age: 5
      person4:
        age: 6
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
  output:
    # AGI (20k) >= limit (19k), so no EITC
    eitc: 0

- name: Case 5, no AGI limit when set to 0.
  period: 2023
  absolute_error_margin: 10
  reforms: policyengine_us.reforms.winship.winship_reform
  input:
    gov.contrib.individual_eitc.in_effect: true
    gov.contrib.individual_eitc.agi_eitc_limit: 0
    people:
      person1:
        employment_income: 20_000
        is_tax_unit_head: true
      person2:
        employment_income: 0
        is_tax_unit_spouse: true
      person3:
        age: 5
      person4:
        age: 6
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
  output:
    # AGI limit of 0 means no limit - should get individual EITC
    # Head with 20k income gets full EITC (same as Case 3)
    eitc: 6_604
