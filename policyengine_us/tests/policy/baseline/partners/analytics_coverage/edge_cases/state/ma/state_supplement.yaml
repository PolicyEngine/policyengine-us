- name: ma_state_supplement_aged_eligible (ma)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income: 0
        capital_gains: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
    households:
      household:
        members: &id001
        - head
        state_code_str: MA
        zip_code: 02118
        county_str: SUFFOLK_COUNTY_MA
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    tax_units:
      tax_unit:
        ma_eitc: 0.0
        ma_child_and_family_credit: 0.0
        adjusted_gross_income: 0.0
    people:
      head:
        ma_state_supplement: 1545.84
