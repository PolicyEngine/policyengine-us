- name: ca_state_supplement_aged_eligible (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income: 0
        capital_gains: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
    households:
      household:
        members: &id001
        - head
        state_code_str: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    tax_units:
      tax_unit:
        ca_eitc: 0.0
        ca_eitc_eligible: true
        ca_yctc: 0.0
        ca_foster_youth_tax_credit: 0.0
        ca_cdcc: 0.0
        ca_renter_credit: 0.0
        adjusted_gross_income: 0.0
    spm_units:
      spm_unit:
        ca_state_supplement: 4101.72
