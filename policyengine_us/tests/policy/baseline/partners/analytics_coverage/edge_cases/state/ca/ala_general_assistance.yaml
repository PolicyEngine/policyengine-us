        ca_calworks_child_care_full_time: false
        ca_riv_general_relief_meets_work_requirements: false
    households:
      household:
        members: &id001
        - head
        state_code_str: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
        in_ala: true
        in_la: false
        in_riv: false
