- name: tx_ccs_low_income_child (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_blind: false
        is_pregnant: false
        is_female: false
        immigration_status_str: CITIZEN
        employment_income: 30000
        has_bcc_qualifying_coverage: false
        is_full_time_student: false
        ca_calworks_child_care_time_category: MONTHLY
        ca_calworks_child_care_full_time: false
        ca_riv_general_relief_meets_work_requirements: false
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_blind: false
        is_pregnant: false
        is_female: false
        immigration_status_str: CITIZEN
        employment_income: 0
        has_bcc_qualifying_coverage: false
        is_full_time_student: false
        ca_calworks_child_care_time_category: MONTHLY
        ca_calworks_child_care_full_time: false
        ca_riv_general_relief_meets_work_requirements: false
        childcare_attending_days_per_month: 22
        tx_ccs_payment_rate: 600
    households:
      household:
        members: &id001
        - head
        - child1
        state_code_str: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    # Family size 2, $30K income → ~40.7% SMI → monthly copay ~$116.18.
    # Expense $1,000/month capped at max rate $600, then copay deducted:
    # monthly tx_ccs = max(min(1000, 600) − 116.18, 0) = $483.82
    # Annual (12 × $483.82) ≈ $5,805.84
    spm_units:
      spm_unit:
        tx_ccs: 5805.84
