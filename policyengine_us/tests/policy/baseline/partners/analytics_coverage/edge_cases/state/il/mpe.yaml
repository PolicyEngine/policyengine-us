- name: il_mpe_pregnant_low_income (il)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 28
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_blind: false
        is_pregnant: true
        is_female: false
        immigration_status_str: CITIZEN
        employment_income: 20000
        has_bcc_qualifying_coverage: false
        is_full_time_student: false
        ca_calworks_child_care_time_category: MONTHLY
        ca_calworks_child_care_full_time: false
        ca_riv_general_relief_meets_work_requirements: false
    households:
      household:
        members: &id001
        - head
        state_code_str: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        il_mpe_eligible: true
