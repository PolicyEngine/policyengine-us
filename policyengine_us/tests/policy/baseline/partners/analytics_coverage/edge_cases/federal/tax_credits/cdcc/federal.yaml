# Same household as above, but the spouse doesn't report care_expenses. Income
# is high enough in both cases that cdcc_credit_limit (tax liability) isn't
# the binding constraint, so cdcc itself is sensitive to care_expenses: 2100
# with the $4,000 adult-care expense vs 1400 without it (childcare alone).
# Without this pairing, a regression that stops reading care_expenses
# wouldn't be caught by the test above alone.
