  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 28
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: true
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income: 0
        is_ccdf_reason_for_care_eligible: false
    households:
      household:
        members: &id001
        - head
        state_code_str: WA
        zip_code: '98101'
        county_str: KING_COUNTY_WA
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        early_head_start: 25548.21
