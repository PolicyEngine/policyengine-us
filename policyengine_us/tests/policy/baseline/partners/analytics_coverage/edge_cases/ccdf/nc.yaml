    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income: 20000
        is_ccdf_reason_for_care_eligible: true
      child1:
        age: 12
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income: 0
        is_ccdf_reason_for_care_eligible: true
    households:
      household:
        members: &id001
        - head
        - child1
        state_code_str: NC
        zip_code: '27601'
        county_str: WAKE_COUNTY_NC
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        is_ccdf_eligible: false
        is_ccdf_reason_for_care_eligible: true
      child1:
        is_ccdf_eligible: true
        is_ccdf_reason_for_care_eligible: true
