- name: housing_assistance_receives_true (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income: 20000
        is_ccdf_reason_for_care_eligible: false
    households:
      household:
        members: &id001
        - head
        state_code_str: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
        receives_housing_assistance: true
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    spm_units:
      spm_unit:
        housing_assistance: 0.0
