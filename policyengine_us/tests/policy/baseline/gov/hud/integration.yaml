- name: Housing assistance for a one-person household in San Francisco.
  period: 2022
  absolute_error_margin: 1
  input:
    employment_income: 2_000 * 12
    hud_gross_rent: 1_000 * 12
    # 2022 AMI.
    # https://sfmohcd.org/sites/default/files/Documents/MOH/BMR%20Ownership/2022%20AMI-IncomeLimits.pdf
    ami: 138_550
    # 2019 1BR payment standard.
    # https://sfmohcd.org/sites/default/files/Documents/MOH/Asset%20Management/2019%20AMI_RentLimits-HMFA.pdf
    pha_payment_standard: 2_748 * 12
    tenant_pays_utilities: true
  output:
    housing_assistance: 400 * 12

- name: Housing assistance for a married household with two children in Los Angeles County.
  period: 2023
  absolute_error_margin: 1
  input:
    people:
      parent1:
        age: 45
        employment_income: 3_000 * 12
        pre_subsidy_rent: 1_000 * 12
      parent2:
        age: 45
      dependent1:
        age: 12
      dependent2:
        age: 12
    households:
      household:
        bedrooms: 3
        is_sro: false
        members: [parent1, parent2, dependent1, dependent2]
        county_fips: "06037"
        in_la: true
        tenant_pays_utilities: true
  output:
    ami: 98_200
    pha_payment_standard: 41_580 # 3_465 * 12
    hud_annual_income: 36_000 # 3_000 * 12
    # Subtract $480 for each dependent per year.
    hud_adjusted_income: 35_040
    # 30% of adjusted income, greater than 10% of annual income.
    # 0.3 * $35,040 = $10,512
    hud_ttp_adjusted_income_share: 10_512
    hud_ttp_income_share: 3_600
    hud_ttp: 10_512
    # Max subsidy is $41,580 - $10,512 = $31,068
    hud_max_subsidy: 31_068
    # Lesser of max subsidy and (rent - TTP)
    # Rent - TTP = 12_000 - 10_512 = 1,488
    hud_utility_allowance: 375 * 12
    hud_gross_rent: 1_375 * 12
    hud_hap: 5_988
    # Eligibility
    hud_income_level: ESPECIALLY_LOW
    housing_assistance: 5_988

- name: Housing assistance for a reported recipient outside LA uses FMR-backed payment standard.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        employment_income: 12_000
        pre_subsidy_rent: 24_000
    households:
      household:
        county_fips: "06001"
        bedrooms: 2
        tenant_pays_utilities: false
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
        receives_housing_assistance: true
  output:
    pha_payment_standard: 32_184
    hud_annual_income: 12_000
    hud_ttp: 3_600
    hud_max_subsidy: 28_584
    hud_gross_rent: 24_000
    hud_hap: 20_400
    housing_assistance: 20_400

- name: Outside LA, a tenant who pays utilities gets a utility allowance in gross rent (Denton County, TX).
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        pre_subsidy_rent: 12_000
    households:
      household:
        county_fips: "48121"
        bedrooms: 2
        tenant_pays_utilities: true
        members: [person1]
  output:
    # Denton County TDHCA multi-family, all-electric schedule (2 BR): $298/month.
    hud_utility_allowance: 298 * 12
    # Gross rent adds the utility allowance to the tenant-paid rent.
    hud_gross_rent: 12_000 + 298 * 12
