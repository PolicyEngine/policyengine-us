- name: Jefferson County (Louisville) resident pays the occupational license fee
  period: 2025
  input:
    state_code: KY
    county_str: JEFFERSON_COUNTY_KY
    employment_income: 50_000
  output:
    ky_jefferson_occupational_tax: 1_100  # 50,000 * 2.20%

- name: Non-Jefferson Kentucky household owes no Jefferson occupational fee
  period: 2025
  input:
    state_code: KY
    county_str: FAYETTE_COUNTY_KY
    employment_income: 50_000
  output:
    ky_jefferson_occupational_tax: 0

- name: Jefferson occupational fee includes self-employment income
  period: 2025
  input:
    state_code: KY
    county_str: JEFFERSON_COUNTY_KY
    employment_income: 30_000
    self_employment_income: 20_000
  output:
    ky_jefferson_occupational_tax: 1_100  # (30,000 + 20,000) * 2.20%

- name: Jefferson occupational fee sums earnings across earners in the tax unit
  period: 2025
  input:
    people:
      person1:
        employment_income: 50_000
      person2:
        employment_income: 30_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
        county_str: JEFFERSON_COUNTY_KY
  output:
    ky_jefferson_occupational_tax: 1_760  # (50,000 + 30,000) * 2.20%
