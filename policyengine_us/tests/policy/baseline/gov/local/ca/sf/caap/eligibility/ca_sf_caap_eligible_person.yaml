# A person counts toward the CAAP budget unit if they do NOT receive SSI AND
# have a qualified immigration status (SEC. 20.7-6, 20.7-14). ssi is
# MONTH-defined, so input is the monthly amount.
- name: Case 1, not counted because the person receives SSI.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 600
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
  output:
    ca_sf_caap_eligible_person: false

- name: Case 2, not counted because of immigration status.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: UNDOCUMENTED
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
  output:
    ca_sf_caap_eligible_person: false

- name: Case 3, not counted on both grounds (SSI and immigration status).
  period: 2025-01
  input:
    people:
      person1:
        ssi: 600
        immigration_status: UNDOCUMENTED
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
  output:
    ca_sf_caap_eligible_person: false

- name: Case 4, counted (no SSI and qualified immigration status).
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
  output:
    ca_sf_caap_eligible_person: true
