# A person counts toward the CAAP budget unit if they are not on SSI or CAPI AND
# have a qualified immigration status (SEC. 20.7-6, 20.7-14). ssi and CAPI
# eligibility are computed, so we drive them from underlying inputs (age 70 ->
# ssi > 0; aged non-qualified-noncitizen -> CAPI-eligible) rather than setting
# them directly.
- name: Case 1, not counted because the person receives SSI.
  period: 2025-01
  input:
    people:
      person1:
        # Age 70 with no income -> the system computes ssi > 0.
        age: 70
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
  output:
    ca_sf_caap_eligible_person: false

- name: Case 2, not counted because of immigration status.
  period: 2025-01
  input:
    people:
      person1:
        immigration_status: UNDOCUMENTED
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
  output:
    ca_sf_caap_eligible_person: false

- name: Case 3, aged undocumented adult is not counted (immigration ground).
  period: 2025-01
  input:
    people:
      person1:
        # Age 70 + undocumented: undocumented immigrants are not SSI-eligible
        # (ssi stays 0), so the failing branch here is the immigration-status
        # gate. Such applicants are served by CAPI, not CAAP.
        age: 70
        immigration_status: UNDOCUMENTED
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
  output:
    ca_sf_caap_eligible_person: false

- name: Case 4, counted (no SSI and qualified immigration status).
  period: 2025-01
  input:
    people:
      person1:
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
  output:
    ca_sf_caap_eligible_person: true

- name: Case 5, aged DACA adult is not counted (CAPI ground).
  period: 2025-01
  input:
    people:
      person1:
        # Age 70 + DACA: passes the CAAP immigration whitelist and is not
        # SSI-eligible (ssi stays 0), but is categorically eligible for CAPI
        # (aged non-qualified-noncitizen), so the per-person CAPI bar excludes
        # the person. This isolates the CAPI ground from SSI and immigration.
        age: 70
        immigration_status: DACA
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
  output:
    ca_sf_caap_eligible_person: false

- name: Case 6, mixed unit drops the CAPI member per person and excludes their income.
  period: 2025-01
  input:
    people:
      person1:
        # Aged DACA adult is CAPI-eligible (aged non-qualified-noncitizen), so is
        # barred from the CAAP budget unit per person; their unearned income must
        # not count toward the unit.
        age: 70
        immigration_status: DACA
        social_security: 6_000  # $500/month, excluded because person1 is dropped
      person2:
        age: 40
        immigration_status: CITIZEN
    households:
      household:
        members: [person1, person2]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    # Only person2 (citizen) counts; person1 (CAPI) is dropped per person, and
    # person1's $500/month Social Security is excluded from countable income.
    ca_sf_caap_budget_unit_size: 1
    ca_sf_caap_countable_income: 0
