# 5-tier marginal disregard on MONTHLY earned income, recipients only
# (SEC. 20.7-21(j)): all of first $200, then 2/3 of next $150, 1/2 of next
# $150, 1/3 of next $150, 1/5 of next $150, remainder dollar-for-dollar (no
# disregard). Caps at $455. Applicants get $0. employment_income is annual
# (YEAR) and read monthly in a MONTH-period test.
- name: Case 1, recipient with $200/month earnings disregards all of it.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        employment_income: 2_400  # 200/month
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        ca_sf_caap_is_recipient: true
  output:
    # All of the first $200 disregarded.
    ca_sf_caap_earned_income_disregard: 200

- name: Case 2, recipient with $350/month earnings.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        employment_income: 4_200  # 350/month
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        ca_sf_caap_is_recipient: true
  output:
    # 200 (first 200) + 2/3 * 150 (next 150) = 200 + 100 = 300.
    ca_sf_caap_earned_income_disregard: 300

- name: Case 3, recipient with $800/month earnings hits the $455 cap.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        employment_income: 9_600  # 800/month
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        ca_sf_caap_is_recipient: true
  output:
    # 200 + 2/3*150 + 1/2*150 + 1/3*150 + 1/5*150
    # = 200 + 100 + 75 + 50 + 30 = 455 (maximum disregard).
    ca_sf_caap_earned_income_disregard: 455

- name: Case 4, recipient with $1,000/month earnings stays at the $455 cap.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        employment_income: 12_000  # 1,000/month
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        ca_sf_caap_is_recipient: true
  output:
    # Earnings above $800/month are deducted dollar-for-dollar (0 disregard),
    # so the disregard stays capped at $455.
    ca_sf_caap_earned_income_disregard: 455

- name: Case 5, applicant (not a recipient) receives no disregard.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        employment_income: 9_600  # 800/month
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        ca_sf_caap_is_recipient: false
  output:
    ca_sf_caap_earned_income_disregard: 0

- name: Case 6, recipient with $500/month earnings (third tier edge).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        employment_income: 6_000  # 500/month
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        ca_sf_caap_is_recipient: true
  output:
    # 200 + 2/3*150 + 1/2*150 = 200 + 100 + 75 = 375.
    ca_sf_caap_earned_income_disregard: 375

- name: Case 7, recipient with $650/month earnings (fourth tier edge).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        employment_income: 7_800  # 650/month
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        ca_sf_caap_is_recipient: true
  output:
    # 200 + 2/3*150 + 1/2*150 + 1/3*150 = 200 + 100 + 75 + 50 = 425.
    ca_sf_caap_earned_income_disregard: 425
