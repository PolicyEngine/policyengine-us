# Income-eligible if countable income is strictly below the max grant
# (single GA max = $578/month). social_security is unearned (no disregard), so
# countable income equals the monthly social_security amount here. Inputs are
# annual (YEAR variable) and read monthly in a MONTH-period test.
- name: Case 1, countable income just below the max grant.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
        social_security: 6_924  # 577/month
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
  output:
    ca_sf_caap_countable_income: 577
    ca_sf_caap_max_grant: 578
    ca_sf_caap_income_eligible: true

- name: Case 2, countable income exactly at the max grant is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
        social_security: 6_936  # 578/month
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
  output:
    ca_sf_caap_countable_income: 578
    ca_sf_caap_max_grant: 578
    ca_sf_caap_income_eligible: false

- name: Case 3, countable income above the max grant is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
        social_security: 12_000  # 1,000/month
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
  output:
    ca_sf_caap_countable_income: 1_000
    ca_sf_caap_max_grant: 578
    ca_sf_caap_income_eligible: false

- name: Case 4, countable income a cent below the max grant is eligible.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
        social_security: 6_935.88  # 577.99/month, $0.01 below the $578 grant
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
  output:
    # Strict "<" boundary: 577.99 < 578 -> eligible.
    ca_sf_caap_income_eligible: true

- name: Case 5, countable income a cent above the max grant is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
        social_security: 6_936.12  # 578.01/month, $0.01 above the $578 grant
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
  output:
    # Strict "<" boundary: 578.01 is not < 578 -> ineligible.
    ca_sf_caap_income_eligible: false
