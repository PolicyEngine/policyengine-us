# A person is ineligible if they receive SSI OR lack a qualified immigration
# status (SEC. 20.7-14). ssi is MONTH-defined, so input is the monthly amount.
- name: Case 1, ineligible because the person receives SSI.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 600
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
  output:
    ca_sf_caap_ineligible_person: true

- name: Case 2, ineligible because of immigration status.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: UNDOCUMENTED
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
  output:
    ca_sf_caap_ineligible_person: true

- name: Case 3, ineligible on both grounds (SSI and immigration status).
  period: 2025-01
  input:
    people:
      person1:
        ssi: 600
        immigration_status: UNDOCUMENTED
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
  output:
    ca_sf_caap_ineligible_person: true

- name: Case 4, not ineligible (no SSI and qualified immigration status).
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
  output:
    ca_sf_caap_ineligible_person: false
