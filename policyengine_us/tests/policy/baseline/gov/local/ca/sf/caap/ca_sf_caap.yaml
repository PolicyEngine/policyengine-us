# Benefit = max(max_grant - max(countable_income, 0), 0), topped up to the $59
# floor only when in-kind value is present (SEC. 20.7-21 / 20.7-24).
- name: Case 1, fully eligible single adult with zero income gets the full grant.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        ssi: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
  output:
    # Fill-the-gap: 578 - 0 = 578. No in-kind, so no floor adjustment.
    ca_sf_caap: 578

- name: Case 2, in-kind value at or above the grant pays the $59 floor.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        ssi: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
        ca_sf_caap_housing_provided_in_kind: true
        ca_sf_caap_utilities_provided_in_kind: true
        ca_sf_caap_food_provided_in_kind: true
        ca_sf_caap_clothing_provided_in_kind: true
  output:
    # In-kind = 812. grant_after_income = 578 (no cash income); cash_grant =
    # max(578 - 812, 0) = 0. In-kind present and cash_grant < $59, so the $59
    # floor pays.
    ca_sf_caap_income_in_kind: 812
    ca_sf_caap: 59

- name: Case 3, negative self-employment does not inflate the benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        ssi: 0
        immigration_status: CITIZEN
        self_employment_income: -120_000  # -$10,000/month net loss
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
  output:
    # Net earned floored at 0, so countable income is 0; benefit caps at the
    # $578 max grant (NOT 578 + 10,000).
    ca_sf_caap_countable_income: 0
    ca_sf_caap: 578

- name: Case 4, cash income just below the grant fills the small gap.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        ssi: 0
        immigration_status: CITIZEN
        social_security: 6_840  # 570/month unearned
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
  output:
    # Fill-the-gap: 578 - 570 = 8.
    ca_sf_caap_countable_income: 570
    ca_sf_caap: 8

- name: Case 5, cash income exactly at the grant yields no benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        ssi: 0
        immigration_status: CITIZEN
        social_security: 6_936  # 578/month unearned
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
  output:
    # Income-eligibility is strict "<": 578 is not < 578 -> ineligible -> $0.
    ca_sf_caap_countable_income: 578
    ca_sf_caap_income_eligible: false
    ca_sf_caap: 0

- name: Case 6, very high cash income yields no benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        ssi: 0
        immigration_status: CITIZEN
        social_security: 120_000  # 10,000/month unearned
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
  output:
    # Income well above the grant -> income-ineligible -> $0.
    ca_sf_caap_income_eligible: false
    ca_sf_caap: 0

- name: Case 7, in-kind below the floor trigger leaves cash above $59 (no floor).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        ssi: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
        ca_sf_caap_housing_provided_in_kind: true
        ca_sf_caap_utilities_provided_in_kind: true
  output:
    # In-kind = 422 + 89 = 511. cash_grant = 578 - 511 = 67, which is at or
    # above $59, so the floor does NOT apply and the full $67 cash is paid.
    ca_sf_caap_income_in_kind: 511
    ca_sf_caap: 67

- name: Case 8, in-kind just past the grant triggers the $59 floor.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        ssi: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
        ca_sf_caap_housing_provided_in_kind: true
        ca_sf_caap_utilities_provided_in_kind: true
        ca_sf_caap_clothing_provided_in_kind: true
  output:
    # In-kind = 422 + 89 + 70 = 581 > the $578 grant. cash_grant = max(578 -
    # 581, 0) = 0 < $59, so the $59 floor pays.
    ca_sf_caap_income_in_kind: 581
    ca_sf_caap: 59
