# Eligible = age_eligible & property_eligible & income_eligible &
# (budget_unit_size > 0). Each case fails exactly one branch (except Case 1).
- name: Case 1, fully eligible single adult.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
  output:
    ca_sf_caap_eligible: true

- name: Case 2, fails the age requirement (child in unit).
  period: 2025-01
  input:
    people:
      person1:
        age: 40
        immigration_status: CITIZEN
      person2:
        age: 5
        immigration_status: CITIZEN
    households:
      household:
        members: [person1, person2]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 0
  output:
    ca_sf_caap_eligible: false

- name: Case 3, fails the personal property limit.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 10_000
  output:
    ca_sf_caap_eligible: false

- name: Case 4, fails the income test.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
        social_security: 12_000  # 1,000/month > 578 max grant
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
  output:
    ca_sf_caap_eligible: false

- name: Case 5, no eligible person in the unit (SSI recipient).
  period: 2025-01
  input:
    people:
      person1:
        # Age 70 with no income -> the system computes ssi > 0, so the only
        # member is an SSI recipient -> budget unit size 0 -> ineligible.
        age: 70
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
  output:
    ca_sf_caap_eligible: false

- name: Case 6, all-adult unit barred solely by the unit-level CalWORKs bar.
  period: 2025-01
  input:
    people:
      person1:
        age: 40
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
        # CalWORKs (ca_tanf) normally requires a child, which would also fail the
        # adult-only age gate and confound this test. Set ca_tanf directly to
        # isolate the unit-level CalWORKs bar (SEC. 20.7-6; Manual 91-2): the
        # adult passes age, property, income, and budget-unit, so the only
        # failing branch is not_on_calworks.
        ca_tanf: 6_000
  output:
    ca_sf_caap_age_eligible: true
    ca_sf_caap_personal_property_eligible: true
    ca_sf_caap_income_eligible: true
    ca_sf_caap_budget_unit_size: 1
    ca_sf_caap_eligible: false
