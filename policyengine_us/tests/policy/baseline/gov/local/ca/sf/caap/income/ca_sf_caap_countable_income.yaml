# Countable income = sum of eligible persons' (net earned + unearned). This is
# CASH income only; in-kind value is deducted from the grant in the benefit
# formula, not counted here (SEC. 20.7-10 vs 20.7-22(c)). Ineligible persons'
# income (e.g. SSI recipients) is excluded.
- name: Case 1, recipient with earned and unearned income, no in-kind.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
        employment_income: 9_600  # 800/month earned
        social_security: 1_200  # 100/month unearned
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        ca_sf_caap_is_recipient: true
  output:
    # Net earned: 800 - 455 = 345. Unearned: 100. Total: 445.
    ca_sf_caap_countable_income: 445

- name: Case 2, SSI recipient's income is excluded from the unit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
        social_security: 1_200  # 100/month unearned
      person2:
        ssi: 600
        immigration_status: CITIZEN
        social_security: 6_000  # 500/month, but excluded (SSI recipient)
    households:
      household:
        members: [person1, person2]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2]
        ca_sf_caap_is_recipient: false
  output:
    # Only person1's $100 counts; person2 (SSI) is excluded entirely.
    ca_sf_caap_countable_income: 100

- name: Case 3, in-kind housing does not count as cash income.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        ca_sf_caap_housing_provided_in_kind: true
  output:
    # In-kind housing (size 1) = $422, but countable cash income stays 0
    # (in-kind is deducted from the grant, not the income test).
    ca_sf_caap_income_in_kind: 422
    ca_sf_caap_countable_income: 0

- name: Case 4, negative net self-employment makes countable income negative.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
        self_employment_income: -12_000  # -1,000/month net loss
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
        ca_sf_caap_is_recipient: false
  output:
    # Applicant: no disregard. net_earned = max(-1000 - 0, 0) = 0.
    # (max_ floors per-person net earned at 0, so countable is 0, not negative.)
    ca_sf_caap_countable_income: 0

- name: Case 5, no income at all yields zero countable income.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
  output:
    ca_sf_caap_countable_income: 0

- name: Case 6, very high unearned income flows through fully (no disregard).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
        social_security: 120_000  # 10,000/month unearned
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
  output:
    # Unearned income has no disregard, so all $10,000/month is countable.
    ca_sf_caap_countable_income: 10_000
