# Max grant is keyed by budget unit size (GA table, SEC. 20.7-21(a)).
# Size 1 = $578, size 2 = $1,036.
- name: Case 1, single eligible adult uses the size-1 grant.
  period: 2025-01
  input:
    people:
      person1:
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
  output:
    ca_sf_caap_max_grant: 578

- name: Case 2, two eligible adults use the size-2 grant.
  period: 2025-01
  input:
    people:
      person1:
        immigration_status: CITIZEN
      person2:
        immigration_status: CITIZEN
    households:
      household:
        members: [person1, person2]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    ca_sf_caap_max_grant: 1_036

- name: Case 3, two-person unit with one SSI recipient drops to the size-1 grant.
  period: 2025-01
  input:
    people:
      person1:
        immigration_status: CITIZEN
      person2:
        # Age 70 with no income -> the system computes ssi > 0, so person2 is an
        # SSI recipient and is excluded from the CAAP budget unit.
        age: 70
        immigration_status: CITIZEN
    households:
      household:
        members: [person1, person2]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    # Budget unit size = 1 (SSI recipient removed), so the size-1 grant applies.
    ca_sf_caap_budget_unit_size: 1
    ca_sf_caap_max_grant: 578

- name: Case 4, three eligible adults use the size-3 grant.
  period: 2025-01
  input:
    people:
      person1: {immigration_status: CITIZEN}
      person2: {immigration_status: CITIZEN}
      person3: {immigration_status: CITIZEN}
    households:
      household:
        members: [person1, person2, person3]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
  output:
    ca_sf_caap_max_grant: 1_166

- name: Case 5, ten eligible adults use the largest charted grant.
  period: 2025-01
  input:
    people:
      person1: {immigration_status: CITIZEN}
      person2: {immigration_status: CITIZEN}
      person3: {immigration_status: CITIZEN}
      person4: {immigration_status: CITIZEN}
      person5: {immigration_status: CITIZEN}
      person6: {immigration_status: CITIZEN}
      person7: {immigration_status: CITIZEN}
      person8: {immigration_status: CITIZEN}
      person9: {immigration_status: CITIZEN}
      person10: {immigration_status: CITIZEN}
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10]
  output:
    ca_sf_caap_max_grant: 2_465

- name: Case 6, eleven eligible adults add $35 per person beyond ten.
  period: 2025-01
  input:
    people:
      person1: {immigration_status: CITIZEN}
      person2: {immigration_status: CITIZEN}
      person3: {immigration_status: CITIZEN}
      person4: {immigration_status: CITIZEN}
      person5: {immigration_status: CITIZEN}
      person6: {immigration_status: CITIZEN}
      person7: {immigration_status: CITIZEN}
      person8: {immigration_status: CITIZEN}
      person9: {immigration_status: CITIZEN}
      person10: {immigration_status: CITIZEN}
      person11: {immigration_status: CITIZEN}
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10, person11]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10, person11]
  output:
    # Size-10 grant ($2,465) + $35 for the 11th person = $2,500.
    ca_sf_caap_max_grant: 2_500

# PAES tier (SEC. 20.7-21(b)) — triggered by is_in_work_program. Single = $714.
- name: Case 7, single PAES adult uses the higher PAES size-1 grant.
  period: 2025-01
  input:
    people:
      person1:
        immigration_status: CITIZEN
        is_in_work_program: true
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
  output:
    ca_sf_caap_max_grant: 714

- name: Case 8, two-adult unit with one in a work program uses the PAES size-2 grant.
  period: 2025-01
  input:
    people:
      person1:
        immigration_status: CITIZEN
        is_in_work_program: true
      person2:
        immigration_status: CITIZEN
    households:
      household:
        members: [person1, person2]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    ca_sf_caap_max_grant: 1_172

- name: Case 9, eleven PAES adults add $35 per person beyond ten to the PAES table.
  period: 2025-01
  input:
    people:
      person1: {immigration_status: CITIZEN, is_in_work_program: true}
      person2: {immigration_status: CITIZEN}
      person3: {immigration_status: CITIZEN}
      person4: {immigration_status: CITIZEN}
      person5: {immigration_status: CITIZEN}
      person6: {immigration_status: CITIZEN}
      person7: {immigration_status: CITIZEN}
      person8: {immigration_status: CITIZEN}
      person9: {immigration_status: CITIZEN}
      person10: {immigration_status: CITIZEN}
      person11: {immigration_status: CITIZEN}
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10, person11]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10, person11]
  output:
    # PAES size-10 grant ($3,107) + $35 for the 11th person = $3,142.
    ca_sf_caap_max_grant: 3_142

- name: Case 10, work program on an ineligible member does not trigger PAES.
  period: 2025-01
  input:
    people:
      person1:
        immigration_status: CITIZEN
      person2:
        # Undocumented (ineligible, excluded from the budget unit) but flagged
        # in a work program. The PAES table must NOT apply to the eligible
        # one-person unit; the work-program check is masked to eligible members.
        immigration_status: UNDOCUMENTED
        is_in_work_program: true
    households:
      household:
        members: [person1, person2]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    ca_sf_caap_budget_unit_size: 1
    # GA size-1 grant ($578), NOT the PAES size-1 grant ($714).
    ca_sf_caap_max_grant: 578
