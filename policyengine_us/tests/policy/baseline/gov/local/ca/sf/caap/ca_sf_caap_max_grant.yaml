# Max grant is keyed by budget unit size (GA table, SEC. 20.7-21(a)).
# Size 1 = $578, size 2 = $1,036.
- name: Case 1, single eligible adult uses the size-1 grant.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1]
  output:
    ca_sf_caap_max_grant: 578

- name: Case 2, two eligible adults use the size-2 grant.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
      person2:
        ssi: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1, person2]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    ca_sf_caap_max_grant: 1_036

- name: Case 3, two-person unit with one SSI recipient drops to the size-1 grant.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
      person2:
        ssi: 600
        immigration_status: CITIZEN
    households:
      household:
        members: [person1, person2]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    # Budget unit size = 1 (SSI recipient removed), so the size-1 grant applies.
    ca_sf_caap_budget_unit_size: 1
    ca_sf_caap_max_grant: 578

- name: Case 4, three eligible adults use the size-3 grant.
  period: 2025-01
  input:
    people:
      person1: {ssi: 0, immigration_status: CITIZEN}
      person2: {ssi: 0, immigration_status: CITIZEN}
      person3: {ssi: 0, immigration_status: CITIZEN}
    households:
      household:
        members: [person1, person2, person3]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
  output:
    ca_sf_caap_max_grant: 1_166

- name: Case 5, ten eligible adults use the largest charted grant.
  period: 2025-01
  input:
    people:
      person1: {ssi: 0, immigration_status: CITIZEN}
      person2: {ssi: 0, immigration_status: CITIZEN}
      person3: {ssi: 0, immigration_status: CITIZEN}
      person4: {ssi: 0, immigration_status: CITIZEN}
      person5: {ssi: 0, immigration_status: CITIZEN}
      person6: {ssi: 0, immigration_status: CITIZEN}
      person7: {ssi: 0, immigration_status: CITIZEN}
      person8: {ssi: 0, immigration_status: CITIZEN}
      person9: {ssi: 0, immigration_status: CITIZEN}
      person10: {ssi: 0, immigration_status: CITIZEN}
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10]
  output:
    ca_sf_caap_max_grant: 2_465

- name: Case 6, eleven eligible adults add $35 per person beyond ten.
  period: 2025-01
  input:
    people:
      person1: {ssi: 0, immigration_status: CITIZEN}
      person2: {ssi: 0, immigration_status: CITIZEN}
      person3: {ssi: 0, immigration_status: CITIZEN}
      person4: {ssi: 0, immigration_status: CITIZEN}
      person5: {ssi: 0, immigration_status: CITIZEN}
      person6: {ssi: 0, immigration_status: CITIZEN}
      person7: {ssi: 0, immigration_status: CITIZEN}
      person8: {ssi: 0, immigration_status: CITIZEN}
      person9: {ssi: 0, immigration_status: CITIZEN}
      person10: {ssi: 0, immigration_status: CITIZEN}
      person11: {ssi: 0, immigration_status: CITIZEN}
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10, person11]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10, person11]
  output:
    # Size-10 grant ($2,465) + $35 for the 11th person = $2,500.
    ca_sf_caap_max_grant: 2_500
