# Budget unit size = SPM unit size minus the count of ineligible persons
# (SSI recipients / disqualified immigration status).
- name: Case 1, two eligible adults.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
      person2:
        ssi: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1, person2]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    ca_sf_caap_budget_unit_size: 2

- name: Case 2, two-person unit with one SSI recipient.
  period: 2025-01
  input:
    people:
      person1:
        ssi: 0
        immigration_status: CITIZEN
      person2:
        ssi: 600
        immigration_status: CITIZEN
    households:
      household:
        members: [person1, person2]
        county_str: SAN_FRANCISCO_COUNTY_CA
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    ca_sf_caap_budget_unit_size: 1

