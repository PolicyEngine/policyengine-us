- name: Case 1, independent living unit with no income receives full standard.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
        is_in_work_program: true
    households:
      household:
        members: [person1]
        in_smc: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_smc_general_assistance_living_arrangement: INDEPENDENT_LIVING
  output:
    ca_smc_general_assistance_payment_standard: 732
    ca_smc_general_assistance_eligible: true
    ca_smc_general_assistance: 732

- name: Case 2, independent living unit with earned income receives reduced benefit after the 20 percent deduction.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 2_400
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        in_smc: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_smc_general_assistance_living_arrangement: INDEPENDENT_LIVING
  output:
    ca_smc_general_assistance_countable_income: 160
    ca_smc_general_assistance: 572

- name: Case 3, unearned income above independent living standard makes unit ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        unemployment_compensation: 8_796
        immigration_status: CITIZEN
        is_in_work_program: true
    households:
      household:
        members: [person1]
        in_smc: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_smc_general_assistance_living_arrangement: INDEPENDENT_LIVING
  output:
    ca_smc_general_assistance_countable_income: 733
    ca_smc_general_assistance_income_eligible: false
    ca_smc_general_assistance: 0

