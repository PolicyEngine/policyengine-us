      household:
        members: [person1]
        in_smc: true
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 1_464
        ca_smc_general_assistance_living_arrangement: INDEPENDENT_LIVING
  output:
    ca_smc_general_assistance_property_eligible: false
    ca_smc_general_assistance: 0

