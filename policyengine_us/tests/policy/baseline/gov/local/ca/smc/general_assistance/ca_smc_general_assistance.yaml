- name: Case 5, two eligible adults each receive their own benefit at the SPM unit level.
  period: 2026-01
  input:
    people:
      person1:
        ca_smc_general_assistance_eligible_person: true
      person2:
        ca_smc_general_assistance_eligible_person: true
    households:
      household:
        members: [person1, person2]
        in_smc: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        ca_smc_general_assistance_eligible: true
        ca_smc_general_assistance_payment_standard: 732
        ca_smc_general_assistance_countable_income: 400
  output:
    ca_smc_general_assistance: 1_064
