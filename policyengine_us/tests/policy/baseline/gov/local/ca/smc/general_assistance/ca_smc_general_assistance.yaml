- name: Case 1, eligible single adult receives standard less countable income.
  period: 2026-01
  input:
    people:
      person1:
        ca_smc_general_assistance_eligible_person: true
    households:
      household:
        members: [person1]
        in_smc: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_smc_general_assistance_eligible: true
        ca_smc_general_assistance_payment_standard: 732
        ca_smc_general_assistance_countable_income: 200
  output:
    ca_smc_general_assistance: 532

- name: Case 2, benefit floors at zero when income exceeds standard.
  period: 2026-01
  input:
    people:
      person1:
        ca_smc_general_assistance_eligible_person: true
    households:
      household:
        members: [person1]
