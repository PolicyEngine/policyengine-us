- name: Case 1, income below payment standard is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
        is_in_work_program: true
    households:
      household:
        members: [person1]
        in_smc: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_smc_general_assistance_countable_income: 731
        ca_smc_general_assistance_payment_standard: 732
  output:
    ca_smc_general_assistance_income_eligible: true

