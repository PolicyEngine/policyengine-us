# Base amount = max(max grant - monthly net income, 0), for an eligible unit.
# Net income is YEAR-defined; the formula divides the annual value by 12.
- name: Single eligible with no income receives the full single grant
  period: 2026-01
  input:
    people:
      person1:
        ca_marin_general_relief_immigration_status_eligible_person: true
    families:
      family:
        members: [person1]
        is_married: false
    households:
      household:
        members: [person1]
        in_marin: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_marin_general_relief_eligible: true
        ca_marin_general_relief_net_income: 0
  output:
    ca_marin_general_relief_base_amount: 387  # 387 - 0

- name: Single eligible with income receives the grant minus monthly net income
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ca_marin_general_relief_immigration_status_eligible_person: true
    families:
      family:
        members: [person1]
        is_married: false
    households:
      household:
        members: [person1]
        in_marin: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_marin_general_relief_eligible: true
        ca_marin_general_relief_net_income: 1_200  # 100/month
  output:
    ca_marin_general_relief_base_amount: 287  # 387 - 100

- name: Married eligible couple with no income receives the full couple grant
  period: 2026-01
  input:
    people:
      person1:
        ca_marin_general_relief_immigration_status_eligible_person: true
      person2:
        ca_marin_general_relief_immigration_status_eligible_person: true
    families:
      family:
        members: [person1, person2]
        is_married: true
    households:
      household:
        members: [person1, person2]
        in_marin: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        ca_marin_general_relief_eligible: true
        ca_marin_general_relief_net_income: 0
  output:
    ca_marin_general_relief_base_amount: 636  # 636 - 0

- name: Base amount floors at zero when net income exceeds the grant
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ca_marin_general_relief_immigration_status_eligible_person: true
    families:
      family:
        members: [person1]
        is_married: false
    households:
      household:
        members: [person1]
        in_marin: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_marin_general_relief_eligible: true
        ca_marin_general_relief_net_income: 6_000  # 500/month > 387
  output:
    ca_marin_general_relief_base_amount: 0  # max(387 - 500, 0)
