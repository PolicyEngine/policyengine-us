# End-to-end Marin County General Relief scenarios (post-2025-07-01 rules).
# Veterans benefits are used for income because they are non-taxable and not
# subject to payroll tax, so net income equals gross income (no mandatory
# withholdings) and the net-income math is exact.

- name: Case 1, single eligible adult with low income receives a partial grant.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        immigration_status: CITIZEN
        veterans_benefits: 1_200  # 100/month
        ssi: 0
    households:
      household:
        members: [person1]
        county_str: MARIN_COUNTY_CA
        state_code_str: CA
    tax_units:
      tax_unit:
        members: [person1]
    families:
      family:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
  output:
    # Gross = 1,200/yr; no withholdings -> net = 1,200/yr = 100/month.
    # Single grant 387 - 100 = 287.
    ca_marin_general_relief_eligible: true
    ca_marin_general_relief_max_grant: 387
    ca_marin_general_relief_base_amount: 287
    ca_marin_general_relief: 287

- name: Case 2, married eligible couple with no income receives the couple grant.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 45
        immigration_status: CITIZEN
        ssi: 0
      person2:
        age: 43
        immigration_status: LEGAL_PERMANENT_RESIDENT
        ssi: 0
    households:
      household:
        members: [person1, person2]
        county_str: MARIN_COUNTY_CA
        state_code_str: CA
    tax_units:
      tax_unit:
        members: [person1, person2]
        tax_unit_is_joint: true
    families:
      family:
        members: [person1, person2]
        is_married: true
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    # Couple grant is 636 (NOT 2 x 387 = 774); no income -> full grant.
    ca_marin_general_relief_eligible: true
    ca_marin_general_relief_max_grant: 636
    ca_marin_general_relief: 636

