    spm_units:
      spm_unit:
        members: [person1]
  output:
    # Net = 4,644/yr = 387/month == grant 387 -> income-eligible (inclusive).
    # Benefit floors at 0: max(387 - 387, 0) = 0.
    ca_marin_general_relief_income_eligible: true
    ca_marin_general_relief_eligible: true
