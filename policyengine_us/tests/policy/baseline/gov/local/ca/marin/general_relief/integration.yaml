        members: [person1]
        county_str: SHASTA_COUNTY_CA
        state_code_str: CA
    tax_units:
      tax_unit:
        members: [person1]
    families:
      family:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
  output:
    # Same person who would qualify in Marin (citizen, 30, no income/assets) but
    # located in Shasta County. `defined_for = in_marin` zeroes the benefit and
    # eligibility end-to-end for any non-Marin county.
    in_marin: false
    ca_marin_general_relief_eligible: false
    ca_marin_general_relief: 0

