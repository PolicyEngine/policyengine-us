- name: Case 21, undocumented applicant with a citizen child is ineligible.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        immigration_status: UNDOCUMENTED
        ssi: 0
      person2:
        age: 8
        immigration_status: CITIZEN
        ssi: 0
    households:
      household:
        members: [person1, person2]
        county_str: MARIN_COUNTY_CA
        state_code_str: CA
    tax_units:
      tax_unit:
        members: [person1, person2]
    families:
      family:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    # Section II.E ties citizenship to the Applicant/Recipient (head or spouse).
    # The citizen child does not confer eligibility on the undocumented
