# Qualified immigration statuses: citizens, LPRs, and humanitarian statuses
# approximating PRUCOL are eligible; UNDOCUMENTED, DACA, and TPS are not.
- name: Citizens are eligible
  period: 2026-01
  input:
    in_marin: true
    immigration_status: CITIZEN
  output:
    ca_marin_general_relief_immigration_status_eligible_person: true

- name: Legal permanent residents are eligible
  period: 2026-01
  input:
    in_marin: true
    immigration_status: LEGAL_PERMANENT_RESIDENT
  output:
    ca_marin_general_relief_immigration_status_eligible_person: true

- name: Refugees are eligible
  period: 2026-01
  input:
    in_marin: true
    immigration_status: REFUGEE
  output:
    ca_marin_general_relief_immigration_status_eligible_person: true

- name: Asylees are eligible
  period: 2026-01
  input:
    in_marin: true
    immigration_status: ASYLEE
  output:
    ca_marin_general_relief_immigration_status_eligible_person: true

- name: Undocumented immigrants are ineligible
  period: 2026-01
  input:
    in_marin: true
    immigration_status: UNDOCUMENTED
  output:
    ca_marin_general_relief_immigration_status_eligible_person: false

- name: DACA recipients are ineligible
  period: 2026-01
  input:
    in_marin: true
    immigration_status: DACA
  output:
    ca_marin_general_relief_immigration_status_eligible_person: false

- name: TPS holders are ineligible
  period: 2026-01
  input:
    in_marin: true
    immigration_status: TPS
  output:
    ca_marin_general_relief_immigration_status_eligible_person: false

# Section II.E ties the citizenship requirement to the Applicant/Recipient, so a
# qualifying status only counts for the head or spouse. A citizen dependent
# child does not satisfy the requirement on behalf of an undocumented applicant.
- name: Citizen dependent child does not satisfy the applicant requirement
  period: 2026-01
  input:
    people:
      person1:
        age: 40
        immigration_status: UNDOCUMENTED
      person2:
        age: 10
        immigration_status: CITIZEN
    households:
      household:
        members: [person1, person2]
        in_marin: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    # person1 (undocumented applicant) -> false; person2 (citizen child, not
    # head or spouse) -> false.
    ca_marin_general_relief_immigration_status_eligible_person: [false, false]
