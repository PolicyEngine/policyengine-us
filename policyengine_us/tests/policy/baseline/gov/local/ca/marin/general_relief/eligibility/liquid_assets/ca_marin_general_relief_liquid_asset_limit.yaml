# Liquid asset limit: pre-reform $200 single and $400 married couple;
# post-reform $400 single and $800 married couple (effective 2025-07-01).
- name: Pre-reform single filer limit is 200
  period: 2025
  input:
    people:
      person1: {}
    families:
      family:
        members: [person1]
        is_married: false
    households:
      household:
        members: [person1]
        in_marin: true
    spm_units:
      spm_unit:
        members: [person1]
  output:
    ca_marin_general_relief_liquid_asset_limit: 200

- name: Pre-reform married couple limit is 400
  period: 2025
  input:
    people:
      person1: {}
      person2: {}
    families:
      family:
        members: [person1, person2]
        is_married: true
    households:
      household:
        members: [person1, person2]
        in_marin: true
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    ca_marin_general_relief_liquid_asset_limit: 400

