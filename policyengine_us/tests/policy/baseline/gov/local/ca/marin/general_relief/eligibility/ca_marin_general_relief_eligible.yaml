- name: SSI recipient is ineligible even when all sub-tests pass
  period: 2026-01
  input:
    people:
      person1:
        ssi: 500
        ca_marin_general_relief_immigration_status_eligible_person: true
    households:
      household:
        members: [person1]
        in_marin: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_marin_general_relief_age_eligible: true
        ca_marin_general_relief_liquid_asset_eligible: true
        ca_marin_general_relief_personal_property_eligible: true
        ca_marin_general_relief_income_eligible: true
  output:
    ca_marin_general_relief_eligible: false

- name: Unit with a dependent child is ineligible
  period: 2026-01
  input:
    people:
      person1:
        age: 40
        ca_marin_general_relief_immigration_status_eligible_person: true
      person2:
        age: 5
    households:
      household:
        members: [person1, person2]
        in_marin: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        ca_marin_general_relief_age_eligible: true
        ca_marin_general_relief_liquid_asset_eligible: true
        ca_marin_general_relief_personal_property_eligible: true
        ca_marin_general_relief_income_eligible: true
  output:
    # person2 is a dependent child (age 5, tax-unit dependent), so the unit is
    # ineligible even though every other sub-check passes.
    ca_marin_general_relief_eligible: false
