# Top-level eligibility ANDs all sub-tests and excludes SSI recipients.
# Immigration eligibility is the per-person check (head/spouse), aggregated with
# any() inside the top-level formula, so it is provided on the person.
- name: All requirements met is eligible
  period: 2026-01
  input:
    people:
      person1:
        ssi: 0
        ca_marin_general_relief_immigration_status_eligible_person: true
    households:
      household:
        members: [person1]
        in_marin: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_marin_general_relief_age_eligible: true
        ca_marin_general_relief_liquid_asset_eligible: true
        ca_marin_general_relief_personal_property_eligible: true
        ca_marin_general_relief_income_eligible: true
  output:
    ca_marin_general_relief_eligible: true

- name: Age ineligible fails
  period: 2026-01
  input:
    people:
      person1:
        ssi: 0
        ca_marin_general_relief_immigration_status_eligible_person: true
    households:
      household:
        members: [person1]
        in_marin: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_marin_general_relief_age_eligible: false
        ca_marin_general_relief_liquid_asset_eligible: true
        ca_marin_general_relief_personal_property_eligible: true
        ca_marin_general_relief_income_eligible: true
  output:
    ca_marin_general_relief_eligible: false

