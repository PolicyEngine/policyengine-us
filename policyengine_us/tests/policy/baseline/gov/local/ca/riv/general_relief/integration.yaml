- name: Case 1, household of 2 with no income. 
  period: 2024-01
  input: 
    people:
      person1:
        age: 30
        employment_income: 0
        ssi: 0
      person2:
        age: 65
        employment_income: 0
        ssi: 0
        is_incapable_of_self_care: true
    households:
      household:
        members: [person1, person2]
        in_riv: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        ca_tanf: 0
        housing_cost: 300 * 12
  output:
    ca_riv_general_relief_eligible: true
    ca_riv_general_relief: 438.5 
    # 436 + 30/12 
    ## $30 annual special needs amount

- name: Case 2, household of 2 with $500 monthly income. 
  period: 2024-01
  input: 
    people:
      person1:
        age: 30
        employment_income: 500 * 12
        ssi: 0
      person2:
        age: 65
        employment_income: 0
        ssi: 0
    households:
      household:
        members: [person1, person2]
        in_riv: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        ca_tanf: 0
        housing_cost: 300 * 12
  output:
    employee_social_security_tax: [31, 0]
    ca_riv_general_relief_earned_income_deductions: [31, 0]
    ca_riv_general_relief_countable_income: 469 # 500 - 31
    ca_riv_general_relief_needs_standards: 436
    ca_riv_general_relief_income_eligible: false 

