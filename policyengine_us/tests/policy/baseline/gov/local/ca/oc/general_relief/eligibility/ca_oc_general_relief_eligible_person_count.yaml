# eligible_person_count counts only eligible adults; children and members on
# other cash assistance or with non-qualified immigration are excluded.
- name: A child is excluded from the count.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000  # earnings high enough to avoid CalWORKs
      person2:
        age: 35
        employment_income: 30_000
      person3:
        age: 10
    households:
      household:
        members: [person1, person2, person3]
        in_oc: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
  output:
    # Two eligible adults; the child does not count.
    ca_oc_general_relief_eligible_person_count: 2

- name: An SSI recipient is excluded from the count.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 70  # aged with no income -> receives SSI -> excluded
    households:
      household:
        members: [person1, person2]
        in_oc: true
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    # Only the non-SSI adult counts.
    ca_oc_general_relief_eligible_person_count: 1

- name: A non-qualified immigrant is excluded from the count.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 40
        immigration_status: UNDOCUMENTED
    households:
      household:
        members: [person1, person2]
        in_oc: true
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    ca_oc_general_relief_eligible_person_count: 1
