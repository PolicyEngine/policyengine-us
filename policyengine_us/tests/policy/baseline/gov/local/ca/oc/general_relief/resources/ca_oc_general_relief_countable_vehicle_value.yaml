- name: Vehicle value below the exclusion has no countable value.
  period: 2026
  input:
    household_vehicles_value: 4_650
    in_oc: true
  output:
    ca_oc_general_relief_countable_vehicle_value: 0

- name: Vehicle value above the exclusion counts the excess.
  period: 2026
  input:
    household_vehicles_value: 4_800
    in_oc: true
  output:
    # 4,800 - 4,650 exclusion = 150.
    ca_oc_general_relief_countable_vehicle_value: 150
