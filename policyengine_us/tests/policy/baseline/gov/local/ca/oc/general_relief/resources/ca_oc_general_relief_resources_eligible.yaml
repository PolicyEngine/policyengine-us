- name: Resources at both limits meet the resource screen.
  period: 2026-01
  input:
    home_equity: 5_000
    personal_property: 1_000
    in_oc: true
  output:
    ca_oc_general_relief_resources_eligible: true

- name: Home equity above the primary-residence limit fails the resource screen.
  period: 2026-01
  input:
    home_equity: 5_001
    in_oc: true
  output:
    ca_oc_general_relief_resources_eligible: false

- name: Combined countable property above the property limit fails the resource screen.
  period: 2026-01
  input:
    personal_property: 500
    household_other_real_estate_equity: 501
    in_oc: true
  output:
    ca_oc_general_relief_countable_property: 1_001
    ca_oc_general_relief_resources_eligible: false
