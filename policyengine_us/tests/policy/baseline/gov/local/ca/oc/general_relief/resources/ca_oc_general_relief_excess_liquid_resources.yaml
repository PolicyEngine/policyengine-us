- name: Liquid resources at the disregard do not reduce an initial-month grant.
  period: 2026
  input:
    spm_unit_cash_assets: 50
    in_oc: true
  output:
    ca_oc_general_relief_excess_liquid_resources: 0

- name: Liquid resources above the disregard expose the amount available to reduce an initial-month grant.
  period: 2026
  input:
    spm_unit_cash_assets: 75
    in_oc: true
  output:
    ca_oc_general_relief_excess_liquid_resources: 25
