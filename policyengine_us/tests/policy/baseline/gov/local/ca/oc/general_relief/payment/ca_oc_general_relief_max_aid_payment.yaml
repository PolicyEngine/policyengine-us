- name: Shared living does not reduce the MAP for a unit receiving housing assistance.
  period: 2017-01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
        ssi: 0
    households:
      household:
        members: [person1]
        in_oc: true
        is_shared_living: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_tanf: 0
        receives_housing_assistance: true
  output:
    # Sec 80.3.a(3): the shared-housing reduction is waived for individuals in
    # Housing Support Programs (proxied by housing assistance receipt), so the
    # full size-1 MAP applies.
    ca_oc_general_relief_max_aid_payment: 355

