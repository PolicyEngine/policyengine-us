    people:
      person1:
        age: 30
        immigration_status: UNDOCUMENTED
    households:
      household:
        members: [person1]
        in_oc: true
    spm_units:
      spm_unit:
        members: [person1]
  output:
    # Eligible person count 0 clips to size 1.
    ca_oc_general_relief_eligible_person_count: 0
    ca_oc_general_relief_max_aid_payment: 350

