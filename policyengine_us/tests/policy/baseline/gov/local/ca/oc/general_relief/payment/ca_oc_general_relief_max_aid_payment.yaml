- name: Single economic unit in shared living has the MAP reduced 15%.
  period: 2017-01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
        ssi: 0
    households:
      household:
        members: [person1]
        in_oc: true
        is_shared_living: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_tanf: 0
  output:
    # EU size 1 in shared living: 355 x (1 - 0.15) = 301.75.
    ca_oc_general_relief_max_aid_payment: 301.75

- name: Two-person economic unit in shared living has the MAP reduced 15%.
  period: 2017-01
  input:
    people:
