- name: Single economic unit, no shared housing, April 2015 schedule.
  period: 2016-01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
        ssi: 0
    households:
      household:
        members: [person1]
        in_oc: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_tanf: 0
  output:
    # EU size 1, no shared housing, effective April 1, 2015.
    ca_oc_general_relief_max_aid_payment: 350

