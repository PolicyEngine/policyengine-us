- name: Case 1, single head with unearned income.
  period: 2024-01
  input:
    people:
      person1:
        is_tax_unit_head_or_spouse: true
        social_security: 1_200
    households:
      household:
        members: [person1]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1]
  absolute_error_margin: 0.1
  output:
    ca_scc_general_assistance_countable_income: 100

- name: Case 2, head and spouse both have unearned income, sums across SPMUnit.
  period: 2024-01
  input:
    people:
      person1:
        is_tax_unit_head_or_spouse: true
        social_security: 1_200
      person2:
        is_tax_unit_head_or_spouse: true
        workers_compensation: 2_400
    households:
      household:
        members: [person1, person2]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1, person2]
  absolute_error_margin: 0.1
  output:
    # (1_200 + 2_400) / 12 = 300.
    ca_scc_general_assistance_countable_income: 300

- name: Case 3, dependent child income excluded.
  period: 2024-01
  input:
    people:
      person1:
        is_tax_unit_head_or_spouse: true
        social_security: 1_200
      person2:
        is_tax_unit_head_or_spouse: false
        social_security: 6_000
    households:
      household:
        members: [person1, person2]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1, person2]
  absolute_error_margin: 0.1
  output:
    ca_scc_general_assistance_countable_income: 100
