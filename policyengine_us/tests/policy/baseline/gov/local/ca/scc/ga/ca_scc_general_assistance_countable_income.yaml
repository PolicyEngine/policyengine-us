- name: Case 1, single head with employment income.
  period: 2024-01
  input:
    people:
      person1:
        is_tax_unit_head_or_spouse: true
        employment_income: 1_200
    households:
      household:
        members: [person1]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1]
  output:
    ca_scc_general_assistance_countable_income: 100

- name: Case 2, head and spouse both have income, sums across SPMUnit.
  period: 2024-01
  input:
    people:
      person1:
        is_tax_unit_head_or_spouse: true
        employment_income: 1_200
      person2:
        is_tax_unit_head_or_spouse: true
        social_security: 2_400
    households:
      household:
        members: [person1, person2]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    ca_scc_general_assistance_countable_income: 300

- name: Case 3, dependent child income excluded.
  period: 2024-01
  input:
    people:
      person1:
        is_tax_unit_head_or_spouse: true
        employment_income: 1_200
      person2:
        is_tax_unit_head_or_spouse: false
        employment_income: 6_000
    households:
      household:
        members: [person1, person2]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    ca_scc_general_assistance_countable_income: 100
