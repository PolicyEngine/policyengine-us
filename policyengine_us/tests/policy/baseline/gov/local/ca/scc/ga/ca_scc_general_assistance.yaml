- name: Case 6, extremely negative SE income — benefit must not exceed single MAP.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        ssi: 0
        personal_property: 0
        immigration_status: CITIZEN
        self_employment_income: -1_000_000
    households:
      household:
        members: [person1]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_scc_general_assistance_living_arrangement: NOT_SHARED
  output:
    # Benefit must be capped at the MAP ($343), not 343 - (-83_333) = 83_676.
    ca_scc_general_assistance: 343

- name: Case 7, single eligible adult with countable income exactly at single MAP, zero benefit.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        ssi: 0
        personal_property: 0
        immigration_status: CITIZEN
        employment_income: 4_116
    households:
      household:
        members: [person1]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_scc_general_assistance_living_arrangement: NOT_SHARED
  output:
    # countable_income = 4_116 / 12 = 343 == MAP -> income_eligible is strict < so false -> benefit = 0
    ca_scc_general_assistance: 0

- name: Case 8, single eligible adult with countable income $1 below single MAP, $1 benefit.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        ssi: 0
        personal_property: 0
        immigration_status: CITIZEN
        employment_income: 4_104
    households:
      household:
        members: [person1]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_scc_general_assistance_living_arrangement: NOT_SHARED
  output:
    # countable = 4_104 / 12 = 342; benefit = 343 - 342 = 1
    ca_scc_general_assistance: 1

- name: Case 9, married couple with $200 combined countable income receives $260.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        ssi: 0
        personal_property: 100
        immigration_status: CITIZEN
        employment_income: 1_200
      person2:
        age: 28
        is_tax_unit_head_or_spouse: true
        ssi: 0
        personal_property: 100
        immigration_status: CITIZEN
        employment_income: 1_200
    households:
      household:
        members: [person1, person2]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        ca_scc_general_assistance_living_arrangement: NOT_SHARED
  output:
    # combined countable = (1_200 + 1_200) / 12 = 200; benefit = 460 - 200 = 260
    ca_scc_general_assistance: 260
