- name: Case 1, single eligible adult with zero income, receives full single MAP.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        ssi: 0
        personal_property: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_scc_general_assistance_living_arrangement: NOT_SHARED
  output:
    ca_scc_general_assistance: 343

