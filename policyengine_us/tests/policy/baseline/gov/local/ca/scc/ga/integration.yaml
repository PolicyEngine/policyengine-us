        members: [person1]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_scc_general_assistance_living_arrangement: BOARD_AND_CARE
  output:
    # Override skips the single/married + shared housing formula.
    ca_scc_general_assistance_base_amount: 929
    ca_scc_general_assistance_countable_income: 0
    ca_scc_general_assistance: 929
