- name: Case 9, married couple plus minor child — child does not affect base amount.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        ssi: 0
        personal_property: 50
        immigration_status: CITIZEN
      person2:
        age: 32
        is_tax_unit_head_or_spouse: true
        ssi: 0
        personal_property: 50
        immigration_status: CITIZEN
      person3:
        age: 5
        is_tax_unit_head_or_spouse: false
        ssi: 0
        personal_property: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1, person2, person3]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        ca_scc_general_assistance_living_arrangement: NOT_SHARED
  output:
    # Child fails age_eligible and head-or-spouse — only person1 and person2 count.
    # num_eligible == 2 -> married MAP $460; countable income = 0; benefit = 460.
    ca_scc_general_assistance_base_amount: 460
    ca_scc_general_assistance_countable_income: 0
    ca_scc_general_assistance: 460

