- name: Case 11, SPMUnit-level shared housing reduction applies once across all members.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 40
        is_tax_unit_head_or_spouse: true
        ssi: 0
        personal_property: 100
        immigration_status: CITIZEN
      person2:
        age: 38
        is_tax_unit_head_or_spouse: true
        ssi: 0
        personal_property: 100
        immigration_status: CITIZEN
    households:
      household:
        members: [person1, person2]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        # Shared with two other persons -> 20% reduction on married MAP.
        ca_scc_general_assistance_living_arrangement: SHARED_WITH_TWO
  output:
    # 460 * 0.80 = 368; countable income = 0; benefit = 368.
    ca_scc_general_assistance_base_amount: 368
    ca_scc_general_assistance_countable_income: 0
    ca_scc_general_assistance: 368

