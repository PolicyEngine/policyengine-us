- name: Case 9, household with minor child — referred to CalWORKs, ineligible for GA.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        ssi: 0
        personal_property: 50
        immigration_status: CITIZEN
      person2:
        age: 32
        is_tax_unit_head_or_spouse: true
        ssi: 0
        personal_property: 50
        immigration_status: CITIZEN
      person3:
        age: 5
        is_tax_unit_head_or_spouse: false
        ssi: 0
        personal_property: 0
        immigration_status: CITIZEN
    households:
      household:
        members: [person1, person2, person3]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        ca_scc_general_assistance_living_arrangement: NOT_SHARED
  output:
    # Per Chapter 2 (Eligibility for Other Programs — CalWORKs) and Chapter 9
    # (Potential Income and Resources), households with physical custody of a
    # minor child must apply for CalWORKs and are not eligible for GA.
    ca_scc_general_assistance_eligible: false
    ca_scc_general_assistance: 0

