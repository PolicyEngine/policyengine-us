- name: Case 1, single eligible adult, not shared housing, full single MAP.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        ssi: 0
        personal_property: 100
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        in_scc: true
    spm_units:
      spm_unit:
        members: [person1]
        ca_scc_general_assistance_living_arrangement: NOT_SHARED
  absolute_error_margin: 0.1
  output:
    ca_scc_general_assistance_base_amount: 343

