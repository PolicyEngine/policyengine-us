- name: Case 1, single adult citizen with low income, eligible.
  period: 2024-01
  input:
    age: 30
    is_tax_unit_head_or_spouse: true
    ssi: 0
    personal_property: 100
    immigration_status: CITIZEN
    in_scc: true
  output:
    ca_scc_general_assistance_eligible_person: true

