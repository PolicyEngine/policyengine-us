- name: Wilmington resident pays 1.25% on earned income
  period: 2025
  input:
    state_code: DE
    in_wilmington: true
    employment_income: 40_000
  output:
    de_wilmington_earned_income_tax: 500  # 40,000 * 1.25%

- name: Wilmington nonresident pays 1.25% on Wilmington-source earnings only
  period: 2025
  input:
    state_code: DE
    in_wilmington: false
    employment_income: 40_000
    de_wilmington_nonresident_earnings: 20_000
  output:
    de_wilmington_earned_income_tax: 250  # 20,000 * 1.25%

- name: Non-Wilmington Delaware household with no city-source earnings owes nothing
  period: 2025
  input:
    state_code: DE
    in_wilmington: false
    employment_income: 40_000
  output:
    de_wilmington_earned_income_tax: 0

- name: Wilmington resident is taxed on employment and self-employment income
  period: 2025
  input:
    state_code: DE
    in_wilmington: true
    employment_income: 30_000
    self_employment_income: 10_000
  output:
    de_wilmington_earned_income_tax: 500  # (30,000 + 10,000) * 1.25%

- name: Wilmington tax sums earnings across earners in the tax unit
  period: 2025
  input:
    people:
      person1:
        employment_income: 40_000
      person2:
        employment_income: 20_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: DE
        in_wilmington: true
  output:
    de_wilmington_earned_income_tax: 750  # (40,000 + 20,000) * 1.25%
