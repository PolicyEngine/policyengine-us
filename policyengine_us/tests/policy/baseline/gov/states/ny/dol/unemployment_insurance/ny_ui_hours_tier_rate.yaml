# Tests for New York UI partial benefit hours tier rate (effective 2021-08-16).
# Hours-based reduction bracket:
#   0-10 hours   -> 100% (rate 1.00)
#   11-16 hours  -> 75%  (rate 0.75)
#   17-21 hours  -> 50%  (rate 0.50)
#   22-30 hours  -> 25%  (rate 0.25)
#   31+ hours    -> 0%   (rate 0.00)
# Reference: NY Lab. Law § 590(5)(c); NYSDOL P803 (Oct 2025).

- name: Case 1, 5 hours worked - tier 1 (0-10), full weekly benefit.
  period: 2025
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
        ny_ui_weekly_hours_worked: 5
    households:
      household:
        members: [person1]
        state_code: NY
  output:
    people:
      person1:
        # 5 hours falls in the 0-10 tier -> 100% of WBR.
        ny_ui_hours_tier_rate: 1.0

