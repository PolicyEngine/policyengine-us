# Tests for New York UI partial benefit credit (§ 525).
# Formula: PBC = ceil(max(0.50 * WBR, $100)).
# Reference: NY Lab. Law § 525.

- name: Case 1, WBR $300 - 50 percent of WBR exceeds the $100 floor.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # WBR derived from HQ: floor($7,800 / 26) = $300.
        ny_ui_high_quarter_wages: 7_800
        ny_ui_base_period_wages: 23_400
        ny_ui_quarters_with_wages: 4
    households:
      household:
        members: [person1]
        state_code: NY
  output:
    people:
      person1:
        ny_ui_weekly_benefit_rate: 300
        # 0.5 * $300 = $150; max($150, $100) = $150.
        ny_ui_partial_benefit_credit: 150

- name: Case 2, WBR $180 - 50 percent of WBR is below the $100 floor, floor applies.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # WBR derived from HQ: floor($4,680 / 26) = $180.
        ny_ui_high_quarter_wages: 4_680
        ny_ui_base_period_wages: 14_040
        ny_ui_quarters_with_wages: 4
    households:
      household:
        members: [person1]
        state_code: NY
  output:
    people:
      person1:
        ny_ui_weekly_benefit_rate: 180
        # 0.5 * $180 = $90; max($90, $100) = $100.
        ny_ui_partial_benefit_credit: 100

- name: Case 3, WBR $504 (pre-Oct-2025 cap) - 50 percent of WBR is $252.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        # WBR capped at $504 (2025 maximum) regardless of HQ above $13,104.
        ny_ui_high_quarter_wages: 50_000
        ny_ui_base_period_wages: 150_000
        ny_ui_quarters_with_wages: 4
    households:
      household:
        members: [person1]
        state_code: NY
  output:
    people:
      person1:
        ny_ui_weekly_benefit_rate: 504
        # 0.5 * $504 = $252; max($252, $100) = $252.
        ny_ui_partial_benefit_credit: 252

- name: Case 4, boundary - WBR $200 yields PBC exactly at floor.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # WBR from HQ $5,200: floor($5,200 / 26) = $200.
        ny_ui_high_quarter_wages: 5_200
        ny_ui_base_period_wages: 15_600
        ny_ui_quarters_with_wages: 4
    households:
      household:
        members: [person1]
        state_code: NY
  output:
    people:
      person1:
        ny_ui_weekly_benefit_rate: 200
        # 0.5 * $200 = $100; max($100, $100) = $100 (floor equals rate-based).
        ny_ui_partial_benefit_credit: 100

- name: Case 5, boundary - low WBR $140 triggers $100 floor.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # WBR from HQ $3,600: floor($3,600 / 26) = $138 -> lifted to $140 min.
        ny_ui_high_quarter_wages: 3_600
        ny_ui_base_period_wages: 12_000
        ny_ui_quarters_with_wages: 4
    households:
      household:
        members: [person1]
        state_code: NY
  output:
    people:
      person1:
        ny_ui_weekly_benefit_rate: 140
        # 0.5 * $140 = $70; max($70, $100) = $100 (floor applies).
        ny_ui_partial_benefit_credit: 100

- name: Case 6, odd WBR $307 - ceil rounds 0.50 * WBR up to nearest dollar.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        # WBR from HQ $7,982: floor($7,982 / 26) = $307.
        ny_ui_high_quarter_wages: 7_982
        ny_ui_base_period_wages: 23_946
        ny_ui_quarters_with_wages: 4
    households:
      household:
        members: [person1]
        state_code: NY
  output:
    people:
      person1:
        ny_ui_weekly_benefit_rate: 307
        # 0.5 * $307 = $153.50; ceil($153.50) = $154; max($154, $100) = $154.
        ny_ui_partial_benefit_credit: 154
