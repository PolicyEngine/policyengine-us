- name: Case 1, family of 3 matches CBPP NYC $789 figure.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NY
  output:
    # Basic monthly allowance (size 3): 336
    # Home energy (size 3): 30
    # Supplemental home energy (size 3): 23
    # NYC max shelter (size 3): 400
    # Total: 789
    ny_tanf_max_benefit_standard: 789

- name: Case 2, household with rent still returns full max shelter (789).
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        pre_subsidy_rent: 800
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NY
  output:
    # Variable returns max NYC shelter regardless of actual rent.
    ny_tanf_max_benefit_standard: 789

