- name: Case 1, center full-time infant in a cluster 3 county uses the cluster 3 center infant rate.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 0
        is_tax_unit_dependent: true
        childcare_hours_per_week: 40
        id_iccp_provider_type: CENTER
        id_iccp_time_category: FULL_TIME
        id_iccp_age_group: INFANT
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ID
        id_iccp_county_cluster: CLUSTER_3
  output:
    id_iccp_eligible_child: [false, true]
    id_iccp_maximum_monthly_benefit: [0, 1_245]

- name: Case 2, family part-time infant in a cluster 2 county uses the cluster 2 family infant rate.
  period: 2026-01
  input:
    people:
      person1:
