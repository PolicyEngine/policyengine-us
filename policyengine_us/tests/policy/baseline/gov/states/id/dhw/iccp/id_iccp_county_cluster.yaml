- name: Ada County maps to cluster 3.
  period: 2026
  input:
    people:
      person:
        age: 30
    households:
      household:
        members: [person]
        state_code: ID
        county_str: ADA_COUNTY_ID
  output:
    id_iccp_county_cluster: CLUSTER_3

- name: Canyon County maps to cluster 2.
  period: 2026
  input:
    people:
      person:
        age: 30
    households:
      household:
        members: [person]
        state_code: ID
        county_str: CANYON_COUNTY_ID
  output:
