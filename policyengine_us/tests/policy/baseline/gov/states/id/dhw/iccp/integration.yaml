- name: An otherwise-eligible family outside Idaho receives no ICCP benefit.
  period: 2026-01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000  # 2,000/month
      child:
        age: 3
        childcare_hours_per_day: 8
        childcare_days_per_week: 5  # 40 hours/week -> WEEKLY -> FULL_TIME
    households:
      household:
        members: [parent, child]
        state_code: UT  # not Idaho
        county_str: ADA_COUNTY_ID
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_pre_subsidy_childcare_expenses: 24_000  # 2,000/month
        spm_unit_fpg: 24_000
        meets_ccdf_activity_test: true
  output:
    id_iccp_eligible: false
    id_iccp: 0

- name: Single-child ICCP pipeline from raw inputs through the annual subsidy.
  period: 2026
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000  # 2,000/month, qualifying activity
      child:
        age: 3  # 36 months -> PRESCHOOL
        childcare_hours_per_day: 8
        childcare_days_per_week: 5  # 40 hours/week -> WEEKLY -> FULL_TIME, in care
    households:
      household:
        members: [parent, child]
        state_code: ID
        county_str: ADA_COUNTY_ID  # CLUSTER_3
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_pre_subsidy_childcare_expenses: 24_000  # 2,000/month
        spm_unit_fpg: 24_000  # initial limit 1.75 x 24,000 / 12 = 3,500/month
  output:
    id_iccp_eligible: true
    # countable income 2,000/month <= 3,500/month initial limit
    # max benefit: CENTER, CLUSTER_3, FULL_TIME, PRESCHOOL = 1,089/month
    # copay (size 2, full-time): income 2,000 in 1,940-2,116 band = 50/month
    # id_iccp = min(2,000, 1,089) - 50 = 1,039/month
    id_iccp: 12_468  # 1,039 x 12
    id_child_care_subsidies: 12_468
    child_care_subsidies: 12_468  # federal aggregate picks up the Idaho program

- name: Multi-child ICCP pipeline sums per-child copays across the SPM unit.
  period: 2026-01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000  # 2,000/month, qualifying activity
      child1:
        age: 1  # 12 months -> INFANT
        childcare_hours_per_day: 8
        childcare_days_per_week: 5  # FULL_TIME, in care
      child2:
        age: 4  # 48 months -> PRESCHOOL
        childcare_hours_per_day: 8
        childcare_days_per_week: 5  # FULL_TIME, in care
    households:
      household:
        members: [parent, child1, child2]
        state_code: ID
        county_str: ADA_COUNTY_ID  # CLUSTER_3
    spm_units:
      spm_unit:
        members: [parent, child1, child2]
        spm_unit_pre_subsidy_childcare_expenses: 60_000  # 5,000/month
        spm_unit_fpg: 30_000  # initial limit 1.75 x 30,000 / 12 = 4,375/month
  output:
    id_iccp_eligible: true
    # size 3, full-time, countable income 2,000 in first band (< 2,222) = 20/child
    id_iccp_copay_per_child: [0, 20, 20]
    id_iccp_copay: 40
    # max benefit: INFANT 1,245 + PRESCHOOL 1,089 = 2,334/month
    # expenses 5,000 capped at 2,334; id_iccp = 2,334 - 40 = 2,294/month
    id_iccp: 2_294
