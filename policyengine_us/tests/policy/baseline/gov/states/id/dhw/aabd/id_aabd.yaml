- name: Case 1, RALF/CFH resident ineligible for AABD cash.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        social_security: 4_800
        id_aabd_living_arrangement: RALF_CFH
    households:
      household:
        members: [person1]
        state_code: ID
  output:
    id_aabd_eligible: [false]
    id_aabd: [0]

- name: Case 2, NONE arrangement ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        social_security: 4_800
    households:
      household:
        members: [person1]
        state_code: ID
  output:
    id_aabd_eligible: [false]
    id_aabd: [0]

- name: Case 3, no SSI ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        social_security: 12_000
        id_aabd_living_arrangement: SINGLE
    households:
      household:
        members: [person1]
        state_code: ID
