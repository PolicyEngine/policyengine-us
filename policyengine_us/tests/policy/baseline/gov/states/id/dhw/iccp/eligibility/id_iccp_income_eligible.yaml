- name: Case 1, initial eligibility uses 175 percent of the federal poverty guideline.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: ID
    spm_units:
      spm_unit:
        members: [person1]
        id_iccp_countable_income: 3_500
        id_iccp_enrolled: false
        spm_unit_fpg: 24_000
  output:
    id_iccp_income_eligible: true

