- name: ICCP eligibility fails when no parent meets an activity.
  period: 2026-01
  input:
    people:
      parent:
        age: 30
        is_tax_unit_head_or_spouse: true
        employment_income: 0
        is_full_time_student: false
      child:
        age: 3
    households:
      household:
        members: [parent, child]
        state_code: ID
    spm_units:
      spm_unit:
        members: [parent, child]
        id_iccp_countable_income: 1_000
        spm_unit_fpg: 24_000
        spm_unit_assets: 0
        meets_ccdf_activity_test: false
  output:
    id_iccp_eligible: false
