- name: Children under age 13 qualify when immigration eligible.
  period: 2026-01
  input:
    people:
      child:
        age: 12
        immigration_status: CITIZEN
    households:
      household:
        members: [child]
        state_code: ID
  output:
    id_iccp_eligible_child: true

- name: Children age 13 do not qualify unless disabled.
  period: 2026-01
  input:
    people:
      child:
        age: 13
        immigration_status: CITIZEN
    households:
      household:
        members: [child]
        state_code: ID
  output:
    id_iccp_eligible_child: false

- name: Disabled children qualify through age 18.
  period: 2026-01
  input:
    people:
      child:
        age: 18
        is_disabled: true
        immigration_status: CITIZEN
    households:
      household:
        members: [child]
        state_code: ID
  output:
    id_iccp_eligible_child: true

- name: Disabled children age 19 do not qualify.
  period: 2026-01
  input:
    people:
      child:
        age: 19
        is_disabled: true
        immigration_status: CITIZEN
    households:
      household:
        members: [child]
        state_code: ID
  output:
    id_iccp_eligible_child: false
