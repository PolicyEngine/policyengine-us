- name: Idaho child care subsidies sum the monthly ICCP benefit over the year.
  period: 2026
  input:
    people:
      parent:
        age: 30
      child:
        age: 3
    households:
      household:
        members: [parent, child]
        state_code: ID
    spm_units:
      spm_unit:
        members: [parent, child]
        id_iccp_eligible: true
        id_iccp: 12_000  # 1,000/month
  output:
    id_child_care_subsidies: 12_000  # 1,000/month x 12
    child_care_subsidies: 12_000  # federal aggregate picks up the Idaho program
