- name: Case 1, activity eligibility uses the CCDF activity-test fallback.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: ID
    spm_units:
      spm_unit:
        members: [person1]
        meets_ccdf_activity_test: true
  output:
    id_iccp_activity_eligible: true

- name: Case 2, activity eligibility fails when the CCDF fallback is false.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: ID
    spm_units:
      spm_unit:
        members: [person1]
        meets_ccdf_activity_test: false
  output:
    id_iccp_activity_eligible: false

- name: Case 3, activity eligibility via employment income only.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        self_employment_income: 0
        is_full_time_student: false
    households:
      household:
        members: [person1]
        state_code: ID
