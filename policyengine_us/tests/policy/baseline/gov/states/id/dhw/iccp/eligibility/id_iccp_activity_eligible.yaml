- name: Idaho ICCP activity eligibility fails when one of two parents has no activity.
  period: 2026-01
  input:
    people:
      parent1:
        age: 35
        employment_income: 12_000
        self_employment_income: 0
        is_full_time_student: false
      parent2:
        age: 33
        employment_income: 0
        self_employment_income: 0
        is_full_time_student: false
    households:
      household:
        members: [parent1, parent2]
        state_code: ID
    marital_units:
      marital_unit:
        members: [parent1, parent2]
    tax_units:
      tax_unit:
        members: [parent1, parent2]
    spm_units:
      spm_unit:
        members: [parent1, parent2]
        meets_ccdf_activity_test: false
  output:
    id_iccp_activity_eligible: false
