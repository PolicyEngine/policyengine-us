- name: Case 8, activity eligibility fails when one of two parents has no activity.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 12_000
        self_employment_income: 0
        is_full_time_student: false
      person2:
        age: 33
        employment_income: 0
        self_employment_income: 0
        is_full_time_student: false
    households:
      household:
        members: [person1, person2]
        state_code: ID
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: false
  output:
    id_iccp_activity_eligible: false

- name: Case 9, activity eligibility via farm operations income only.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        employment_income: 0
        self_employment_income: 0
        farm_operations_income: 12_000
        is_full_time_student: false
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: ID
    spm_units:
      spm_unit:
        members: [person1]
        meets_ccdf_activity_test: false
  output:
    # farm_operations_income is a self-employment source, so it qualifies as a
    # work activity even with no other activity signal or fallback
    id_iccp_activity_eligible: true
