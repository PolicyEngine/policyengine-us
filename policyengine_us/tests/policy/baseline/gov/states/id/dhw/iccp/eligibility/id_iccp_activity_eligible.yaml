- name: Case 7, activity eligibility via CCDF fallback with no activity signals.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 0
        self_employment_income: 0
        is_full_time_student: false
    households:
      household:
        members: [person1]
        state_code: ID
    spm_units:
      spm_unit:
        members: [person1]
        meets_ccdf_activity_test: true
  output:
