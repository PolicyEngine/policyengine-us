- name: Case 10, family size nine shifts the income band down by the additional-member step.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3
        childcare_hours_per_week: 40
        id_iccp_time_category: FULL_TIME
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 9  # one member above the listed max of 8
        id_iccp_countable_income: 5_000
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: ID
  output:
    id_iccp_eligible_child: [false, true]
    # adjusted income 5,000 - 596 = 4,404 < 4,513 -> size-8 first band = 20
    id_iccp_copay_per_child: [0, 20]

- name: Case 11, negative self-employment income floors the copay in the lowest band.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        self_employment_income: -60_000_000
      person2:
        age: 3
        childcare_hours_per_week: 40
        id_iccp_time_category: FULL_TIME
        is_tax_unit_head_or_spouse: false
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 4
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: ID
  output:
    id_iccp_eligible_child: [false, true]
    # countable income floors at 0 -> size-4 first band = 20
    id_iccp_copay_per_child: [0, 20]

- name: Case 12, guardians of foster children have no ICCP copay.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3
        childcare_hours_per_week: 40
        id_iccp_time_category: FULL_TIME
        is_in_foster_care: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 4
        id_iccp_countable_income: 3_216  # would otherwise owe a 75 copay
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: ID
  output:
    id_iccp_eligible_child: [false, true]
    # IDAPA 16.06.12.503 exempts guardians of foster children from the copay
    id_iccp_copay_per_child: [0, 0]

