- name: Case 5, TANF families below 100 percent FPG have no ICCP copay.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3
        childcare_hours_per_week: 40
        id_iccp_time_category: FULL_TIME
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 4
        id_iccp_countable_income: 1_000  # below 100% FPG
        spm_unit_fpg: 24_000  # 2,000/month
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: ID
  output:
    id_iccp_eligible_child: [false, true]
    id_iccp_copay_per_child: [0, 0]

