- name: Case 17, a foster child exempts every sibling's copay at the family level.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3
        childcare_hours_per_week: 40
        id_iccp_time_category: FULL_TIME
        is_in_foster_care: true
      person3:
        age: 4
        childcare_hours_per_week: 40
        id_iccp_time_category: FULL_TIME
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_size: 4
        id_iccp_countable_income: 3_216  # would otherwise owe a 75 copay each
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2, person3]
        state_code: ID
  output:
    id_iccp_eligible_child: [false, true, true]
    # family-level foster exemption zeroes both the foster child's and the
    # non-foster sibling's copays
    id_iccp_copay_per_child: [0, 0, 0]
