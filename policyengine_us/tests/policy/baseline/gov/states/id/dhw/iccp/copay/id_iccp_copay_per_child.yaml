- name: Family size four full-time copay is 20 dollars in the first tier.
  period: 2026-01
  input:
    people:
      parent:
        age: 30
      child:
        age: 3
        childcare_hours_per_week: 40
        id_iccp_time_category: FULL_TIME
    tax_units:
      tax_unit:
        members: [parent, child]
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_size: 4
        id_iccp_countable_income: 2_680
        is_tanf_enrolled: false
    households:
      household:
        members: [parent, child]
        state_code: ID
  output:
    id_iccp_eligible_child: [false, true]
    id_iccp_copay_per_child: [0, 20]

