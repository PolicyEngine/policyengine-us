- name: Idaho 529 subtraction - single under cap
  period: 2025
  input:
    state_code: ID
    filing_status: SINGLE
    investment_in_529_plan: 4_000
  output:
    # Cap for single is $6,000
    # Subtraction = min(4,000, 6,000) = 4,000
    id_529_plan_subtraction: 4_000

