# Washington Working Families Tax Credit - Age Expansion tests
# ESSB 6346 Sec. 901 expands eligibility to individuals age 18+
# who do not meet federal EITC age requirements (effective 2029)

- name: Age 22 single filer with earnings eligible under expansion in 2029
  period: 2029
  input:
    state_code: WA
    age: 22
    employment_income: 15_000
  output:
    # Under normal EITC rules, childless filers must be 25-64
    # With expansion, filers age 18+ with earned income qualify
    wa_working_families_tax_credit: 300

- name: Age 22 single filer with earnings NOT eligible in 2028
  period: 2028
  input:
    state_code: WA
    age: 22
    employment_income: 15_000
  output:
    # Expansion not in effect until 2029
    wa_working_families_tax_credit: 0

- name: Age 22 single filer without earnings NOT eligible in 2029
  period: 2029
  input:
    state_code: WA
    age: 22
    employment_income: 0
  output:
    # Must have earned income to qualify under expansion
    wa_working_families_tax_credit: 0

- name: Age 17 single filer NOT eligible even in 2029
  period: 2029
  input:
    state_code: WA
    age: 17
    employment_income: 15_000
  output:
    # Must be at least 18 to qualify under expansion
    wa_working_families_tax_credit: 0

- name: Age 30 single filer eligible through normal EITC rules
  period: 2029
  input:
    state_code: WA
    age: 30
    employment_income: 15_000
  output:
    # Normal EITC eligibility applies (age 25-64)
    wa_working_families_tax_credit: 300
