- name: Case 1, FULL_TIME maps to FULL_DAY for centers.
  period: 2025-01
  input:
    people:
      person1:
        age: 4
        wa_wccc_time_category: FULL_TIME
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    wa_wccc_center_time_category: FULL_DAY

- name: Case 2, PART_TIME maps to HALF_DAY for centers.
  period: 2025-01
  input:
    people:
      person1:
        age: 4
        wa_wccc_time_category: PART_TIME
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    wa_wccc_center_time_category: HALF_DAY
