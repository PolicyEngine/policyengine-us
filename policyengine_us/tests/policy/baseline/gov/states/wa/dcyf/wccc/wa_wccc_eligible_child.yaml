- name: Case 1, child age 5, dependent, eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 5
        is_tax_unit_dependent: true
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    wa_wccc_eligible_child: [true]

