- name: Case 1, low assets, eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_assets: 5_000
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    wa_wccc_resources_eligible: true

- name: Case 2, assets at $1M boundary, eligible.
  period: 2025-01
  input:
