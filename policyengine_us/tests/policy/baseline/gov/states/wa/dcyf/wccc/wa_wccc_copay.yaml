- name: Case 9, single adult just below 20% SMI threshold, $0 tier.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_in_k12_school: false
        employment_income: 13_500
    spm_units:
      spm_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        is_homeless: false
  output:
    # Size 1 monthly SMI = 131,054 * 0.52 / 12 = $5,679.007.
    # Income $13,500/yr = $1,125/mo. Fraction = 1,125 / 5,679.007 = 0.19810.
    # Below 0.2001 threshold -> first bracket -> $0.
    wa_wccc_copay: 0

