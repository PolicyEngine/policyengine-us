- name: Case 1, single adult at 17.6% SMI, copay waived ($0 tier).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_in_k12_school: false
        employment_income: 12_000
    spm_units:
      spm_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        is_homeless: false
  output:
    # SMI fraction = 1,000/mo / 5,679.01/mo = 0.176 (<= 20%, $0 tier).
    wa_wccc_copay: 0

