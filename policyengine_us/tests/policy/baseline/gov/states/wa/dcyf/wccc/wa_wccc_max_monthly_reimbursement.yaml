- name: Case 1, center provider for Region 1 infant full day, $62.05 * 23.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        wa_wccc_eligible_child: true
        wa_wccc_provider_type: CENTER
        wa_wccc_center_age_group: INFANT
        wa_wccc_family_home_age_group: INFANT
        wa_wccc_day_type: FULL_DAY
    households:
      household:
        members: [person1]
        state_code: WA
        wa_wccc_center_region: REGION_1
        wa_wccc_region: REGION_1
  output:
    # Center: 62.05/day * 23 days = 1,427.15.
    wa_wccc_max_monthly_reimbursement: [1_427.15]

