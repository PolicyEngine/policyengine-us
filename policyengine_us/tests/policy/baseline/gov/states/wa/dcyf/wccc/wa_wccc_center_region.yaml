- name: Case 1, Adams County, no override, Region 1.
  period: 2025-01
  input:
    county_str: ADAMS_COUNTY_WA
    state_code: WA
  output:
    wa_wccc_center_region: REGION_1

- name: Case 2, Clark County overrides to Region 3 for centers.
  period: 2025-01
  input:
    county_str: CLARK_COUNTY_WA
    state_code: WA
  output:
    # Clark is base Region 6 but pays Region 3 rates for centers.
    wa_wccc_center_region: REGION_3

