- name: Case 1, countable income below SMI limit, eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_in_k12_school: false
        is_wccc_enrolled: false
        employment_income: 30_000
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        snap: 0
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
        is_homeless: false
  output:
    # Size 2, applicant 60% SMI: 89,116.72 * 0.60 / 12 = $4,455.84/mo limit.
    # Income $30,000/yr = $2,500/mo, well below limit.
    wa_wccc_income_eligible: true

- name: Case 2, countable income above SMI limit, ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_in_k12_school: false
        is_wccc_enrolled: false
        employment_income: 200_000
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        snap: 0
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
        is_homeless: false
  output:
    # Size 2, applicant 60% SMI: $4,455.84/mo limit.
    # Income $200,000/yr = $16,667/mo, above limit, no SNAP, not homeless.
    wa_wccc_income_eligible: false

- name: Case 3, SNAP recipient, automatically income eligible regardless of income.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_in_k12_school: false
        is_wccc_enrolled: false
        employment_income: 200_000
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        snap: 200
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
        is_homeless: false
  output:
    # SNAP > 0 triggers automatic income eligibility per RCW 43.216.802(5).
    wa_wccc_income_eligible: true

- name: Case 4, homeless household, automatically income eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_in_k12_school: false
        is_wccc_enrolled: false
        employment_income: 80_000
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        snap: 0
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
        is_homeless: true
