- name: Case 5, applicant income just under 60% SMI limit, eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_in_k12_school: false
        is_wccc_enrolled: false
        employment_income: 53_470
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        snap: 0
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
        is_homeless: false
  output:
    # Size 2 monthly limit at 60% SMI = 131,054 * 0.68 * 0.60 / 12 = $4,455.836.
    # Income $53,470/yr = $4,455.833/mo, $0.003 below limit -> eligible (<=).
    wa_wccc_income_eligible: true

