- name: Case 1, infant 6 months old.
  period: 2025-01
  input:
    age: 0.5
    state_code: WA
  output:
    # 0.5 yr * 12 = 6 months < 12 -> INFANT.
    wa_wccc_center_age_group: INFANT

- name: Case 2, infant boundary at 11 months.
  period: 2025-01
  input:
    age: 0.92
    state_code: WA
  output:
    # 0.92 yr * 12 = 11.04 months < 12 -> INFANT.
    wa_wccc_center_age_group: INFANT

