- name: 2025 FPL era, family of 3 at $28,000, below 130% FPL ceiling, eligible.
  period: 2025
  input:
    people:
      parent:
        age: 30
        employment_income: 28_000
      child:
        age: 4
        employment_income: 0
      sibling:
        age: 6
        employment_income: 0
    spm_units:
      spm_unit:
        members: [parent, child, sibling]
        tanf: 0
    tax_units:
      tax_unit:
        members: [parent, child, sibling]
    households:
      household:
        members: [parent, child, sibling]
        state_code: WA
  output:
    # 130% FPL family of 3 in 2025 = ($15,650 + 2*$5,500) * 1.30 = $34,645.
    # $28,000 < $34,645, so income-eligible (within priority enrollment range below 110% FPL).
    wa_eceap_income_eligible: [true, true, true]

