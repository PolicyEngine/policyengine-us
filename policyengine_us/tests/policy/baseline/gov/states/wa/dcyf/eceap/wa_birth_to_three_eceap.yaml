- name: Eligible 2-year-old receives the Birth to Three per-slot value.
  period: 2025
  input:
    people:
      parent:
        age: 30
        employment_income: 20_000
      child:
        age: 2
        employment_income: 0
    spm_units:
      spm_unit:
        members: [parent, child]
        tanf: 0
    tax_units:
      tax_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: WA
  output:
    wa_birth_to_three_eceap: [0, 23_645]

