# ---- Edge cases ----

- name: Multi-child family with 2-year-old and 4-year-old, only 2-year-old is BT3-eligible.
  period: 2025
  input:
    people:
      parent:
        age: 30
        employment_income: 20_000
      child_b3:
        age: 2
        employment_income: 0
      child_eceap:
        age: 4
        employment_income: 0
    spm_units:
      spm_unit:
        members: [parent, child_b3, child_eceap]
        tanf: 0
    tax_units:
      tax_unit:
        members: [parent, child_b3, child_eceap]
    households:
      household:
        members: [parent, child_b3, child_eceap]
        state_code: WA
  output:
    # Only the 2-year-old qualifies for BT3 (under age 3).
    wa_birth_to_three_eceap_eligible: [false, true, false]

