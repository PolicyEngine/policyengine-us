- name: Case 6, income just under 65% SMI threshold, recipient eligible.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_in_k12_school: false
        is_wccc_enrolled: true
        # Annual income just below 65% SMI for size 2:
        # 131,054 * 0.68 * 0.65 = $57,925.87/yr. Test 1 dollar below.
        employment_income: 57_924
      person2:
        age: 4
        is_tax_unit_dependent: true
        wa_wccc_provider_type: CENTER
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 20_000
        spm_unit_assets: 5_000
        snap: 0
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
        county_str: ADAMS_COUNTY_WA
        is_homeless: false
  output:
    # Income exactly at limit -> eligible (<=).
    wa_wccc_smi_rate: 0.65
    wa_wccc_income_eligible: true
    wa_wccc_eligible: true

- name: Case 7, negative self-employment income does not inflate benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_in_k12_school: false
        is_wccc_enrolled: false
        is_full_time_student: true
        employment_income: 6_000
        self_employment_income: -60_000_000
      person2:
        age: 4
        is_tax_unit_dependent: true
        wa_wccc_provider_type: CENTER
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 20_000
        spm_unit_assets: 5_000
        snap: 0
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
        county_str: ADAMS_COUNTY_WA
        is_homeless: false
  output:
    wa_wccc_eligible: true
    # Region 1 PRESCHOOL FULL_DAY = $53.18. Max reimbursement = $1,223.14.
    # Expenses 20,000/12 = $1,666.67/mo. Benefit capped at max_reimbursement.
    # Critical: benefit is min(uncapped, max_reimbursement) -- never max_reimb minus countable_income.
    wa_wccc: 1_223.14
