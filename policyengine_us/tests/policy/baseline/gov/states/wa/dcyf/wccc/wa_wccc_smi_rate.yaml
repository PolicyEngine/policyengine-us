- name: Case 1, applicant single parent, 60% SMI rate.
  period: 2025-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_in_k12_school: false
        is_wccc_enrolled: false
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
        is_homeless: false
  output:
    wa_wccc_smi_rate: 0.6

