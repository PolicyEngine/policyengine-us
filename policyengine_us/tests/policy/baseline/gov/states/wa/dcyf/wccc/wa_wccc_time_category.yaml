- name: Case 1, default time category is FULL_TIME.
  period: 2025-01
  input:
    age: 5
    state_code: WA
  output:
    # We don't track approved-activity hours; default to FULL_TIME.
    wa_wccc_time_category: FULL_TIME

- name: Case 2, adult also defaults to FULL_TIME.
  period: 2025-01
  input:
    age: 30
    state_code: WA
  output:
    wa_wccc_time_category: FULL_TIME
