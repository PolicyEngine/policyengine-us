        employment_income: 0
    spm_units:
      spm_unit:
        members: [parent, child, sibling]
        tanf: 0
    tax_units:
      tax_unit:
        members: [parent, child, sibling]
    households:
      household:
        members: [parent, child, sibling]
        state_code: WA
  output:
    # BT3 still uses 130% FPL for the 2026 simulation year because the
    # uses_fpg toggle flips 2026-07-01 and annual periods read Jan 1.
    # $50,000 is well above 130% FPL family of 3 (~$34,645+), so not eligible.
    wa_birth_to_three_eceap_income_eligible: [false, false, false]

