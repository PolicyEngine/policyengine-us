- name: Case 1, homeless household, categorically eligible (HGP pathway).
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
        is_homeless: true
  output:
    wa_wccc_categorical_eligible: true

- name: Case 2, non-homeless household, not categorically eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
        is_homeless: false
  output:
    wa_wccc_categorical_eligible: false
