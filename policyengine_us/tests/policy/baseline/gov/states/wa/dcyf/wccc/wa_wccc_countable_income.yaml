- name: Case 1, employment income only.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    # Annual 24,000 / 12 = 2,000 per month.
    wa_wccc_countable_income: 2_000

- name: Case 2, mixed earned and unearned income.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        social_security: 6_000
        child_support_received: 2_400
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    # (12,000 + 6,000 + 2,400) / 12 = 1,700 per month.
    wa_wccc_countable_income: 1_700

- name: Case 3, no income.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
