- name: Case 1, applicant family of 3 in 2025-01 uses 2024-10-01 SMI table.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_in_k12_school: false
        is_wccc_enrolled: false
      person2:
        age: 28
        is_tax_unit_head_or_spouse: true
        is_in_k12_school: false
      person3:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: WA
        is_homeless: false
  output:
    # WA SMI 2024-10-01: $131,054. Size 3 adjustment 0.84 = $110,085.36.
    # Applicant rate 0.60. Monthly = 110,085.36 * 0.60 / 12 = $5,504.27.
    wa_wccc_smi_limit: 5_504.27

