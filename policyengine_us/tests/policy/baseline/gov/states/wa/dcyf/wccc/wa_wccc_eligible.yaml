- name: Case 1, all conditions met via standard path, eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        wa_wccc_income_eligible: true
        wa_wccc_resources_eligible: true
        wa_wccc_activity_eligible: true
        wa_wccc_categorical_eligible: false
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    wa_wccc_eligible: true

