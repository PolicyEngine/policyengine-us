- name: Case 6, HGP path bypasses standard income and asset tests.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        wa_wccc_income_eligible: false
        is_ccdf_asset_eligible: false
        wa_wccc_activity_eligible: true
        wa_wccc_hgp_eligible: true
        wa_wccc_countable_income: 1_000
        wa_wccc_smi_limit: 6_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    # HGP bypasses income and resources tests; activity still required.
    wa_wccc_eligible: true

