- name: Case 1, infant 6 months old.
  period: 2025-01
  input:
    age: 0.5
    state_code: WA
  output:
    # 6 months < 12 -> INFANT.
    wa_wccc_family_home_age_group: INFANT

- name: Case 2, enhanced toddler at exactly 12 months.
  period: 2025-01
