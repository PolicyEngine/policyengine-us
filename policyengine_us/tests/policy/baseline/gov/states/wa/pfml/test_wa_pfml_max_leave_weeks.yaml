- name: Case 1, family leave is limited to 12 weeks.
  period: 2026
  input:
    people:
      person1:
        weekly_hours_worked: 20
        wa_pfml_leave_type: FAMILY
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    wa_pfml_max_leave_weeks: 12

