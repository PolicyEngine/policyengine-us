- name: All requirements met - eligible
  period: 2024-01
  input:
    state_code: WA
    is_demographic_tanf_eligible: true
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_tanf_eligible: true

- name: Missing demographic eligibility - ineligible
  period: 2024-01
  input:
    state_code: WA
    is_demographic_tanf_eligible: false
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_tanf_eligible: false

- name: Undocumented immigrant - ineligible
  period: 2024-01
  input:
    state_code: WA
    immigration_status: UNDOCUMENTED
    is_demographic_tanf_eligible: true
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_tanf_eligible: false

- name: LPR inside 5-year bar - ineligible
  period: 2024-01
  input:
    state_code: WA
    immigration_status: LEGAL_PERMANENT_RESIDENT
    years_since_us_entry: 2
    is_demographic_tanf_eligible: true
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_tanf_eligible: false

- name: LPR past 5-year bar - eligible
  period: 2024-01
  input:
    state_code: WA
    immigration_status: LEGAL_PERMANENT_RESIDENT
    years_since_us_entry: 6
    is_demographic_tanf_eligible: true
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_tanf_eligible: true

- name: Refugee bar-exempt - eligible
  period: 2024-01
  input:
    state_code: WA
    immigration_status: REFUGEE
    years_since_us_entry: 0
    is_demographic_tanf_eligible: true
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_tanf_eligible: true

- name: Income ineligible - ineligible
  period: 2024-01
  input:
    state_code: WA
    is_demographic_tanf_eligible: true
    wa_tanf_income_eligible: false
    wa_tanf_resources_eligible: true
  output:
    wa_tanf_eligible: false

- name: Resource ineligible - ineligible
  period: 2024-01
  input:
    state_code: WA
    is_demographic_tanf_eligible: true
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: false
  output:
    wa_tanf_eligible: false

- name: Only calculate for WA
  period: 2024-01
  input:
    state_code: ID
    is_demographic_tanf_eligible: true
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_tanf_eligible: false
