- name: Case 1, US citizen is not SFA-eligible (TANF-eligible instead).
  period: 2024-01
  input:
    state_code: WA
    immigration_status: CITIZEN
  output:
    wa_sfa_immigration_status_eligible: false

- name: Case 2, LPR in 5-year bar is SFA-eligible.
  period: 2024-01
  input:
    state_code: WA
    immigration_status: LEGAL_PERMANENT_RESIDENT
    years_since_us_entry: 2
  output:
    wa_sfa_immigration_status_eligible: true

- name: Case 3, LPR past 5-year bar is not SFA-eligible (TANF-eligible instead).
  period: 2024-01
  input:
    state_code: WA
    immigration_status: LEGAL_PERMANENT_RESIDENT
    years_since_us_entry: 6
  output:
    wa_sfa_immigration_status_eligible: false

- name: Case 4, paroled one-year alien is not SFA-eligible (TANF bar-exempt as humanitarian parolee).
  period: 2024-01
  input:
    state_code: WA
    immigration_status: PAROLED_ONE_YEAR
    years_since_us_entry: 1
  output:
    wa_sfa_immigration_status_eligible: false

- name: Case 5, refugee is not SFA-eligible (TANF bar-exempt).
  period: 2024-01
  input:
    state_code: WA
    immigration_status: REFUGEE
    years_since_us_entry: 0
  output:
    wa_sfa_immigration_status_eligible: false

- name: Case 6, asylee is not SFA-eligible (TANF bar-exempt).
  period: 2024-01
  input:
    state_code: WA
    immigration_status: ASYLEE
    years_since_us_entry: 0
  output:
    wa_sfa_immigration_status_eligible: false

- name: Case 7, undocumented immigrant is not SFA-eligible.
  period: 2024-01
  input:
    state_code: WA
    immigration_status: UNDOCUMENTED
  output:
    wa_sfa_immigration_status_eligible: false

- name: Case 8, DACA recipient is not SFA-eligible (not a qualified alien).
  period: 2024-01
  input:
    state_code: WA
    immigration_status: DACA
  output:
    wa_sfa_immigration_status_eligible: false
