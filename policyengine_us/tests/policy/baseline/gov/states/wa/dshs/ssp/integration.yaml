- name: Case 1, aged SSI recipient receives 35.50 standard supplement (2024-04 onward).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_eligible: true
        ssi: 12
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # Aged 70 -> is_ssi_aged -> STANDARD category
    # 2025-01 is after 2024-04-01 -> standard rate = 35.50
    wa_ssp_payment_category: STANDARD
    wa_ssp: [35.50]

- name: Case 2, blind SSI recipient receives 35.50 standard supplement (2024-04 onward).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_blind: true
        is_ssi_eligible: true
        ssi: 12
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # is_blind -> STANDARD category
    # 2025-01 -> standard rate = 35.50
    wa_ssp_payment_category: STANDARD
    wa_ssp: [35.50]

- name: Case 3, disabled-only SSI recipient ineligible before 2023-07-01.
  period: 2020-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_ssi_disabled: true
        is_ssi_eligible: true
        ssi: 12
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # Disabled-only category not active before 2023-07-01 (WSR 23-14-065)
    # Not aged, not blind -> NONE -> zero benefit
    wa_ssp_payment_category: NONE
    wa_ssp: [0]

- name: Case 4, SSI recipient with ineligible spouse, post-2023-07-01.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_ssi_disabled: true
        is_ssi_eligible: true
        ssi: 12
      person2:
        age: 50
        is_ssi_eligible: false
        ssi: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    # person1: SSI recipient with ineligible spouse + disabled (active 2023-07-01+)
    #   -> STANDARD; 2024-01 is after 2024-04-01? No, 2024-01 < 2024-04-01
    #   -> standard rate at 2024-01 = 38.25 (still under 2021-01-01 entry)
    # person2: not SSI-eligible -> wa_ssp_payment_category=NONE -> 0
    wa_ssp: [38.25, 0]

- name: Case 5, aged couple both SSI-eligible each receive individual rate.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_eligible: true
        ssi: 12
      person2:
        age: 68
        is_ssi_eligible: true
        ssi: 12
    marital_units:
      marital_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    # Both aged 65+ -> STANDARD per person
    # No couple reduction in WAC 388-478-0055; each person gets the individual rate
    # 2025-01 standard rate = 35.50
    wa_ssp: [35.50, 35.50]

- name: Case 6, SSI recipient in medical institution receives 70 (post-2023-07-01).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_eligible: true
        ssi: 12
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # ssi_federal_living_arrangement = MEDICAL_TREATMENT_FACILITY
    #   -> MEDICAL_INSTITUTION category (overrides STANDARD)
    # 2025-01 medical institution rate = 75.78 (HB 1128 increase eff. 2023-07-01, plus 2024+ COLA)
    wa_ssp_payment_category: MEDICAL_INSTITUTION
    wa_ssp: [75.78]

- name: Case 7, historical 2010 aged SSI recipient receives 46 standard supplement.
  period: 2010-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_eligible: true
        ssi: 12
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # Aged -> STANDARD; 2010-01 is between 2006-08-28 and 2013-12-01
    #   -> standard rate = 46 (matches SSA 2011 report figures)
    wa_ssp_payment_category: STANDARD
    wa_ssp: [46]

- name: Case 8, wrong state receives zero supplement.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_eligible: true
        ssi: 12
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: OR
  output:
    # defined_for = StateCode.WA -> non-WA returns default values
    wa_ssp: [0]
