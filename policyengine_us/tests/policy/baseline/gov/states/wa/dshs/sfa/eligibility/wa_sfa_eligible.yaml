- name: Case 9, single 19-year-old citizen high school senior - eligible via student pathway.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 19
        immigration_status: CITIZEN
        is_in_secondary_school: true
    spm_units:
      spm_unit:
        members: [person1]
        wa_tanf_income_eligible: true
        wa_tanf_resources_eligible: true
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    wa_sfa_eligible: true

