- name: Case 1, LPR in bar with child meets all requirements - eligible.
  period: 2024-01
  input:
    state_code: WA
    immigration_status: LEGAL_PERMANENT_RESIDENT
    years_since_us_entry: 2
    is_demographic_tanf_eligible: true
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_sfa_eligible: true

- name: Case 2, LPR past bar - ineligible (qualifies for TANF instead).
  period: 2024-01
  input:
    state_code: WA
    immigration_status: LEGAL_PERMANENT_RESIDENT
    years_since_us_entry: 6
    is_demographic_tanf_eligible: true
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_sfa_eligible: false

