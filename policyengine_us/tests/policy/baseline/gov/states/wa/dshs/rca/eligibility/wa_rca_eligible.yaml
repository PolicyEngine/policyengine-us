- name: Case 1, refugee within 12-month window, no TANF/SFA competition - eligible.
  period: 2024-01
  input:
    state_code: WA
    immigration_status: REFUGEE
    years_since_us_entry: 0
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_rca_eligible: true

- name: Case 2, Afghan humanitarian parolee within window - eligible.
  period: 2024-01
  input:
    state_code: WA
    immigration_status: PAROLED_ONE_YEAR
    years_since_us_entry: 0
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_rca_eligible: true

- name: Case 3, citizen - ineligible (not an RCA-eligible immigration status).
  period: 2024-01
  input:
    state_code: WA
    immigration_status: CITIZEN
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_rca_eligible: false

- name: Case 4, refugee past 12-month window - ineligible.
  period: 2024-01
  input:
    state_code: WA
    immigration_status: REFUGEE
    years_since_us_entry: 2
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_rca_eligible: false

- name: Case 5, refugee using default years_since_us_entry (5) - ineligible.
  period: 2024-01
  input:
    state_code: WA
    immigration_status: REFUGEE
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_rca_eligible: false

- name: Case 6, refugee income-ineligible - ineligible.
  period: 2024-01
  input:
    state_code: WA
    immigration_status: REFUGEE
    years_since_us_entry: 0
    wa_tanf_income_eligible: false
    wa_tanf_resources_eligible: true
  output:
    wa_rca_eligible: false

- name: Case 7, refugee resources-ineligible - ineligible.
  period: 2024-01
  input:
    state_code: WA
    immigration_status: REFUGEE
    years_since_us_entry: 0
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: false
  output:
    wa_rca_eligible: false

- name: Case 8, non-WA refugee - ineligible.
  period: 2024-01
  input:
    state_code: OR
    immigration_status: REFUGEE
    years_since_us_entry: 0
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_rca_eligible: false

- name: Case 9, undocumented - ineligible.
  period: 2024-01
  input:
    state_code: WA
    immigration_status: UNDOCUMENTED
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_rca_eligible: false

- name: Case 10, refugee at exactly 1.0 year - ineligible (strict less-than window).
  period: 2024-01
  input:
    state_code: WA
    immigration_status: REFUGEE
    years_since_us_entry: 1.0
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_rca_eligible: false

- name: Case 11, refugee at 0.99 year - eligible (just inside ORR window).
  period: 2024-01
  input:
    state_code: WA
    immigration_status: REFUGEE
    years_since_us_entry: 0.99
    wa_tanf_income_eligible: true
    wa_tanf_resources_eligible: true
  output:
    wa_rca_eligible: true

- name: Case 12, override flag forces RCA-eligible for a TANF-eligible citizen household.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        wa_show_all_cash_assistance_programs: true
        wa_tanf_income_eligible: true
        wa_tanf_resources_eligible: true
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    # Override bypasses the RCA immigration gate and TANF/SFA mutex so all
    # 3 cash-assistance programs can be displayed alongside each other.
    wa_rca_eligible: true
