# Integration tests for WA TANF across multiple policy periods.
# Covers: Aug 2024+ ($500 flat + 50%, $12k resource limit, Aug 2024 income limits),
# Jan 2024 (50% only, $6k resource limit), Jul 2021 (15% increase), Jul 2018, Jan 2016.

- name: Case 1, single parent with 2 children, no income.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
      person3:
        age: 3
        is_tax_unit_dependent: true
    families:
      family:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: WA
  output:
    wa_tanf_payment_standard: 706
    wa_tanf_countable_income: 0
    wa_tanf_eligible: true
    wa_tanf: 706

- name: Case 2, single parent with 2 children, low earned income.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 12_000
      person2:
        age: 5
        is_tax_unit_dependent: true
      person3:
        age: 3
        is_tax_unit_dependent: true
    families:
      family:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: WA
  output:
    wa_tanf_payment_standard: 706
    # Monthly income: $12,000 / 12 = $1,000
    # Countable earned = max($1,000 - $500, 0) × 0.5 = $250
    wa_tanf_countable_income: 250
    wa_tanf_eligible: true
    wa_tanf: 456

