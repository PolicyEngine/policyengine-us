# Mixed earned + unearned income tests (post-Aug-2024)

- name: Case 22, single parent with 2 children, mixed earned and unearned income.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 12_000
        social_security: 3_600
      person2:
        age: 5
        is_tax_unit_dependent: true
      person3:
        age: 3
        is_tax_unit_dependent: true
    families:
      family:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: WA
  output:
    wa_tanf_payment_standard: 706
    # Monthly earned: $12,000 / 12 = $1,000
    # Countable earned: max($1,000 - $500, 0) × 0.5 = $250
    wa_tanf_countable_earned_income: 250
    # Monthly unearned: $3,600 / 12 = $300
    # Countable income: $250 + $300 = $550
    wa_tanf_countable_income: 550
    # Gross earned $1,000 < income limit $1,912 → eligible
    wa_tanf_income_eligible: true
    wa_tanf_eligible: true
    # Benefit: $706 - $550 = $156
    wa_tanf: 156

