- name: Case 5, senior owner-occupant with high income is ineligible.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 100_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Income $100K > King County Tier 3 threshold $84K -> ineligible
    wa_pte_eligible: false
