- name: Case 1, senior owner-occupant with low income is eligible.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    wa_pte_eligible: true

- name: Case 2, senior renter (no real_estate_taxes) is ineligible.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 0
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    wa_pte_eligible: false

