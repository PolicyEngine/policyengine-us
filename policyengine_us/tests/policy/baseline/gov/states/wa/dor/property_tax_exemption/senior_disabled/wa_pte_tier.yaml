- name: Case 1, King County income at Tier 1 threshold returns Tier 1.
  period: 2024
  input:
    people:
      person1:
        age: 70
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 60_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # King County 2024: T1=$60k, T2=$72k, T3=$84k
    # income $60k <= T1 -> Tier 1
    wa_pte_tier: 1

- name: Case 2, King County income between Tier 1 and Tier 2 returns Tier 2.
  period: 2024
  input:
    people:
      person1:
        age: 70
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 72_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # income $72k > T1 ($60k) and <= T2 ($72k) -> Tier 2
    wa_pte_tier: 2

- name: Case 3, King County income between Tier 2 and Tier 3 returns Tier 3.
  period: 2024
  input:
    people:
      person1:
        age: 70
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 80_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # income $80k > T2 ($72k) and <= T3 ($84k) -> Tier 3
    wa_pte_tier: 3

- name: Case 4, King County income above Tier 3 returns 0.
  period: 2024
  input:
    people:
      person1:
        age: 70
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 100_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # income $100k > T3 ($84k) -> not in any tier
    wa_pte_tier: 0

- name: Case 5, ineligible household (renter) still receives a tier label by income.
  period: 2024
  input:
    people:
      person1:
        age: 70
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # wa_pte_tier only checks income vs thresholds, not ownership.
    # 40k <= T1 60k -> Tier 1 even for renter; ownership is enforced
    # downstream by wa_pte_eligible.
    wa_pte_tier: 1

