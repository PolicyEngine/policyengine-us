- name: Case 1, person aged 61 (at threshold) is categorically eligible by age.
  period: 2024
  input:
    people:
      person1:
        age: 61
        is_disabled: false
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    wa_pte_categorical_eligible: true

- name: Case 2, person under age threshold who is disabled is categorically eligible by disability.
  period: 2024
  input:
    people:
      person1:
        age: 45
        is_disabled: true
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    wa_pte_categorical_eligible: true

- name: Case 3, person under age threshold who is not disabled is not categorically eligible.
  period: 2024
  input:
    people:
      person1:
        age: 45
        is_disabled: false
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    wa_pte_categorical_eligible: false

- name: Case 4, person aged 70 who is also disabled is categorically eligible (OR semantics).
  period: 2024
  input:
    people:
      person1:
        age: 70
        is_disabled: true
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
