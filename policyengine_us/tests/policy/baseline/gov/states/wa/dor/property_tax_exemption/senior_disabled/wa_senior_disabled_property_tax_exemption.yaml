- name: Case 1, Tier 1 senior in King County with $700k assessed value.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Tier 1 (income $40k <= T1 $60k).
    # full_exempt = 6,000 * 0.30 = 1,800
    # regular_rate = (6,000 * 0.70) / 700,000 = 0.006
    # tier_1_exempt_value = min(max(60,000, 700,000 * 0.6), 700,000) = 420,000
    # tier_1_extra = 420,000 * 0.006 = 2,520
    # total = 1,800 + 2,520 = 4,320
    wa_senior_disabled_property_tax_exemption: 4_320

- name: Case 2, Tier 2 senior in King County with $700k assessed value.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 70_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Tier 2 (T1 $60k < income $70k <= T2 $72k).
    # tier_2_exempt_value = min(min(max(50,000, 700,000 * 0.35), 70,000), 700,000)
    #                     = min(min(245,000, 70,000), 700,000) = 70,000
    # tier_2_extra = 70,000 * 0.006 = 420
    # total = 1,800 + 420 = 2,220
    wa_senior_disabled_property_tax_exemption: 2_220

- name: Case 3, Tier 3 senior in King County receives only the full-exempt share.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 80_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Tier 3 (T2 $72k < income $80k <= T3 $84k).
    # Tier 3 has no valuation-based addition.
    # total = full_exempt = 6,000 * 0.30 = 1,800
    wa_senior_disabled_property_tax_exemption: 1_800

- name: Case 4, ineligible household receives no benefit.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 100_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Income $100k > T3 $84k -> ineligible
    wa_senior_disabled_property_tax_exemption: 0

- name: Case 5, negative countable income does not inflate benefit beyond statutory cap.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: -5_000_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Same as Tier 1 case — negative income falls under Tier 1, but the
    # exemption is derived from positive tax bill and valuation, so it
    # cannot exceed the Tier 1 amount.
    wa_senior_disabled_property_tax_exemption: 4_320

- name: Case 6, zero real_estate_taxes yields zero benefit even when income-eligible.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 0
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # No tax bill -> exemption is zero regardless of tier.
    wa_senior_disabled_property_tax_exemption: 0

- name: Case 7, missing assessed value falls back to tier 3 share only.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        # assessed_property_value defaults to 0
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Without assessed value, regular_rate is 0, so the valuation-based
    # tier 1 extra collapses to 0 and only the tier 3 share remains.
    # total = 6,000 * 0.30 = 1,800
    wa_senior_disabled_property_tax_exemption: 1_800

- name: Case 8, OR state household receives no benefit.
  period: 2024
  input:
    people:
      person1:
