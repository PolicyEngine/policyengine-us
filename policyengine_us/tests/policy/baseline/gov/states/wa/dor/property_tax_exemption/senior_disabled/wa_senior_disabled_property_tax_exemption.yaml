- name: Case 5, negative countable income does not inflate benefit beyond cap.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: -5_000_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Negative income still falls under Tier 1
    # Benefit capped at real_estate_taxes/12 * tier_1_rate, never inflated
    # $500 * 0.8 = $400
    wa_senior_disabled_property_tax_exemption: 4_800

- name: Case 6, zero real_estate_taxes yields zero benefit even when eligible.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 0
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Tier 1 eligible, but no tax bill -> 0 * 0.8 = 0
    wa_senior_disabled_property_tax_exemption: 0

- name: Case 7, zero AGI senior in King County qualifies for Tier 1.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 4_800
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 0
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # No add-back categories present, income = 0 <= Tier 1 -> Tier 1
    # 4800/12 * 0.8 = 320
    wa_senior_disabled_property_tax_exemption: 3_840

- name: Case 8, OR state household receives no benefit (defined_for filter).
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 30_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: OR
  output:
    # defined_for = StateCode.WA on wa_pte_eligible blocks the benefit
    wa_senior_disabled_property_tax_exemption: 0

- name: Case 9, age 60 with SSDI is benefit-eligible via disability path.
  period: 2024
  input:
    people:
      person1:
        age: 60
        social_security_disability: 12_000
        real_estate_taxes: 6_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 30_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Age 60 < 61 (not age-eligible), but SSDI > 0 (disability-eligible)
    # Tier 1 (30k <= 60k); 6000/12 * 0.8 = 400
    wa_senior_disabled_property_tax_exemption: 4_800
