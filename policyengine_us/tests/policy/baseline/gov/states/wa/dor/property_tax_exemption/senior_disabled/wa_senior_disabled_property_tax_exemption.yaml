- name: Case 10, 2028 Tier 1 with ESSB 6162 expanded valuation exemption.
  period: 2028
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # King County 2027-2029: T1 $76k, T2 $89k, T3 $101k.
    # tier_3_exempt_share = 0.45 (state levy consolidated)
    # full_exempt = 6,000 * 0.45 = 2,700
    # regular_rate = (6,000 * 0.55) / 700,000 = 0.00471428...
    # tier_1_exempt_value = min(max(80,000, 700,000 * 0.8), 700,000) = 560,000
    # tier_1_extra = 560,000 * 0.00471428... = 2,640
    # total = 2,700 + 2,640 = 5,340
    wa_senior_disabled_property_tax_exemption: 5_340

- name: Case 11, 2028 Tier 2 hits the expanded $200k valuation cap.
  period: 2028
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 85_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # 2028 King: T1 $76k, T2 $89k, T3 $101k. $85k > T1, <= T2 -> Tier 2.
    # tier_2_exempt_value = min(min(max(70,000, 700,000 * 0.45), 200,000), 700,000)
    #                     = min(min(315,000, 200,000), 700,000) = 200,000
    # tier_2_extra = 200,000 * 0.00471428... = 942.857
    # total = 2,700 + 942.857 = 3,642.857
    wa_senior_disabled_property_tax_exemption: 3_642.857

- name: Case 12, 2017 pre-Part-2 era applies the 0.20 tier 3 share.
  period: 2017
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 4_000
        assessed_property_value: 250_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 38_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Pre-2020 statewide flat thresholds: T1=$30k, T2=$35k, T3=$40k.
    # AGI $38k > T2 ($35k) and <= T3 ($40k) -> Tier 3 (full-exempt share only).
    # Pre-2018 tier_3_exempt_share = 0.20 (state Part 2 did not yet exist).
    # exemption = 0.20 * 4,000 = 800.
    wa_senior_disabled_property_tax_exemption: 800

