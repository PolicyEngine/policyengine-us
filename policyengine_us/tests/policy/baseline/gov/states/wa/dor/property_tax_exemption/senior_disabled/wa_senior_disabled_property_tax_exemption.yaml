- name: Case 17, 2027 ESSB 6162 raises share, valuation, and adds standard deduction.
  period: 2027
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
        filing_status: SINGLE
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Identical household to Case 16 but in 2027:
    #   (i) tier_3_exempt_share rises 0.30 -> 0.45
    #  (ii) tier_1 valuation params rise to $80k @ 0.8 (tier_2 to $70k @ 0.45 cap $200k)
    # (iii) standard deduction = $7,500 (single) for CDI
    # CDI = 40,000 - max(0, 7,500) = 32,500 -> still Tier 1 (King 2027 T1 $76k).
    # full_exempt = 6,000 * 0.45 = 2,700
    # regular_rate = (6,000 * 0.55) / 700,000 = 0.00471428...
    # tier_1_exempt_value = min(max(80,000, 700,000 * 0.8), 700,000) = 560,000
    # tier_1_extra = 560,000 * 0.00471428... = 2,640
    # total = 2,700 + 2,640 = 5,340
    wa_senior_disabled_property_tax_exemption: 5_340

- name: Case 18, 2028 Tier 1 with missing assessed value collapses to tier 3 share.
  period: 2028
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 5_000
        # assessed_property_value omitted -> defaults to 0
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # King 2028: T1 $76k, T2 $89k, T3 $101k. AGI $40k -> Tier 1.
    # Without assessed_property_value, regular_rate = 0, so tier_1_extra
    # collapses to 0 and only the tier 3 share remains.
    # exemption = tier_3_exempt_share * real_estate_taxes
    #           = 0.45 * 5,000 = 2,250
    wa_senior_disabled_property_tax_exemption: 2_250
