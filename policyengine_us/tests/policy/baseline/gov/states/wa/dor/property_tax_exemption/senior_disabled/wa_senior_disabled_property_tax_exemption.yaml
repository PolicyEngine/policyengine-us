- name: Case 1, Tier 1 senior in King County receives 80% reduction.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Tier 1 (income $40k <= $60k T1)
    # Annual taxes $6,000 -> monthly $500
    # Monthly benefit: $500 * 0.8 = $400
    wa_senior_disabled_property_tax_exemption: 4_800

