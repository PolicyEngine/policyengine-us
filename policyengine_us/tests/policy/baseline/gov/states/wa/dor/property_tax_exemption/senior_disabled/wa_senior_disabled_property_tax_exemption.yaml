      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: -5_000_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
