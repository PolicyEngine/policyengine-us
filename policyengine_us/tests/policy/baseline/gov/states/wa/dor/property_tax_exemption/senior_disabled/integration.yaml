# Integration tests for Washington Senior Citizens and Disabled Persons
# Property Tax Exemption (RCW 84.36.379-389; WAC 458-16A-100..150).
#
# Eligibility: someone who is the tax-unit head (or spouse in a joint return)
# satisfies the age threshold (62 pre-2020, 61 from 2020) OR is_disabled;
# the tax unit owns an occupied residence (real_estate_taxes > 0);
# combined disposable income (annual) <= Tier 3 threshold for the household's county.
#
# Combined disposable income (RCW 84.36.383):
#   add-backs: AGI + tax_exempt_pension_income + military_basic_pay + veterans_benefits
#              + tax_exempt_social_security + tax_exempt_interest_income
#              + wa_pte_cotenant_disposable_income (occupying cotenants' AGI)
#   itemized deductions: prescription_expense + medical_expense_health_insurance_premiums
#                        + other_medical_expenses + long_term_health_insurance_premiums
#   standard deduction option (2027+): $7,500 per claimant + $7,500 if joint filing;
#   claimant takes the larger of itemized or standard.
#
# Exemption (RCW 84.36.381(5)) — derived from valuation:
#   full_exempt = tier_3_exempt_share * real_estate_taxes
#     (excess levies + state property tax + lid-lift portion;
#      statewide approximation: 0.20 pre-2018, 0.30 in 2018-2026, 0.45 from 2027)
#   regular_rate = (1 - tier_3_exempt_share) * real_estate_taxes / assessed_property_value
#   tier 2 extra = regular_rate * min(min(max(dollar_floor, valuation_pct * value), cap), value)
#   tier 1 extra = regular_rate * min(max(dollar_floor, valuation_pct * value), value)
#   Tier 1 total = full_exempt + tier_1_extra
#   Tier 2 total = full_exempt + tier_2_extra
#   Tier 3 total = full_exempt only

- name: Case 1, eligible senior in King County qualifies for Tier 1.
  period: 2024
  input:
    people:
      person1:
        age: 65
        real_estate_taxes: 7_200
        assessed_property_value: 800_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # CDI = 40,000 (no add-backs / deductions); King 2024 T1=$60k -> Tier 1.
    # full_exempt = 7,200 * 0.30 = 2,160
    # regular_rate = (7,200 * 0.70) / 800,000 = 0.0063
    # tier_1_exempt_value = min(max(60,000, 800,000 * 0.6), 800,000) = 480,000
    # tier_1_extra = 480,000 * 0.0063 = 3,024
    # total = 2,160 + 3,024 = 5,184
    wa_pte_income_eligible: true
    wa_pte_eligible: true
    wa_pte_tier: 1
    wa_senior_disabled_property_tax_exemption: 5_184

- name: Case 2, eligible disabled person under age threshold qualifies for Tier 1.
  period: 2024
  input:
    people:
      person1:
        age: 45
        is_disabled: true
        real_estate_taxes: 4_800
        assessed_property_value: 500_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 25_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # full_exempt = 4,800 * 0.30 = 1,440
    # regular_rate = (4,800 * 0.70) / 500,000 = 0.00672
    # tier_1_exempt_value = min(max(60,000, 500,000 * 0.6), 500,000) = 300,000
    # tier_1_extra = 300,000 * 0.00672 = 2,016
    # total = 1,440 + 2,016 = 3,456
    wa_pte_eligible: true
    wa_pte_tier: 1
    wa_senior_disabled_property_tax_exemption: 3_456

- name: Case 3, King County income just at Tier 2 boundary triggers Tier 2 exemption.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 72_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # 72,000 > T1 ($60k) and <= T2 ($72k) -> Tier 2
    # full_exempt = 6,000 * 0.30 = 1,800
    # regular_rate = (6,000 * 0.70) / 700,000 = 0.006
    # tier_2_exempt_value = min(min(max(50,000, 700,000 * 0.35), 70,000), 700,000) = 70,000
    # tier_2_extra = 70,000 * 0.006 = 420
    # total = 1,800 + 420 = 2,220
    wa_pte_eligible: true
    wa_pte_tier: 2
    wa_senior_disabled_property_tax_exemption: 2_220

- name: Case 4, King County income at Tier 3 boundary gets only full-exempt share.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 84_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # 84,000 > T2 ($72k) and <= T3 ($84k) -> Tier 3
    # Tier 3 has no valuation-based addition.
    # total = 6,000 * 0.30 = 1,800
    wa_pte_eligible: true
    wa_pte_tier: 3
    wa_senior_disabled_property_tax_exemption: 1_800

