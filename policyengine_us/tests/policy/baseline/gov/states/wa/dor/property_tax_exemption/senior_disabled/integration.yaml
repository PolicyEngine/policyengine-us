    wa_senior_disabled_property_tax_exemption: 0

- name: Case 8, same income eligible in King County but ineligible in Adams County.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 4_800
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 50_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: ADAMS_COUNTY_WA
  output:
    # Adams County 2024: T1=$30,300, T2=$36,000, T3=$41,000
    # 50_000 > T3 (41_000) -> ineligible
    wa_pte_income_eligible: false
    wa_pte_eligible: false
    wa_pte_tier: 0
    wa_senior_disabled_property_tax_exemption: 0

- name: Case 9, negative countable income does not inflate benefit beyond cap.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: -5_000_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # combined_disposable_income = -5,000,000 still falls under Tier 1
    # Benefit must be capped at monthly real_estate_taxes * tier_1_rate, not inflated
    # 6_000 / 12 = 500; 500 * 0.8 = 400
    wa_pte_eligible: true
    wa_pte_tier: 1
    wa_senior_disabled_property_tax_exemption: 4_800

- name: Case 10, 2019 King County pre-2020 thresholds - $40k income at Tier 3 boundary.
  period: 2019
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Pre-2020 statewide flat: T1=$30k, T2=$35k, T3=$40k
    # Same income/county pair gets a different tier across years; verifies
    # historical thresholds load correctly (vs Case 1 where 40k = Tier 1 in 2024)
    wa_pte_eligible: true
    wa_pte_tier: 3
    # 6_000/12 * 0.4 = 200
    wa_senior_disabled_property_tax_exemption: 2_400

- name: Case 11, OR state household receives no benefit.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 30_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: OR
  output:
    # defined_for = StateCode.WA on wa_pte_eligible blocks calculation
    wa_pte_eligible: false
    wa_senior_disabled_property_tax_exemption: 0

- name: Case 12, married couple combined AGI determines tier.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 4_800
      person2:
        age: 68
    tax_units:
      tax_unit:
        members: [person1, person2]
        adjusted_gross_income: 80_000
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Combined AGI 80k > T2 72k and <= T3 84k -> Tier 3
    # 4800/12 * 0.4 = 160
    wa_pte_eligible: true
    wa_pte_tier: 3
    wa_senior_disabled_property_tax_exemption: 1_920
