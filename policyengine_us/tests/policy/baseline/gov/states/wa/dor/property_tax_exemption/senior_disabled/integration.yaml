- name: Case 8, same income eligible in King County but ineligible in Adams County.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 4_800
        assessed_property_value: 350_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 50_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: ADAMS_COUNTY_WA
  output:
    # Adams County 2024: T1 $30,300, T2 $36,000, T3 $41,000
    # 50,000 > T3 41,000 -> ineligible (proves county threshold lookup)
    wa_pte_income_eligible: false
    wa_pte_eligible: false
    wa_pte_tier: 0
    wa_senior_disabled_property_tax_exemption: 0

- name: Case 9, negative countable income does not inflate benefit beyond statutory cap.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: -5_000_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Negative income still classifies as Tier 1; the exemption is derived from
    # positive tax bill and valuation so it cannot exceed the statutory amount.
    # Same as Case 3's Tier 1 math = 4,320
    wa_pte_eligible: true
    wa_pte_tier: 1
    wa_senior_disabled_property_tax_exemption: 4_320

- name: Case 10, 2019 pre-Part-2 tier 3 share applies.
  period: 2019
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # 2019 King thresholds (statewide flat): T1 $30k, T2 $35k, T3 $40k.
    # 40,000 > T2 35,000 and <= T3 40,000 -> Tier 3 (full_exempt only).
    # 2018-2026 tier_3_exempt_share = 0.30.
    # total = 6,000 * 0.30 = 1,800
    wa_pte_eligible: true
    wa_pte_tier: 3
    wa_senior_disabled_property_tax_exemption: 1_800

