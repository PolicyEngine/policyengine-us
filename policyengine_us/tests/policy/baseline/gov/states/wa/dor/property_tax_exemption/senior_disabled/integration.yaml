  period: 2024
  input:
    people:
      person1:
        age: 50
        social_security_disability: 0
        real_estate_taxes: 5_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
