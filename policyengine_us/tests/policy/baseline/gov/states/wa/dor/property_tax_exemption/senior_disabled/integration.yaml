    wa_senior_disabled_property_tax_exemption: 0

- name: Case 12, married couple combined AGI determines tier.
  period: 2024
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 4_800
        assessed_property_value: 500_000
      person2:
        age: 68
    tax_units:
      tax_unit:
        members: [person1, person2]
        adjusted_gross_income: 80_000
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # Combined AGI 80k > T2 72k and <= T3 84k -> Tier 3 (full_exempt only)
    # total = 4,800 * 0.30 = 1,440
    wa_pte_eligible: true
    wa_pte_tier: 3
    wa_senior_disabled_property_tax_exemption: 1_440

- name: Case 13, 2028 Tier 1 with ESSB 6162 expanded valuation exemption.
  period: 2028
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # King 2027-2029: T1 $76k, T2 $89k, T3 $101k. $40k <= T1 -> Tier 1.
    # 2027+ tier_3_exempt_share = 0.45.
    # full_exempt = 6,000 * 0.45 = 2,700
    # regular_rate = (6,000 * 0.55) / 700,000 = 0.00471428...
    # tier_1_exempt_value = min(max(80,000, 700,000 * 0.8), 700,000) = 560,000
    # tier_1_extra = 560,000 * 0.00471428... = 2,640
    # total = 2,700 + 2,640 = 5,340
    wa_pte_eligible: true
    wa_pte_tier: 1
    wa_senior_disabled_property_tax_exemption: 5_340

- name: Case 14, 2028 standard deduction lowers combined disposable income.
  period: 2028
  input:
    people:
      person1:
        age: 70
        real_estate_taxes: 6_000
        assessed_property_value: 700_000
        other_medical_expenses: 1_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 75_000
        filing_status: SINGLE
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # itemized = 1,000; standard (single) = 7,500.
    # CDI = 75,000 - max(1,000, 7,500) = 67,500
    # King 2028: T1 $76k -> Tier 1 (without standard, CDI would have been
    # 74,000, also Tier 1; this case primarily exercises the deduction path).
    wa_pte_combined_disposable_income: 67_500
    wa_pte_tier: 1
    wa_senior_disabled_property_tax_exemption: 5_340
