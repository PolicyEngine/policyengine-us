- name: Case 1, Missouri household in a DHSS CSFP site county.
  period: 2026
  input:
    people:
      person1:
        age: 65
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MO
        county_str: JACKSON_COUNTY_MO
  output:
    mo_dhss_csfp_county_eligible: true

