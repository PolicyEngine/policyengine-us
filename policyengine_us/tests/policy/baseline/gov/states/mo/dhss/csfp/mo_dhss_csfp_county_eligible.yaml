- name: Missouri household in a DHSS CSFP site county
  period: 2025
  input:
    people:
      person:
        age: 65
    spm_units:
      spm_unit:
        members: [person]
    households:
      household:
        members: [person]
        state_code: MO
        county_str: JACKSON_COUNTY_MO
  output:
    mo_dhss_csfp_county_eligible: true

