- name: Case 14, adult with nominal SSI receipt is still eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi: 0.01
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # SAB eligibility is independent of SSI receipt; nominal SSI does not
    # affect this — the SAB income test uses mo_sab_countable_income against
    # the consolidated standard.
    mo_ssp_eligible: true

- name: Case 15, adult with valid eligibility outside Missouri is not eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi: 200
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    # defined_for = StateCode.MO filters non-MO residents to false.
    mo_ssp_eligible: false

- name: Case 16, SAB applicant with countable income above the monthly limit is not eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi: 200
        employment_income: 30_000
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # FY2026 SAB monthly income limit $1,073; mo_sab_countable_income for
    # blind earner with $30,000 annual employment income exceeds the limit
    # after SSI-style exclusions, so SAB pathway fails.
    mo_ssp_eligible: false

- name: Case 17, SAB applicant with non-SSI income at or below the monthly limit is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi: 200
        employment_income: 12_000
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # FY2026 SAB monthly income limit $1,073; mo_sab_countable_income after
    # SSI-style exclusions ($20 general + $65 earned + 50% remainder) on
    # $1,000 monthly earned income is ~$458/month, within the limit, so SAB
    # pathway passes.
    mo_ssp_eligible: true

- name: Case 18, SNC resident who is not aged, blind, or disabled is not eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 50
        is_blind: false
        is_disabled: false
        social_security: 600
        mo_ssp_living_arrangement: RCF_LEVEL_I
        mo_snc_facility_base_charge: 1_000
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # Facility cost exceeds income, but SNC still requires aged, blind, or
    # disabled categorical eligibility.
    mo_ssp_eligible: false
