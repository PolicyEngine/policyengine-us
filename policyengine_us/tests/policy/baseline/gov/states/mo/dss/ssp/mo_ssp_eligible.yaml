- name: Case 1, blind adult receiving SSI in MO with SAB arrangement is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi: 200
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    mo_ssp_eligible: true

- name: Case 1b, blind adult with no SSI in MO with SAB arrangement is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi: 0
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # SAB can be paid even when SSI is zero; the claimant must apply for or
    # receive SSI, but that application requirement is not modeled.
    mo_ssp_eligible: true

- name: Case 2, SNC applicant with income above the facility base charge is not eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        ssi: 0
        social_security: 18_000  # $1,500/month annualized
        mo_ssp_living_arrangement: RCF_LEVEL_I
        mo_snc_facility_base_charge: 1_300
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # SNC need test fails: $1,500 countable income exceeds $1,300 facility
    # base charge, so no SNC grant is payable regardless of SSI receipt.
    mo_ssp_eligible: false

- name: Case 2b, SNC applicant with no SSI but income below the facility charge is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        ssi: 0
        social_security: 14_400  # $1,200/month annualized
        mo_ssp_living_arrangement: RCF_LEVEL_I
        mo_snc_facility_base_charge: 1_300
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # SNC need test passes: $1,200 countable income is below the $1,300
    # facility base charge. SSI receipt is not required — the facility-cost
    # need test handles SNC income eligibility.
    mo_ssp_eligible: true

- name: Case 3, adult receiving SSI not in MO is not eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        ssi: 500
        mo_ssp_living_arrangement: RCF_LEVEL_I
    households:
      household:
        members: [person1]
        state_code: KS
  output:
    # defined_for = StateCode.MO filters non-MO residents.
    mo_ssp_eligible: false

