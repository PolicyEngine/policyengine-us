- name: Case 1, SAB applicant at the individual resource limit is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi_countable_resources: 6_068.80
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    mo_ssp_resource_eligible: true

- name: Case 2, SAB applicant above the individual resource limit is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi_countable_resources: 6_068.81
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    mo_ssp_resource_eligible: false

- name: Case 3, married SAB applicant uses the couple resource limit.
  period: 2026-01
  input:
    people:
      person1:
        age: 50
        is_tax_unit_head: true
        is_blind: true
        ssi_countable_resources: 6_500
        mo_ssp_living_arrangement: SAB
      person2:
        age: 50
        is_tax_unit_spouse: true
        ssi_countable_resources: 5_500
        mo_ssp_living_arrangement: NONE
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
  output:
    # Combined resources are above the individual limit but below the
    # $12,137.55 couple limit.
    mo_ssp_resource_eligible: [true, true]

- name: Case 4, SNC applicant above the individual resource limit is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged: true
        ssi_countable_resources: 6_068.81
        mo_ssp_living_arrangement: RCF_LEVEL_I
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    mo_ssp_resource_eligible: false
