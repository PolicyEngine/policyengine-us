- name: Case 1, SNF non-Medicaid resident receiving SSI in MO gets PNA.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        ssi: 500
        mo_ssp_living_arrangement: SNF_OR_ICF_NON_MEDICAID
        mo_snc_facility_base_charge: 1_000
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    mo_ssp_personal_needs_allowance: 50

- name: Case 2, RCF Level I resident gets PNA.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        ssi: 500
        mo_ssp_living_arrangement: RCF_LEVEL_I
        mo_snc_facility_base_charge: 1_000
    households:
