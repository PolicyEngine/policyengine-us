- name: NONE arrangement at age 21 falls to the SNC 21+ threshold and passes.
  period: 2026-01
  input:
    people:
      person1:
        age: 21
        mo_ssp_living_arrangement: NONE
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # Non-SAB arrangements use the SNC threshold; the category gate (tested
    # separately in mo_ssp_category_eligible) rejects NONE downstream.
    mo_ssp_age_eligible: true
