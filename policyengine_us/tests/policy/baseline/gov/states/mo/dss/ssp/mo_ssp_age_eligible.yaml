- name: SAB age 17 is below the 18+ threshold.
  period: 2026-01
  input:
    people:
      person1:
        age: 17
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    mo_ssp_age_eligible: false

- name: SAB age 18 exactly meets the threshold.
  period: 2026-01
  input:
    people:
      person1:
        age: 18
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    mo_ssp_age_eligible: true

