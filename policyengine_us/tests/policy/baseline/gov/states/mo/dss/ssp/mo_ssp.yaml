- name: Case 17, negative self-employment income does not inflate SAB benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi: 12  # $1/month annualized
        self_employment_income: -60_000_000
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # mo_ssp formula reads ssi only. Negative SE income cannot inflate output;
    # benefit is bounded by max(maximum payment - ssi, 0) = $827.
    mo_ssp: 827

