- name: Case 8, SNC applicant with no SSI but income below facility charge gets a grant.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        ssi: 0
        social_security: 14_400  # $1,200/month annualized
        mo_ssp_living_arrangement: RCF_LEVEL_I
        mo_snc_facility_base_charge: 1_300
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # SNC need: $1,300 - $1,200 = $100, below the $156 RCF Level I cap.
    # Plus $50 PNA (paid to all SNC tiers). $100 + $50 = $150.
    mo_ssp: 150

