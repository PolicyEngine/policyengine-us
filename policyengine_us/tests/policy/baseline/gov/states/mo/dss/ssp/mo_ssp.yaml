- name: Case 1, SAB recipient with low SSI receives BP rate minus SSI.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi: 2_400  # $200/month annualized; SSI is YEAR-defined
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # FY2026 BP rate $917, cap $762.
    # max(917 - 200, 0) = 717; min(717, 762) = 717.
    mo_ssp: 717

- name: Case 2, SAB recipient with full federal SSI gets zero.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi: 11_604  # $967/month annualized
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # FY2026 BP rate $917; max(917 - 967, 0) = 0; min(0, 762) = 0.
    mo_ssp: 0

- name: Case 3, SAB recipient with $1 SSI exceeds cap so cap binds.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi: 1
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # max(917 - 1, 0) = 916; min(916, 762) = 762 (cap binds).
    mo_ssp: 762

