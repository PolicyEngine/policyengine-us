- name: Case 1, SAB recipient with low SSI receives maximum payment minus SSI.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi: 2_400  # $200/month annualized; SSI is YEAR-defined
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # FY2026 maximum SAB payment $917 - $200 SSI = $717.
    mo_ssp: 717

- name: Case 2, SAB recipient with SSI above the maximum payment gets zero.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        ssi: 11_604  # $967/month annualized
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # FY2026 maximum SAB payment $917; max(917 - 967, 0) = 0.
    mo_ssp: 0

