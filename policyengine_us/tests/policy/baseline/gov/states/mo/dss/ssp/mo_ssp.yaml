        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # FY2026 maximum SAB payment $917; max(917 - 967, 0) = 0.
    ssi: 967
    mo_ssp: 0

