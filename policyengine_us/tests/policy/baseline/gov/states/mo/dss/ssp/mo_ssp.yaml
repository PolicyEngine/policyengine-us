- name: Case 21, resident in a Medicaid facility receives zero.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        ssi: 500
        mo_ssp_living_arrangement: NONE
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # MOSSPLivingArrangement has no enum value for Title XIX Medicaid
    # facilities; residents of those facilities are recorded as NONE and
    # excluded from category eligibility, so SNC pays nothing.
    mo_ssp: 0

