- name: Case 5, FY2025 Missouri couple with one blind spouse receiving SSI.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 65
        is_blind: true
        is_ssi_aged: true
        ssi: 200  # $200/month
        mo_ssp_living_arrangement: SAB
      person2:
        age: 63
        is_ssi_aged: true
        ssi: 0
        mo_ssp_living_arrangement: NONE
    tax_units:
      tax_unit:
        members: [person1, person2]
    marital_units:
      marital_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
  output:
    # FY2025 maximum SAB payment $828 - $200 = $628 for blind spouse.
    # Other spouse: ssi == 0 and arrangement NONE => not eligible => $0.
    mo_ssp_eligible: [true, false]
    mo_ssp: [628, 0]

