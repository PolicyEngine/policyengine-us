- name: Case 1, blind Missouri adult with low SSI receives SAB grant.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        is_ssi_disabled: true
        ssi: 200  # $200/month
        mo_ssp_living_arrangement: SAB
    tax_units:
      tax_unit:
        members: [person1]
    marital_units:
      marital_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # FY2026 maximum SAB payment $917 - $200 SSI = $717.
    mo_ssp_eligible: true
    mo_ssp: 717
    # SAB pathway: no PNA add-on.
    mo_ssp_personal_needs_allowance: 0

- name: Case 2, aged Missouri resident in SNF non-Medicaid receives SNC plus PNA.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 75
        is_ssi_aged: true
        ssi: 500
        mo_ssp_living_arrangement: SNF_OR_ICF_NON_MEDICAID
        mo_snc_facility_base_charge: 1_000
    tax_units:
      tax_unit:
        members: [person1]
    marital_units:
      marital_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # SNC SNF base $390 + $50 PNA = $440.
    mo_ssp_eligible: true
    mo_ssp_personal_needs_allowance: 50
    mo_ssp: 440

