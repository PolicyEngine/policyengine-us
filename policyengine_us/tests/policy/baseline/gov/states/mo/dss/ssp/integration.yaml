- name: Case 8, Missouri couple both eligible in RCF Level II each receive the per-person amount.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 65
        is_ssi_aged: true
        ssi: 500
        mo_ssp_living_arrangement: RCF_LEVEL_II_OR_ALF
        mo_snc_facility_base_charge: 1_000
      person2:
        age: 65
        is_ssi_aged: true
        ssi: 500
        mo_ssp_living_arrangement: RCF_LEVEL_II_OR_ALF
        mo_snc_facility_base_charge: 1_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    marital_units:
      marital_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
  output:
    # SNC formula is per-person; both spouses eligible so each gets
    # $292 base + $50 PNA = $342.
    mo_ssp_eligible: [true, true]
    mo_ssp: [342, 342]
