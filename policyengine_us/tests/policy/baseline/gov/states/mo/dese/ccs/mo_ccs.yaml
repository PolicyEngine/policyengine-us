      person1:
        age: 30
        employment_income: 48_000
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 20
        mo_ccs_provider_type: LICENSED_CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        mo_ccs_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 30_000
    households:
      household:
        members: [person1, person2]
        state_code: MO
        county: JACKSON_COUNTY_MO
  output:
    # Income 48,000/yr = 4,000/mo. Enrolled -> transitional limit 4,265.25 ->
    # eligible. FPL ratio = 4,000 / 1,762.50 = 2.27 -> TCC3 funding 0.50.
    # Size 2 income 4,000 -> tier 10 full fee $10/day * 20 = $200 copay.
    # Reimbursement = min($96 * 20, $2,500) = $1,920.
    # Benefit = 0.50 * max(1,920 - 200, 0) = 0.50 * 1,720 = $860.
    mo_ccs: 860

- name: Case 9, family with two children, one with special needs.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_disabled: true
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 20
        mo_ccs_provider_type: LICENSED_CENTER
      person3:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 20
        mo_ccs_provider_type: LICENSED_CENTER
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 120_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: MO
        county: JACKSON_COUNTY_MO
  output:
    # Size 3, income 30,000/yr = 2,500/mo (above SMI floor 1,851.94; not TANF).
    # New applicant: 2,500 <= 150% FPL size 3 (3,331.25) -> eligible; funding 1.0.
    # Disabled preschooler -> special-needs rate $89.4625/day (PS market +25%);
    # infant -> base rate $96/day.
    # Reimbursement = (89.4625 + 96) * 20 = $3,709.25 (expenses not binding).
    # Copay: only the non-disabled child is charged; size 3 income 2,500 ->
    #   tier 7 full fee $5/day * 20 = $100. Disabled child waived.
    # Benefit = max(3,709.25 - 100, 0) = $3,609.25.
    mo_ccs: 3_609.25
