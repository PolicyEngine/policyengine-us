# MO CCS care time unit tests
# mo_ccs_time_category is Person, MONTH (enum: FULL_TIME, HALF_TIME,
# PART_TIME). From childcare_hours_per_week: part 0.5-<3, half 3-<5,
# full 5-<12. Default (0 hours) -> PART_TIME (lowest bracket).

- name: Case 1, thirty hours per week is full time.
  period: 2025-01
  input:
    people:
      person1:
        childcare_hours_per_week: 30
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # 30 >= 5 -> FULL_TIME.
    mo_ccs_time_category: FULL_TIME

- name: Case 2, five hours per week is full time at boundary.
  period: 2025-01
  input:
    people:
      person1:
        childcare_hours_per_week: 5
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # Threshold 5 (inclusive) -> FULL_TIME.
    mo_ccs_time_category: FULL_TIME

- name: Case 3, four hours per week is half time.
  period: 2025-01
  input:
    people:
      person1:
        childcare_hours_per_week: 4
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # 3 <= 4 < 5 -> HALF_TIME.
    mo_ccs_time_category: HALF_TIME

- name: Case 4, three hours per week is half time at boundary.
  period: 2025-01
  input:
    people:
      person1:
        childcare_hours_per_week: 3
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # Threshold 3 (inclusive) -> HALF_TIME.
    mo_ccs_time_category: HALF_TIME

- name: Case 5, two hours per week is part time.
  period: 2025-01
  input:
    people:
      person1:
        childcare_hours_per_week: 2
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # 0.5 <= 2 < 3 -> PART_TIME.
    mo_ccs_time_category: PART_TIME

- name: Case 6, zero hours defaults to part time.
  period: 2025-01
  input:
    people:
      person1:
        childcare_hours_per_week: 0
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # Lowest bracket (threshold 0) -> PART_TIME.
    mo_ccs_time_category: PART_TIME
