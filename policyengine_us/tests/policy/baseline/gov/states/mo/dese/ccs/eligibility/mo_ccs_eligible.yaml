# MO CCS overall eligibility tests
# mo_ccs_eligible is SPMUnit, MONTH.
# Requires: an eligible child AND asset eligible AND
# ((income eligible AND activity eligible) OR protective services).
# Protective-services children bypass BOTH the income and activity tests
# (5 CSR 25-200.060(7)(B)). State scope is MO.

- name: Case 1, eligible working family in MO.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
  output:
    mo_ccs_eligible: true

- name: Case 2, ineligible due to income above 150 percent FPL.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
  output:
    # 60,000/yr = 5,000/mo > 2,643.75 (150% FPL size 2) -> income ineligible.
    mo_ccs_eligible: false

- name: Case 3, ineligible with no eligible child.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
        weekly_hours_worked: 30
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    mo_ccs_eligible: false

- name: Case 4, ineligible due to no activity.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
        weekly_hours_worked: 0
        is_full_time_student: false
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
  output:
    # No work, not a student, no protective pathway -> ineligible.
    mo_ccs_eligible: false

- name: Case 5, protective services family with no activity is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
        weekly_hours_worked: 0
        is_full_time_student: false
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_in_foster_care: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
  output:
    # Foster (protective-services) child bypasses the activity requirement; the
    # family is also within the income limit, so the unit is eligible.
    mo_ccs_eligible: true

- name: Case 6, non-MO family ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    mo_ccs_eligible: false

- name: Case 7, protective services child above 150 percent FPL is still eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_in_foster_care: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
  output:
    # 60,000/yr = 5,000/mo > 2,643.75 (150% FPL size 2) -> income ineligible,
    # but the foster (protective-services) child bypasses the income maximum
    # (5 CSR 25-200.060(7)(B)), so the unit is eligible.
    mo_ccs_income_eligible: false
    mo_ccs_eligible: true

- name: Case 8, homeless family above the income limit with no work is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000
        immigration_status: CITIZEN
        weekly_hours_worked: 0
        is_full_time_student: false
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
        is_homeless: true
  output:
    # Homelessness satisfies the need-for-care/activity requirement (Manual
    # sec. 6.8), but unlike the (7)(A) protective categories it does NOT
    # bypass the income test. 60,000/yr = 5,000/mo > 2,643.75 (150% FPL size 2)
    # -> income ineligible, no protective pathway, so the unit is ineligible.
    mo_ccs_income_eligible: false
    mo_ccs_activity_eligible: true
    mo_ccs_protective_services: [false, false]
    mo_ccs_eligible: false

- name: Case 9, homeless family within the income limit with no work is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        immigration_status: CITIZEN
        weekly_hours_worked: 0
        is_full_time_student: false
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
        is_homeless: true
  output:
    # 12,000/yr = 1,000/mo < 2,643.75 (150% FPL size 2) -> income eligible.
    # Homelessness satisfies the activity/need-for-care requirement (Manual
    # sec. 6.8), so the unit is eligible without any work activity.
    mo_ccs_income_eligible: true
    mo_ccs_activity_eligible: true
    mo_ccs_eligible: true

- name: Case 10, protective-services family above the asset limit is still eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_in_foster_care: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_ccdf_asset_eligible: false
    households:
      household:
        members: [person1, person2]
        state_code: MO
  output:
    # Manual sec. 4.8 excludes applicants with a protective-services child from
    # the net-worth limit, so the foster child's protective pathway bypasses the
    # asset test -> eligible despite failing is_ccdf_asset_eligible.
    mo_ccs_eligible: true

- name: Case 11, non-protective family above the asset limit is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_ccdf_asset_eligible: false
    households:
      household:
        members: [person1, person2]
        state_code: MO
  output:
    # No protective pathway, so the asset test still applies -> ineligible.
    mo_ccs_eligible: false
