        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
  output:
    # Gross = 2,000/mo > SMI floor 1,499.19 -> floor does NOT bind.
    # Adjusted = 2,000 - 900 = 1,100, in (1090, 1199] -> tier 6.
    # Full unit fee tier 6 = $4.00/day. $4.00 * 20 * 1 = $80/mo.
    mo_ccs_copay: 80
