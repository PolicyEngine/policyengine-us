  output:
    # Gross = 2,000/mo > SMI floor 1,499.19 -> floor does NOT bind.
    # Adjusted = 2,000 - 1,100 = 900, in (872, 981] -> tier 4.
    # Full unit fee tier 4 = $2.00/day. $2.00 * 20 * 1 = $40/mo.
    mo_ccs_copay: 40

