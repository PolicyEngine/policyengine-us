# MO CCS sliding fee (copay) tests
# mo_ccs_copay is SPMUnit, MONTH.
# Tier looked up from copay/tier/size_N by monthly ADJUSTED gross income
# (gross countable income minus health_insurance_premiums; 5 CSR
# 25-200.060(3)(C)1). No case below sets health_insurance_premiums, so adjusted
# income equals gross countable income here. The daily fee comes from
# copay/daily_fee/{full,half,part}_unit by tier and the child's time unit;
# monthly fee = sum over paying children of daily_fee * attending days.
# A paying child is an eligible, non-disabled child attending care (days > 0).
# $1/year minimum (1/12 per month) applies when only-TANF or GROSS income < 25%
# SMI (the 25% SMI floor keys on gross income per Manual 2025.010 item 3).
#
# 2025 values used below (test period 2025-01, which uses 2025 FPG to match the
# Nov-2025 chart dollar bands and the 2025-10-01 copay schedule):
#   FPG size 2 = 21,150/yr. MO SMI base 2025 = 105,825.
#   SMI size 2 = 105,825 * 0.68 = 71,961/yr; 25% / 12 = $1,499.19/mo floor.
#   Size 2 tier bands (monthly income): tier 7 is >$1,199 up to $2,644.
#   Size 2 tier 8 (TCC1) is >$2,644.
#   Daily full/half/part fee: tier 7 = $5.00/$3.25/$2.25; tier 8 = $7.50/$3.75/$2.50.

- name: Case 1, full time child in a paid tier.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 20
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
  output:
    # Countable income = 24,000 / 12 = 2,000 > SMI floor 1,499.19 (not $1/yr).
    # Size 2: 1,199 < 2,000 <= 2,644 -> tier 7. Full unit fee = $5/day.
    # $5 * 20 days * 1 child = $100/mo.
    mo_ccs_copay: 100

