# MO CCS maximum daily benefit tests
# mo_ccs_maximum_daily_benefit is Person, MONTH, defined_for mo_ccs_eligible_child.
# = the gross daily base (or special-needs/PS) rate for the child's provider
#   type x region x age group x time category. This variable returns the gross
#   base rate; the transitional funding multiplier (80/60/50%) is applied
#   downstream in mo_ccs, not here.
# Rates from 2025 Rates Held Harmless 2.0 (Daytime Rates 2025), effective 2025-10-01.
# Test period 2025-01 uses 2025 FPG, matching the Nov-2025 chart dollar bands.

# === Provider type coverage (Region 1 dense urban, infant/toddler, full time) ===
- name: Case 1, licensed center dense urban infant full time.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 18_000
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        mo_ccs_provider_type: LICENSED_CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
        county: JACKSON_COUNTY_MO
  output:
    # Licensed center, dense urban, infant/toddler, full time = $96/day.
    mo_ccs_maximum_daily_benefit: [0, 96]

