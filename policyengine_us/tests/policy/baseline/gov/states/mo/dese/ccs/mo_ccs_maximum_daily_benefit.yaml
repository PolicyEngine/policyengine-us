# === Transitional funding multiplier ===
- name: Case 14, TCC1 family funded at 80 percent of base.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 33_840
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        mo_ccs_provider_type: LICENSED_CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        mo_ccs_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: MO
        county: JACKSON_COUNTY_MO
  output:
    # FPG size 2 = 21,150/yr -> 1,762.50/mo. Income 33,840/yr = 2,820/mo.
    # FPL ratio = 2,820 / 1,762.50 = 1.60 -> TCC1 funding rate 0.80.
    # Base $96/day -> 96 * 0.80 = $76.80/day.
    mo_ccs_maximum_daily_benefit: [0, 76.8]

