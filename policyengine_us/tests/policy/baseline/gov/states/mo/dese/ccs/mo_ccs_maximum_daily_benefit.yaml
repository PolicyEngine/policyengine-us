  output:
    # Income 31,940/yr = 2,661.67/mo. FPL ratio = 2,661.67 / 1,762.50 = 1.5101
    # > 1.5001 -> TCC1 funding rate 0.80.
    # Preschool dense urban base $50/day * 0.80 = $40/day.
    mo_ccs_maximum_daily_benefit: [0, 40]
