# === Transitional funding boundary (FPL ratio at exactly 150% vs just above) ===
- name: Case 17, FPL ratio exactly 150 percent is funded at the full base rate.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 31_725
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        mo_ccs_provider_type: LICENSED_CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MO
        county: JACKSON_COUNTY_MO
  output:
    # Income 31,725/yr = 2,643.75/mo. FPL ratio = 2,643.75 / 1,762.50 = 1.50
    # -> 1.50 not > 1.5001 -> traditional funding rate 1.0 (not TCC1).
    # Preschool dense urban base $50/day * 1.0 = $50/day.
    mo_ccs_maximum_daily_benefit: [0, 50]

- name: Case 18, FPL ratio just above 150 percent drops to the TCC1 funding rate.
