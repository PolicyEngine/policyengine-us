- name: Case 1, all criteria met, eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        is_ccdf_immigration_eligible_child: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_income_eligible: true
        is_ccdf_asset_eligible: true
        ct_c4k_meets_activity_test: true
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    ct_c4k_eligible: true

- name: Case 2, no eligible child, ineligible.
  period: 2025-01
  input:
    people:
