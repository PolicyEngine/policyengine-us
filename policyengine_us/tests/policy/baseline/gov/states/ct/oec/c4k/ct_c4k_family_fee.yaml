- name: Case 11, mixed earned and unearned income, fee applies.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 10_000
        social_security: 10_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        hhs_smi: 99_180
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Has earned income => fee applies
    # Monthly countable: (10,000 + 10,000) / 12 = 1,666.67
    # SMI at month: 8,265
    # Ratio: 1,666.67/8,265 = 0.2016 (20%-40% bracket)
    # Fee = 1,666.67 * 0.03 = 50.00
    ct_c4k_family_fee: 50.00

