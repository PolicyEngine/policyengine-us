- name: Case 1, income below 20% SMI, post-2025, fee waived.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_countable_income: 1_250
        hhs_smi: 99_180
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Monthly income: 1,250; SMI at month: 99,180/12 = 8,265
    # Ratio: 1,250/8,265 = 0.1512 (< 0.20 SMI)
    # Fee rate = 0%
    ct_c4k_family_fee: 0

