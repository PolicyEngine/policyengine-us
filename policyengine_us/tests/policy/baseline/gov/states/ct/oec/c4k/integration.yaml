- name: Case 1, low-income single parent, center care, Eastern.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 28
        employment_income: 30_000
        is_enrolled_in_ccdf: false
      person2:
        age: 3
        is_tax_unit_dependent: true
        childcare_hours_per_week: 40
        ct_c4k_provider_type: CENTER
        ct_c4k_provider_accredited: false
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 15_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: CT
        county_str: NEW_LONDON_COUNTY_CT
  output:
    ct_c4k_eligible_child: [false, true]
    ct_c4k_region: EASTERN
    ct_c4k_age_group: [SCHOOL_AGE, PRE_SCHOOL]
    ct_c4k_care_level: [QUARTER_TIME, FULL_TIME]
    # Monthly countable: 30,000 / 12 = 2,500
    ct_c4k_countable_income: 2_500
    ct_c4k_income_eligible: true
    ct_c4k_eligible: true
    # Jan 2025 center FT Eastern preschool = $228/week
    ct_c4k_payment_rate: [0, 228]
    # SMI ratio: 2,500 / 8,265 = 0.302 => 20%-40% bracket => 3%
    # Monthly fee: 2,500 * 0.03 = 75
    ct_c4k_family_fee: 75
    # Monthly approved: 228 * 52/12 = 988
    # Monthly expenses: 15,000/12 = 1,250
    # Capped: min(988, 1,250) = 988
    # Subsidy: max(988 - 75, 0) = 913
    ct_c4k: 913

