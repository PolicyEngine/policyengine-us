- name: Case 1, basic eligible family, subsidy equals rate minus fee.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000
      person2:
        age: 5
        ct_c4k_eligible_child: true
        ct_c4k_payment_rate: 228
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_eligible: true
        ct_c4k_family_fee: 75
        spm_unit_pre_subsidy_childcare_expenses: 20_000
    households:
      household:
        members: [person1, person2]
        state_code: CT
        county_str: NEW_LONDON_COUNTY_CT
  output:
    # Monthly approved cost: 228 * 52 / 12 = 988
    # Expenses at month: 20,000 / 12 = 1,666.67
    # Capped: min(988, 1,666.67) = 988
    # Subsidy: max(988 - 75, 0) = 913
    ct_c4k: 913

