- name: Case 6, expenses lower than approved cost, capped at expenses minus fee.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        ct_c4k_eligible_child: true
        ct_c4k_payment_rate: 300
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_eligible: true
        ct_c4k_family_fee: 83.33
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Monthly approved: 300 * 52 / 12 = 1,300
    # Expenses at month: 10,000 / 12 = 833.33
    # Capped: min(1,300, 833.33) = 833.33
    # Subsidy: max(833.33 - 83.33, 0) = 750
    ct_c4k: 750

- name: Case 7, zero fee, full subsidy equals capped cost.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        ct_c4k_eligible_child: true
        ct_c4k_payment_rate: 200
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_eligible: true
        ct_c4k_family_fee: 0
        spm_unit_pre_subsidy_childcare_expenses: 50_000
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Monthly approved: 200 * 52 / 12 = 866.67
    # Expenses at month: 50,000 / 12 = 4,166.67
    # Capped: min(866.67, 4,166.67) = 866.67
    # Subsidy: max(866.67 - 0, 0) = 866.67
    ct_c4k: 866.67
