  output:
    ct_c4k: 0

- name: Case 3, expenses less than fee, subsidy is zero.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        ct_c4k_eligible_child: true
        ct_c4k_payment_rate: 300
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_eligible: true
        ct_c4k_family_fee: 1_250
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Monthly approved: 300 * 52 / 12 = 1,300
    # Expenses at month: 10,000 / 12 = 833.33
    # Capped: min(1,300, 833.33) = 833.33
    # max(833.33 - 1,250, 0) = 0
    ct_c4k: 0

