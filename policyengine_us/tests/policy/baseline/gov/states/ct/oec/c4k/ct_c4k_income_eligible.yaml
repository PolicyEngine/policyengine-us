- name: Case 5, new applicant, income at boundary of 60% SMI.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_enrolled_in_ccdf: false
      person2:
        age: 5
        is_tax_unit_dependent: true
      person3:
        age: 3
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        ct_c4k_countable_income: 6_125.75
        hhs_smi: 122_516
    households:
      household:
        members: [person1, person2, person3]
        state_code: CT
  output:
    # Family of 3: SMI at month: 122,516/12 = 10,209.67
    # 60% of 10,209.67 = 6,125.80
    # 6,125.75 < 6,125.80 => eligible (just below)
    ct_c4k_income_eligible: true

