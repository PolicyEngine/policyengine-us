- name: Case 1, new applicant, income below 60% SMI, eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_enrolled_in_ccdf: false
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_countable_income: 4_166.67
        hhs_smi: 99_180
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Monthly income: 4,166.67; SMI at month: 99,180/12 = 8,265
    # 60% of 8,265 = 4,959; 4,166.67 < 4,959 => eligible
    ct_c4k_income_eligible: true

