      person1:
        age: 70
        ct_ssp_lives_with_others: true
      person2:
        age: 68
        ct_ssp_lives_with_others: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Married shared -> community married PNA $198.55 each
    ct_ssp_personal_needs_allowance: [198.55, 198.55]

- name: Case 7, Medicaid facility married couple.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
