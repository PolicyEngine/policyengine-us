- name: Case 1, aged SSI-eligible person.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_000

        ct_ssp_has_therapeutic_diet: false
        ssi: 11_928  # $994/mo
        employment_income: 0
        rent: 12_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    ct_ssp_eligible_person: true

- name: Case 2, disabled child is not eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 10
        is_blind: false
        is_disabled: true
        immigration_status: CITIZEN
        ssi_countable_resources: 500

        is_tax_unit_dependent: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Per CGS 17b-600: Only blind children are eligible; disabled children excluded
    ct_ssp_eligible_person: false

