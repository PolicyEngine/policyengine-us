- name: Case 8, blind and disabled child is eligible via blind pathway.
  period: 2026-01
  input:
    people:
      person1:
        age: 10
        is_blind: true
        is_disabled: true
        immigration_status: CITIZEN
        ssi_countable_resources: 500

        ct_ssp_has_therapeutic_diet: false
        ssi: 11_928
        employment_income: 0
        rent: 12_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Child who is both blind AND disabled -> blind pathway makes them eligible
    # Per CGS 17b-600: Only blind children eligible; blind trumps disabled exclusion
    ct_ssp_eligible_person: true
