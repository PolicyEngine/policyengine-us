- name: Case 10, blind person earnings between aged and blind initial disregards.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_blind: true
        employment_income: 900  # $75/mo (between $65 aged and $85 blind)
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Blind: min(85, 75) = $75 (all earnings disregarded, below $85 initial)
    # Remainder = max(75 - 85, 0) = $0
    # Total = $75 + $0 = $75
    ct_ssp_earned_income_disregard: 75

- name: Case 11, aged person earnings between aged and blind initial disregards.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        employment_income: 900  # $75/mo (between $65 aged and $85 blind)
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Aged/disabled: $65 + 0.5 * (75 - 65) = $65 + $5 = $70
    ct_ssp_earned_income_disregard: 70

- name: Case 12, married couple one blind one aged with same earnings.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: true
        employment_income: 6_000  # $500/mo
      person2:
        age: 68
        is_blind: false
        employment_income: 6_000  # $500/mo
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # person1 (blind): $85 + 0.5 * (500 - 85) = $85 + $207.50 = $292.50
    # person2 (aged): $65 + 0.5 * (500 - 65) = $65 + $217.50 = $282.50
    ct_ssp_earned_income_disregard: [292.50, 282.50]
