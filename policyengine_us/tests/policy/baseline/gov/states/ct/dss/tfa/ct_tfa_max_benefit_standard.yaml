- name: Case 1, family of 3 returns Region A standard.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: CT
  output:
    # Region A family-of-3: $698 (effective 2014-07-01)
    ct_tfa_max_benefit_standard: 698

