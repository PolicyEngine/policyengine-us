- name: Case 5, benefit exactly zero when countable equals need.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500

        ct_ssp_has_therapeutic_diet: false
        # Engineer countable = need ($597.35)
        # Countable unearned = max(0, 994 - 562) = $432
        # Need countable earned = 597.35 - 432 = $165.35
        # Disregard = $65 + 0.5 * (earned - 65)
        # 0.5*(earned - 65) = 165.35
        # earned - 65 = 330.70 -> earned = $395.70
        ssi: 11_928  # $994/mo
        employment_income: 4_748.40  # $395.70/mo
        rent: 12_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Need = $597.35
    # Countable = $432 + $165.35 = $597.35
    # Benefit = max(0, 597.35 - 597.35) = $0
    ct_ssp_person: 0

