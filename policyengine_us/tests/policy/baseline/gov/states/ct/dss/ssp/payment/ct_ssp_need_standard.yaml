- name: Case 1, community alone with full shelter.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70

        ct_ssp_has_therapeutic_diet: false
        rent: 12_000  # $1,000/mo -> shelter capped at $400
    marital_units:
      marital_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Need = Shelter ($400) + PNA ($197.35) + Special Needs ($0) = $597.35
    ct_ssp_need_standard: 597.35

