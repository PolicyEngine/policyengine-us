- name: Case 1, aged individual community alone with SSI only.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_000

        ct_ssp_has_therapeutic_diet: false
        employment_income: 0
        rent: 12_000  # $1,000/mo
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # --- Federal SSI ---
    ssi_federal_living_arrangement: OWN_HOUSEHOLD
    ssi: 994
    # Aged, no income -> full FBR $994/mo

    # --- Need Standard ---
    ct_ssp_shelter_allowance: 400
    # Shelter: min(1000, 400) = $400
    ct_ssp_personal_needs_allowance: 197.35
    ct_ssp_special_needs: 0
    ct_ssp_need_standard: 597.35
    # Need = $400 + $197.35 + $0 = $597.35

    # --- Income ---
    ct_ssp_unearned_income_disregard: 562
    ct_ssp_earned_income_disregard: 0
    ct_ssp_countable_income: 432
    # Unearned: max(0, 994 - 562) = $432
    # Earned: $0 (no earnings)
    # Countable = $432 + $0 = $432

    # --- Eligibility ---
    ct_ssp_resource_eligible: true
    # Resources: $1,000 <= $1,600
    ct_ssp_income_eligible: true
    # Countable $432 <= Need $597.35, Gross $994 <= Cap $2,982
    ct_ssp_eligible_person: true

    # --- Benefit ---
    # Benefit = max(0, 597.35 - 432) = $165.35
    ct_ssp_person: 165.35
    ct_ssp: 165.35

- name: Case 2, disabled individual community alone with earnings.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_blind: false
        is_disabled: true
        immigration_status: CITIZEN
        ssi_countable_resources: 800

        ct_ssp_has_therapeutic_diet: false
        employment_income: 6_000  # $500/mo
        rent: 12_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # --- Federal SSI ---
    ssi: 786.50
    # Disabled, $500/mo earned -> federal countable = (500-20-65)*0.5 = $207.50
    # SSI = $994 - $207.50 = $786.50/mo

    # --- Need Standard ---
    ct_ssp_shelter_allowance: 400
    ct_ssp_personal_needs_allowance: 197.35
    ct_ssp_special_needs: 0
    ct_ssp_need_standard: 597.35

    # --- Income ---
    ct_ssp_unearned_income_disregard: 562
    ct_ssp_earned_income_disregard: 282.50
    # Aged/disabled: $65 + 0.5 * (500 - 65) = $282.50
    ct_ssp_countable_income: 442
    # Unearned: max(0, 786.50 - 562) = $224.50
    # Earned: max(0, 500 - 282.50) = $217.50
    # Countable = $224.50 + $217.50 = $442

    # --- Eligibility ---
    ct_ssp_resource_eligible: true
    ct_ssp_income_eligible: true
    # Countable $442 <= Need $597.35, Gross $1,286.50 <= Cap $2,982
    ct_ssp_eligible_person: true

    # --- Benefit ---
    # Benefit = max(0, 597.35 - 442) = $155.35
    ct_ssp_person: 155.35
    ct_ssp: 155.35

- name: Case 3, blind individual shared living with therapeutic diet.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ct_ssp_lives_with_others: true
        ct_ssp_has_therapeutic_diet: true
        employment_income: 2_400  # $200/mo
        rent: 6_000  # $500/mo -> capped at $200
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # --- Federal SSI ---
    ssi: 936.50
    # Blind, $200/mo earned -> federal countable = (200-20-65)*0.5 = $57.50
    # SSI = $994 - $57.50 = $936.50/mo

    # --- Need Standard ---
    ct_ssp_shelter_allowance: 200
    # Shared: min(500, 200) = $200
    ct_ssp_personal_needs_allowance: 197.35
    ct_ssp_special_needs: 36.20
    ct_ssp_need_standard: 433.55
    # Need = $200 + $197.35 + $36.20 = $433.55

    # --- Income ---
    ct_ssp_unearned_income_disregard: 629.90
    # Shared living disregard = $629.90
    ct_ssp_earned_income_disregard: 142.50
    # Blind: $85 + 0.5 * (200 - 85) = $85 + $57.50 = $142.50
    ct_ssp_countable_income: 364.10
    # Unearned: max(0, 936.50 - 629.90) = $306.60
    # Earned: max(0, 200 - 142.50) = $57.50
    # Countable = $306.60 + $57.50 = $364.10

    # --- Eligibility ---
    ct_ssp_resource_eligible: true
    ct_ssp_income_eligible: true
    # Countable $364.10 <= Need $433.55, Gross $1,136.50 <= Cap $2,982
    ct_ssp_eligible_person: true

    # --- Benefit ---
    # Benefit = max(0, 433.55 - 364.10) = $69.45
    ct_ssp_person: 69.45
    ct_ssp: 69.45

