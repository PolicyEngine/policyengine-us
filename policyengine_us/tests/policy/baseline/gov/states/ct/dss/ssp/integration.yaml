        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800

        ct_ssp_has_therapeutic_diet: false
        employment_income: 0
        rent: 12_000
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800

        ct_ssp_has_therapeutic_diet: false
        employment_income: 0
        rent: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Both are married, so PNA = $198.55 each
    ct_ssp_personal_needs_allowance: [198.55, 198.55]
    # Shelter: person1 = min(1000, 400) = $400; person2 = min(0, 400) = $0
    ct_ssp_shelter_allowance: [400, 0]
    ct_ssp_need_standard: [598.55, 198.55]
    # person1: $400 + $198.55 = $598.55
    # person2: $0 + $198.55 = $198.55

    # Resource check: combined $1,600 <= $2,400 couple limit
    ct_ssp_resource_eligible: [true, true]

- name: Case 7, negative countable income does not inflate benefit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500

        ct_ssp_has_therapeutic_diet: false
        self_employment_income: -60_000_000  # Extreme negative income
        ssi: 11_928  # $994/mo (kept as input for edge case)
        employment_income: 0
        rent: 12_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Benefit should be capped at need standard, not inflated by negative income.
    # Need = $597.35
    # Even with extreme negative income, benefit cannot exceed need standard.
    # Countable income components are each floored at 0, so countable = $432
    # (same as Case 1: max(0, 994 - 562) = 432, self-employment loss doesn't reduce it)
    ct_ssp_need_standard: 597.35
    ct_ssp_countable_income: 432
    ct_ssp_person: 165.35
    ct_ssp: 165.35

