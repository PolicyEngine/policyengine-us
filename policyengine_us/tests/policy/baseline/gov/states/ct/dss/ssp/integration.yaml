- name: Case 9, married couple one blind one aged with earnings.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: true
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 600
        ct_ssp_has_therapeutic_diet: false
        employment_income: 1_020  # $85/mo (exactly at blind initial disregard)
        rent: 12_000  # $1,000/mo
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 600

        ct_ssp_has_therapeutic_diet: false
        employment_income: 780  # $65/mo (exactly at aged initial disregard)
        rent: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # --- Federal SSI ---
    ssi: [729.25, 729.25]
    # Joint claim: couple FBR/2 = $1,491/2 = $745.50 each
    # Combined earned: $85 + $65 = $150/mo
    # Federal countable per person = ((150-20-65)*0.5)/2 = $16.25
    # SSI per person = $745.50 - $16.25 = $729.25/mo

    # --- Need Standard ---
    # Both married -> PNA = $198.55 each
    ct_ssp_personal_needs_allowance: [198.55, 198.55]
    ct_ssp_shelter_allowance: [400, 0]
    # person1: min(1000, 400) = $400; person2: min(0, 400) = $0
    ct_ssp_special_needs: [0, 0]
    ct_ssp_need_standard: [598.55, 198.55]
    # person1: $400 + $198.55 = $598.55
    # person2: $0 + $198.55 = $198.55

    # --- Income ---
    ct_ssp_unearned_income_disregard: [562, 562]
    ct_ssp_earned_income_disregard: [85, 65]
    ct_ssp_countable_income: [167.25, 167.25]
    # person1: unearned max(0, 729.25 - 562) = $167.25, earned max(0, 85 - 85) = $0
    # person2: unearned max(0, 729.25 - 562) = $167.25, earned max(0, 65 - 65) = $0

    # --- Eligibility ---
    ct_ssp_resource_eligible: [true, true]
    # Combined $1,200 <= $2,400 couple limit
    ct_ssp_income_eligible: [true, true]
    # person1: countable $167.25 <= need $598.55 -> eligible
    # person2: countable $167.25 <= need $198.55 -> eligible (with real SSI!)
    ct_ssp_eligible_person: [true, true]

    # --- Benefit ---
    # person1: max(0, 598.55 - 167.25) = $431.30
    # person2: max(0, 198.55 - 167.25) = $31.30
    ct_ssp_person: [431.30, 31.30]
    ct_ssp: 462.60

