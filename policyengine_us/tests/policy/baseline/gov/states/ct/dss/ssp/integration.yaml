    # Medicaid facility uses community disregard = $562
    ct_ssp_earned_income_disregard: 0
    ct_ssp_countable_income: 0
    # Unearned: max(0, 30 - 562) = $0

    # --- Eligibility ---
    ct_ssp_resource_eligible: true
    ct_ssp_income_eligible: true
    # Countable $0 <= Need $75, Gross $30 <= Cap $2,982
    ct_ssp_eligible_person: true

    # --- Benefit ---
    # Benefit = max(0, 75 - 0) = $75
    # Total: $30 federal + $75 state = $105 combined
    ct_ssp_person: 75
    ct_ssp: 75

