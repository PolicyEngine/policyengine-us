- name: Case 1, 2022 no federal EITC.
  period: 2022
  input:
    state_code: CT
    eitc: 0
  output:
    ct_eitc: 0

- name: Case 2, 2022 with federal EITC.
  period: 2022
  input:
    state_code: CT
    eitc: 2_000
  output:
    ct_eitc: 610
    # 2,000 * 0.305 = 610

- name: Case 3, 2023 no federal EITC.
  period: 2023
  input:
    state_code: CT
    eitc: 0
  output:
    ct_eitc: 0

- name: Case 4, 2023 with federal EITC.
  period: 2023
  input:
    state_code: CT
    eitc: 2_000
  output:
    ct_eitc: 800
    # 2,000 * 0.4 = 800

- name: Case 5, 2024 no qualifying child bonus before 2025.
  period: 2024
  input:
    state_code: CT
    eitc: 2_000
    eitc_child_count: 1
  output:
    ct_eitc: 800
    # 2,000 * 0.4 = 800 (no bonus before 2025)

- name: Case 6, 2025 no federal EITC and no children.
  period: 2025
  input:
    state_code: CT
    eitc: 0
    eitc_child_count: 0
  output:
    ct_eitc: 0

- name: Case 7, 2025 federal EITC with no qualifying children.
  period: 2025
  input:
    state_code: CT
    eitc: 2_000
    eitc_child_count: 0
  output:
    ct_eitc: 800
    # 2,000 * 0.4 = 800 (no bonus without qualifying child)

- name: Case 8, 2025 federal EITC with one qualifying child.
  period: 2025
  input:
    state_code: CT
    eitc: 2_000
    eitc_child_count: 1
  output:
    ct_eitc: 1_050
    # 2,000 * 0.4 + 250 = 800 + 250 = 1,050

- name: Case 9, 2025 no federal EITC but has qualifying child.
  period: 2025
  input:
    state_code: CT
    eitc: 0
    eitc_child_count: 1
  output:
    ct_eitc: 0
    # Must be eligible for CT EITC (i.e., have federal EITC) to receive $250 bonus

- name: Case 10, 2025 federal EITC with multiple qualifying children.
  period: 2025
  input:
    state_code: CT
    eitc: 5_000
    eitc_child_count: 3
  output:
    ct_eitc: 2_250
    # 5,000 * 0.4 + 250 = 2,000 + 250 = 2,250 (bonus is flat $250)

- name: Case 11, 2025 federal EITC with child but no CT EITC.
  period: 2025
  input:
    gov.states.ct.tax.income.credits.eitc.match: 0
    state_code: CT
    eitc: 2_000
    eitc_child_count: 1
  output:
    ct_eitc: 0
    # The qualifying child bonus requires CT EITC eligibility, not only federal EITC eligibility.

- name: Case 12, computed EITC with child but no CT EITC.
  period: 2025
  input:
    gov.states.ct.tax.income.credits.eitc.match: 0
    people:
      parent:
        age: 30
        employment_income: 20_000
      child:
        age: 5
    tax_units:
      tax_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: CT
  output:
    eitc: 4_328
    eitc_child_count: 1
    ct_eitc: 0
    # Regression test: federal EITC and a qualifying child are computed from
    # household inputs, but the CT bonus should not survive a zero CT match.
