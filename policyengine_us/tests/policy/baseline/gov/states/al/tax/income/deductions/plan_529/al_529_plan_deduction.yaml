- name: Alabama 529 deduction - single filer under cap
  period: 2025
  input:
    state_code: AL
    filing_status: SINGLE
    investment_in_529_plan: 3_000
  output:
    # Cap for single is $5,000
    # Deduction = min(3,000, 5,000) = 3,000
    al_529_plan_deduction: 3_000

