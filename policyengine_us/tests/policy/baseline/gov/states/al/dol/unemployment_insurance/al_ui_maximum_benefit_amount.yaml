# Tests for Alabama UI Maximum Benefit Amount (MBA) (§ 25-4-74(a)).
# Formula: MBA = min(N x WBA, 0.25 x BPW), rounded to the nearest dollar.
# N = al_ui_max_weeks (14-20 depending on state UR).
# Dual-cap mirrors PA UC, GA UI, MS UI, etc.
# Reference:
#   https://law.justia.com/codes/alabama/title-25/chapter-4/article-4/section-25-4-74/

- name: Case 1, N x WBA is the binding cap (high WBA, modest BPW).
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # WBA = (7,150 + 7,150) / 52 = 275 (at cap).
        al_ui_high_quarter_wages: 7_150
        al_ui_second_high_quarter_wages: 7_150
        # BPW only barely passes the 1.5x test
        # (1.5 * 7,150 = 10,725; BPW = 16,500 > 10,725).
        # 0.25 * BPW = 4,125; 14 * 275 = 3,850 -> N*WBA binds.
        al_ui_base_period_wages: 16_500
        al_ui_quarters_with_wages: 4
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        # UR (2024) ~ 2.9% -> max_weeks = 14.
        al_ui_max_weeks: 14
        al_ui_weekly_benefit_amount: 275
        # min(14 * 275, 0.25 * 16,500) = min(3,850, 4,125) = 3,850.
        al_ui_maximum_benefit_amount: 3_850

- name: Case 2, BPW/4 is the binding cap (modest WBA, very high BPW).
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # WBA from top-2 quarters of 2,613 each:
        # unrounded = 5,226 / 52 = 100.50 -> rounds DOWN to 100.
        al_ui_high_quarter_wages: 2_613
        al_ui_second_high_quarter_wages: 2_613
        # Large BPW from other low quarters: 0.25 * 12,000 = 3,000.
        # 14 * 100 = 1,400 -> N*WBA binds, BPW cap does NOT bind here.
        # Adjust: need BPW cap to bind -> BPW must be < 4 * N * WBA = 5,600.
        # But BPW must also pass 1.5x test: BPW >= 1.5 * 2,613 = 3,920.
        # Pick BPW = 5,000: 0.25 * 5,000 = 1,250 < 1,400 -> BPW cap binds.
        al_ui_base_period_wages: 5_000
        al_ui_quarters_with_wages: 3
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        al_ui_max_weeks: 14
        al_ui_weekly_benefit_amount: 100
        # min(14 * 100, 0.25 * 5,000) = min(1,400, 1,250) = 1,250.
        al_ui_maximum_benefit_amount: 1_250

- name: Case 3, two caps exactly equal - either binds, returns same value.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # Choose so that 14 * WBA = 0.25 * BPW exactly.
        # WBA = 100 -> 14 * 100 = 1,400; BPW = 5,600 -> 0.25 * 5,600 = 1,400.
        al_ui_high_quarter_wages: 2_613
        al_ui_second_high_quarter_wages: 2_613
        al_ui_base_period_wages: 5_600
        al_ui_quarters_with_wages: 4
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        al_ui_max_weeks: 14
        al_ui_weekly_benefit_amount: 100
        # min(1,400, 1,400) = 1,400.
        al_ui_maximum_benefit_amount: 1_400

- name: Case 4, monetarily ineligible (1 quarter) - MBA is $0.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        al_ui_high_quarter_wages: 8_000
        al_ui_second_high_quarter_wages: 0
        al_ui_base_period_wages: 8_000
        al_ui_quarters_with_wages: 1
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        # Not monetarily eligible -> WBA = 0 -> MBA = min(14 * 0, 2,000) = 0.
        al_ui_weekly_benefit_amount: 0
        al_ui_maximum_benefit_amount: 0

- name: Case 5, BPW cap with non-integer 0.25 x BPW - rounded per statute.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # WBA = 100 (from 2,613 + 2,613). 14 * 100 = 1,400.
        # BPW = 5,003 -> 0.25 * 5,003 = 1,250.75.
        # BPW also passes 1.5x test: 5,003 >= 1.5 * 2,613 = 3,919.5.
        # min(1,400, 1,250.75) = 1,250.75 -> per § 25-4-74(a), "such total
        # amounts of benefits, if not a multiple of one dollar, shall be
        # computed to the nearest multiple of one dollar" -> rounds to 1,251.
        al_ui_high_quarter_wages: 2_613
        al_ui_second_high_quarter_wages: 2_613
        al_ui_base_period_wages: 5_003
        al_ui_quarters_with_wages: 4
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        al_ui_max_weeks: 14
        al_ui_weekly_benefit_amount: 100
        # min(1,400, 1,250.75) = 1,250.75; rounded to nearest dollar -> 1,251.
        al_ui_maximum_benefit_amount: 1_251

- name: Case 6, BPW cap with 0.25 x BPW just below half - rounds DOWN.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # WBA = 100 (from 2,613 + 2,613). 14 * 100 = 1,400.
        # BPW = 5,001 -> 0.25 * 5,001 = 1,250.25.
        # BPW passes 1.5x test: 5,001 >= 1.5 * 2,613 = 3,919.5.
        # min(1,400, 1,250.25) = 1,250.25; nearest dollar -> 1,250.
        al_ui_high_quarter_wages: 2_613
        al_ui_second_high_quarter_wages: 2_613
        al_ui_base_period_wages: 5_001
        al_ui_quarters_with_wages: 4
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        al_ui_max_weeks: 14
        al_ui_weekly_benefit_amount: 100
        # 0.25 * 5,001 = 1,250.25 -> np.round -> 1,250.
        al_ui_maximum_benefit_amount: 1_250

- name: Case 7, large BPW, low WBA - N x WBA dominates (BPW cap not binding).
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # WBA = 50 (unrounded = (1,300 + 1,300) / 52 = 50, no fraction).
        # 14 * 50 = 700.
        # BPW = 100,000 -> 0.25 * 100,000 = 25,000 (not binding).
        al_ui_high_quarter_wages: 1_300
        al_ui_second_high_quarter_wages: 1_300
        al_ui_base_period_wages: 100_000
        al_ui_quarters_with_wages: 4
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        al_ui_max_weeks: 14
        al_ui_weekly_benefit_amount: 50
        # min(14 * 50, 0.25 * 100,000) = min(700, 25,000) = 700.
        al_ui_maximum_benefit_amount: 700

- name: Case 8, very small BPW, high WBA - BPW/4 dominates aggressively.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # WBA at 275 cap; BPW just barely passes 1.5x test.
        # HQW = 7,150; 1.5 * 7,150 = 10,725; BPW = 10,800 passes.
        # 0.25 * 10,800 = 2,700. 14 * 275 = 3,850 -> BPW cap binds.
        al_ui_high_quarter_wages: 7_150
        al_ui_second_high_quarter_wages: 7_150
        al_ui_base_period_wages: 10_800
        al_ui_quarters_with_wages: 4
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        al_ui_max_weeks: 14
        al_ui_weekly_benefit_amount: 275
        # min(14 * 275, 0.25 * 10,800) = min(3,850, 2,700) = 2,700.
        al_ui_maximum_benefit_amount: 2_700

- name: Case 9, zero BPW - MBA is $0 (also ineligible).
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        al_ui_high_quarter_wages: 0
        al_ui_second_high_quarter_wages: 0
        al_ui_base_period_wages: 0
        al_ui_quarters_with_wages: 0
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        # Ineligible -> WBA = 0; MBA = min(14 * 0, 0.25 * 0) = 0.
        al_ui_monetarily_eligible: false
        al_ui_weekly_benefit_amount: 0
        al_ui_maximum_benefit_amount: 0
