        age: 30
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        # Highest bracket: 20 weeks (cap).
        al_ui_max_weeks: 20

- name: Case 9, natural FRED UR for 2024 (~2.9%) - 14 weeks without reform.
  period: 2024
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        # 2024-01 UR = 0.029 from FRED ALUR -> first bracket -> 14 weeks.
        al_ui_max_weeks: 14

- name: Case 10, UR at 6.51% (just above 6.5% boundary) - 15 weeks.
  period: 2024
  reforms: policyengine_us.tests.policy.baseline.gov.states.al.dol.unemployment_insurance.set_state_unemployment_rate.set_state_unemployment_rate_to_6_51pct
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        # 0.0651 hits the second bracket threshold exactly -> 15 weeks.
        # Confirms "above 6.5%" semantics: 0.065 -> 14, 0.0651 -> 15.
        al_ui_max_weeks: 15

- name: Case 11, UR at 15% (extreme high) - still 20 weeks (statute cap).
  period: 2024
  reforms: policyengine_us.tests.policy.baseline.gov.states.al.dol.unemployment_insurance.set_state_unemployment_rate.set_state_unemployment_rate_to_15pct
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        # 0.15 well above 0.0901 -> bracket 7 (cap) -> 20 weeks.
        al_ui_max_weeks: 20
