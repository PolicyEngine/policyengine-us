- name: Case 6, mid-duration unemployment - 10 paid weeks after waiting.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        al_ui_high_quarter_wages: 10_000
        al_ui_second_high_quarter_wages: 10_000
        al_ui_base_period_wages: 40_000
        al_ui_quarters_with_wages: 4
        al_ui_weekly_earnings: 0
        weeks_unemployed: 11
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        al_ui_weekly_benefit_amount: 275
        # payable_weeks = min(max(0, 11 - 1), 14) = min(10, 14) = 10.
        # Annual = 275 * 10 = 2,750; MBA = 3,850 (not binding).
        al_ui: 2_750

- name: Case 7, zero HQW (no wages) - ineligible - $0 annual benefit.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        al_ui_high_quarter_wages: 0
        al_ui_second_high_quarter_wages: 0
        al_ui_base_period_wages: 0
        al_ui_quarters_with_wages: 0
        al_ui_weekly_earnings: 0
        weeks_unemployed: 14
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        # Zero quarters -> ineligible -> al_ui = 0 (defined_for gate).
        # Confirms graceful handling of no-wage claimants (no crash).
        al_ui_monetarily_eligible: false
        al_ui_weekly_benefit_amount: 0
        al_ui_maximum_benefit_amount: 0
        al_ui: 0

- name: Case 8, zero BPW with positive HQW - fails 1.5x test - ineligible.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # Pathological: HQW positive but BPW zero (inconsistent inputs).
        # The formula must not crash; eligibility correctly fails.
        al_ui_high_quarter_wages: 8_000
        al_ui_second_high_quarter_wages: 4_000
        al_ui_base_period_wages: 0
        al_ui_quarters_with_wages: 2
        al_ui_weekly_earnings: 0
        weeks_unemployed: 10
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        # BPW 0 < 1.5 * 8,000 = 12,000 -> fails § 25-4-77(a)(4)(a).
        al_ui_monetarily_eligible: false
        al_ui: 0

- name: Case 9, weekly earnings >= WBA - deemed employed, $0 annual benefit.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        al_ui_high_quarter_wages: 10_000
        al_ui_second_high_quarter_wages: 10_000
        al_ui_base_period_wages: 40_000
        al_ui_quarters_with_wages: 4
        # Weekly earnings >= WBA -> "deemed employed" per § 25-4-72 / USDOL Tbl 3-8.
        al_ui_weekly_earnings: 300
        weeks_unemployed: 11
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        al_ui_weekly_benefit_amount: 275
        # earnings (300) >= WBA (275) -> partial weekly benefit = 0.
        al_ui_partial_weekly_benefit: 0
        # Annual benefit = 0 (no compensable weeks).
        al_ui: 0

- name: Case 10, negative weekly earnings (defensive) - full WBA paid each week.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        al_ui_high_quarter_wages: 10_000
        al_ui_second_high_quarter_wages: 10_000
        al_ui_base_period_wages: 40_000
        al_ui_quarters_with_wages: 4
        # Negative weekly earnings should not inflate the benefit.
        al_ui_weekly_earnings: -100
        weeks_unemployed: 11
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    people:
      person1:
        al_ui_weekly_benefit_amount: 275
        # max_(earnings - disregard, 0) clamps negative to 0 -> partial = WBA.
        al_ui_partial_weekly_benefit: 275
        # payable_weeks = 10. Annual = 275 * 10 = 2,750.
        al_ui: 2_750
