# AL CCSP weekly per-child parental fee tests (SPMUnit, MONTH).
# Unified 11-band fee schedule indexed by FPL ratio (0-200% FPL).
# Initial applicants must be at or below 180% FPL; continuing recipients may
# remain enrolled up to 200% FPL. Both tiers use the same fee schedule.
#
# AL uses the prior year's HHS FPG (Fact Sheet 2024 -> 2023 FPG).
# 2023 FPG (Contiguous US), family of 4: $30,000/yr = $2,500/mo.
#   80%  FPL fam of 4 = $24,000/yr ($2,000/mo)
#   150% FPL fam of 4 = $45,000/yr ($3,750/mo)
#   185% FPL fam of 4 = $55,500/yr ($4,625/mo)
#   195% FPL fam of 4 = $58,500/yr ($4,875/mo)

- name: Family at 150 percent FPL has $30 weekly per-child fee.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 45_000  # 150% FPL fam of 4 = 45,000/yr
      person2:
        age: 28
      person3:
        age: 4
        is_tax_unit_dependent: true
      person4:
        age: 2
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        al_ccsp_enrolled: false
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: AL
  output:
    # FPL ratio = 3,750 / 2,500 = 1.5 -> band [1.4001, 1.5001) -> $30/wk
    al_ccsp_weekly_copay_per_child: 30

