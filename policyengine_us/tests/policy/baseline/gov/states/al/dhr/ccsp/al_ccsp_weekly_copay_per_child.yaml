# AL CCSP weekly per-child parental fee tests (SPMUnit, MONTH).
# Initial tier (al_ccsp_enrolled=false) uses the 9-band initial fee schedule.
# Continuing tier (al_ccsp_enrolled=true) uses the 2-band continuing fee schedule.
#
# 2024 FPG (Contiguous US), family of 4: $31,200/yr = $2,600/mo.
#   80%  FPL fam of 4 = $24,960/yr ($2,080/mo)
#   150% FPL fam of 4 = $46,800/yr ($3,900/mo)
#   185% FPL fam of 4 = $57,720/yr ($4,810/mo)
#   195% FPL fam of 4 = $60,840/yr ($5,070/mo)

- name: Initial tier at 150 percent FPL has $30 weekly per-child fee.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 46_800  # 150% FPL fam of 4
      person2:
        age: 28
      person3:
        age: 4
        is_tax_unit_dependent: true
      person4:
        age: 2
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        al_ccsp_enrolled: false
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: AL
  output:
    # FPL ratio = 3,900 / 2,600 = 1.5 -> initial tier band [1.4001, 1.5001) -> $30/wk
    al_ccsp_weekly_copay_per_child: 30

