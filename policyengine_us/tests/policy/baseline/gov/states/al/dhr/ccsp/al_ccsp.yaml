# AL CCSP benefit tests (SPMUnit, MONTH, USD)
# per_child_weekly_subsidy = max(0, min(weekly_charge, max_weekly_rate) - weekly_copay_per_child)
# monthly_subsidy = per_child_weekly_subsidy * (52/12) * eligible_child
# al_ccsp = sum over SPMUnit members.

- name: Ineligible family gets zero benefit.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 80_000  # > 85% SMI fam of 4
        immigration_status: CITIZEN
        weekly_hours_worked: 40
      person2:
        age: 28
      person3:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
      person4:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        spm_unit_pre_subsidy_childcare_expenses: 24_000
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    al_ccsp: 0

- name: Low-income family at zero copay receives full max rate.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 18_000  # ~91% 2023 FPG fam of 2 -> 0% copay band
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
        pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    # BIRMINGHAM CENTER PRESCHOOL BASE = $180/wk
    # Weekly charge = 10,000 / 52 = $192.31
    # min($192.31, $180) = $180
    # copay = $0
    # weekly subsidy = $180
    # monthly subsidy = $180 * (52/12) = $780
    al_ccsp: 780

- name: Family at 150 percent FPL with copay.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 29_580  # 150% 2023 FPG fam of 2 = 19,720 * 1.5
        immigration_status: CITIZEN
        weekly_hours_worked: 40
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
        pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    # BIRMINGHAM CENTER PRESCHOOL BASE = $180/wk
    # weekly charge = 10,000 / 52 = $192.31; min(192.31, 180) = $180
    # copay = $30/wk; weekly subsidy = $180 - $30 = $150
    # monthly subsidy = $150 * (52/12) = $650
    al_ccsp: 650

- name: Provider charge below max rate caps subsidy at charge minus copay.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 18_000  # zero copay tier
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
        pre_subsidy_childcare_expenses: 5_200  # $100/wk charge
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 5_200
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    # weekly charge = $100; max rate = $180; min = $100; copay = $0
    # monthly subsidy = $100 * (52/12) = $433.33
    al_ccsp: 433.33

- name: Three children with only one eligible subsidizes only the eligible child.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 18_000  # ~60% 2023 FPG fam of 4 -> zero copay band
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        # Truly eligible: age 4, citizen, dependent, in care
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
        pre_subsidy_childcare_expenses: 10_000
      person3:
        # Over age (>= 13): ineligible, in care
        age: 14
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
        pre_subsidy_childcare_expenses: 10_000
      person4:
        # Undocumented: ineligible by immigration, in care
        age: 6
        is_tax_unit_dependent: true
        immigration_status: UNDOCUMENTED
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
        pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        spm_unit_pre_subsidy_childcare_expenses: 30_000
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    # Only person2 is is_paying_child (eligible_child & in_care).
    # BIRMINGHAM CENTER PRESCHOOL BASE = $180/wk for person2.
    # weekly charge = $10,000 / 52 = $192.31; min($192.31, $180) = $180
    # copay = $0/wk (zero-copay band); weekly subsidy = $180
    # monthly subsidy = $180 * (52/12) = $780
    # Ineligible siblings get zero subsidy.
    al_ccsp: 780
