      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 20  # <= 25 -> part-time
        al_ccsp_provider_type: INFORMAL
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    # Part-time = 1/2 of applicable full-time rate; for INFORMAL the
    # applicable full-time rate is the $50 cap, so part-time = $25.
    al_ccsp_maximum_weekly_rate: [0, 25]

