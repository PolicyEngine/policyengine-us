# AL CCSP maximum weekly provider rate tests (Person, MONTH, USD)
# Looked up by provider_type x region x age_category x quality_tier.
# Full-time when childcare_hours_per_week > 25; otherwise rate is halved (part-time multiplier 0.5).
# INFORMAL provider has a flat $50/wk cap regardless of region/age/quality.
# defined_for: al_ccsp_eligible_child (Person, MONTH).

- name: CENTER BIRMINGHAM PRESCHOOL STAR_3 full-time is 191 per week.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: STAR_3
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    al_ccsp_maximum_weekly_rate: [0, 191]

