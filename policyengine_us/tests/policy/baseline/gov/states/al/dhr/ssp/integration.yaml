# Combined Federal SSI + Alabama SSP verification using official 2010
# federal SSI amounts and Alabama supplement amounts.
# 2010 FBR: Individual = $674/month, Couple = $1,011/month.
# ssi is a YEAR variable; at monthly period it auto-divides by 12.

- name: Case 9, 2010 IHC Level A individual combined $734/month.
  period: 2010-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        al_ssp_payment_category: IHC_LEVEL_A
        al_receives_elderly_disabled_medicaid_waiver: true
        al_meets_snf_criteria: true
    tax_units:
      tax_unit:
        members: [person1]
    marital_units:
      marital_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    # Federal SSI: $674/month
    ssi: [674]
    # State SSP: $60/month (Level A)
    al_ssp: [60]
    # Combined: $674 + $60 = $734/month

