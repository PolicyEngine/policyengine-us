        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
  output:
    # Federal SSI: couple FBR $1,011/month / 2 = $505.50/month each
    ssi: [505.50, 505.50]
    # State SSP: $60/month each (Level A)
    al_ssp: [60, 60]
    # Combined: ($505.50 + $60) x 2 = $1,131/month (matches WorkWorld)

