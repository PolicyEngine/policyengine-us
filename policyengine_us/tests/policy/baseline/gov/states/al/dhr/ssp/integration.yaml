- name: Case 1, SSI eligible person in IHC Level A.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_eligible: true
        uncapped_ssi: 1
        al_ssp_payment_category: IHC_LEVEL_A
        al_receives_elderly_disabled_medicaid_waiver: true
        al_meets_snf_criteria: true
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    al_ssp_eligible: [true]
    al_ssp: [60]

