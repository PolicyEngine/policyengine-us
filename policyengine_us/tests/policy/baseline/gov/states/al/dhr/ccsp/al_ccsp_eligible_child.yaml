# AL CCSP eligible child tests (Person, MONTH)
# Combines: child_age_limit (<13) or disabled_child_age_limit (<19 if disabled),
#           is_ccdf_immigration_eligible_child, is_tax_unit_dependent.

- name: Child age 4 citizen dependent is eligible.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
  output:
    al_ccsp_eligible_child: [false, true]

