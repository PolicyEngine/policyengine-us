# AL CCSP region tests (Household, YEAR, Enum)
# Maps county -> region using counties.yaml lists.

- name: Madison County is HUNTSVILLE.
  period: 2024
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: AL
        county_str: MADISON_COUNTY_AL
  output:
    al_ccsp_region: HUNTSVILLE

