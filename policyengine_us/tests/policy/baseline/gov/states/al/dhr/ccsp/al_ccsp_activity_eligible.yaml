# AL CCSP activity eligibility tests (SPMUnit, MONTH)
# At least one parent must work >= 15 hr/wk, be a full-time student, or be disabled (SC/VA convention).

- name: Parent working 30 hrs per week is activity eligible.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked: 30
        is_full_time_student: false
        is_disabled: false
      person2:
        age: 4
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
  output:
    al_ccsp_activity_eligible: true

