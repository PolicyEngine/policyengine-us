- name: Two eligible children with center care split copay.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 38_730  # 150% FPL fam of 3 = 3,228/mo
        immigration_status: CITIZEN
        weekly_hours_worked: 40
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
        pre_subsidy_childcare_expenses: 7_000
      person3:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
        pre_subsidy_childcare_expenses: 7_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 14_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    al_ccsp_eligible_child: [false, true, true]
    al_ccsp_eligible: true
    # 150% FPL -> $30/wk per child * 2 children * (52/12) = $260/mo
    al_ccsp_copay: 260
    # BIRMINGHAM CENTER PRESCHOOL BASE = $180; CENTER INFANT_TODDLER BASE = $195
    al_ccsp_maximum_weekly_rate: [0, 180, 195]
    # weekly charge per child = 7,000 / 52 = $134.62
    # child 1 (age 4): min($134.62, $180) = $134.62; subsidy = $134.62 - $30 = $104.62
    # child 2 (age 2): min($134.62, $195) = $134.62; subsidy = $134.62 - $30 = $104.62
    # total weekly subsidy = $209.24; monthly = $209.24 * (52/12) = $906.71
    al_ccsp: 906.71

