- name: Family at 190 FPL continuing tier is eligible with copay 42 per week.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 49_058  # 190% FPL fam of 3 = 49,058/yr
        immigration_status: CITIZEN
        weekly_hours_worked: 40
      person2:
        age: 28
        weekly_hours_worked: 40
      person3:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
        pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
        al_ccsp_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    al_ccsp_eligible: true
    # FPL ratio = 49,058 / 25,820 = 1.90 -> 181-190 band -> $42/wk
    # $42 * (52/12) = $182/mo
    al_ccsp_copay: 182
    # BIRMINGHAM CENTER PRESCHOOL BASE = $180/wk
    al_ccsp_maximum_weekly_rate: [0, 0, 180]
    # weekly charge = 10,000 / 52 = $192.31; min($192.31, $180) = $180
    # weekly subsidy = $180 - $42 = $138
    # monthly = $138 * (52/12) = $598
    al_ccsp: 598

