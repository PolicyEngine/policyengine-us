# AL CCSP integration tests
# Cross-cuts eligibility, copay, rate lookup, and benefit calculation.
#
# 2024 FPG (Contiguous US): first $15,060, additional $5,380.
#   FS 2: $20,440/yr ($1,703.33/mo); 150% FPL = 2,555/mo; 180% = 3,066/mo
#   FS 3: $25,820/yr ($2,151.67/mo)
#   FS 4: $31,200/yr ($2,600/mo); 150% FPL = 3,900/mo; 180% = 4,680/mo;
#         190% = 4,940/mo; 200% = 5,200/mo
# AL SMI FS 4 (2023-10-01): $88,407/yr. 85% SMI FS 4: $75,145.95/yr (6,262.16/mo).
# Weekly -> monthly multiplier: WEEKS_IN_YEAR / MONTHS_IN_YEAR = 52/12 ≈ 4.3333.

- name: Two-parent family at 150 FPL with center care in Birmingham STAR_3.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 38_730  # 150% FPL fam of 3 = 3,228/mo
        immigration_status: CITIZEN
        weekly_hours_worked: 40
      person2:
        age: 28
        weekly_hours_worked: 40
      person3:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: STAR_3
        pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
        al_ccsp_enrolled: false
    households:
      household:
        members: [person1, person2, person3]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    al_ccsp_eligible_child: [false, false, true]
    al_ccsp_income_eligible: true
    al_ccsp_eligible: true
    # 150% FPL -> $30/wk per child -> $30 * (52/12) = $130/mo copay
    al_ccsp_copay: 130
    # BIRMINGHAM CENTER PRESCHOOL STAR_3 full-time = $191/wk
    al_ccsp_maximum_weekly_rate: [0, 0, 191]
    # weekly charge = 10,000 / 52 = $192.31; min($192.31, $191) = $191
    # weekly subsidy = $191 - $30 = $161
    # monthly = $161 * (52/12) = $697.67
    al_ccsp: 697.67

- name: Single parent at 60 FPL enrolled with FDC in Mobile BASE.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 25
        employment_income: 12_264  # ~60% FPL fam of 2 = 1,022/mo
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: FDC
        al_ccsp_quality_tier: BASE
        pre_subsidy_childcare_expenses: 8_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 8_000
        al_ccsp_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: MOBILE_COUNTY_AL
  output:
    al_ccsp_eligible_child: [false, true]
    al_ccsp_eligible: true
    # <= 100% FPL -> $0/wk copay
    al_ccsp_copay: 0
    # MOBILE FDC INFANT_TODDLER BASE full-time = $134/wk
    al_ccsp_maximum_weekly_rate: [0, 134]
    # weekly charge = 8,000 / 52 = $153.85; min($153.85, $134) = $134
    # monthly = $134 * (52/12) = $580.67
    al_ccsp: 580.67

