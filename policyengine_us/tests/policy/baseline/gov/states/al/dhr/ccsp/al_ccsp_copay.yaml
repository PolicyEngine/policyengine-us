# AL CCSP family copay tests (SPMUnit, MONTH, USD)
# Per-child weekly fee from FPL band, summed over eligible children, converted to monthly via 4.333.
# Waivers (zero copay): disabled child, Head Start enrollment, protective services (foster).
# Homelessness alone does NOT waive copay (per State Plan §3.3.1(iii)).
#
# AL uses the prior year's HHS FPG (Fact Sheet 2024 -> 2023 FPG).
# 2023 FPG (Contiguous US): first $14,580, additional $5,140.
#   FS 2: $19,720/yr ($1,643.33/mo)
#   FS 3: $24,860/yr ($2,071.67/mo)
#   FS 4: $30,000/yr ($2,500/mo)
#   FS 5: $35,140/yr ($2,928.33/mo)
# Initial fee scale (effective 2024-01-01), weekly per child:
#   0-100% FPL  -> $0
#   101-110     -> $18
#   111-120     -> $21
#   121-130     -> $24
#   131-140     -> $27
#   141-150     -> $30
#   151-160     -> $33
#   161-170     -> $36
#   171-180     -> $39
# Continuing schedule:
#   181-190     -> $42
#   191-200     -> $45

- name: Family at 80 percent FPL has zero copay (encoded in scale).
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 15_776  # 80% 2023 FPG fam of 2 = 15,776/yr -> 1,315/mo
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    # <= 100% FPL band -> $0/wk -> $0/mo
    al_ccsp_copay: 0

