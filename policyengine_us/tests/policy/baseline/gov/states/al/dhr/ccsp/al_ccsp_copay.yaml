# AL CCSP family copay tests (SPMUnit, MONTH, USD)
# Per-child weekly fee from FPL band, summed over eligible children, converted to monthly via 4.333.
# Waivers (zero copay): disabled child, Head Start enrollment, protective services (foster).
# Homelessness alone does NOT waive copay (per State Plan §3.3.1(iii)).
#
# 2024 FPG (Contiguous US): first $15,060, additional $5,380.
#   FS 2: $20,440/yr ($1,703.33/mo)
#   FS 4: $31,200/yr ($2,600/mo)
# Initial fee scale (effective 2024-01-01), weekly per child:
#   0-100% FPL  -> $0
#   101-110     -> $18
#   111-120     -> $21
#   121-130     -> $24
#   131-140     -> $27
#   141-150     -> $30
#   151-160     -> $33
#   161-170     -> $36
#   171-180     -> $39
# Continuing schedule:
#   181-190     -> $42
#   191-200     -> $45

- name: Family at 80 percent FPL has zero copay (encoded in scale).
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 16_352  # 80% FPL fam of 2 = 16,352/yr -> 1,363/mo
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    # <= 100% FPL band -> $0/wk -> $0/mo
    al_ccsp_copay: 0

- name: Family at 150 percent FPL with one child pays 30 per week.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 30_660  # 150% FPL fam of 2 = 30,660/yr -> 2,555/mo
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    # 150% FPL -> 141-150 band -> $30/wk per child
    # 1 child * $30/wk * 4.333 = $130.00/mo
    al_ccsp_copay: 129.99

