- name: Disabled child age 15 plus young eligible sibling both in care waives copay.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 35_000  # would otherwise be a paid tier
      person2:
        # Young eligible sibling, in care
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
      person3:
        # Disabled child age 15: eligible under disabled limit (19), triggers waiver
        age: 15
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_disabled: true
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    # Disabled child (age 15 < 19) triggers copay waiver per §3.3.1(iv).
    al_ccsp_copay: 0

