- name: Homeless household alone does NOT waive copay.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 30_660  # 150% FPL fam of 2
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
        is_homeless: true
  output:
    # Homelessness alone is NOT a copay waiver in AL.
    # Fee is still owed: 150% FPL -> $30/wk -> $30 * 4.333 = $130.00/mo
    al_ccsp_copay: 129.99
