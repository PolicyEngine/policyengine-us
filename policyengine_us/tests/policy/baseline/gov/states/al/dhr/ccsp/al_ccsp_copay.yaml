- name: Three children, only one truly eligible, copay counts only the eligible one.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 45_000  # 150% 2023 FPG fam of 4 = $45,000/yr -> $3,750/mo
      person2:
        # Truly eligible: age 4, citizen, dependent, in care
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
      person3:
        # Over age (>= 13): citizen, dependent, in care, but ineligible by age
        age: 14
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
      person4:
        # Ineligible immigration status: dependent, in care, but undocumented
        age: 6
        is_tax_unit_dependent: true
        immigration_status: UNDOCUMENTED
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    # 150% FPL fam of 4 -> $30/wk per child
    # Only person2 is eligible_child & in_care -> num_paying = 1
    # 1 * $30/wk * (52/12) = $130.00/mo
    al_ccsp_copay: 130

