# -- Care hours boundary tests (full-time / part-time) --

- name: Care hours exactly 25 is part-time (half rate).
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 25  # boundary <= 25 = part-time
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL  # BIRMINGHAM CENTER PRESCHOOL BASE = $180 -> half = $90
  output:
    al_ccsp_maximum_weekly_rate: [0, 90]

- name: Care hours exactly 26 is full-time.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 26  # > 25 -> full-time
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    al_ccsp_maximum_weekly_rate: [0, 180]

