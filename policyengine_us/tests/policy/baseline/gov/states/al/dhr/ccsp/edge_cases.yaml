# -- Copay band boundary tests --

- name: Family at exactly 100 percent FPL has zero copay.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 20_440  # 100% FPL fam of 2
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    # At exactly 100% FPL (ratio 1.0), the $0 band applies (next threshold is 1.0001).
    al_ccsp_copay: 0

- name: Family at exactly 110 percent FPL pays 18 per week.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 22_484  # 110% FPL fam of 2 = 22,484/yr
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    # 110% FPL ratio = 1.10 -> 101-110 band ($18/wk).
    # $18 * 4.333 = $77.99/mo
    al_ccsp_copay: 77.99

- name: Family at 120 percent FPL pays 21 per week.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 24_528  # 120% FPL fam of 2
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        al_ccsp_provider_type: CENTER
        al_ccsp_quality_tier: BASE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
        county_str: JEFFERSON_COUNTY_AL
  output:
    # 120% FPL -> 111-120 band ($21/wk). $21 * 4.333 = $90.99/mo
    al_ccsp_copay: 90.99

