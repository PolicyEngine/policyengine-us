# AL CCSP edge case tests
# Boundary conditions, multi-dimension rate coverage, and unusual configurations.

# -- Age boundary tests --

- name: Child exactly age 13 not disabled is ineligible (strict less-than).
  period: 2024-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 13
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_disabled: false
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
  output:
    al_ccsp_eligible_child: [false, false]

- name: Disabled child exactly age 19 is ineligible (strict less-than).
  period: 2024-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 19
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_disabled: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
  output:
    al_ccsp_eligible_child: [false, false]

