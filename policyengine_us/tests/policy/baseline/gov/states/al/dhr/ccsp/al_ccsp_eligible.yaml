        immigration_status: CITIZEN
        weekly_hours_worked: 0
        is_full_time_student: false
        is_disabled: false
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
        is_homeless: true
  output:
