      person1:
        is_tax_unit_head: true
      person2:
        age: 5
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SEPARATE
        ca_cdcc_relevant_expenses: 6_000
        ca_cdcc_rate: 0.25
    households:
      household:
        members: [person1, person2]
        state_code: CA
  output:
    ca_federal_cdcc: 0

