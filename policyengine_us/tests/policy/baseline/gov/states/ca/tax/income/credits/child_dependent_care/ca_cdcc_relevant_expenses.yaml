- name: test 6, disabled adult dependent's care expenses enter the base
  period: 2021
  input:
    people:
      person1:
        is_tax_unit_head: true
      person2:
        age: 18
        is_incapable_of_self_care: true
        is_tax_unit_dependent: true
        pre_subsidy_care_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
        tax_unit_childcare_expenses: 0
        min_head_spouse_earned: 50_000
    households:
      household:
        members: [person1, person2]
        state_code: CA
  output:
    # One qualifying individual at the pre-ARPA $3,000 cap:
    # min(10_000 adult care, 3_000, 50_000) = 3_000.
    ca_cdcc_relevant_expenses: 3_000
