- name: test 1
  period: 2019
  input:
    state_code: CA
    tax_unit_childcare_expenses: 10_000
    count_cdcc_eligible: 1
    min_head_spouse_earned: 50_000
  output:
    ca_cdcc_relevant_expenses: 3_000 

