- name: Single blind parent with non eligible dependent child
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        is_blind: true
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: CA
  output:
    ca_state_supplement_payment_standard: 15_207.84

- name: Married household with one blind and one disabled person, with a disabled dependent child, no food preparation and spouse in out of home care
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 65
        is_tax_unit_head: true
        is_blind: true
      person2:
        age: 66
        is_tax_unit_spouse: true
        is_disabled: true
        meets_ssi_disability_criteria: true
        in_out_of_home_care_facility: true
      person3:
        age: 17
        is_tax_unit_dependent: true
        is_disabled: true
        meets_ssi_disability_criteria: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_is_married: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: CA
        living_arrangements_allow_for_food_preparation: false
  output:
    ca_state_supplement_payment_standard: 4_600.76

