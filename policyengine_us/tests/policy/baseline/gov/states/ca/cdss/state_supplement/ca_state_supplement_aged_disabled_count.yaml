- name: Case 4, SSI disability criteria count as disabled.
  period: 2024
  input:
    people:
      person1:
        age: 45
        is_tax_unit_head: true
        meets_ssi_disability_criteria: true
        ssi_engaged_in_sga: false
    spm_units:
