        nv_ccdp_provider_type: FCC
    households:
      household:
        members: [person]
        state_code: NV
        county: WASHOE_COUNTY_NV
  output:
    # 72 months -> SCHOOL_AGE; LOWEST_PERCENTILE x FCC x SCHOOL_AGE = 40
    nv_ccdp_provider_rate: 40

- name: Center, Clark County, school age (default provider type is CENTER).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person:
        age: 6
        immigration_status: CITIZEN
    households:
      household:
        members: [person]
        state_code: NV
        county: CLARK_COUNTY_NV
  output:
    # 72 months -> SCHOOL_AGE; MOST_POPULOUS x CENTER x SCHOOL_AGE = 48
    nv_ccdp_provider_rate: 48

- name: Ineligible child (age 14) gets no rate via defined_for.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person:
        age: 14
        immigration_status: CITIZEN
        nv_ccdp_provider_type: CENTER
    households:
      household:
        members: [person]
        state_code: NV
        county: CLARK_COUNTY_NV
  output:
    # Not an eligible child (>= 13, no special need) -> defined_for zeroes the rate.
    nv_ccdp_provider_rate: 0

