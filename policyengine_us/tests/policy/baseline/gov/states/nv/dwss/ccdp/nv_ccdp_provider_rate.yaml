# Star-rating tier coverage: each star above STAR_1 adds $1.00/day. The cases
# above (no star input) confirm the STAR_1 base default; the cases below
# exercise stars 2-5 across center/fcc and both regions.

- name: Center, Clark County, school age, 3-Star provider.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person:
        age: 6
        immigration_status: CITIZEN
        nv_ccdp_provider_type: CENTER
        nv_ccdp_provider_star_rating: STAR_3
    households:
      household:
        members: [person]
        state_code: NV
        county: CLARK_COUNTY_NV
  output:
    # MOST_POPULOUS x CENTER x SCHOOL_AGE x STAR_3 = 48 + 2 = 50
    nv_ccdp_provider_rate: 50

