# nv_ccdp_provider_rate: Person, float (USD/day), MONTH
# defined_for = nv_ccdp_eligible_child, so the child must be NV-resident,
# under the age limit, and immigration-eligible for a non-zero rate.
# Age brackets (MS 631/633.1): INFANT <12mo, TODDLER 12-36mo, PRESCHOOL 36-72mo,
# SCHOOL_AGE >=72mo. rates/center.yaml and rates/fcc.yaml, keyed by region x age:
#   center MOST_POPULOUS:      INFANT 62.50, TODDLER 57, PRESCHOOL 51.50, SCHOOL_AGE 48
#   center LOWEST_PERCENTILE:  INFANT 53.50, TODDLER 52.50, PRESCHOOL 47.50, SCHOOL_AGE 42.50
#   fcc    MOST_POPULOUS:      INFANT 45, TODDLER 45, PRESCHOOL 46.50, SCHOOL_AGE 46
#   fcc    LOWEST_PERCENTILE:  INFANT 40.50, TODDLER 40, PRESCHOOL 40, SCHOOL_AGE 40

- name: Center, Clark County, infant.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person:
        age: 0
        immigration_status: CITIZEN
        nv_ccdp_provider_type: CENTER
    households:
      household:
        members: [person]
        state_code: NV
        county: CLARK_COUNTY_NV
  output:
    # 0 months -> INFANT; MOST_POPULOUS x CENTER x INFANT = 62.50
    nv_ccdp_provider_rate: 62.50

- name: Center, lowest-percentile region, toddler.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person:
        age: 2
        immigration_status: CITIZEN
        nv_ccdp_provider_type: CENTER
    households:
      household:
        members: [person]
        state_code: NV
        county: WASHOE_COUNTY_NV
  output:
    # 24 months -> TODDLER; LOWEST_PERCENTILE x CENTER x TODDLER = 52.50
    nv_ccdp_provider_rate: 52.50

- name: Center, Clark County, preschool (age 5 is preschool, not school age).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person:
        age: 5
        immigration_status: CITIZEN
        nv_ccdp_provider_type: CENTER
    households:
      household:
        members: [person]
        state_code: NV
        county: CLARK_COUNTY_NV
  output:
    # 60 months in [36, 72) -> PRESCHOOL; MOST_POPULOUS x CENTER x PRESCHOOL = 51.50
    nv_ccdp_provider_rate: 51.50

- name: Family child care, Clark County, preschool.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person:
        age: 4
        immigration_status: CITIZEN
        nv_ccdp_provider_type: FCC
    households:
      household:
        members: [person]
        state_code: NV
        county: CLARK_COUNTY_NV
  output:
    # 48 months -> PRESCHOOL; MOST_POPULOUS x FCC x PRESCHOOL = 46.50
    nv_ccdp_provider_rate: 46.50

- name: Family child care, lowest-percentile region, school age.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
