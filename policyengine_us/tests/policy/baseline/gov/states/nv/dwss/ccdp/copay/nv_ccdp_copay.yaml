    households:
      household:
        members: [person1, person2, person3]
        state_code: NV
  output:
    # 2_875/mo / 6_721.82 = 0.4277 in [0.33, 0.43) -> $90
    nv_ccdp_copay: 90

- name: Income just above the 43% SMI cut-point yields a $150 copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 34_800
