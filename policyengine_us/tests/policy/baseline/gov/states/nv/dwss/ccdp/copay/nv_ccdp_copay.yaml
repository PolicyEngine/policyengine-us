# nv_ccdp_copay: SPMUnit, float (USD), MONTH
# Flat copay by income as a share of SMI (eff. Oct 1, 2024; State Plan 2.4.v):
#   <= 32.99% SMI -> $0; 33%-42% SMI -> $90; above 42% SMI -> $150.
# The $150 band begins just above 42% SMI (threshold 0.4201) per the operational
# CC PT 06-25 fee chart; the State Plan summary's "43%" is superseded by the chart.
# Waived for TANF/NEON (is_tanf_enrolled), CPS/foster placements, and homeless.
# Family of 3, period 2025-01 -> monthly SMI = 6_721.82.

- name: Income below 33% SMI yields a zero copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 24_000
      person2:
        age: 30
      person3:
        age: 3
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NV
  output:
    # 2_000/mo / 6_721.82 = 0.2975 < 0.33 -> $0
    nv_ccdp_copay: 0

- name: Income in the 33-42% SMI band yields a $90 copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 30_000
