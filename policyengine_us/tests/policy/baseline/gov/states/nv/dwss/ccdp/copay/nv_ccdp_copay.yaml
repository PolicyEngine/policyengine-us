# Edge cases: copay-band cut-points. The scale is at-or-above (single_amount),
# so the 0.33 and 0.4201 thresholds belong to the HIGHER band:
#   ratio < 0.33 -> $0; 0.33 <= ratio < 0.4201 -> $90; ratio >= 0.4201 -> $150.
# Family of 3, period 2025-01: monthly SMI = 6_721.82.

- name: Income just below the 33% SMI cut-point yields a zero copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 26_400
      person2:
        age: 30
      person3:
        age: 3
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NV
  output:
    # 2_200/mo / 6_721.82 = 0.3273 < 0.33 -> $0
    nv_ccdp_copay: 0

- name: Income just above the 33% SMI cut-point yields a $90 copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 26_700
      person2:
        age: 30
      person3:
        age: 3
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NV
  output:
    # 2_225/mo / 6_721.82 = 0.3310 >= 0.33 -> $90
    nv_ccdp_copay: 90

- name: Income just below the 42% SMI cut-point stays in the $90 band.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 33_600
      person2:
        age: 30
      person3:
        age: 3
