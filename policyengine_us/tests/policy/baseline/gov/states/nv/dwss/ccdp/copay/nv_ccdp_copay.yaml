        state_code: NV
  output:
    # 2_850/mo / 6_721.82 = 0.4240 >= 0.4201 -> $150
    nv_ccdp_copay: 150

- name: Income at 42.8% SMI (above the operational 42% break) yields a $150 copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 34_500
      person2:
        age: 30
      person3:
        age: 3
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NV
  output:
    # 2_875/mo / 6_721.82 = 0.4277 >= 0.4201 -> $150. The State Plan summary
    # text ("43%-49% -> $150") would wrongly bucket this 42-43% SMI income as
    # $90; the operational chart (42% break) correctly makes it $150.
    nv_ccdp_copay: 150

