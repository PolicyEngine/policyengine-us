# nv_ccdp_copay: SPMUnit, float (USD), MONTH
# CC PT 06-25 flat copay by income as a share of SMI:
#   <= 32.99% SMI -> $0; 33%-42% SMI -> $90; 43%-49% SMI -> $150.
# Waived for TANF/NEON (is_tanf_enrolled), CPS/foster placements, and homeless.
# Family of 3, period 2025-01 -> monthly SMI = 6_721.82.

- name: Income below 33% SMI yields a zero copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 24_000
      person2:
        age: 30
      person3:
        age: 3
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NV
  output:
    # 2_000/mo / 6_721.82 = 0.2975 < 0.33 -> $0
    nv_ccdp_copay: 0

- name: Income in the 33-42% SMI band yields a $90 copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 30_000
      person2:
        age: 30
      person3:
        age: 3
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NV
  output:
    # 2_500/mo / 6_721.82 = 0.3719 in [0.33, 0.43) -> $90
    nv_ccdp_copay: 90

- name: Income in the 43-49% SMI band yields a $150 copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 40_000
      person2:
        age: 30
      person3:
        age: 3
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NV
  output:
    # 3_333/mo / 6_721.82 = 0.4959 >= 0.43 -> $150
    nv_ccdp_copay: 150

