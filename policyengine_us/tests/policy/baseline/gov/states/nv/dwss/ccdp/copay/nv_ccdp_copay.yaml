    households:
      household:
        members: [person1, person2, person3]
        state_code: NV
  output:
    # 2_800/mo / 6_721.82 = 0.4166 in [0.33, 0.4201) -> $90
    nv_ccdp_copay: 90

- name: Income just above the 42% SMI cut-point yields a $150 copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 34_200
      person2:
        age: 30
