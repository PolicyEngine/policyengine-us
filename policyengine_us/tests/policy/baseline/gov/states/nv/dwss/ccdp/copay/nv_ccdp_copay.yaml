  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        self_employment_income: -120_000
      person2:
        age: 30
      person3:
        age: 3
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NV
  output:
    # countable income floors at 0, so the SMI ratio is 0 -> $0 (no negative band)
    nv_ccdp_copay: 0

# Protective-services copay waiver (the other half of the OR alongside
# is_in_foster_care in nv_ccdp_copay.py). The waiver only fires when the
# protective-care child is also an eligible child (nv_ccdp_eligible_child).

- name: A child receiving/needing protective services waives the copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 40_000
      person2:
        age: 30
      person3:
        age: 3
        immigration_status: CITIZEN
        receives_or_needs_protective_services: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NV
  output:
    # Would be $150 band, but the eligible child needs protective services -> $0
    nv_ccdp_copay: 0

- name: Protective services for a non-eligible child does not waive the copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 40_000
      person2:
        age: 30
      person3:
        # Age 15 with no developmental delay -> not an nv_ccdp_eligible_child,
        # so the protective-services flag cannot trigger the copay waiver.
        age: 15
        immigration_status: CITIZEN
        receives_or_needs_protective_services: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NV
  output:
    # 3_333/mo / 6_721.82 = 0.4959 >= 0.43 -> $150; no eligible child in
    # protective care, so the waiver does not apply.
    nv_ccdp_copay: 150
