# nv_ccdp_age_group: Person, Enum (NVCCDPAgeGroup), MONTH
# age_group/months.yaml brackets (age in months = age_years * 12):
#   < 25 -> INFANT, 25-36 -> TODDLER, 37-59 -> PRESCHOOL, >= 60 -> SCHOOL_AGE

- name: Infant at 12 months (age 1).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 1
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 1 * 12 = 12 months < 25 -> INFANT
    nv_ccdp_age_group: INFANT

- name: Infant at exactly 24 months (age 2, below 25-month toddler cutoff).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 2
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 2 * 12 = 24 months < 25 -> INFANT
    nv_ccdp_age_group: INFANT

- name: Toddler at 36 months (age 3).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 3
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 3 * 12 = 36 months in [25, 37) -> TODDLER
    nv_ccdp_age_group: TODDLER

- name: Preschool at 48 months (age 4).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 4
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 4 * 12 = 48 months in [37, 60) -> PRESCHOOL
    nv_ccdp_age_group: PRESCHOOL

- name: School age at 72 months (age 6).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 6
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 6 * 12 = 72 months >= 60 -> SCHOOL_AGE
    nv_ccdp_age_group: SCHOOL_AGE

# Edge cases: months-scale cut-points (25, 37, 60). The scale is at-or-above,
# so each threshold belongs to the upper band. `age` is a float, so ages are
# chosen to land just above each cutoff in months (age * 12).

- name: Toddler just above the 25-month cutoff (age 2.1 = 25.2 months).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 2.1
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 2.1 * 12 = 25.2 months >= 25 -> TODDLER
    nv_ccdp_age_group: TODDLER

- name: Preschool just above the 37-month cutoff (age 3.1 = 37.2 months).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 3.1
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 3.1 * 12 = 37.2 months in [37, 60) -> PRESCHOOL
    nv_ccdp_age_group: PRESCHOOL

- name: Preschool just below the 60-month cutoff (age 4.9 = 58.8 months).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 4.9
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 4.9 * 12 = 58.8 months < 60 -> PRESCHOOL
    nv_ccdp_age_group: PRESCHOOL

- name: School age at exactly the 60-month cutoff (age 5 = 60 months).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 5
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 5 * 12 = 60 months >= 60 -> SCHOOL_AGE
    nv_ccdp_age_group: SCHOOL_AGE

- name: Newborn at age 0 is an infant.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 0
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 0 months < 25 -> INFANT
    nv_ccdp_age_group: INFANT
