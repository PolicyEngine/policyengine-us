# nv_ccdp_age_group: Person, Enum (NVCCDPAgeGroup), MONTH
# Policy Manual MS 631 / MS 633.1 age brackets (age in months = age_years * 12):
#   < 12 -> INFANT, 12-36 -> TODDLER, 36-72 -> PRESCHOOL, >= 72 -> SCHOOL_AGE
# The scale is at-or-above, so each cutoff (12, 36, 72 months) belongs to the
# higher band (care level changes on the child's birthday, MS 631).

- name: Newborn at age 0 is an infant.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 0
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 0 months < 12 -> INFANT
    nv_ccdp_age_group: INFANT

- name: Infant just below the 12-month toddler cutoff (age 0.9 = 10.8 months).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 0.9
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 0.9 * 12 = 10.8 months < 12 -> INFANT
    nv_ccdp_age_group: INFANT

- name: Toddler at exactly the 12-month cutoff (age 1 = 12 months).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 1
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 1 * 12 = 12 months >= 12 -> TODDLER (care level changes on first birthday)
    nv_ccdp_age_group: TODDLER

- name: Toddler at 24 months (age 2).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 2
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 2 * 12 = 24 months in [12, 36) -> TODDLER
    nv_ccdp_age_group: TODDLER

- name: Toddler just below the 36-month preschool cutoff (age 2.9 = 34.8 months).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 2.9
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 2.9 * 12 = 34.8 months < 36 -> TODDLER
    nv_ccdp_age_group: TODDLER

- name: Preschool at exactly the 36-month cutoff (age 3 = 36 months).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 3
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 3 * 12 = 36 months >= 36 -> PRESCHOOL (care level changes on third birthday)
    nv_ccdp_age_group: PRESCHOOL

- name: Preschool at 48 months (age 4).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 4
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 4 * 12 = 48 months in [36, 72) -> PRESCHOOL
    nv_ccdp_age_group: PRESCHOOL

- name: Preschool at 60 months (age 5, below the 72-month school-age cutoff).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 5
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 5 * 12 = 60 months in [36, 72) -> PRESCHOOL
    nv_ccdp_age_group: PRESCHOOL

- name: Preschool just below the 72-month cutoff (age 5.9 = 70.8 months).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 5.9
    households:
      household:
        members: [person]
        state_code: NV
  output:
    # 5.9 * 12 = 70.8 months < 72 -> PRESCHOOL
    nv_ccdp_age_group: PRESCHOOL

- name: School age at exactly the 72-month cutoff (age 6 = 72 months).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person:
        age: 6
    households:
      household:
