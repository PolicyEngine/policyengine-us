# nv_ccdp_activity_eligible: SPMUnit, bool, MONTH
# OR of: meets_ccdf_activity_test (SPMUnit/YEAR), is_tanf_enrolled (SPMUnit),
# is_homeless (Household). Each disjunct is tested in isolation so an OR-to-AND
# flip is caught.

- name: No qualifying activity is not activity-eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: false
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: NV
        is_homeless: false
  output:
    nv_ccdp_activity_eligible: false

- name: Meeting the CCDF activity test is activity-eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: true
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: NV
        is_homeless: false
  output:
    nv_ccdp_activity_eligible: true

- name: TANF enrollment (NEON pathway) is activity-eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: false
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: NV
        is_homeless: false
  output:
    nv_ccdp_activity_eligible: true

- name: Homelessness (Homeless Self-Sufficiency Plan) is activity-eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: false
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: NV
        is_homeless: true
  output:
    nv_ccdp_activity_eligible: true
