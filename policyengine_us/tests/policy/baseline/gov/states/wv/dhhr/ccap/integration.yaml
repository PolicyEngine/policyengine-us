- name: Case 6, copay reduces capped provider reimbursement.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 24_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_attending_days_per_month: 17
        pre_subsidy_childcare_expenses: 12_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    wv_ccap_eligible: true
    # Center Tier I Toddler = $37/day.
    wv_ccap_daily_rate: [0, 37]
    # 17 days/month is in the 13-20 monthly-rate range.
    # Base reimbursement (monthly rate): $37 × 20 = $740.
    # Copay: 2-person FPL 1.1348 → Appendix A "120%" row $5.75/day × 17 = $97.75.
    wv_ccap_copay: 97.75
    # benefit = max($740 - $97.75, 0) = $642.25.
    wv_ccap: 642.25

# Manual §7.2.7.2: rate supplements are paid for actual days only — the monthly
# rate does NOT apply to rate supplements. This case is the regression guard.
- name: Case 7, supplement billed by actual days even when monthly rate applies.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 24_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        has_developmental_delay: true
        ssi: 0
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_attending_days_per_month: 17
        pre_subsidy_childcare_expenses: 12_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    wv_ccap_eligible: true
    # Center Tier I Toddler = $37/day base; special needs supplement = $3/day.
    wv_ccap_daily_rate: [0, 37]
    # 17 days/month is in the 13-20 monthly-rate range.
    # Base reimbursement (monthly rate): $37 × 20 = $740.
    # Supplement reimbursement (actual days, Manual §7.2.7.2): $3 × 17 = $51.
    # Total reimbursement: $740 + $51 = $791 (under pre_subsidy $1_000).
    # Copay: same as Case 6 (2-person FPL 1.1348, 17 days) = $97.75.
    wv_ccap_copay: 97.75
    # benefit = max($791 - $97.75, 0) = $693.25.
    wv_ccap: 693.25

- name: Case 8, less than thirteen monthly days uses per-day rate.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 24_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_attending_days_per_month: 9
        pre_subsidy_childcare_expenses: 12_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    wv_ccap_eligible: true
    # 9 days/month is below the 13-day monthly-rate threshold.
    # Center Tier I Toddler = $37/day; daily charge = $1_000 / 9 = $111.11.
    wv_ccap_daily_benefit: [0, 37]
    # Copay: 2-person FPL 1.1348 → Appendix A "120%" row $5.75/day × 9 = $51.75.
    wv_ccap_copay: 51.75
    # Per-child reimbursement is capped before copay:
    # max(min($1_000 expense, $37 × 9 max rate) - $51.75, 0) = $281.25.
    wv_ccap: 281.25
