- name: Case 1, child under 13 who is a citizen and dependent.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    wv_ccap_eligible_child: [false, true]

- name: Case 2, child age 13 ineligible without disability.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 13
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    wv_ccap_eligible_child: [false, false]

- name: Case 3, disabled child age 15 eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 15
        is_tax_unit_dependent: true
        has_developmental_delay: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    wv_ccap_eligible_child: [false, true]

- name: Case 4, undocumented child ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: UNDOCUMENTED
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    wv_ccap_eligible_child: [false, false]

- name: Case 5, non-tax-dependent child still eligible (residency, not tax dependency, governs).
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 8
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # §3.2 requires the child to reside with the family, not to be a tax
    # dependent. With the dependency filter removed, a co-resident child
    # under 13 who is a citizen remains eligible.
    wv_ccap_eligible_child: [false, true]
