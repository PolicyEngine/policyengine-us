# WV CCAP activity eligibility tests
# Per Manual §3.6.1, all parents/heads/spouses must work ≥20 hours/week OR be
# in school/training. Single-parent units use the head's status; two-parent
# units require BOTH parents to qualify.

- name: Case 1, single parent working 20 hours per week eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked: 20
      person2:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    wv_ccap_activity_eligible: true

- name: Case 2, single parent working under 20 hours per week ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        weekly_hours_worked: 15
        is_full_time_student: false
      person2:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    wv_ccap_activity_eligible: false

- name: Case 3, single parent who is a full-time student eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 22
        employment_income: 0
        weekly_hours_worked: 0
        is_full_time_student: true
      person2:
        age: 3
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    wv_ccap_activity_eligible: true

- name: Case 4, two-parent family with both parents meeting requirement eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked: 30
      person2:
        age: 28
        employment_income: 18_000
        weekly_hours_worked: 25
      person3:
        age: 4
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: WV
  output:
    wv_ccap_activity_eligible: true

- name: Case 5, two-parent family with one parent not meeting requirement ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked: 30
      person2:
        age: 28
        employment_income: 6_000
        weekly_hours_worked: 10
        is_full_time_student: false
      person3:
        age: 4
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: WV
  output:
    wv_ccap_activity_eligible: false

- name: Case 6, child-only SPM unit has no caretaker and fails.
  period: 2025-01
  input:
    people:
      person1:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WV
  output:
    wv_ccap_activity_eligible: false
