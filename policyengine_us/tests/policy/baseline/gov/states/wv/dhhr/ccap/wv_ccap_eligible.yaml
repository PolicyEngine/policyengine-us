# WV CCAP overall eligibility tests
# Combines: eligible child + income eligible + activity eligible

- name: Case 1, eligible child and income and activity.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        childcare_hours_per_week: 40
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # Child age 5 < 13 -> eligible child
    # Income 24,000 < 185% FPL (39,127.50) -> income eligible
    # Parent works 30 hrs >= 20 -> activity eligible
    wv_ccap_eligible: true

- name: Case 2, no eligible child means not eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked: 30
      person2:
        age: 15
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # Child age 15 >= 13, not disabled -> no eligible child
    wv_ccap_eligible: false

- name: Case 3, income too high means not eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        # Need income above 85% SMI for family of 2:
        #   WV 4-person SMI (2024-10-01) = 90,661; 2-person factor = 0.68
        #   85% SMI family of 2 = 90,661 * 0.68 * 0.85 = 52,401.86/yr
        employment_income: 60_000
        weekly_hours_worked: 40
      person2:
        age: 5
        is_tax_unit_dependent: true
        childcare_hours_per_week: 40
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # 60,000 > 52,401.86 -> not income eligible
    wv_ccap_eligible: false

- name: Case 4, parent not meeting activity hours means not eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        weekly_hours_worked: 10
        is_full_time_student: false
      person2:
        age: 5
        is_tax_unit_dependent: true
        childcare_hours_per_week: 40
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # Parent works 10 hrs < 20 minimum, not student -> not activity eligible
    wv_ccap_eligible: false

- name: Case 5, two-parent family both meeting activity requirement.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 18_000
        weekly_hours_worked: 25
      person2:
        age: 28
        employment_income: 12_000
        weekly_hours_worked: 20
      person3:
        age: 3
        is_tax_unit_dependent: true
        childcare_hours_per_week: 40
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: WV
  output:
    # Both parents work >= 20 hrs -> activity eligible
    # Combined income: 30,000 < 185% FPL-3 (49,302.50) -> income eligible
    # Child age 3 < 13 -> eligible child
    wv_ccap_eligible: true

- name: Case 6, minor parent in qualifying activity remains eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 17
        employment_income: 12_000
        weekly_hours_worked: 25
      person2:
        age: 1
        is_tax_unit_dependent: true
        childcare_hours_per_week: 40
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # Manual §1.1.10, §4.5.3.6, §4.5.6 contemplate minor parents in
    # qualifying activity. Parent age 17 working 25 hrs/wk meets the
    # activity test; income well below 85% SMI; child age 1 eligible.
    wv_ccap_eligible: true
