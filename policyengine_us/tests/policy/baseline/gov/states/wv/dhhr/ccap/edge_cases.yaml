        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # Full time student -> individually_eligible
    wv_ccap_activity_eligible: true

