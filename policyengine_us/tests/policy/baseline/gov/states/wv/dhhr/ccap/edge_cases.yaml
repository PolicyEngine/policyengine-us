# WV CCAP Edge Case Tests
# Income test: 185% FPL initial intake cap (Manual §3.2.1, Appendix A).
# 2025 FPG (Contiguous US): first_person = 15_650, additional = 5_500.
#   Family of 2 FPG = 21_150/yr = 1_762.50/mo; family of 3 = 26_650/yr.
# 185% FPL family of 2  = 21_150 * 1.85 = 39_127.50/yr
# 185% FPL family of 3  = 26_650 * 1.85 = 49_302.50/yr
# 185% FPL family of 11 = 70_650 * 1.85 = 130_702.50/yr

# ============================================================
# Income threshold boundaries (185% FPL)
# ============================================================

- name: Case 1, income well below 185% FPL eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_days_per_week: 5
        pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # $24,000/yr is well below 185% FPL family of 2 ($39,127.50/yr) → eligible.
    wv_ccap_income_eligible: true

- name: Case 2, income just below 185% FPL eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        # 185% FPL family of 2 = $39,127.50/yr
        employment_income: 39_000
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_days_per_week: 5
        pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # $39,000/yr ≤ $39,127.50 → eligible (just below boundary).
    wv_ccap_income_eligible: true

- name: Case 3, income just above 185% FPL ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        # Just above 185% FPL family of 2 ($39,127.50/yr)
        employment_income: 39_200
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_days_per_week: 5
        pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # $39,200/yr > $39,127.50 → ineligible (just above boundary).
    wv_ccap_income_eligible: false

