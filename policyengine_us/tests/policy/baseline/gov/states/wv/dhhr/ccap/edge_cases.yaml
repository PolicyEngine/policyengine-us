        childcare_days_per_week: 3
        pre_subsidy_childcare_expenses: 4_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: WV
  output:
    wv_ccap_eligible_child: [false, true, true]

    # Person2: Family Home Tier II Infant = $33/day
    # Person3: Center Tier I School Age = $32/day
    wv_ccap_daily_rate: [0, 33, 32]

    # Person2 age 1 = 12 months -> INFANT
    # Person3 age 6 = 72 months -> SCHOOL_AGE
    wv_ccap_child_age_category: [SCHOOL_AGE, INFANT, SCHOOL_AGE]

    # FPL ratio = (20_000/12) / (26_650/12) = 0.7505 → 3.0% bracket.
    # per_child_copay = 1_666.67 × 0.03 = 50; 2 eligible children → 100.
    wv_ccap_copay: 100

    # Person2 (FAMILY_HOME Tier II Infant, 5 days/wk, 6_000/yr):
    #   monthly expenses 500; actual_days 21.67 (>20 → per-day billing).
    #   daily_charge = 500/21.667 = 23.077; daily_benefit = min(33, 23.077) = 23.077.
    #   per_child_reimbursement = min(23.077 × 21.667, 500) = 500.
    # Person3 (CENTER Tier I School-Age, 3 days/wk, 4_000/yr):
    #   monthly expenses 333.33; actual_days 13 (in 13-20 → monthly billing, 20 days).
    #   daily_charge = 333.33/13 = 25.641; daily_benefit = min(32, 25.641) = 25.641.
    #   per_child_reimbursement = min(25.641 × 20, 333.33) = 333.33.
    # total reimbursement = 833.33; monthly pre_subsidy = 833.33.
    # uncapped = max(833.33 - 100, 0) = 733.33; benefit = min(733.33, 833.33) = 733.33.
    wv_ccap: 733.33

# ============================================================
# Child-only SPM unit cannot pass activity test
# ============================================================

- name: Case 51, child-only SPM unit fails activity test.
  period: 2025-01
  input:
    people:
      person1:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WV
  output:
    # No head/spouse caretaker present -> activity test must fail,
    # otherwise child-only units would pass on income + assets alone.
    wv_ccap_activity_eligible: false
    wv_ccap_eligible: false
