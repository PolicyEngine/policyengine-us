- name: Case 43, benefit capped at pre-subsidy expenses minus copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      person2:
        age: 0.5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_III
        childcare_days_per_week: 5
        # Low childcare expenses: rate will exceed daily charge
        pre_subsidy_childcare_expenses: 3_600
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 3_600
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # Center Tier III Infant = $45/day
    wv_ccap_daily_rate: [0, 45]

    # daily charge = (3_600/12) / (5 * 52/12) = 300 / 21.67 = 13.84
    # daily benefit = min(45, 13.84) = 13.84
    wv_ccap_daily_benefit: [0, 13.84]

    # total reimbursement = 13.84 * 21.67 = 299.89
    # FPL ratio = 2_000 / 1_762.50 = 1.1348 -> 3.5% bracket
    # copay = 2_000 * 0.035 = 70
    # uncapped = max(300 - 70, 0) = 230
    # benefit = min(230, 299.89) = 230
    wv_ccap: 230

