    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5, person6, person7]
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6, person7]
        state_code: WV
  output:
    # 7-person family, monthly income $3_500. FPG family-of-7 = $3_945; ratio = 0.887.
    # Appendix A 7-person "90%" row daily fee = $4.50/child.
    # 3 eligible children × 5 days × 52/12 = 65 monthly days total.
    # uncapped copay = $4.50 × 65 × 1 = $292.50.
    # 7% cap = $3_500 × 0.07 = $245; cap binds.
    wv_ccap_copay: 245

# ============================================================
# Activity hours boundary
# ============================================================

- name: Case 20, parent at exactly 20 hours per week activity eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        immigration_status: CITIZEN
        weekly_hours_worked: 20
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # 20 >= 20 -> meets activity requirement
    wv_ccap_activity_eligible: true

- name: Case 21, parent at 19 hours per week activity ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        immigration_status: CITIZEN
        weekly_hours_worked: 19
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # 19 < 20 -> does NOT meet activity requirement
    # But person1 is head/spouse, and the formula checks:
    # sum(is_head_or_spouse & ~individually_eligible) == 0
    # Person1 is head, not eligible -> sum = 1 != 0 -> false
    wv_ccap_activity_eligible: false

