# ============================================================
# Copay at 40% FPL boundary (should be $0)
# ============================================================

- name: Case 16, income at exactly 40% FPL copay is zero.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # 40% FPL family of 2 = 21_150 * 0.4 = 8_460/yr
        employment_income: 8_460
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_days_per_week: 5
        pre_subsidy_childcare_expenses: 8_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 8_000
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # monthly income = 8_460 / 12 = 705
    # FPL ratio = 705 / 1_762.50 = 0.4
    # Threshold for non-zero copay is 0.4001, so 0.4 -> 0% bracket
    wv_ccap_copay: 0

- name: Case 17, income just above 40% FPL copay is non-zero.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # Just above 40% FPL: need FPL ratio > 0.4001
        # 21_150 * 0.4001 = 8_462.12/yr; use 8_475 -> ratio ~0.4008
        employment_income: 8_475
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_days_per_week: 5
        pre_subsidy_childcare_expenses: 8_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 8_000
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # Monthly income = 8_475 / 12 = $706.25. FPL ratio = 0.4007 > 0.4001 → bracket
    # "above 40% up to 50%" → Appendix A 2-person "50%" row daily fee = $2.00/child.
    # copay = $2.00 × 21.67 × 1 = $43.33.
    # 7% cap = $706.25 × 0.07 = $49.44; cap does not bind.
    wv_ccap_copay: 43.33

# ============================================================
# Copay 7% cap behavior
# ============================================================

- name: Case 18, high FPL 2-person family copay below 7% cap.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # ~170% FPL family of 2: 21_150 * 1.7 = 35_955/yr.
        employment_income: 35_955
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_days_per_week: 5
        pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # Monthly income = $2_996.25. FPL ratio = 1.7000 → bracket "above 160% up to 170%"
    # → Appendix A 2-person "170%" row daily fee = $8.25/child.
    # uncapped copay = $8.25 × 21.67 × 1 = $178.75.
    # 7% cap = $2_996.25 × 0.07 = $209.74; cap does not bind.
    wv_ccap_copay: 178.75

