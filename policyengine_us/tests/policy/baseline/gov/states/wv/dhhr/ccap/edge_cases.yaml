# ============================================================
# Multiple children in one family
# ============================================================

- name: Case 50, two eligible children different ages and providers.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 20_000
        immigration_status: CITIZEN
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: FAMILY_HOME
        wv_ccap_quality_tier: TIER_II
        childcare_days_per_week: 5
        pre_subsidy_childcare_expenses: 6_000
      person3:
        age: 6
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_days_per_week: 3
        pre_subsidy_childcare_expenses: 4_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: WV
  output:
    wv_ccap_eligible_child: [false, true, true]

    # Person2: Family Home Tier II Infant = $33/day
    # Person3: Center Tier I School Age = $32/day
    wv_ccap_daily_rate: [0, 33, 32]

    # Person2 age 1 = 12 months -> INFANT
    # Person3 age 6 = 72 months -> SCHOOL_AGE
    wv_ccap_child_age_category: [SCHOOL_AGE, INFANT, SCHOOL_AGE]

    # 3-person family, FPL ratio = 1_666.67 / 2_151.67 = 0.7746 → bracket
    # "above 70% up to 80%" → Appendix A 3-person "80%" row daily fee = $2.25/child.
    # person2: 5 days/week; person3: 3 days/week → 8 weekly × 52/12 = 34.67 monthly days.
    # 2 eligible children in care → billed_share = 2/2 = 1.
    # copay = $2.25 × 34.67 × 1 = $78.00.
    wv_ccap_copay: 78

    # Person2 (FAMILY_HOME Tier II Infant, 5 days/wk, $6_000/yr expenses):
    #   monthly expenses $500; actual_days 21.67 (>20 → per-day billing).
    #   per_child = min($33 × 21.67, $500) = $500.
    # Person3 (CENTER Tier I School-Age, 3 days/wk, $4_000/yr expenses):
    #   monthly expenses $333.33; actual_days 13 (in 13-20 → monthly rate, 20 days).
    #   per_child = min($32 × 20, $333.33) = $333.33.
    # total reimbursement = $500 + $333.33 = $833.33.
    # benefit = max($833.33 - $78, 0) = $755.33.
    wv_ccap: 755.33

# ============================================================
# Child-only SPM unit cannot pass activity test
# ============================================================

- name: Case 51, child-only SPM unit fails activity test.
  period: 2025-01
  input:
    people:
      person1:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WV
  output:
    # No head/spouse caretaker present -> activity test must fail,
    # otherwise child-only units would pass on income + assets alone.
    wv_ccap_activity_eligible: false
    wv_ccap_eligible: false
