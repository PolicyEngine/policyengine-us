- name: Case 1, all conditions met, eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2]
        me_ccap_income_eligible: true
        is_ccdf_asset_eligible: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ME
  output:
    me_ccap_eligible: true

