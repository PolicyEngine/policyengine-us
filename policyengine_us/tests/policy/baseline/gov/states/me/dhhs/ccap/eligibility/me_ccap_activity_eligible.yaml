- name: Case 1, employed single parent meets requirement.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 20
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ME
  output:
    me_ccap_activity_eligible: true

