- name: Case 1, default residual is living alone or with others.
  period: 2025-01
  input:
    state_code: ME
  output:
    me_ssp_payment_category: LIVING_ALONE_OR_WITH_OTHERS

- name: Case 2, federal medical treatment facility derives Medicaid facility.
  period: 2025-01
  input:
    state_code: ME
    ssi_lives_in_medical_treatment_facility: true
    ssi_medicaid_pays_majority_of_care: true
  output:
    me_ssp_payment_category: MEDICAID_FACILITY

- name: Case 3, household of another from state input.
  period: 2025-01
  input:
    state_code: ME
    me_ssp_living_arrangement: HOUSEHOLD_OF_ANOTHER
  output:
    me_ssp_payment_category: HOUSEHOLD_OF_ANOTHER

- name: Case 4, adult foster home from state input.
  period: 2025-01
  input:
    state_code: ME
    me_ssp_living_arrangement: ADULT_FOSTER_HOME
  output:
    me_ssp_payment_category: ADULT_FOSTER_HOME

- name: Case 5, flat rate boarding home from state input.
  period: 2025-01
  input:
    state_code: ME
    me_ssp_living_arrangement: FLAT_RATE_BOARDING_HOME
  output:
    me_ssp_payment_category: FLAT_RATE_BOARDING_HOME

- name: Case 6, adult family care home from state input.
  period: 2025-01
  input:
    state_code: ME
    me_ssp_living_arrangement: ADULT_FAMILY_CARE_HOME
  output:
    me_ssp_payment_category: ADULT_FAMILY_CARE_HOME

- name: Case 7, cost reimbursed boarding home from state input.
  period: 2025-01
  input:
    state_code: ME
    me_ssp_living_arrangement: COST_REIMBURSED_BOARDING_HOME
  output:
    me_ssp_payment_category: COST_REIMBURSED_BOARDING_HOME

- name: Case 8, residential care facility from state input.
  period: 2025-01
  input:
    state_code: ME
    me_ssp_living_arrangement: RESIDENTIAL_CARE_FACILITY
  output:
    me_ssp_payment_category: RESIDENTIAL_CARE_FACILITY

- name: Case 9, federal medical treatment facility takes priority over state input.
  period: 2025-01
  input:
    state_code: ME
    ssi_lives_in_medical_treatment_facility: true
    ssi_medicaid_pays_majority_of_care: true
    me_ssp_living_arrangement: RESIDENTIAL_CARE_FACILITY
  output:
    me_ssp_payment_category: MEDICAID_FACILITY

- name: Case 10, federal medical facility overrides adult foster home state input.
  period: 2025-01
  input:
    state_code: ME
    ssi_lives_in_medical_treatment_facility: true
    ssi_medicaid_pays_majority_of_care: true
    me_ssp_living_arrangement: ADULT_FOSTER_HOME
  output:
    me_ssp_payment_category: MEDICAID_FACILITY

- name: Case 11, NONE state input remains NONE when no federal override.
  period: 2025-01
  input:
    state_code: ME
    me_ssp_living_arrangement: NONE
  output:
    me_ssp_payment_category: NONE

- name: Case 12, federal another-person's-household derives Maine code C (HOUSEHOLD_OF_ANOTHER).
  period: 2025-01
  input:
    state_code: ME
    # The federal classifier requires all three flags below to land on
    # ANOTHER_PERSONS_HOUSEHOLD per 20 CFR 416.1131-1133.
    ssi_lives_in_another_persons_household: true
    ssi_receives_shelter_from_others_in_household: true
    ssi_others_pay_all_meals: true
  output:
    me_ssp_payment_category: HOUSEHOLD_OF_ANOTHER

- name: Case 13, federal medical facility takes priority over federal another-household.
  period: 2025-01
  input:
    state_code: ME
    ssi_lives_in_medical_treatment_facility: true
    ssi_medicaid_pays_majority_of_care: true
    ssi_lives_in_another_persons_household: true
    ssi_receives_shelter_from_others_in_household: true
    ssi_others_pay_all_meals: true
  output:
    me_ssp_payment_category: MEDICAID_FACILITY
