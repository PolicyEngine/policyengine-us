# Parent fee tests use me_ccap_smi and me_ccap_countable_income
# as direct inputs to isolate the copay calculation from income pipeline.

- name: Case 1, below 30% SMI, zero copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        me_ccap_smi: 6_410.26
        me_ccap_countable_income: 1_250
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # 19.5% < 30% => 0% fee bracket.
    me_ccap_parent_fee: 0

- name: Case 2, 30-35% SMI bracket, 1% fee.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        me_ccap_smi: 6_417.97
        me_ccap_countable_income: 2_053.75
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # Weekly income = 2053.75 * 12/52 = 473.94.
    # Fee = floor(473.94 * 0.01) = floor(4.74) = 4.
    # Monthly = 4 * 52/12 = 17.33.
    me_ccap_parent_fee: 17.33

