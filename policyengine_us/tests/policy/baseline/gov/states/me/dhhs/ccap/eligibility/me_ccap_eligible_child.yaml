- name: Case 14, disabled child age 15 but DACA, ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 15
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: DACA
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # Age 15 < 19 (special needs) but DACA is not a qualified status.
    me_ccap_eligible_child: [false]
