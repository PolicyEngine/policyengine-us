- name: Case 1, child under 13, citizen, dependent, eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 5
        is_disabled: false
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    me_ccap_eligible_child: [true]

