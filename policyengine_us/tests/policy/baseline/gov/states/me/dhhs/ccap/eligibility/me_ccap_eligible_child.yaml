# === Edge cases ===

- name: Case 9, disabled child exactly age 13, eligible under special needs.
  period: 2025-01
  input:
    people:
      person1:
        age: 13
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # age 13 < 19 (special needs limit) => eligible.
    me_ccap_eligible_child: [true]

- name: Case 10, non-disabled child age 0 (newborn), eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 0
        is_disabled: false
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    me_ccap_eligible_child: [true]

- name: Case 11, disabled child exactly age 18, eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 18
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # age 18 < 19 => eligible.
    me_ccap_eligible_child: [true]

- name: Case 12, adult age 30, not eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_disabled: false
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # age 30 >= 13 and not dependent => ineligible.
    me_ccap_eligible_child: [false]

- name: Case 13, child age 12 but legal permanent resident, eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 12
