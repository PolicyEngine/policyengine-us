- name: Case 15, parameter coverage starts 2011.
  period: 2011-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        uncapped_ssi: 1_000
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # First period with parameter coverage; default arrangement A => $10.
    me_ssp: 10

- name: Case 16, SS-only path with partial reduction in flat rate boarding home.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        # Monthly uncapped SSI = -$200 income excess.
        uncapped_ssi: -200
        me_ssp_living_arrangement: FLAT_RATE_BOARDING_HOME
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # Income above the federal SSI break-even but below the combined
    # SSI + ME standard => reduced state supplement: $217 - $200 = $17.
    me_ssp: 17

- name: Case 17, federal another-person's-household derives Maine code C.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        uncapped_ssi: 1_000
        ssi_lives_in_another_persons_household: true
        ssi_receives_shelter_from_others_in_household: true
        ssi_others_pay_all_meals: true
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # Federal classifier derives ANOTHER_PERSONS_HOUSEHOLD =>
    # Maine code C HOUSEHOLD_OF_ANOTHER => individual amount $8.
    me_ssp: 8

- name: Case 18, SS-only code A with small excess absorbed by $55 disregard.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        # Monthly uncapped SSI = -$20 excess.
        uncapped_ssi: -20
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # $20 - $55 disregard = $0 adjusted; fixed A pays full $10.
    me_ssp: 10

- name: Case 19, SS-only code A excess above combined limit pays zero.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        # Monthly uncapped SSI = -$100 excess.
        uncapped_ssi: -100
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # $100 - $55 = $45 > $10 supplement -> $0.
    me_ssp: 0
