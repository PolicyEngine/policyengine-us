- name: Case 1, infant, 6 months old.
  period: 2025-01
  input:
    age: 0.5
    state_code: ME
  output:
    me_ccap_age_group: INFANT

- name: Case 2, infant at upper boundary, 11 months.
  period: 2025-01
  input:
    age: 0.92
    state_code: ME
  output:
    me_ccap_age_group: INFANT

- name: Case 3, toddler, 1 year old.
  period: 2025-01
  input:
    age: 1
    state_code: ME
  output:
    me_ccap_age_group: TODDLER

- name: Case 4, toddler, 2 years old.
  period: 2025-01
  input:
    age: 2
    state_code: ME
  output:
    me_ccap_age_group: TODDLER

- name: Case 5, preschool, 3 years old.
  period: 2025-01
  input:
    age: 3
    state_code: ME
  output:
    me_ccap_age_group: PRESCHOOL

- name: Case 6, preschool, 4 years old.
  period: 2025-01
  input:
    age: 4
    state_code: ME
  output:
    me_ccap_age_group: PRESCHOOL

- name: Case 7, school age, 5 years old.
  period: 2025-01
  input:
    age: 5
    state_code: ME
  output:
    me_ccap_age_group: SCHOOL_AGE

- name: Case 8, school age, 10 years old.
  period: 2025-01
  input:
    age: 10
    state_code: ME
  output:
    me_ccap_age_group: SCHOOL_AGE

# === Edge cases: boundary ages ===

- name: Case 9, newborn, age 0, infant.
  period: 2025-01
  input:
    age: 0
    state_code: ME
  output:
    # 0 months <= 12 months => INFANT.
    me_ccap_age_group: INFANT

- name: Case 10, school age boundary, 12 years old.
  period: 2025-01
  input:
    age: 12
    state_code: ME
  output:
    # age 12 > 5 => SCHOOL_AGE.
    me_ccap_age_group: SCHOOL_AGE

- name: Case 11, special needs child age 17, still school age group.
  period: 2025-01
  input:
    age: 17
    state_code: ME
  output:
    # Even though special needs children are eligible up to age 19,
    # the age group is still SCHOOL_AGE for all children 5+.
    me_ccap_age_group: SCHOOL_AGE
