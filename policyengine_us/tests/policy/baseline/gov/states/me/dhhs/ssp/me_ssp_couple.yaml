- name: Case 1, code A two-eligible-spouse couple each gets half of $15.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        uncapped_ssi: 1_000
        me_ssp_living_arrangement: LIVING_ALONE_OR_WITH_OTHERS
      person2:
        is_ssi_eligible: true
        uncapped_ssi: 1_000
        me_ssp_living_arrangement: LIVING_ALONE_OR_WITH_OTHERS
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ME
  output:
    # Couple total $15 / 2 = $7.50 per person.
    me_ssp_couple: [7.5, 7.5]

