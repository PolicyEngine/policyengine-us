- name: Case 10, SS-only code E couple with $100/mo per-person excess reduces share to $195.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        # Monthly uncapped SSI = -$100 per-person excess.
        uncapped_ssi: -100
        me_ssp_living_arrangement: FLAT_RATE_BOARDING_HOME
      person2:
        is_ssi_eligible: true
        uncapped_ssi: -100
        me_ssp_living_arrangement: FLAT_RATE_BOARDING_HOME
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ME
  output:
    # Per-person share $295 - $100 monthly excess = $195.
    me_ssp_couple: [195, 195]

- name: Case 11, SS-only code A couple with $20/mo excess fully absorbed by $40 per-person disregard.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        # Monthly uncapped SSI = -$20 per-person excess.
        uncapped_ssi: -20
        me_ssp_living_arrangement: LIVING_ALONE_OR_WITH_OTHERS
      person2:
        is_ssi_eligible: true
        uncapped_ssi: -20
        me_ssp_living_arrangement: LIVING_ALONE_OR_WITH_OTHERS
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ME
  output:
    # $20 - $40 disregard = $0 adjusted; fixed code A pays full $7.50 share.
    me_ssp_couple: [7.5, 7.5]

- name: Case 12, SS-only code A couple excess above $7.50 + $40 limit pays zero.
