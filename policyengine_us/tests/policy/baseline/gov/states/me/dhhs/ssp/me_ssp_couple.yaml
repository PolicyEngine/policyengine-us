- name: Case 1, living alone or with others couple per-person amount.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 600
        me_ssp_living_arrangement: LIVING_ALONE_OR_WITH_OTHERS
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # Couple total $15 / 2 = $7.50 per person.
    me_ssp_couple: 7.5

