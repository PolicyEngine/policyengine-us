        members: [person1]
        state_code: ME
  output:
    # $30 - $55 disregard = $0 adjusted; fixed C pays full $8.
    me_ssp_individual: 8

- name: Case 15, SS-only code H (Medicaid facility) gets no state disregard.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        # Annual uncapped SSI = -$240 -> $20/month excess.
        uncapped_ssi: -240
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # $20 excess > $10 supplement (no disregard for H) -> $0.
    me_ssp_individual: 0
