- name: Case 10, SS-only with partial reduction in adult family care home.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        # Annual uncapped SSI = -$2,400 -> $200/month income excess.
        uncapped_ssi: -2_400
        me_ssp_living_arrangement: ADULT_FAMILY_CARE_HOME
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # $234 table - $200 monthly excess = $34.
    me_ssp_individual: 34

- name: Case 11, SS-only income exceeds combined SSI + ME standard, payment is zero.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        # Annual uncapped SSI = -$12,000 -> $1,000/month income excess,
        # which exceeds every Maine table amount.
        uncapped_ssi: -12_000
        me_ssp_living_arrangement: ADULT_FAMILY_CARE_HOME
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # max_(0, $234 - $1,000) = $0.
    me_ssp_individual: 0

- name: Case 12, SS-only code A with small excess fully absorbed by $55 disregard.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        # Annual uncapped SSI = -$240 -> $20/month excess.
        uncapped_ssi: -240
        me_ssp_living_arrangement: LIVING_ALONE_OR_WITH_OTHERS
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # $20 excess - $55 disregard = $0 adjusted; fixed category pays full $10.
    me_ssp_individual: 10

- name: Case 13, SS-only code A excess above $10 + $55 limit pays zero.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        # Annual uncapped SSI = -$1,200 -> $100/month excess.
        uncapped_ssi: -1_200
        me_ssp_living_arrangement: LIVING_ALONE_OR_WITH_OTHERS
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # $100 - $55 = $45 adjusted excess > $10 supplement -> $0.
    me_ssp_individual: 0

- name: Case 14, SS-only code C with small excess absorbed by disregard.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        # Annual uncapped SSI = -$360 -> $30/month excess.
        uncapped_ssi: -360
