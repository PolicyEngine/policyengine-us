- name: Case 1, living alone or with others individual amount.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_ssi_eligible: true
        uncapped_ssi: 12_000
        me_ssp_living_arrangement: LIVING_ALONE_OR_WITH_OTHERS
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    me_ssp_individual: 10

