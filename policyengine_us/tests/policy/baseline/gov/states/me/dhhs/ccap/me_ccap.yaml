- name: Case 3, expenses less than market rate, benefit capped at expenses minus fee.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        me_ccap_eligible_child: true
        me_ccap_market_rate: 300
    spm_units:
      spm_unit:
        members: [person1, person2]
        me_ccap_eligible: true
        me_ccap_parent_fee: 216.67
        spm_unit_pre_subsidy_childcare_expenses: 10_400
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ME
  output:
    # Market rate (weekly): $300 => monthly = $1,300.
    # Parent fee (monthly): $216.67.
    # Expenses (monthly): 10400/12 = $866.67.
    # Uncapped: max(866.67 - 216.67, 0) = $650.
    # Max reimbursement: $1,300.
    # Benefit = min(650, 1300) = $650.
    me_ccap: 650

