# === Edge cases ===

- name: Case 5, parent fee exceeds market rate for child (REQ-024).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 10
        me_ccap_eligible_child: true
        me_ccap_market_rate: 95.51
    spm_units:
      spm_unit:
        members: [person1, person2]
        me_ccap_eligible: true
        me_ccap_parent_fee: 650
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ME
  output:
    # Weekly market rate: $95.51 => monthly = 95.51 * 52/12 = $413.88.
    # Parent fee (monthly): $650.
    # Expenses (monthly): 10000/12 = $833.33.
    # Uncapped: max(833.33 - 650, 0) = $183.33.
    # Max reimbursement: $413.88.
    # Benefit = min(183.33, 413.88) = $183.33.
    me_ccap: 183.33

- name: Case 6, multiple children, different age groups, one fee for family.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 0
        me_ccap_eligible_child: true
        me_ccap_market_rate: 330
      person3:
        age: 7
        me_ccap_eligible_child: true
        me_ccap_market_rate: 214
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        me_ccap_eligible: true
        me_ccap_parent_fee: 216.67
        spm_unit_pre_subsidy_childcare_expenses: 30_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: ME
  output:
    # Weekly market rates: infant $330 + school age $214 = $544.
    # Max reimbursement: 544 * 52/12 = $2,357.33.
    # Expenses (monthly): 30000/12 = $2,500.
    # Parent fee (monthly): $216.67.
    # Uncapped: max(2500 - 216.67, 0) = $2,283.33.
    # Benefit = min(2283.33, 2357.33) = $2,283.33.
    me_ccap: 2_283.33

