- name: Case 1, eligible family, benefit is min of expenses minus fee and market rate.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        me_ccap_eligible_child: true
        me_ccap_market_rate: 300
    spm_units:
      spm_unit:
        members: [person1, person2]
        me_ccap_eligible: true
        me_ccap_parent_fee: 216.67
        spm_unit_pre_subsidy_childcare_expenses: 20_800
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ME
  output:
    # Market rate (weekly): $300 => monthly = 300 * 52/12 = $1,300.
    # Parent fee (monthly): $216.67.
    # Expenses (monthly): 20800/12 = $1,733.33.
    # Uncapped: max(1733.33 - 216.67, 0) = $1,516.67.
    # Max reimbursement: $1,300.
    # Benefit = min(1516.67, 1300) = $1,300.
    me_ccap: 1_300

