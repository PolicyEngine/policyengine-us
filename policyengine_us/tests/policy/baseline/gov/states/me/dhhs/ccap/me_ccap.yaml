- name: Case 9, parent fee exactly equals monthly market rate equivalent.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        me_ccap_eligible_child: true
        me_ccap_market_rate: 200
    spm_units:
      spm_unit:
        members: [person1, person2]
        me_ccap_eligible: true
        me_ccap_parent_fee: 866.67
        spm_unit_pre_subsidy_childcare_expenses: 15_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ME
  output:
    # Weekly market rate: $200 => monthly = 200 * 52/12 = $866.67.
    # Parent fee (monthly): $866.67.
    # Expenses (monthly): 15000/12 = $1,250.
    # Uncapped: max(1250 - 866.67, 0) = $383.33.
    # Max reimbursement: $866.67.
    # Benefit = min(383.33, 866.67) = $383.33.
    me_ccap: 383.33

- name: Case 10, negative countable income does not inflate benefit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        self_employment_income: -60_000_000
      person2:
        age: 4
        me_ccap_eligible_child: true
        me_ccap_market_rate: 300
    spm_units:
      spm_unit:
        members: [person1, person2]
        me_ccap_eligible: true
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ME
  output:
    # Negative income -> parent fee = 0 (floor of negative = 0)
    # Weekly market rate: $300 => monthly = 300 * 52/12 = $1,300.
    # Expenses (monthly): 10,000/12 = $833.33.
    # Uncapped: max(833.33 - 0, 0) = $833.33.
    # Max reimbursement: $1,300.
    # Benefit = min(833.33, 1,300) = $833.33.
    # Benefit capped at expenses, NOT inflated by negative income.
    me_ccap: 833.33
