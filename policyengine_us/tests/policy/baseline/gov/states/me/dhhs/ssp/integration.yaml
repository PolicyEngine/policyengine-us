- name: Case 3, aged Maine couple both eligible in flat rate boarding home.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 72
        is_ssi_aged: true
        employment_income: 0
        ssi_claim_is_joint: true
        me_ssp_living_arrangement: FLAT_RATE_BOARDING_HOME
      person2:
        age: 70
        is_ssi_aged: true
        employment_income: 0
        ssi_claim_is_joint: true
        me_ssp_living_arrangement: FLAT_RATE_BOARDING_HOME
    tax_units:
      tax_unit:
        members: [person1, person2]
    marital_units:
      marital_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ME
  output:
    is_ssi_eligible: [true, true]
    me_ssp_eligible: [true, true]
    # Code E couple total $590 / 2 = $295 per person.
    me_ssp: [295, 295]
    # spm_unit me_ssp aggregate = $295 + $295 = $590/month.
    household_state_benefits: 590

- name: Case 4, aged Maine resident in residential care facility with social security income.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 75
        is_ssi_aged: true
        social_security_retirement: 6_000
        me_ssp_living_arrangement: RESIDENTIAL_CARE_FACILITY
    tax_units:
      tax_unit:
        members: [person1]
    marital_units:
      marital_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # $6_000/yr social security passes through SSI countable income;
    # remains under SSI federal threshold so SSI is reduced but positive.
    is_ssi_eligible: true
    me_ssp_living_arrangement: RESIDENTIAL_CARE_FACILITY
    me_ssp_eligible: true
    # Code I individual amount = $10/month.
    me_ssp: 10
    household_state_benefits: 10

