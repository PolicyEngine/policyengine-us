- name: Case 1, aged Maine resident with no income receives full SSI plus state supplement.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged: true
        employment_income: 0
    tax_units:
      tax_unit:
        members: [person1]
    marital_units:
      marital_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # Aged with no income passes federal SSI eligibility.
    is_ssi_eligible: true
    # Default arrangement A: individual amount = $10/month.
    me_ssp_eligible: true
    me_ssp: 10
    # household_state_benefits and spm_unit_benefits include me_ssp.
    household_state_benefits: 10

