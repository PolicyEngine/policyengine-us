        members: [person1, person2, person3, person4, person5]
        state_code: ME
        county_str: SAGADAHOC_COUNTY_ME
  output:
    me_ccap_eligible_child: [false, false, true, true, true]

    # Size 5: adjustment = 0.52 + 4*0.16 = 1.16.
    # Annual SMI = 118,065 * 1.16 = $136,955.40.
    # 125% SMI = $171,194.25.
