- name: Case 5, high-income family at 110% SMI, 10% copay bracket.
  period: 2026-01
  absolute_error_margin: 1
  input:
    people:
      person1:
        age: 42
        # SMI for ME size 3 (2025-10-01): 118,065 * 0.84 = $99,174.60.
        # Target ~115% SMI => 99,175 * 1.15 = $114,051.
        employment_income: 115_000
      person2:
        age: 40
      person3:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 9
        childcare_days_per_week: 5
        me_ccap_provider_type: LICENSED_CENTER
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 25_000
        spm_unit_assets: 200_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: ME
        county_str: CUMBERLAND_COUNTY_ME
  output:
    # Eligibility:
    me_ccap_eligible_child: [false, false, true]

    # Income:
    # - $115,000 / $99,175 = 115.9% SMI
    # - 125% SMI = $123,968.25
    # - $115,000 < $123,968 => income eligible
    me_ccap_income_eligible: true
    me_ccap_eligible: true

    # Region: Cumberland => REGION_1
    me_ccap_region: REGION_1

    # Age group: age 1 => TODDLER
    me_ccap_age_group: [SCHOOL_AGE, SCHOOL_AGE, TODDLER]

    # Time: person1,2 adults (0 hrs => PT), person3: 9*5 = 45 hrs => FULL_TIME
    me_ccap_time_category: [PART_TIME, PART_TIME, FULL_TIME]

    # SMI percentage: $115,000 / $99,175 = 115.9% => 110-125% bracket => 10% fee
    # Weekly income = $115,000/52 = $2,211.54
    # Raw weekly fee = floor(2211.54 * 0.10) = floor(221.15) = $221
    # Cap: 115.9% >= 85% => 10% cap
    # Cap = floor(2211.54 * 0.10) = floor(221.15) = $221
    # Fee = $221/week => monthly = 221 * 52/12 = $957.67
    me_ccap_parent_fee: 957.67

    # Market rate: Region 1 Licensed Center Toddler FT = $320/week
    me_ccap_market_rate: [0, 0, 320]

    # Benefit:
    # Max reimbursement: 320 * 52/12 = $1,386.67
    # Expenses (monthly): 25000/12 = $2,083.33
    # Parent fee (monthly): $957.67
    # Uncapped = max(2083.33 - 957.67, 0) = $1,125.67
    # Benefit = min(1125.67, 1386.67) = $1,125.67
    me_ccap: 1_126

