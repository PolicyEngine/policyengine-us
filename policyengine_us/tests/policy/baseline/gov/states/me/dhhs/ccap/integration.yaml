    # Expenses (monthly) = 30000/12 = $2,500.
    # Parent fee (monthly): $0.
    # Uncapped = max(2500 - 0, 0) = $2,500.
    # Benefit = min(2500, 2550.56) = $2,500.
    me_ccap: 2_500

- name: Case 10, high parent fee exceeds cheapest child's market rate but not most expensive.
  period: 2026-01
  absolute_error_margin: 1
  input:
    people:
      person1:
        age: 40
        # Target ~110% SMI for size 4 => $118,065 * 1.10 = $129,871.50.
        employment_income: 129_872
      person2:
        age: 38
      person3:
        age: 0
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        childcare_days_per_week: 5
        me_ccap_provider_type: LICENSED_CENTER
      person4:
        age: 10
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 3
        childcare_days_per_week: 5
        me_ccap_provider_type: LICENSE_EXEMPT
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        spm_unit_pre_subsidy_childcare_expenses: 30_000
        spm_unit_assets: 50_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: ME
        county_str: PENOBSCOT_COUNTY_ME
  output:
    me_ccap_eligible_child: [false, false, true, true]

    # Size 4 SMI = $118,065. 125% = $147,581.25.
    # $129,872 <= $147,581 => eligible.
    me_ccap_income_eligible: true
    me_ccap_eligible: true

    # Penobscot region (Penobscot county).
    me_ccap_region: PENOBSCOT

    # person3: age 0 => INFANT. person4: age 10 => SCHOOL_AGE.
    me_ccap_age_group: [SCHOOL_AGE, SCHOOL_AGE, INFANT, SCHOOL_AGE]

    # person1,2: adults (0 hrs => PT). person3: 8*5=40 => FT. person4: 3*5=15 => PT.
    me_ccap_time_category: [PART_TIME, PART_TIME, FULL_TIME, PART_TIME]

    # SMI% = 129872 / 118065 = 1.1000 => 100-110% bracket => 9% fee.
    # But wait, need 110-125% bracket = threshold 1.1 => 10%.
    # Actually, 1.1000 exactly: the bracket threshold at 1.1 gives 10%.
    # But single_amount: the value at exactly 1.1 is 0.10 (the 110% threshold).
    # Weekly income = 129872/52 = 2497.54.
    # Raw weekly = floor(2497.54 * 0.10) = floor(249.75) = 249.
    # Cap (110% >= 85%): floor(2497.54 * 0.10) = floor(249.75) = 249.
    # Fee = 249/week.
    # SMI% = 129872 / 118065 = 1.10 => 110-125% bracket => 10% fee.
    # Weekly income = 129872/52 = $2,497.54.
    # Raw weekly = floor(2497.54 * 0.10) = floor(249.75) = $249.
    # Cap (110% >= 85%): floor(2497.54 * 0.10) = floor(249.75) = $249.
    # Fee = 249/week => monthly = 249 * 52/12 = $1,079.
    me_ccap_parent_fee: 1_079

    # Market rates (weekly):
    # person3: Penobscot Licensed Center Infant FT = $275 (same as Region 2).
    # person4: Penobscot License-Exempt School Age PT = $95.51 (same as Region 2).
    me_ccap_market_rate: [0, 0, 275, 95.51]

    # Max reimbursement: (275 + 95.51) * 52/12 = 370.51 * 4.333 = $1,605.54.
    # Expenses (monthly): 30000/12 = $2,500.
    # Parent fee (monthly): $1,079.
    # Uncapped = max(2500 - 1079, 0) = $1,421.
    # Benefit = min(1421, 1605.54) = $1,421.
    me_ccap: 1_421
