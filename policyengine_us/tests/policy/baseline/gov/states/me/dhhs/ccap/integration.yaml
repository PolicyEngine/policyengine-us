- name: Case 1, low-income single parent with one preschooler in Region 1 licensed center, zero copay.
  period: 2026-01
  absolute_error_margin: 1
  input:
    people:
      person1:
        age: 28
        employment_income: 20_000
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        childcare_days_per_week: 5
        me_ccap_provider_type: LICENSED_CENTER
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 15_000
        spm_unit_assets: 5_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ME
        county_str: CUMBERLAND_COUNTY_ME
  output:
    # Eligibility:
    # - Child age 4 < 13 => eligible child
    # - Citizen => immigration eligible
    # - Region 1 (Cumberland County)
    me_ccap_eligible_child: [false, true]

    # Income:
    # - me_ccap_countable_income = $20,000/yr
    # - SMI for ME size 2 (2025-10-01): 118,065 * 0.68 = $80,284.20
    # - 125% SMI = $100,355.25
    # - $20,000 <= $100,355.25 => income eligible
    me_ccap_income_eligible: true

    # Assets:
    # - $5,000 <= $1,000,000 => asset eligible
    is_ccdf_asset_eligible: true
    me_ccap_eligible: true

    # Age group: age 4 => PRESCHOOL
    me_ccap_age_group: [SCHOOL_AGE, PRESCHOOL]

    # Time category: person1 adult (0 hrs => PT), person2 8*5 = 40 hrs/week >= 30 => FULL_TIME
    me_ccap_time_category: [PART_TIME, FULL_TIME]

    # Region: Cumberland => REGION_1
    me_ccap_region: REGION_1

    # SMI percentage:
    # Countable income = employment only ($20,000/yr).
    # TANF excluded from countable income to avoid circular dependency.
    # Monthly = $20,000/12 = $1,667.
    # SMI% = 1667 / 6690 = 24.9% => under 30% bracket => 0% fee.
    me_ccap_parent_fee: 0

    # Market rate: Region 1 Licensed Center Preschool FT = $300/week
    me_ccap_market_rate: [0, 300]

    # Benefit:
    # Expenses (monthly): 15000/12 = $1,250
    # Parent fee (monthly): $0
    # Uncapped: max(1250 - 0, 0) = $1,250
    # Max reimbursement: 300 * 52/12 = $1,300
    # Benefit = min(1250, 1300) = $1,250
    me_ccap: 1_250

- name: Case 2, moderate-income family with two children, Region 2, licensed family, 4% copay.
  period: 2026-01
  absolute_error_margin: 1
  input:
    people:
      person1:
        age: 35
        employment_income: 45_000
      person2:
        age: 32
        employment_income: 10_000
      person3:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        childcare_days_per_week: 5
        me_ccap_provider_type: LICENSED_FAMILY
      person4:
        age: 7
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 4
        childcare_days_per_week: 5
        me_ccap_provider_type: LICENSED_FAMILY
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        spm_unit_pre_subsidy_childcare_expenses: 20_000
        spm_unit_assets: 50_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: ME
        county_str: PENOBSCOT_COUNTY_ME
  output:
    # Eligibility:
    # - person3: age 2 < 13, citizen, dependent => eligible child
    # - person4: age 7 < 13, citizen, dependent => eligible child
    me_ccap_eligible_child: [false, false, true, true]

    # Income:
    # - Total = $45,000 + $10,000 = $55,000
    # - SMI for ME size 4 (2025-10-01): 118,065 * 1.0 = $118,065
    # - 125% SMI = $147,581.25
    # - $55,000 <= $147,581 => income eligible
    me_ccap_income_eligible: true
    is_ccdf_asset_eligible: true
    me_ccap_eligible: true

    # Region: Penobscot => PENOBSCOT
    me_ccap_region: PENOBSCOT

    # Age groups: person3 age 2 => TODDLER; person4 age 7 => SCHOOL_AGE
    me_ccap_age_group: [SCHOOL_AGE, SCHOOL_AGE, TODDLER, SCHOOL_AGE]

    # Time categories:
    # person1,2: adults (0 hrs => PT)
    # person3: 8*5 = 40 hrs => FULL_TIME
    # person4: 4*5 = 20 hrs => PART_TIME
    me_ccap_time_category: [PART_TIME, PART_TIME, FULL_TIME, PART_TIME]

    # SMI percentage: $55,000 / $118,065 = 46.6% => 45-55% bracket => 4% fee
    # Weekly income = $55,000 / 52 = $1,057.69
    # Raw weekly fee = floor(1057.69 * 0.04) = floor(42.31) = $42
    # Cap: 46.6% < 85% => 7% cap
    # Cap amount = floor(1057.69 * 0.07) = floor(74.04) = $74
    # Fee = min(42, 74) = $42/week
    # Monthly = 42 * 52/12 = $182
    me_ccap_parent_fee: 182

    # Market rates (weekly):
    # person3: Penobscot Licensed Family Toddler FT = $200/week (same as Region 2)
    # person4: Penobscot Licensed Family School Age PT = $136.45/week (same as Region 2)
    me_ccap_market_rate: [0, 0, 200, 136.45]

    # Benefit:
    # Max reimbursement: (200 + 136.45) * 52/12 = 336.45 * 4.333 = $1,457.95
    # Expenses (monthly): 20000/12 = $1,666.67
    # Parent fee (monthly): $182
    # Uncapped = max(1666.67 - 182, 0) = $1,484.67
    # Benefit = min(1484.67, 1457.95) = $1,457.95
    me_ccap: 1_458

