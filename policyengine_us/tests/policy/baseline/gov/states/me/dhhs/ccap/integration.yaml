- name: Case 8, assets exactly at limit, eligible.
  period: 2026-01
  absolute_error_margin: 1
  input:
    people:
      person1:
        age: 28
        employment_income: 30_000
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        childcare_days_per_week: 5
        me_ccap_provider_type: LICENSED_CENTER
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 15_000
        spm_unit_assets: 1_000_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: ME
        county_str: YORK_COUNTY_ME
  output:
    # Assets $1,000,000 <= $1,000,000 => asset eligible.
    is_ccdf_asset_eligible: true
    me_ccap_eligible_child: [false, true]
    me_ccap_income_eligible: true
    me_ccap_eligible: true
    # Region 1 (York), Preschool, FT, Licensed Center = $300/week.
    me_ccap_region: REGION_1
    me_ccap_age_group: [SCHOOL_AGE, PRESCHOOL]
    me_ccap_time_category: [PART_TIME, FULL_TIME]
    # SMI% = 30000 / 80284.20 = 37.4% => 35-40% bracket => 2% fee.
    # Weekly income = 30000/52 = 576.92.
    # Raw weekly = floor(576.92 * 0.02) = floor(11.54) = 11.
    # Cap: floor(576.92 * 0.07) = floor(40.38) = 40.
    # Fee = 11/week => monthly = 11 * 52/12 = $47.67.
    me_ccap_parent_fee: 48
    me_ccap_market_rate: [0, 300]
    # Max reimbursement: 300 * 52/12 = $1,300.
    # Expenses (monthly) = 15000/12 = $1,250.
    # Parent fee (monthly): $47.67.
    # Uncapped = max(1250 - 47.67, 0) = $1,202.33.
    # Benefit = min(1202.33, 1300) = $1,202.33.
    me_ccap: 1_202

- name: Case 9, multiple children with different provider types and time categories.
  period: 2026-01
