# Verifies the 2025 senior benefit base of $4,100 is correctly applied.
# At $60K income (4% income rate = $2,400), uncapped credit = $4,100 - $2,400
# = $1,700, which is below the $2,000 senior cap, so the output exposes
# the benefit-base value directly.
- name: Age 65+ filer 2025 senior benefit base = $4,100 (Schedule PTFC/STFC line 8)
  period: 2025
  absolute_error_margin: 0.1
  input:
    state_code: ME
    filing_status: SINGLE
    ctc_qualifying_children: 0
    me_sales_and_property_tax_fairness_credit_income: 60_000
    me_property_tax_fairness_credit_countable_rent_property_tax: 5_000
    age_head: 66
    age_spouse: 0
  output:
    me_property_tax_fairness_credit_base_cap: 1_700
