- name: 2024 Maine single standard deduction matches federal (pre-OBBBA)
  period: 2024
  absolute_error_margin: 0
  input:
    people:
      person1:
        age: 40
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_fips: 23
  output:
    me_standard_deduction: 14_600

