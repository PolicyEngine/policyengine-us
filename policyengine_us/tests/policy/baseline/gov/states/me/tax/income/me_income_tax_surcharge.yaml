# 2027 uprating verification — locks in that the threshold parameter
# uprates and rounds via gov.irs.uprating (used as a proxy for Maine
# §5403, sub-§12 indexing per the PR description). Income at the 2026
# statutory threshold should produce zero in 2027 because the threshold
# has uprated upward; income $1M+ above the 2026 threshold should still
# trigger a positive surcharge.

- name: Maine income tax surcharge in 2027 stays zero at the 2026 single threshold once uprated.
  period: 2027
  absolute_error_margin: 0.1
  input:
    state_code: ME
    filing_status: SINGLE
    me_taxable_income: 1_000_000
  output:
    me_income_tax_surcharge: 0

