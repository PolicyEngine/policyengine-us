- name: Maine income tax surcharge does not apply before 2026.
  period: 2025
  input:
    state_code: ME
    filing_status: SINGLE
    me_taxable_income: 1_200_000
  output:
    me_income_tax_surcharge: 0

- name: Maine income tax surcharge applies to single taxable income above $1 million in 2026.
