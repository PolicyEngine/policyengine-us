- name: Filer claimed as a dependent on another return is ineligible.
  period: 2025
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        is_tax_unit_head: true
        claimed_as_dependent_on_another_return: true
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 20_000
        filing_status: SINGLE
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    me_affordability_payment_eligible: false
