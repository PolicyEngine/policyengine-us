- name: Single filer below the income threshold is eligible.
  period: 2025
  absolute_error_margin: 0.1
  input:
    adjusted_gross_income: 49_999
    filing_status: SINGLE
    state_code: ME
  output:
    me_affordability_payment_eligible: true

- name: Single filer at the income threshold is ineligible.
  period: 2025
  absolute_error_margin: 0.1
  input:
    adjusted_gross_income: 50_000
    filing_status: SINGLE
    state_code: ME
  output:
    me_affordability_payment_eligible: false

