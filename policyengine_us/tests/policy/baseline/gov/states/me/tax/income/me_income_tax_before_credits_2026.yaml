# Tests verifying baseline is unchanged — LD 229 is NOT enacted law.
# The 3-bracket structure (5.8%, 6.75%, 7.15%) remains for all years.

- name: Single filer 2026 baseline, 3 brackets only
  period: 2026
  absolute_error_margin: 1
  input:
    me_taxable_income: 600_000
    filing_status: SINGLE
    state_code: ME
  output:
   # Uprated 3-bracket structure applies — LD 229 is a reform, not baseline
    me_income_tax_before_credits: 42_391.6

- name: Joint filer 2026 baseline, 3 brackets only
  period: 2026
  absolute_error_margin: 1
  input:
    me_taxable_income: 1_000_000
    filing_status: JOINT
    state_code: ME
  output:
    me_income_tax_before_credits: 70_483.2

- name: Single filer 2025 baseline, 3 brackets only
  period: 2025
  input:
    me_taxable_income: 600_000
    filing_status: SINGLE
    state_code: ME
  output:
   # .058*26800 + .0675*(63450-26800) + .0715*(600000-63450) = 42391.6
    me_income_tax_before_credits: 42_391.6
