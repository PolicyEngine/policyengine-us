# Tests verifying that the new bracket slots (4 and 5) with .inf thresholds
# do NOT affect baseline calculations for any year.
# LD 229 has passed the legislature but is NOT signed into law.
# The bracket slots exist so the reform system can target them.

- name: Single filer 2026 baseline, only 3 brackets apply (top rate 7.15%)
  period: 2026
  absolute_error_margin: 1
  input:
    me_taxable_income: 600_000
    filing_status: SINGLE
    state_code: ME
  output:
   # Uprated 3-bracket structure still applies — new brackets are .inf
   # All income above bracket 2 threshold is taxed at 7.15%
    me_income_tax_before_credits: 42_391.6

- name: Joint filer 2026 baseline, only 3 brackets apply (top rate 7.15%)
  period: 2026
  absolute_error_margin: 1
  input:
    me_taxable_income: 1_000_000
    filing_status: JOINT
    state_code: ME
  output:
   # Uprated 3-bracket structure still applies
    me_income_tax_before_credits: 70_483.2

- name: Single filer 2025 baseline, only 3 brackets apply
  period: 2025
  input:
    me_taxable_income: 600_000
    filing_status: SINGLE
    state_code: ME
  output:
   # .058*26800 + .0675*(63450-26800) + .0715*(600000-63450) = 42391.6
    me_income_tax_before_credits: 42_391.6

- name: Joint filer 2025 baseline, only 3 brackets apply
  period: 2025
  input:
    me_taxable_income: 1_000_000
    filing_status: JOINT
    state_code: ME
  output:
   # .058*53600 + .0675*(126900-53600) + .0715*(1000000-126900) = 70483.2
    me_income_tax_before_credits: 70_483.2

- name: HOH filer 2025 baseline, only 3 brackets apply
  period: 2025
  input:
    me_taxable_income: 300_000
    filing_status: HEAD_OF_HOUSEHOLD
    state_code: ME
  output:
   # .058*40200 + .0675*(95150-40200) + .0715*(300000-95150) = 20687.5
    me_income_tax_before_credits: 20_687.5
