- name: taxsim_record_1_2024.yaml
  absolute_error_margin: 2
  period: 2024
  input:
    people:
      person1:
        age: 40
        employment_income: 50_000
        self_employment_income: 110_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
        premium_tax_credit: 0
        local_income_tax: 0
        state_sales_tax: 0
    spm_units:
      spm_unit:
        members: [person1]
        snap: 0
        tanf: 0
    households:
      household:
        members: [person1]
        state_fips: 50
  output:
    # The Child Care Contribution is now computed on net self-employment
    # earnings (Schedule SE Line 6 = $101,585) rather than gross
    # self-employment income ($110,000), lowering it from $60.50 to $55.87 and
    # vt_income_tax from ~$7,963 to $7,958.51. See policyengine-taxsim#1002.
    vt_income_tax: 7_958.51

# From GitHub issue #7291: VT capital gains exclusion incorrectly applies to financial instruments
# Financial instrument gains (stocks/bonds) are NOT eligible for the 40% exclusion.
# Only the flat $5,000 exclusion applies.
- name: VT capital gains exclusion - financial instruments get flat exclusion only
  period: 2024
  absolute_error_margin: 1
  input:
    people:
      person1:
        age: 40
        employment_income: 2_576
        taxable_interest_income: 344
        long_term_capital_gains: 137_498  # Financial instruments - NOT eligible for 40%
        is_tax_unit_head: true
      dependent1:
        age: 10
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, dependent1]
        premium_tax_credit: 0
    spm_units:
      spm_unit:
        members: [person1, dependent1]
    households:
      household:
        members: [person1, dependent1]
        state_fips: 50  # Vermont
  output:
    # Federal AGI: 2576 + 344 + 137498 = 140418
    # Only $5,000 flat exclusion applies since gains are from financial instruments
    # VT AGI: 140418 - 5000 = 135418
    vt_agi: 135_418

# Locks in the fix for #8210 / taxsim #869. Pre-fix the tied-federal-tax
# fallback in tax_unit_itemizes returned False; vt_cdcc was $497 (computed
# against standard-deduction federal tax). Post-fix: itemizes, federal tax is
# $0 so capped CDCC and vt_cdcc both round to $0, matching TaxAct's vt_cdcc
# of $0 and vt_income_tax of -$3,045.
- name: 2025 VT joint with property tax + mortgage itemizes when federal tax tied (taxsim #869)
  absolute_error_margin: 2
  period: 2025
  input:
    people:
      person1:
        age: 40
        employment_income: 15_096.83
        real_estate_taxes: 30_000
        deductible_mortgage_interest: 20_000
        is_tax_unit_head: true
      person2:
        age: 40
        employment_income: 20_000
        social_security_retirement: 8_978.28
        is_tax_unit_spouse: true
      child1:
        age: 11
        is_tax_unit_dependent: true
      child2:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, child1, child2]
        filing_status: JOINT
        tax_unit_childcare_expenses: 3_000
        premium_tax_credit: 0
    spm_units:
      spm_unit:
        members: [person1, person2, child1, child2]
    households:
      household:
        members: [person1, person2, child1, child2]
        state_code: VT
  output:
    tax_unit_itemizes: true
    vt_cdcc: 0
    vt_income_tax: -3_045
