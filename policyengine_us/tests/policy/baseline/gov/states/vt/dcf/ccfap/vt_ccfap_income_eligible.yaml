- name: Case 11, multiple income sources combined.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 50_000
        self_employment_income: 30_000
        pension_income: 10_000
        interest_income: 5_000
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: true
    households:
      household:
        members: [person1, person2]
        state_code: VT
  output:
    # Countable income = 50,000 + 30,000 + 10,000 + 5,000 = 95,000
    # FPG for family of 2 = 21,150
    # 575% FPL = 121,612.50
    # 95,000 <= 121,612.50 => eligible
    vt_ccfap_income_eligible: true
