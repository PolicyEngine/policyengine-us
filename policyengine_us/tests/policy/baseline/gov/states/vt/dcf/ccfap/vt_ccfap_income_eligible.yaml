- name: Case 1, family of 3 with income below 575 percent FPL.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 100_000
      person2:
        age: 5
        is_tax_unit_dependent: true
      person3:
        age: 3
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        meets_ccdf_activity_test: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: VT
  output:
    # FPG for family of 3 = 15,650 + 2 * 5,500 = 26,650
    # 575% FPL = 26,650 * 5.75 = 153,237.50
    # Income 100,000 <= 153,237.50
    vt_ccfap_income_eligible: true

