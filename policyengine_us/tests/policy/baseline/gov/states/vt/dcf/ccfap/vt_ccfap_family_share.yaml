- name: Case 1, income at 150 percent FPL has zero family share.
  absolute_error_margin: 0.01
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 39_975
      person2:
        age: 5
        is_tax_unit_dependent: true
      person3:
        age: 3
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        meets_ccdf_activity_test: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: VT
  output:
    # FPG for family of 3 = 26,650
    # FPL ratio = 39,975 / 26,650 = 1.50
    # 1.50 < 1.7501, so weekly family share = $0
    # Monthly: $0 * 52 / 12 = $0
    vt_ccfap_family_share: 0

