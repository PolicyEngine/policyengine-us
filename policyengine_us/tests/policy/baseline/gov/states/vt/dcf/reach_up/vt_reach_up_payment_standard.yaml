# Vermont TANF Payment Standard
# Per Procedure P-2230A:
# Payment standard =
#   (basic needs + housing allowance + special housing allowance)
#   × ratable reduction (0.496)
# Source: Vermont DCF Reach Up Procedure P-2230A; Code Vt. R.
# 13-170-220-X Rule 2239; Vermont TANF State Plan 2024-2027.

- name: Case 1, with housing and zero housing.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 35
    spm_units:
      spm_unit1:
        members: [person1]
        vt_reach_up_basic_needs_allowance: 1_236
        vt_reach_up_housing_allowance: 400
        vt_reach_up_special_housing_allowance: 0
      spm_unit2:
        members: [person2]
        vt_reach_up_basic_needs_allowance: 942
        vt_reach_up_housing_allowance: 0
        vt_reach_up_special_housing_allowance: 0
    households:
      household1:
        members: [person1]
        state_code: VT
      household2:
        members: [person2]
        state_code: VT
  output:
    # spm_unit1: ($1,236 + $400 + $0) × 0.496 = $811.456
    # spm_unit2: ($942 + $0 + $0) × 0.496 = $467.232
    vt_reach_up_payment_standard: [811.456, 467.232]

- name: Case 2, minimum and high payment standards.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 35
    spm_units:
      spm_unit1:
        members: [person1]
        vt_reach_up_basic_needs_allowance: 644
        vt_reach_up_housing_allowance: 0
        vt_reach_up_special_housing_allowance: 0
      spm_unit2:
        members: [person2]
        vt_reach_up_basic_needs_allowance: 2_458
        vt_reach_up_housing_allowance: 450
        vt_reach_up_special_housing_allowance: 90
    households:
      household1:
        members: [person1]
        state_code: VT
      household2:
        members: [person2]
        state_code: VT
  output:
    # spm_unit1 (min): ($644 + $0 + $0) × 0.496 = $319.424
    # spm_unit2 (high): ($2,458 + $450 + $90) × 0.496 = $1,486.992
    vt_reach_up_payment_standard: [319.424, 1_486.992]

- name: Case 3, family of 3 outside Chittenden with full shelter matches CBPP figure.
  period: 2024-01
  input:
    state_code: VT
    vt_reach_up_basic_needs_allowance: 1_236
    vt_reach_up_housing_allowance: 400
    vt_reach_up_special_housing_allowance: 90
  output:
    # ($1,236 + $400 + $90) × 0.496 = $855.90, matching CBPP/WRD's
    # reported max for a non-Chittenden family of 3.
    vt_reach_up_payment_standard: 855.896
