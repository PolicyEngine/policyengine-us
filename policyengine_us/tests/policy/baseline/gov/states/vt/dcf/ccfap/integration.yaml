- name: Case 4, foster child in registered home with high income parent.
  absolute_error_margin: 0.01
  period: 2025-01
  input:
    people:
      person1:
        age: 45
        employment_income: 200_000
      person2:
        age: 4
        is_tax_unit_dependent: true
        is_in_foster_care: true
        vt_ccfap_provider_type: REGISTERED_HOME
        childcare_days_per_week: 5
        childcare_hours_per_day: 8
        pre_subsidy_childcare_expenses: 20_000
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VT
  output:
    # Child eligibility
    vt_ccfap_eligible_child: [false, true]

    # Age group
    vt_ccfap_age_group: [SCHOOL_AGE, PRESCHOOL]
    # person2: age 4 = preschool (36-59 months)

    # Care schedule
    vt_ccfap_care_schedule: [PART_TIME, FULL_TIME]

    # Provider type
    vt_ccfap_provider_type: [LICENSED_CENTER, REGISTERED_HOME]

    # State rate
    vt_ccfap_state_rate: [0, 361]
    # person2: registered home, full time, preschool = $361/wk

    # Income eligibility
    # FPG for family of 2 = 21,150
    # 575% FPL = 121,612.50
    # Income 200,000 > 121,612.50 but foster child = categorically eligible
    vt_ccfap_income_eligible: false

    # Family share: foster child = exempt, $0
    vt_ccfap_family_share: 0

    # Overall eligibility
    # Foster child present => categorically eligible (bypasses income test)
    vt_ccfap_eligible: true

    # Benefit
    # Weekly rate = $361/wk
    # Monthly rate = $361 * 52 / 12 = $1,564.33
    # Benefit = max(1,564.33 - 0, 0) = $1,564.33
    vt_ccfap: 1_564.33

