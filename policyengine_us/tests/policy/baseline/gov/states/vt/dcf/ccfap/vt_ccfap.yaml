- name: Case 3, Reach Up eligible family gets full subsidy with no copay.
  absolute_error_margin: 0.01
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
      person2:
        age: 1
        is_tax_unit_dependent: true
        vt_ccfap_provider_type: LICENSED_CENTER
        childcare_days_per_week: 5
        childcare_hours_per_day: 8
        pre_subsidy_childcare_expenses: 25_000
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled:
          2025-01: true
    households:
      household:
        members: [person1, person2]
        state_code: VT
  output:
    # Reach Up = categorically eligible, $0 family share
    # Child: age 1, infant, full time, licensed center = $471/wk
    # Monthly rate = $471 * 52 / 12 = $2,041.00
    # Benefit = max(2,041.00 - 0, 0) = $2,041.00
    vt_ccfap: 2_041.00

- name: Case 4, family share exceeds state rate results in zero benefit.
  absolute_error_margin: 0.01
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 150_000
      person2:
        age: 30
      person3:
        age: 7
        is_tax_unit_dependent: true
        vt_ccfap_provider_type: REGISTERED_HOME
        childcare_days_per_week: 5
        childcare_hours_per_day: 4
        pre_subsidy_childcare_expenses: 10_000
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        meets_ccdf_activity_test: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: VT
  output:
    # FPG for family of 3 = 26,650
    # FPL ratio = 150,000 / 26,650 = 5.631
    # Weekly family share at 5.631 > 5.5001 = $425/wk
    # Monthly family share = $425 * 52 / 12 = $1,841.67
    # Child: age 7, school age, part time, registered home = $176/wk
    # Monthly rate = $176 * 52 / 12 = $762.67
    # Benefit = max(762.67 - 1,841.67, 0) = $0
    vt_ccfap: 0

