- name: Case 1, single child full time licensed center at 250 percent FPL.
  absolute_error_margin: 0.01
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 52_875
      person2:
        age: 3
        is_tax_unit_dependent: true
        vt_ccfap_provider_type: LICENSED_CENTER
        childcare_days_per_week: 5
        childcare_hours_per_day: 8
        pre_subsidy_childcare_expenses: 25_000
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: true
    households:
      household:
        members: [person1, person2]
        state_code: VT
  output:
    # FPG for family of 2 = 15,650 + 5,500 = 21,150
    # FPL ratio = 52,875 / 21,150 = 2.50
    # Weekly family share at 2.50 > 2.2501 = $100/wk
    # Monthly family share = $100 * 52 / 12 = $433.33
    # Child: age 3, preschool, full time, licensed center = $439/wk
    # Monthly rate = $439 * 52 / 12 = $1,902.33
    # Benefit = max(1,902.33 - 433.33, 0) = $1,469.00
    vt_ccfap: 1_469.00

