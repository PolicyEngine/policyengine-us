- name: Case 8, two children different age groups and provider types.
  absolute_error_margin: 0.01
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 55_000
      person2:
        age: 1
        is_tax_unit_dependent: true
        vt_ccfap_provider_type: LICENSED_CENTER
        childcare_days_per_week: 5
        childcare_hours_per_day: 8
      person3:
        age: 7
        is_tax_unit_dependent: true
        vt_ccfap_provider_type: REGISTERED_HOME
        childcare_days_per_week: 5
        childcare_hours_per_day: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        meets_ccdf_activity_test: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: VT
  output:
    # FPG for family of 3 = 26,650
    # FPL ratio = 55,000 / 26,650 = 2.064
    # Weekly family share at 2.064 >= 2.0001 = $75/wk
    # Monthly family share = $75 * 52 / 12 = $325.00
    # person2: infant, full time, licensed center = $471/wk
    # person3: school age, part time, registered home = $176/wk
    # Total weekly rate = $471 + $176 = $647
    # Monthly rate = $647 * 52 / 12 = $2,803.67
    # Benefit = max(2,803.67 - 325.00, 0) = $2,478.67
    vt_ccfap: 2_478.67

