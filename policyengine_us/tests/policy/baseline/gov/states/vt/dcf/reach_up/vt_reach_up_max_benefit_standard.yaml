# Tests for Vermont Reach Up maximum benefit standard (CBPP convention)
# Returns basic needs + maximum housing allowance with ratable reduction

- name: Family of 2 in Chittenden County - returns full standard with max housing
  period: 2024-01
  absolute_error_margin: 5
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        own_children_in_household: 1
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VT
        county: 50007  # Chittenden County
  output:
    # Basic needs (family of 2): $942
    # Max housing (Chittenden): $450
    # Total: $1392
    # With ratable reduction (0.496): $690.43
    vt_reach_up_max_benefit_standard: 690

- name: Family of 3 in Chittenden County - returns full standard with max housing
  period: 2024-01
  absolute_error_margin: 5
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        own_children_in_household: 2
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: VT
        county: 50007  # Chittenden County
  output:
    # Basic needs (family of 3): $1236
    # Max housing (Chittenden): $450
    # Total: $1686
    # With ratable reduction (0.496): $836.26
    vt_reach_up_max_benefit_standard: 836

