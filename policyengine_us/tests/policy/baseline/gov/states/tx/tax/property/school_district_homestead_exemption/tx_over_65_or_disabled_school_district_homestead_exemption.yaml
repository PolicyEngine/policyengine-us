- name: Case 1, additional exemption is capped at the statutory amount.
  period: 2025
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 300_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    tx_over_65_or_disabled_school_district_homestead_exemption: 60_000
    tx_total_school_district_homestead_exemption: 200_000

- name: Case 2, additional exemption is limited to remaining assessed property value.
  period: 2025
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 180_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    tx_over_65_or_disabled_school_district_homestead_exemption: 40_000
    tx_total_school_district_homestead_exemption: 180_000

- name: Case 3, ineligible filer gets no additional exemption.
  period: 2025
  input:
    people:
      person1:
        age: 64
        assessed_property_value: 300_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    tx_over_65_or_disabled_school_district_homestead_exemption: 0
    tx_total_school_district_homestead_exemption: 140_000

- name: Case 4, prior-law 2024 additional exemption is capped at the statutory amount.
  period: 2024
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 300_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    tx_over_65_or_disabled_school_district_homestead_exemption: 10_000
    tx_total_school_district_homestead_exemption: 110_000
