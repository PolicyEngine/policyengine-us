- name: Case 1, age 65 homeowner is eligible for the additional exemption.
  period: 2025
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 300_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    tx_over_65_or_disabled_school_district_homestead_exemption_eligible: true

- name: Case 2, disabled homeowner under age 65 is eligible for the additional exemption.
  period: 2025
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        assessed_property_value: 300_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    tx_over_65_or_disabled_school_district_homestead_exemption_eligible: true

- name: Case 3, non-senior homeowner without disability is ineligible for the additional exemption.
  period: 2025
  input:
    people:
      person1:
        age: 64
        assessed_property_value: 300_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    tx_over_65_or_disabled_school_district_homestead_exemption_eligible: false

- name: Case 4, surviving spouse at the age threshold is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 55
        is_surviving_spouse: true
        assessed_property_value: 300_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    tx_over_65_or_disabled_school_district_homestead_exemption_eligible: true

- name: Case 5, age 65 spouse is eligible for the additional exemption.
  period: 2025
  input:
    people:
      person1:
        age: 40
        is_tax_unit_head: true
        assessed_property_value: 300_000
      person2:
        age: 65
        is_tax_unit_spouse: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    tx_over_65_or_disabled_school_district_homestead_exemption_eligible: true

- name: Case 6, elderly disabled dependent is ineligible for the additional exemption.
  period: 2025
  input:
    people:
      person1:
        age: 40
        is_tax_unit_head: true
        assessed_property_value: 300_000
      person2:
        age: 70
        is_disabled: true
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    tx_over_65_or_disabled_school_district_homestead_exemption_eligible: false
