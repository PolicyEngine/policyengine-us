- name: Low income household (0-50% FPG) gets max $2,400 capped by expenses.
  period: 2024
  input:
    irs_gross_income: 0
    spm_unit_size: 1
    state_code: TX
    electricity_expense: 3_000
    gas_expense: 0
  output:
    tx_ceap: 2_400

- name: Low income household with expenses below max, gets actual expenses.
  period: 2024
  input:
    irs_gross_income: 5_000
    spm_unit_size: 4
    state_code: TX
    electricity_expense: 1_000
    gas_expense: 500
  output:
    tx_ceap: 1_500

- name: Mid income household (51-75% FPG) gets max $2,300.
  period: 2024
  input:
    irs_gross_income: 20_000
    spm_unit_size: 4
    state_code: TX
    electricity_expense: 2_500
    gas_expense: 500
  output:
    tx_ceap: 2_300

- name: High income household (76-150% FPG) gets max $2,200.
  period: 2024
  input:
    irs_gross_income: 40_000
    spm_unit_size: 4
    state_code: TX
    electricity_expense: 3_000
    gas_expense: 500
  output:
    tx_ceap: 2_200

- name: Ineligible household gets zero.
  period: 2024
  input:
    irs_gross_income: 80_000
    spm_unit_size: 1
    state_code: TX
    electricity_expense: 3_000
    gas_expense: 500
  output:
    tx_ceap: 0
