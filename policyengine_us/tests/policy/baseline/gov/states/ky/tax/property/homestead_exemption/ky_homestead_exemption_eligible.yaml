- name: Case 1, senior homeowner is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ky_homestead_exemption_eligible: true

- name: Case 2, disabled homeowner under age 65 is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ky_homestead_exemption_eligible: true

- name: Case 3, non-senior homeowner without disability is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 64
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ky_homestead_exemption_eligible: false

- name: Case 4, senior without assessed property is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 65
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ky_homestead_exemption_eligible: false

- name: Case 5, senior head is ineligible when only a dependent owns property.
  period: 2025
  input:
    people:
      person1:
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        assessed_property_value: 0
      person2:
        age: 30
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    ky_homestead_exemption_eligible: false
