- name: Case 1, exemption is capped at the statutory amount.
  period: 2025
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ky_homestead_exemption: 49_100

- name: Case 2, exemption is limited to assessed property value.
  period: 2025
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 40_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ky_homestead_exemption: 40_000

- name: Case 3, historical exemption amount applies in 2024.
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ky_homestead_exemption: 46_350

- name: Case 4, exemption only uses qualifying owner property.
  absolute_error_margin: 0.01
  period: 2025
  input:
    people:
      person1:
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        assessed_property_value: 40_000
      person2:
        age: 30
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        assessed_property_value: 100_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    ky_homestead_exemption: 40_000
