# KY CCAP overall eligibility: an eligible child, income eligibility (85% SMI),
# and an activity pathway must all hold. KY has no asset/resource test.

- name: Case 1, working parent with eligible child and low income is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    ky_ccap_eligible: true

- name: Case 2, income above the SMI limit fails overall eligibility.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 72_000
        # 6_000/month > 4_217 size-2 limit -> income ineligible
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    ky_ccap_eligible: false

- name: Case 3, no activity pathway fails overall eligibility.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 6_000
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 4
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    ky_ccap_eligible: false

- name: Case 4, no eligible child fails overall eligibility.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 14
        # over the age-13 limit, not special needs
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    ky_ccap_eligible: false
