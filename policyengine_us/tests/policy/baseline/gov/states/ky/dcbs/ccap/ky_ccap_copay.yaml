# KY CCAP family copayment (Section 11(3)): a per-family per-day fee multiplied
# by the family's monthly care days.
# Periods 2024-01 (5-31-2019 edition): fee by income band x family size
# (2/3/4/5+) x children-in-care (1 / 2+); $0 for monthly income <= $899.
# Periods 2025-01 (11-18-2024 edition): single chart by income band x household
# size — household-of-2 fee minus $1 per additional member (floor $0), plus $1
# per full $300 of income over $8,199.99; $0 below $1,600; $25 daily maximum.
# The 2024-11-18 edition also makes the Protection & Permanency copay waiver
# mandatory (Section 5(3)).

- name: Case 1, monthly income at or below 899 has zero copay.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 10_440
        # 10_440 / 12 = 870/month <= 899 -> $0/day fee
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    ky_ccap_copay: 0

- name: Case 2, two-person family with one child in care.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 22_800
        # 22_800 / 12 = 1_900/month -> size_2 band [1_800, 2_000) = $10/day
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    # daily fee $10 x 20 care days = $200/month
    ky_ccap_copay: 200

