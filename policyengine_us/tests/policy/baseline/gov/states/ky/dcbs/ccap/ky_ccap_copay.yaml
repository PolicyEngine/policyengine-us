# KY CCAP family copayment (Section 11(3)): a per-family per-day fee looked up by
# monthly countable income band x family size (2/3/4/5+) x children-in-care (1 / 2+),
# multiplied by the family's monthly care days. The 1-vs-2+ column already encodes
# the child count, so the fee is the whole-family daily rate, not a per-child fee.
# $0 copay for monthly income <= $899 (all sizes).

- name: Case 1, monthly income at or below 899 has zero copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 10_440
        # 10_440 / 12 = 870/month <= 899 -> $0/day fee
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    ky_ccap_copay: 0

- name: Case 2, two-person family with one child in care.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 22_800
        # 22_800 / 12 = 1_900/month -> size_2 band [1_800, 2_000) = $10/day
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    # daily fee $10 x 20 care days = $200/month
    ky_ccap_copay: 200

- name: Case 3, three-person family with one child in care.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 27_000
        # 27_000 / 12 = 2_250/month -> size_3_one_child band [2_200, 2_300) = $11/day
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 0
      person3:
        age: 4
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KY
  output:
    # size_3_one_child daily fee $11 x 20 days = $220/month
    ky_ccap_copay: 220

- name: Case 4, three-person family with two children in care uses the 2+ column.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 27_000
        # 27_000 / 12 = 2_250/month -> size_3_two_or_more band [2_200, 2_300) = $12/day
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
      person3:
        age: 6
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KY
  output:
    # size_3_two_or_more per-family daily fee $12 x 20 family care-days = $240/month
    # (the fee is per-family per-day, not per child-day; both children attend the
    # same 20 days, so the family has 20 days of care).
    ky_ccap_copay: 240

