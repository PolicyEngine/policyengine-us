- name: Case 1, PCH resident receives PCH personal needs allowance.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ky_ssp_category: PCH
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    # PCH PNA = $60/mo.
    ky_ssp_personal_needs_allowance: [60]

