- name: Case 1, SSI-eligible aged adult in PCH is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ky_ssp_countable_income: 0
        ky_ssp_category: PCH
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ky_ssp_eligible: [true]

- name: Case 2, SSI-eligible adult with NONE category is not eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ky_ssp_countable_income: 0
        ky_ssp_category: NONE
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    # Category NONE => not in a qualifying category => not eligible.
    ky_ssp_eligible: [false]

- name: Case 3, not SSI-eligible with PCH category is not eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: false
        is_ssi_eligible: false
        meets_ssi_resource_test: true
        ky_ssp_countable_income: 0
        ky_ssp_category: PCH
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    # Fails is_ssi_eligible => not eligible.
    ky_ssp_eligible: [false]

- name: Case 4, SSI-eligible minor in CARETAKER fails §4(1)(c)3 age ≥ 18 requirement.
  period: 2026-01
  input:
    people:
      person1:
        age: 8
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ky_ssp_countable_income: 0
        ky_ssp_category: CARETAKER
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    # 921 KAR 2:015 §4(1)(c)3 requires caretaker recipients to be at least 18.
    ky_ssp_eligible: [false]

