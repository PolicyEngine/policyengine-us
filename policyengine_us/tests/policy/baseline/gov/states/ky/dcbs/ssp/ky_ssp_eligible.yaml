- name: Case 7, fails resource test so not SSI-eligible and not SSP-eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: false
        meets_ssi_resource_test: false
        ky_ssp_countable_income: 0
        ky_ssp_category: PCH
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ky_ssp_eligible: [false]

- name: Case 8, countable income below PCH standard is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        # Countable income ($994/mo) is below the PCH monthly standard
        # ($1,610) so §4(1)(b) is satisfied.
        ky_ssp_countable_income: 994
        ky_ssp_category: PCH
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ky_ssp_eligible: [true]

- name: Case 9, countable income above the PCH standard fails §4(1)(b).
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        # Countable income ($4,167/mo) exceeds PCH standard ($1,610) — not eligible.
        ky_ssp_countable_income: 4_167
        ky_ssp_category: PCH
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ky_ssp_eligible: [false]

- name: Case 10, SSI-eligible minor in PCH fails §4(1)(c)1 age ≥ 18 requirement.
  period: 2026-01
  input:
    people:
      person1:
        age: 10
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ky_ssp_countable_income: 0
        ky_ssp_category: PCH
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    # 921 KAR 2:015 §4(1)(c)1 requires PCH residents to be at least 18.
    ky_ssp_eligible: [false]
