# KY CCAP rate region: maps county_str to one of 10 DCC-300 rate regions.

- name: Case 1, Allen County maps to region 1.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: KY
        county_str: ALLEN_COUNTY_KY
  output:
    ky_ccap_rate_region: REGION_1

