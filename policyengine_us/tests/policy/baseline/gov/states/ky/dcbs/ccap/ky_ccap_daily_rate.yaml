# KY CCAP daily provider reimbursement rate (DCC-300), per child.
# Keyed by region x provider type x age category x day length.
# defined_for = ky_ccap_eligible_child, so the parent row is 0.

- name: Case 1, region 1 Licensed Type I infant/toddler full day.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 1
        # 12 months -> INFANT_TODDLER
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
        county_str: ALLEN_COUNTY_KY
  output:
    # Region 1, Licensed Type I, Infant/Toddler, Full Day = $29
    ky_ccap_daily_rate: [0, 29]

