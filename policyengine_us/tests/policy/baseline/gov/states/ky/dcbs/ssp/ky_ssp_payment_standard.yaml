  input:
    state_code: KY
    ky_ssp_category: FCH
    ky_ssp_claim_type: COUPLE_BOTH_ELIGIBLE
    ky_ssp_care_receivers: ONE
  output:
    # FCH has no reduced couple rate (§9(1)(b)). Per-person $1,166/mo.
    ky_ssp_payment_standard: 1_166

