    state_code: KY
    ky_ssp_category: CIS
    ky_ssp_claim_type: COUPLE_BOTH_ELIGIBLE
    ky_ssp_care_receivers: ONE
  output:
    # CIS has no reduced couple rate (§9(1)(d)). Per-person $1,514/mo.
    ky_ssp_payment_standard: 1_514

- name: Case 11, FCH couple both eligible — each uses full individual per-person rate.
