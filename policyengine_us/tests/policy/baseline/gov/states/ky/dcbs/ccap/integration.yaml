- name: Case 6, two children in care use the two-or-more copay column.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 27_000
        # 2_250/month; size_3_two_or_more band [2_200, 2_300) = $12/day.
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        # PRESCHOOL
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
      person3:
        age: 8
        # SCHOOL_AGE
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 60_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: KY
        county_str: JEFFERSON_COUNTY_KY
  output:
    ky_ccap_eligible: true
    # Two eligible children in care, family size 3 -> 2+ children column.
    ky_ccap_eligible_child: [false, true, true]
    # Region 4: Preschool Full = $41, School Age Full = $37.
    ky_ccap_daily_rate: [0, 41, 37]
    # Copay: size_3_two_or_more per-family $12/day x 20 family care-days = $240
    # (per-family per-day fee; both children attend the same 20 days).
    ky_ccap_copay: 240
    # Charge per child = (60_000/12)/2 children/20 days = $125/day > rates.
    # reimbursement = 41 x 20 + 37 x 20 = 820 + 740 = $1,560.
    # benefit = max(1_560 - 240, 0) = $1,320.
    ky_ccap: 1_320

- name: Case 7, Kentucky Works enrollment satisfies the activity test.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 0
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 4
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 24_000
    households:
      household:
        members: [person1, person2]
        state_code: KY
        county_str: JEFFERSON_COUNTY_KY
  output:
    # No work hours, but Kentucky Works enrollment is a categorical activity bypass.
    ky_ccap_activity_eligible: true
    # Zero income -> income eligible and $0 copay.
    ky_ccap_income_eligible: true
    ky_ccap_eligible: true
    ky_ccap_copay: 0
    # Rate R4 LicI Preschool Full = $41; charge = (24_000/12)/20 = $100 > $41.
    # reimbursement = 41 x 20 = $820; benefit = max(820 - 0, 0) = $820.
    ky_ccap: 820

- name: Case 8, income at the size-2 boundary is eligible and the benefit flows through.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 50_592
        # 50_592 / 12 = 4_216/month: just under the $4,217 size-2 SMI limit.
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        # 48 months -> PRESCHOOL
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 24_000
    households:
      household:
        members: [person1, person2]
        state_code: KY
        county_str: JEFFERSON_COUNTY_KY
  output:
    # 4_216/month <= 4_217 size-2 limit -> income eligible at the boundary.
    ky_ccap_income_eligible: true
    ky_ccap_eligible: true
    # Region 4, Licensed Type I, Preschool, Full Day = $41.
    ky_ccap_daily_rate: [0, 41]
    # size_2 band at $4,216/month is above the top $2,100 bracket = $12/day x 20 = $240.
    ky_ccap_copay: 240
    # Charge = (24_000/12)/20 = $100 > $41 -> reimbursement = 41 x 20 = $820.
    # benefit = max(820 - 240, 0) = $580.
    ky_ccap: 580

- name: Case 9, special-care supplement flows through to the top-level benefit.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        # 2_000/month gross countable income.
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        # 48 months -> PRESCHOOL
        is_disabled: true
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 24_000
    households:
      household:
        members: [person1, person2]
        state_code: KY
        county_str: JEFFERSON_COUNTY_KY
  output:
    ky_ccap_eligible: true
    # Region 4, Licensed Type I, Preschool, Full Day = $41 base rate.
    ky_ccap_daily_rate: [0, 41]
    # +$1 special-care supplement -> daily benefit = min(42, $100 charge) = $42.
    ky_ccap_daily_benefit: [0, 42]
    # size_2 band at $2,000/month = $11/day x 20 = $220 copay.
    ky_ccap_copay: 220
    # reimbursement = 42 x 20 = $840; benefit = max(840 - 220, 0) = $620.
    ky_ccap: 620

- name: Case 10 (2024 chart), full chain under the 11-18-2024 copay table.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 27_000
        # 27_000 / 12 = 2_250/month gross countable income.
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        # PRESCHOOL
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
      person3:
        age: 9
        # School-age child not in paid care.
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 30_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: KY
        county_str: ADAIR_COUNTY_KY
  output:
    # === Eligibility ===
    # 2_250/month < 5_210 size-3 SMI limit; parent works 30 hrs/wk >= 20.
    ky_ccap_eligible: true

    # === Region and rate ===
    # Adair -> Region 2; Licensed Type I, Preschool, Full Day = $36. The
    # school-age child not in care still shows a potential rate (Part Day =
    # $30) but earns no benefit because the charge cap is zero with no care
    # days.
    ky_ccap_rate_region: REGION_2
    ky_ccap_daily_rate: [0, 36, 30]

    # === Copay (11-18-2024 chart) ===
    # 2_250/month -> band [2_200, 2_500) household-of-2 fee $6 - $1 (third
    # member) = $5/day x 20 care days = $100.
    ky_ccap_copay: 100

    # === Monthly benefit ===
    # Unit expense 30_000/yr splits evenly across the two children:
    # 15_000/12/20 = $62.50 daily charge > $36 -> daily benefit = $36.
    # Monthly reimbursement = 36 x 20 = $720; benefit = max(720 - 100, 0) = $620.
    ky_ccap: 620
