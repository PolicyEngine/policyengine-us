# KY CCAP integration tests.
# Income test: gross monthly income <= 85% Kentucky SMI by family size
#   (DCC-113): size 2 = $4,217; size 3 = $5,210; size 4 = $6,202.
# Copay (2024-01 periods, 5-31-2019 edition): per-day fee by income band x
#   family size x children-in-care, x care days.
# Copay (2025-01 periods, 11-18-2024 edition): per-day fee by income band x
#   household size (household-of-2 fee - $1 per additional member), x care days.
# Rate: DCC-300 daily max by region x provider x age x day length.

- name: Case 1, basic eligible family with a positive benefit.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        # 24_000 / 12 = 2_000/month gross countable income.
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        # 48 months -> PRESCHOOL
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 22
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 30_000
    households:
      household:
        members: [person1, person2]
        state_code: KY
        county_str: JEFFERSON_COUNTY_KY
  output:
    # === Eligibility ===
    ky_ccap_eligible_child: [false, true]
    # 2_000/month < 4_217 size-2 SMI limit -> income eligible.
    ky_ccap_income_eligible: true
    # Parent works 30 hrs/wk >= 20 -> activity eligible.
    ky_ccap_activity_eligible: true
    ky_ccap_eligible: true

    # === Region and age ===
    ky_ccap_rate_region: REGION_4
    ky_ccap_child_age_category: [SCHOOL_AGE, PRESCHOOL]

    # === Daily rate ===
    # Region 4, Licensed Type I, Preschool, Full Day = $41.
    ky_ccap_daily_rate: [0, 41]

    # === Copay ===
    # size_2 band at $2,000/month = $11/day x 22 care days = $242.
    ky_ccap_copay: 242

    # === Monthly benefit ===
    # Daily charge = (30_000/12)/22 = $113.64 > $41 -> daily benefit = $41.
    # Monthly reimbursement = 41 x 22 = $902.
    # benefit = max(902 - 242, 0) = $660.
    ky_ccap: 660

- name: Case 2, low-income family with zero copay, charge below rate.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 28
        employment_income: 9_600
        # 9_600 / 12 = 800/month <= 899 -> $0 copay.
        weekly_hours_worked_before_lsr: 25
      person2:
        age: 1
        # 12 months -> INFANT_TODDLER
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 6_000
    households:
      household:
        members: [person1, person2]
        state_code: KY
        county_str: ALLEN_COUNTY_KY
  output:
    ky_ccap_eligible: true
    ky_ccap_rate_region: REGION_1
    # Region 1, Licensed Type I, Infant/Toddler, Full Day = $29.
    ky_ccap_daily_rate: [0, 29]
    # Income <= 899 -> $0 copay.
    ky_ccap_copay: 0
    # Daily charge = (6_000/12)/20 = $25 < $29 -> daily benefit = $25.
    ky_ccap_daily_benefit: [0, 25]
    # Monthly reimbursement = min(charge $500, 29 x 20) = $500.
    # benefit = max(500 - 0, 0) = $500.
    ky_ccap: 500

- name: Case 3, income above the SMI limit gives zero benefit.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 84_000
        # 84_000 / 12 = 7_000/month > 4_217 size-2 limit -> income ineligible.
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 4
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 22
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 30_000
    households:
      household:
        members: [person1, person2]
        state_code: KY
        county_str: JEFFERSON_COUNTY_KY
  output:
    ky_ccap_income_eligible: false
    ky_ccap_eligible: false
    ky_ccap: 0

- name: Case 4, special-needs child over twelve is eligible.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        employment_income: 36_000
        # 3_000/month < 4_217 size-2 limit -> income eligible.
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 15
        has_developmental_delay: true
        # special-needs limit is 19, so age 15 is an eligible child.
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 24_000
    households:
      household:
        members: [person1, person2]
        state_code: KY
        county_str: JEFFERSON_COUNTY_KY
  output:
    ky_ccap_eligible_child: [false, true]
    ky_ccap_income_eligible: true
    ky_ccap_eligible: true
    # age 15 = 180 months -> SCHOOL_AGE
    ky_ccap_child_age_category: [SCHOOL_AGE, SCHOOL_AGE]
    # Region 4, Licensed Type I, School Age, Full Day = $37.
    ky_ccap_daily_rate: [0, 37]

