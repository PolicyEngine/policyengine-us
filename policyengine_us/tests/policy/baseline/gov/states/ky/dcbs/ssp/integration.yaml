# Integration tests for Kentucky State Supplementary Payment.
# Uses real income sources (social_security, employment_income) rather than
# injected SSI intermediates, so the federal SSI → state SSP chain is
# exercised end-to-end. Tests use MONTH period with monthly expected values.
#
# Key reference values (MS 1200, effective 1/1/2026, monthly):
#   PCH standard:                          $1,610
#   CIS standard:                          $1,514
#   FCH standard:                          $1,166
#   Caretaker individual:                  $1,056
#   Caretaker couple, one receives care:   $1,552 (per-person $776)
#   Caretaker couple, both receive care:   $1,606 (per-person $803)
#   Federal SSI FBR (individual, 2026):      $994
#   PCH PNA / FCH PNA:                        $60 / $40

- name: Case 1, aged PCH individual with SSI and Social Security.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        # Age ≥ 65 → is_ssi_aged auto-derives to true.
        social_security: 9_600  # $800/mo unearned.
        ky_ssp_category: PCH
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    # Federal SSI still applies the $20: $800 − $20 = $780/mo countable.
    ssi_countable_income: [780]
    # Federal SSI = FBR − countable = $994 − $780 = $214/mo.
    ssi: [214]
    is_ssi_eligible: [true]
    ky_ssp_eligible: [true]
    ky_ssp_payment_standard: [1_610]
    # §8(8): KY uses gross $800 (no $20 deduction).
    ky_ssp_countable_income: [800]
    # §8(2): ky_ssp = max(0, $1,610 − $800) = $810/mo.
    ky_ssp: [810]

- name: Case 2, aged PCH individual with no income receives full PCH supplement.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        ky_ssp_category: PCH
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ssi_countable_income: [0]
    ssi: [994]
    ky_ssp_eligible: [true]
    ky_ssp_payment_standard: [1_610]
    # §8(2): full PCH standard because countable income = 0.
    ky_ssp: [1_610]

- name: Case 3, Group 2 pathway — SSI-eligible but income above federal FBR.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        # $1,100/mo RSDI > federal SSI FBR ($994) but below PCH state
        # standard ($1,610) → Group 2 pathway per §4(1)(b).
        social_security: 13_200
        ky_ssp_category: PCH
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    # Federal: $1,100 − $20 = $1,080/mo countable.
    ssi_countable_income: [1_080]
    # Federal SSI = max(0, $994 − $1,080) = $0 → no SSI receipt.
    ssi: [0]
    # But still SSI-eligible categorically (ABD + resources) per §4(1)(a).
    is_ssi_eligible: [true]
    # §8(8): KY uses gross $1,100 (no $20 deduction). Below PCH standard.
    ky_ssp_countable_income: [1_100]
    ky_ssp_eligible: [true]
    ky_ssp_payment_standard: [1_610]
    # ky_ssp = max(0, $1,610 − $1,100) = $510/mo.
    ky_ssp: [510]

- name: Case 4, income above state standard fails §4(1)(b).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        # $2,000/mo RSDI > PCH standard $1,610 → income-ineligible.
        social_security: 24_000
        ky_ssp_category: PCH
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    # KY countable = gross $2,000/mo > PCH standard $1,610 → not eligible.
    ky_ssp_countable_income: [2_000]
    ky_ssp_eligible: [false]
    ky_ssp: [0]

- name: Case 5, SSI recipient with earned income uses $65+50% exclusion.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 68
        employment_income: 6_000  # $500/mo earned.
        ky_ssp_category: CIS
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    # Federal: $20 general + $65 earned = $85, then 50% of remainder excluded.
    # max(0, $500 − $85) × 0.5 = $207.50.
    ssi_countable_income: [207.50]
    # SSI = $994 − $207.50 = $786.50/mo.
    ssi: [786.50]
    # §8(8): KY skips the $20 general → only $65 earned + 50% applies.
    # max(0, $500 − $65) × 0.5 = $217.50.
    ky_ssp_countable_income: [217.50]
    ky_ssp_eligible: [true]
    ky_ssp_payment_standard: [1_514]
    # ky_ssp = $1,514 − $217.50 = $1,296.50/mo.
    ky_ssp: [1_296.50]

- name: Case 6, eligible individual with ineligible spouse (Caretaker).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_ssi_disabled: true
        ky_ssp_category: CARETAKER
      person2:
        # Non-ABD spouse is not SSI-eligible.
        age: 45
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    # person1: SSI-eligible adult with ineligible spouse → COUPLE_ONE_ELIGIBLE.
    # person2: not SSI-eligible → INDIVIDUAL default.
    ky_ssp_claim_type: [COUPLE_ONE_ELIGIBLE, INDIVIDUAL]
    # person1 uses Caretaker "individual with ineligible spouse" rate $1,056/mo.
    # person2: not eligible, no supplement.
    ky_ssp_payment_standard: [1_056, 0]
    ky_ssp_eligible: [true, false]
    ky_ssp: [1_056, 0]

- name: Case 7, Caretaker couple — both SSI-eligible, both receive care.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 68
        ky_ssp_category: CARETAKER
        ky_ssp_care_receivers: BOTH
      person2:
        age: 67
        ky_ssp_category: CARETAKER
        ky_ssp_care_receivers: BOTH
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    # Both SSI-eligible aged → COUPLE_BOTH_ELIGIBLE.
    ky_ssp_claim_type: [COUPLE_BOTH_ELIGIBLE, COUPLE_BOTH_ELIGIBLE]
    # Per-person standard $803/mo (half of $1,606 couple total).
    ky_ssp_payment_standard: [803, 803]
    ky_ssp_eligible: [true, true]
    # Each: $803 − $0 = $803. Couple total = $1,606/mo.
    ky_ssp: [803, 803]

- name: Case 8, Caretaker couple — both SSI-eligible, only one receives care.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 68
        # Care receiver.
        ky_ssp_category: CARETAKER
        ky_ssp_care_receivers: ONE
      person2:
        age: 67
        ky_ssp_category: CARETAKER
        ky_ssp_care_receivers: ONE
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    ky_ssp_claim_type: [COUPLE_BOTH_ELIGIBLE, COUPLE_BOTH_ELIGIBLE]
    # Per-person $776/mo (half of $1,552 couple total).
    # Note: OMVOLV example #6 pays the full $1,552 to the care receiver only.
    # This model distributes equally across both eligible spouses; household
    # total matches the regulation ($1,552/mo).
    ky_ssp_payment_standard: [776, 776]
    ky_ssp_eligible: [true, true]
    ky_ssp: [776, 776]

- name: Case 9, minor fails §4(1)(c) age ≥ 18 requirement.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 10
        is_ssi_disabled: true
        ky_ssp_category: PCH
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    # §4(1)(c) requires age ≥ 18 for all four categories.
    ky_ssp_eligible: [false]
    ky_ssp: [0]

- name: Case 10, non-Kentucky resident receives no state supplement.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        ky_ssp_category: PCH
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TN
  output:
    # defined_for = StateCode.KY → TN resident zeroed out.
    ky_ssp: [0]

- name: Case 11, SSI-eligible adult in NONE category is not SSP-eligible.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        # Lives in private home without caretaker/CIS → NONE (default).
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    # NONE category → fails §4(1)(c) in_qualifying_category test.
    ky_ssp_eligible: [false]
    ky_ssp: [0]
    # Federal SSI still flows normally.
    ssi: [994]

- name: Case 12, FCH individual with zero income receives full FCH supplement.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 55
        is_ssi_disabled: true
        ky_ssp_category: FCH
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ky_ssp_eligible: [true]
    ky_ssp_payment_standard: [1_166]
    ky_ssp: [1_166]
    # FCH PNA = $40/mo.
    ky_ssp_personal_needs_allowance: [40]

- name: Case 13, OMVOLV MS 1200 §C example — Bob, PCH with $900 RSDI.
  # Reproduces the Personal Needs Allowance illustration on OMVOLV page 5:
  # "Bob resides in a PCH. He receives RSDI of $900 a month. The PCH standard
  # is $1,610. His State Supplementation payment is $710. Bob must pay the
  # PCH $1,500 and he will keep $60."
  # https://www.chfs.ky.gov/agencies/dcbs/dfs/Documents/OMVOLV.pdf#page=5
  #
  # Demonstrates §8(8): the $20 SSI general exclusion is NOT applied. Federal
  # SSI countable income = $900 − $20 = $880, but KY SSP uses gross $900, so
  # SSP = $1,610 − $900 = $710 (not $730 with the federal exclusion).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        social_security: 10_800  # $900/mo RSDI.
        ky_ssp_category: PCH
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    # Federal SSI still applies the $20 exclusion: $900 − $20 = $880.
    ssi_countable_income: [880]
    # Federal SSI = $994 − $880 = $114/mo.
    ssi: [114]
    is_ssi_eligible: [true]
    ky_ssp_eligible: [true]
    ky_ssp_payment_standard: [1_610]
    # §8(8): KY SSP uses gross $900, no $20 deduction → $1,610 − $900 = $710.
    ky_ssp: [710]
    # PCH PNA = $60/mo.
    ky_ssp_personal_needs_allowance: [60]

- name: Case 14, OMVOLV MS 1200 §B.2 example — Sue, CIS with $1,000 RSDI.
  # "Sue receives $1,000 per month in Retirement, Survivors, Disability
  # Insurance (RSDI) and lives in an apartment and receives CIS. Her State
  # Supplementation payment is $514 ($1,514 - $1,000)."
  # https://www.chfs.ky.gov/agencies/dcbs/dfs/Documents/OMVOLV.pdf#page=5
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        social_security: 12_000  # $1,000/mo RSDI.
        ky_ssp_category: CIS
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
  output:
    ky_ssp_eligible: [true]
    ky_ssp_payment_standard: [1_514]
    ky_ssp_countable_income: [1_000]
    ky_ssp: [514]

- name: Case 15, OMVOLV MS 1200 §B.5 example — Dan, Caretaker with ineligible spouse.
  # "Dan is disabled and receives $855 per month in RSDI and receives
  # Caretaker Services. His spouse, Joan, is not aged, blind, or disabled
  # and has no income. His State Supplementation payment is $201
  # ($1,056 - $855)."
  # https://www.chfs.ky.gov/agencies/dcbs/dfs/Documents/OMVOLV.pdf#page=5
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_ssi_disabled: true
        social_security: 10_260  # $855/mo RSDI.
        ky_ssp_category: CARETAKER
      person2:
        # Joan: not ABD → not SSI-eligible.
        age: 45
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    ky_ssp_claim_type: [COUPLE_ONE_ELIGIBLE, INDIVIDUAL]
    ky_ssp_payment_standard: [1_056, 0]
    ky_ssp_countable_income: [855, 0]
    ky_ssp_eligible: [true, false]
    # $1,056 − $855 = $201.
    ky_ssp: [201, 0]

- name: Case 16, OMVOLV MS 1200 §B.6 example — Mark and Amy, Caretaker couple, one needs care.
  # "Mark and Amy are disabled, and each receive RSDI in the amount of $600.
  # However, only Mark requires care and receives Caretaker Services. His
  # State Supplementation payment is $352 ($1,552 - $1,200 combined income)."
  # https://www.chfs.ky.gov/agencies/dcbs/dfs/Documents/OMVOLV.pdf#page=5
  # The model splits the $1,552 standard equally ($776 per spouse) and the
  # household total matches the regulation: 2 × $176 = $352.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_ssi_disabled: true
        social_security: 7_200  # $600/mo RSDI.
        ky_ssp_category: CARETAKER
        ky_ssp_care_receivers: ONE
      person2:
        age: 50
        is_ssi_disabled: true
        social_security: 7_200  # $600/mo RSDI.
        ky_ssp_category: CARETAKER
        ky_ssp_care_receivers: ONE
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    ky_ssp_claim_type: [COUPLE_BOTH_ELIGIBLE, COUPLE_BOTH_ELIGIBLE]
    ky_ssp_payment_standard: [776, 776]
    # SSI couple computation attributes combined ($1,200) /2 = $600 to each.
    ky_ssp_countable_income: [600, 600]
    ky_ssp_eligible: [true, true]
    # Each: $776 − $600 = $176. Household total = $352, matching OMVOLV.
    ky_ssp: [176, 176]

- name: Case 17, OMVOLV MS 1200 §B.7 example — Charlie and Becky, Caretaker couple, both need care.
  # "Charlie and Becky are both disabled and receive RSDI. They both require
  # care and each receive Caretaker Services. The State Supplementation
  # payment is $1,606 - $1,276 (combined income) = $330/2 (divided by 2 as
  # they both require care) = $165 each."
  # https://www.chfs.ky.gov/agencies/dcbs/dfs/Documents/OMVOLV.pdf#page=5
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_ssi_disabled: true
        social_security: 7_656  # $638/mo RSDI.
        ky_ssp_category: CARETAKER
        ky_ssp_care_receivers: BOTH
      person2:
        age: 50
        is_ssi_disabled: true
        social_security: 7_656  # $638/mo RSDI; combined = $1,276.
        ky_ssp_category: CARETAKER
        ky_ssp_care_receivers: BOTH
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    ky_ssp_claim_type: [COUPLE_BOTH_ELIGIBLE, COUPLE_BOTH_ELIGIBLE]
    ky_ssp_payment_standard: [803, 803]
    # SSI couple computation attributes combined ($1,276) /2 = $638 to each.
    ky_ssp_countable_income: [638, 638]
    ky_ssp_eligible: [true, true]
    # Each: $803 − $638 = $165. Matches OMVOLV exactly.
    ky_ssp: [165, 165]
