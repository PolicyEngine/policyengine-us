# KY CCAP monthly benefit: per child min(charge, rate + add-ons) x care days,
# summed, minus the family copay, floored at 0.

- name: Case 1, eligible family with a positive monthly benefit.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 22_800
        # 1_900/month: income eligible (< 4_217); size_2 copay band $10/day.
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        # 48 months -> PRESCHOOL
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 24_000
    households:
      household:
        members: [person1, person2]
        state_code: KY
        county_str: JEFFERSON_COUNTY_KY
  output:
    # Rate R4 LicI Preschool Full = $41/day; charge = (24_000/12)/20 = $100/day.
    # daily benefit = min(41, 100) = $41; monthly reimbursement = 41 x 20 = $820.
    # Copay: size_2 band [1_800, 2_000) = $10/day x 20 = $200.
    # benefit = max(820 - 200, 0) = $620.
    ky_ccap: 620

- name: Case 2, ineligible family receives no benefit.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 90_000
        # 7_500/month > 4_217 size-2 SMI limit -> income ineligible
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 4
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 24_000
    households:
      household:
        members: [person1, person2]
        state_code: KY
        county_str: JEFFERSON_COUNTY_KY
  output:
    ky_ccap: 0

- name: Case 3, copay exceeding reimbursement floors the benefit at zero.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 22_800
        # 1_900/month -> size_2 copay $10/day x 20 = $200.
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
        immigration_status: CITIZEN
        ky_ccap_provider_type: LICENSED_TYPE_I
        childcare_attending_days_per_month: 20
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        # Tiny charge: (1_200/12)/20 = $5/day. Monthly reimbursement = 5 x 20 = $100.
        spm_unit_pre_subsidy_childcare_expenses: 1_200
    households:
      household:
        members: [person1, person2]
        state_code: KY
        county_str: JEFFERSON_COUNTY_KY
  output:
    # reimbursement $100 < copay $200 -> max(100 - 200, 0) = $0.
    ky_ccap: 0
