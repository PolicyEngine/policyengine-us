- name: Case 1, eligible individual in a certified adult care setting with no income reduction.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        uncapped_ssi: 0
    households:
      household:
        members: [person1]
        state_code: DE
        de_ssp_living_arrangement: CERTIFIED_RESIDENTIAL_CARE_HOME
  output:
    # Eligibility: age 70 >= 18, SSI eligible, in a certified adult care setting, DE resident
    de_ssp_eligible: true
    # Benefit: individual amount = $140, no reduction
    # supplement = max(0, 140 - max(0, -(0/12))) = max(0, 140 - 0) = $140
    de_ssp: 140
    # At a monthly test period, the household state-benefit aggregate includes
    # the monthly SSP amount.
    household_state_benefits: 140
    # SPM benefits include both SSI and the Delaware SSP in this scenario.
    spm_unit_benefits: 433.5

- name: Case 2, eligible couple both in a certified adult care setting.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 68
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        uncapped_ssi: 0
      person2:
        age: 65
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        uncapped_ssi: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: DE
        de_ssp_living_arrangement: CERTIFIED_RESIDENTIAL_CARE_HOME
  output:
    # Both eligible: age >= 18, SSI eligible, in a certified adult care setting
    de_ssp_eligible: [true, true]
    # Couple amount = $448 total, per person = $448/2 = $224
    # Each person: supplement = max(0, 224 - 0) = $224
    # Joint path: sum(224, 224) / 2 = $224 per person
    de_ssp: [224, 224]

- name: Case 3, child age 17 in a certified adult care setting is ineligible.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 17
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        uncapped_ssi: 0
    households:
      household:
        members: [person1]
        state_code: DE
        de_ssp_living_arrangement: CERTIFIED_RESIDENTIAL_CARE_HOME
  output:
    # Age 17 < 18 threshold: ineligible
    de_ssp_eligible: false
    # defined_for guard: ineligible person gets $0
    de_ssp: 0

- name: Case 4, SSI-ineligible adult in a certified adult care setting.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 55
        is_ssi_eligible: false
        ssi_claim_is_joint: false
        uncapped_ssi: 0
    households:
      household:
        members: [person1]
        state_code: DE
        de_ssp_living_arrangement: CERTIFIED_RESIDENTIAL_CARE_HOME
  output:
    # Not SSI eligible: ineligible for SSP
    de_ssp_eligible: false
    de_ssp: 0

- name: Case 5, eligible adult not in a qualifying adult care setting.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 60
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        uncapped_ssi: 0
    households:
      household:
        members: [person1]
        state_code: DE
        de_ssp_living_arrangement: NONE
  output:
    # Not in a qualifying adult care setting: ineligible
    de_ssp_eligible: false
    de_ssp: 0

- name: Case 6, individual with partial income reduction.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        uncapped_ssi: -720
    households:
      household:
        members: [person1]
        state_code: DE
        de_ssp_living_arrangement: CERTIFIED_RESIDENTIAL_CARE_HOME
  output:
    de_ssp_eligible: true
    # individual amount = $140
    # uncapped_ssi monthly = -720/12 = -$60
    # reduction = max(0, -(-60)) = $60
    # supplement = max(0, 140 - 60) = $80
    de_ssp: 80

- name: Case 7, couple with one spouse having income reduction.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 72
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        uncapped_ssi: -600
      person2:
        age: 70
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        uncapped_ssi: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: DE
        de_ssp_living_arrangement: CERTIFIED_RESIDENTIAL_CARE_HOME
  output:
    de_ssp_eligible: [true, true]
    # per_person_amount = $448/2 = $224
    # person1: uncapped_ssi monthly = -600/12 = -$50
    #   reduction = max(0, 50) = $50
    #   supplement = max(0, 224 - 50) = $174
    # person2: uncapped_ssi monthly = 0/12 = $0
    #   reduction = 0, supplement = $224
    # joint path: sum(174, 224) / 2 = $199 per person
    de_ssp: [199, 199]
