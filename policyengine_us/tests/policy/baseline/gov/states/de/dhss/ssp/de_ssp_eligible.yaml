- name: Case 1, SSI-eligible adult in a certified adult care setting.
  period: 2025-01
  input:
    people:
      person1:
        age: 45
        is_ssi_eligible: true
    households:
      household:
        members: [person1]
        state_code: DE
        de_ssp_living_arrangement: CERTIFIED_RESIDENTIAL_CARE_HOME
  output:
    de_ssp_eligible: true

- name: Case 2, child in a certified adult care setting is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 17
        is_ssi_eligible: true
    households:
      household:
        members: [person1]
        state_code: DE
        de_ssp_living_arrangement: CERTIFIED_RESIDENTIAL_CARE_HOME
  output:
    de_ssp_eligible: false

