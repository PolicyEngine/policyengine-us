- name: Case 1, SSI-eligible adult in residential care.
  period: 2025-01
  input:
    people:
      person1:
        age: 45
        is_ssi_eligible: true
    households:
      household:
        members: [person1]
        state_code: DE
        de_ssp_living_arrangement: RESIDENTIAL_CARE
  output:
    de_ssp_eligible: true

- name: Case 2, child in residential care is ineligible.
  period: 2025-01
