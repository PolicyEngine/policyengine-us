# de_poc_eligible_child: Person, bool, MONTH
# Eligible if: (age < 13) OR (disabled AND age < 19),
#   AND is_tax_unit_dependent, AND is_ccdf_immigration_eligible_child
# Parameters: age_threshold.child = 13, age_threshold.disabled_child = 19

- name: Case 1, young child who is a dependent citizen.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: DE
  output:
    de_poc_eligible_child: [false, true]

