- name: Case 6, negative income does not inflate benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 1_200
        self_employment_income: -60_000_000
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        de_poc_provider_type: CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: DE
  output:
    # Negative income -> copay 0 (waived below 150% FPL)
    # Max weekly = $255 (center preschool), annual = 255 * 52 = 13_260
    # Uncapped = max(10_000 - 0, 0) = 10_000
    # Annual benefit = min(10_000, 13_260) = 10_000
    # Monthly = 10_000 / 12 = 833.33
    # Benefit capped at max, not inflated by negative income
    de_poc: 833.33

