# de_poc_maximum_weekly_benefit: Person, float, MONTH
# Looks up weekly rate from rate table by provider type and age group
# For disabled children, uses special needs rate table
#
# Weekly rates (2024):
#   Center:      INFANT=$325, TODDLER=$290, PRESCHOOL=$255,
#                SCHOOL_AGE_FT=$190, SCHOOL_AGE_PT=$135
#   Family Home: INFANT=$222.50, TODDLER=$200, PRESCHOOL=$200,
#                SCHOOL_AGE_FT=$160, SCHOOL_AGE_PT=$100

- name: Case 1, center infant rate.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 0
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        de_poc_provider_type: CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: DE
  output:
    # Center INFANT weekly rate = $325.00
    de_poc_maximum_weekly_benefit: [0, 325]

