- name: CDCC locked to lower-income spouse (head has higher income)
  period: 2025
  input:
    people:
      person1:
        is_tax_unit_head: true
        de_taxable_income_indv: 50_000
      person2:
        is_tax_unit_spouse: true
        de_taxable_income_indv: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
        de_cdcc: 200
    households:
      household:
        members: [person1, person2]
        state_code: DE
  output:
    de_cdcc_indv: [0, 200]

- name: CDCC locked to lower-income spouse (spouse has higher income)
  period: 2025
  input:
    people:
      person1:
        is_tax_unit_head: true
        de_taxable_income_indv: 5_000
      person2:
        is_tax_unit_spouse: true
        de_taxable_income_indv: 60_000
    tax_units:
      tax_unit:
        members: [person1, person2]
        de_cdcc: 200
    households:
      household:
        members: [person1, person2]
        state_code: DE
  output:
    de_cdcc_indv: [200, 0]

- name: CDCC zero when no childcare expenses
  period: 2025
  input:
    people:
      person1:
        is_tax_unit_head: true
        de_taxable_income_indv: 30_000
      person2:
        is_tax_unit_spouse: true
        de_taxable_income_indv: 20_000
    tax_units:
      tax_unit:
        members: [person1, person2]
        de_cdcc: 0
    households:
      household:
        members: [person1, person2]
        state_code: DE
  output:
    de_cdcc_indv: [0, 0]

- name: tied taxable incomes route CDCC to spouse
  period: 2025
  input:
    people:
      person1:
        is_tax_unit_head: true
        de_taxable_income_indv: 30_000
      person2:
        is_tax_unit_spouse: true
        de_taxable_income_indv: 30_000
    tax_units:
      tax_unit:
        members: [person1, person2]
        de_cdcc: 200
    households:
      household:
        members: [person1, person2]
        state_code: DE
  output:
    # On tie, head is "higher", spouse is "lower" -> spouse gets CDCC
    de_cdcc_indv: [0, 200]

- name: dependent never gets CDCC
  period: 2025
  input:
    people:
      person1:
        is_tax_unit_head: true
        de_taxable_income_indv: 50_000
      person2:
        is_tax_unit_spouse: true
        de_taxable_income_indv: 10_000
      person3:
        is_tax_unit_dependent: true
        age: 8
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
        de_cdcc: 200
    households:
      household:
        members: [person1, person2, person3]
        state_code: DE
  output:
    de_cdcc_indv: [0, 200, 0]
