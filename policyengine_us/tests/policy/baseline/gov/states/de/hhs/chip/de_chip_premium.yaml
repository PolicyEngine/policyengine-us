- name: Delaware below premium threshold owes no premium.
  period: 2024
  input:
    people:
      child:
        is_chip_eligible: true
        is_chip_eligible_child: true
    tax_units:
      tax_unit:
        members: [child]
        tax_unit_medicaid_income_level: 1.30
    households:
      household:
        members: [child]
        state_code: DE
  output:
