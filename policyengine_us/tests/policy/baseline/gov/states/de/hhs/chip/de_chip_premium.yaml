- name: Delaware tier 1 tax unit pays 15 dollars monthly.
  period: 2024
  input:
    people:
      child:
        is_chip_eligible: true
        is_chip_eligible_child: true
    tax_units:
      tax_unit:
        members: [child]
        tax_unit_medicaid_income_level: 1.60
    households:
      household:
        members: [child]
        state_code: DE
  output:
    de_chip_premium: 180

- name: Delaware tier 2 tax unit pays 25 dollars monthly.
