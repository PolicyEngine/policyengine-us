- name: Calculation for a joint person
  period: 2021
  input:
  # The taxable income will always default to 0 for the non-head 
    people: 
      person1:
        mt_taxable_income_indiv: 1_000
        long_term_capital_gains: 500
      person2:
        mt_taxable_income_indiv: 3_000
        long_term_capital_gains: 2_000
    tax_units:
      tax_unit:
        members: [person1, person2]
        state_filing_status_if_married_filing_separately_on_same_return: SEPARATE
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_capital_gains_tax_indiv: [0, 0]
    mt_regular_income_tax_indiv: [10, 30]


- name: Calculation of a head of household
  period: 2021
  input:
  # The taxable income will always default to 0 for the non-head 
    people: 
      person1:
        mt_taxable_income_indiv: 10_000
      person2:
        mt_taxable_income_indiv: 0
    tax_units:
      tax_unit:
        members: [person1, person2]
        state_filing_status_if_married_filing_separately_on_same_return: HEAD_OF_HOUSEHOLD
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_regular_income_tax_indiv: [230, 0]


- name: Indiv path disabled in 2024 (MFSS repealed)
  period: 2024
  input:
    people:
      person1:
        mt_taxable_income_indiv: 10_000
        long_term_capital_gains: 5_000
      person2:
        mt_taxable_income_indiv: 0
        long_term_capital_gains: 2_000
    tax_units:
      tax_unit:
        members: [person1, person2]
        state_filing_status_if_married_filing_separately_on_same_return: HEAD_OF_HOUSEHOLD
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_capital_gains_tax_indiv: [0, 0]
    mt_regular_income_tax_indiv: [0, 0]

- name: Indiv regular tax subtracts net LTCG after STCG losses when MFSS is enabled
  period: 2024
  reforms: policyengine_us.tests.policy.baseline.gov.states.mt.tax.income.enable_mt_mfss_2024_reform.enable_mt_mfss_2024_reform
  input:
    people:
      person1:
        mt_taxable_income_indiv: 80_000
        long_term_capital_gains: 50_000
        short_term_capital_gains: -20_000
      person2:
        mt_taxable_income_indiv: 0
        long_term_capital_gains: 0
        short_term_capital_gains: 0
    tax_units:
      tax_unit:
        members: [person1, person2]
        state_filing_status_if_married_filing_separately_on_same_return: SEPARATE
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_regular_income_tax_indiv: [2_704, 0]
