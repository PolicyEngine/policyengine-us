- name: Case 1, Montana HELP premium is zero after premiums cease.
  period: 2023
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
    tax_units:
      tax_unit:
        members: [person1]
        medicaid_magi: 25_000
        tax_unit_medicaid_income_level: 1.25
    households:
      household:
        members: [person1]
        state_code: MT
  output:
    mt_help_premium: 0

