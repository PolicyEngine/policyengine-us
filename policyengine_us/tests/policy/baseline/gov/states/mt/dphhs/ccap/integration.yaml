- name: Case 7, single parent + school-age child at a school-age provider; annual aggregator.
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        employment_income: 24_000  # size 2, ratio 1.1091 -> 1.0%
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 8  # 96 months -> SCHOOL_AGE
        mt_ccap_provider_type: SCHOOL_AGE_PROVIDER
        mt_ccap_care_time: FULL_TIME
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 9_000  # 750/mo for the child
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    # max rate (school age provider, school age, full-time) = 572
    # copay: GMI 2,000 * 1.0% = 20; charge 750 > 572 -> capped at 572
    # monthly benefit = 572 - 20 = 552; annual aggregator = 12 * 552 = 6,624
    mt_child_care_subsidies: 6_624

# --- Edge case integration scenarios: 185% standard ceiling, benefit floor at 0,
# and the highest single max rate (infant at a center, full-time). ---
- name: Case 8, family at 182% FPG (continuing recipient), center preschooler, full-time.
  period: 2026-01
  absolute_error_margin: 0.1
  # ratio 39,384/21,640 = 1.82 -> 6.5% copay bracket; continuing recipient eligible (182% < 185% graduated limit, below 85% SMI).
  input:
    people:
      person1:
        age: 31
        employment_income: 39_384  # size 2, 182% of FPG (3,282/mo)
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 4  # PRESCHOOL
        mt_ccap_provider_type: CENTER
        mt_ccap_care_time: FULL_TIME
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: false
        mt_ccap_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 18_000  # 1,500/mo for the child
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_ccap_eligible_child: [false, true]
    mt_ccap_income_eligible: true  # 182% FPG < 185% graduated limit (enrolled), below 85% SMI
    mt_ccap_activity_eligible: true
    mt_ccap_eligible: true
    mt_ccap_max_rate: [0, 1_210]  # center preschool full-time
    mt_ccap_countable_income: 3_282  # 39,384 / 12
    mt_ccap_copay: 213.33  # 3,282.00 * 6.5%
    # charge 1,500 > max rate 1,210 -> capped at 1,210; benefit = 1,210 - 213.33
    mt_ccap: 996.67

- name: Case 9, eligible family whose copay exceeds the small reimbursement (benefit floors at 0).
  period: 2026-01
  absolute_error_margin: 0.1
  # continuing recipient with a tiny provider charge; copay 213.33 > reimbursement 200 -> benefit floored at 0 even though the family is eligible.
  input:
    people:
      person1:
        age: 31
        employment_income: 39_384  # 182% FPG, 6.5% copay bracket
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 4
        mt_ccap_provider_type: CENTER
        mt_ccap_care_time: FULL_TIME
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: false
        mt_ccap_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 2_400  # 200/mo charge, below the copay
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_ccap_eligible: true
    mt_ccap_max_rate: [0, 1_210]
    mt_ccap_copay: 213.33  # 3,282.00 * 6.5%
    # reimbursement = min(200, 1,210) = 200; max(200 - 213.33, 0) = 0
    mt_ccap: 0

- name: Case 10, infant at a center, full-time (highest single max rate).
  period: 2026-01
  absolute_error_margin: 0.1
  # center infant/toddler full-time = 1,276, the highest cell on the rate table; low income -> $10-floor copay.
  input:
    people:
      person1:
        age: 26
        employment_income: 18_000  # size 2, ~83% FPG -> 0.5% bracket, copay at the $10 floor
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 0  # newborn, INFANT_TODDLER
        mt_ccap_provider_type: CENTER
        mt_ccap_care_time: FULL_TIME
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 24_000  # 2,000/mo > 1,276 max rate
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_ccap_child_age_category: [SCHOOL_AGE, INFANT_TODDLER]
    mt_ccap_eligible_child: [false, true]
    mt_ccap_income_eligible: true
    mt_ccap_eligible: true
    mt_ccap_max_rate: [0, 1_276]  # center infant/toddler full-time
    mt_ccap_countable_income: 1_500  # 18,000 / 12
    mt_ccap_copay: 10  # 1,500 * 0.5% = 7.50 -> floored to the $10 minimum
    # charge 2,000 > max rate 1,276 -> capped at 1,276; benefit = 1,276 - 10
    mt_ccap: 1_266
