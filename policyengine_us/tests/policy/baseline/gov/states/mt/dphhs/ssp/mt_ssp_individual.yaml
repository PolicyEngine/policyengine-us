- name: Case 1, ASSISTED_LIVING_OR_GROUP_OR_COMMUNITY_HOME individual rate is $94.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        mt_ssp_payment_category: ASSISTED_LIVING_OR_GROUP_OR_COMMUNITY_HOME
    households:
      household:
        members: [person1]
        state_code: MT
  output:
    # ARM 37.43.104(1): G/H/I tier individual rate frozen at $94 since 1989.
    mt_ssp_individual: 94

