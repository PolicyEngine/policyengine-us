- name: Case 1, ASSISTED_LIVING couple gate met -> each spouse gets $96.50 ($193 / 2).
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        mt_ssp_payment_category: ASSISTED_LIVING_OR_GROUP_OR_COMMUNITY_HOME
      person2:
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        mt_ssp_payment_category: ASSISTED_LIVING_OR_GROUP_OR_COMMUNITY_HOME
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    # Couple total $193 / 2 = $96.50 per spouse.
    mt_ssp_couple_per_spouse: [96.50, 96.50]

