- name: Case 4, mismatched payment categories breaks the couple gate.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        mt_ssp_payment_category: ASSISTED_LIVING_OR_GROUP_OR_COMMUNITY_HOME
      person2:
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        mt_ssp_payment_category: FOSTER_CARE
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    # Different categories -> gate fails; caller falls back to individual.
    mt_ssp_couple_per_spouse: [0, 0]

- name: Case 5, no joint claim breaks the couple gate.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        mt_ssp_payment_category: ASSISTED_LIVING_OR_GROUP_OR_COMMUNITY_HOME
      person2:
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        mt_ssp_payment_category: ASSISTED_LIVING_OR_GROUP_OR_COMMUNITY_HOME
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    # No joint claim -> couple gate fails.
    mt_ssp_couple_per_spouse: [0, 0]

- name: Case 6, only one spouse eligible breaks the couple gate.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        mt_ssp_payment_category: ASSISTED_LIVING_OR_GROUP_OR_COMMUNITY_HOME
      person2:
        # Spouse has too much income to be SSI-eligible.
        employment_income: 60_000
        ssi_claim_is_joint: true
        mt_ssp_payment_category: ASSISTED_LIVING_OR_GROUP_OR_COMMUNITY_HOME
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    # Only person1 is mt_ssp_eligible -> couple gate fails.
    mt_ssp_couple_per_spouse: [0, 0]
