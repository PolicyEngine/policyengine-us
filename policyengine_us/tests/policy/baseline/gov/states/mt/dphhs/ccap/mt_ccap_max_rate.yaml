# Unit tests for mt_ccap_max_rate (Person, MONTH).
# 3-D lookup: p.rates.provider_rates[provider_type][age_category][care_time].
# Values from the BBS Provider Reimbursement Monthly Rates table (effective 07-01-2025).
# Covers every provider type, both age-group endpoints, both care times, and the
# RCE / School-Age-Provider NA (= 0) cells.
# Each case has person1 = parent and person2 = the child whose rate is asserted, so
# the child is unambiguously an eligible dependent child.
# Age sets the age group: age 1 (12 mo) INFANT_TODDLER, age 4 (48 mo) PRESCHOOL,
# age 8 (96 mo) SCHOOL_AGE. care_time defaults to FULL_TIME.

# --- Child Care Center ---
- name: Case 1, center infant/toddler full-time.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 1
        mt_ccap_provider_type: CENTER
        mt_ccap_care_time: FULL_TIME
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_ccap_max_rate: [0, 1_276]

- name: Case 2, center infant/toddler half-time.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 1
        mt_ccap_provider_type: CENTER
        mt_ccap_care_time: HALF_TIME
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_ccap_max_rate: [0, 638]

- name: Case 3, center school age full-time.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 8
        mt_ccap_provider_type: CENTER
        mt_ccap_care_time: FULL_TIME
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_ccap_max_rate: [0, 1_100]

