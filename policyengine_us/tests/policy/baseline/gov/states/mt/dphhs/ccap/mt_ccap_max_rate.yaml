# --- Edge cases: half-time as a direct input (no care_time formula exists), plus
# the remaining NA / fractional / school-age cells to round out dimension coverage. ---
- name: Case 13, RCE infant/toddler half-time (fractional rate, direct HALF_TIME input).
  period: 2026-01
  # care_time is a bare input (no formula); HALF_TIME selects the half-time RCE infant/toddler rate 374.
  input:
    people:
      person1:
        age: 30
      person2:
        age: 1
        mt_ccap_provider_type: RELATIVE_EXEMPT
        mt_ccap_care_time: HALF_TIME
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_ccap_max_rate: [0, 374]

- name: Case 14, school age provider school age half-time.
  period: 2026-01
  # HALF_TIME direct input; school age provider school age half-time = 286.
  input:
    people:
      person1:
        age: 30
      person2:
        age: 8
        mt_ccap_provider_type: SCHOOL_AGE_PROVIDER
        mt_ccap_care_time: HALF_TIME
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_ccap_max_rate: [0, 286]

- name: Case 15, school age provider preschool full-time (the only non-zero SAP preschool cell).
  period: 2026-01
  # School age providers may serve preschoolers; preschool full-time = 572.
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        mt_ccap_provider_type: SCHOOL_AGE_PROVIDER
        mt_ccap_care_time: FULL_TIME
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_ccap_max_rate: [0, 572]

- name: Case 16, group home school age full-time (highest age group, group home).
  period: 2026-01
  # Group home school age full-time = 990 (same as preschool for group home).
  input:
    people:
      person1:
        age: 30
      person2:
        age: 8
        mt_ccap_provider_type: GROUP_HOME
        mt_ccap_care_time: FULL_TIME
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_ccap_max_rate: [0, 990]

- name: Case 17, default provider type and care time (no inputs) uses CENTER full-time.
  period: 2026-01
  # provider_type defaults to CENTER and care_time defaults to FULL_TIME; preschool child -> 1,210.
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4  # preschool, no provider/care inputs -> CENTER FULL_TIME
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_ccap_max_rate: [0, 1_210]
