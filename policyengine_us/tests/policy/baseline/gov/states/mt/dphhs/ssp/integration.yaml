- name: Case 4, joint couple both in ASSISTED_LIVING get $193 total ($96.50 each).
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        # Couple split federal SSI: joint total $1,415/mo -> half is
        # $707.50 each.
        ssi: 707.50
        is_ssi_aged_blind_disabled: true
        is_tax_unit_head_or_spouse: true
        ssi_claim_is_joint: true
        mt_ssp_payment_category: ASSISTED_LIVING_OR_GROUP_OR_COMMUNITY_HOME
      person2:
        ssi: 707.50
        is_ssi_aged_blind_disabled: true
        is_tax_unit_head_or_spouse: true
        ssi_claim_is_joint: true
        mt_ssp_payment_category: ASSISTED_LIVING_OR_GROUP_OR_COMMUNITY_HOME
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    # Couple gate met -> each spouse $193 / 2 = $96.50; SPM total $193.
    mt_ssp_eligible: [true, true]
    mt_ssp: 193

- name: Case 5, joint couple in different categories fall back to individual rates.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        ssi: 707.50
        is_ssi_aged_blind_disabled: true
        is_tax_unit_head_or_spouse: true
        ssi_claim_is_joint: true
        mt_ssp_payment_category: ASSISTED_LIVING_OR_GROUP_OR_COMMUNITY_HOME
      person2:
        ssi: 707.50
        is_ssi_aged_blind_disabled: true
        is_tax_unit_head_or_spouse: true
        ssi_claim_is_joint: true
        mt_ssp_payment_category: FOSTER_CARE
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    # Asymmetric categories -> couple gate fails.
    # person1: G/H/I individual = $94; person2: J individual = $52.75.
    # SPM total = $94 + $52.75 = $146.75.
    mt_ssp_eligible: [true, true]
    mt_ssp: 146.75

- name: Case 6, joint couple with only one eligible falls back to individual rate.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        is_tax_unit_head_or_spouse: true
        ssi_claim_is_joint: true
        mt_ssp_payment_category: FOSTER_CARE
      person2:
        # Spouse not aged/blind/disabled -> not SSI-eligible.
        is_ssi_eligible: false
        is_tax_unit_head_or_spouse: true
        ssi_claim_is_joint: true
        mt_ssp_payment_category: FOSTER_CARE
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    # Only person1 is MT-SSP-eligible -> couple gate fails.
    # person1 gets J individual = $52.75; person2 gets $0.
    mt_ssp_eligible: [true, false]
    mt_ssp: 52.75

- name: Case 7, NONE living arrangement gets zero supplement.
