- name: Case 1, single eligible person in personal care facility receives $94.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        mt_ssp_payment_category: ASSISTED_LIVING_OR_GROUP_OR_COMMUNITY_HOME
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MT
  output:
    # Individual rate G/H/I tier = $94 - $0 income offset = $94.
    mt_ssp_eligible: true
    mt_ssp: 94

