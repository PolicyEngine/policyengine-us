        age: 4
      person3:
        age: 7
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2, person3]
        state_code: MT
  output:
    mt_ccap_copay: 40.35  # 2,690.00/mo * 0.015
