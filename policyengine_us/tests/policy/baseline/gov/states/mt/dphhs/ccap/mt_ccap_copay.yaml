# Unit tests for mt_ccap_copay (SPMUnit, MONTH).
# Non-TANF: copay = max(gross_monthly_income * copay_rate.calc(fpg_ratio), $10).
# TANF (is_tanf_enrolled): flat $10.
# fpg_ratio = countable monthly income / monthly FPG.
# 2026 FPG (contiguous), size 3 (1 parent + 2 children): 27,320 annual = 2,276.67/mo.
# Income inputs are annual; the MONTH formula reads the monthly portion.
- name: Case 1, low income copay floors at the $10 minimum.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        employment_income: 20_490  # 75% FPG; 0.5% of 1,707.50 = 8.54 < 10
      person2:
        age: 4
      person3:
        age: 7
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2, person3]
        state_code: MT
  output:
    mt_ccap_copay: 10  # max(8.54, 10)

- name: Case 2, 100% FPG copay (0.5% bracket, just above the floor).
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        employment_income: 27_320  # 100% FPG, ratio 1.0 -> 0.5%
      person2:
        age: 4
      person3:
        age: 7
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2, person3]
        state_code: MT
  output:
    mt_ccap_copay: 11.38  # 2,276.67 * 0.005 = 11.38

- name: Case 3, continuing recipient at 152% FPG pays the 3.5% copay.
  period: 2026-01
  absolute_error_margin: 0.1
  # 41,520 annual (152% FPG) -> 3.5% tier; enrolled (eligible up to 185% FPG).
  input:
    people:
      person1:
        employment_income: 41_520  # 3,460/mo, 152% of size-3 FPG
      person2:
        age: 4
      person3:
        age: 7
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: false
        mt_ccap_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: MT
  output:
    mt_ccap_copay: 121.1  # 3,460.00 * 0.035

