- name: Case 1, property tax relief income includes PAS-1 additional income sources.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 60
        employment_income: 80_000
        tax_exempt_interest_income: 1_000
        tax_exempt_ira_distributions: 2_000
        social_security_retirement: 4_000
        total_disability_payments: 3_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: NJ
  output:
    nj_property_tax_relief_income: 90_000

- name: Case 2, disability pension is excluded at full retirement age.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 50_000
        total_disability_payments: 3_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: NJ
  output:
    nj_property_tax_relief_income: 50_000

- name: Case 3, property tax relief income sums across head and spouse.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 100_000
        tax_exempt_interest_income: 5_000
        is_tax_unit_head: true
      person2:
        age: 69
        social_security_retirement: 20_000
        is_tax_unit_spouse: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    nj_property_tax_relief_income: 125_000
