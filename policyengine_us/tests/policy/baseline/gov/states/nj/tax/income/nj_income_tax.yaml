- name: NJ income tax should be zero for a single filer with income below the filing threshold.
  period: 2022
  input:
    state_code: NJ
    nj_agi: 9_999
    filing_status: SINGLE
    nj_childless_eitc_age_eligible: false
  output:
    nj_income_tax: 0

- name: NJ income tax should be zero for a joint couple filing with income below the filing threshold.
  period: 2022
  input:
    state_code: NJ
    nj_agi: 19_999
    filing_status: JOINT
  output:
    nj_income_tax: 0

- name: Below the filing threshold, tax is zeroed before applying refundable credits
  period: 2022
  input:
    state_code: NJ
    nj_agi: 19_999
    filing_status: JOINT
    # Per N.J.S.A. 54A:2-4, the pre-credit liability is wiped before
    # credits flow through; the full $1,001 of credits is refunded
    # rather than netted against the $1,000 of bracket-schedule tax.
    nj_income_tax_before_refundable_credits: 1_000
    nj_refundable_credits: 1_001
  output:
    nj_income_tax: -1_001

- name: NJ joint at $20K gross income owes no tax, full refundable credits
  period: 2025
  input:
    people:
      head: {age: 40}
      spouse: {age: 40, employment_income: 20_000}
      k1: {age: 2}
      k2: {age: 11}
    tax_units:
      tax_unit:
        members: [head, spouse, k1, k2]
        tax_unit_childcare_expenses: 3_000
    marital_units:
      m:
        members: [head, spouse]
      m1:
        members: [k1]
      m2:
        members: [k2]
    households:
      household:
        members: [head, spouse, k1, k2]
        state_name: NJ
  output:
    nj_income_tax: -3_860.8

- name: NJ income tax above filing threshold so tax is calculated amount minus refundable credits.
  period: 2022
  input:
    state_code: NJ
    nj_agi: 60_000
    filing_status: JOINT
    nj_income_tax_before_refundable_credits: 10_000
    nj_refundable_credits: 50
  output:
    nj_income_tax: 9_950
