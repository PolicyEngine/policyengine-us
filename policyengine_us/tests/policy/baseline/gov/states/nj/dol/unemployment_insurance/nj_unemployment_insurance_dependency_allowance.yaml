# Tests for the NJ UI dependency allowance rate based on claim-established facts.

- name: NJ UI dependency allowance rate - 1 qualifying dependent (2024)
  period: 2024
  absolute_error_margin: 0.001
  input:
    people:
      person:
        age: 35
        nj_unemployment_insurance_qualifying_dependents: 1
    tax_units:
      tax_unit:
        members: [person]
    spm_units:
      spm_unit:
        members: [person]
    households:
      household:
        members: [person]
        state_code: NJ
  output:
    people:
      person:
        nj_unemployment_insurance_dependency_allowance: 0.07

