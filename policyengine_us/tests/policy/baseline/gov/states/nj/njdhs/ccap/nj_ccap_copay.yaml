# nj_ccap_copay: SPMUnit, float, MONTH
# Copay = annual_income * copay_percentage / 12
# Copay percentage depends on FPL tier, care type (FT/PT), and child count (1 or 2+).
# Third+ child = $0 additional.
#
# 2026 FPG family of 2: 21_640; family of 4: 33_000; family of 5: 38_680
# Copay rates (CC-236 06/24, reinstatement era effective Aug 1, 2024):
#   0-1.0: 0% (waived)
#   1.0001-2.0: first child FT 2%, PT 1%; second child FT +1%, PT +0.5%
#   2.0001+: first child FT 3%, PT 1.5%; second child FT +2%, PT +1%
#
# CC-236 verification examples (reinstatement rates):
#   Income $22,000, 1 child FT weekly: $22,000 * 2% / 52 = $8.46
#   Income $55,000, 2 children FT weekly: $55,000 * 3% / 52 = $31.73
#   Income $40,000, 1 child PT weekly: $40,000 * 1% / 52 = $7.69
#   Income $91,000, 2 children mixed weekly: $91,000 * 4% / 52 = $70.00

- name: Case 1, income at or below 100% FPL copay waived.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        nj_ccap_provider_type: LICENSED_CENTER
        nj_ccap_grow_nj_kids_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # FPG family of 2: 21_640
    # FPL ratio = 20_000 / 21_640 = 0.924 -> below 100% -> $0 copay
    nj_ccap_copay: 0

