# nj_ccap_eligible_child: Person, bool, MONTH
# Child must be: age < 13 (or < 19 if special needs), dependent, immigration eligible
# Age threshold params: child = 13, special_needs = 19

- name: Case 1, child age 4 is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        state_code: NJ
  output:
    nj_ccap_eligible_child: true

