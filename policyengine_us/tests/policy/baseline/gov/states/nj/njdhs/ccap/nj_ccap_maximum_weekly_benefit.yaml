# nj_ccap_maximum_weekly_benefit: Person, float, MONTH
# Looks up rate by provider_type x quality_rating x age_group x time_category.
# Rates effective 2025-03-01 (CC-230).
# Person-level variable: returns the max weekly reimbursement for each child.

- name: Case 1, licensed center FT base infant.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 1
        childcare_hours_per_week: 35
        nj_ccap_provider_type: LICENSED_CENTER
        nj_ccap_grow_nj_kids_rating: NONE
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        state_code: NJ
  output:
    nj_ccap_maximum_weekly_benefit: 366.67

