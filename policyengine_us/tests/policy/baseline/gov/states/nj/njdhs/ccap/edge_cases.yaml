# === Third child confirms $0 additional copay (via full nj_ccap benefit) ===

- name: Case 28, three children FT confirms third child zero additional copay.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 50_000
        immigration_status: CITIZEN
      person2:
        age: 32
        immigration_status: CITIZEN
      person3:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        nj_ccap_provider_type: LICENSED_CENTER
        nj_ccap_grow_nj_kids_rating: NONE
      person4:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        nj_ccap_provider_type: LICENSED_CENTER
        nj_ccap_grow_nj_kids_rating: NONE
      person5:
        age: 7
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        nj_ccap_provider_type: LICENSED_CENTER
        nj_ccap_grow_nj_kids_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4, person5]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5]
        spm_unit_pre_subsidy_childcare_expenses: 30_000
    households:
      household:
        members: [person1, person2, person3, person4, person5]
        state_code: NJ
  output:
    # FPG fam of 5: 38_680; FPL ratio = 50_000/38_680 = 1.293
    # 3 children all FT at 101-200%:
    #   first child FT 2% + second child FT 1% + third child 0% = 3%
    # copay = 50_000 * 0.03 / 12 = 125
    nj_ccap_copay: 125

    # Rates: infant FT base = 366.67; preschool FT base = 291.57; school age FT base = 274.96
    nj_ccap_maximum_weekly_benefit: [0, 0, 366.67, 291.57, 274.96]

    # max annual = (366.67 + 291.57 + 274.96) * 52 = 933.20 * 52 = 48_526.40
    # annual copay = 50_000 * 0.03 = 1_500
    # uncapped = max(30_000 - 1_500, 0) = 28_500
    # annual benefit = min(28_500, 48_526.40) = 28_500
    # monthly = 28_500 / 12 = 2_375
    nj_ccap: 2_375

