# NJ CCAP Edge Case Tests
# Targets boundary conditions for eligibility, copay, age groups, provider rates,
# time categories, and assets.
#
# 2026 FPG (Contiguous US): first_person = 15_960, additional = 5_680
#   Family of 2: 21_640; 200% = 43_280; 250% = 54_100
#   Family of 3: 27_320; 200% = 54_640; 250% = 68_300
#   Family of 4: 33_000; 200% = 66_000; 250% = 82_500
#   Family of 8: 55_720; 200% = 111_440
# CCDF asset limit: 1_000_000

# === Income threshold boundaries ===

- name: Case 1, income one dollar below 200% FPL for family of 2.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 43_279
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # 43_279 < 43_280 (200% FPL) -> eligible
    nj_ccap_income_eligible: true

- name: Case 2, income one dollar above 200% FPL for family of 2.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 43_281
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # 43_281 > 43_280 (200% FPL) -> ineligible for initial
    nj_ccap_income_eligible: false

- name: Case 3, enrolled family one dollar below 250% FPL.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 54_099
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        nj_ccap_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # 54_099 < 54_100 (250% FPL fam of 2) -> eligible
    nj_ccap_income_eligible: true

- name: Case 4, enrolled family above 250% FPL but below 85% SMI is eligible.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 54_101
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        nj_ccap_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # Enrolled -> uses 85% SMI (graduated phase-out)
    # 85% SMI family of 2 = 88_516; 54_101 <= 88_516 -> eligible
    nj_ccap_income_eligible: true

# === Copay at FPL tier boundaries ===

- name: Case 5, copay at exactly 100% FPL is waived.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 21_640
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        nj_ccap_provider_type: LICENSED_CENTER
        nj_ccap_grow_nj_kids_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # FPG fam of 2 = 21_640; FPL ratio = 21_640/21_640 = 1.0
    # 1.0 < 1.0001 -> still in 0% bracket -> copay waived
    nj_ccap_copay: 0

- name: Case 6, copay just above 100% FPL enters 101-200% tier.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 21_700
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        nj_ccap_provider_type: LICENSED_CENTER
        nj_ccap_grow_nj_kids_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # FPL ratio = 21_700/21_640 = 1.00277
    # 1.00277 >= 1.0001 -> 101-200% tier
    # 1 child FT -> 2%
    # monthly copay = 21_700 * 0.02 / 12 = 36.17
    nj_ccap_copay: 36.17

- name: Case 7, copay at exactly 200% FPL stays in 101-200% tier.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 43_280
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        nj_ccap_provider_type: LICENSED_CENTER
        nj_ccap_grow_nj_kids_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # FPL ratio = 43_280/21_640 = 2.0
    # 2.0 < 2.0001 -> still in 101-200% tier
    # 1 child FT -> 2%
    # monthly copay = 43_280 * 0.02 / 12 = 72.13
    nj_ccap_copay: 72.13

- name: Case 8, copay just above 200% FPL enters 201%+ tier.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 43_340
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        nj_ccap_provider_type: LICENSED_CENTER
        nj_ccap_grow_nj_kids_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        nj_ccap_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # FPL ratio = 43_340/21_640 = 2.00277
    # 2.00277 >= 2.0001 -> 201%+ tier
    # 1 child FT -> 3%
    # monthly copay = 43_340 * 0.03 / 12 = 108.35
    nj_ccap_copay: 108.35

# === Asset boundary ===

- name: Case 9, assets exactly at 1M limit is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_assets: 1_000_000
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # Assets 1_000_000 <= 1_000_000 -> asset eligible
    is_ccdf_asset_eligible: true
    nj_ccap_eligible: true

- name: Case 10, assets one dollar over 1M limit is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_assets: 1_000_001
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # Assets 1_000_001 > 1_000_000 -> asset ineligible
    is_ccdf_asset_eligible: false
    nj_ccap_eligible: false

# === Age group month boundaries ===
# age field is in years; age_in_months = age * 12
# Boundary: 17 months (1.4167 yrs) = INFANT; 18 months (1.5 yrs) = TODDLER

- name: Case 11, child at 17 months is infant.
  period: 2026-01
  input:
    people:
      person1:
        # 17 months = 17/12 = 1.4167 years
        age: 1.4167
    households:
      household:
        members: [person1]
        state_code: NJ
  output:
    # 1.4167 * 12 = 17.0 months < 18 -> INFANT
    nj_ccap_age_group: INFANT

- name: Case 12, child at 18 months is toddler.
  period: 2026-01
  input:
    people:
      person1:
        # 18 months = 1.5 years
        age: 1.5
    households:
      household:
        members: [person1]
        state_code: NJ
  output:
    # 1.5 * 12 = 18.0 months >= 18 -> TODDLER
    nj_ccap_age_group: TODDLER

