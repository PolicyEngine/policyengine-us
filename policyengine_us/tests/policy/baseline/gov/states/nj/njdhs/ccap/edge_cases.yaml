    # Toddler (24 mo) FT base center = 326.56
    nj_ccap_maximum_weekly_benefit: [0, 326.56]

    # max annual = 326.56 * 52 = 16_981.12
    # uncapped = max(18_000 - 0, 0) = 18_000
    # annual benefit = min(18_000, 16_981.12) = 16_981.12
    # monthly = 16_981.12 / 12 = 1_415.09
    nj_ccap: 1_415.09

