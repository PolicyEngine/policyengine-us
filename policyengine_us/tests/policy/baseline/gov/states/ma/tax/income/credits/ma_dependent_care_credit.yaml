- name: No CDCC-eligible people, no credit
  period: 2021
  absolute_error_margin: 0
  input:
    count_cdcc_eligible: 0
    state_code: MA
  output:
    ma_dependent_care_credit: 0

- name: One CDCC-eligible person, $240 credit, or less based on earnings.
  period: 2021
  absolute_error_margin: 0
  input:
    count_cdcc_eligible: 1
    min_head_spouse_earned: 200
    tax_unit_childcare_expenses: 300
    state_code: MA
  output:
    ma_dependent_care_credit: 200

- name: Two CDCC-eligible people, $480 credit
  period: 2021
  absolute_error_margin: 0
  input:
    count_cdcc_eligible: 2
    tax_unit_childcare_expenses: 500
    min_head_spouse_earned: 600
    state_code: MA
  output:
    ma_dependent_care_credit: 480

- name: More than two CDCC-eligible people, up to $480 credit
  period: 2021
  absolute_error_margin: 0
  input:
    count_cdcc_eligible: 4
    tax_unit_childcare_expenses: 500
    min_head_spouse_earned: 300
    state_code: MA
  output:
    ma_dependent_care_credit: 300

- name: Disabled adult dependent's care expenses count toward the credit
  period: 2021
  absolute_error_margin: 0
  input:
    people:
      person1:
        is_tax_unit_head: true
        employment_income: 40_000
      person2:
        is_tax_unit_spouse: true
        employment_income: 30_000
      person3:
        age: 18
        is_incapable_of_self_care: true
        is_tax_unit_dependent: true
        pre_subsidy_care_expenses: 6_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MA
  output:
    # One qualifying individual: min(6_000 adult care, 240 x 1, 30_000) = 240.
    ma_dependent_care_credit: 240

- name: Married filing separately is ineligible
  period: 2021
  absolute_error_margin: 0
  input:
    people:
      person1:
        is_tax_unit_head: true
        employment_income: 40_000
      person2:
        age: 5
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SEPARATE
        tax_unit_childcare_expenses: 1_000
    households:
      household:
        members: [person1, person2]
        state_code: MA
  output:
    ma_dependent_care_credit: 0

- name: Separated filer maintaining a home for a qualifying individual keeps the credit
  period: 2021
  absolute_error_margin: 0
  input:
    people:
      person1:
        is_tax_unit_head: true
        is_separated: true
        employment_income: 40_000
      person2:
        age: 5
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SEPARATE
        tax_unit_childcare_expenses: 1_000
    households:
      household:
        members: [person1, person2]
        state_code: MA
  output:
    # One qualifying individual: min(1_000, 240 x 1, 40_000) = 240.
    ma_dependent_care_credit: 240
