- name: Case 1, Massachusetts household in a CSFP covered county.
  period: 2025
  input:
    people:
      person1:
        age: 65
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MA
        county_str: SUFFOLK_COUNTY_MA
  output:
    ma_dese_csfp_county_eligible: true

