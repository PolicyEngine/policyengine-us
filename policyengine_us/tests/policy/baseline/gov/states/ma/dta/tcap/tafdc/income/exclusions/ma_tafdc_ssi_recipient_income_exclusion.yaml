- name: SSI recipient has all income excluded
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 65
        ssi_reported: 10_000  # YEAR
        employment_income_before_lsr: 12_000  # YEAR -> 1000/mo earned
        social_security: 6_000  # YEAR -> 500/mo unearned
    spm_units:
      spm_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MA
  output:
    # SSI recipient: all earned (1000) + unearned (500)
    ma_tafdc_ssi_recipient_earned_income_exclusion: 1_000
    ma_tafdc_ssi_recipient_unearned_income_exclusion: 500
    ma_tafdc_ssi_recipient_income_exclusion: 1_500

- name: Non-SSI recipient has no exclusion
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        ssi_reported: 0
        employment_income_before_lsr: 12_000  # YEAR -> 1000/mo
        social_security: 6_000  # YEAR -> 500/mo
    spm_units:
      spm_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MA
  output:
    ma_tafdc_ssi_recipient_earned_income_exclusion: 0
    ma_tafdc_ssi_recipient_unearned_income_exclusion: 0
    ma_tafdc_ssi_recipient_income_exclusion: 0

- name: Dependent child under 16 receives SSI and has earned income.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      parent:
        age: 35
        employment_income_before_lsr: 0
        ssi_reported: 0
        is_tax_unit_dependent: false
      child1:
        age: 14
        employment_income_before_lsr: 6_000  # YEAR -> 500/mo
        ssi_reported: 10_000  # YEAR, receives SSI
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [parent, child1]
    tax_units:
      tax_unit:
        members: [parent, child1]
    households:
      household:
        members: [parent, child1]
        state_code: MA
  output:
    # child1 qualifies for BOTH exclusions:
    # SSI exclusion (A): 500/mo (all earned income)
    # Child exclusion (U): 500/mo (under 16, dependent)
    # ma_tafdc_gross_earned_income uses max_(500, 500) = 500
    ma_tafdc_ssi_recipient_earned_income_exclusion:
      - 0  # parent: no SSI
      - 500  # child1: SSI recipient, full earned exclusion
    ma_tafdc_dependent_child_earned_income_exclusion:
      - 0  # parent: not a dependent child
      - 500  # child1: under 16, full exclusion
    ma_tafdc_gross_earned_income:
      - 0  # parent: no earned income
      - 0  # child1: 500 - max_(500, 500) = 0
