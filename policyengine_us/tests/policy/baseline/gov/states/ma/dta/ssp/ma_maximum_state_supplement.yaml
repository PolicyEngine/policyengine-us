# Tests for ma_maximum_state_supplement across different living arrangements,
# categories, and historical periods.

- name: Case 1, single disabled, FULL_COST, 2022.
  period: 2022
  absolute_error_margin: 1
  input:
    people:
      person_disabled:
        age: 30
        is_disabled: true
        is_tax_unit_spouse: false
        meets_ssi_resource_test: true
        is_ssi_eligible: true
        is_ssi_aged_blind_disabled: true
    households:
      household:
        members: [person_disabled]
        state_code: MA
        ma_state_living_arrangement: FULL_COST
    marital_units:
      unit:
        members: [person_disabled]
  output:
    ma_maximum_state_supplement: 1_373

