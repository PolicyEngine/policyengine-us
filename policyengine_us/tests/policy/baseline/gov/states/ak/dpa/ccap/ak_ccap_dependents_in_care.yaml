# ak_ccap_dependents_in_care: SPMUnit, int, MONTH
# Counts the number of CCAP-eligible children in the SPM unit
# (sum of ak_ccap_child_eligible across members).

- name: Case 1, two eligible children.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
      child1:
        age: 3
        immigration_status: CITIZEN
      child2:
        age: 8
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child1, child2]
    households:
      household:
        members: [parent, child1, child2]
        state_code: AK
  output:
    # Both children under 13 and citizens -> 2 eligible
    ak_ccap_dependents_in_care: 2

- name: Case 2, no eligible children (teen over threshold).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 35
        immigration_status: CITIZEN
      teen:
        age: 14  # over child age threshold of 13
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, teen]
    households:
      household:
        members: [parent, teen]
        state_code: AK
  output:
    ak_ccap_dependents_in_care: 0
