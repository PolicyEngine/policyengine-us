# ak_ccap_income_eligible: SPMUnit, bool, MONTH
# countable_income <= ak_ccap_smi_threshold (85% of monthly Alaska SMI).
# Boundary: <= per "does not exceed" in Manual 4070-2.
#
# Family of 3 monthly 100% SMI (FICS rev Feb 21, 2022) = 7_285
# 85% threshold (monthly) = 7_285 * 0.85 = 6_192.25
# Annual income at threshold = 6_192.25 * 12 = 74_307.00

- name: Case 1, family of 3 below 85% SMI is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 48_000  # 4_000/mo well below 6_192.25 threshold
      person2:
        age: 25
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: AK
  output:
    # 4_000/mo <= 6_192.25 -> eligible
    ak_ccap_income_eligible: true

- name: Case 2, family of 3 just below 85% SMI threshold is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        # threshold - 0.01: avoids float32 round-trip drift at exact boundary
        employment_income: 74_306.99  # annual = 6_192.2492/mo
      person2:
        age: 25
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: AK
  output:
    ak_ccap_income_eligible: true

- name: Case 3, family of 3 above 85% SMI is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 78_000  # 6_500/mo > 6_192.25
      person2:
        age: 25
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: AK
  output:
    ak_ccap_income_eligible: false

- name: Case 4, zero income is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AK
  output:
    ak_ccap_income_eligible: true
