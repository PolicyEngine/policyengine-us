# ak_ccap_rate_region: SPMUnit, Enum (AKCCAPRateRegion), MONTH
# Maps the household's county_str to one of the 29 rate regions
# from the CCAP Provider Rate Schedule. Defaults to ANCHORAGE.

- name: Case 1, Anchorage county maps to ANCHORAGE.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    ak_ccap_rate_region: ANCHORAGE

- name: Case 2, Fairbanks North Star county maps to FAIRBANKS_NORTH_STAR.
