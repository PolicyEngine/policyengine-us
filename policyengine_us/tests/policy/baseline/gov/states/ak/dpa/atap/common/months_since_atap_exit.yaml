# months_since_atap_exit: SPMUnit, int, MONTH (input)
# Months elapsed since the SPM unit's ATAP case closed.
# Used with pass_2_transition_months (12) to gate PASS II eligibility.

- name: Case 1, default value is zero.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AK
  output:
    months_since_atap_exit: 0

- name: Case 2, six months since exit (within window).
  period: 2025-01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        months_since_atap_exit: 6
    households:
      household:
        members: [person1]
        state_code: AK
  output:
    months_since_atap_exit: 6

- name: Case 3, beyond 12-month window.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        months_since_atap_exit: 18
    households:
      household:
        members: [person1]
        state_code: AK
  output:
    months_since_atap_exit: 18
