# ak_ccap_copay: SPMUnit, float (USD), MONTH
# Monthly copay = countable_income * copay_rate.
# One copay per family per Manual 4080.

- name: Case 1, zero income produces zero copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AK
  output:
    ak_ccap_copay: 0

- name: Case 2, family of 3 mid-income copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 39_000  # 3_250/mo
      person2:
        age: 25
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: AK
  output:
    # Family of 3 monthly SMI = 8_673
    # SMI ratio = 3_250 / 8_673 = 0.3748 -> 5% band (>= 0.35, < 0.43)
    # copay = 3_250 * 0.05 = 162.50
    ak_ccap_copay: 162.50

- name: Case 3, family of 4 in 7% band copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 66_000  # 5_500/mo
      person2:
        age: 32
      person3:
        age: 8
      person4:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: AK
  output:
    # Family of 4 monthly SMI = 10_060
    # SMI ratio = 5_500 / 10_060 = 0.5467 -> 7% band (>= 0.52, < 0.61)
    # copay = 5_500 * 0.07 = 385.00
    ak_ccap_copay: 385.00
