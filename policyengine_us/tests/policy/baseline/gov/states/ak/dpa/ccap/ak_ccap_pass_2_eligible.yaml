# ak_ccap_pass_2_eligible: SPMUnit, bool, MONTH
# PASS II (post-ATAP transitional) requires all PASS III conditions plus:
#   was_atap_recipient & months_since_atap_exit < 12.

- name: Case 1, recent post-ATAP family within 6-month window.
  period: 2025-01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
        was_atap_recipient: true
        months_since_atap_exit: 6
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    ak_ccap_pass_2_eligible: true

- name: Case 2, never ATAP recipient is ineligible for PASS II.
  period: 2025-01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
        was_atap_recipient: false
        months_since_atap_exit: 0
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    ak_ccap_pass_2_eligible: false

- name: Case 3, post-ATAP exit 13 months ago is outside window.
  period: 2025-01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
        was_atap_recipient: true
        months_since_atap_exit: 13
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    # months_since_atap_exit (13) >= pass_2_transition_months (12)
    ak_ccap_pass_2_eligible: false

- name: Case 4, post-ATAP exit at exactly 12 months is outside window.
  period: 2025-01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
        was_atap_recipient: true
        months_since_atap_exit: 12
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    # within_window: 12 < 12 -> false
    ak_ccap_pass_2_eligible: false
