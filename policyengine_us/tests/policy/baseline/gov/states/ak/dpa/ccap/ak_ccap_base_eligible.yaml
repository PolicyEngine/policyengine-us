# ak_ccap_base_eligible: SPMUnit, bool, MONTH
# Shared CCAP eligibility checks: eligible child & income & assets & activity.
# Does not include the PASS II / PASS III branching.

- name: Case 1, all four checks pass.
  period: 2025-01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    ak_ccap_base_eligible: true

- name: Case 2, no eligible child fails base eligibility.
  period: 2025-01
  input:
    people:
      parent:
        age: 35
        employment_income: 30_000
        immigration_status: CITIZEN
      teen:
        age: 14
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, teen]
    households:
      household:
        members: [parent, teen]
        state_code: AK
  output:
    # teen is age-ineligible -> no eligible child
    ak_ccap_base_eligible: false

- name: Case 3, no working parent fails activity check.
  period: 2025-01
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        weekly_hours_worked: 0
        is_full_time_student: false
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    ak_ccap_base_eligible: false

- name: Case 4, income above 85% SMI fails income check.
  period: 2025-01
  input:
    people:
      parent:
        age: 30
        employment_income: 200_000
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    ak_ccap_base_eligible: false
