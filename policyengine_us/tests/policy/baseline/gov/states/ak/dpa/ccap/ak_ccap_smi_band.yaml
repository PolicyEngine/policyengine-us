# ak_ccap_smi_band: SPMUnit, float (ratio), MONTH
# Computes countable_income / monthly_full_SMI.
# Used as input to the copay sliding scale.
#
# Uses AK FICS monthly 100% SMI by family size (gov/states/ak/dpa/ccap/income/smi/amount):
#   Family of 2: 5_897
#   Family of 3: 7_285
#   Family of 4: 8_673

- name: Case 1, zero income gives band 0.
  period: 2025-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AK
  output:
    ak_ccap_smi_band: 0

- name: Case 2, family of 3 at half SMI.
  period: 2025-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
        employment_income: 43_710  # 50% SMI: 12 * 7_285 * 0.5 = 43_710
      person2:
        age: 25
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: AK
  output:
    # 3_642.50 / 7_285 = 0.5
    ak_ccap_smi_band: 0.5

- name: Case 3, family of 4 at SMI cap.
  period: 2025-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 35
        employment_income: 104_076  # 100% SMI for fam of 4: 12 * 8_673
      person2:
        age: 32
      person3:
        age: 8
      person4:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: AK
  output:
    # 8_673 / 8_673 = 1.0
    ak_ccap_smi_band: 1.0
