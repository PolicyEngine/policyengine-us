# ---------------------------------------------------------------------------
# At-threshold pinning for each inner copay bracket boundary. The sliding
# scale uses single_amount semantics (numpy.digitize, right=False), so a
# value at-or-above a threshold lands in the upper band. Each case sits
# $0.01/month above the threshold ratio (so the computed ratio is
# unambiguously >= the threshold even with float-precision wiggle) and
# pins the upper-band rate. The "just below" side is already covered by
# Case 11 (just below 0.18 -> 2%) above.
# Family of 4 monthly SMI = 8_673; ratio = countable / 8_673.
# ---------------------------------------------------------------------------

- name: Case 13, family of 4 just at 0.01 ratio lands in 1% band.
  period: 2022-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 35
        # Monthly 86.74 / 8_673 = 0.010001 -> 1% band (>= 0.01)
        # Annual = 86.74 * 12 = 1_040.88
        employment_income: 1_040.88
      person2:
        age: 32
      person3:
        age: 8
      person4:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: AK
  output:
    ak_ccap_copay_rate: 0.01

