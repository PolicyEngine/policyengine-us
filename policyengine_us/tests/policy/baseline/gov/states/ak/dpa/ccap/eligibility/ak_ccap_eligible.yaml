# ak_ccap_eligible: SPMUnit, bool, MONTH
# True if family meets all eligibility checks: eligible child, income <= 85% SMI,
# asset limit, and parent activity.

- name: Case 1, low-income family with eligible child qualifies.
  period: 2022-01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    ak_ccap_eligible: true

- name: Case 2, family above 85% SMI is ineligible.
  period: 2022-01
  input:
    people:
      parent:
        age: 30
        employment_income: 200_000  # above 85% SMI
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    ak_ccap_eligible: false

- name: Case 3, family at federal CCDF asset limit boundary is eligible.
  period: 2022-01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_assets: 999_999.99  # just under $1M CCDF limit
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    ak_ccap_eligible: true

- name: Case 4, family above federal CCDF asset limit is ineligible.
  period: 2022-01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_assets: 1_000_001  # just over $1M CCDF limit
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    # Assets > 1_000_000 -> asset check fails -> ineligible
    ak_ccap_eligible: false

- name: Case 5, family with assets exactly at $1M CCDF limit is eligible (boundary inclusive).
  period: 2022-01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_assets: 1_000_000  # exactly at $1M CCDF limit
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    # is_ccdf_asset_eligible uses <= so assets == 1_000_000 -> eligible
    ak_ccap_eligible: true
