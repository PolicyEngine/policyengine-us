# ak_ccap_max_provider_rate_per_child: Person, float (USD), MONTH
# Rate lookup: provider_type x care_unit x region x age_group.
# Rates from CCAP Provider Rate Schedule (Rev Dec 1 2021).
# Examples (FT_MONTH, all amounts monthly):
#   Licensed center, Anchorage:  INFANT=1135 TODDLER=1148 PRESCHOOL=1019 SCHOOL_AGE=884
#   Licensed center, Fairbanks:  INFANT=1342 TODDLER=1100 PRESCHOOL=900  SCHOOL_AGE=750
#   Licensed center, Mat-Su:     INFANT=805  TODDLER=760  PRESCHOOL=706  SCHOOL_AGE=702
#   Licensed home,  Anchorage:   INFANT=900  TODDLER=800  PRESCHOOL=700  SCHOOL_AGE=650
#   Approved relative, Anch.:    INFANT=521  TODDLER=492  PRESCHOOL=440  SCHOOL_AGE=430
#   Licensed group home, Anch.:  all 0 (Anchorage exception)
#   Licensed group home, Aleutians East: same as center (1208/1107/886/914)

- name: Case 1, licensed center Anchorage preschool FT month.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 4
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    ak_ccap_max_provider_rate_per_child: 1_019

