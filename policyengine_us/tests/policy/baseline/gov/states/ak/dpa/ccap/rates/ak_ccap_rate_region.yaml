# ak_ccap_rate_region: SPMUnit, Enum (County), MONTH
# Returns the household's County for AK CCAP rate lookups. Copper River
# is collapsed into Chugach because the rate schedule still publishes
# one combined Valdez-Cordova column. Unknown counties fall back to
# Anchorage so downstream rate lookups always hit a valid AK key.

- name: Case 1, Anchorage maps to ANCHORAGE_MUNICIPALITY_AK.
  period: 2022-01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    ak_ccap_rate_region: ANCHORAGE_MUNICIPALITY_AK

