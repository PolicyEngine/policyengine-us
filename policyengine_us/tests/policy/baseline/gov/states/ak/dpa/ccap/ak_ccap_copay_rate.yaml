  input:
    people:
      person1:
        age: 35
        # Family of 4 monthly SMI = 10_060; target ratio just below 0.18
        # ratio = 20_677 / 12 / 10_060 = 0.1713 -> 2% band (< 0.18)
        employment_income: 20_677
      person2:
        age: 32
      person3:
        age: 8
      person4:
        age: 5
