# ak_ccap_copay_rate: SPMUnit, float (rate), MONTH
# Sliding scale by countable_income / monthly_full_SMI (Manual §4080, FICS).
# Bands (cumulative):
#   0    to 0.01  -> 0%       (waived for very low income)
#   0.01 to 0.09  -> 1%
#   0.09 to 0.18  -> 2%
#   0.18 to 0.26  -> 3%
#   0.26 to 0.35  -> 4%
#   0.35 to 0.43  -> 5%
#   0.43 to 0.52  -> 6%
#   0.52 to 0.61  -> 7%
#   0.61 to 0.73  -> 8%
#   >= 0.73       -> 9% (cap)
#
# AK FICS monthly 100% SMI: Family of 2 = 7_285; Family of 3 = 8_673; Family of 4 = 10_060.

- name: Case 1, zero income gets waived 0% copay.
  period: 2025-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AK
  output:
    # SMI ratio = 0 -> 0%
    ak_ccap_copay_rate: 0

- name: Case 2, low income lands in 1% band.
  period: 2025-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
        employment_income: 6_000  # 500/mo
        # SMI ratio = 500 / 7_285 = 0.0686 -> 1% band
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AK
  output:
    ak_ccap_copay_rate: 0.01

- name: Case 3, mid income family of 3 lands in 5% band.
  period: 2025-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
        employment_income: 39_000  # 3_250/mo
        # Family of 3 monthly SMI = 8_673
        # ratio = 3_250 / 8_673 = 0.3748 -> 5% band (>= 0.35, < 0.43)
      person2:
        age: 25
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: AK
  output:
    ak_ccap_copay_rate: 0.05

- name: Case 4, high income family near 85% SMI lands in 9% cap band.
  period: 2025-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
        employment_income: 80_000  # ~6_666.67/mo
        # Family of 3 monthly SMI = 8_673
        # ratio = 6_666.67 / 8_673 = 0.7687 -> 9% band (>= 0.73)
      person2:
        age: 25
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: AK
  output:
    ak_ccap_copay_rate: 0.09

- name: Case 5, family of 4 in 2% band.
  period: 2025-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 35
        employment_income: 18_000  # 1_500/mo
      person2:
        age: 32
      person3:
        age: 8
      person4:
        age: 5
        # Family of 4 monthly SMI = 10_060
        # ratio = 1_500 / 10_060 = 0.1491 -> 2% band (>= 0.09, < 0.18)
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: AK
  output:
    ak_ccap_copay_rate: 0.02

