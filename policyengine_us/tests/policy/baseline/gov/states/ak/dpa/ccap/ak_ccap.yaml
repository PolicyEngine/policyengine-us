- name: Case 9, mixed-status siblings — only citizen child counts as eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        employment_income: 24_000  # 2_000/mo
      child_citizen:
        age: 4
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
      child_undocumented:
        age: 3
        immigration_status: UNDOCUMENTED
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child_citizen, child_undocumented]
        spm_unit_pre_subsidy_childcare_expenses: 120_000  # /yr; high enough not to bind cap
    households:
      household:
        members: [parent, child_citizen, child_undocumented]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # Only citizen child counts as eligible
    ak_ccap_child_eligible: [false, true, false]
    ak_ccap_eligible: true
    # Anchorage center FT_MONTH preschool = 1_019; family of 3 monthly SMI = 7_285
    # SMI ratio = 2_000 / 7_285 = 0.2745 -> 4% band (>= 0.26, < 0.35); copay = 80
    # Benefit = min(10_000, 1_019) - 80 = 939
    ak_ccap: 939
