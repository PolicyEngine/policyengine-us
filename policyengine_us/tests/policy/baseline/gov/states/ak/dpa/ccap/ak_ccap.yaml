# ak_ccap: SPMUnit, float (USD), MONTH
# Top-level monthly benefit = max(0, sum(benefit_per_child) - copay).
# Restricted to ak_ccap_eligible families (PASS II or PASS III).

- name: Case 1, eligible single parent with one preschooler in Anchorage.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        employment_income: 24_000  # 2_000/mo
      child:
        age: 4
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_pre_subsidy_childcare_expenses: 120_000  # /yr; high enough not to bind cap
    households:
      household:
        members: [parent, child]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # Family of 2 monthly SMI = 5_897
    # Income ratio = 2_000 / 5_897 = 0.3392 -> 4% band (>= 0.26, < 0.35)
    # copay = 2_000 * 0.04 = 80
    # Anchorage center preschool FT_MONTH = 1_019
    # Expenses = 10_000/mo (does not bind cap)
    # Benefit = max(0, min(10_000, 1_019) - 80) = 939
    ak_ccap: 939

- name: Case 2, ineligible family above 85% SMI gets zero.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        employment_income: 200_000
      child:
        age: 4
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    ak_ccap_eligible: false
    ak_ccap: 0

- name: Case 3, family in Mat-Su with two children eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent1:
        age: 35
        immigration_status: CITIZEN
        employment_income: 30_000  # 2_500/mo
      parent2:
        age: 33
        immigration_status: CITIZEN
        weekly_hours_worked: 0
        is_full_time_student: true
      child1:
        age: 2
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
      child2:
        age: 8
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_HOME
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent1, parent2, child1, child2]
        spm_unit_pre_subsidy_childcare_expenses: 120_000  # /yr; high enough not to bind cap
    households:
      household:
        members: [parent1, parent2, child1, child2]
        state_code: AK
        county_str: MATANUSKA_SUSITNA_BOROUGH_AK
  output:
    # Family of 4 monthly SMI = 8_673
    # Income ratio = 2_500 / 8_673 = 0.2882 -> 4% band (>= 0.26, < 0.35)
    # copay = 2_500 * 0.04 = 100
    # Mat-Su licensed center FT_MONTH toddler = 760 (child1)
    # Mat-Su licensed home   FT_MONTH school age = 652 (child2)
    # Total per-child = 760 + 652 = 1_412
    # Benefit = 1_412 - 100 = 1_312
    ak_ccap_eligible: true
    ak_ccap: 1_312

- name: Case 4, age-ineligible only child yields zero benefit.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 40
        immigration_status: CITIZEN
        employment_income: 30_000
      teen:
        age: 13  # at threshold -> ineligible
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, teen]
    households:
      household:
        members: [parent, teen]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    ak_ccap_eligible: false
    ak_ccap: 0

- name: Case 5, post-ATAP family within transition window is PASS II eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 28
        immigration_status: CITIZEN
        employment_income: 18_000  # 1_500/mo
      child:
        age: 3
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_HOME
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child]
        ak_was_atap_recipient: true
        ak_months_since_atap_exit: 6
        spm_unit_pre_subsidy_childcare_expenses: 120_000  # /yr; high enough not to bind cap
    households:
      household:
        members: [parent, child]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # Family of 2 monthly SMI = 5_897
    # Income ratio = 1_500 / 5_897 = 0.2544 -> 3% band (>= 0.18, < 0.26)
    # copay = 1_500 * 0.03 = 45
    # Anchorage licensed_home FT_MONTH preschool = 700
    # Benefit = min(10_000, 700) - 45 = 655
    ak_ccap_pass_category: PASS_II
    ak_ccap: 655

- name: Case 6, negative countable income does not inflate benefit.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        self_employment_income: -60_000_000
      child:
        age: 4
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_pre_subsidy_childcare_expenses: 120_000  # /yr; high enough not to bind cap
    households:
      household:
        members: [parent, child]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # Countable income clipped to 0 by max_() in countable_income;
    # copay rate at 0 SMI ratio = 0; copay = 0
    # Benefit = min(10_000, 1_019) - 0 = 1_019 (not 60M+)
    ak_ccap: 1_019

- name: Case 7, special-needs child gets supplement when charged rate is high.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        employment_income: 24_000  # 2_000/mo
      child_sn:
        age: 4
        is_disabled: true
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
        ak_ccap_charged_rate: 3_500  # high enough to capture supplement
    spm_units:
      spm_unit:
        members: [parent, child_sn]
        spm_unit_pre_subsidy_childcare_expenses: 120_000  # /yr; high enough not to bind cap
    households:
      household:
        members: [parent, child_sn]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # Family of 2 monthly SMI = 5_897
    # SMI ratio ≈ 0.34 -> 4% band (SSI received by disabled child is small but counted)
    # benefit_per_child = min(3_500, 1_019) + 1_019 = 2_038 (supplement outside cap, mult=2)
    # Total = min(10_000, 2_038) - copay ≈ 1_957.62
    ak_ccap: 1_957.62

