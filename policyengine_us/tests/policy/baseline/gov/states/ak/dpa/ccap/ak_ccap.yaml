# ak_ccap: SPMUnit, float (USD), MONTH
# Top-level monthly benefit = max(0, sum(benefit_per_child) - copay).
# Restricted to ak_ccap_eligible families (PASS II or PASS III).

- name: Case 1, eligible single parent with one preschooler in Anchorage.
  period: 2022-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        employment_income: 24_000  # 2_000/mo
      child:
        age: 4
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_schedule: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_pre_subsidy_childcare_expenses: 14_400  # $1_200/mo, typical AK center
    households:
      household:
        members: [parent, child]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # Family of 2 HHS SMI monthly (2022) = 5_897.30
    # Income ratio = 2_000 / 5_897.30 = 0.339 -> 4% band (>= 0.26, < 0.35)
    # copay = 2_000 * 0.04 = 80
    # Anchorage center preschool FT_MONTH = 1_019
    # Expenses $1_200/mo > rate $1_019 (cap doesn't bind)
    # Benefit = max(0, min(1_200, 1_019) - 80) = 939
    ak_ccap: 939

- name: Case 2, ineligible family above 85% SMI gets zero.
  period: 2022-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        employment_income: 200_000
      child:
        age: 4
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_schedule: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    ak_ccap_eligible: false
    ak_ccap: 0

- name: Case 3, family in Mat-Su with two children eligible.
  period: 2022-01
  absolute_error_margin: 0.1
  input:
    people:
      parent1:
        age: 35
        immigration_status: CITIZEN
        employment_income: 30_000  # 2_500/mo
      parent2:
        age: 33
        immigration_status: CITIZEN
        weekly_hours_worked: 0
        is_full_time_student: true
      child1:
        age: 2
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_schedule: FT_MONTH
      child2:
        age: 8
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_HOME
        ak_ccap_care_schedule: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent1, parent2, child1, child2]
        spm_unit_pre_subsidy_childcare_expenses: 21_600  # $1_800/mo for 2 kids
    households:
      household:
        members: [parent1, parent2, child1, child2]
        state_code: AK
        county_str: MATANUSKA_SUSITNA_BOROUGH_AK
  output:
    # Family of 4 monthly SMI = 8_673
    # Income ratio = 2_500 / 8_673 = 0.2882 -> 4% band (>= 0.26, < 0.35)
    # copay = 2_500 * 0.04 = 100
    # Mat-Su licensed center FT_MONTH toddler = 760 (child1)
    # Mat-Su licensed home   FT_MONTH school age = 652 (child2)
    # Total per-child = 760 + 652 = 1_412
    # Benefit = 1_412 - 100 = 1_312
    ak_ccap_eligible: true
    ak_ccap: 1_312

- name: Case 4, age-ineligible only child yields zero benefit.
  period: 2022-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 40
        immigration_status: CITIZEN
        employment_income: 30_000
      teen:
        age: 13  # at threshold -> ineligible
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_schedule: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, teen]
    households:
      household:
        members: [parent, teen]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    ak_ccap_eligible: false
    ak_ccap: 0

- name: Case 5, TANF-enrolled family has $0 copay (PASS I rule).
  period: 2022-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 28
        immigration_status: CITIZEN
        employment_income: 0
        weekly_hours_worked: 30  # activity test
      child:
        age: 3
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_HOME
        ak_ccap_care_schedule: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child]
        is_tanf_enrolled: true  # ATAP is Alaska's TANF; PASS I waives copay
        spm_unit_pre_subsidy_childcare_expenses: 9_600  # $800/mo for preschool home care
    households:
      household:
        members: [parent, child]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # is_tanf_enrolled=True -> copay waived to 0 per Manual §4040-3 D
    # Anchorage licensed_home FT_MONTH preschool = 700
    # Benefit = min(10_000, 700) - 0 = 700
    ak_ccap_copay: 0
    ak_ccap: 700

- name: Case 6, negative self-employment income does not inflate benefit.
  period: 2022-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        # A small AK fishing operation has a bad season — net loss of $30K.
        self_employment_income: -30_000
      child:
        age: 4
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_schedule: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # $1_000/mo, typical AK center cost
    households:
      household:
        members: [parent, child]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # Countable income clipped to 0 by max_() in countable_income;
    # copay rate at 0 SMI ratio = 0; copay = 0.
    # Benefit = min(1_000, 1_019) - 0 = 1_000 (charged rate caps benefit).
    ak_ccap: 1_000

- name: Case 7, special-needs child gets supplement when charged rate is high.
  period: 2022-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        employment_income: 24_000  # 2_000/mo
      child_sn:
        age: 4
        is_disabled: true
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_schedule: FT_MONTH
        ak_ccap_charged_rate: 3_500  # high enough to capture supplement
        ssi: 0  # focus test on SN supplement, not SSI deeming math
    spm_units:
      spm_unit:
        members: [parent, child_sn]
        spm_unit_pre_subsidy_childcare_expenses: 30_000  # $2_500/mo for SN center care
    households:
      household:
        members: [parent, child_sn]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # Family of 2 HHS SMI monthly (2022) = $5_897.30
    # Countable income = 2_000/mo (earnings; SSI explicitly 0)
    # Ratio = 2_000 / 5_897.30 = 0.339 -> 4% band; copay = 2_000 * 0.04 = 80
    # benefit_per_child = min(3_500, 1_019) + 1_019 = 2_038 (supplement outside cap, mult=2)
    # Expenses $2_500/mo > 2_038 (cap doesn't bind); Total = 2_038 - 80 = 1_958
    ak_ccap: 1_958

- name: Case 8, non-AK household returns zero (defined_for).
  period: 2022-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        employment_income: 24_000
      child:
        age: 4
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_schedule: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: WA
        county_str: KING_COUNTY_WA
  output:
    ak_ccap: 0

- name: Case 9, mixed-status siblings — only citizen child counts as eligible.
  period: 2022-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        employment_income: 24_000  # 2_000/mo
      child_citizen:
        age: 4
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_schedule: FT_MONTH
      child_undocumented:
        age: 3
        immigration_status: UNDOCUMENTED
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_schedule: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child_citizen, child_undocumented]
        spm_unit_pre_subsidy_childcare_expenses: 14_400  # $1_200/mo for one child in care
    households:
      household:
        members: [parent, child_citizen, child_undocumented]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # Only citizen child counts as eligible
    ak_ccap_child_eligible: [false, true, false]
    ak_ccap_eligible: true
    # Anchorage center FT_MONTH preschool = 1_019; family of 3 monthly SMI = 7_285
    # SMI ratio = 2_000 / 7_285 = 0.2745 -> 4% band (>= 0.26, < 0.35); copay = 80
    # Benefit = min(10_000, 1_019) - 80 = 939
    ak_ccap: 939
