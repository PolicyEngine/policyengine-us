# ak_ccap_max_provider_rate_per_child: regional coverage tests.
#
# One lookup per AK rate region not pinned in
# ak_ccap_max_provider_rate_per_child.yaml. All cases use the same
# easy combination — LICENSED_CENTER x FT_MONTH x PRESCHOOL (age 4) —
# so the expected value is read straight from
# parameters/gov/states/ak/dpa/ccap/rates/licensed_center.yaml.
#
# Source: Alaska CCAP Provider Rate Schedule (Rev Dec 1, 2021).

- name: Case 1, licensed center Aleutians West preschool FT month.
  period: 2022-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 4
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_schedule: FT_MONTH
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AK
        county_str: ALEUTIANS_WEST_CENSUS_AREA_AK
  output:
    ak_ccap_max_provider_rate_per_child: 886

