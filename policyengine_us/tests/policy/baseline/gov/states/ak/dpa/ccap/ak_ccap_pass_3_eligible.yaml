# ak_ccap_pass_3_eligible: SPMUnit, bool, MONTH
# PASS III (general low-income) requires:
#   has_eligible_child & income_eligible (85% SMI) & asset_eligible & activity_eligible

- name: Case 1, eligible single parent family.
  period: 2025-01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    ak_ccap_pass_3_eligible: true

- name: Case 2, family with no eligible child is ineligible.
  period: 2025-01
  input:
    people:
      parent:
        age: 35
        employment_income: 30_000
        immigration_status: CITIZEN
      teen:
        age: 14  # too old
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, teen]
    households:
      household:
        members: [parent, teen]
        state_code: AK
  output:
    ak_ccap_pass_3_eligible: false

- name: Case 3, family with income above 85% SMI is ineligible.
  period: 2025-01
  input:
    people:
      parent:
        age: 30
        employment_income: 200_000  # well above 85% SMI
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    ak_ccap_pass_3_eligible: false

- name: Case 4, family with no working parent is ineligible.
  period: 2025-01
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        weekly_hours_worked: 0
        is_full_time_student: false
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    # Activity test fails: parent has 0 hours and is not a student
    ak_ccap_pass_3_eligible: false

- name: Case 5, undocumented children but parent works -- ineligible.
  period: 2025-01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: UNDOCUMENTED
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    # No CCDF-immigration-eligible child
    ak_ccap_pass_3_eligible: false
