# was_atap_recipient: SPMUnit, bool, YEAR (input)
# Indicates whether the SPM unit was an Alaska ATAP (TANF) recipient.
# Used to gate PASS II transitional CCAP eligibility.

- name: Case 1, default value is false.
  period: 2025
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AK
  output:
    was_atap_recipient: false

- name: Case 2, explicitly true.
  period: 2025
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        was_atap_recipient: true
    households:
      household:
        members: [person1]
        state_code: AK
  output:
    was_atap_recipient: true

- name: Case 3, explicitly false.
  period: 2025
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        was_atap_recipient: false
    households:
      household:
        members: [person1]
        state_code: AK
  output:
    was_atap_recipient: false
