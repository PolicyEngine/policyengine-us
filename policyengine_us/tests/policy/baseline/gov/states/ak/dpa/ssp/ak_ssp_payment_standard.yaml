- name: Case 1, individual living independently.
  period: 2011
  input:
    state_code: AK
    ak_ssp_living_arrangement: INDEPENDENT
    ssi_claim_is_joint: false
    is_ssi_spousal_deeming_applies: false
  output:
    # $362/month * 12 = $4,344
    ak_ssp_payment_standard: 4_344

- name: Case 2, couple both eligible living independently.
  period: 2011
  input:
    state_code: AK
    ak_ssp_living_arrangement: INDEPENDENT
    ssi_claim_is_joint: true
  output:
    # $528/month is the couple total, so each person receives half.
    ak_ssp_payment_standard: 3_168

- name: Case 3, couple one eligible living independently.
  period: 2011
  input:
    people:
      person1:
        age: 50
        is_ssi_aged_blind_disabled: true
        ssi_claim_is_joint: false
        ak_ssp_living_arrangement: INDEPENDENT
      person2:
        age: 48
        ak_ssp_living_arrangement: INDEPENDENT
    households:
      household:
        members: [person1, person2]
        state_code: AK
    marital_units:
      marital_unit:
        members: [person1, person2]
  output:
    # $521/month * 12 = $6,252
    ak_ssp_payment_standard: [6_252, 4_344]

