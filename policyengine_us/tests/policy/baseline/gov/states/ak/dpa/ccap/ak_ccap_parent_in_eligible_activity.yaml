  output:
    ak_ccap_parent_in_eligible_activity: true

- name: Case 7, two-parent family fails when one parent is non-working (each parent rule).
  period: 2024-01
  input:
    people:
      parent1:
        age: 35
        employment_income: 24_000
        immigration_status: CITIZEN
      parent2:
        age: 33
        employment_income: 0
        self_employment_income: 0
        weekly_hours_worked: 0
        is_full_time_student: false
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [parent1, parent2, child]
    marital_units:
      marital_unit:
        members: [parent1, parent2]
    spm_units:
      spm_unit:
        members: [parent1, parent2, child]
    households:
      household:
        members: [parent1, parent2, child]
        state_code: AK
  output:
    ak_ccap_parent_in_eligible_activity: false

- name: Case 8, parent with zero hours but meets_ccdf_activity_test qualifies via federal fallback.
  period: 2024-01
  input:
    people:
      parent:
        age: 30
        employment_income: 0
        self_employment_income: 0
        weekly_hours_worked: 0
        is_full_time_student: false
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
        # Federal CCDF activity proxy (e.g., job search, training, SNAP E&T)
        meets_ccdf_activity_test: true
    households:
      household:
        members: [parent, child]
        state_code: AK
  output:
    ak_ccap_parent_in_eligible_activity: true

- name: Case 9, two parents, one working, one in federal CCDF activity fallback both qualify.
  period: 2024-01
  input:
    people:
      parent1:
        age: 35
        employment_income: 24_000
        immigration_status: CITIZEN
      parent2:
        age: 33
        employment_income: 0
        self_employment_income: 0
        weekly_hours_worked: 0
        is_full_time_student: false
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [parent1, parent2, child]
    marital_units:
      marital_unit:
        members: [parent1, parent2]
    spm_units:
      spm_unit:
        members: [parent1, parent2, child]
        meets_ccdf_activity_test: true  # SPMUnit-level federal fallback satisfies the activity test for the unit
    households:
      household:
        members: [parent1, parent2, child]
        state_code: AK
  output:
    ak_ccap_parent_in_eligible_activity: true
