        age: 25
        employment_income: 0
        self_employment_income: 0
        weekly_hours_worked: 0
        is_full_time_student: true
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
        meets_ccdf_activity_test: false
    households:
      household:
        members: [parent, child]
