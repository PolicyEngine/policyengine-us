  period: 2024-01
  input:
    people:
      parent:
        age: 35
        employment_income: 0
        self_employment_income: 18_000
        weekly_hours_worked: 0
        is_full_time_student: false
        immigration_status: CITIZEN
      child:
        age: 4
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
