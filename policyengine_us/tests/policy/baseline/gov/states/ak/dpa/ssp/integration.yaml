- name: Case 13, couple both eligible living independently.
  period: 2011
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 67
        is_ssi_aged_blind_disabled: true
        is_ssi_aged: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_claim_is_joint: true
      person2:
        age: 66
        is_ssi_aged_blind_disabled: true
        is_ssi_aged: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_claim_is_joint: true
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AK
  output:
    ak_ssp_eligible: [true, true]
    ak_ssp_claim_type: [COUPLE_BOTH_ELIGIBLE, COUPLE_BOTH_ELIGIBLE]
    # INDEPENDENT.COUPLE_BOTH_ELIGIBLE = $528/mo for the couple, so each
    # person's annual payment standard is half of that amount.
    ak_ssp_payment_standard: [3_168, 3_168]
    # Each person: supplement = max(0, 3_168 - 0) * 1 = 3_168
    # marital_unit.sum = 3_168 + 3_168 = 6_336
    # Each gets 6_336 / 2 = 3_168
    ak_ssp: [3_168, 3_168]

- name: Case 14, mixed-arrangement joint claim falls back to individual treatment.
  period: 2011
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 67
        is_ssi_aged_blind_disabled: true
        is_ssi_aged: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_claim_is_joint: true
        ak_resides_in_assisted_living_home: true
      person2:
        age: 66
        is_ssi_aged_blind_disabled: true
        is_ssi_aged: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_claim_is_joint: true
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AK
  output:
    ak_ssp_eligible: [true, true]
    # Joint SSI claim is no longer enough for a couple claim when spouses
    # have different Alaska arrangements.
    ak_ssp_claim_type: [INDIVIDUAL, INDIVIDUAL]
    # person1: ASSISTED_LIVING.INDIVIDUAL = $100/mo * 12 = $1,200/yr
    # person2: INDEPENDENT.INDIVIDUAL = $362/mo * 12 = $4,344/yr
    ak_ssp_payment_standard: [1_200, 4_344]
    # Mixed arrangements are paid individually rather than averaged together.
    ak_ssp: [1_200, 4_344]
