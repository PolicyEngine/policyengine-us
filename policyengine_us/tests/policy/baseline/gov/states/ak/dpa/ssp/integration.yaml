- name: Case 8, very large negative self-employment income does not inflate benefit.
  period: 2011
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 67
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        self_employment_income: -60_000_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AK
  output:
    ak_ssp_eligible: [true]
    ak_ssp_claim_type: [INDIVIDUAL]
    # Payment standard: INDEPENDENT.INDIVIDUAL = $362/mo * 12 = $4,344/yr
    ak_ssp_payment_standard: [4_344]
    # SSI countable income floors earned income at 0, so ssi_countable_income = 0
    # ssi_amount_if_eligible (individual) = $674/mo * 12 = $8,088/yr
    # uncapped_ssi = 8_088 - 0 = 8_088 (positive, no reduction)
    # ak_ssp = max(0, 4_344 - 0) * eligible(1) = $4,344/yr
    ak_ssp: [4_344]

- name: Case 9, couple one eligible with ineligible spouse in assisted living.
  period: 2011
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        is_tax_unit_head_or_spouse: true
        ssi_countable_income: 0
        is_ssi_spousal_deeming_applies: true
        ak_resides_in_assisted_living_home: true
      person2:
        age: 68
        is_ssi_aged_blind_disabled: false
        is_ssi_eligible: false
        meets_ssi_resource_test: true
        is_tax_unit_head_or_spouse: true
        ssi_countable_income: 0
        ak_resides_in_assisted_living_home: true
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AK
  output:
    # person1: ssi_eligible=true, age=70>=18 => eligible
    # person2: ssi_eligible=false => not eligible
    ak_ssp_eligible: [true, false]
    # person1: is_ssi_spousal_deeming_applies=true => COUPLE_ONE_ELIGIBLE
    # person2: not joint, no deeming => INDIVIDUAL
    ak_ssp_claim_type: [COUPLE_ONE_ELIGIBLE, INDIVIDUAL]
    # person1: ASSISTED_LIVING.COUPLE_ONE_ELIGIBLE = $100/mo * 12 = $1,200/yr
    # person2: ASSISTED_LIVING.INDIVIDUAL = $100/mo * 12 = $1,200/yr
    ak_ssp_payment_standard: [1_200, 1_200]
    # person1: uncapped_ssi positive (deeming uses couple rate) => no reduction
    # ak_ssp = max(0, 1_200 - 0) * eligible(1) = 1_200
    # person2: not eligible => 0
    ak_ssp: [1_200, 0]

- name: Case 10, income overspill exactly equals payment standard so supplement is zero.
  period: 2011
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 67
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        # ssi_amount_if_eligible (individual) = $674/mo * 12 = $8,088/yr
        # For supplement=0: need uncapped_ssi = -(payment_standard)
        # uncapped_ssi = 8_088 - countable_income => countable_income = 8_088 + 4_344 = 12_432
        ssi_countable_income: 12_432
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AK
  output:
    ak_ssp_eligible: [true]
    ak_ssp_claim_type: [INDIVIDUAL]
    # Payment standard: INDEPENDENT.INDIVIDUAL = $362/mo * 12 = $4,344/yr
    ak_ssp_payment_standard: [4_344]
    # ssi_amount_if_eligible = $674/mo * 12 = $8,088/yr
    # uncapped_ssi = 8_088 - 12_432 = -4_344
    # reduction = max(0, 4_344) = 4_344
    # supplement = max(0, 4_344 - 4_344) = 0
    ak_ssp: [0]

