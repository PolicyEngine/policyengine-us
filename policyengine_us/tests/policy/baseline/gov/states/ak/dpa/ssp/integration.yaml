- name: Case 1, single aged individual living independently with zero income.
  period: 2011
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 67
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 0
        ak_ssp_living_arrangement: INDEPENDENT
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AK
  output:
    # Eligibility: aged_blind_disabled=true, age=67>=18, resource_test=true
    ak_ssp_eligible: [true]
    # Claim type: not joint, no deeming => INDIVIDUAL
    ak_ssp_claim_type: [INDIVIDUAL]
    # Payment standard: INDEPENDENT.INDIVIDUAL = $362/mo * 12 = $4,344/yr
    ak_ssp_payment_standard: [4_344]
    # ssi_amount_if_eligible: individual = $674/mo * 12 = $8,088/yr
    # uncapped_ssi = 8_088 - 0 = 8_088 (positive, no reduction)
    # ak_ssp = max(0, 4_344 - 0) * eligible(1) = $4,344/yr
    ak_ssp: [4_344]
    ssi: [8_088]

- name: Case 2, single disabled individual in Medicaid facility with zero income.
  period: 2011
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 45
        is_ssi_aged_blind_disabled: true
        is_ssi_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 0
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AK
  output:
    ak_ssp_eligible: [true]
    ak_ssp_claim_type: [INDIVIDUAL]
    # Payment standard: MEDICAID_FACILITY.INDIVIDUAL = $45/mo * 12 = $540/yr
    ak_ssp_payment_standard: [540]
    # Federal SSI is limited to $30/month in a Medicaid facility.
    ssi: [360]
    ak_ssp: [540]

- name: Case 3, child under 18 not eligible for APA even if SSI eligible.
  period: 2011
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 16
        is_ssi_aged_blind_disabled: true
        is_ssi_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AK
  output:
    # age 16 < 18 => not eligible
    ak_ssp_eligible: [false]
    # Not joint => INDIVIDUAL claim type
    ak_ssp_claim_type: [INDIVIDUAL]
    # Payment standard still computed: $362/mo * 12 = $4,344/yr
    ak_ssp_payment_standard: [4_344]
    # Ineligible => benefit = supplement * eligible(0) = 0
    ak_ssp: [0]

- name: Case 4, individual in household of another with zero income.
  period: 2011
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_aged: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 0
        ssi_lives_in_another_persons_household: true
        ssi_receives_shelter_from_others_in_household: true
        ssi_others_pay_all_meals: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AK
  output:
    ak_ssp_eligible: [true]
    ak_ssp_claim_type: [INDIVIDUAL]
    # Payment standard: HOUSEHOLD_OF_ANOTHER.INDIVIDUAL = $368/mo * 12 = $4,416/yr
    ak_ssp_payment_standard: [4_416]
    # Federal SSI is reduced by one-third in the household-of-another arrangement.
    ssi: [5_392]
    ak_ssp: [4_416]

