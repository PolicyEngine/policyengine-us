- name: Case 6, individual with income overspill reducing supplement.
  period: 2011
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 67
        is_ssi_aged_blind_disabled: true
        is_ssi_aged: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 10_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AK
  output:
    ak_ssp_eligible: [true]
    ak_ssp_claim_type: [INDIVIDUAL]
    # Payment standard: INDEPENDENT.INDIVIDUAL = $362/mo * 12 = $4,344/yr
    ak_ssp_payment_standard: [4_344]
    # ssi_amount_if_eligible = $674/mo * 12 = $8,088/yr
    # uncapped_ssi = 8_088 - 10_000 = -1_912 (negative)
    # reduction = max(0, 1_912) = 1_912
    # supplement = max(0, 4_344 - 1_912) = 2_432
    # ak_ssp = 2_432 * eligible(1) = 2_432
    ak_ssp: [2_432]

