# Alaska CCAP integration tests (PASS II + PASS III).
#
# References:
#   - CCAP Policies and Procedures Manual, Sections 4070 / 4080
#     https://health.alaska.gov/media/igiccwuf/child-care-assistance-program-policies-and-procedures.pdf#page=173
#   - Family Income and Contribution Schedule (Rev Feb 21, 2022)
#     https://health.alaska.gov/media/okdlx2xm/alaska-fics.pdf
#   - Child Care Assistance Program Rate Schedule (Rev Dec 1, 2021)
#     https://health.alaska.gov/media/wsvhl3v3/ccap-rate-schedule.pdf
#
# AK FICS monthly 100% SMI by family size:
#   Family of 2: 7_285
#   Family of 3: 8_673
#   Family of 4: 10_060
#
# 85% SMI thresholds (monthly):
#   Family of 2: 7_285 * 0.85 = 6_192.25
#   Family of 3: 8_673 * 0.85 = 7_372.05
#   Family of 4: 10_060 * 0.85 = 8_551.00

- name: Case 1, single parent one preschooler Anchorage licensed center.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
        employment_income: 24_000  # 2_000/mo
      person2:
        age: 4
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 120_000  # /yr; high enough not to bind cap
    households:
      household:
        members: [person1, person2]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # === Eligibility ===
    ak_ccap_child_eligible: [false, true]
    ak_ccap_income_eligible: true
    ak_ccap_eligible: true
    ak_ccap_pass_category: PASS_III

    # === Countable income (MONTH; YEAR input/12) ===
    # 24_000 / 12 = 2_000
    ak_ccap_countable_income: 2_000

    # === Copay ===
    # Family of 2 monthly SMI = 7_285
    # SMI ratio = 2_000 / 7_285 = 0.2745 -> 4% band (>= 0.26, < 0.35)
    ak_ccap_copay_rate: 0.04
    # copay = 2_000 * 0.04 = 80
    ak_ccap_copay: 80

    # === Per-child rate ===
    # Anchorage licensed center FT_MONTH preschool = 1_019
    ak_ccap_max_provider_rate_per_child: [0, 1_019]

    # === Benefit ===
    # 1_019 - 80 = 939
    ak_ccap: 939

- name: Case 2, two parent family Fairbanks mixed care.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent1:
        age: 35
        immigration_status: CITIZEN
        employment_income: 36_000  # 3_000/mo
      parent2:
        age: 33
        immigration_status: CITIZEN
        weekly_hours_worked: 0
        is_full_time_student: true
      child1:
        age: 0
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
      child2:
        age: 8
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_HOME
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent1, parent2, child1, child2]
        spm_unit_pre_subsidy_childcare_expenses: 120_000  # /yr; high enough not to bind cap
    households:
      household:
        members: [parent1, parent2, child1, child2]
        state_code: AK
        county_str: FAIRBANKS_NORTH_STAR_BOROUGH_AK
  output:
    # === Eligibility ===
    ak_ccap_child_eligible: [false, false, true, true]
    ak_ccap_eligible: true

    # === Activity ===
    # parent1: works -> eligible; parent2: full-time student -> eligible
    # All parents qualify -> activity passes

    # === Copay ===
    # Family of 4 monthly SMI = 10_060
    # SMI ratio = 3_000 / 10_060 = 0.2982 -> 4% band (>= 0.26, < 0.35)
    ak_ccap_copay_rate: 0.04
    # copay = 3_000 * 0.04 = 120
    ak_ccap_copay: 120

    # === Per-child rates ===
    # Fairbanks licensed center FT_MONTH infant     = 1_342 (child1)
    # Fairbanks licensed home   FT_MONTH school age = 728   (child2)
    ak_ccap_max_provider_rate_per_child: [0, 0, 1_342, 728]

    # === Benefit ===
    # Total per-child = 1_342 + 728 = 2_070
    # Benefit = 2_070 - 120 = 1_950
    ak_ccap: 1_950

- name: Case 3, post-ATAP family within 12-month window is PASS II.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 28
        immigration_status: CITIZEN
        employment_income: 30_000  # 2_500/mo
      child:
        age: 6
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child]
        ak_was_atap_recipient: true
        ak_months_since_atap_exit: 6
        spm_unit_pre_subsidy_childcare_expenses: 120_000  # /yr; high enough not to bind cap
    households:
      household:
        members: [parent, child]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    ak_ccap_child_eligible: [false, true]
    ak_ccap_eligible: true
    ak_ccap_pass_category: PASS_II
    # SMI ratio = 2_500 / 7_285 = 0.3432 -> 4% band (>= 0.26, < 0.35)
    ak_ccap_copay_rate: 0.04
    ak_ccap_copay: 100
    # Anchorage center FT_MONTH school age = 884
    # Benefit = 884 - 100 = 784
    ak_ccap: 784

- name: Case 4, income just over 85% SMI is ineligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        employment_income: 86_847  # ~7_237.25/mo, well over 6_192.25 threshold
      child:
        age: 4
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # Family of 2: 85% SMI monthly threshold = 6_192.25
    # 7_237.25 > 6_192.25 -> ineligible
    ak_ccap_income_eligible: false
    ak_ccap_eligible: false
    ak_ccap: 0

- name: Case 5, special needs child gets supplement on top of standard child.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 35
        immigration_status: CITIZEN
        employment_income: 24_000  # 2_000/mo
      child_standard:
        age: 4
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
      child_sn:
        age: 8
        is_disabled: true
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
        # Provide a high charged rate so the SN supplement flows through.
        ak_ccap_charged_rate: 3_000
    spm_units:
      spm_unit:
        members: [parent, child_standard, child_sn]
        spm_unit_pre_subsidy_childcare_expenses: 120_000  # /yr; high enough not to bind cap
    households:
      household:
        members: [parent, child_standard, child_sn]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    ak_ccap_child_eligible: [false, true, true]
    ak_ccap_eligible: true

    # SN supplement applies only to disabled child
    # Anchorage center FT_MONTH preschool = 1_019; school age = 884
    # SN child base = 884; supplement = 1 * 884 = 884; max combined = 1_768
    ak_ccap_special_needs_supplement: [0, 0, 884]

    # benefit_per_child = min(charged, max_state_rate) + supplement
    #   standard child: min(1_019, 1_019) + 0 = 1_019
    #   SN child:       min(3_000, 884) + 884 = 884 + 884 = 1_768
    ak_ccap_benefit_per_child: [0, 1_019, 1_768]

    # Family of 3 monthly SMI = 8_673
    # Countable income ≈ 2_251 (earnings + SSI for disabled child, per §4080-3.1.b)
    # ratio ≈ 0.2596 -> 3% band (>= 0.18, < 0.26)
    ak_ccap_copay_rate: 0.03
    ak_ccap_copay: 67.53

    # Total per-child = 1_019 + 1_768 = 2_787; expense cap not binding (10_000/mo)
    # Total benefit = min(10_000, 2_787) - 67.53 = 2_787 - 67.53 ≈ 2_719.47
    ak_ccap: 2_719.47

- name: Case 6, Anchorage with Licensed Group Home falls back to 0 rate.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        immigration_status: CITIZEN
        employment_income: 24_000  # 2_000/mo
      child:
        age: 4
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_GROUP_HOME
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # Per Provider Rate Schedule p.1, Anchorage has no licensed group homes.
    # Family is still eligible (one CCAP-eligible child) but the rate is 0,
    # so the benefit cannot exceed -copay; clipped to 0.
    ak_ccap_child_eligible: [false, true]
    ak_ccap_eligible: true
    ak_ccap_max_provider_rate_per_child: [0, 0]
    ak_ccap: 0

- name: Case 7, 17-year-old in family does not count as eligible child.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 40
        immigration_status: CITIZEN
        employment_income: 36_000  # 3_000/mo
      teen:
        age: 17
        immigration_status: CITIZEN
      child:
        age: 8
        immigration_status: CITIZEN
        ak_ccap_provider_type: LICENSED_CENTER
        ak_ccap_care_unit: FT_MONTH
    spm_units:
      spm_unit:
        members: [parent, teen, child]
        spm_unit_pre_subsidy_childcare_expenses: 120_000  # /yr; high enough not to bind cap
    households:
      household:
        members: [parent, teen, child]
        state_code: AK
        county_str: ANCHORAGE_MUNICIPALITY_AK
  output:
    # 17yo counts toward family size for the SMI calculation but is not an
    # eligible child for benefit (age >= 13). Only the 8yo gets a benefit.
    ak_ccap_child_eligible: [false, false, true]
    ak_ccap_eligible: true

    # Family of 3 monthly SMI = 8_673
    # ratio = 3_000 / 8_673 = 0.3459 -> 4% band (>= 0.26, < 0.35)
    ak_ccap_copay_rate: 0.04
    ak_ccap_copay: 120

    # Anchorage center FT_MONTH school age = 884
    # Benefit = 884 - 120 = 764
    ak_ccap: 764
