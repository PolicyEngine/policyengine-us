# Tests for oh_ccap_base_rate (Person, MONTH, defined_for oh_ccap_eligible_child).
# 5180:6-1-10 Appendix A: maximum reimbursement ceilings keyed by county rate
# category, age group, provider type, and time category. Hourly cells are
# per-hour amounts applied to the child's authorized monthly hours; part-time
# and full-time cells are weekly amounts converted to monthly (x 52 / 12).
# Rates start 2025-11-02, so cases use period 2026. The parent (person1) is not
# an eligible child, so its base rate is 0.
- name: Case 1, category 1 center infant full-time.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 0.5  # infant
        immigration_status: CITIZEN
        oh_ccap_provider_type: CENTER
        childcare_hours_per_week: 40  # full-time
    households:
      household:
        members: [person1, person2]
        state_code: OH
        county_str: BROWN_COUNTY_OH  # category 1
  output:
    # 195/week * 52 / 12 = 845
    oh_ccap_base_rate: [0, 845]

