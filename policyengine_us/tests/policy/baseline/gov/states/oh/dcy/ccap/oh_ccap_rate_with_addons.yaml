# Tests for oh_ccap_rate_with_addons (Person, MONTH, defined_for oh_ccap_eligible_child).
# 5180:6-1-10: the maximum rate is increased by the higher of the Step Up To
# Quality bonus and the accredited bonus, plus non-traditional-hours (+5%) and
# special-needs (+5%, or 2x base with approved accommodations) add-ons, then
# capped at the provider's customary charge (pre_subsidy_childcare_expenses).
# All cases use a Category 2 center, preschool, full-time child:
#   base = 190/week * 52 / 12 = 823.333...; customary charge is set high so the
# cap does not bind except in the dedicated cap case. Rates start 2025-11-02, so
# cases use period 2026.
- name: Case 1, Gold quality adds 25 percent.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        immigration_status: CITIZEN
        oh_ccap_provider_type: CENTER
        oh_ccap_quality_tier: GOLD
        childcare_hours_per_week: 40
        pre_subsidy_childcare_expenses: 60_000  # 5,000/month, no cap
    households:
      household:
        members: [person1, person2]
        state_code: OH
        county_str: STARK_COUNTY_OH
  output:
    # 823.333 * 1.25 = 1,029.167
    oh_ccap_rate_with_addons: [0, 1_029.17]

