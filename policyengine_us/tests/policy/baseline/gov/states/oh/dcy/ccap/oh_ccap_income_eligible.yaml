# Tests for oh_ccap_income_eligible (SPMUnit, MONTH).
# DCY Procedure Letter 21: initial (intake) eligibility caps income at 145% FPG;
# a special-needs child raises the initial limit to 150% FPG; once enrolled, a
# family remains eligible until income exceeds 300% FPG. Ohio Works First (TANF)
# enrollment is a categorical income bypass.
#
# Family of 3 (CONTIGUOUS_US, 2026): annual 100% FPG = 27,320; monthly = 2,276.67.
#   145% monthly limit = 3,301.17; 150% = 3,415.00; 300% = 6,830.00.
# Income parameters start 2025-10-01, so cases use 2026.
- name: Case 1, income below 145% FPG is income-eligible at intake.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3,000/month, below 3,301.17
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: true

- name: Case 2, income above 145% FPG fails intake when not enrolled.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 42_000  # 3,500/month, above 3,301.17 and below 3,415
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: false

- name: Case 3, special-needs child raises the intake limit to 150% FPG.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 40_800  # 3,400/month, between 145% (3,301.17) and 150% (3,415)
      person2:
        age: 28
      person3:
        age: 3
        has_developmental_delay: true
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: true

- name: Case 4, enrolled family stays eligible up to 300% FPG.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 42_000  # 3,500/month, above 145% but below 300%
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        oh_ccap_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: true

- name: Case 5, enrolled family above 300% FPG loses eligibility.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 84_000  # 7,000/month, above 6,830
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        oh_ccap_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: false

- name: Case 6, TANF enrollment is a categorical income bypass.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 84_000  # 7,000/month, far above 300%
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: true

# Edge cases.
# 145% intake boundary (size 3): monthly limit = 145% * 2,276.67 = 3,301.17,
# i.e. annual 39,614. Income is offset from the exact boundary to avoid
# float32 drift flipping the comparison at the rounded boundary.
- name: Case 7, income just below the 145% intake limit is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 39_600  # 3,300/month, just below 3,301.17
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: true

- name: Case 8, income just above the 145% intake limit fails at intake.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 39_700  # 3,308.33/month, just above 3,301.17
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: false

