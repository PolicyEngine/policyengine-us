- name: Case 1, senior homeowner under the income limit is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
        oh_modified_agi: 41_000
    households:
      household:
        members: [person1]
        state_code: OH
  output:
    oh_homestead_exemption_eligible: true

- name: Case 2, disabled homeowner under age 65 is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
        oh_modified_agi: 30_000
    households:
      household:
        members: [person1]
        state_code: OH
  output:
    oh_homestead_exemption_eligible: true

- name: Case 3, senior homeowner above the income limit is ineligible.
  period: 2026
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
        oh_modified_agi: 41_001
    households:
      household:
        members: [person1]
        state_code: OH
  output:
    oh_homestead_exemption_eligible: false

- name: Case 4, non-senior homeowner without disability is ineligible.
  period: 2026
  input:
    people:
      person1:
        age: 64
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
        oh_modified_agi: 30_000
    households:
      household:
        members: [person1]
        state_code: OH
  output:
    oh_homestead_exemption_eligible: false

- name: Case 5, surviving spouse at the surviving spouse age threshold is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 59
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SURVIVING_SPOUSE
        oh_modified_agi: 30_000
    households:
      household:
        members: [person1]
        state_code: OH
  output:
    oh_homestead_exemption_eligible: true
