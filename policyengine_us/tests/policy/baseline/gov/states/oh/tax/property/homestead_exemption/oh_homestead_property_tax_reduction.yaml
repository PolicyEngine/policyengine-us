      person1:
        age: 64
        assessed_property_value: 200_000
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
        oh_homestead_exemption_total_income: 30_000
    households:
      household:
        members: [person1]
        state_code: OH
  output:
    oh_homestead_property_tax_reduction: 0

- name: Case 4, reduction excludes non-joint adult property tax.
  absolute_error_margin: 0.01
  period: 2026
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 8_000
        real_estate_taxes: 400
      person2:
        age: 40
        assessed_property_value: 200_000
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SINGLE
        oh_homestead_exemption_total_income: 30_000
    households:
      household:
        members: [person1, person2]
        state_code: OH
  output:
    oh_homestead_property_tax_reduction: 400

