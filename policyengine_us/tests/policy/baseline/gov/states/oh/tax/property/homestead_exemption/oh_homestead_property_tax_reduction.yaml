- name: Case 1, reduction equals the property tax on the exempt share of value.
  absolute_error_margin: 0.01
  period: 2026
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 200_000
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
        oh_homestead_exemption_total_income: 30_000
    households:
      household:
        members: [person1]
        state_code: OH
  output:
    oh_homestead_property_tax_reduction: 103.95

- name: Case 2, reduction cannot exceed property taxes.
  absolute_error_margin: 0.01
  period: 2026
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 8_000
        real_estate_taxes: 400
    tax_units:
      tax_unit:
        members: [person1]
        oh_homestead_exemption_total_income: 30_000
    households:
      household:
        members: [person1]
        state_code: OH
  output:
    oh_homestead_property_tax_reduction: 400

- name: Case 3, ineligible filer gets no reduction.
  absolute_error_margin: 0.01
  period: 2026
  input:
