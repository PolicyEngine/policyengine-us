# Tests for Florida TCA maximum benefit standard (CBPP convention)
# Returns the high-shelter tier for cross-state comparison

- name: Family of 2 - returns high-shelter tier (matches CBPP $303)
  period: 2024-01
  absolute_error_margin: 1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        own_children_in_household: 1
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    # Family of 2, high-shelter tier (>$50/month shelter)
    fl_tca_max_benefit_standard: 303

- name: Family of 3 - returns high-shelter tier
  period: 2024-01
  absolute_error_margin: 1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        own_children_in_household: 2
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    # Family of 3, high-shelter tier
    fl_tca_max_benefit_standard: 364

- name: Single person - returns high-shelter tier
  period: 2024-01
  absolute_error_margin: 1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        own_children_in_household: 1
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    # Single person, high-shelter tier
    fl_tca_max_benefit_standard: 180
