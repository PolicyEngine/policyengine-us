        ssi_countable_income: 7_200
      person2:
        fl_oss_community_care_type: MHRTF
        fl_oss_program_track: PROTECTED
        age: 42
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        uncapped_ssi: 2_000
        ssi_countable_income: 7_200
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    # Protected track not in effect before Jan 2023.
    fl_oss_eligible: [false, false]
    fl_oss: [0, 0]

# ──────────────────────────────────────────────────────────────
# Protected track post Jul 2024 → nonzero max OSS
# ──────────────────────────────────────────────────────────────

- name: Case 14, Protected individual after Jul 2024, full benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        fl_oss_community_care_type: MHRTF
        fl_oss_program_track: PROTECTED
        age: 45
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        uncapped_ssi: 11_604
        ssi_countable_income: 0
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    fl_oss_eligible: [true]
    # Provider rate = $967 + $185 = $1,152/month.
    fl_oss_provider_rate: [1_152]
    # Max OSS (Protected, I) = $345/month.
    fl_oss_max_oss: [345]
    # Total needs = $1,152 + $160 = $1,312. Income = $0.
    # OSS = min($1,312, $345) = $345.
    fl_oss: [345]

# ──────────────────────────────────────────────────────────────
# Protected track income standard boundary
# Protected income standard = provider rate = $1,152/month = $13,824/year.
# ──────────────────────────────────────────────────────────────

- name: Case 15, Protected income exactly at income standard, Group 2 eligible.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        fl_oss_community_care_type: MHRTF
        fl_oss_program_track: PROTECTED
        age: 45
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        uncapped_ssi: -200
        # $1,152/month * 12 = $13,824/year.
        # countable_income ($1,152) <= income_standard ($1,152) → Group 2 eligible.
        ssi_countable_income: 13_824
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    fl_oss_eligible: [true]
    fl_oss_income_standard: [1_152]
    # Total needs = $1,312. Income = $1,152.
    # OSS = min(max(0, $1,312 - $1,152), $345) = min($160, $345) = $160.
    fl_oss: [160]

- name: Case 16, Protected income one cent above income standard, ineligible.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        fl_oss_community_care_type: MHRTF
        fl_oss_program_track: PROTECTED
        age: 45
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        uncapped_ssi: -210
        # ($1,152 + $0.01)/month * 12 = $13,824.12/year.
        # countable_income ($1,152.01) > income_standard ($1,152) → Group 2 fails.
        # Also uncapped_ssi < 0 → not Group 1. Ineligible.
        ssi_countable_income: 13_824.12
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    fl_oss_eligible: [false]
    fl_oss: [0]

