        ssi_countable_income: 9_600
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    fl_oss_eligible: [false]
    fl_oss: [0]

# ──────────────────────────────────────────────────────────────
# Protected track in effect Jan 2023 through Jun 2024 (pre-Jul-2024 rates)
# 2024-06 Appendix A-12: provider rate $1,128(I), max OSS $239(I), PNA $54.
# ──────────────────────────────────────────────────────────────

- name: Case 28, Protected individual Jan 2024, pre-Jul-2024 rates apply.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        fl_oss_community_care_type: MHRTF
        fl_oss_program_track: PROTECTED
        age: 45
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        uncapped_ssi: 1_200
        ssi_countable_income: 0
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    # Protected in effect from Jan 2023 (per 2024-06 Appendix A-12).
    fl_oss_eligible: [true]
    # Provider rate = FBR 2024 $943 + $185 offset = $1,128.
    fl_oss_provider_rate: [1_128]
    # Max OSS (Protected, I) Jan 2024 = $239.
    fl_oss_max_oss: [239]
    # Total needs = $1,128 + $54 PNA = $1,182. Income = $0.
    # OSS = min(max($1,182, 0), $239) = $239.
    fl_oss: [239]
