    fl_oss: [345, 345]

# ──────────────────────────────────────────────────────────────
# Couple: income at total_needs - max_oss boundary (Redesign)
# Per person: total_needs = $1,102.90, max_oss = $193.40.
# Boundary income = $1,102.90 - $193.40 = $909.50/month per person.
# Annual per person = $909.50 * 12 = $10,914.
# ──────────────────────────────────────────────────────────────

- name: Case 20, couple income at total needs minus max OSS, benefit exactly equals max.
  period: 2025-01
