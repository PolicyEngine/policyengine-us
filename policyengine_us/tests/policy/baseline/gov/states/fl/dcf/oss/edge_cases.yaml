# ──────────────────────────────────────────────────────────────
# Partial benefit: income between (total_needs - max_oss) and total_needs
# Redesign I: total_needs = $1,151.40, max_oss = $184.40.
# Transition at $967/month. Test $1,050/month → partial benefit.
# ──────────────────────────────────────────────────────────────

- name: Case 23, partial benefit between threshold and total needs.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        fl_oss_community_care_type: ALF
        fl_oss_program_track: REDESIGN
        age: 70
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        uncapped_ssi: 12
        # $1,050/month * 12 = $12,600/year.
        # Income standard = $1,045.40, but Group 1 (SSI recipient) so still eligible.
        ssi_countable_income: 12_600
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    fl_oss_eligible: [true]
    # Total needs = $1,151.40. Income = $1,050.
    # OSS = min(max(0, $1,151.40 - $1,050), $184.40) = min($101.40, $184.40) = $101.40.
    fl_oss: [101.40]

# ──────────────────────────────────────────────────────────────
# Group 1 SSI recipient with income above Group 2 income standard
# SSI recipients (Group 1) can still receive OSS even if income > income standard,
# because the eligibility formula is: receives_ssi | income_within_standard.
# ──────────────────────────────────────────────────────────────

- name: Case 24, SSI recipient with income above income standard but below total needs.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        fl_oss_community_care_type: ALF
        fl_oss_program_track: REDESIGN
        age: 70
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        # Income = $1,050/month > income standard $1,045.40 (would fail Group 2).
        # But uncapped_ssi > 0 → SSI recipient → Group 1 eligible.
        uncapped_ssi: 12
        ssi_countable_income: 12_600
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    fl_oss_eligible: [true]
    # Income ($1,050) > income standard ($1,045.40) but Group 1 applies.
    fl_oss_income_standard: [1_045.40]
    # Total needs = $1,151.40. OSS = min(max(0, $1,151.40 - $1,050), $184.40)
    # = min($101.40, $184.40) = $101.40.
    fl_oss: [101.40]

# ──────────────────────────────────────────────────────────────
# Not SSI eligible (fails categorically_eligible)
# ──────────────────────────────────────────────────────────────

- name: Case 25, not SSI eligible even with low income, ineligible.
  period: 2025-01
  input:
    people:
      person1:
        fl_oss_community_care_type: ALF
        fl_oss_program_track: REDESIGN
        age: 40
        # Not aged/blind/disabled → is_ssi_eligible = false.
        is_ssi_eligible: false
        ssi_claim_is_joint: false
        uncapped_ssi: 0
        ssi_countable_income: 0
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    fl_oss_eligible: [false]
    fl_oss: [0]

# ──────────────────────────────────────────────────────────────
# Facility type set but track is NONE → has_track fails
# ──────────────────────────────────────────────────────────────

- name: Case 26, facility type set but program track NONE, ineligible.
  period: 2025-01
  input:
    people:
      person1:
        fl_oss_community_care_type: ALF
        fl_oss_program_track: NONE
        age: 70
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        uncapped_ssi: 2_004
        ssi_countable_income: 9_600
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    fl_oss_eligible: [false]
    fl_oss: [0]

# ──────────────────────────────────────────────────────────────
# Track set but facility type NONE → in_facility fails
# ──────────────────────────────────────────────────────────────

- name: Case 27, program track set but facility type NONE, ineligible.
  period: 2025-01
  input:
    people:
      person1:
        fl_oss_community_care_type: NONE
        fl_oss_program_track: REDESIGN
        age: 70
        is_ssi_eligible: true
