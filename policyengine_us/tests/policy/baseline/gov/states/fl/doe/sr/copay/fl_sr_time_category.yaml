# Florida School Readiness authorized-care time category.
# fl_sr_time_category reads childcare_hours_per_day (YEAR) via period.this_year
# and compares to the full-time daily-hours threshold. Per Fla. Stat. 1002.81(9)
# full-time care is "at least 6 hours ... within a 24-hour period"; 1002.81(11)
# makes less than 6 hours part-time. The default is PART_TIME.

- name: Case 1, 8 hours per day is full time.
  period: 2026-01
  input:
    people:
      person1:
        childcare_hours_per_day: 8
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    fl_sr_time_category: FULL_TIME

- name: Case 2, exactly 6 hours per day is full time.
  period: 2026-01
  input:
    people:
      person1:
        childcare_hours_per_day: 6  # "at least 6 hours" -> full time
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    fl_sr_time_category: FULL_TIME

- name: Case 3, 5 hours per day is part time.
  period: 2026-01
  input:
    people:
      person1:
        childcare_hours_per_day: 5  # < 6 hours -> part time
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    fl_sr_time_category: PART_TIME

- name: Case 4, zero hours per day is part time.
  period: 2026-01
  input:
    people:
      person1:
        childcare_hours_per_day: 0
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    fl_sr_time_category: PART_TIME

# The classification is daily, not weekly: 6 hours/day over only 4 days is
# 24 hours/week, which the old 30-hr/week proxy called part-time, but
# 1002.81(9) makes it full-time (>= 6 hours within a 24-hour period).
- name: Case 5, 6 hours per day over 4 days per week is full time.
  period: 2026-01
  input:
    people:
      person1:
        childcare_hours_per_day: 6
        childcare_days_per_week: 4  # 6 x 4 = 24 hours/week, but full-time per day
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    fl_sr_time_category: FULL_TIME
