# Florida School Readiness benefit:
#   fl_sr = max(min(monthly childcare expense, monthly cap) - copay, 0)
# The monthly expense is spm_unit_pre_subsidy_childcare_expenses (YEAR)
# auto-divided to a monthly value; the copay is fl_sr_copay. The monthly cap is
# the statewide provider reimbursement rate (6M-4.500; SPB 2502 FY2025-26):
# each eligible child's fl_sr_max_daily_rate x childcare_attending_days_per_month,
# summed across the unit. A zero cap (e.g. an unset/non-FL county_str with no
# published rate) is treated as no cap, so the benefit falls back to expenses.
# fl_sr is defined_for is_fl_sr_eligible, so each case is a fully eligible Florida
# family; these cases exercise the formula's own arithmetic (the cap, the copay,
# and the zero floor), not the eligibility gate (integration.yaml covers that).
#
# Family of 3, FFY2026: monthly SMI = 7_214.41 (55% marker = 3_967.93).
# All cases are Miami-Dade; the child is age 4 (PRESCHOOL_4), Licensed/Exempt,
# so the daily rate is 28.00 full time.

- name: Case 1, expense below the rate cap yields expense minus copay.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3_000 / month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time -> 28.00 daily rate
        childcare_attending_days_per_month: 45  # cap = 28 * 45 = 1_260 > 1_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    # cap = 28.00 * 45 = 1_260 > 1_000 expense, so the cap does NOT bind
    # copay = 3_000 * 0.04 = 120 (ratio 0.4158 <= 0.55, full time)
    fl_sr_copay: 120
    # benefit = max(min(1_000, 1_260) - 120, 0) = max(1_000 - 120, 0) = 880
    fl_sr: 880

- name: Case 2, the rate cap binds when daily rate times days is below the expense.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3_000 / month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time -> 28.00 daily rate
        childcare_attending_days_per_month: 20  # cap = 28 * 20 = 560 < 1_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    # cap = 28.00 * 20 = 560 < 1_000 expense, so the cap BINDS
    fl_sr_copay: 120  # 3_000 * 0.04
    # benefit = max(min(1_000, 560) - 120, 0) = max(560 - 120, 0) = 440
    fl_sr: 440

- name: Case 3, copay above the capped expense floors the benefit at zero.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000  # 5_000 / month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
        childcare_attending_days_per_month: 20  # cap = 28 * 20 = 560
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: true  # 5_000/mo <= 85% SMI exit limit -> still eligible
        spm_unit_pre_subsidy_childcare_expenses: 1_200  # 100 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    # copay = 5_000 * 0.06 = 300 (ratio 0.6931 > 0.55, full time)
    fl_sr_copay: 300
    # capped expense = min(100, 560) = 100; benefit = max(100 - 300, 0) = 0
    fl_sr: 0

- name: Case 4, zero childcare expense yields a zero benefit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        childcare_attending_days_per_month: 20
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 0  # no expense
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    # capped expense = min(0, 560) = 0; benefit = max(0 - 120, 0) = 0
    fl_sr: 0
