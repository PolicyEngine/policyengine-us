      person2:
        age: 28
      person3:
        age: 4
        is_enrolled_in_head_start: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    fl_sr_copay_waived: true

