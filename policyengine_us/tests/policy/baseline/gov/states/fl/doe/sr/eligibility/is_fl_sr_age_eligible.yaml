# Florida School Readiness child age eligibility: age < 13 (child_age_limit).

- name: Case 1, age 4 is age eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 4
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    is_fl_sr_age_eligible: true

- name: Case 2, age 12 is age eligible (below 13).
  period: 2026-01
  input:
    people:
      person1:
        age: 12
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    is_fl_sr_age_eligible: true

- name: Case 3, age 13 is not age eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 13
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    is_fl_sr_age_eligible: false

- name: Case 4, adult is not age eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
    households:
      household:
        members: [person1]
        state_code: FL
  output:
    is_fl_sr_age_eligible: false
