# Florida School Readiness activity eligibility (Fla. Stat. 1002.81(14)).
# Parents are tax-unit heads or spouses. A disabled parent is exempt from the
# activity requirement. A single non-exempt parent must work >= 20 hr/wk; two
# non-exempt parents must work >= 40 hr/wk combined. If every parent is exempt,
# the activity test is met. weekly_hours_worked_before_lsr is set explicitly
# because it defaults to 40.

- name: Case 1, single parent working 20 hours meets the requirement.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 20
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    is_fl_sr_activity_eligible: true

- name: Case 2, single parent working 15 hours fails the requirement.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 15
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    is_fl_sr_activity_eligible: false

- name: Case 3, two parents working 40 hours combined meet the requirement.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 32
        weekly_hours_worked_before_lsr: 20
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 20
      person3:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    is_fl_sr_activity_eligible: true

- name: Case 4, two parents with 35 combined hours fail the requirement.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 32
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 5
      person3:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    is_fl_sr_activity_eligible: false

- name: Case 5, asymmetric two parents with 45 combined hours meet the requirement.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 32
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 15
      person3:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    is_fl_sr_activity_eligible: true

- name: Case 6, disabled single parent is exempt and meets the requirement.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_disabled: true
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    is_fl_sr_activity_eligible: true

- name: Case 7, one disabled parent leaves a single non-exempt parent who must work 20 hours.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 32
        is_disabled: true
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 15  # only non-exempt parent, < 20 single threshold
      person3:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    is_fl_sr_activity_eligible: false

# Fallback: Fla. Stat. 1002.81(14) counts "eligible work OR education
# activities" toward the 20/40 hours, which PolicyEngine cannot derive from
# employment hours alone. meets_ccdf_activity_test (default false) lets a
# family qualify through education/training/transition/grace activities.

- name: Case 10, single parent under 20 work hours qualifies via meets_ccdf_activity_test (education/training).
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 10  # below the 20-hour work threshold
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: true
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    is_fl_sr_activity_eligible: true

# Edge cases: activity-hour boundaries (single-parent 20 hr/wk; two-parent 40
# combined hr/wk). The just-at cases (20, 40) and disabled-exempt 0-hour case
# are covered above; these add the just-below boundary (19; 39 combined).

- name: Case 8, single parent working 19 hours just misses the requirement.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 19  # just below the 20-hour single threshold
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    is_fl_sr_activity_eligible: false

- name: Case 9, two parents with 39 combined hours just miss the requirement.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 32
        weekly_hours_worked_before_lsr: 20
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 19  # 20 + 19 = 39 < 40 combined threshold
      person3:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    is_fl_sr_activity_eligible: false
