# Florida School Readiness activity eligibility (Fla. Stat. 1002.81(14)).
# Parents are tax-unit heads or spouses. A single parent must work >= 20 hr/wk;
# two non-exempt parents must work >= 40 hr/wk combined; a two-parent family with
# one age/disability-exempt parent qualifies if the other parent works >= 20
# hr/wk. Other documented activity paths use meets_ccdf_activity_test.
# weekly_hours_worked_before_lsr is set explicitly because it defaults to 40.

- name: Case 1, single parent working 20 hours meets the requirement.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 20
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    is_fl_sr_activity_eligible: true

- name: Case 2, single parent working 15 hours fails the requirement.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 15
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    is_fl_sr_activity_eligible: false

