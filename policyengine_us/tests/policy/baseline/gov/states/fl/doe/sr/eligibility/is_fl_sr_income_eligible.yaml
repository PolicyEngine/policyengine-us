- name: Case 11, single-person unit just below the size-1 entry limit.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 29_472  # 2_456.00 / month, just below size-1 55% (2_456.33)
    spm_units:
      spm_unit:
        members: [person1]
