        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        fl_sr_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    is_fl_sr_income_eligible: false

- name: Case 8, enrolled family just below the 85% SMI exit limit is income eligible.
