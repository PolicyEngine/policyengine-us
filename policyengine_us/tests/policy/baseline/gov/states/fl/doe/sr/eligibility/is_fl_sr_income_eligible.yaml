- name: Case 12, large eight-person family just below the size-8 entry limit.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 40
        employment_income: 78_216  # 6_518.00 / month, just below size-8 55% (6_518.73)
      person2:
        age: 38
      person3:
        age: 12
      person4:
        age: 10
      person5:
        age: 8
      person6:
        age: 6
      person7:
        age: 4
      person8:
        age: 2
    spm_units:
      spm_unit:
        members:
          [
            person1,
            person2,
            person3,
            person4,
            person5,
            person6,
            person7,
            person8,
          ]
        fl_sr_enrolled: false
    households:
      household:
        members:
          [
            person1,
            person2,
            person3,
            person4,
            person5,
            person6,
            person7,
            person8,
          ]
        state_code: FL
  output:
    is_fl_sr_income_eligible: true
