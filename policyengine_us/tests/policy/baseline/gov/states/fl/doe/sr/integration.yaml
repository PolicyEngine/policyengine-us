  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # 2_000 / month, income eligible
        weekly_hours_worked_before_lsr: 10  # < 20 single-parent threshold
      person2:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        childcare_attending_days_per_month: 20
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    is_fl_sr_income_eligible: true  # income passes, but activity fails
    is_fl_sr_activity_eligible: false
    is_fl_sr_eligible: false
    fl_sr: 0

