- name: Case 8, annual benefit flows through to the federal child care subsidy total.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3_000 / month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
        childcare_attending_days_per_month: 45  # cap = 28 * 45 = 1_260 > 1_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    # Same family as Case 1 (cap does not bind): monthly benefit 880 over 12 months.
    # fl_child_care_subsidies (YEAR) = 880 * 12 = 10_560
    fl_child_care_subsidies: 10_560
    # The state aggregator feeds the federal child_care_subsidies total.
    child_care_subsidies: 10_560

# Edge cases.

- name: Case 9, before the 2025-10-01 effective date the program pays nothing.
  # 2025-01 predates the in_effect flag (false until 2025-10-01), so the
  # otherwise-fully-eligible Case 1 family is ineligible and gets $0 this month.
  # Asserted at the MONTH level only: the YEAR aggregator
  # (fl_child_care_subsidies) spans the 2025-10-01 on-switch, so it is non-zero
  # for the 2025 year and is not asserted here.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3_000 / month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
        childcare_attending_days_per_month: 45
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    is_fl_sr_eligible: false
    fl_sr: 0

- name: Case 10, zero income gives a zero copay and the full (uncapped) expense as benefit.
  # Lowest bracket is 4% full time, but 0 income x 4% = 0 copay. The daily rate
  # cap is high enough (28 * 45 = 1_260 > 1_000) not to bind, so the family
  # receives the entire monthly childcare expense as the subsidy.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
        childcare_attending_days_per_month: 45  # cap = 28 * 45 = 1_260 > 1_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    fl_sr_countable_income: 0
    fl_sr_copay: 0
    is_fl_sr_eligible: true
    # benefit = max(min(1_000, 1_260) - 0, 0) = 1_000 / month (full expense)
    fl_sr: 1_000

- name: Case 11, income above the 85% SMI ceiling makes the family ineligible.
  # Family of 3, monthly SMI 7_214.41; 85% exit limit = 6_132.25. Enrolled so the
  # exit (not entry) limit applies; income above it ends eligibility and the
  # benefit drops to $0.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 84_000  # 7_000 / month > 6_132.25 exit limit
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
        childcare_attending_days_per_month: 45
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    is_fl_sr_income_eligible: false
    is_fl_sr_eligible: false
    fl_sr: 0

- name: Case 12, an ineligible older child is excluded from the rate cap.
  # Two children: person3 is 12 (eligible) and person4 is 13 (ineligible). The
  # unit still has an eligible child, so the family qualifies; only the eligible
  # child contributes to the rate cap and the full-time copay determination.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 36_000  # 3_000 / month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 33
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 12
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time -> 22.14 daily rate, eligible child
        childcare_attending_days_per_month: 20
      person4:
        age: 13
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time, but age-ineligible (excluded from cap)
        childcare_attending_days_per_month: 20
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    is_fl_sr_child_eligible: [false, false, true, false]
    is_fl_sr_eligible: true
    # size 4 monthly SMI = 8_588.58; ratio = 3_000 / 8_588.58 = 0.3493 <= 0.55
    # -> 4% full time; copay = 3_000 * 0.04 = 120
    fl_sr_copay: 120
    # cap counts only the eligible child (person3): 22.14 * 20 = 442.80
    # (person4's days do NOT count). 442.80 < 1_000 -> cap BINDS
    # benefit = max(min(1_000, 442.80) - 120, 0) = max(442.80 - 120, 0) = 322.80
    fl_sr: 322.80

- name: Case 13, a self-employment loss floors the copay at zero and the cap still binds.
  # person1 has a -10_000/month business loss, so gross countable income is
  # 3_000 - 10_000 = -7_000/month (well under the 55% SMI entry limit, so the
  # family is still income eligible). The copay is income * rate, so a negative
  # income would yield a negative copay and, via max(expense - copay, 0), a
  # benefit ABOVE the actual expense. Income is floored at 0 in the copay:
  #   copay = max(countable_income, 0) * rate = max(-7_000, 0) * 0.04 = 0
  # so a negative copay never inflates the benefit. The rate cap (28 * 20 = 560)
  # is below the 1_000 expense, so the capped expense (560) is the payable base.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3_000 / month
        self_employment_income: -120_000  # -10_000 / month business loss
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time -> 28.00 daily rate
        childcare_attending_days_per_month: 20  # cap = 28 * 20 = 560 < 1_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    # gross countable income = 3_000 - 10_000 = -7_000 / month
    fl_sr_countable_income: -7_000
    # -7_000 <= 55% SMI entry limit (3_967.93) -> income eligible
    is_fl_sr_income_eligible: true
    is_fl_sr_eligible: true
    # income floored at 0 -> copay = max(-7_000, 0) * 0.04 = 0 (NOT a negative copay)
    fl_sr_copay: 0
    # cap = 28 * 20 = 560 < 1_000 -> capped expense = 560
    # benefit = max(min(1_000, 560) - 0, 0) = 560 (the cap, NOT 1_280 from a negative copay)
    fl_sr: 560

- name: Case 14, otherwise-eligible family in a non-Florida county gets $0 (no published rate).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3_000 / month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        childcare_attending_days_per_month: 22
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
        county_str: ORANGE_COUNTY_CA  # not a Florida county -> no published rate
  output:
    # Eligibility does not depend on county, so the unit is still eligible...
    is_fl_sr_eligible: true
    # ...but ORANGE_COUNTY_CA has no published FL rate -> rate 0 -> cap 0 ->
    # min(1_000, 0) = 0 -> benefit 0 (NOT a fall-back to expenses).
    fl_sr_max_daily_rate: 0
    fl_sr: 0
    fl_child_care_subsidies: 0
    child_care_subsidies: 0
