# Florida School Readiness (SR) integration tests.
# Pipeline: countable income (gross, monthly) and FFY2026 monthly SMI ->
# SMI ratio -> bracket rate (FT 4%/6%, PT 2%/3%) -> copay; in parallel the
# provider rate cap = sum over eligible children of
#   fl_sr_max_daily_rate * childcare_attending_days_per_month
# (6M-4.500; SPB 2502 FY2025-26). The benefit is
#   fl_sr = max(min(monthly childcare expense, monthly cap) - copay, 0)
# A county with no published FL rate (an unknown / non-Florida county) gives a
# zero cap and therefore a $0 benefit even when otherwise eligible (Case 14).
# The MONTH benefit aggregates to the YEAR fl_child_care_subsidies (sum of 12
# months) and flows into the federal child_care_subsidies total.
#
# All Florida cases are Miami-Dade, Licensed/Exempt providers. FY2025-26 daily
# rates used below (Licensed/Exempt): Preschool 4 FT = 28.00, School Age FT =
# 22.14, Preschool 4 PT = 26.25.
#
# FFY2026 SMI (instant 2025-10-01) by family size:
#   size 3: annual 86_572.92 -> monthly 7_214.41 (55% = 3_967.93, 85% = 6_132.25)
#   size 4: annual 103_063.00 -> monthly 8_588.58 (55% = 4_723.72, 85% = 7_300.30)

- name: Case 1, low-income full-time family below the rate cap (cap does not bind).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3_000 / month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time -> 28.00 daily rate
        childcare_attending_days_per_month: 45  # cap = 28 * 45 = 1_260 > 1_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    # SMI ratio = 3_000 / 7_214.41 = 0.4158 <= 0.55 -> 4% full time
    fl_sr_copay: 120  # 3_000 * 0.04
    is_fl_sr_eligible: true
    # cap = 28.00 * 45 = 1_260 > 1_000 expense -> cap does not bind
    # benefit = max(min(1_000, 1_260) - 120, 0) = 880 / month
    fl_sr: 880
    # YEAR aggregators evaluated at a MONTH period return the month's slice
    # (Case 8 asserts the full annual aggregate and federal flow-through).
    fl_child_care_subsidies: 880
    child_care_subsidies: 880

- name: Case 2, part-time care pays a lower copay and a higher benefit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3_000 / month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 20  # part time (< 30) -> 26.25 daily rate
        childcare_attending_days_per_month: 45  # cap = 26.25 * 45 = 1_181.25 > 1_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    # SMI ratio 0.4158 <= 0.55 -> 2% part time
    fl_sr_copay: 60  # 3_000 * 0.02
    is_fl_sr_eligible: true
    # cap = 26.25 * 45 = 1_181.25 > 1_000 -> cap does not bind
    # benefit = max(min(1_000, 1_181.25) - 60, 0) = 940 / month
    fl_sr: 940
    fl_child_care_subsidies: 940  # month slice of the YEAR aggregator

- name: Case 3, enrolled family above 55% SMI lands in the 6 percent tier with the cap binding.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000  # 5_000 / month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time -> 28.00 daily rate
        childcare_attending_days_per_month: 20  # cap = 28 * 20 = 560 < 1_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: true  # 5_000/mo > 55% entry; continued eligibility to 85%
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    # SMI ratio = 5_000 / 7_214.41 = 0.6931 > 0.55 -> 6% full time
    # (algebraically distinct from the 4% low tier)
    fl_sr_copay: 300  # 5_000 * 0.06 (7% cap = 350, not binding)
    is_fl_sr_income_eligible: true  # 5_000 <= 85% SMI (6_132.25) for enrolled
    is_fl_sr_eligible: true
    # cap = 28.00 * 20 = 560 < 1_000 -> cap BINDS
    # benefit = max(min(1_000, 560) - 300, 0) = max(560 - 300, 0) = 260 / month
    fl_sr: 260
    fl_child_care_subsidies: 260  # month slice of the YEAR aggregator

- name: Case 4, enrolled family near the 85 percent SMI ceiling with the cap not binding.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 86_400  # 7_200 / month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 33
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 6
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time -> 22.14 daily rate (school age)
        childcare_attending_days_per_month: 40
      person4:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time -> 28.00 daily rate
        childcare_attending_days_per_month: 40
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        fl_sr_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 18_000  # 1_500 / month
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    # size 4 monthly SMI = 8_588.58; ratio = 7_200 / 8_588.58 = 0.8383
    # 0.8383 <= 0.85 exit limit -> income eligible (enrolled)
    is_fl_sr_income_eligible: true
    # ratio > 0.55 -> 6% full time
    fl_sr_copay: 432  # 7_200 * 0.06
    is_fl_sr_eligible: true
    # cap = (22.14 + 28.00) * 40 = 2_005.60 > 1_500 -> cap does not bind
    # benefit = max(min(1_500, 2_005.60) - 432, 0) = 1_068 / month
    fl_sr: 1_068
    fl_child_care_subsidies: 1_068  # month slice of the YEAR aggregator

- name: Case 5, two-parent family with asymmetric work hours and the cap binding.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 48_000  # 4_000 / month
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 15  # 30 + 15 = 45 >= 40 combined
      person3:
        age: 6
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time -> 22.14 daily rate (school age)
        childcare_attending_days_per_month: 20
      person4:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time -> 28.00 daily rate
        childcare_attending_days_per_month: 20
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 14_000  # 1_166.67 / month
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: FL
        county_str: MIAMI_DADE_COUNTY_FL
  output:
    is_fl_sr_activity_eligible: true  # 45 combined hours >= 40
    # size 4 monthly SMI = 8_588.58; ratio = 4_000 / 8_588.58 = 0.4657 <= 0.55
    # 4_000 <= 55% entry limit (4_723.72) -> income eligible (new applicant)
    is_fl_sr_eligible: true
    fl_sr_copay: 160  # 4_000 * 0.04 (4% full time)
    # cap = (22.14 + 28.00) * 20 = 1_002.80 < 1_166.67 -> cap BINDS
    # benefit = max(min(1_166.67, 1_002.80) - 160, 0) = 842.80 / month
    fl_sr: 842.80
    fl_child_care_subsidies: 842.80  # month slice of the YEAR aggregator

