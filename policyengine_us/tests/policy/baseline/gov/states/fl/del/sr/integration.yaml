# Florida School Readiness (SR) integration tests.
# Pipeline: countable income (gross, monthly) and FFY2026 monthly SMI ->
# SMI ratio -> bracket rate (FT 4%/6%, PT 2%/3%) -> copay -> benefit
#   fl_sr = max(monthly childcare expense - copay, 0)
# The MONTH benefit aggregates to the YEAR fl_child_care_subsidies (sum of 12
# months) and flows into the federal child_care_subsidies total.
#
# FFY2026 SMI (instant 2025-10-01) by family size:
#   size 3: annual 86_572.92 -> monthly 7_214.41 (55% = 3_967.93, 85% = 6_132.25)
#   size 4: annual 103_063.00 -> monthly 8_588.58 (55% = 4_723.72, 85% = 7_300.30)

- name: Case 1, low-income full-time family with a positive benefit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3_000 / month
        weekly_hours_worked: 40
      person2:
        age: 28
        weekly_hours_worked: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    # SMI ratio = 3_000 / 7_214.41 = 0.4158 <= 0.55 -> 4% full time
    fl_sr_copay: 120  # 3_000 * 0.04
    is_fl_sr_eligible: true
    # benefit = max(1_000 - 120, 0) = 880 / month
    fl_sr: 880
    # YEAR aggregators evaluated at a MONTH period return the month's slice
    # (Case 8 asserts the full annual aggregate and federal flow-through).
    fl_child_care_subsidies: 880
    child_care_subsidies: 880

- name: Case 2, part-time care for the same family pays a lower copay and higher benefit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3_000 / month
        weekly_hours_worked: 40
      person2:
        age: 28
        weekly_hours_worked: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 20  # part time (< 30)
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    # SMI ratio 0.4158 <= 0.55 -> 2% part time
    fl_sr_copay: 60  # 3_000 * 0.02
    is_fl_sr_eligible: true
    # benefit = max(1_000 - 60, 0) = 940 / month
    fl_sr: 940
    fl_child_care_subsidies: 940  # month slice of the YEAR aggregator

- name: Case 3, enrolled family above 55% SMI lands in the 6 percent tier.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000  # 5_000 / month
        weekly_hours_worked: 40
      person2:
        age: 28
        weekly_hours_worked: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: true  # 5_000/mo > 55% entry; continued eligibility to 85%
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    # SMI ratio = 5_000 / 7_214.41 = 0.6931 > 0.55 -> 6% full time
    # (algebraically distinct from the 4% low tier)
    fl_sr_copay: 300  # 5_000 * 0.06 (7% cap = 350, not binding)
    is_fl_sr_income_eligible: true  # 5_000 <= 85% SMI (6_132.25) for enrolled
    is_fl_sr_eligible: true
    # benefit = max(1_000 - 300, 0) = 700 / month
    fl_sr: 700
    fl_child_care_subsidies: 700  # month slice of the YEAR aggregator

- name: Case 4, enrolled family near the 85 percent SMI ceiling.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 86_400  # 7_200 / month
        weekly_hours_worked: 40
      person2:
        age: 33
        weekly_hours_worked: 40
      person3:
        age: 6
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
      person4:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        fl_sr_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 18_000  # 1_500 / month
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: FL
  output:
    # size 4 monthly SMI = 8_588.58; ratio = 7_200 / 8_588.58 = 0.8383
    # 0.8383 <= 0.85 exit limit -> income eligible (enrolled)
    is_fl_sr_income_eligible: true
    # ratio > 0.55 -> 6% full time
    fl_sr_copay: 432  # 7_200 * 0.06
    is_fl_sr_eligible: true
    # benefit = max(1_500 - 432, 0) = 1_068 / month
    fl_sr: 1_068
    fl_child_care_subsidies: 1_068  # month slice of the YEAR aggregator

- name: Case 5, two-parent family with asymmetric work hours meets the combined activity test.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 48_000  # 4_000 / month
        weekly_hours_worked: 30
      person2:
        age: 30
        weekly_hours_worked: 15  # 30 + 15 = 45 >= 40 combined
      person3:
        age: 6
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
      person4:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 14_000  # 1_166.67 / month
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: FL
  output:
    is_fl_sr_activity_eligible: true  # 45 combined hours >= 40
    # size 4 monthly SMI = 8_588.58; ratio = 4_000 / 8_588.58 = 0.4657 <= 0.55
    # 4_000 <= 55% entry limit (4_723.72) -> income eligible (new applicant)
    is_fl_sr_eligible: true
    fl_sr_copay: 160  # 4_000 * 0.04 (4% full time)
    # benefit = max(1_166.67 - 160, 0) = 1_006.67 / month
    fl_sr: 1_006.67
    fl_child_care_subsidies: 1_006.67  # month slice of the YEAR aggregator

- name: Case 6, single parent below the activity threshold gets no benefit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # 2_000 / month, income eligible
        weekly_hours_worked: 10  # < 20 single-parent threshold
      person2:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    is_fl_sr_income_eligible: true  # income passes, but activity fails
    is_fl_sr_activity_eligible: false
    is_fl_sr_eligible: false
    fl_sr: 0

- name: Case 7, an otherwise-eligible family outside Florida gets no benefit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000
        weekly_hours_worked: 40
      person2:
        age: 28
        weekly_hours_worked: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: GA  # not Florida -> defined_for gate
  output:
    is_fl_sr_eligible: false
    fl_sr: 0
    fl_child_care_subsidies: 0

- name: Case 8, annual benefit flows through to the federal child care subsidy total.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3_000 / month
        weekly_hours_worked: 40
      person2:
        age: 28
        weekly_hours_worked: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    # Same family as Case 1: monthly benefit 880 over 12 months.
    # fl_child_care_subsidies (YEAR) = 880 * 12 = 10_560
    fl_child_care_subsidies: 10_560
    # The state aggregator feeds the federal child_care_subsidies total.
    child_care_subsidies: 10_560

# Edge cases.

- name: Case 9, before the 2025-10-01 effective date the program pays nothing.
  # 2025-01 predates the in_effect flag (false until 2025-10-01), so the
  # otherwise-fully-eligible Case 1 family is ineligible and gets $0 this month.
  # Asserted at the MONTH level only: the YEAR aggregator
  # (fl_child_care_subsidies) spans the 2025-10-01 on-switch, so it is non-zero
  # for the 2025 year and is not asserted here.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3_000 / month
        weekly_hours_worked: 40
      person2:
        age: 28
        weekly_hours_worked: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    is_fl_sr_eligible: false
    fl_sr: 0

- name: Case 10, zero income gives a zero copay and the full expense as benefit.
  # Lowest bracket is 4% full time, but 0 income x 4% = 0 copay, so the family
  # receives the entire monthly childcare expense as the subsidy.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 40
      person2:
        age: 28
        weekly_hours_worked: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    fl_sr_countable_income: 0
    fl_sr_copay: 0
    is_fl_sr_eligible: true
    # benefit = max(1_000 - 0, 0) = 1_000 / month (full expense)
    fl_sr: 1_000

- name: Case 11, income above the 85% SMI ceiling makes the family ineligible.
  # Family of 3, monthly SMI 7_214.41; 85% exit limit = 6_132.25. Enrolled so the
  # exit (not entry) limit applies; income above it ends eligibility and the
  # benefit drops to $0.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 84_000  # 7_000 / month > 6_132.25 exit limit
        weekly_hours_worked: 40
      person2:
        age: 28
        weekly_hours_worked: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    is_fl_sr_income_eligible: false
    is_fl_sr_eligible: false
    fl_sr: 0

- name: Case 12, child age 12 is the eligible upper boundary; age 13 is not.
  # Two children: person3 is 12 (eligible) and person4 is 13 (ineligible). The
  # unit still has an eligible child, so the family qualifies; only the eligible
  # child drives the full-time copay determination.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 36_000  # 3_000 / month
        weekly_hours_worked: 40
      person2:
        age: 33
        weekly_hours_worked: 40
      person3:
        age: 12
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time, eligible child
      person4:
        age: 13
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time, but age-ineligible
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: FL
  output:
    is_fl_sr_child_eligible: [false, false, true, false]
    is_fl_sr_eligible: true
    # size 4 monthly SMI = 8_588.58; ratio = 3_000 / 8_588.58 = 0.3493 <= 0.55
    # -> 4% full time; copay = 3_000 * 0.04 = 120
    fl_sr_copay: 120
    # benefit = max(1_000 - 120, 0) = 880 / month
    fl_sr: 880

- name: Case 13, a self-employment loss floors the copay at zero and does not inflate the benefit.
  # person1 has a -10_000/month business loss, so gross countable income is
  # 3_000 - 10_000 = -7_000/month (well under the 55% SMI entry limit, so the
  # family is still income eligible). The copay is income * rate, so a negative
  # income would yield a negative copay and, via max(expense - copay, 0), a
  # benefit ABOVE the actual expense. Income is floored at 0 in the copay:
  #   copay = max(countable_income, 0) * rate = max(-7_000, 0) * 0.04 = 0
  # so the benefit is exactly the monthly expense, never inflated.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3_000 / month
        self_employment_income: -120_000  # -10_000 / month business loss
        weekly_hours_worked: 40
      person2:
        age: 28
        weekly_hours_worked: 40
      person3:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 35  # full time
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        fl_sr_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1_000 / month
    households:
      household:
        members: [person1, person2, person3]
        state_code: FL
  output:
    # gross countable income = 3_000 - 10_000 = -7_000 / month
    fl_sr_countable_income: -7_000
    # -7_000 <= 55% SMI entry limit (3_967.93) -> income eligible
    is_fl_sr_income_eligible: true
    is_fl_sr_eligible: true
    # income floored at 0 -> copay = max(-7_000, 0) * 0.04 = 0 (NOT a negative copay)
    fl_sr_copay: 0
    # benefit = max(1_000 - 0, 0) = 1_000 / month: the full expense, NOT inflated
    # above it (the un-floored copay of -280 would have paid 1_280).
    fl_sr: 1_000
