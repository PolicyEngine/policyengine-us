- name: Case 1, senior homeowner under the single income limit.
  period: 2026
  input:
    people:
      person1:
        age: 65
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income:
          2024: 60_000
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_over_65_property_tax_credit_eligible: true

- name: Case 2, filer below the age threshold.
  period: 2026
  input:
    people:
      person1:
        age: 64
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income:
          2024: 40_000
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_over_65_property_tax_credit_eligible: false

- name: Case 3, joint filers above the income limit.
  period: 2026
  input:
    people:
      person1:
        age: 66
        real_estate_taxes: 2_000
      person2:
        age: 64
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status:
          2024: JOINT
          2026: JOINT
        adjusted_gross_income:
          2024: 70_001
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_over_65_property_tax_credit_eligible: false

- name: Case 4, senior without real estate taxes.
  period: 2026
  input:
    people:
      person1:
        age: 65
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income:
          2024: 40_000
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_over_65_property_tax_credit_eligible: false

- name: Case 5, surviving spouse at the surviving spouse age threshold.
  period: 2026
  input:
    people:
      person1:
        age: 60
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
        filing_status:
          2024: SURVIVING_SPOUSE
          2026: SURVIVING_SPOUSE
        adjusted_gross_income:
          2024: 60_000
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_over_65_property_tax_credit_eligible: true

- name: Case 6, widowed filer marker qualifies outside federal surviving spouse status.
  period: 2026
  input:
    people:
      person1:
        age: 60
        is_surviving_spouse: true
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income:
          2024: 40_000
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_over_65_property_tax_credit_eligible: true

- name: Case 7, prior-prior-year income determines eligibility.
  period: 2026
  input:
    people:
      person1:
        age: 65
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income:
          2024: 40_000
          2026: 80_000
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_over_65_property_tax_credit_eligible: true

- name: Case 8, income above the prior-prior-year limit is ineligible.
  period: 2026
  input:
    people:
      person1:
        age: 65
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income:
          2024: 60_001
          2026: 40_000
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_over_65_property_tax_credit_eligible: false

- name: Case 9, current surviving spouse status qualifies with prior-prior-year single income.
  period: 2026
  input:
    people:
      person1:
        age: 60
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
        filing_status:
          2024: SINGLE
          2026: SURVIVING_SPOUSE
        adjusted_gross_income:
          2024: 60_000
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_over_65_property_tax_credit_eligible: true
