# Tests for in_ccdf_activity_eligible (SPMUnit, MONTH, bool).
# Both the applicant and co-applicant (tax-unit head/spouse) must be in a
# qualifying activity; there is NO minimum number of working hours.
# A parent qualifies via earnings, any hours worked, full-time student status,
# disability (incapacitation), or TANF enrollment.
# Policy Manual Section 1.7 Service Need.
# Note: "not employed" is set with weekly_hours_worked_before_lsr: 0 (the
# default is 40, which would otherwise satisfy the activity test).

- name: Case 1, single working parent, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_activity_eligible: true

- name: Case 2, single non-working parent, ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_activity_eligible: false

- name: Case 3, two married parents both working, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 24_000
      person2:
        age: 33
        employment_income: 12_000
      person3:
        age: 4
        is_tax_unit_dependent: true
    marital_units:
      marital_unit:
        members: [person1, person2]
      child_marital_unit:
        members: [person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_ccdf_activity_eligible: true

- name: Case 4, two married parents one not working, ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 24_000
      person2:
        age: 33
        weekly_hours_worked_before_lsr: 0
      person3:
        age: 4
        is_tax_unit_dependent: true
    marital_units:
      marital_unit:
        members: [person1, person2]
      child_marital_unit:
        members: [person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_ccdf_activity_eligible: false

- name: Case 5, full-time student parent, eligible (no earnings or hours).
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 0
        is_full_time_student: true
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_activity_eligible: true

- name: Case 6, disabled parent, eligible (incapacitation service need).
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 0
        is_disabled: true
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_activity_eligible: true

- name: Case 7, TANF-enrolled non-working parent, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_activity_eligible: true

- name: Case 8, no adult in unit, ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 4
        is_tax_unit_dependent: true
        weekly_hours_worked_before_lsr: 0
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_ccdf_activity_eligible: false
