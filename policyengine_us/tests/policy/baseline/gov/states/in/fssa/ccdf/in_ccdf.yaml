# Tests for in_ccdf (SPMUnit, MONTH, USD) — the monthly subsidy.
# Subsidy = max(min(pre-subsidy childcare expenses, sum of per-child max rates)
#               - monthly copay, 0).
# The copay variable converts Indiana's weekly copay to monthly (* 52 / 12).
# The family pays directly for any provider charge above the reimbursement rate.
# Policy Manual Section 2.6.

- name: Case 1, expenses above rate, capped at rate then copay deducted.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        employment_income: 22_720  # ~105% FPL -> copay factor 0.0116
      person2:
        age: 0.5
        is_tax_unit_dependent: true
        in_ccdf_provider_type: LICENSED_CENTER
        in_ccdf_ptq_level: BASE
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 30_000  # 2,500/mo > rate
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    # rate = 416 * 52/12 = 1,802.67; expenses 2,500 capped to 1,802.67
    # weekly copay = 1,893.33 * 0.0116 = 21.96; monthly = 21.96 * 52/12 = 95.17
    # benefit = 1,802.67 - 95.17 = 1,707.50
    in_ccdf: 1_707.50

- name: Case 2, expenses below rate, capped at expenses.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        employment_income: 22_720
      person2:
        age: 0.5
        is_tax_unit_dependent: true
        in_ccdf_provider_type: LICENSED_CENTER
        in_ccdf_ptq_level: BASE
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1,000/mo < rate
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    # expenses 1,000/mo < rate 1,802.67 -> capped at 1,000
    # monthly copay 95.17 -> benefit = 1,000 - 95.17 = 904.83
    in_ccdf: 904.83

- name: Case 3, copay exceeds capped expenses, benefit floored at zero.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        employment_income: 27_050  # ~125% FPL, factor 0.0163
      person2:
        age: 8
        is_tax_unit_dependent: true
        in_ccdf_provider_type: REGISTERED_MINISTRY
        in_ccdf_ptq_level: BASE  # School Age Before/After = 73/wk = 316.33/mo
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 600  # 50/mo, small
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    # expenses 50/mo capped (rate 316.33); monthly copay = 36.74 * 52/12 = 159.22
    # 50 - 159.22 < 0 -> floored to 0
    in_ccdf: 0

- name: Case 4, ineligible family receives no subsidy.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        employment_income: 90_000  # above 150% FPL applicant limit
      person2:
        age: 0.5
        is_tax_unit_dependent: true
        in_ccdf_provider_type: LICENSED_CENTER
        in_ccdf_ptq_level: BASE
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 30_000
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_eligible: false
    in_ccdf: 0

- name: Case 5, zero childcare expenses, no subsidy.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        employment_income: 22_720
      person2:
        age: 0.5
        is_tax_unit_dependent: true
        in_ccdf_provider_type: LICENSED_CENTER
        in_ccdf_ptq_level: BASE
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 0
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    # min(0 expenses, rate) = 0; benefit = max(0 - copay, 0) = 0.
    in_ccdf: 0

- name: Case 6, negative self-employment income does not inflate the subsidy.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        self_employment_income: -120_000  # -$10,000/mo loss
      person2:
        age: 33
        employment_income: 12_000  # keeps both parents activity-eligible
      person3:
        age: 0.5
        is_tax_unit_dependent: true
        in_ccdf_provider_type: LICENSED_CENTER
        in_ccdf_ptq_level: BASE
    marital_units:
      marital_unit:
        members: [person1, person2]
      child_marital_unit:
        members: [person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 30_000  # 2,500/mo > rate
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    # Countable income is negative -> floored at 0 -> copay 0. The subsidy is
    # capped at the reimbursement rate (416 * 52/12 = 1,802.67), NOT inflated by
    # the negative income.
    in_ccdf: 1_802.67

- name: Case 7, two children of different ages, per-child rates summed.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        employment_income: 22_720  # ~83% FPL (3-person) -> zero copay
      person2:
        age: 0.5  # infant
        is_tax_unit_dependent: true
        in_ccdf_provider_type: LICENSED_CENTER
        in_ccdf_ptq_level: BASE
      person3:
        age: 8  # school age, before/after care
        is_tax_unit_dependent: true
        in_ccdf_provider_type: LICENSED_CENTER
        in_ccdf_ptq_level: BASE
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 60_000  # 5,000/mo > combined rate
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    # Infant rate 416 * 52/12 = 1,802.67; school-age before/after 110 * 52/12 =
    # 476.67; combined rate = 2,279.33. Expenses 5,000/mo capped to 2,279.33.
    # Copay: 3-person FPG 2026 = 27,320/yr; income 22,720 -> ratio ~0.83 < 100%
    # FPL -> zero copay. Benefit = 2,279.33 - 0 = 2,279.33.
    in_ccdf: 2_279.33
