- name: Case 1, SSI-eligible adult in licensed residential facility.
  period: 2025-01
  input:
    people:
      person1:
        age: 45
        is_ssi_eligible: true
        is_ssi_aged_blind_disabled: true
        in_resides_in_licensed_residential_facility: true
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_ssp_rcap_eligible: true

