- name: Case 6 - Two earners both get $90 disregard
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        tanf_gross_earned_income: 200
      person2:
        age: 28
        tanf_gross_earned_income: 200
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: true
        spm_unit_cash_assets: 500
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    spm_unit_size: 3
    in_tanf_countable_earned_income_for_eligibility: 106.67
    # Per earner: ($200-$90-$30)*0.6667 = $80*0.6667 = $53.34
    # Unit total: $53.34 + $53.34 = $106.67
    in_tanf_countable_income_for_eligibility: 106.67
    in_tanf_countable_earned_income: 100
    # ($200 + $200) * 0.25 = $100
    in_tanf_countable_income_for_payment: 100
    in_tanf_countable_income_eligible: true
    # Countable for elig ($106.67) < FPG for 3 -> eligible
    in_tanf_payment_eligible: true
    # Countable for benefit ($100) < standard of need ($320) -> eligible
    in_tanf_payment_standard: 320
    in_tanf_eligible: true
    in_tanf: 220
    # Max benefit ($320) - countable income ($100) = $220

- name: Case 7 - Single adult with no children (not demographically eligible)
  period: 2024-01
  input:
    people:
      person1:
        age: 25
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 300
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    spm_unit_size: 1
    in_tanf_countable_income_for_payment: 0
    in_tanf_countable_income_eligible: true
    in_tanf_payment_eligible: true
    in_tanf_payment_standard: 155
    # Family of 1 -> $155
    in_tanf_eligible: false
    # Single adult with no children -> not demographically eligible
    in_tanf: 0

- name: Case 8, enrolled family with 2018 historical parameters.
  period: 2018
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        tanf_gross_earned_income: 3_600
      person2:
        age: 10
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: true
        spm_unit_cash_assets: 500
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 1_920.0
    # Monthly gross: $3,600 / 12 = $300
    # Months 1-4 (phase 1): ($300-$90-$30)*0.6667 = $120.01 x 4 = $480.02
    # Months 5-12 (phase 2): $300-$90-$30 = $180 x 8 = $1,440
    # Annual: $480.02 + $1,440 = $1,920.02
    in_tanf_countable_income_for_eligibility: 1_920.0
    in_tanf_countable_earned_income: 900
    # $300 x 0.25 = $75/month x 12 = $900
    in_tanf_countable_income_for_payment: 900
    in_tanf_payment_standard: 3_456
    # Family of 3, 2018 (pre-2023): $288/month x 12 = $3,456
    in_tanf: 2_556
    # ($288 - $75) x 12 = $213 x 12 = $2,556

