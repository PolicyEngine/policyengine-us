# Indiana TANF Integration Tests
# Tests the full benefit calculation pipeline

- name: Case 1 - Single parent with no income receives maximum benefit
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        tanf_gross_earned_income: 0
        tanf_gross_unearned_income: 0
      person2:
        age: 10
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 500
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    spm_unit_size: 3
    in_tanf_countable_earned_income_for_eligibility: 0
    in_tanf_countable_income_for_eligibility: 0
    in_tanf_countable_earned_income: 0
    in_tanf_countable_income_for_payment: 0
    in_tanf_countable_income_eligible: true
    # Countable income ($0) < standard of need ($320) -> eligible
    in_tanf_payment_eligible: true
    # Countable income ($0) < standard of need ($320) -> eligible
    in_tanf_payment_standard: 320
    # Family of 3 -> $320
    in_tanf_eligible: true
    in_tanf: 320
    # Max benefit ($320) - countable income ($0) = $320

- name: Case 2 - Single parent with earned income receives reduced benefit
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 28
        tanf_gross_earned_income: 200
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
        spm_unit_cash_assets: 800
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    spm_unit_size: 2
    in_tanf_countable_earned_income_for_eligibility: 53.34
    # $200 - $90 = $110 -> $110 - $30 = $80 -> $80 * 0.6667 = $53.34
    in_tanf_countable_income_for_eligibility: 53.34
    in_tanf_countable_earned_income: 50
    # $200 * 0.25 (75% disregard) = $50
    in_tanf_countable_income_for_payment: 50
    in_tanf_countable_income_eligible: true
    # Enrolled: countable for elig ($53.34) < 100% FPL for 2 -> eligible
    in_tanf_payment_eligible: true
    # Countable for benefit ($50) < standard of need ($255) -> eligible
    in_tanf_payment_standard: 255
    # Family of 2 -> $255
    in_tanf_eligible: true
    in_tanf: 205
    # Max benefit ($255) - countable income ($50) = $205

- name: Case 3 - Family with mixed earned and unearned income
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        tanf_gross_earned_income: 300
      person2:
        age: 12
        tanf_gross_unearned_income: 100
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
        spm_unit_cash_assets: 700
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    spm_unit_size: 2
    in_tanf_countable_earned_income_for_eligibility: 120.01
    # $300 - $90 = $210 -> $210 - $30 = $180 -> $180 * 0.6667 = $120.01
    in_tanf_countable_income_for_eligibility: 220.01
    # $120.01 (earned) + $100 (unearned) = $220.01
    in_tanf_countable_earned_income: 75
    # $300 * 0.25 = $75
    in_tanf_countable_income_for_payment: 175
    # $75 (earned) + $100 (unearned) = $175
    in_tanf_countable_income_eligible: true
    # Enrolled: countable for elig ($220.01) < 100% FPL for 2 -> eligible
    in_tanf_payment_eligible: true
    # Countable for benefit ($175) < standard of need ($255) -> eligible
    in_tanf_payment_standard: 255
    in_tanf_eligible: true
    in_tanf: 80
    # Max benefit ($255) - countable income ($175) = $80

- name: Case 4 - Applicant high earner exceeds eligibility threshold
  period: 2024-01
  input:
    people:
      person1:
        age: 32
        tanf_gross_earned_income: 600
      person2:
        age: 7
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: false
        spm_unit_cash_assets: 900
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    spm_unit_size: 3
    in_tanf_countable_earned_income_for_eligibility: 510
    # Applicant: $600 - $90 = $510 ($90 work expense only)
    in_tanf_countable_income_for_eligibility: 510
    in_tanf_countable_earned_income: 150
    # $600 * 0.25 = $150
    in_tanf_countable_income_for_payment: 150
    in_tanf_countable_income_eligible: false
    # Applicant threshold = standard of need ($320); $510 >= $320 -> NOT eligible
    in_tanf_payment_eligible: true
    # Countable for benefit ($150) < standard of need ($320) -> eligible
    in_tanf_payment_standard: 320
    in_tanf_eligible: false
    # Failed countable income test
    in_tanf: 0

