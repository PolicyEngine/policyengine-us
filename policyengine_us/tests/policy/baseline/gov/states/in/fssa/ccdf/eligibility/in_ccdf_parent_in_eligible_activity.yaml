# Tests for in_ccdf_parent_in_eligible_activity (Person, MONTH, bool).
# A parent is in a qualifying activity if ANY of the following is true:
# positive employment/self-employment earnings, full-time student,
# disability (incapacitation), or TANF enrollment.
# Policy Manual Section 1.7 Service Need: employment is documented by proof
# of income, with no minimum number of working hours.

- name: Case 1, employment income only, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_ccdf_parent_in_eligible_activity: true

- name: Case 2, self-employment income only, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        self_employment_income: 18_000
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_ccdf_parent_in_eligible_activity: true

- name: Case 3, hours worked but no earnings does not qualify.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 20
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    # Employment is documented by proof of income; hours without earnings
    # (not-yet-paid new employment) are not captured at the moment.
    in_ccdf_parent_in_eligible_activity: false

- name: Case 4, full-time student with no earnings or hours, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        is_full_time_student: true
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_ccdf_parent_in_eligible_activity: true

- name: Case 5, disabled parent with no earnings or hours, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        is_disabled: true
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_ccdf_parent_in_eligible_activity: true

- name: Case 6, TANF-enrolled parent with no earnings or hours, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_ccdf_parent_in_eligible_activity: true

- name: Case 7, no qualifying activity, ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_ccdf_parent_in_eligible_activity: false

- name: Case 8, self-employment loss still evidences active self-employment.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        self_employment_income: -12_000
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_ccdf_parent_in_eligible_activity: true
