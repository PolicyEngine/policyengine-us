# Tests for in_ccdf_income_eligible (SPMUnit, MONTH, bool).
# Initial applicants (is_in_ccdf_enrolled = false) are tested at the get-on
# FPG rate; enrolled recipients (true) are tested at 85% of the state median
# income. Policy Manual Section 1.1; get-on / stay-on schedules.
# At 2026-01 the get-on rate parameter is 1.5 (150% FPL); the 1.35 (135%)
# value takes effect 2026-04-05, so it is exercised with a 2027-01 period.

# --- Applicant (get-on), 1.5 FPL era at 2026-01 ---
# 2-person FPG 2026 = 21,640/yr; limit = 1.5 * 21,640 = 32,460/yr.

- name: Case 1, applicant income below get-on limit, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 24_000
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: true

- name: Case 2, applicant income exactly at get-on limit, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 32_460  # 1.5 * 21,640 FPG
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    # At-or-below the limit is eligible (<=).
    in_ccdf_income_eligible: true

- name: Case 3, applicant income above get-on limit, ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 33_000  # above 32,460 limit
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: false

# --- Applicant (get-on), 1.35 FPL era at 2027-01 ---

- name: Case 4, applicant income well below 135% FPL, eligible.
  period: 2027-01
  input:
    people:
      person1:
        age: 35
        employment_income: 20_000
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: true

- name: Case 5, applicant income well above 135% FPL, ineligible.
  period: 2027-01
  input:
    people:
      person1:
        age: 35
        employment_income: 40_000
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: false

# --- Enrolled (stay-on), 85% SMI ---
# Income between 135% FPL and 85% SMI: fails as applicant, passes as enrolled.

- name: Case 6, mid income fails as applicant.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 45_000  # 3,750/mo > 150% FPL limit
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: false

- name: Case 7, same mid income passes as enrolled (85% SMI).
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 45_000  # below 85% SMI
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: true

- name: Case 8, enrolled income above 85% SMI, ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 90_000  # above 85% SMI
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: false

# --- 135% FPL applicant boundary at 2027-01 (1.35 era) ---
# 2-person 2027 FPG = 22,147.39/yr; 135% = 29,898.98/yr (the income test
# compares monthly countable income against monthly FPG * 1.35).

- name: Case 9, applicant income just below 135% FPL, eligible.
  period: 2027-01
  input:
    people:
      person1:
        age: 35
        employment_income: 29_880  # just below 29,898.98 limit
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: true

- name: Case 10, applicant income essentially at 135% FPL, eligible.
  period: 2027-01
  input:
    people:
      person1:
        age: 35
        employment_income: 29_898  # at the 29,898.98 limit (<=)
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: true

- name: Case 11, applicant income just above 135% FPL, ineligible.
  period: 2027-01
  input:
