# Tests for in_ccdf_income_eligible (SPMUnit, MONTH, bool).
# Initial applicants (is_in_ccdf_enrolled = false) are tested at the get-on
# FPG rate; enrolled recipients (true) are tested at 85% of the state median
# income. Policy Manual Section 1.1; get-on / stay-on schedules.
# At 2026-01 the get-on rate parameter is 1.5 (150% FPL); the 1.35 (135%)
# value takes effect 2026-04-05, so it is exercised with a 2027-01 period.

# --- Applicant (get-on), 1.5 FPL era at 2026-01 ---
# 2-person FPG 2026 = 21,640/yr; limit = 1.5 * 21,640 = 32,460/yr.

- name: Case 1, applicant income below get-on limit, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 24_000
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: true

- name: Case 2, applicant income exactly at get-on limit, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 32_460  # 1.5 * 21,640 FPG
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    # At-or-below the limit is eligible (<=).
    in_ccdf_income_eligible: true

- name: Case 3, applicant income above get-on limit, ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 33_000  # above 32,460 limit
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: false

# --- Applicant (get-on), 1.35 FPL era at 2027-01 ---

- name: Case 4, applicant income well below 135% FPL, eligible.
  period: 2027-01
  input:
    people:
      person1:
        age: 35
        employment_income: 20_000
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: true

- name: Case 5, applicant income well above 135% FPL, ineligible.
  period: 2027-01
  input:
    people:
      person1:
        age: 35
        employment_income: 40_000
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: false

# --- Enrolled (stay-on), 85% SMI ---
# Income between 135% FPL and 85% SMI: fails as applicant, passes as enrolled.

- name: Case 6, mid income fails as applicant.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 45_000  # 3,750/mo > 150% FPL limit
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: false

- name: Case 7, same mid income passes as enrolled (85% SMI).
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 45_000  # below 85% SMI
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: true

- name: Case 8, enrolled income above 85% SMI, ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 90_000  # above 85% SMI
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: false

# --- 135% FPL applicant boundary at 2027-01 (1.35 era) ---
# 2-person 2027 FPG = 22,147.39/yr; 135% = 29,898.98/yr. The 2027 FPG is a
# CBO-CPI-forecast-uprated value that shifts when the actual 2027 guideline is
# published, so these cases keep a comfortable margin on each side of the
# limit rather than pinning the exact boundary (the inclusive <= boundary is
# exercised at 2026 with the published FPG in Case 2). The ineligible income
# stays below the 1.5-era limit (33,221), proving the 1.35 rate applies.

- name: Case 9, applicant income below 135% FPL, eligible.
  period: 2027-01
  input:
    people:
      person1:
        age: 35
        employment_income: 29_000  # comfortably below the ~29,899 limit
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: true

- name: Case 10, applicant income above 135% FPL but below the 1.5-era limit, ineligible.
  period: 2027-01
  input:
    people:
      person1:
        age: 35
        employment_income: 30_800  # above the ~29,899 limit, below 1.5 * FPG
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: false

# --- 85% SMI enrolled boundary at 2026-01 ---
# 2-person IN SMI = 6,427.06/mo; 85% = 5,462.99/mo -> 65,555.88/yr. The 2026
# SMI is uprated from the 2025-10-01 actual (107,555/yr) by the CBO AGI
# forecast, and reverts to the un-uprated base (85% = 62,166.79/yr) once an
# actual 2026-10-01 value is added, so these cases keep a comfortable margin
# below the un-uprated limit and above the uprated one.

- name: Case 11, enrolled income below 85% SMI, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 60_000  # below 85% SMI under either basis
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: true

- name: Case 12, enrolled income above 85% SMI, ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 70_000  # above 85% SMI (65,556) but below 100% SMI
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: false

# --- Degenerate income and family-size scaling ---

- name: Case 13, applicant with zero income, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 0
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: true

- name: Case 14, larger family, get-on limit scales with household size.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 40_000  # 3,333/mo
      person2:
        age: 33
      person3:
        age: 10
        is_tax_unit_dependent: true
      person4:
        age: 8
        is_tax_unit_dependent: true
      person5:
        age: 5
        is_tax_unit_dependent: true
    marital_units:
      marital_unit:
        members: [person1, person2]
      mu3:
        members: [person3]
      mu4:
        members: [person4]
      mu5:
        members: [person5]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2, person3, person4, person5]
        state_code: IN
  output:
    # 5-person FPG 2026 = 38,680/yr; 150% limit = 58,020/yr (4,835/mo).
    # 3,333/mo < 4,835/mo -> eligible. A 2-person unit at this income fails.
    in_ccdf_income_eligible: true
