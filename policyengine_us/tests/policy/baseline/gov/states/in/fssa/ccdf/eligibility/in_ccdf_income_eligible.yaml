# --- Degenerate income and family-size scaling ---

- name: Case 15, applicant with zero income, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 0
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_income_eligible: true

- name: Case 16, larger family, get-on limit scales with household size.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 40_000  # 3,333/mo
      person2:
        age: 33
      person3:
        age: 10
        is_tax_unit_dependent: true
      person4:
        age: 8
        is_tax_unit_dependent: true
      person5:
        age: 5
        is_tax_unit_dependent: true
    marital_units:
      marital_unit:
        members: [person1, person2]
      mu3:
        members: [person3]
      mu4:
        members: [person4]
      mu5:
        members: [person5]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5]
        is_in_ccdf_enrolled: false
    households:
      household:
        members: [person1, person2, person3, person4, person5]
        state_code: IN
  output:
    # 5-person FPG 2026 = 38,680/yr; 150% limit = 58,020/yr (4,835/mo).
    # 3,333/mo < 4,835/mo -> eligible. A 2-person unit at this income fails.
    in_ccdf_income_eligible: true
