# Tests for in_tanf_countable_income_eligible
# Uses eligibility disregards: $90/earner, $30/earner, 1/3 of remainder
# Compares to standard of need (initial) or FPL (continuing)

- name: Family of 3 with zero income - eligible
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        tanf_gross_earned_income: 0
      person2:
        age: 10
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_income_for_eligibility: 0
    in_tanf_countable_income_eligible: true
    # Countable income ($0) < standard of need ($320) -> eligible

- name: Family of 3 with low earned income - eligible
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        tanf_gross_earned_income: 300
      person2:
        age: 10
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 120.01
    # $300 - $90 (work expense) = $210
    # $210 - $30 (flat disregard) = $180
    # $180 * (1 - 0.3333) = $120.01
    in_tanf_countable_income_for_eligibility: 120.01
    in_tanf_countable_income_eligible: true
    # Enrolled: countable ($120.01) < 100% FPL for 3 -> eligible

- name: Applicant family of 3 with moderate earned income - not eligible
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        tanf_gross_earned_income: 600
      person2:
        age: 10
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 510
    # Applicant: $600 - $90 = $510 ($90 work expense only)
    in_tanf_countable_income_for_eligibility: 510
    in_tanf_countable_income_eligible: false
    # Applicant threshold = standard of need ($320); $510 >= $320 -> not eligible

- name: Family of 2 with earned income at threshold - not eligible
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        tanf_gross_earned_income: 500
      person2:
        age: 10
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 253.35
    # $500 - $90 = $410
    # $410 - $30 = $380
    # $380 * 0.6667 = $253.35
    in_tanf_countable_income_for_eligibility: 253.35
    in_tanf_countable_income_eligible: true
    # Enrolled: countable ($253.35) < 100% FPL for 2 -> eligible

- name: Two earners - each gets $90 disregard
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        tanf_gross_earned_income: 200
      person2:
        age: 28
        tanf_gross_earned_income: 200
      person3:
        age: 10
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 106.67
    # Per earner: ($200-$90-$30)*0.6667 = $80*0.6667 = $53.34
    # Unit total: $53.34 + $53.34 = $106.67
    in_tanf_countable_income_for_eligibility: 106.67
    in_tanf_countable_income_eligible: true
    # Enrolled: countable ($106.67) < 100% FPL for 3 -> eligible

- name: Continuing eligibility uses FPL threshold
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        tanf_gross_earned_income: 1_000
      person2:
        age: 10
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 586.7
    # $1000 - $90 = $910
    # $910 - $30 = $880
    # $880 * 0.6667 = $586.70
    in_tanf_countable_income_for_eligibility: 586.7
    in_tanf_countable_income_eligible: true
    # Countable ($586.70) < 100% FPL for 3 (~$1,988/mo) -> eligible

# Post-2025 initial eligibility (IC 12-14-1-1.7; FSSA 3010.15.00).
# Initial applicants must have countable net income below the maximum grant
# and gross income below 35% FPG (50% from 2027-07-01). For Indiana the
# net (maximum grant) standard binds before the looser 35% FPG gross screen.

- name: Applicant family of 3 just below the maximum grant net standard in 2026
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        tanf_gross_unearned_income: 512
      person2:
        age: 10
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_income_for_eligibility: 512
    in_tanf_countable_income_eligible: true
    # Net ($512) < maximum grant ($513); gross ($512) < gross standard ($778) -> eligible

- name: Applicant family of 3 at the maximum grant net standard in 2026
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        tanf_gross_unearned_income: 513
      person2:
        age: 10
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_income_for_eligibility: 513
    in_tanf_countable_income_eligible: false
    # Net ($513) >= maximum grant ($513) -> not eligible (strict less-than)

- name: Applicant family of 3 below the maximum grant net standard in 2028
  period: 2028-01
  input:
    people:
      person1:
        age: 30
        tanf_gross_unearned_income: 500
      person2:
        age: 10
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_income_eligible: true
    # Net ($500) < maximum grant ($513); gross ($500) < 50% FPG -> eligible

- name: Applicant family of 3 high earner fails both 2026 screens
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        tanf_gross_earned_income: 3_000
      person2:
        age: 10
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_income_eligible: false
    # Net ($2,910 = $3,000 - $90) >= maximum grant and gross ($3,000) > 35% FPG

- name: Enrolled family of 3 below 100% FPG in 2026 remains eligible
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        tanf_gross_unearned_income: 2_000
      person2:
        age: 10
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_income_eligible: true
    # Enrolled: countable ($2,000) < 100% FPG for 3 ($2,220.83) -> eligible

- name: Enrolled family of 3 above 100% FPG in 2026 loses eligibility
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        tanf_gross_unearned_income: 2_300
      person2:
        age: 10
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_income_eligible: false
    # Enrolled: countable ($2,300) >= 100% FPG for 3 ($2,220.83) -> not eligible

- name: Applicant family of 3 passes the published March 2026 gross standard
  period: 2026-03
  input:
    people:
      person1:
        age:
          2026: 30
        tanf_gross_earned_income:
          2026-03: 260
      person2:
        age:
          2026: 28
        tanf_gross_earned_income:
          2026-03: 260
      person3:
        age:
          2026: 26
        tanf_gross_earned_income:
          2026-03: 260
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled:
          2026-03: false
    households:
      household:
        members: [person1, person2, person3]
        state_code:
          2026: IN
  output:
    in_tanf_gross_income: 780
    in_tanf_countable_income_for_eligibility: 510
    in_tanf_initial_gross_income_standard: 797
    in_tanf_countable_income_eligible: true
    # Gross ($780) < published standard ($797); net ($510) < maximum grant ($513).

- name: Applicant family of 3 at the March 2026 gross standard is not eligible
  period: 2026-03
  input:
    in_tanf_countable_income_for_eligibility:
      2026-03: 510
    in_tanf_gross_income:
      2026-03: 797
    spm_unit_size:
      2026: 3
    is_tanf_enrolled:
      2026-03: false
    state_code:
      2026: IN
  output:
    in_tanf_initial_gross_income_standard: 797
    in_tanf_countable_income_eligible: false
    # Gross income must be strictly below the standard.

- name: Enrolled family of 3 at the March 2026 FPG standard is not eligible
  period: 2026-03
  input:
    in_tanf_countable_income_for_eligibility:
      2026-03: 2_277
    spm_unit_size:
      2026: 3
    is_tanf_enrolled:
      2026-03: true
    state_code:
      2026: IN
  output:
    in_tanf_fpg: 2_277
    in_tanf_countable_income_eligible: false
    # Continuing net income must be strictly below the published standard.
