- name: Case 1, SSI recipient Medicaid enrolled adult in federal Medicaid facility.
  period: 2025-01
  input:
    people:
      person1:
        age: 45
        is_ssi_eligible: true
        is_medicaid_eligible: true
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_ssp_sapn_eligible: true

