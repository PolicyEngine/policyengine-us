# Tests for in_ccdf_age_group (Person, MONTH, Enum).
# Age groups derived from age in months (age * 12), per the CCDF Provider
# Manual "Reimbursement Rate Categories":
#   INFANT: 0-11 months (< 12)
#   TODDLER: 12-35 months (< 36)
#   THREE_TO_FIVE: 36-71 months (< 72)
#   KINDERGARTEN: 72-83 months / age 6 (< 84)
#   SCHOOL_AGE_BEFORE_AFTER: age 7+ (>= 84 months)
# SCHOOL_AGE_OTHER is care-schedule-driven and never derived from age alone.

- name: Case 1, age 0, infant.
  period: 2026-01
  input:
    people:
      person1:
        age: 0
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_ccdf_age_group: INFANT

- name: Case 2, age 0.9 (about 11 months), infant.
  period: 2026-01
  input:
    people:
      person1:
        age: 0.9
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    in_ccdf_age_group: INFANT

