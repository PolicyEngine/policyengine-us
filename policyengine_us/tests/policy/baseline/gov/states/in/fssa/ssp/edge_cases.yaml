# =============================================================
# RCAP unlicensed facility edge cases
# =============================================================

- name: Case 22, RCAP unlicensed facility zero uncapped SSI.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        in_ssp_rcap_eligible: true
        uncapped_ssi: 0
        in_resides_in_unlicensed_residential_facility: true
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    # Per diem = $37/day (unlicensed, since July 2008)
    # State standard = 37 * 365/12 = $1,125.42
    in_ssp_rcap: 1_125.42

- name: Case 23, RCAP unlicensed income exceeds state standard.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        in_ssp_rcap_eligible: true
        uncapped_ssi: 14_000
        in_resides_in_unlicensed_residential_facility: true
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    # State standard = $1,125.42
    # uncapped_ssi monthly = 14,000/12 = $1,166.67
    # supplement = max(1,125.42 - 1,166.67, 0) = 0
    in_ssp_rcap: 0

