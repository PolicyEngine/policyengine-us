# Tests for in_ccdf_max_rate_per_child (Person, MONTH, USD).
# Monthly rate = weekly Marion County FY2023 rate * (52 / 12), with a 10%
# add-on for children with documented special needs.
# Weekly rates verified against the rate addendum (Marion FY2023, eff 2023-07-30).
# defined_for = in_ccdf_eligible_child, so each child is a citizen tax-unit
# dependent within the age limit.

- name: Case 1, Licensed Center base infant.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 0.5
        is_tax_unit_dependent: true
        in_ccdf_provider_type: LICENSED_CENTER
        in_ccdf_ptq_level: BASE
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    # 416/week * 52/12 = 1,802.67/month
    in_ccdf_max_rate_per_child: 1_802.67

