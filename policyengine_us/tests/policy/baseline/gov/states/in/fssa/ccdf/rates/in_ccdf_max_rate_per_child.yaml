# Tests for in_ccdf_max_rate_per_child (Person, MONTH, USD).
# Monthly rate = weekly rate * (52 / 12), with a 10% add-on for children
# with documented special needs.
# Weekly rates verified against the rate addendum (Marion FY2023, eff
# 2023-07-30). The 2026 cases use the post-Oct-5-2025 rates (FY2023 values
# x 0.90/0.85/0.65 percentage cuts); Case 17 exercises the pre-cut era.
# defined_for = in_ccdf_eligible_child, so each child is a citizen tax-unit
# dependent within the age limit.

- name: Case 1, Licensed Center base infant.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 0.5
        is_tax_unit_dependent: true
        in_ccdf_provider_type: LICENSED_CENTER
        in_ccdf_ptq_level: BASE
    households:
      household:
        members: [person1]
        state_code: IN
  output:
    # 416 * 0.90 = 374.4/week * 52/12 = 1,622.40/month
    in_ccdf_max_rate_per_child: 1_622.40

