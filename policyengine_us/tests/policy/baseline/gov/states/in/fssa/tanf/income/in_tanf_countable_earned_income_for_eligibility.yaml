# Tests for in_tanf_countable_earned_income_for_eligibility
# Enrolled (months 1-4): $90/earner + $30 flat + 1/3 disregard
# Enrolled (months 5-12): $90/earner + $30 flat only
# Applicant (not enrolled): $90/earner only

# --- Continuing recipients (enrolled, January = month 1, phase 1) ---

- name: Case 1, enrolled family of 3 with 1 earner.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        tanf_gross_earned_income: 400
      person2:
        tanf_gross_earned_income: 0
      person3:
        age: 10
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 186.7
    # $400 - $90 = $310
    # $310 - $30 = $280
    # $280 * 0.6667 = $186.68

- name: Case 2, enrolled family of 3 with 2 earners.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        tanf_gross_earned_income: 200
      person2:
        tanf_gross_earned_income: 200
      person3:
        age: 10
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 106.7
    # Per earner: ($200-$90-$30)*0.6667 = $80*0.6667 = $53.34
    # Unit total: $53.34 + $53.34 = $106.67

- name: Case 3, enrolled single earner with low income.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        tanf_gross_earned_income: 300
      person2:
        age: 10
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 120.0
    # $300 - $90 = $210
    # $210 - $30 = $180
    # $180 * 0.6667 = $120.01

- name: Case 4, enrolled earner below work expense disregard.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        tanf_gross_earned_income: 50
      person2:
        age: 10
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 0
    # $50 - $90 = max(0, -40) = $0

- name: Case 5, enrolled with zero income.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        tanf_gross_earned_income: 0
      person2:
        age: 10
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 0

# --- Per-earner deductions (all three disregards apply per individual) ---

- name: Case 5b, enrolled 2 earners vs 1 earner with same total.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        tanf_gross_earned_income: 200
      person2:
        tanf_gross_earned_income: 200
      person3:
        age: 10
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 106.7
    # Per earner: ($200-$90-$30)*0.6667 = $80*0.6667 = $53.34
    # Unit total: $53.34 + $53.34 = $106.67
    # Compare Case 1 (1 earner at $400): ($400-$90-$30)*0.6667 = $186.68
    # 2 earners get more deductions ($90+$30 each = $240 total vs $120 for 1 earner)

