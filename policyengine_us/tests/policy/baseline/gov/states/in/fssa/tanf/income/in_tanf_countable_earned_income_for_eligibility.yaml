# --- YEAR period (exercises both calendar month paths) ---

- name: Case 9, enrolled over full year.
  period: 2024
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        tanf_gross_earned_income: 4_800
      person2:
        age: 10
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 2_986.7
    # Monthly gross: $4,800 / 12 = $400
    # $400 - $90 = $310, then $310 - $30 = $280
    # Months 1-4 (phase 1): $280 * 0.6667 = $186.68 x 4 = $746.71
    # Months 5-12 (phase 2): $280 x 8 = $2,240.00
    # Annual total: $746.71 + $2,240.00 = $2,986.71

- name: Case 10, applicant over full year.
  period: 2024
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        tanf_gross_earned_income: 4_800
      person2:
        age: 10
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_tanf_countable_earned_income_for_eligibility: 3_720
    # Monthly gross: $4,800 / 12 = $400
    # All 12 months: $400 - $90 = $310
    # Annual total: $310 x 12 = $3,720
