# Tests for in_ccdf_eligible (SPMUnit, MONTH, bool).
# Eligible = income eligible AND asset eligible AND activity eligible AND has
# at least one eligible child. Each case isolates one failing gate while the
# others pass, plus a fully eligible case.
# 2-person FPG 2026 = 21,640/yr (get-on limit 1.5 * = 32,460/yr at 2026-01).

- name: Case 1, all gates pass, eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 22_720
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_eligible: true

- name: Case 2, income too high, ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 90_000
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_eligible: false

- name: Case 3, assets too high, ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 22_720
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_assets: 2_000_000
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_eligible: false

- name: Case 4, no qualifying activity, ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_eligible: false

- name: Case 5, no eligible child (child too old), ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        employment_income: 22_720
      person2:
        age: 14
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IN
  output:
    in_ccdf_eligible: false
