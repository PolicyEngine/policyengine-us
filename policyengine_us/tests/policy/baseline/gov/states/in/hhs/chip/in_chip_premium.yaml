- name: Indiana Hoosier Healthwise Package C tax unit with one child pays 22 dollars monthly.
  period: 2024
  input:
    people:
      child:
        is_chip_eligible: true
        is_chip_eligible_child: true
    tax_units:
      tax_unit:
        members: [child]
        tax_unit_medicaid_income_level: 1.60
    households:
      household:
        members: [child]
        state_code: IN
  output:
    in_chip_premium: 264

- name: Indiana Hoosier Healthwise Package C tax unit with two children pays 33 dollars monthly.
  period: 2024
  input:
    people:
      child1:
        is_chip_eligible: true
        is_chip_eligible_child: true
      child2:
        is_chip_eligible: true
        is_chip_eligible_child: true
    tax_units:
      tax_unit:
        members: [child1, child2]
        tax_unit_medicaid_income_level: 1.60
    households:
      household:
        members: [child1, child2]
        state_code: IN
  output:
    in_chip_premium: 396

