# Tests for Pennsylvania UC monetary eligibility.
# A claimant is monetarily eligible only if ALL FOUR base-year tests pass:
# 1. High-quarter wages >= $1,688 (REQ-001).
# 2. >= 37% of base-year wages paid outside the high quarter (REQ-002).
# 3. >= 18 credit weeks in the base year (REQ-003).
# 4. Total base-year wages >= Part C qualifying wages (REQ-004).
# Reference: § 401(a)(2), § 404(c), § 404(e)(1).

- name: Case 1, all four tests pass - fully eligible.
  period: 2025
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 10_000
        pa_uc_base_year_wages: 28_000
        pa_uc_credit_weeks: 26
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # High-quarter $10,000 >= $1,688.
        # Outside = $18,000 >= 0.37 * $28,000 = $10,360.
        # Credit weeks 26 >= 18.
        # Base year $28,000 >= Part C for $10,000 high-quarter.
        pa_uc_monetarily_eligible: true

- name: Case 2, high-quarter below $1,688 fails REQ-001.
  period: 2025
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 1_500
        pa_uc_base_year_wages: 5_000
        pa_uc_credit_weeks: 26
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # High quarter $1,500 < $1,688 -> fails REQ-001.
        pa_uc_monetarily_eligible: false

- name: Case 3, fewer than 18 credit weeks fails REQ-003.
  period: 2025
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 10_000
        pa_uc_base_year_wages: 28_000
        pa_uc_credit_weeks: 15
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # 15 < 18 credit weeks -> fails REQ-003.
        pa_uc_monetarily_eligible: false

- name: Case 4, fails 37% test (REQ-002).
  period: 2025
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 7_000
        pa_uc_base_year_wages: 10_000
        pa_uc_credit_weeks: 26
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # Outside = $3,000 < 0.37 * $10,000 = $3,700 -> fails REQ-002.
        pa_uc_monetarily_eligible: false

- name: Case 5, fails Part C qualifying-wages test (REQ-004).
  period: 2025
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 5_000
        pa_uc_base_year_wages: 7_500
        pa_uc_credit_weeks: 26
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # Part C for $5,000 high-quarter = $7,956.
        # $7,500 < $7,956 -> fails REQ-004.
        # (Also passes 37% test: outside = $2,500 >= 0.37 * $7,500 = $2,775? No, 2,500 < 2,775 -> also fails REQ-002.)
        pa_uc_monetarily_eligible: false

- name: Case 6, exact boundary - just eligible.
  period: 2025
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 1_688
        pa_uc_base_year_wages: 2_800
        pa_uc_credit_weeks: 18
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # HQ $1,688 >= $1,688 -> passes REQ-001.
        # Outside = $1,112 >= 0.37 * $2,800 = $1,036 -> passes REQ-002.
        # Credit weeks 18 >= 18 -> passes REQ-003.
        # Part C for $1,688 HQ = $2,718; $2,800 >= $2,718 -> passes REQ-004.
        pa_uc_monetarily_eligible: true
