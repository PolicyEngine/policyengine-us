# Tests for Pennsylvania UC Partial Benefit Credit (PBC) (REQ-008).
# PBC = max(30% * WBR, $6), rounded UP to the next higher multiple of $1.
# Reference: § 4(m.3), 43 P.S. § 753(m.3).

- name: Case 1, WBR $68 - PBC is 30% of WBR rounded up.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 1_700
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # WBR $68.
        # 30% of $68 = $20.40; max($20.40, $6) = $20.40; ceil -> $21.
        pa_uc_weekly_benefit_rate: 68
        pa_uc_partial_benefit_credit: 21

- name: Case 2, WBR $100 - PBC is exactly 30% when already an integer.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 2_520
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # WBR = $100 (bracket $2,513-$2,537).
        # 30% of $100 = $30; max($30, $6) = $30; already integer -> $30.
        pa_uc_weekly_benefit_rate: 100
        pa_uc_partial_benefit_credit: 30

