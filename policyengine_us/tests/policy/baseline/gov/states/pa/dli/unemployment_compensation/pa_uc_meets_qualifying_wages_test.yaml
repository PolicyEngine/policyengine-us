        # $3,500 >= $3,194 -> passes.
        pa_uc_meets_qualifying_wages_test: true

- name: Case 4, $12,000 high-quarter with $19,067 base-year wages pass Part C exactly.
  period: 2025
  input:
    people:
      person1:
        age: 40
        pa_uc_highest_quarter_wages: 12_000
        pa_uc_base_year_wages: 19_067
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # $12,000 in bracket $11,988-$12,012 -> Part C qualifying = $19,067.
        # $19,067 >= $19,067 -> passes at exact threshold.
        pa_uc_meets_qualifying_wages_test: true

- name: Case 5, high earner with ample total base-year wages passes Part C.
  period: 2025
  input:
    people:
      person1:
        age: 45
        pa_uc_highest_quarter_wages: 15_388
        pa_uc_base_year_wages: 70_000
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # Max high quarter; $70,000 far exceeds any Part C requirement.
        pa_uc_meets_qualifying_wages_test: true
