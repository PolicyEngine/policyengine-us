# Tests for Pennsylvania UC Maximum Benefit Amount (MBA) (REQ-011).
# Formula: MBA = (WBR + dependent_allowance) x min(credit_weeks, 26).
# Ineligible claimants (< 18 credit weeks) receive $0 MBA.
# Reference: § 404(c), 43 P.S. § 804(c).

- name: Case 1, single no-dependents at mid-income, 26 credit weeks.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 7_625
        pa_uc_base_year_wages: 30_500
        pa_uc_credit_weeks: 26
        employment_income: 0
        is_tax_unit_dependent: false
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # WBR = $300, dep = $0, credit weeks = 26.
        # MBA = ($300 + $0) * 26 = $7,800.
        pa_uc_weekly_benefit_rate: 300
        pa_uc_dependent_allowance: 0
        pa_uc_maximum_weeks: 26
        pa_uc_maximum_benefit_amount: 7_800

- name: Case 2, married with one dependent child, 26 credit weeks.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        pa_uc_highest_quarter_wages: 7_625
        pa_uc_base_year_wages: 30_500
        pa_uc_credit_weeks: 26
        employment_income: 0
        is_tax_unit_dependent: false
      person2:
        age: 33
        employment_income: 0
        is_tax_unit_dependent: false
      person3:
        age: 10
        is_tax_unit_dependent: true
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: PA
  output:
    people:
      person1:
        # WBR = $300, dep = $8 (spouse $5 + 1 child $3), credit weeks = 26.
        # MBA = ($300 + $8) * 26 = $8,008.
        pa_uc_weekly_benefit_rate: 300
        pa_uc_dependent_allowance: 8
        pa_uc_maximum_weeks: 26
        pa_uc_maximum_benefit_amount: 8_008

- name: Case 3, maxed-out WBR with dependents, 26 credit weeks.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 45
        pa_uc_highest_quarter_wages: 50_000
        pa_uc_base_year_wages: 150_000
        pa_uc_credit_weeks: 26
        employment_income: 0
        is_tax_unit_dependent: false
      person2:
        age: 42
        employment_income: 0
        is_tax_unit_dependent: false
      person3:
        age: 12
        is_tax_unit_dependent: true
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: PA
  output:
    people:
      person1:
        # WBR = $605 (cap), dep = $8, credit weeks = 26.
        # MBA = ($605 + $8) * 26 = $15,938.
        pa_uc_weekly_benefit_rate: 605
        pa_uc_dependent_allowance: 8
        pa_uc_maximum_weeks: 26
        pa_uc_maximum_benefit_amount: 15_938

- name: Case 4, ineligible (fewer than 18 credit weeks) yields MBA $0.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 10_000
        pa_uc_base_year_wages: 28_000
        pa_uc_credit_weeks: 10
        employment_income: 0
        is_tax_unit_dependent: false
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # 10 < 18 credit weeks -> monetarily ineligible.
        # MBA = $0.
        pa_uc_monetarily_eligible: false
        pa_uc_maximum_benefit_amount: 0

- name: Case 5, partial-year credit weeks (20) above 18 floor.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 7_625
        pa_uc_base_year_wages: 30_500
        pa_uc_credit_weeks: 20
        employment_income: 0
        is_tax_unit_dependent: false
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # WBR = $300, dep = $0, credit weeks = 20 (below 26 cap).
        # MBA = ($300 + $0) * 20 = $6,000.
        pa_uc_weekly_benefit_rate: 300
        pa_uc_maximum_weeks: 20
        pa_uc_maximum_benefit_amount: 6_000
