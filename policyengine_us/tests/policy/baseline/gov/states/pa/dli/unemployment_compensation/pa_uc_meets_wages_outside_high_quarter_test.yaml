        # Wages outside high quarter = $4,000 - $3,500 = $500.
        # Threshold = 0.37 * $4,000 = $1,480.
        # $500 < $1,480 -> fails.
        pa_uc_meets_wages_outside_high_quarter_test: false

- name: Case 4, uniform quarterly distribution passes the 37% test.
  period: 2025
  input:
    people:
      person1:
        age: 30
        pa_uc_base_year_wages: 20_000
        pa_uc_highest_quarter_wages: 5_000
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # Wages outside high quarter = $20,000 - $5,000 = $15,000.
        # Threshold = 0.37 * $20,000 = $7,400.
        # $15,000 >= $7,400 -> passes.
        pa_uc_meets_wages_outside_high_quarter_test: true

- name: Case 5, all wages in one quarter fail the 37% test.
  period: 2025
  input:
    people:
      person1:
        age: 30
        pa_uc_base_year_wages: 8_000
        pa_uc_highest_quarter_wages: 8_000
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # Wages outside high quarter = $8,000 - $8,000 = $0.
        # Threshold = 0.37 * $8,000 = $2,960.
        # $0 < $2,960 -> fails.
        pa_uc_meets_wages_outside_high_quarter_test: false
