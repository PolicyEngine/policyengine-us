# Tests for Pennsylvania UC 37% wages-outside-high-quarter test (REQ-002).
# At least 37% of total base-year wages must have been paid outside the highest quarter.
# Equivalently: (base_year_wages - high_quarter_wages) >= 0.37 * base_year_wages.
# Reference: § 401(a)(2), 43 P.S. § 801(a)(2).

- name: Case 1, $10,000 base with $7,000 high-quarter fails the 37% test.
  period: 2025
  input:
    people:
      person1:
        age: 30
        pa_uc_base_year_wages: 10_000
        pa_uc_highest_quarter_wages: 7_000
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # Wages outside high quarter = $10,000 - $7,000 = $3,000.
        # Threshold = 0.37 * $10,000 = $3,700.
        # $3,000 < $3,700 -> fails.
        pa_uc_meets_wages_outside_high_quarter_test: false

- name: Case 2, $10,000 base with $5,000 high-quarter passes the 37% test.
  period: 2025
  input:
    people:
      person1:
        age: 30
        pa_uc_base_year_wages: 10_000
        pa_uc_highest_quarter_wages: 5_000
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # Wages outside high quarter = $10,000 - $5,000 = $5,000.
        # Threshold = 0.37 * $10,000 = $3,700.
        # $5,000 >= $3,700 -> passes.
        pa_uc_meets_wages_outside_high_quarter_test: true

