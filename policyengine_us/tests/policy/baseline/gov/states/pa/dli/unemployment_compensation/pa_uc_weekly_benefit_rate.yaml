# Tests for Pennsylvania Unemployment Compensation Weekly Benefit Rate (WBR)
# WBR is looked up in the Table Specified by Law (54 Pa.B. 1863, 2025 table)
# based on the claimant's highest quarter wages in the base year.
# Below $1,688 high-quarter wages -> WBR $0 (REQ-001 fail).
# Minimum WBR $68, maximum WBR $605 (2025).
# Reference: § 404(e)(1); 54 Pa.B. 1863.

- name: Case 1, high-quarter wages below minimum of $1,688 produce $0 WBR.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 1_500
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # $1,500 is below the $1,688 minimum threshold of the Table; no WBR.
        pa_uc_weekly_benefit_rate: 0

- name: Case 2, high-quarter wages $1,687 (one dollar below minimum) yield $0 WBR.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 1_687
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # $1,687 < $1,688 (lowest bracket); no WBR.
        pa_uc_weekly_benefit_rate: 0

- name: Case 3, high-quarter wages $1,700 land in the lowest bracket with WBR $68.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        pa_uc_highest_quarter_wages: 1_700
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    people:
      person1:
        # $1,688 <= $1,700 <= $1,712 -> WBR $68 (minimum).
        pa_uc_weekly_benefit_rate: 68

- name: Case 4, high-quarter wages exactly at the minimum threshold $1,688 yield WBR $68.
  period: 2025
  absolute_error_margin: 0.01
  input:
