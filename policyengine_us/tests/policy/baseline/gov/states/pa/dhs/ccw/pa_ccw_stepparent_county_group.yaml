# Unit tests for pa_ccw_stepparent_county_group
# Tests county to stepparent deduction group mapping (returns int 1-4)
# Uses county_str variable for lookup
# 55 Pa. Code Appendix C

- name: Case 1, Allegheny county is group 1.
  period: 2025
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: PA
        county_str: ALLEGHENY_COUNTY_PA
  output:
    pa_ccw_stepparent_county_group: 1

