# Unit tests for pa_ccw_market_rate
# Tests MCCA daily rate lookup by region x provider type x age group x time category
# defined_for = "pa_ccw_eligible_child" (only eligible children get rates)
# Source: PA DHS OCDEL MCCA rates, effective January 1, 2025

- name: Case 1, region 1 center infant full time.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
      person2:
        age: 0
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
        pa_ccw_provider_type: CENTER
        pa_ccw_age_group: INFANT
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: PA
        pa_ccw_region: 1
  output:
    # Region 1, CENTER, INFANT, FT = $51.13/day
    pa_ccw_market_rate: [0, 51.13]

