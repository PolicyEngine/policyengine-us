# Unit tests for pa_ccw_region
# Tests ELRC region assignment from county_str
# 19 regions per PA DHS ELRC map

- name: Case 1, Erie County maps to region 1.
  period: 2025
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: PA
        county_str: ERIE_COUNTY_PA
  output:
    pa_ccw_region: 1

