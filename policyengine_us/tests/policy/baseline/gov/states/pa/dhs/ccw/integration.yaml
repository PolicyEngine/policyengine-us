- name: Case 6, stepparent deduction reduces adjusted income.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        employment_income: 42_000
        immigration_status: CITIZEN
      person2:
        age: 38
        employment_income: 12_000
        immigration_status: CITIZEN
      person3:
        age: 7
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
        pa_ccw_provider_type: CENTER
        pa_ccw_age_group: SCHOOL_AGE
        childcare_hours_per_day: 4
        childcare_attending_days_per_month: 20
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        pa_ccw_has_stepparent: true
        spm_unit_pre_subsidy_childcare_expenses: 8_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: PA
        county_str: CHESTER_COUNTY_PA
        pa_ccw_region: 5
  output:
    pa_ccw_eligible_child: [false, false, true]

    # === Stepparent Deduction ===
    # Chester County -> Group 4, family size 3: $614/month
    pa_ccw_stepparent_deduction: 614

    # === Adjusted Income ===
    # Gross annual: 42,000 + 12,000 = 54,000
    # Gross monthly: 4,500
    # Stepparent deduction: 614
    # Adjusted monthly: 4,500 - 614 = 3,886
    # Annual: 3,886 * 12 = 46,632
    # Test period is monthly, YEAR variable auto-divides by 12: 46,632 / 12 = 3,886
    pa_ccw_adjusted_income: 3_886

    # FPG family of 3: 26,650
    # 200% = 53,300
    # 46,632 <= 53,300 -> income eligible
    pa_ccw_income_eligible: true
    pa_ccw_eligible: true

    # === Copay ===
    # Adjusted income 46,632, FPG fam 3 = 26,650
    # 46,632 > 26,650 -> rate = 7%
    # round(46,632 * 0.07 / 52) = round(62.78) = 63
    # max(63, 5) = $63/week
    # Monthly: 63 * 52 / 12 = 273
    pa_ccw_copay: 273

    # === MCCA Rate ===
    # Region 5, CENTER, SCHOOL_AGE, PT (4hrs < 5) = $35.97/day
    pa_ccw_market_rate: [0, 0, 35.97]

    # === Max Monthly Payment ===
    # 35.97 * 20 = $719.40
    pa_ccw_maximum_monthly_payment: [0, 0, 719.40]

    # === Benefit ===
    # Monthly expenses: 8,000 / 12 = 666.67
    # Uncapped: max(666.67 - 273, 0) = 393.67
    # MCCA max: 719.40
    # Benefit: min(393.67, 719.40) = 393.67
    pa_ccw: 393.67

- name: Case 7, TANF enrolled family ineligible per 3042.15(a).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
        pa_ccw_provider_type: CENTER
        pa_ccw_age_group: PRE_SCHOOL
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 20
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: PA
        pa_ccw_region: 1
  output:
    pa_ccw_eligible_child: [false, true]

    # Income is fine: adjusted 12,000 <= 42,300
    pa_ccw_income_eligible: true

    # But TANF enrolled -> NOT eligible per 55 Pa. Code § 3042.15(a)
    pa_ccw_eligible: false
    pa_ccw: 0
