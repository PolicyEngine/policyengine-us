- name: Case 6, activity ineligible parent.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000
        immigration_status: CITIZEN
        weekly_hours_worked: 5
        is_full_time_student: false
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: PA
  output:
    # Works 5 hrs < 10 (training combo) -> activity ineligible
    pa_ccw_eligible: false
