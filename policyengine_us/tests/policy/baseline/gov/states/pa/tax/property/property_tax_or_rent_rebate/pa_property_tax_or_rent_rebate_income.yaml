- name: Case 1, federal AGI is included in rebate income.
  period: 2025
  input:
    people:
      person1:
        age: 65
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 30_000
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    pa_property_tax_or_rent_rebate_income: 30_000

- name: Case 2, Social Security income is half-counted.
  period: 2025
  input:
    people:
      person1:
        age: 65
        social_security: 40_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    pa_property_tax_or_rent_rebate_income: 20_000

- name: Case 3, SSI and railroad benefits are half-counted.
  period: 2025
  input:
    people:
      person1:
        age: 65
        ssi_reported: 2_000
        railroad_benefits: 10_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    pa_property_tax_or_rent_rebate_income: 6_000

- name: Case 4, tax-exempt interest and retirement income are included.
  period: 2025
  input:
    people:
      person1:
        age: 65
        tax_exempt_interest_income: 2_000
        tax_exempt_pension_income: 3_000
        tax_exempt_retirement_distributions: 4_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 10_000
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    pa_property_tax_or_rent_rebate_income: 19_000

- name: Case 5, dependent Social Security income is excluded.
  period: 2025
  input:
    people:
      person1:
        age: 65
      person2:
        age: 10
        social_security: 40_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: PA
  output:
    pa_property_tax_or_rent_rebate_income: 0

- name: Case 6, CSRS income is reduced by the PA-1000 Line 12 exclusion.
  period: 2025
  input:
    people:
      person1:
        age: 65
        csrs_retirement_pay: 20_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    pa_property_tax_or_rent_rebate_income: 8_568
