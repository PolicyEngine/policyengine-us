- name: Case 1, lowest income bracket receives the maximum standard rebate.
  period: 2025
  input:
    people:
      person1:
        age: 65
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 8_550
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    pa_property_tax_or_rent_rebate: 1_000

- name: Case 2, rebate follows the second income bracket.
  period: 2025
  input:
    people:
      person1:
        age: 65
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 8_551
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    pa_property_tax_or_rent_rebate: 770

- name: Case 3, rebate follows the top income bracket.
  period: 2025
  input:
    people:
      person1:
        age: 65
        rent: 9_600
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 48_110
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    pa_property_tax_or_rent_rebate: 380

- name: Case 4, rebate is limited by rent and property tax paid.
  period: 2025
  input:
    people:
      person1:
        age: 65
        real_estate_taxes: 300
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 8_000
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    pa_property_tax_or_rent_rebate: 300

- name: Case 5, renter rebate is limited to 20 percent of rent paid.
  period: 2025
  input:
    people:
      person1:
        age: 65
        rent: 1_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 8_000
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    pa_property_tax_or_rent_rebate: 200

- name: Case 6, half-counted Social Security determines the rebate bracket.
  period: 2025
  input:
    people:
      person1:
        age: 65
        social_security: 40_000
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: PA
  output:
    pa_property_tax_or_rent_rebate: 380
