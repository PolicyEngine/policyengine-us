- name: Only head is 65+ joint filer receives full deduction
  period: 2024
  input:
    people:
      person1:
        age: 70
        is_tax_unit_head_or_spouse: true
      person2:
        age: 40
        is_tax_unit_head_or_spouse: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        va_age_deduction: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    va_age_deduction_person: [12_000, 0]

- name: Both spouses 65+ split deduction equally
  period: 2024
  input:
    people:
      person1:
        age: 72
        is_tax_unit_head_or_spouse: true
      person2:
        age: 68
        is_tax_unit_head_or_spouse: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        va_age_deduction: 24_000
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    va_age_deduction_person: [12_000, 12_000]

- name: Neither spouse 65+ receives zero deduction
  period: 2024
  input:
    people:
      person1:
        age: 50
        is_tax_unit_head_or_spouse: true
      person2:
        age: 45
        is_tax_unit_head_or_spouse: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        va_age_deduction: 0
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    va_age_deduction_person: [0, 0]

- name: Single filer 65+ receives full deduction
  period: 2024
  input:
    people:
      person1:
        age: 70
        is_tax_unit_head_or_spouse: true
    tax_units:
      tax_unit:
        members: [person1]
        va_age_deduction: 12_000
    households:
      household:
        members: [person1]
        state_code: VA
  output:
    va_age_deduction_person: [12_000]

- name: Dependent over 65 does not receive age deduction
  period: 2024
  input:
    people:
      person1:
        age: 70
        is_tax_unit_head_or_spouse: true
      person2:
        age: 70
        is_tax_unit_head_or_spouse: false
    tax_units:
      tax_unit:
        members: [person1, person2]
        va_age_deduction: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    va_age_deduction_person: [12_000, 0]

- name: Both spouses 65+ split reduced deduction equally
  period: 2024
  input:
    people:
      person1:
        age: 72
        is_tax_unit_head_or_spouse: true
      person2:
        age: 68
        is_tax_unit_head_or_spouse: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        va_age_deduction: 9_000
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    va_age_deduction_person: [4_500, 4_500]
