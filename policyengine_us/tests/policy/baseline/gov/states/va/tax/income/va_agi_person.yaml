- name: Attributing the state adjusted gross income based on federal AGI
  period: 2021
  input:
    people:
      person1:
        adjusted_gross_income_person: 10_000
      person2:
        adjusted_gross_income_person: 30_000
    tax_units:
      tax_unit:
        members: [person1, person2]
        va_subtractions: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    va_agi_person: [7_500, 22_500]

- name: One person without income
  period: 2021
  input:
    people:
      person1:
        adjusted_gross_income_person: 10_000
      person2:
        adjusted_gross_income_person: 0
    tax_units:
      tax_unit:
        members: [person1, person2]
        va_subtractions: 2_000
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    va_agi_person: [8_000, 0]

- name: Age deduction applied directly to eligible person, not prorated
  period: 2021
  input:
    people:
      person1:
        adjusted_gross_income_person: 11_753
        age: 75
        is_tax_unit_head_or_spouse: true
      person2:
        adjusted_gross_income_person: 55_728
        age: 40
        is_tax_unit_head_or_spouse: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        va_subtractions: 12_000
        va_age_deduction: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    va_agi_person: [-247, 55_728]
