- name: Case 1, Group II parent at the LIFC threshold is parent eligible.
  period: 2026
  input:
    people:
      person1:
        age: 30
        employment_income: 9_204
        is_tax_unit_head: true
      person2:
        age: 7
        is_tax_unit_dependent: true
      person3:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
        tax_unit_count_dependents: 2
    households:
      household:
        members: [person1, person2, person3]
        state_code: VA
        state_group_str: CONTIGUOUS_US
        county: HENRICO_COUNTY_VA
  output:
    is_parent_for_medicaid: [true, false, false]

