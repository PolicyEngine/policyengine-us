# Virginia CCSP activity eligibility tests
# Simplified proxy: parent meets activity requirement if
#   weekly_hours_worked >= min hours threshold OR is_in_k12_school
# All heads/spouses must meet requirement (same pattern as RI CCAP)

- name: Case 1, parent working full time.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 40
      person2:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    va_ccsp_activity_eligible: true

- name: Case 2, parent not working enough hours.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 5
        is_full_time_student: false
        is_in_k12_school: false
      person2:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    va_ccsp_activity_eligible: false

- name: Case 3, parent is student.
  period: 2024-01
  input:
    people:
      person1:
        age: 22
        weekly_hours_worked: 0
        is_in_k12_school: true
      person2:
        age: 2
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # In school -> meets activity requirement
    va_ccsp_activity_eligible: true

- name: Case 4, two parents both working.
  period: 2024-01
  input:
    people:
      person1:
        age: 35
        weekly_hours_worked: 40
      person2:
        age: 33
        weekly_hours_worked: 30
      person3:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: VA
  output:
    va_ccsp_activity_eligible: true

- name: Case 5, two parents one not meeting requirement.
  period: 2024-01
  input:
    people:
      person1:
        age: 35
        weekly_hours_worked: 40
      person2:
        age: 33
        weekly_hours_worked: 0
        is_full_time_student: false
        is_in_k12_school: false
      person3:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: VA
  output:
    # Person2 is head/spouse but fails activity test
    va_ccsp_activity_eligible: false

- name: Case 6, two parents one works other is disabled.
  period: 2024-01
  input:
    people:
      person1:
        age: 35
        weekly_hours_worked: 40
      person2:
        age: 33
        weekly_hours_worked: 0
        is_full_time_student: false
        is_disabled: true
      person3:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: VA
  output:
    # Person1 works (active), person2 disabled (meets requirement)
    va_ccsp_activity_eligible: true
