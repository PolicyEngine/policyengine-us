# Virginia CCSP child eligibility edge case tests
# Focus: age boundaries (12/13 for normal, 17/18 for disabled), newborn, non-dependent

- name: Case 1, child age 12 just under threshold.
  period: 2024-01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 12
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # age 12 < 13 -> eligible
    va_ccsp_child_eligible: [false, true]

- name: Case 2, newborn age 0.
  period: 2024-01
  input:
    people:
      person1:
        age: 25
      person2:
        age: 0
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # age 0 < 13 -> eligible
    va_ccsp_child_eligible: [false, true]

- name: Case 3, disabled child age 17 just under threshold.
  period: 2024-01
  input:
    people:
      person1:
        age: 45
      person2:
        age: 17
        is_tax_unit_dependent: true
        is_disabled: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # disabled, age 17 < 18 -> eligible
    va_ccsp_child_eligible: [false, true]

- name: Case 4, disabled child age 13 still eligible.
  period: 2024-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 13
        is_tax_unit_dependent: true
        is_disabled: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # disabled, age 13 < 18 -> eligible (would be ineligible if not disabled)
    va_ccsp_child_eligible: [false, true]

- name: Case 5, non-disabled child age 13 is ineligible but disabled same-age is eligible.
  period: 2024-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 13
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status: CITIZEN
      person3:
        age: 13
        is_tax_unit_dependent: true
        is_disabled: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: VA
  output:
    # person2: age 13, not disabled -> 13 >= 13 -> ineligible
    # person3: age 13, disabled -> 13 < 18 -> eligible
    va_ccsp_child_eligible: [false, false, true]

- name: Case 6, dependent child who is a legal permanent resident.
  period: 2024-01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 6
        is_tax_unit_dependent: true
        immigration_status: LEGAL_PERMANENT_RESIDENT
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # LPR is a qualified immigrant -> eligible
    va_ccsp_child_eligible: [false, true]

- name: Case 7, child under 13 but not a dependent.
  period: 2024-01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 10
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Not a dependent -> ineligible even though age < 13
    va_ccsp_child_eligible: [false, false]
