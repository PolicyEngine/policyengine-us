- name: Case 8, income cap binds with high copay bracket and low income.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # Need FPG ratio > 300% but low absolute income
        # Use large family to get low FPG
        # Single person: FPG = 15,060 for size 1 (not possible with child)
        # Family of 2: FPG = 20,440
        # Income = 36,000, Monthly = 3,000
        # FPG ratio: 3,000/(20,440/12) = 3,000/1,703.33 = 1.761 -> $60
        # Not high enough. Need >300%: income > 61,320
        # But that makes income cap high too.
        # Better: 3 children at $180 each = $540
        # With income = 84,000, cap = 84,000*0.07/12 = 490
        # 490 < 540 -> cap binds!
        employment_income: 84_000
        immigration_status: CITIZEN
      person2:
        age: 10
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
      person3:
        age: 7
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
      person4:
        age: 4
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        va_ccsp_enrolled: true
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: VA
  output:
    # Monthly income: 84,000/12 = 7,000
    # FPG size 4: 31,200, monthly = 2,600
    # FPG ratio: 7,000/2,600 = 2.6923 -> $120/child
    # 3 children, scale total: $120 * 3 = $360
    # Income cap: 84,000 * 0.07 / 12 = 490
    # Copay: min(360, 490) = $360
    va_ccsp_copay: 360

