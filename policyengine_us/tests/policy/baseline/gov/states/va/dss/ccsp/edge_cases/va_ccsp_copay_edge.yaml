        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
      person3:
        age: 7
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
      person4:
        age: 4
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        va_ccsp_enrolled: true
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: VA
