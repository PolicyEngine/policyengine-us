# Virginia CCSP child eligibility tests
# Tests: age < 13 (or < 18 if disabled), immigration, residency
# Uses federal CCDF variables: is_ccdf_age_eligible, is_ccdf_immigration_eligible_child

- name: Case 1, child under 13 and citizen.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    va_ccsp_child_eligible: [false, true]

- name: Case 2, child exactly age 13 is ineligible.
  period: 2024-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 13
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    va_ccsp_child_eligible: [false, false]

- name: Case 3, disabled child age 15 is eligible.
  period: 2024-01
