- name: Case 5, child on Medicaid waives income test for unit.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        receives_medicaid: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    va_ccsp_income_test_waived: true
