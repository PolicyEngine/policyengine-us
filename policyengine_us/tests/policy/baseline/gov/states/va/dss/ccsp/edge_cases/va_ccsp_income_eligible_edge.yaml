# === ENROLLED 85% SMI BOUNDARY ===

- name: Case 8, enrolled family income just below 85% SMI.
  period: 2024-01
  input:
    people:
      person1:
        # SMI size 2: 121,130 * 0.68 = 82,368.40
        # 85% SMI = 82,368.40 * 0.85 = 70,013.14
        # Monthly: 82,368.40/12 * 0.85 = 5,834.43
        # Annual 70,013 -> monthly 5,834.42 <= 5,834.43 -> eligible
        employment_income: 70_013
      person2:
        age: 8
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_enrolled: true
        va_ccsp_locality_group: GROUP_I
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Enrolled -> 85% SMI = 70,013.14
    # 70,013 <= 70,013.14 -> eligible
    va_ccsp_income_eligible: true

- name: Case 9, enrolled family income $1 above 85% SMI.
  period: 2024-01
  input:
    people:
      person1:
