  output:
    # 85% SMI = 70,013.14
    # 70,014 > 70,013.14 -> ineligible
    va_ccsp_income_eligible: false

# === YOUNG CHILD SMI EXCEPTION BOUNDARY ===

- name: Case 10, young child age 5 triggers SMI exception.
  period: 2024-01
  input:
    people:
      person1:
        employment_income: 48_000
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_locality_group: GROUP_I
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Group I: 150% FPG = 30,660
    # Young child (age 5 < 6): also check 85% SMI = 70,013.14
    # Use max(30,660, 70,013.14) = 70,013.14
    # 48,000 <= 70,013.14 -> eligible
    va_ccsp_income_eligible: true

- name: Case 11, child age 6 does NOT trigger SMI exception.
  period: 2024-01
  input:
    people:
      person1:
        employment_income: 48_000
      person2:
        age: 6
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_locality_group: GROUP_I
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Group I: 150% FPG = 30,660
    # Child age 6 not < 6: no SMI exception
    # 48,000 > 30,660 -> ineligible
    va_ccsp_income_eligible: false

