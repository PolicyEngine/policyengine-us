# Virginia CCSP income eligibility edge case tests
# Focus: exact threshold boundaries for each locality group,
#   enrolled vs not enrolled, young child SMI exception boundary
#
# 2024 FPG (contiguous US): first_person = 15,060, additional = 5,380
#   Family of 2: 20,440
#
# 2024 VA SMI base (effective 2023-10-01): 121,130
#   Size 2: 121,130 * 0.68 = 82,368.40
#   85% SMI size 2: 70,013.14
#
# Group I: 150% FPG size 2 = 20,440 * 1.50 = 30,660
# Group II: 160% FPG size 2 = 20,440 * 1.60 = 32,704
# Group III: 185% FPG size 2 = 20,440 * 1.85 = 37,814
#
# Income is tested as annual (SPMUnit MONTH reads YEAR income / 12).
# Threshold comparison is also monthly: annual_threshold / 12.
# So we test with annual income vs annual threshold equivalents.

# === GROUP I BOUNDARY (150% FPG) ===

- name: Case 1, Group I income $1 below 150% FPG threshold.
  period: 2024-01
  input:
    people:
      person1:
        employment_income: 30_659
      person2:
        age: 8
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_locality_group: GROUP_I
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # 150% FPG = 30,660
    # 30,659 <= 30,660 -> eligible
    va_ccsp_income_eligible: true

- name: Case 2, Group I income exactly at 150% FPG threshold.
  period: 2024-01
  input:
    people:
      person1:
        employment_income: 30_660
      person2:
        age: 8
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_locality_group: GROUP_I
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # 150% FPG = 30,660
    # 30,660 <= 30,660 -> eligible (at threshold = eligible)
    va_ccsp_income_eligible: true

- name: Case 3, Group I income $1 above 150% FPG threshold.
  period: 2024-01
  input:
    people:
      person1:
        employment_income: 30_661
      person2:
        age: 8
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_locality_group: GROUP_I
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # 150% FPG = 30,660
    # 30,661 > 30,660 -> ineligible
    va_ccsp_income_eligible: false

