  input:
    people:
      person1:
        employment_income: 50_000
      person2:
        age: 8
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VA
        county: FAIRFAX_COUNTY_VA
  output:
    # Fairfax: 250% FPG = 20,440 * 2.5 = 51,100
    # 85% SMI = 70,013.14
    # Limit: min(51,100, 70,013.14) = 51,100
    # 50,000 <= 51,100 -> eligible
    va_ccsp_income_eligible: true

