- name: Case 1, newborn is infant.
  period: 2024
  input:
    people:
      person1:
        age: 0
    households:
      household:
        members: [person1]
        state_code: VA
  output:
    va_ccsp_care_age_group: INFANT

- name: Case 2, 12 month old (1 year) is still infant.
  period: 2024
  input:
    people:
      person1:
        age: 1
    households:
      household:
        members: [person1]
        state_code: VA
  output:
    # 12 months < 16 month cutoff -> infant
    va_ccsp_care_age_group: INFANT

- name: Case 3, 15 month old is still infant.
  period: 2024
  input:
    people:
      person1:
        age: 1.25
    households:
      household:
        members: [person1]
        state_code: VA
  output:
    # 15 months < 16 month cutoff -> infant
    va_ccsp_care_age_group: INFANT

- name: Case 4, 16 month old is toddler.
