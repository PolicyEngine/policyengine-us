- name: Case 4, zero income family gets full subsidy.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Zero income -> $0 copay
    # Monthly expenses: 10,000 / 12 = 833.33
    # Benefit before MRR: max(833.33 - 0, 0) = $833.33
    # Default county ACCOMACK -> SOUTHEASTERN
    # Age 5 = 60 months -> SCHOOL_AGE, CENTER rate = $30/day
    # MRR: $30 * 23 = $690
    # Benefit: min(833.33, 690) = $690
    va_ccsp: 690
