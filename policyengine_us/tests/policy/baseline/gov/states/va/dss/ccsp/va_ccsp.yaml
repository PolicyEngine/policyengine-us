# Virginia CCSP benefit amount tests
# Benefit = min(max(childcare_expenses - copay, 0), monthly_mrr)

- name: Case 1, basic benefit calculation.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Monthly income: 36,000 / 12 = 3,000
    # FPG size 2: 20,440 / 12 = 1,703.33
    # FPG ratio: 3,000 / 1,703.33 = 1.7610 -> $60 per child
    # 1 eligible child, scale total = $60
    # Income cap: 36,000 * 0.07 / 12 = 210
    # Copay: min(60, 210) = $60
    # Monthly expenses: 12,000 / 12 = 1,000
    # Benefit before MRR: max(1,000 - 60, 0) = $940
    # Default county ACCOMACK -> SOUTHEASTERN
    # Age 5 = 60 months -> SCHOOL_AGE, CENTER rate = $30/day
    # MRR: $30 * 23 = $690
    # Benefit: min(940, 690) = $690
    va_ccsp: 690

- name: Case 2, copay exceeds expenses so benefit is zero.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 72_000
        immigration_status: CITIZEN
      person2:
        age: 8
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 1_200
        va_ccsp_enrolled: true
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Monthly income: 72,000 / 12 = 6,000
    # FPG size 2: 20,440 / 12 = 1,703.33
    # FPG ratio: 6,000 / 1,703.33 = 3.5218 -> $180 per child
    # 1 eligible child, scale total = $180
    # Income cap: 72,000 * 0.07 / 12 = 420
    # Copay: min(180, 420) = $180
    # Monthly expenses: 1,200 / 12 = 100
    # Benefit: max(100 - 180, 0) = $0
    va_ccsp: 0

