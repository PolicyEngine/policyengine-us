# Eligible child age test.
# Under 13 -> eligible; 13 to under 18 -> eligible only if requires constant
# care (is_disabled proxy); must be a tax-unit dependent and immigration
# eligible (BEM 703 p.1-2, p.14).

- name: Case 1, young child under 13 is an eligible child.
  period: 2026-01
  input:
    people:
      person1:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_ccap_eligible_child: true

- name: Case 2, child at exactly 13 is not eligible without constant care.
  period: 2026-01
  input:
    people:
      person1:
        age: 13
        is_disabled: false
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_ccap_eligible_child: false

- name: Case 3, disabled child age 13 to under 18 is an eligible child.
  period: 2026-01
  input:
    people:
      person1:
        age: 15
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_ccap_eligible_child: true

- name: Case 4, child at exactly 18 is not eligible even with constant care.
  period: 2026-01
  input:
    people:
      person1:
        age: 18
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_ccap_eligible_child: false

- name: Case 5, non-disabled child age 16 is not eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 16
        is_disabled: false
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_ccap_eligible_child: false

- name: Case 6, young child without acceptable immigration status is not eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: UNDOCUMENTED
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_ccap_eligible_child: false

- name: Case 7, adult is not an eligible child.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_ccap_eligible_child: false

# Edge cases.

- name: Case 8, child just under the 13 age limit is an eligible child.
  period: 2026-01
  input:
    people:
      person1:
        age: 12
        is_disabled: false
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    # 12 < 13 child age limit -> eligible
    mi_ccap_eligible_child: true

- name: Case 9, disabled child just under the 18 limit is an eligible child.
  period: 2026-01
  input:
    people:
      person1:
        age: 17
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    # 17 < 18 constant-care age limit -> eligible
    mi_ccap_eligible_child: true

- name: Case 10, newborn is an eligible child.
  period: 2026-01
  input:
    people:
      person1:
        age: 0
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    # Birth (age 0) is below the 13 age limit -> eligible
    mi_ccap_eligible_child: true
