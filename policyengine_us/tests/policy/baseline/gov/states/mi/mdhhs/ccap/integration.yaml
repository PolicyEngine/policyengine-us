# Edge cases.

- name: Case 9, self-employment loss does not inflate the subsidy.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        self_employment_income: -60_000  # -5,000/mo loss
        weekly_hours_worked_before_lsr: 40  # authorized 80
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        mi_ccap_provider_type: CENTER
        mi_ccap_star_rating: STAR_1
        pre_subsidy_childcare_expenses: 30_000  # 2,500/mo, cap does not bind
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        mi_ccap_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    # Negative countable income is below the entry limit -> income eligible
    mi_ccap_income_eligible: true
    mi_ccap_eligible: true
    mi_ccap_authorized_hours: 80
    # Authorized 80 -> 61+ block tier 90; 7.15 x 90 = 643.50 per pay period
    mi_ccap_block_payment: [0, 643.50]
    # Negative income maps to the lowest band -> family contribution 0,
    # not a negative amount that would inflate the benefit
    mi_ccap_family_contribution: 0
    # benefit = 643.50 x 2.16667 = 1,394.25 (block payment only, FC 0)
    mi_ccap: 1_394.25

- name: Case 10, subsidy capped tightly at a low actual child care charge.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 18_000  # 1,500/mo -> size 2 band 0, no FC
        weekly_hours_worked_before_lsr: 40  # authorized 80
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        mi_ccap_provider_type: CENTER
        mi_ccap_star_rating: STAR_1
        pre_subsidy_childcare_expenses: 3_000  # 250/mo, well below the block payment
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        mi_ccap_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    mi_ccap_eligible: true
    mi_ccap_authorized_hours: 80
    # Authorized 80 -> 61+ block tier 90; 7.15 x 90 = 643.50/pp -> monthly 1,394.25
    mi_ccap_block_payment: [0, 643.50]
    mi_ccap_family_contribution: 0
    # Monthly charge is only 250.00, below the uncapped subsidy -> capped at 250.00
    mi_ccap: 250.00

- name: Case 11, two parents at a 5 Star center, family contribution at the cap.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 34
        employment_income: 60_000  # 5,000/mo
        weekly_hours_worked_before_lsr: 45  # authorized 90
      person2:
        age: 32
        weekly_hours_worked_before_lsr: 30  # 60 biweekly
      person3:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        mi_ccap_provider_type: CENTER
        mi_ccap_star_rating: STAR_2
        pre_subsidy_childcare_expenses: 30_000
      person4:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        mi_ccap_provider_type: CENTER
        mi_ccap_star_rating: STAR_2
        pre_subsidy_childcare_expenses: 30_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        mi_ccap_enrolled: false
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: MI
  output:
    mi_ccap_eligible_child: [false, false, true, true]
    # Size 4, 5,000 <= 5,358 entry -> income eligible
    mi_ccap_income_eligible: true
    mi_ccap_eligible: true
    # Highest need = person1's 90 biweekly -> tier 90
    mi_ccap_authorized_hours: 90
    # 2 Star center: infant 7.55, preschool 5.45; x 90 authorized hours
    # person3: 7.55 x 90 = 679.50; person4: 5.45 x 90 = 490.50
    mi_ccap_block_payment: [0, 0, 679.50, 490.50]
    # 5,000/mo -> size 4 band 1; STAR_2 is below the 3-star waiver, so both pay.
    # per-child FC 15 x 2 = 30, family cap 45 -> 30/pp
    mi_ccap_family_contribution: 30
    # monthly: person3 679.50 x 2.16667 = 1,472.25; person4 490.50 x 2.16667 = 1,062.75
    # total = 2,535.00; monthly FC = 30 x 2.16667 = 65.00
    # benefit = 2,535.00 - 65.00 = 2,470.00
    mi_ccap: 2_470.00
