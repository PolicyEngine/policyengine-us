- name: Case 8, annual subsidy flows to the federal child care subsidies total.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 42_000  # 3,500/mo
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        mi_ccap_provider_type: CENTER
        mi_ccap_star_rating: STAR_1
        pre_subsidy_childcare_expenses: 30_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        mi_ccap_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: MI
