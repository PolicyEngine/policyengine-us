- name: Case 26, child SSI recipient gets Independent Living individual rate.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        age: 8
        is_disabled: true
        # Child receives federal SSI at 2024 individual FBR
        # $943/mo = $11,316/yr
        ssi: 11_316
        # mi_ssp_living_arrangement defaults to INDEPENDENT_LIVING
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    # BEM 660 covers all SSI recipients including children; RFT 248
    # "Eligible Child" rate equals the IL individual rate ($14/mo).
    mi_ssp_eligible: true
    mi_ssp_individual_amount: 14
    mi_ssp_person: 14
    mi_ssp: 14

- name: Case 27, Independent Living person with no regular federal SSI payment is ineligible.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        # $30,000/yr social security retirement = $2,500/mo. After the
        # $20 general unearned income exclusion, annual countable
        # unearned ≈ $29,760. Uncapped SSI = $11,316 - $29,760 = -$18,444.
        # Monthly spillover = -uncapped_ssi/12 ≈ $1,537. BEM 660 limits
        # MDHHS-issued Independent Living SSPs to months with a regular
        # first-of-month federal SSI benefit, so this person is not
        # eligible for the MDHHS-issued payment.
        social_security_retirement: 30_000
        mi_ssp_living_arrangement: INDEPENDENT_LIVING
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    # MDHHS-administered Independent Living category fails the federal
    # SSI payment gate.
    mi_ssp_eligible: false
    mi_ssp_person: 0
    mi_ssp: 0

- name: Case 28, Personal Care recipient in spillover window receives partial SSP.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        # uncapped_ssi annual = -600 → monthly spillover = $50.
        # Personal Care SSP base = $157.50/mo. Result = max_(0, 157.50 - 50) = $107.50.
        uncapped_ssi: -600
        mi_ssp_living_arrangement: PERSONAL_CARE
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    # Federal SSI exhausted ($0) but state supplement only partially
    # spilled into → recipient gets $107.50 SSP.
    mi_ssp_eligible: true
    mi_ssp_person: 107.50
    mi_ssp: 107.50
