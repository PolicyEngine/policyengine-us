- name: Case 1, Healthy Michigan contribution is zero after the MI Health Account ends.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
    tax_units:
      tax_unit:
        members: [person1]
        medicaid_magi: 18_000
        tax_unit_medicaid_income_level: 1.20
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_healthy_michigan_contribution: 0

- name: Case 2, Healthy Michigan adult above 100 percent FPL pays two percent of income in 2023.
  period: 2023
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
    tax_units:
      tax_unit:
        members: [person1]
        medicaid_magi: 18_000
        tax_unit_medicaid_income_level: 1.20
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_healthy_michigan_contribution: 360

- name: Case 3, Healthy Michigan adult at or below 100 percent FPL owes no contribution.
  period: 2023
  absolute_error_margin: 0.01
