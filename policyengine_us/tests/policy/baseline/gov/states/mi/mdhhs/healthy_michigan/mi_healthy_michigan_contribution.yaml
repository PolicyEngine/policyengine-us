    people:
      person1:
        age: 30
    tax_units:
      tax_unit:
        members: [person1]
        medicaid_magi: 12_000
        tax_unit_medicaid_income_level: 1
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_healthy_michigan_contribution: 0

- name: Case 4, non-adult Healthy Michigan enrollee owes no contribution.
  period: 2023
