# REQ-024: Department hourly rate looked up by provider type, star/quality
# level, and age group (RFT 270 Table 2, eff 2024-09-22). Tested across all
# three provider types and a spread of star/level and age combinations.
# Rate variable is defined_for the eligible child, so each test child is a
# young citizen dependent.

- name: Case 1, center, 1 Star, infant/toddler.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        mi_ccap_provider_type: CENTER
        mi_ccap_star_rating: STAR_1
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_ccap_hourly_rate: 7.15

