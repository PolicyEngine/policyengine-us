- name: Case 1, Michigan resident categorically SSI-eligible is eligible.
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_ssp_eligible: true

- name: Case 2, Michigan resident not SSI-eligible is ineligible.
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: false
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_ssp_eligible: false

- name: Case 3, non-Michigan resident categorically SSI-eligible is ineligible.
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
    households:
      household:
        members: [person1]
        state_code: OH
  output:
    mi_ssp_eligible: false

- name: Case 4, categorically eligible with high income is still mi_ssp_eligible (spillover handles income in benefit formula).
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        ssi: 0
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    # Per Delaware SSP pattern, the income test is handled in the
    # mi_ssp_person spillover formula via uncapped_ssi, not in the
    # eligibility gate. is_ssi_eligible alone (categorical-only) passes.
    mi_ssp_eligible: true
