- name: Case 1, Michigan resident categorically SSI-eligible is eligible.
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_ssp_eligible: true

- name: Case 2, Michigan resident not SSI-eligible is ineligible.
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: false
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_ssp_eligible: false

- name: Case 3, non-Michigan resident categorically SSI-eligible is ineligible.
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
    households:
      household:
        members: [person1]
        state_code: OH
  output:
    mi_ssp_eligible: false

- name: Case 4, MDHHS-administered category with no federal SSI payment is ineligible.
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        ssi: 0
        mi_ssp_living_arrangement: INDEPENDENT_LIVING
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    # BEM 660 limits MDHHS-issued SSPs to months with a regular
    # first-of-month federal SSI benefit.
    mi_ssp_eligible: false

- name: Case 5, SSA-administered facility category keeps categorical spillover eligibility.
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        ssi: 0
        mi_ssp_living_arrangement: PERSONAL_CARE
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    # SSA-administered facility categories use the combined SSI/SSP
    # income calculation; mi_ssp_person applies the spillover reduction.
    mi_ssp_eligible: true
