# Each parent/substitute-parent must have a valid need
# reason; in a two-parent household both must (BEM 703 p.4-14). Need reasons
# modeled: employment (hours worked), approved activity / high-school
# completion (full-time student), family preservation (protective services).
# Activity hours use weekly_hours_worked_before_lsr to avoid a labor-supply
# circular dependency.

- name: Case 1, single working parent has a need reason.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 35
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    mi_ccap_activity_eligible: true

- name: Case 2, single non-working non-student parent has no need reason.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 0
        is_full_time_student: false
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    mi_ccap_activity_eligible: false

- name: Case 3, full-time student parent has a need reason.
  period: 2026-01
  input:
    people:
      person1:
        age: 22
        weekly_hours_worked_before_lsr: 0
        is_full_time_student: true
      person2:
        age: 2
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    mi_ccap_activity_eligible: true

- name: Case 4, parent needing protective services has a need reason.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 0
        is_full_time_student: false
        receives_or_needs_protective_services: true
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    mi_ccap_activity_eligible: true

- name: Case 5, two-parent household with both parents working is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 32
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 20
      person3:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MI
  output:
    mi_ccap_activity_eligible: true

- name: Case 6, two-parent household with one parent lacking a need reason is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 32
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 0
        is_full_time_student: false
      person3:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MI
  output:
    mi_ccap_activity_eligible: false

# Edge cases.

- name: Case 7, two-parent household with mixed need reasons is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 32
        weekly_hours_worked_before_lsr: 40  # employed
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 0
        is_full_time_student: true  # approved activity / HS completion
      person3:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MI
  output:
    # Each P/SP has a distinct valid need reason -> eligible
    mi_ccap_activity_eligible: true

- name: Case 8, parent working a single hour per week meets the need reason.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 1  # any positive hours counts as employed
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    # is_employed = hours_worked > 0, so 1 hour is enough
    mi_ccap_activity_eligible: true
