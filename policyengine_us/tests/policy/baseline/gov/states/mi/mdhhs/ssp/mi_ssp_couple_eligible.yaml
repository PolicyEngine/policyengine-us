- name: Case 1, joint claim with both eligible in same LA returns true.
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_aged_blind_disabled: true
        is_tax_unit_head_or_spouse: true
        mi_ssp_living_arrangement: INDEPENDENT_LIVING
      person2:
        is_ssi_aged_blind_disabled: true
        is_tax_unit_head_or_spouse: true
        mi_ssp_living_arrangement: INDEPENDENT_LIVING
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    mi_ssp_couple_eligible: [true, true]

- name: Case 2, joint claim with both eligible but different LAs returns false.
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_aged_blind_disabled: true
        is_tax_unit_head_or_spouse: true
        mi_ssp_living_arrangement: INDEPENDENT_LIVING
      person2:
        is_ssi_aged_blind_disabled: true
        is_tax_unit_head_or_spouse: true
        mi_ssp_living_arrangement: HOUSEHOLD_OF_ANOTHER
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    mi_ssp_couple_eligible: [false, false]

- name: Case 3, joint claim with only one SSI-eligible spouse returns false.
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_aged_blind_disabled: true
        is_tax_unit_head_or_spouse: true
        mi_ssp_living_arrangement: INDEPENDENT_LIVING
      person2:
        is_ssi_aged_blind_disabled: false
        is_ssi_eligible: false
        is_tax_unit_head_or_spouse: true
        mi_ssp_living_arrangement: INDEPENDENT_LIVING
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    # person2 is filtered to false by defined_for=mi_ssp_eligible;
    # person1 fails the both_eligible (marital_unit.sum == 2) gate.
    mi_ssp_couple_eligible: [false, false]

- name: Case 4, two SSI recipients in same LA but not joint claim returns false.
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_aged_blind_disabled: true
        mi_ssp_living_arrangement: INDEPENDENT_LIVING
      person2:
        is_ssi_aged_blind_disabled: true
        mi_ssp_living_arrangement: INDEPENDENT_LIVING
    marital_units:
      marital_unit1:
        members: [person1]
      marital_unit2:
        members: [person2]
    tax_units:
      tax_unit1:
        members: [person1]
      tax_unit2:
        members: [person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    # Separate marital units → ssi_claim_is_joint = false → couple gate fails.
    mi_ssp_couple_eligible: [false, false]
