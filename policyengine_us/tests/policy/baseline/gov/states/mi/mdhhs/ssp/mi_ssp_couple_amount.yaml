- name: Case 1, Independent Living couple amount frozen at $21 total.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        mi_ssp_living_arrangement: INDEPENDENT_LIVING
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    # $21 / 2 = $10.50 per person
    mi_ssp_couple_amount: 10.50

