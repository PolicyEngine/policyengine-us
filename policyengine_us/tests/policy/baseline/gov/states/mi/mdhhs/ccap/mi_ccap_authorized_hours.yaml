# Authorized hours per child per two-week pay period.
# Biweekly need hours = caretaker weekly activity hours x 2 weeks + 10 hours
# travel time per pay period for each parent with a need reason, rounded up to
# the next whole hour (meal/study add-ons and multiple need reasons per parent
# not tracked). Mapped to a tier 20/40/60/80/90; max 90. Two-parent household
# authorizes on the parent with the HIGHEST need hours (eff 2024-11-03), the
# fewest before. Uses weekly_hours_worked_before_lsr (default 40) to avoid the
# labor-supply circular dependency (BEM 710 p.1-2; BEM 706 p.2).

- name: Case 1, parent working 40 hours per week reaches the 90-hour tier.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 40  # 80 + 10 travel = 90 -> tier 90
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    mi_ccap_authorized_hours: 90

- name: Case 2, parent working 10 hours per week reaches the 40-hour tier.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 10  # 20 + 10 travel = 30 -> tier 40
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    mi_ccap_authorized_hours: 40

- name: Case 3, biweekly need of exactly 60 stays in the 60-hour tier.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 25  # 50 + 10 travel = 60 -> tier 60
      person2:
        age: 4
    tax_units:
