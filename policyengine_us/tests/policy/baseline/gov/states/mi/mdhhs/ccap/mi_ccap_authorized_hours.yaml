# BEM 710 p.2 worked example (Sally): 25.5 weekly hours x 2 = 51 biweekly
# + 10 travel = 61 -> tier 80.
- name: Case 8, BEM 710 single-parent example reaches the 80-hour tier.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 25.5  # 51 + 10 travel = 61 -> tier 80
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    mi_ccap_authorized_hours: 80

- name: Case 9, two parents authorize on the parent with the highest hours.
  period: 2026-01
  input:
    people:
      person1:
        age: 32
        weekly_hours_worked_before_lsr: 40  # 80 + 10 = 90
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 20  # 40 + 10 = 50
      person3:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MI
  output:
    # Highest need = person1's 90 biweekly -> tier 90
    mi_ccap_authorized_hours: 90

- name: Case 10, two-parent household ignores an idle parent who gets no travel.
  period: 2026-01
  input:
    people:
      person1:
        age: 32
        weekly_hours_worked_before_lsr: 40  # 80 + 10 = 90
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 0  # idle: no need reason, no travel -> 0
      person3:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MI
  output:
    # Highest need = person1's 90 biweekly -> tier 90 (eff 2024-11-03 rule)
    mi_ccap_authorized_hours: 90

# BEM 710 p.2 worked example (Sandy and Jeff): Sandy 72 biweekly + 10 = 82;
# Jeff 37.5 biweekly + 10 = 47.5 rounded up to 48. Authorize on Sandy's higher
# 82 -> tier 90.
- name: Case 11, BEM 710 two-parent example authorizes on the higher parent.
  period: 2026-01
  input:
    people:
      person1:
        age: 32
        weekly_hours_worked_before_lsr: 36  # 72 + 10 travel = 82
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 18.75  # 37.5 + 10 = 47.5 -> round up to 48
      person3:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MI
  output:
    # Highest need = Sandy's 82 biweekly -> tier 90
    mi_ccap_authorized_hours: 90

# Before 2024-11-03 the prior rule authorized on the parent with the FEWEST
# need hours. Same household as Case 9, but in 2024 the two-parent rule picks
# the lower-hours parent (person2's 50 biweekly -> tier 60).
- name: Case 12, two parents before 2024-11-03 authorize on the fewest hours.
  period: 2024-01
  input:
    people:
      person1:
        age: 32
        weekly_hours_worked_before_lsr: 40  # 80 + 10 = 90
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 20  # 40 + 10 = 50
      person3:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MI
  output:
    # Fewest need = person2's 50 biweekly -> tier 60 (prior rule)
    mi_ccap_authorized_hours: 60
