- name: Case 5, parent working 45 hours per week is capped at the 90-hour tier.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 45  # 90 + 10 = 100, capped at tier 90
      person2:
