- name: Case 1, Independent Living looks up individual rate.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        mi_ssp_living_arrangement: INDEPENDENT_LIVING
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    mi_ssp_individual_amount: 14

