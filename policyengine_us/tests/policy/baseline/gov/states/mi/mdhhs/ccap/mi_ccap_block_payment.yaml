# REQ-022/023: Reimbursement per child per two-week pay period.
# Licensed centers and group/family homes use the block schedule (billed
# 1-30 hours -> 30, 31-60 -> 60, 61+ -> 90), capped at the child's authorized
# hours. License-exempt providers are paid hourly, also capped at authorized
# hours. Because billed hours are not tracked separately from authorized
# hours, paid hours equal the authorized tier for every provider type, so
# the payment is hourly_rate x authorized_hours per pay period.
# Authorized hours come from the parent's activity: 40 hrs/week -> 80 biweekly.

- name: Case 1, center 1 Star infant, parent 40 hrs/week.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 40  # authorized 80
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        mi_ccap_provider_type: CENTER
        mi_ccap_star_rating: STAR_1
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    # Child: 7.15 hourly x 80 authorized = 572.00 per pay period
    mi_ccap_block_payment: [0, 572.00]

