# Reimbursement per child per two-week pay period.
# Licensed centers and group/family homes are paid the full block that the
# billed/authorized hours fall into (1-30 hours -> 30-hour block, 31-60 -> 60,
# 61+ -> 90); the authorization is a ceiling on billable hours, not a downward
# cap on the block, so 80 authorized hours are paid the 90-hour block (BEM 706
# p.9-13). Billed hours are not tracked separately from authorized hours, so
# the block tier is looked up from the authorized hours: payment is
# hourly_rate x block_hours(authorized) per pay period. License-exempt
# providers are paid hourly with no block: hourly_rate x authorized_hours.
# Authorized hours come from the parent's activity plus 10 hours travel time
# per pay period: e.g. 40 hrs/week -> 80 + 10 = 90 biweekly -> tier 90.

- name: Case 1, center 1 Star infant, parent 40 hrs/week.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 40  # 80 + 10 travel -> authorized 90
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        mi_ccap_provider_type: CENTER
        mi_ccap_star_rating: STAR_1
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    # Authorized 90 -> 61+ block tier 90; center STAR_1 infant 7.15 x 90 = 643.50
    mi_ccap_block_payment: [0, 643.50]

