        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MI
  output:
    # Band 1 per-child FC 15, 2 paying children = 30, cap 45 -> 30
    mi_ccap_family_contribution: 30

