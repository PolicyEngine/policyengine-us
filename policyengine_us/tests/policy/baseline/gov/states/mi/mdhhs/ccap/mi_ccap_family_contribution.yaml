# Edge cases: band boundaries, the top band, and the family cap at a high band.

- name: Case 7, size 2 income at exactly the band 0/1 floor stays in band 0.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 21_156  # 1,763/mo, exactly the size-2 band 1 floor
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        mi_ccap_star_rating: STAR_1
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    # 1,763 is below the 1,763.0001 threshold -> band 0 -> FC 0
    mi_ccap_family_contribution: 0

- name: Case 8, size 2 income just above the band 0/1 floor moves to band 1.
  period: 2026-01
  absolute_error_margin: 0.01
