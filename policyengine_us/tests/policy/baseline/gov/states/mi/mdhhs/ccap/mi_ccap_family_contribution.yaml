# Family contribution per two-week pay period.
# Flat dollar amount per child by income band (RFT 270 p.3), summed across
# paying children and capped at a per-family limit. Waived per child at a
# 3 Star (or higher) provider, and waived entirely for income-waived groups
# (BEM 706 p.2-3). Income is monthly program-group gross income.
#
# Size 2 band floors: 0 / 1,763 / 3,526 / 3,948 / 4,371 / 4,793 / 5,216.
# Size 3 band floors: 0 / 2,221 / 4,442 / 4,946 / 5,451 / 5,955 / 6,460.
# Size 5 band floors: 0 / 3,138 / 6,276 / 6,944 / 7,612 / 8,281 / 8,949.
# Per-child FC by band: 0 / 15 / 30 / 45 / 60 / 69 / 78.
# Family limit by band: 0 / 45 / 83 / 121 / 143 / 164 / 186.

- name: Case 1, size 2 band 1 one child at a low-star provider pays 15.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 42_000  # 3,500/mo -> size 2 band 1
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        mi_ccap_star_rating: STAR_1
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    # Band 1 per-child FC 15, 1 paying child, cap 45 -> 15
    mi_ccap_family_contribution: 15

