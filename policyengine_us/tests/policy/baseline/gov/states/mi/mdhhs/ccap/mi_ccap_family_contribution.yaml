      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        mi_ccap_star_rating: STAR_1
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MI
  output:
    # 1,764 > 1,763.0001 -> band 1 -> per-child FC 15, 1 child, cap 45 -> 15
    mi_ccap_family_contribution: 15

