- name: co_low_income_cdcc_eligible unit test 1
  period: 2022
  input:
    state_code: CO
    capped_cdcc: 0
    adjusted_gross_income: 24_999
  output:
    co_low_income_cdcc_eligible: true

- name: co_low_income_cdcc_eligible unit test 2
  period: 2022
  input:
    state_code: CO
    capped_cdcc: 300
    adjusted_gross_income: 24_999
  output:
    co_low_income_cdcc_eligible: false

- name: co_low_income_cdcc_eligible unit test 3
  period: 2022
  input:
    state_code: CO
    capped_cdcc: 0
    adjusted_gross_income: 25_001
  output:
    co_low_income_cdcc_eligible: false

# A separate filer excluded from the federal credit by IRC 21(e)(2) has a
# zero capped federal CDCC, but the low-income credit only backstops filers
# whose federal credit is zeroed out by their tax liability.
- name: co_low_income_cdcc_eligible unit test 4, married filing separately
  period: 2022
  input:
    people:
      person1:
        is_tax_unit_head: true
      person2:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SEPARATE
        capped_cdcc: 0
        adjusted_gross_income: 24_999
    households:
      household:
        members: [person1, person2]
        state_code: CO
  output:
    co_low_income_cdcc_eligible: false

- name: co_low_income_cdcc_eligible unit test 5, separated filer keeps eligibility
  period: 2022
  input:
    people:
      person1:
        is_tax_unit_head: true
        is_separated: true
      person2:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SEPARATE
        capped_cdcc: 0
        adjusted_gross_income: 24_999
    households:
      household:
        members: [person1, person2]
        state_code: CO
  output:
    co_low_income_cdcc_eligible: true
