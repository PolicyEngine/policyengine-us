# 2025 Tests - EITC match rate confirmed at 50% per Tax Policy Updates April 2025
- name: Colorado matches 50% of EITC in 2025.
  period: 2025
  input:
    eitc: 100
    state_code: CO
  output:
    # 50% match rate per HB24-1134 with economic growth trigger met
    co_eitc: 50

- name: Colorado EITC 2025 - realistic earned income scenario
  period: 2025
  input:
    people:
      person1:
        age: 35
        employment_income: 20_000
        is_tax_unit_head: true
      child1:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, child1]
        filing_status: HEAD_OF_HOUSEHOLD
    spm_units:
      spm_unit:
        members: [person1, child1]
    households:
      household:
        members: [person1, child1]
        state_code: CO
  output:
    # Federal EITC for 1 child at $20k income (head of household) is approximately $4,328
    # CO EITC = 50% * federal EITC = $2,164
    co_eitc: 2_164

- name: Colorado EITC includes ITIN qualifying children
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      head:
        age: 20
        employment_income: 10_000
        is_tax_unit_head: true
      child:
        age: 5
        has_tin: true
        ssn_card_type: OTHER_NON_CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [head, child]
        filing_status: HEAD_OF_HOUSEHOLD
    spm_units:
      spm_unit:
        members: [head, child]
    households:
      household:
        members: [head, child]
        state_code: CO
  output:
    co_eitc: 1_700

- name: Colorado EITC includes certain childless filers under 25
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      head:
        age: 19
        employment_income: 10_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [head]
        filing_status: SINGLE
    spm_units:
      spm_unit:
        members: [head]
    households:
      household:
        members: [head]
        state_code: CO
  output:
    co_eitc: 324.5

- name: Colorado EITC under-25 path - age 17 is below all minimums.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      head:
        age: 17
        employment_income: 10_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [head]
        filing_status: SINGLE
    spm_units:
      spm_unit:
        members: [head]
    households:
      household:
        members: [head]
        state_code: CO
  output:
    # Age 17 is below all under_25_expansion minimums (default 19, homeless/foster 18).
    # Federal EITC childless minimum age (25) also not met.
    co_eitc: 0

- name: Colorado EITC under-25 path - age 18 without homeless/foster status.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      head:
        age: 18
        employment_income: 10_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [head]
        filing_status: SINGLE
    spm_units:
      spm_unit:
        members: [head]
    households:
      household:
        members: [head]
        state_code: CO
  output:
    # Age 18 only qualifies under the homeless/foster minimum (18); default
    # minimum is 19 for non-students. Federal EITC also not eligible.
    co_eitc: 0

- name: Colorado EITC under-25 path - age 20 full-time college student is excluded.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      head:
        age: 20
        employment_income: 10_000
        is_full_time_college_student: true
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [head]
        filing_status: SINGLE
    spm_units:
      spm_unit:
        members: [head]
    households:
      household:
        members: [head]
        state_code: CO
  output:
    # Specified students are excluded from the default age 19-23 under-25 path.
    co_eitc: 0
