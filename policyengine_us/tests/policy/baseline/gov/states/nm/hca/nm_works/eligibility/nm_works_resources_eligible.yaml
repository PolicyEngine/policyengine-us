- name: Case 1, zero assets is eligible.
  period: 2024-01
  input:
    state_code: NM
    spm_unit_cash_assets: 0
  output:
    nm_works_resources_eligible: true

- name: Case 2, one dollar below limit is eligible.
  period: 2024-01
  input:
    state_code: NM
    spm_unit_cash_assets: 1_499
  output:
    # PolicyEngine currently enforces the directly modeled $1,500 liquid-resource test.
    nm_works_resources_eligible: true

- name: Case 3, at limit is eligible.
  period: 2024-01
  input:
    state_code: NM
    spm_unit_cash_assets: 1_500
  output:
    # $1,500 liquid resources is the modeled boundary.
    nm_works_resources_eligible: true

- name: Case 4, one dollar above limit is ineligible.
  period: 2024-01
  input:
    state_code: NM
    spm_unit_cash_assets: 1_501
  output:
    # $1,501 liquid resources exceeds the modeled limit.
    nm_works_resources_eligible: false
