# NM CCAP integration tests — full pipeline from eligibility through benefit.
#
# Subsidy per child = min(monthly provider rate, pre-subsidy monthly charge)
# minus copay. Copayments are waived ($0) from 2022-05-01, so for current-era
# cases the benefit is simply sum over children of min(rate, monthly charge).
#
# Rates effective 2023-08-01 (full-time monthly base):
#   Center: 2-Star Infant 1_075, Toddler 775, School Age 500; 5-Star Infant 1_925
#   Family Home: 2-Star Preschool 870
#   Registered Home: Infant 425
# Service-unit fraction: FT 1.0, PT1 0.75, PT2 0.50, PT3 0.25.
# Non-traditional-hours supplement: +5% (1-10 hrs), +10% (11-20), +15% (21+).
#
# 2025 FPG (CONTIGUOUS_US): family of 2 = 21_150/yr; 200% = 42_300/yr,
#   250% = 52_875/yr. Family of 3 = 26_650/yr; 200% = 53_300/yr.
# 2026 FPG: family of 2 = 21_640/yr (income limit removed under UCC).
# Childcare expenses are set at the SPM-unit level via the annual
# spm_unit_pre_subsidy_childcare_expenses input (the per-child variable
# apportions from this aggregate); monthly charge = annual / 12.

# ============================================================
# Case 1: basic eligible family, full-time center care, positive subsidy.
# ============================================================
- name: Case 1, eligible family with full time center care receives a positive subsidy.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 3  # 36 months -> PRESCHOOL
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME (fraction 1.0)
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
    spm_units:
      spm_unit:
        members: [person1, person2]
        nm_ccap_enrolled: false
        spm_unit_assets: 5_000
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: NM
  output:
    # Eligible: child 3 < 13 and citizen; 24_000 < 200% FPL (42_300); assets ok; parent works.
    nm_ccap_eligible: true
    # Age 3 = 36 months -> PRESCHOOL. Center 2-Star Preschool = 700 (full-time).
    nm_ccap_age_group: [SCHOOL_AGE, PRESCHOOL]
    nm_ccap_monthly_rate: [0, 700]
    # Monthly charge = 12_000/12 = 1_000. Subsidy = min(700, 1_000) = 700; copay $0.
    nm_ccap: 700
    # At a single-month test period the YEAR aggregator returns that month's
    # nm_ccap value (700); over a full year it would sum to 700 x 12 = 8_400.
    nm_child_care_subsidies: 700

# ============================================================
# Case 2: subsidy capped at actual (low) childcare charge.
# ============================================================
- name: Case 2, subsidy capped at the pre-subsidy childcare charge.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 28
        employment_income: 6_000
        weekly_hours_worked: 35
        immigration_status: CITIZEN
      person2:
        age: 1  # 12 months -> INFANT
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: FIVE_STAR
        # Low charge: 3_600/yr -> 300/month, below the 1_925 rate.
    spm_units:
      spm_unit:
        members: [person1, person2]
        nm_ccap_enrolled: false
        spm_unit_assets: 2_000
        spm_unit_pre_subsidy_childcare_expenses: 3_600
    households:
      household:
        members: [person1, person2]
        state_code: NM
  output:
    nm_ccap_eligible: true
    # Center 5-Star Infant = 1_925 (full-time).
    nm_ccap_monthly_rate: [0, 1_925]
    # Monthly charge = 3_600/12 = 300. Subsidy = min(1_925, 300) = 300.
    nm_ccap: 300

# ============================================================
# Case 3: enrolled recipient between 200% and 250% FPL stays eligible.
# ============================================================
- name: Case 3, enrolled recipient above 200 percent FPL with family home care.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        # 45_000/yr is above 200% (42_300) but below 250% (52_875) family of 2.
        employment_income: 45_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 4  # 48 months -> PRESCHOOL
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: FAMILY_HOME
        nm_ccap_focus_level: TWO_STAR
    spm_units:
      spm_unit:
        members: [person1, person2]
        nm_ccap_enrolled: true  # continuing recipient -> 250% cap
        spm_unit_assets: 10_000
        spm_unit_pre_subsidy_childcare_expenses: 9_600
    households:
      household:
        members: [person1, person2]
        state_code: NM
  output:
    # Enrolled, 45_000 < 250% FPL -> eligible.
    nm_ccap_income_eligible: true
    nm_ccap_eligible: true
    # Family Home 2-Star Preschool = 870 (full-time).
    nm_ccap_monthly_rate: [0, 870]
    # Monthly charge = 9_600/12 = 800. Subsidy = min(870, 800) = 800.
    nm_ccap: 800

# ============================================================
# Case 4: TANF Priority 2 bypass — high income but TANF-enrolled.
# ============================================================
- name: Case 4, TANF enrolled family bypasses the income test and gets a subsidy.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # Above 250% FPL, but TANF enrollment bypasses the income test.
        employment_income: 80_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 2  # 24 months -> TODDLER
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
    spm_units:
      spm_unit:
        members: [person1, person2]
        nm_ccap_enrolled: false
        is_tanf_enrolled: true
        spm_unit_assets: 1_000
        spm_unit_pre_subsidy_childcare_expenses: 18_000
    households:
      household:
        members: [person1, person2]
        state_code: NM
  output:
    nm_ccap_income_eligible: true
    nm_ccap_eligible: true
    # Age 2 = 24 months -> TODDLER. Center 2-Star Toddler = 775 (full-time).
    nm_ccap_age_group: [SCHOOL_AGE, TODDLER]
    nm_ccap_monthly_rate: [0, 775]
    # Monthly charge = 18_000/12 = 1_500. Subsidy = min(775, 1_500) = 775.
    nm_ccap: 775

# ============================================================
# Case 5: part-time care with non-traditional-hours supplement.
# ============================================================
- name: Case 5, part time one care with a non traditional hours supplement.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 18_000
        weekly_hours_worked: 25
        immigration_status: CITIZEN
      person2:
        age: 7  # 84 months -> SCHOOL_AGE
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        # 20 hours/week of care -> PART_TIME_1 (0.75 fraction).
        childcare_hours_per_week: 20
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
        # 15 non-traditional hours/week -> +10% supplement (11-20 hr tier).
        nm_ccap_non_traditional_hours: 15
    spm_units:
      spm_unit:
        members: [person1, person2]
        nm_ccap_enrolled: false
        spm_unit_assets: 3_000
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: NM
  output:
    nm_ccap_eligible: true
    # person1 (adult) has no care hours -> 0 hrs -> PART_TIME_3 (not an
    # eligible child, so its rate is 0 regardless). person2 has 20 care hours
    # -> PART_TIME_1.
    nm_ccap_service_unit: [PART_TIME_3, PART_TIME_1]
    # Center 2-Star School Age base = 500. PART_TIME_1 fraction 0.75 -> 375.
    # Non-traditional supplement +10% -> 375 x 1.10 = 412.50.
    nm_ccap_monthly_rate: [0, 412.5]
    # Monthly charge = 1_000 > 412.50. Subsidy = min(412.50, 1_000) = 412.50.
    nm_ccap: 412.5

# ============================================================
# Case 6: Universal Child Care — high income, no income limit (2026).
# ============================================================
- name: Case 6, after UCC a high income family is eligible with no income limit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        # Far above any FPL threshold; UCC (2025-11-01) removed the income limit.
        employment_income: 250_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 0.5  # 6 months -> INFANT
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: REGISTERED_HOME
    spm_units:
      spm_unit:
        members: [person1, person2]
        nm_ccap_enrolled: false
        spm_unit_assets: 50_000
        spm_unit_pre_subsidy_childcare_expenses: 6_000
    households:
      household:
        members: [person1, person2]
        state_code: NM
  output:
    # No income limit in 2026 -> income eligible despite 250k earnings.
    nm_ccap_income_eligible: true
    nm_ccap_eligible: true
    # Registered Home Infant = 425 (no FOCUS levels, full-time).
    nm_ccap_monthly_rate: [0, 425]
    # Monthly charge = 6_000/12 = 500. Subsidy = min(425, 500) = 425.
    nm_ccap: 425

# ============================================================
# Case 7: ineligible — non-NM household gets zero.
# ============================================================
- name: Case 7, non New Mexico family receives zero benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
    spm_units:
      spm_unit:
        members: [person1, person2]
        nm_ccap_enrolled: false
        spm_unit_assets: 5_000
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        # Colorado, not New Mexico -> defined_for zeroes the benefit.
        state_code: CO
  output:
    nm_ccap: 0
    nm_child_care_subsidies: 0

# ============================================================
# Case 8: degenerate — single adult, no eligible child.
# ============================================================
- name: Case 8, single adult with no child receives zero benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1]
        nm_ccap_enrolled: false
        spm_unit_assets: 1_000
    households:
      household:
        members: [person1]
        state_code: NM
  output:
    nm_ccap_eligible: false
    nm_ccap: 0

# ============================================================
# Case 9: edge — zero childcare expenses yields zero subsidy.
# ============================================================
- name: Case 9, eligible family with zero childcare expenses gets zero subsidy.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
    spm_units:
      spm_unit:
        members: [person1, person2]
        nm_ccap_enrolled: false
        spm_unit_assets: 5_000
        spm_unit_pre_subsidy_childcare_expenses: 0
    households:
      household:
        members: [person1, person2]
        state_code: NM
  output:
    nm_ccap_eligible: true
    # Subsidy = min(rate, 0) = 0 -> capped at actual expenses.
    nm_ccap: 0

# ============================================================
# Case 10: edge — negative income does not inflate the subsidy.
# ============================================================
- name: Case 10, negative income family subsidy stays capped at the charge.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # Large business loss -> negative countable income.
        self_employment_income: -600_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
    spm_units:
      spm_unit:
        members: [person1, person2]
        nm_ccap_enrolled: false
        spm_unit_assets: 1_000
        spm_unit_pre_subsidy_childcare_expenses: 6_000
    households:
      household:
        members: [person1, person2]
        state_code: NM
  output:
    # Negative income still passes the income test (below 200% FPL).
    nm_ccap_income_eligible: true
    nm_ccap_eligible: true
    # Center 2-Star Preschool = 700. Monthly charge = 500.
    # Subsidy = min(700, 500) = 500 — capped at the charge, NOT inflated by the loss.
    nm_ccap: 500

# ============================================================
# Case 11: whole-year period — annual aggregator sums 12 months.
# ============================================================
- name: Case 11, annual child care subsidies sum twelve monthly benefits.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 3  # 36 months -> PRESCHOOL
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
    spm_units:
      spm_unit:
        members: [person1, person2]
        nm_ccap_enrolled: false
        spm_unit_assets: 5_000
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: NM
  output:
    # Monthly nm_ccap = min(700, 1_000) = 700; the YEAR aggregator sums 12
    # months: 700 x 12 = 8_400.
    nm_child_care_subsidies: 8_400

# ============================================================
# Case 12: edge — initial applicant exactly at 200% FPL (family of 3)
# stays eligible and a positive subsidy flows through the pipeline.
# 2025 FPG family of 3 = 26_650/yr; 200% = 53_300/yr -> 4_441.67/month.
# ============================================================
- name: Case 12, initial applicant exactly at 200 percent FPL receives a subsidy.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        # 53_300/yr / 12 = 4_441.67/month = exactly 200% FPL (family of 3).
        employment_income: 53_300
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 30
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person3:
        age: 1  # 12 months -> INFANT
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
        pre_subsidy_childcare_expenses: 18_000  # 1_500/month
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        nm_ccap_enrolled: false  # initial applicant -> 200% cap
        spm_unit_assets: 8_000
        spm_unit_pre_subsidy_childcare_expenses: 18_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: NM
  output:
    # Countable income (4_441.67) <= 200% limit (4_441.67) -> eligible.
    nm_ccap_income_eligible: true
    nm_ccap_eligible: true
    # Center 2-Star Infant = 1_075 (full-time). Monthly charge = 1_500.
    nm_ccap_monthly_rate: [0, 0, 1_075]
    # Subsidy = min(1_075, 1_500) = 1_075; copay $0.
    nm_ccap: 1_075

# ============================================================
# Case 13: edge — two eligible children sum their per-child subsidies.
# ============================================================
- name: Case 13, two eligible children sum their per child subsidies.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 1  # 12 months -> INFANT
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
        pre_subsidy_childcare_expenses: 18_000  # 1_500/month, above the rate
      person3:
        age: 7  # 84 months -> SCHOOL_AGE
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
        pre_subsidy_childcare_expenses: 12_000  # 1_000/month, above the rate
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        nm_ccap_enrolled: false
        spm_unit_assets: 5_000
        # Family total = 18_000 + 12_000 = 30_000/yr -> 2_500/month.
        spm_unit_pre_subsidy_childcare_expenses: 30_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: NM
  output:
    nm_ccap_eligible: true
    # Center 2-Star Infant = 1_075; Center 2-Star School Age = 500.
    nm_ccap_monthly_rate: [0, 1_075, 500]
    # max_reimbursement summed = 1_075 + 500 = 1_575; family charge = 2_500.
    # Subsidy = min(1_575, 2_500) - 0 = 1_575.
    nm_ccap: 1_575
