# NM CCAP copayment (8.15.2.13 NMAC; ECECD Co-payments Waived flyer).
# ECECD waives all copayments from 2022-05-01 forward, and the waiver remains
# in effect under Universal Child Care. The pre-2022 copayment formula
# (8.15.2.13.B) is not modeled at the moment, so the copay is treated as $0 for
# all modeled periods regardless of income.

- name: Case 1, copay is zero in the current waiver era.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000
      person2:
        age: 3
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NM
  output:
    # Copayments waived since 2022-05-01 -> $0.
    nm_ccap_copay: 0

- name: Case 2, copay is zero even for a higher income family.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 40_000
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NM
  output:
    nm_ccap_copay: 0

- name: Case 3, copay is zero before the waiver because the formula is deferred.
  period: 2021-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 30_000
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NM
  output:
    # Pre-2022 era: the waiver is not yet in effect (waived = false), but the
    # pre-2022 copay formula (8.15.2.13.B) is not modeled, so the copay is
    # still $0.
    nm_ccap_copay: 0
