# NM CCAP monthly provider reimbursement rate lookup (rate flyer, effective
# August 2023; 8.15.2.13.C NMAC). Rate = provider type x FOCUS level x age
# group, scaled by the service-unit fraction (FT 100% / PT1 75% / PT2 50% /
# PT3 25%) and a non-traditional-hours supplement when applicable.
#
# Every case below uses FULL_TIME care (childcare_hours_per_week >= 30, so the
# service-unit fraction is 1.0) and zero non-traditional hours (no supplement),
# so the rate equals the full-time base table value. All cases run in 2025
# (rates effective 2023-08-01). state_code: NM so defined_for does not zero the
# rate, and immigration/age make each child eligible.
#
# Base full-time monthly rates:
#   Center:   2-Star Infant 1_075, Toddler 775, Preschool 700, School Age 500
#             5-Star Infant 1_925; 4-Star Toddler 1_100; 2+/3-Star Preschool 800
#   Group:    2-Star Infant 1_040; 5-Star School Age 670
#   Family:   2-Star Infant 1_100; 4-Star Toddler 1_250
#   Registered (no stars): Infant 425, Toddler 425, Preschool 375, School Age 350

# ============================================================
# Licensed Center, all FOCUS levels (Toddler unless noted)
# ============================================================

- name: Case 1, center two star infant.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5  # 6 months -> INFANT
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
    households:
      household:
        members: [person1]
        state_code: NM
  output:
    nm_ccap_monthly_rate: 1_075

- name: Case 2, center two plus star toddler.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 2.5  # 30 months -> TODDLER
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_PLUS_STAR
    households:
      household:
        members: [person1]
        state_code: NM
  output:
    # Center 2+Star Toddler = 865
    nm_ccap_monthly_rate: 865

