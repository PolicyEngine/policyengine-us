# ============================================================
# Part-time service-unit fractions applied to the base rate
# ============================================================

- name: Case 14, part time one applies seventy five percent.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5  # INFANT
        immigration_status: CITIZEN
        # 20 hours/week -> PART_TIME_1 (75%)
        childcare_hours_per_week: 20
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
    households:
      household:
        members: [person1]
        state_code: NM
  output:
    # Center 2-Star Infant 1_075 x 0.75 = 806.25
    nm_ccap_monthly_rate: 806.25

- name: Case 15, part time three applies twenty five percent.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5  # INFANT
        immigration_status: CITIZEN
        # 5 hours/week -> PART_TIME_3 (25%)
        childcare_hours_per_week: 5
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
    households:
      household:
        members: [person1]
        state_code: NM
  output:
    # Center 2-Star Infant 1_075 x 0.25 = 268.75
    nm_ccap_monthly_rate: 268.75

- name: Case 16, part time two split custody applies fifty percent.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5  # INFANT
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
        # PART_TIME_2 is only reachable via explicit input (split custody).
        nm_ccap_service_unit: PART_TIME_2
    households:
      household:
        members: [person1]
        state_code: NM
  output:
    # Center 2-Star Infant 1_075 x 0.50 = 537.50
    nm_ccap_monthly_rate: 537.5

# ============================================================
# Non-traditional-hours supplement bracket boundaries
# (supplements/non_traditional_hours.yaml): 0 hrs -> +0%,
# 1-10 hrs -> +5%, 11-20 hrs -> +10%, 21+ hrs -> +15%.
# Base full-time Center 2-Star Infant = 1_075 in every case below.
# ============================================================

- name: Case 17, zero non traditional hours adds no supplement.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5  # INFANT
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
        nm_ccap_non_traditional_hours: 0  # below the 1-hour threshold -> +0%
    households:
      household:
        members: [person1]
        state_code: NM
  output:
    # 1_075 x (1 + 0) = 1_075
    nm_ccap_monthly_rate: 1_075

- name: Case 18, one non traditional hour applies the five percent tier.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5  # INFANT
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
        nm_ccap_non_traditional_hours: 1  # at the 1-hour threshold -> +5%
    households:
      household:
        members: [person1]
        state_code: NM
  output:
    # 1_075 x 1.05 = 1_128.75
    nm_ccap_monthly_rate: 1_128.75

- name: Case 19, ten non traditional hours is the top of the five percent tier.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5  # INFANT
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
        nm_ccap_non_traditional_hours: 10  # 10 < 11 -> still +5%
    households:
      household:
        members: [person1]
        state_code: NM
  output:
    # 1_075 x 1.05 = 1_128.75
    nm_ccap_monthly_rate: 1_128.75

- name: Case 20, eleven non traditional hours applies the ten percent tier.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5  # INFANT
        immigration_status: CITIZEN
        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: CENTER
        nm_ccap_focus_level: TWO_STAR
        nm_ccap_non_traditional_hours: 11  # at the 11-hour threshold -> +10%
    households:
      household:
        members: [person1]
        state_code: NM
  output:
    # 1_075 x 1.10 = 1_182.50
    nm_ccap_monthly_rate: 1_182.5

- name: Case 21, twenty non traditional hours is the top of the ten percent tier.
