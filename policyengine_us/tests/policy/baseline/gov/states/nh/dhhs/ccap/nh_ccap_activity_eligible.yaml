- name: Case 1, single employed parent.
  period: 2025-01
  input:
    people:
      person1:
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked: 40
        is_full_time_student: false
        is_disabled: false
      person2:
        age: 4
        is_tax_unit_head_or_spouse: false
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NH
  output:
    nh_ccap_activity_eligible: true

