# Tests for nh_ccap_payment_rate (Person, MONTH)
# Weekly payment rate by provider type, age category, and service level.
# He-C 6910.17(a)-(d), BCDHSC Form 2533 (August 2024)
#
# Provider types and rate basis:
#   LICENSED_CENTER: 75th percentile MRS (Form 2533 page 1)
#   LICENSED_FAMILY: 75th percentile MRS (Form 2533 page 1)
#   LICENSE_EXEMPT_IN_HOME: 70% of licensed family rate (He-C 6910.17(c))
#   LICENSE_EXEMPT_CENTER: 50% of licensed center SCHOOL_AGE rate (Form 2533)
#     - No payments for children under 72 months
#
# NOTE: nh_ccap_payment_rate does NOT include disability supplement.
# Disability supplement is added separately in nh_ccap.py.

- name: Case 1, licensed center, infant, full-time.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        nh_ccap_eligible_child: true
        nh_ccap_child_age_category: INFANT
        nh_ccap_service_level: FULL_TIME
        nh_ccap_provider_type: LICENSED_CENTER
    households:
      household:
        members: [person1]
        state_code: NH
  output:
    # Form 2533: Licensed center, Birth-17, Full Time = $344.42
    nh_ccap_payment_rate: 344.42

