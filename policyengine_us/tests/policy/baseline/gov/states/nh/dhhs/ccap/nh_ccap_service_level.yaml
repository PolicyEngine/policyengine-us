- name: Case 8, two parents 40 and 20 hours, half-time (uses lower).
  period: 2025-01
  input:
    people:
      person1:
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked: 40
      person2:
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked: 20
      person3:
        age: 4
        is_tax_unit_head_or_spouse: false
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NH
  output:
    # He-C 6910.07(p): min(40, 20) = 20 → half-time
    nh_ccap_service_level: [HALF_TIME, HALF_TIME, HALF_TIME]

