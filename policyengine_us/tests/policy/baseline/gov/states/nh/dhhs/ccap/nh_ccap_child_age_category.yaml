  input:
    people:
      person1:
        age: 6
    households:
      household:
        members: [person1]
        state_code: NH
  output:
    # age=6 → 72 months → PRESCHOOL (< 79)
    nh_ccap_child_age_category: PRESCHOOL

- name: Case 7, age 7, school age.
  period: 2025-01
  input:
    people:
      person1:
        age: 7
    households:
      household:
        members: [person1]
        state_code: NH
  output:
    # age=7 → 84 months → SCHOOL_AGE (>= 79)
    nh_ccap_child_age_category: SCHOOL_AGE

- name: Case 8, age 12, school age.
