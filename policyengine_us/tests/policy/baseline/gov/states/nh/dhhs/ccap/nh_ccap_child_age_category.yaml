        members: [person1]
        state_code: NH
  output:
    # age=12 → 144 months → SCHOOL_AGE (< 156)
    nh_ccap_child_age_category: SCHOOL_AGE

# --- Edge Cases: Maximum and minimum ages ---

- name: Case 9, age 13, school age (beyond normal eligibility but tests category).
  period: 2025-01
  input:
    people:
      person1:
        age: 13
    households:
      household:
        members: [person1]
        state_code: NH
  output:
    # age=13 → 156 months → SCHOOL_AGE (>= 79)
    nh_ccap_child_age_category: SCHOOL_AGE

- name: Case 10, age 17, school age (disabled child upper bound).
  period: 2025-01
  input:
    people:
      person1:
        age: 17
    households:
      household:
        members: [person1]
        state_code: NH
  output:
    # age=17 → 204 months → SCHOOL_AGE
    nh_ccap_child_age_category: SCHOOL_AGE
