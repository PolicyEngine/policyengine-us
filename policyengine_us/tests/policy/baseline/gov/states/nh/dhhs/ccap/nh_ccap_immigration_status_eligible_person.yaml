- name: Case 6, DACA, ineligible.
  period: 2025-01
  input:
    people:
      person1:
        immigration_status: DACA
    households:
      household:
        members: [person1]
        state_code: NH
  output:
    nh_ccap_immigration_status_eligible_person: false
