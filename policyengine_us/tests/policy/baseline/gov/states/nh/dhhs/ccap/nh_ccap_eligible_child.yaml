# Tests for nh_ccap_eligible_child (Person, MONTH)
# Child must be: under 13 (or disabled under disabled age limit),
# a tax unit dependent, and immigration-status eligible.
# He-C 6910.07(b)(2)-(3), He-C 6910.07(e)

- name: Case 1, child age 5, citizen, dependent, eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 5
        is_disabled: false
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        state_code: NH
  output:
    nh_ccap_eligible_child: true

- name: Case 2, child age 13, not disabled, ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 13
        is_disabled: false
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        state_code: NH
  output:
    nh_ccap_eligible_child: false

