# --- Edge Cases ---

- name: Case 8, disabled child exactly age 17, eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 17
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        state_code: NH
  output:
    # disabled_child_age_limit = 18, age < 18 → true
    nh_ccap_eligible_child: true

- name: Case 9, disabled child exactly age 18, ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 18
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        state_code: NH
  output:
    # disabled_child_age_limit = 18, age < 18 → false
    nh_ccap_eligible_child: false

