- name: Case 1, senior homeowner is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 75_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MS
  output:
    ms_age_disability_homestead_exemption_eligible: true

- name: Case 2, disabled homeowner under age 65 is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        assessed_property_value: 75_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MS
  output:
    ms_age_disability_homestead_exemption_eligible: true

- name: Case 3, non-senior homeowner without disability is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 64
        assessed_property_value: 75_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MS
  output:
    ms_age_disability_homestead_exemption_eligible: false

- name: Case 4, senior without assessed property is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 65
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MS
  output:
    ms_age_disability_homestead_exemption_eligible: false

- name: Case 5, joint spouse meeting the age test is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 40
        assessed_property_value: 75_000
        is_tax_unit_head: true
      person2:
        age: 65
        is_tax_unit_spouse: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: JOINT
    households:
      household:
        members: [person1, person2]
        state_code: MS
  output:
    ms_age_disability_homestead_exemption_eligible: true

- name: Case 6, non-joint adult meeting the age test is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 40
        assessed_property_value: 75_000
        is_tax_unit_head: true
      person2:
        age: 65
        is_tax_unit_spouse: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SINGLE
    households:
      household:
        members: [person1, person2]
        state_code: MS
  output:
    ms_age_disability_homestead_exemption_eligible: false
