- name: Case 1, single person uses individual monthly FPL.
  period: 2026-01
  input:
    state_code: MS
  output:
    ms_wd_fpg: 1_330

- name: Case 2, married couple uses couple monthly FPL.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 38
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MS
  output:
    ms_wd_fpg: [1_803.33, 1_803.33]
