# ms_ccpp_age_group is a Person enum derived from age (years):
#   INFANT     age < 1
#   TODDLER    1 <= age < 3
#   PRESCHOOL  3 <= age < 5
#   SCHOOL_AGE age >= 5

- name: Case 1, infant under 1 year.
  period: 2024-01
  input:
    people:
      person1:
        age: 0
    households:
      household:
        members: [person1]
        state_code: MS
  output:
    ms_ccpp_age_group: INFANT

- name: Case 2, toddler at age 1 (lower boundary).
  period: 2024-01
  input:
    people:
      person1:
        age: 1
    households:
      household:
        members: [person1]
        state_code: MS
  output:
    ms_ccpp_age_group: TODDLER

