# === Age-group rate-band transitions (edge cases; see Cases 1-13 above) ===
# The center metro full-time rate changes at each age-band boundary. Each case
# places two children straddling one boundary so the rate band on each side is
# verified directly. Boundaries: infant<1, toddler 1-<3, preschool 3-<5,
# school-age >=5 (whole-year cuts).
- name: Case 14, infant-to-toddler rate transition (age 0 vs 1), center metro full time.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
      person2:  # infant (age 0)
        age: 0
        is_tax_unit_dependent: true
        childcare_hours_per_day: 8
        childcare_hours_per_week: 40
        ms_ccpp_provider_type: CENTER
      person3:  # toddler (age 1, lower boundary)
        age: 1
        is_tax_unit_dependent: true
        childcare_hours_per_day: 8
        childcare_hours_per_week: 40
        ms_ccpp_provider_type: CENTER
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MS
        county: HINDS_COUNTY_MS
  output:
    # Infant FT 152 -> Toddler FT 145 at age 1
    ms_ccpp_maximum_weekly_rate: [0, 152, 145]

