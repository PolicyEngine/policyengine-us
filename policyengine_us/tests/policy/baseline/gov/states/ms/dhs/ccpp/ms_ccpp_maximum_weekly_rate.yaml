# ms_ccpp_maximum_weekly_rate is Person, MONTH.
# Per-child weekly max rate by provider type x age band x full/part time x
# metro/non-metro, with a flat all-ages special-needs rate set. Gated to 0 when
# the child is not actually in care (childcare_hours_per_week < 1) or is not an
# eligible child. childcare_hours_per_day drives full/part time (>=6 = FT);
# childcare_hours_per_week drives the in-care gate.
# Operative weekly grid (eff 2023-07-01):
#   Center metro    FT: Infant 152 Toddler 145 Preschool 135 School-age 130
#   Center metro    PT: Infant 90  Toddler 90  Preschool 75  School-age 80
#   Center nonmetro FT: Infant 125 Toddler 120 Preschool 120 School-age 110
#   Center nonmetro PT: Infant 80  Toddler 75  Preschool 75  School-age 74
#   Home metro    FT: Infant 115 Toddler 120 Preschool 120 School-age 95
#   Home metro    PT: Infant 68  Toddler 75  Preschool 60  School-age 58
#   Home nonmetro FT: Infant 94  Toddler 98  Preschool 106 School-age 79
#   Home nonmetro PT: Infant 60  Toddler 61  Preschool 60  School-age 53
#   Special-needs center FT 145 / PT 87 (metro = non-metro)
#   Special-needs home   FT 125 / PT 63 (metro = non-metro)

# === Center, metro (Hinds County), full time — all 4 age bands ===
- name: Case 1, center metro full time, all age bands.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
      person2:  # infant
        age: 0
        is_tax_unit_dependent: true
        childcare_hours_per_day: 8
        childcare_hours_per_week: 40
        ms_ccpp_provider_type: CENTER
      person3:  # toddler
        age: 1
        is_tax_unit_dependent: true
        childcare_hours_per_day: 8
        childcare_hours_per_week: 40
        ms_ccpp_provider_type: CENTER
      person4:  # preschool
        age: 3
        is_tax_unit_dependent: true
        childcare_hours_per_day: 8
        childcare_hours_per_week: 40
        ms_ccpp_provider_type: CENTER
      person5:  # school age
        age: 8
        is_tax_unit_dependent: true
        childcare_hours_per_day: 8
        childcare_hours_per_week: 40
        ms_ccpp_provider_type: CENTER
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4, person5]
    households:
      household:
        members: [person1, person2, person3, person4, person5]
        state_code: MS
        county: HINDS_COUNTY_MS
  output:
    # Parent: not an eligible child -> 0
    # Infant 152, Toddler 145, Preschool 135, School-age 130
    ms_ccpp_maximum_weekly_rate: [0, 152, 145, 135, 130]

