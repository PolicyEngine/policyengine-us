# ms_ccpp_copay is SPMUnit, MONTH.
# Family copay = monthly countable income (floored at 0) x rate, where the rate
# comes from the family-size band selected by position relative to 50% SMI.
# $0 at/below the federal poverty line, for TANF, and for homeless-no-income.
# $10/month cap for minimum-fee categories (protective services, SSI-disabled
# parent, special-needs child) when income is above the poverty line.
#
# Monthly federal SMI / FPG (MS, 2024), and copay rates:
#   Size 2: 50% SMI = 2,133.50; FPG = 1,703.33; very-low 5.5% / low 6.5%
#   Size 3: 50% SMI = 2,635.50; FPG = 2,151.67; very-low 5.0% / low 6.0%
#   Size 4: 50% SMI = 3,137.50; FPG = 2,600.00; very-low 4.5% / low 5.5%

- name: Case 1, very-low-income band above FPL, family of 3.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 28_800  # YEAR -> 2,400/mo
      person2:
        age: 30
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MS
  output:
    # Monthly income 2,400: > FPG 2,151.67 (not exempt), <= 50% SMI 2,635.50
    # -> very-low band, family size 3 rate 5.0%
    # Copay = 2,400 * 0.05 = 120
    ms_ccpp_copay: 120

- name: Case 2, low-income band (50-85 percent SMI), family of 4.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 48_000  # YEAR -> 4,000/mo
      person2:
        age: 33
      person3:
        age: 4
      person4:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: MS
  output:
    # Monthly income 4,000: > 50% SMI 3,137.50 -> low band, size 4 rate 5.5%
    # Copay = 4,000 * 0.055 = 220
    ms_ccpp_copay: 220

- name: Case 3, income at or below the federal poverty line pays zero copay.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 18_000  # YEAR -> 1,500/mo
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MS
  output:
    # Monthly income 1,500 <= FPG 1,703.33 (family of 2) -> $0 copay
    ms_ccpp_copay: 0

- name: Case 4, special-needs child caps the copay at $10.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 28_800  # YEAR -> 2,400/mo
      person2:
        age: 30
      person3:
        age: 4
        is_disabled: true  # special-needs child -> minimum-fee category
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MS
  output:
    # Uncapped very-low band copay = 2,400 * 0.05 = 120; above FPL 2,151.67
    # -> minimum-fee category caps at $10
    ms_ccpp_copay: 10

- name: Case 5, protective-services child caps the copay at $10.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # YEAR -> 2,000/mo
      person2:
        age: 4
        receives_or_needs_protective_services: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MS
  output:
    # Uncapped very-low band copay = 2,000 * 0.055 = 110; above FPL 1,703.33
    # -> minimum-fee category caps at $10
    ms_ccpp_copay: 10

- name: Case 6, SSI-disabled parent caps the copay at $10.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        employment_income: 24_000  # YEAR -> 2,000/mo
        is_ssi_disabled: true
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MS
  output:
    # Uncapped very-low band copay = 2,000 * 0.055 = 110; above FPL 1,703.33
    # SSI-disabled parent -> minimum-fee category caps at $10
    ms_ccpp_copay: 10

- name: Case 7, TANF family pays zero copay even above FPL.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # YEAR -> 2,000/mo
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: MS
  output:
    # Income 2,000 > FPG 1,703.33, but TANF enrollment waives the copay
    ms_ccpp_copay: 0

- name: Case 8, negative countable income floors at zero copay.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        self_employment_income: -60_000  # YEAR -> -5,000/mo
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MS
  output:
    # Income floored at 0; 0 <= FPG -> $0 copay (no negative-income inflation)
    ms_ccpp_copay: 0

- name: Case 9, band boundary just below 50 percent SMI uses very-low rate, family of 4.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 37_649.88  # YEAR -> 3,137.49/mo, 0.01 below 50% SMI
      person2:
        age: 33
      person3:
        age: 4
      person4:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: MS
  output:
    # Monthly 3,137.49 <= 50% SMI 3,137.50 -> very-low band, rate 4.5%
    # Copay = 3,137.49 * 0.045 = 141.19
    ms_ccpp_copay: 141.19

- name: Case 10, band boundary just above 50 percent SMI uses low rate, family of 4.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 37_650.12  # YEAR -> 3,137.51/mo, 0.01 above 50% SMI
      person2:
        age: 33
      person3:
        age: 4
      person4:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: MS
  output:
    # Monthly 3,137.51 > 50% SMI 3,137.50 -> low band, rate 5.5%
    # Copay = 3,137.51 * 0.055 = 172.56
    ms_ccpp_copay: 172.56

# === Edge cases (see Cases 1-10 above) ===
- name: Case 11, zero income pays zero copay.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MS
  output:
    # No income; 0 <= FPG (family of 2, 1,703.33) -> $0 copay
    ms_ccpp_copay: 0

# Family-size cap at 6: families of 7-8 use the published "6 or more" copay row.
# For size 7, FPG/mo = 3,945.00 and 50% SMI/mo = 4,235.63.
- name: Case 12, family of 7 in very-low band uses the size-6 capped rate.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        employment_income: 49_200  # YEAR -> 4,100/mo
      person2:
        age: 38
      person3:
        age: 4
      person4:
        age: 6
      person5:
        age: 8
      person6:
        age: 10
      person7:
        age: 12
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5, person6, person7]
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6, person7]
        state_code: MS
  output:
    # Income 4,100/mo: > FPG 3,945.00 (not exempt), <= 50% SMI 4,235.63
    # -> very-low band; size 7 capped to size-6 row rate 3.5%
    # Copay = 4,100 * 0.035 = 143.50
    ms_ccpp_copay: 143.50

- name: Case 13, family of 7 in low band uses the size-6 capped rate.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        employment_income: 60_000  # YEAR -> 5,000/mo
      person2:
        age: 38
      person3:
        age: 4
      person4:
        age: 6
      person5:
        age: 8
      person6:
        age: 10
      person7:
        age: 12
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5, person6, person7]
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6, person7]
        state_code: MS
  output:
    # Income 5,000/mo: > 50% SMI 4,235.63 -> low band; size 7 capped to
    # the size-6 row rate 4.5%
    # Copay = 5,000 * 0.045 = 225.00
    ms_ccpp_copay: 225.00

- name: Case 14, homeless family with no countable income pays zero copay.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MS
        is_homeless: true
  output:
    # is_homeless and zero countable income -> homeless_no_income branch -> $0
    ms_ccpp_copay: 0
