- name: Case 7, non-Mississippi household is excluded (defined_for gate).
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 4
        is_tax_unit_dependent: true
        childcare_hours_per_day: 8
        childcare_hours_per_week: 40
        ms_ccpp_provider_type: CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: AL  # not Mississippi
        county: BALDWIN_COUNTY_AL
  output:
    # defined_for = StateCode.MS zeroes the eligibility gate and the benefit
    ms_ccpp_eligible: false
    ms_ccpp: 0
    ms_child_care_subsidies: 0
