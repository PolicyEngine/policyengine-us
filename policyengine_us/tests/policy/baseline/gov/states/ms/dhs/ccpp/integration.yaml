# Era-2 coverage (period 2025-01, a pure 2024-10 schedule month, before the
# unmodeled July-2025 increase). Cases 8-11 confirm the FY2025-2027 full-time
# base rates flow through and that part-time + special-needs leaves correctly
# carry forward their era-1 (2023-07) values.
- name: Case 8, era-2 metro center infant full time draws the FY2025-2027 rate.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000  # 1,000/mo, at/below FPL size 2 -> copay 0
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 0
        is_tax_unit_dependent: true
        childcare_hours_per_day: 8
        childcare_hours_per_week: 40
        ms_ccpp_provider_type: CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1,000/mo
    households:
      household:
        members: [person1, person2]
        state_code: MS
        county: HINDS_COUNTY_MS
  output:
    ms_ccpp_eligible: true
    # Era-2 metro center infant FT = 167/wk -> 167 * 52/12 = 723.67/mo
    # Income 1,000/mo <= FPL (size 2) -> copay 0
    # Benefit = min(1,000, 723.67) - 0 = 723.67
    ms_ccpp: 723.67

