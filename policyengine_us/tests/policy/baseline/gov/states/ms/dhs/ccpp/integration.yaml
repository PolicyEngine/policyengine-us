        weekly_hours_worked_before_lsr: 40
      person2:
        age: 0
        is_tax_unit_dependent: true
        childcare_hours_per_day: 4  # part time
        childcare_hours_per_week: 20
        ms_ccpp_provider_type: CENTER
      person3:
        age: 3
        is_tax_unit_dependent: true
        childcare_hours_per_day: 4  # part time
        childcare_hours_per_week: 20
        ms_ccpp_provider_type: CENTER
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 18_000  # 1,500/mo
    households:
      household:
        members: [person1, person2, person3]
        state_code: MS
        county: HINDS_COUNTY_MS
  output:
    ms_ccpp_eligible: true
    # Rates PT center metro: infant 90 + preschool 75 = 165/wk -> 715/mo
    # Copay: 2,400/mo size 3 <= 50% SMI 2,635.50 -> very-low 5.0% = 120
    # Monthly benefit = min(1,500, 715) - 120 = 595; annual = 7,140
    ms_ccpp: 7_140
    child_care_subsidies: 7_140

