- name: Case 11, era-2 part time and special needs leaves carry forward era-1 rates.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000  # 1,000/mo, at/below FPL size 2 -> copay 0
        weekly_hours_worked_before_lsr: 40
      person2:  # part-time infant: PT rate has no era-2 entry -> carries era-1
        age: 0
        is_tax_unit_dependent: true
        childcare_hours_per_day: 4  # part time
        childcare_hours_per_week: 20
        ms_ccpp_provider_type: CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1,000/mo
    households:
      household:
        members: [person1, person2]
        state_code: MS
        county: HINDS_COUNTY_MS
  output:
    ms_ccpp_eligible: true
    # PART_TIME has no 2024-10 entry, so the 2023-07 value carries forward:
    # metro center infant PT = 90/wk -> 90 * 52/12 = 390/mo
    # Income 1,000/mo <= FPL (size 2) -> copay 0
    # Benefit = min(1,000, 390) - 0 = 390
    ms_ccpp: 390

- name: Case 12, era-2 special needs child draws the carried-forward flat rate.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000  # 1,000/mo, at/below FPL size 2 -> copay 0
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 8
        is_disabled: true
        is_tax_unit_dependent: true
        childcare_hours_per_day: 8  # full time
        childcare_hours_per_week: 40
        ms_ccpp_provider_type: CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1,000/mo
    households:
      household:
        members: [person1, person2]
        state_code: MS
        county: HINDS_COUNTY_MS
  output:
    ms_ccpp_eligible: true
    # Special-needs rate has no 2024-10 entry, so the 2023-07 flat value carries
    # forward: special-needs center FT = 145/wk -> 145 * 52/12 = 628.33/mo
    # Income 1,000/mo <= FPL (size 2) -> copay 0 (so the $10 min-fee cap does not bind)
    # Benefit = min(1,000, 628.33) - 0 = 628.33
    ms_ccpp: 628.33
