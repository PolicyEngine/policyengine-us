- name: Illinois 529 subtraction - single under cap
  period: 2025
  input:
    state_code: IL
    filing_status: SINGLE
    investment_in_529_plan: 5_000
  output:
    # Cap for single is $10,000
    # Subtraction = min(5,000, 10,000) = 5,000
    il_529_plan_subtraction: 5_000

