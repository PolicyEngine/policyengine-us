# Tests for il_tanf_county_group — maps county to Group I, II, or III
# Source: SSA POMS SI CHI00830.403

- name: Case 1, Cook County is Group I.
  period: 2017-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IL
        county: COOK_COUNTY_IL
  output:
    il_tanf_county_group: GROUP_I

