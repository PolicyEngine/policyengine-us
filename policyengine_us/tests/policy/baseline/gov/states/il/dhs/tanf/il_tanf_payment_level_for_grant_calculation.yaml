# Transition boundary test: 2019-01 should use FPG-based, NOT flat grant
- name: Case 11, transition boundary 2019 uses FPG not flat grant.
  period: 2019-01
  absolute_error_margin: 0.5
  input:
    people:
      person1:
        il_tanf_payment_eligible_parent: true
      person2:
        il_tanf_payment_eligible_child: true
      person3:
        il_tanf_payment_eligible_child: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IL
        county: COOK_COUNTY_IL
  output:
    # Post-COIN Act: 30% FPG for size 3
    # FPG 2018 for size 3 = $20,780/yr => $1,731.67/mo
    # 30% * $1,731.67 = $519.50
    il_tanf_payment_level_for_grant_calculation: 519.5
