# ===================================================================
# 15. FULL PIPELINE WITH EARNINGS (pre-2018, Group I)
# ===================================================================

- name: Case 22, pre-2018 Cook County Group I with earnings and childcare.
  period: 2017-01
  absolute_error_margin: 0.5
  input:
    people:
      person1:
        age: 30
        employment_income: 9_600  # $800/month
        is_tax_unit_head_or_spouse: true
        immigration_status: CITIZEN
        ssi: 0
      person2:
        age: 3
        employment_income: 0
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ssi: 0
      person3:
        age: 1
        employment_income: 0
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ssi: 0
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_size: 3
        childcare_expenses: 4_800  # $400/month
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IL
        county: COOK_COUNTY_IL
  output:
    il_tanf_county_group: GROUP_I
    il_tanf_assistance_unit_size: 3

    # Payment levels (Group I, size 3, Nov 2008 era = $432)
    il_tanf_payment_level_for_initial_eligibility: 432
    il_tanf_payment_level_for_grant_calculation: 432

    # Childcare: min($400, $175 + $200) = $375
    # person2 age 3 -> $175, person3 age 1 -> $200
    il_tanf_childcare_deduction: 375

    # IED FPG (size 3, 2016 FPG at 2016-03-01):
    # ($11,880 + 2*$4,160)/12 = $1,683.33
    # IED = max(0.5*$1,683.33 - $432, 0) = $409.67
    # Capped at gross: min($800, $409.67) = $409.67
    il_tanf_initial_employment_deduction_person: [409.67, 0, 0]

    # Initial eligibility:
    # Countable earned = max($800 - $375 - $409.67, 0) = $15.33
    il_tanf_countable_earned_income_for_initial_eligibility: 15.33
    il_tanf_countable_income_for_initial_eligibility: 15.33
    il_tanf_eligible: true

    # Grant calculation:
    # EID = 0.75 * ($800 - $375) = $318.75
    # Countable earned = $425 - $318.75 = $106.25
    il_tanf_countable_earned_income_for_grant_calculation: 106.25
    il_tanf_countable_income_for_grant_calculation: 106.25

    # Benefit = max($432 - $106.25, 0) = $325.75
    il_tanf: 325.75

# ===================================================================
# 16. FULL PIPELINE WITH EARNINGS (pre-2018, Group III child-only)
# ===================================================================

- name: Case 23, pre-2018 Alexander County Group III child-only with earnings.
  period: 2017-01
  absolute_error_margin: 0.5
  input:
    people:
      person1:
        age: 30
        employment_income: 4_800  # $400/month
        is_tax_unit_head_or_spouse: true
        immigration_status: UNDOCUMENTED
        ssi: 0
      person2:
        age: 5
        employment_income: 0
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ssi: 0
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
        childcare_expenses: 2_400  # $200/month
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IL
        county: ALEXANDER_COUNTY_IL
  output:
    il_tanf_county_group: GROUP_III

    # Parent undocumented -> child-only, AU size = 1
    il_tanf_assistance_unit_size: 1

    # Payment levels (Group III, size 1)
    # Initial eligibility uses with-adult: $198
    il_tanf_payment_level_for_initial_eligibility: 198
    # Grant uses child-only: $108
    il_tanf_payment_level_for_grant_calculation: 108

    # Childcare: min($200, $175) = $175 (person2 age 5 -> $175)
    il_tanf_childcare_deduction: 175

    # IED FPG (size 1, 2016 FPG at 2016-03-01):
    # $11,880/12 = $990
    # IED = max(0.5*$990 - $198, 0) = $297
    # Capped at gross: min($400, $297) = $297
    il_tanf_initial_employment_deduction_person: [297, 0]

    # Initial eligibility:
    # Countable earned = max($400 - $175 - $297, 0) = max(-$72, 0) = $0
    il_tanf_countable_earned_income_for_initial_eligibility: 0
    il_tanf_eligible: true

    # Grant calculation:
    # EID = 0.75 * ($400 - $175) = $168.75
    # Countable earned = $225 - $168.75 = $56.25
    il_tanf_countable_earned_income_for_grant_calculation: 56.25
    il_tanf_countable_income_for_grant_calculation: 56.25

    # Benefit = max($108 - $56.25, 0) = $51.75
    il_tanf: 51.75

