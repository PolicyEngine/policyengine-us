# Edge case tests for Illinois TANF covering county groups, family size
# boundaries, negative income, child-only vs with-adult, EID rate
# transition, regional-to-FPG transition, empty AU, and non-IL state.

# ===================================================================
# 1. COUNTY GROUP BOUNDARIES (regional era, 2017-01)
# ===================================================================

- name: Case 1, Group I county with adult family of 3 in regional era.
  period: 2017-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        immigration_status: CITIZEN
        ssi: 0
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ssi: 0
      person3:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ssi: 0
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IL
        county: COOK_COUNTY_IL
  output:
    # Cook County = Group I, size 3 with-adult = $432
    il_tanf_payment_level_for_initial_eligibility: 432
    il_tanf_payment_level_for_grant_calculation: 432
    il_tanf: 432

