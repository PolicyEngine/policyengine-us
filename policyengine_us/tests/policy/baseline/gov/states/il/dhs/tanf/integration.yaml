        ssi: 0
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ssi: 0
    spm_units:
      spm_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IL
  output:
    # AU FPG size 2 (Oct-lagged 2024): (15_060 + 5_380) / 12 = 1_703.33
    # Payment = 0.35 * 1_703.33 = 596.17
    # Countable income = 0
    # Benefit = 596.17 - 0 = 596.17
    il_tanf_countable_income_for_grant_calculation: 0
    il_tanf: 596.17

# ===================================================================
# 5. NEGATIVE INCOME - benefit capped at payment level
# ===================================================================

- name: Case 8, negative countable income does not inflate benefit.
  period: 2025-01
  absolute_error_margin: 0.5
  input:
    people:
      person1:
        age: 30
        self_employment_income: -60_000_000
        is_tax_unit_head_or_spouse: true
        immigration_status: CITIZEN
        ssi: 0
      person2:
        age: 8
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ssi: 0
    spm_units:
      spm_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IL
  output:
    # AU FPG size 2: (15_060 + 5_380) / 12 = 1_703.33
    # Payment = 0.35 * 1_703.33 = 596.17
    # Countable earned income is max_(..., 0) = 0
    # Benefit = max(596.17 - 0, 0) = 596.17 (not 5M+)
    il_tanf: 596.17

