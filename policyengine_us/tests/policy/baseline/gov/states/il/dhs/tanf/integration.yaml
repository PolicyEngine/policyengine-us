# ===================================================================
# 2. CHILD-ONLY VS WITH-ADULT (regional era, Group I)
# ===================================================================

- name: Case 4, child-only case in Group I regional era.
  period: 2017-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        immigration_status: UNDOCUMENTED
        ssi: 0
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ssi: 0
      person3:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ssi: 0
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IL
        county: COOK_COUNTY_IL
  output:
    # Parent undocumented -> not payment eligible
    # Child-only AU size = 2, Group I child-only size 2 = $230
    il_tanf_assistance_unit_size: 2
    il_tanf_payment_level_for_initial_eligibility: 318
    # Grant uses child-only amount
    il_tanf_payment_level_for_grant_calculation: 230
    il_tanf: 230

# ===================================================================
# 3. CHILD-ONLY VS WITH-ADULT (FPG era, 2025-01)
# ===================================================================

- name: Case 5, child-only case in FPG era.
  period: 2025-01
  absolute_error_margin: 0.5
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        immigration_status: UNDOCUMENTED
        ssi: 0
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ssi: 0
      person3:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ssi: 0
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IL
  output:
    # AU size = 2 (only children eligible)
    # AU FPG (Oct-lagged = 2024): (15_060 + 5_380) / 12 = 1_703.33
    # Initial eligibility payment = 0.35 * 1_703.33 = 596.17
    # Grant child-only payment = 0.75 * 0.35 * 1_703.33 = 447.13
    il_tanf_assistance_unit_size: 2
    il_tanf_assistance_unit_fpg: 1_703.33
    il_tanf_payment_level_for_initial_eligibility: 596.17
    il_tanf_payment_level_for_grant_calculation: 447.13
    il_tanf: 447.13

- name: Case 6, with-adult case same family size in FPG era.
  period: 2025-01
  absolute_error_margin: 0.5
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        immigration_status: CITIZEN
        ssi: 0
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ssi: 0
      person3:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ssi: 0
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IL
  output:
    # AU size = 3 (parent + 2 children)
    # AU FPG (Oct-lagged = 2024): (15_060 + 5_380*2) / 12 = 2_151.67
    # Payment = 0.35 * 2_151.67 = 753.08
    il_tanf_assistance_unit_size: 3
    il_tanf_assistance_unit_fpg: 2_151.67
    il_tanf_payment_level_for_initial_eligibility: 753.08
    il_tanf_payment_level_for_grant_calculation: 753.08
    il_tanf: 753.08

