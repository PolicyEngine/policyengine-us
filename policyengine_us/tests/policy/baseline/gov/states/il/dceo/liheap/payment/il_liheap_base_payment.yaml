- name: Case 1, nat gas fuel type.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        irs_gross_income: 0
        heating_expense_person: 2_000
    spm_units:
      spm_unit:
        members: [person1]
        il_liheap_heating_type: NAT_GAS_OTHER
    households:
      household:
        members: [person1]
        state_code: IL
  output:
    # Bracket 1 (0-50% FPL), size 1, nat gas -> $1,260
    # min(1,260, 2,000) = 1,260
    il_liheap_base_payment: 1_260

- name: Case 2, all electric fuel type.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        irs_gross_income: 10_000
        heating_expense_person: 1_000
    spm_units:
      spm_unit:
        members: [person1]
        il_liheap_heating_type: ALL_ELECTRIC
    households:
      household:
        members: [person1]
        state_code: IL
  output:
    # Bracket 2, size 1, all electric -> $530
    # min(530, 1,000) = 530
    il_liheap_base_payment: 530

- name: Case 3, propane fuel oil capped at expenses.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        irs_gross_income: 40_000
        heating_expense_person: 500
      person2:
        age: 33
      person3:
        age: 8
      person4:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        il_liheap_heating_type: PROPANE_FUEL_OIL
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: IL
  output:
    # Bracket 3, size 4, propane -> $630
    # heating_expense_person: 500
    # min(630, 500) = 500 (capped)
    il_liheap_base_payment: 500

- name: Case 4, heat in rent infers cash.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        irs_gross_income: 25_000
        rent: 8_000
    spm_units:
      spm_unit:
        members: [person1]
        heat_expense_included_in_rent: true
    households:
      household:
        members: [person1]
        state_code: IL
  output:
    # heat_in_rent -> inferred CASH
    # Bracket 4, size 1, cash -> $170 (no expense cap for cash)
    il_liheap_heating_type: CASH
    il_liheap_base_payment: 170

