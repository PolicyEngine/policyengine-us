- name: Case 1, low income senior with nat gas.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 65
        is_disabled: true
        social_security: 12_000
        irs_gross_income: 12_000
        rent: 6_000
        heating_expense_person: 1_500
    spm_units:
      spm_unit:
        members: [person1]
        heat_expense_included_in_rent: false
        il_liheap_heating_type: NAT_GAS_OTHER
    households:
      household:
        members: [person1]
        state_code: IL
  output:
    il_liheap_income_eligible: true
    il_liheap_eligible: true
    il_liheap_heating_type: NAT_GAS_OTHER
    # 12,000 / ~15,060 FPG ~ 80% -> bracket 2, size 1, nat gas -> $610
    # min(610, 1,500) = 610
    il_liheap_base_payment: 610
    il_liheap: 610

