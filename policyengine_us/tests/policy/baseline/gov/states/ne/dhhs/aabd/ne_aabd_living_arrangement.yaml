- name: Case 1, federal Code D (medical treatment facility) overrides input to LONG_TERM_CARE.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged: true
        is_ssi_eligible: true
        # Federal Code D pays $30/month = $360/year.
        uncapped_ssi: 360
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
        # Even with an alternate input, federal Code D wins.
        ne_aabd_alternate_living_arrangement: ASSISTED_LIVING_FACILITY
    households:
      household:
        members: [person1]
        state_code: NE
  output:
    ne_aabd_living_arrangement: LONG_TERM_CARE

- name: Case 2, alternate input ASSISTED_LIVING_FACILITY is used when not in medical facility.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged: true
        is_ssi_eligible: true
        uncapped_ssi: 11_604
        ne_aabd_alternate_living_arrangement: ASSISTED_LIVING_FACILITY
    households:
      household:
        members: [person1]
        state_code: NE
  output:
    ne_aabd_living_arrangement: ASSISTED_LIVING_FACILITY

- name: Case 3, default INDEPENDENT when no alternate input and not in medical facility.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged: true
        is_ssi_eligible: true
        uncapped_ssi: 11_604
    households:
      household:
        members: [person1]
        state_code: NE
  output:
    ne_aabd_living_arrangement: INDEPENDENT

- name: Case 4, non-Nebraska resident yields NONE.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged: true
        is_ssi_eligible: true
        uncapped_ssi: 11_604
        ne_aabd_alternate_living_arrangement: ASSISTED_LIVING_FACILITY
    households:
      household:
        members: [person1]
        state_code: CA
  output:
    ne_aabd_living_arrangement: NONE

