- name: Case 8, two-spouse household with mixed alternate-living inputs in NE.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged: true
        is_ssi_eligible: true
        uncapped_ssi: 11_604
        ne_aabd_alternate_living_arrangement: ASSISTED_LIVING_FACILITY
      person2:
        age: 68
        is_ssi_aged: true
        is_ssi_eligible: true
        uncapped_ssi: 11_604
        # No alternate input -> defaults to INDEPENDENT.
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NE
  output:
    # Each spouse's living arrangement is derived independently from their own
    # alternate input; spouse 1 -> ALF; spouse 2 -> INDEPENDENT.
    ne_aabd_living_arrangement: [ASSISTED_LIVING_FACILITY, INDEPENDENT]
