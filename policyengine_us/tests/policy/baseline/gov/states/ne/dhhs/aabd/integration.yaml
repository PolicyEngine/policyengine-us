        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NE
  output:
    # Couple FBR (2025) = $1,450; couple budget (2021 frozen) = $887 + $349 = $1,236.
    # Per spouse: standard_of_need = $1,236/2 = $618; federal_ssi = $725.
    # Fill-the-gap: max(0, $618 - $725) = $0 each.
    ne_aabd_couple_rate_applies: [true, true]
    ne_aabd: [0, 0]

