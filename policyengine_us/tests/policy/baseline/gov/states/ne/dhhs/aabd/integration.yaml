- name: Case 1, single SSI recipient living independently in Nebraska.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged: true
        is_ssi_eligible: true
        # Federal SSI (2025) individual = $967/month with no other income.
        ssi_countable_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: NE
  output:
    # Federal SSI (2025) individual FBR = $967.
    ssi: 967
    # Categorically eligible and receives SSI in NE => eligible.
    ne_aabd_eligible: true
    ne_aabd_living_arrangement: INDEPENDENT
    # Independent budget (2021 rates frozen through 2025):
    # standard size 1 ($564) + single shelter ($281) = $845.
    ne_aabd_standard_of_need: 845
    # Fill-the-gap: max(0, $845 - $967) = $0 because federal FBR exceeds NE budget.
    ne_aabd: 0

- name: Case 2, independent couple in Nebraska both receiving SSI.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged: true
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        ssi_countable_income: 0
      person2:
        age: 68
        is_ssi_aged: true
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        ssi_countable_income: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NE
  output:
    # Couple FBR (2025) = $1,450, split evenly between both SSI-eligible spouses.
    ssi: [725, 725]
    ne_aabd_eligible: [true, true]
    # Independent budget for size 2 (2021 rates):
    # standard size 2 ($887) + multiple shelter ($349) = $1,236.
    # Per-spouse share: $1,236 / 2 = $618.
    ne_aabd_standard_of_need: [618, 618]
    # Fill-the-gap: max(0, $618 - $725) = $0 because couple FBR exceeds NE budget.
    ne_aabd: [0, 0]

