- name: Case 17, negative employment income does not inflate the supplement.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 75
        is_ssi_aged: true
        is_ssi_eligible: true
        # Large negative self-employment loss; SSI countable income floors at zero
        # so federal SSI is unaffected.
        self_employment_income: -1_200_000_000
        ne_aabd_alternate_living_arrangement: ASSISTED_LIVING_FACILITY
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: NE
  output:
    # Federal SSI (2025) individual FBR = $967, unaffected by negative earnings.
    ssi: 967
    ne_aabd_eligible: true
    ne_aabd_living_arrangement: ASSISTED_LIVING_FACILITY
    ne_aabd_standard_of_need: 1_236
    # Fill-the-gap: max(0, $1,236 - $967 - max(0,-uncapped_ssi)).
    # The income_excess clause prevents the formula from adding negative income to the
    # supplement (which would otherwise produce a 1.2B benefit).
    ne_aabd: 269

- name: Case 19, single SSI recipient with $20 unearned income and additional excess.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged: true
        is_ssi_eligible: true
        # $50 unearned/month: first $20 excluded, remaining $30 reduces SSI.
        social_security_retirement: 600
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: NE
  output:
    # Federal SSI: $967 - ($50 - $20) = $937.
    ssi: 937
    ne_aabd_eligible: true
    ne_aabd_standard_of_need: 845
    # Fill-the-gap: max(0, $845 - $937 - 0) = $0.
    ne_aabd: 0
