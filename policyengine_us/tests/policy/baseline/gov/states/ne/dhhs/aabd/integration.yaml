    ne_aabd_couple_rate_applies: [false, false]
    ne_aabd: [0, 0]

- name: Case 15, countable income exactly at the $20 SSI general exclusion boundary.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged: true
        is_ssi_eligible: true
        # $20/month unearned income exactly matches the SSI general exclusion,
        # so countable income remains $0 and the federal SSI = full FBR ($967).
        social_security_retirement: 240
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: NE
  output:
    # $20 is fully excluded -> ssi = FBR = $967.
    ssi: 967
    ne_aabd_eligible: true
    ne_aabd_standard_of_need: 845
    # Fill-the-gap: max(0, $845 - $967) = $0.
    ne_aabd: 0

