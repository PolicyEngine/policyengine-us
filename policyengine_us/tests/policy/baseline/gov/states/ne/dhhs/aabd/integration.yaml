- name: Case 5, SSI recipient in a Long-Term Care Medicaid facility (Code D).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 80
        is_ssi_aged: true
        is_ssi_eligible: true
        ssi_countable_income: 0
        # Federal Code D: medical treatment facility with Medicaid paying majority of care.
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: NE
  output:
    # Federal SSI for a Medicaid facility resident is reduced to $30/month (PNA).
    ssi: 30
    ne_aabd_eligible: true
    # Federal Code D forces NE living arrangement to LONG_TERM_CARE.
    ne_aabd_living_arrangement: LONG_TERM_CARE
    # Alternate living standard for LONG_TERM_CARE (2021 rates frozen) = $60.
    ne_aabd_standard_of_need: 60
    # Fill-the-gap: max(0, $60 - $30) = $30.
    ne_aabd: 30

- name: Case 6, large negative self-employment income does not inflate the benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged: true
        is_ssi_eligible: true
        # SSI countable income floors earned income at zero, so ssi receipt is unchanged.
        self_employment_income: -60_000_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: NE
  output:
    # Federal SSI (2025) individual = $967, unaffected by negative earnings.
    ssi: 967
    ne_aabd_eligible: true
    ne_aabd_living_arrangement: INDEPENDENT
    ne_aabd_standard_of_need: 845
    # Fill-the-gap is bounded by the standard of need: max(0, $845 - $967) = $0.
    # The formula must NOT add the negative income excess back into the supplement.
    ne_aabd: 0

- name: Case 7, mixed-arrangement spouses derive distinct living arrangements.
  period: 2021-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged: true
        is_ssi_eligible: true
        # Per SSA 2011 Table 1 footnote a, alternate-living couples are
        # treated as two individuals; ssi_claim_is_joint: false reflects
        # the Title XIX separation that gives each spouse the individual FBR.
        ssi_claim_is_joint: false
        ssi_countable_income: 0
        ne_aabd_alternate_living_arrangement: ADULT_FAMILY_HOME
      person2:
        age: 68
        is_ssi_aged: true
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        ssi_countable_income: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NE
  output:
    # Each spouse receives the individual federal SSI FBR (2021) = $794
    # because Title XIX separation prevents the joint computation.
    ssi: [794, 794]
    ne_aabd_eligible: [true, true]
    # Person-level living arrangement is derived independently for each spouse:
    # Spouse 1 from the alternate input (AFH); spouse 2 defaults to INDEPENDENT.
    ne_aabd_living_arrangement: [ADULT_FAMILY_HOME, INDEPENDENT]

