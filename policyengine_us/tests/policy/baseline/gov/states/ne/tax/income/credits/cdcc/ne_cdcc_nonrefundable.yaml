- name: NE nonrefundable cdcc ineligible (AGI under $29,000 gets refundable instead)
  period: 2021
  input:
    adjusted_gross_income: 28_000
    cdcc: 2_000
    state_code: NE
  output:
    ne_cdcc_nonrefundable: 0

- name: NE nonrefundable cdcc 25% of federal credit claimed
  period: 2022
  input:
    adjusted_gross_income: 30_000
    cdcc: 2_000
    state_code: NE
  output:
    ne_cdcc_nonrefundable: 2_000 * 0.25
