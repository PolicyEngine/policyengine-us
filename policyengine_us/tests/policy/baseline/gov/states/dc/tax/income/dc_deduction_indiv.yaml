- name: dc_deduction_indiv allocates all deduction to higher earner when optimal
  absolute_error_margin: 0.01
  period: 2021
  input:
    people:
      person1:
        is_tax_unit_head: true
        dc_agi: 300_000
      person2:
        is_tax_unit_spouse: true
        dc_agi: 100_000
      person3:
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
        tax_unit_itemizes: false
        dc_deduction_joint: 20_000
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: DC
  output:
    dc_deduction_indiv: [20_000, 0, 0]

- name: dc_deduction_indiv equalizes taxable income when that minimizes tax
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      person1:
        is_tax_unit_head: true
        dc_agi: 20_000
      person2:
        is_tax_unit_spouse: true
        dc_agi: 25_000
    tax_units:
      tax_unit:
        members: [person1, person2]
        tax_unit_itemizes: false
        dc_deduction_joint: 25_000
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: DC
  output:
    dc_deduction_indiv: [10_000, 15_000]
