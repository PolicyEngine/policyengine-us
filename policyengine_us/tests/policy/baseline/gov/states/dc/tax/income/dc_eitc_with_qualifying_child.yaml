- name: No EITC, no matched credit
  period: 2023
  input:
    state_code: DC
    eitc: 0
  output:
    dc_eitc_with_qualifying_child: 0

- name: 70% match
  period: 2023
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
      child:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [head, child]
        filing_status: HEAD_OF_HOUSEHOLD
        filer_adjusted_earnings: 294.11764705882354
        adjusted_gross_income: 294.11764705882354
    households:
      household:
        members: [head, child]
        state_code: DC
  output:
    dc_eitc_with_qualifying_child: 70

- name: DC EITC with qualifying child includes ITIN child in 2025
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      head:
        age: 20
        employment_income: 10_000
        is_tax_unit_head: true
      child:
        age: 5
        has_tin: true
        ssn_card_type: OTHER_NON_CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [head, child]
        filing_status: HEAD_OF_HOUSEHOLD
    spm_units:
      spm_unit:
        members: [head, child]
    households:
      household:
        members: [head, child]
        state_code: DC
  output:
    dc_eitc_with_qualifying_child: 3_400
