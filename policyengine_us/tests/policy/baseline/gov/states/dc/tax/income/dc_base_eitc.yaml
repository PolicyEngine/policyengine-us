- name: SSN filer with SSN child - dc_base_eitc matches dc_eitc
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      head:
        age: 30
        employment_income: 15_000
        is_tax_unit_head: true
        has_tin: true
        ssn_card_type: CITIZEN
      child:
        age: 5
        is_tax_unit_dependent: true
        has_tin: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [head, child]
        filing_status: HEAD_OF_HOUSEHOLD
    spm_units:
      spm_unit:
        members: [head, child]
    households:
      household:
        members: [head, child]
        state_code: DC
  output:
    # SSN-qualifying household - base path and Law 23-149 path produce the same credit.
    # Federal EITC at $15K HoH with 1 qualifying child = $4,328 (phase-in capped
    # at max for one child). DC match is 100% in 2025.
    dc_base_eitc: 4_328
    dc_eitc: 4_328

- name: ITIN filer - dc_base_eitc is zero, dc_eitc is positive via Law 23-149
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      head:
        age: 30
        employment_income: 8_000
        is_tax_unit_head: true
        has_tin: true
        ssn_card_type: OTHER_NON_CITIZEN
    tax_units:
      tax_unit:
        members: [head]
        filing_status: SINGLE
    spm_units:
      spm_unit:
        members: [head]
    households:
      household:
        members: [head]
        state_code: DC
  output:
    # Section 47-1806.04 base path requires an SSN-valid identification; ITIN
    # filers receive zero under the base path but Law 23-149 grants the credit.
    dc_base_eitc: 0
    dc_eitc: 612

- name: SSN filer with ITIN child - dc_base_eitc uses no-child branch, dc_eitc uses with-child branch
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      head:
        age: 35
        employment_income: 10_000
        is_tax_unit_head: true
        has_tin: true
        ssn_card_type: CITIZEN
      child:
        age: 5
        is_tax_unit_dependent: true
        has_tin: true
        ssn_card_type: OTHER_NON_CITIZEN
    tax_units:
      tax_unit:
        members: [head, child]
        filing_status: HEAD_OF_HOUSEHOLD
    spm_units:
      spm_unit:
        members: [head, child]
    households:
      household:
        members: [head, child]
        state_code: DC
  output:
    # SSN-only base path: no SSN qualifying child, so the base falls back
    # to the childless EITC branch (filer is age 35 with SSN, age-eligible).
    # Federal childless EITC at $10K plus DC phase-out at $10K AGI yields
    # a positive credit. Law 23-149 (dc_eitc) routes through the with-child
    # branch since the ITIN child is counted there.
    # Expected dc_base_eitc value calculated by tracing dc_eitc_without_qualifying_child.
    dc_base_eitc: 649
