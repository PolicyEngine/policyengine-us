- name: Case 1, senior homeowner with income below the limit is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 65
        employment_income: 100_000
        real_estate_taxes: 4_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: DC
  output:
    dc_senior_disabled_property_tax_relief_eligible: true

- name: Case 2, disabled homeowner below the senior age threshold is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 40
        employment_income: 80_000
        real_estate_taxes: 3_000
        is_permanently_and_totally_disabled: true
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: DC
  output:
    dc_senior_disabled_property_tax_relief_eligible: true

- name: Case 3, senior homeowner with income at the limit is ineligible.
  period: 2026
  input:
    people:
      person1:
        age: 65
        employment_income: 163_500
        real_estate_taxes: 4_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: DC
  output:
    dc_senior_disabled_property_tax_relief_eligible: false

