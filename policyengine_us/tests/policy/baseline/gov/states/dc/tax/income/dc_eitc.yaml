- name: DC EITC without qualifying children
  period: 2023
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [head]
        dc_eitc_with_qualifying_child: 1
        dc_eitc_without_qualifying_child: 2
    households:
      household:
        members: [head]
        state_code: DC
  output:
    dc_eitc: 2

- name: DC EITC with qualifying children
  period: 2023
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
      child:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [head, child]
        dc_eitc_with_qualifying_child: 1
        dc_eitc_without_qualifying_child: 2
    households:
      household:
        members: [head, child]
        state_code: DC
  output:
    dc_eitc: 1
