- name: AZ 2025 senior with capital gains receives MCTCP enhanced senior deduction (issue #8503 / TaxSim #914)
  # Mirrors the reproduction in the issue:
  #   additional_senior_deduction -> 6000 (federal computed)
  #   az_subtractions -> includes the 6000 via MCTCP wiring
  #   az_income_tax -> 653.75 (was 803.75 pre-fix; delta = $6,000 × 2.5% AZ flat rate)
  period: 2025
  input:
    people:
      head:
        age: 75
        is_tax_unit_head: true
        long_term_capital_gains: 100_000
        short_term_capital_gains: -25_000
    tax_units:
      tax_unit:
        members: [head]
    households:
      household:
        members: [head]
        state_code: AZ
  output:
    additional_senior_deduction: 6_000
    az_subtractions: 31_000  # $25,000 az_long_term_capital_gains_subtraction + $6,000 MCTCP senior
    az_income_tax: 653.75
