    people:
      person1:
        is_tax_unit_dependent: false
        age: 25
    tax_units:
      tax_unit:
        members:
        - person1
        adjusted_gross_income: 200000
        filing_status: SINGLE
        az_income_tax_before_non_refundable_credits: 1000000
    households:
      household:
        members:
        - person1
        state_code: AZ
