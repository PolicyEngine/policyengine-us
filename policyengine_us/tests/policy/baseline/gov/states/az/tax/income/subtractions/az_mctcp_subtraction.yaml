- name: AZ 2025 — 65+ filer gets $6,000 enhanced senior deduction as MCTCP subtraction
  period: 2025
  input:
    people:
      head:
        age: 75
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [head]
    households:
      household:
        members: [head]
        state_code: AZ
  output:
    az_mctcp_subtraction: 6_000

- name: AZ 2025 — under-65 filer gets no senior deduction
  period: 2025
  input:
    people:
      head:
        age: 50
        is_tax_unit_head: true
        employment_income: 60_000
    tax_units:
      tax_unit:
        members: [head]
    households:
      household:
        members: [head]
        state_code: AZ
  output:
    az_mctcp_subtraction: 0

- name: AZ 2024 — MCTCP not in effect, no subtraction even for 65+ filer
  period: 2024
  input:
    people:
      head:
        age: 75
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [head]
    households:
      household:
        members: [head]
        state_code: AZ
  output:
    az_mctcp_subtraction: 0
