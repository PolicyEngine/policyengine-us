- name: Case 1, non-enrolled family of three uses the initial income limit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
      person3:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: AZ
  output:
    # Non-enrolled applicants use the level 6 threshold (family size 3 = $3,665/month).
    az_ccap_income_limit: 3_665

- name: Case 2, enrolled family of three uses the higher ongoing income limit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
      person3:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        az_ccap_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: AZ
  output:
    # Enrolled recipients use the level 7 threshold (family size 3 = $6,426/month).
    az_ccap_income_limit: 6_426
