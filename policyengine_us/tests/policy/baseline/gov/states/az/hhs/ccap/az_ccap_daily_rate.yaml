- name: Case 1, center infant base rate.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0
        childcare_attending_days_per_month: 20
        az_ccap_provider_type: CENTER
    households:
      household:
        members: [person1]
        state_code: AZ
  output:
    az_ccap_daily_rate: 64.15

- name: Case 2, center preschool quality enhanced rate.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 4
        childcare_attending_days_per_month: 20
        az_ccap_provider_type: CENTER
        az_ccap_quality_enhanced_provider: true
