- name: Case 1, fee level 1 copay for one child.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        childcare_attending_days_per_month: 20
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AZ
  output:
    az_ccap_copay: 10

- name: Case 2, fee level 5 copay for one child.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 48_000
      person2:
        age: 4
        childcare_attending_days_per_month: 20
      person3:
        age: 2
      person4:
        age: 1
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: AZ
  output:
    az_ccap_copay: 30

- name: Case 3, copay exempt family has no copay.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        childcare_attending_days_per_month: 20
        receives_or_needs_protective_services: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AZ
  output:
    az_ccap_copay_exempt: true
    az_ccap_copay: 0
