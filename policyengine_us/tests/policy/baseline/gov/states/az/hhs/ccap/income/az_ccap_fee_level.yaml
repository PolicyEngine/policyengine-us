- name: Case 1, family of two at fee level 3.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AZ
  output:
    az_ccap_fee_level: 3

- name: Case 2, family of four at fee level 5.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 48_000
      person2:
        age: 4
      person3:
        age: 2
      person4:
        age: 1
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: AZ
  output:
    az_ccap_fee_level: 5

- name: Case 3, enrolled family can reach fee level 7.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 44_000
      person2:
        age: 4
      person3:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        az_ccap_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: AZ
  output:
    az_ccap_fee_level: 7

- name: Case 4, zero-income family of two at fee level 1.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AZ
  output:
    # $0/month is at or below the family-size-2 level 1 threshold ($1,499).
    az_ccap_fee_level: 1

- name: Case 5, family of two at fee level 2.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 19_200
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
