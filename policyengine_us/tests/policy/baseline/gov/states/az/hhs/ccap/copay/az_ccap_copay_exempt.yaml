- name: Case 1, family with a foster child is copay exempt.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_in_foster_care: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AZ
  output:
    az_ccap_copay_exempt: true

