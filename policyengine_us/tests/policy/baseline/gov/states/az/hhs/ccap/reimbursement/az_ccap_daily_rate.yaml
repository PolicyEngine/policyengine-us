- name: Case 6, center school-year rate for a school-age child in January.
  # January (month 1) is outside the May-July summer window, so a 6-12 year-old
  # gets the school-year rate. The summer rate (months 5-7) cannot be unit-tested
  # because the test period must be January or a whole year.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 8
        childcare_attending_days_per_month: 20
        az_ccap_provider_type: CENTER
    households:
      household:
        members: [person1]
        state_code: AZ
  output:
    az_ccap_daily_rate: 25

