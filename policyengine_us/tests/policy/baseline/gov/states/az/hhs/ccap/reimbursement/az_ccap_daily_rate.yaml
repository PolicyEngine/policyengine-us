- name: Case 16, special needs child without a quality provider falls back to the base rate.
  # The flat Special Needs Rate ($89.81) applies only at a quality-enhanced provider;
  # without quality the child gets the regular center preschool base rate ($42.00).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 4
        childcare_attending_days_per_month: 20
        az_ccap_provider_type: CENTER
        is_disabled: true
    households:
      household:
        members: [person1]
        state_code: AZ
  output:
    az_ccap_special_needs_child: true
    az_ccap_daily_rate: 42.00

- name: Case 17, relative provider with the quality flag still gets the flat relative rate.
  # Relatives are excluded from the quality multiplier, so a quality flag does not
  # raise the $15 relative rate.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 6
        childcare_attending_days_per_month: 20
        az_ccap_provider_type: RELATIVE
        az_ccap_quality_enhanced_provider: true
    households:
      household:
        members: [person1]
        state_code: AZ
  output:
    az_ccap_daily_rate: 15

- name: Case 18, certified family quality enhanced rate applies the multiplier.
  # $30 preschool base x 1.4 quality multiplier = $42.00.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 4
        childcare_attending_days_per_month: 20
        az_ccap_provider_type: CERTIFIED_FAMILY
        az_ccap_quality_enhanced_provider: true
    households:
      household:
        members: [person1]
        state_code: AZ
  output:
    az_ccap_daily_rate: 42.00

- name: Case 19, special needs child at a quality certified family home gets the regular rate.
  # CCA-1210B item 14: the Special Needs Enhanced Rate is limited to licensed Child
  # Care Centers and certified Group Homes. A quality-enhanced certified family home
  # with a disabled child gets its regular quality rate ($30 preschool base x 1.4 =
  # $42.00), not the $89.81 special needs rate.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 4
        childcare_attending_days_per_month: 20
        az_ccap_provider_type: CERTIFIED_FAMILY
        az_ccap_quality_enhanced_provider: true
        is_disabled: true
    households:
      household:
        members: [person1]
        state_code: AZ
  output:
    az_ccap_special_needs_child: true
    az_ccap_daily_rate: 42.00

- name: Case 20, special needs child at a quality group home gets the special needs rate.
  # CCA-1210B item 14: certified Group Homes are eligible for the Special Needs
  # Enhanced Rate, so a quality-enhanced group home with a disabled child gets the
  # flat $89.81, not the regular group home quality rate ($35 preschool base x 1.4).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 4
        childcare_attending_days_per_month: 20
        az_ccap_provider_type: GROUP_HOME
        az_ccap_quality_enhanced_provider: true
        is_disabled: true
    households:
      household:
        members: [person1]
        state_code: AZ
  output:
    az_ccap_special_needs_child: true
    az_ccap_daily_rate: 89.81
