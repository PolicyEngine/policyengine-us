- name: Case 6, school-age child in January uses the school-year group.
  # January (month 1) is outside the May-July summer window.
  period: 2026-01
  input:
    people:
      person1:
        age: 8
    households:
      household:
        members: [person1]
        state_code: AZ
  output:
    az_ccap_age_group: SCHOOL_AGE_SCHOOL_YEAR
