- name: Case 1, infant under age 1.
  period: 2026-01
  input:
    people:
      person1:
        age: 0
    households:
      household:
        members: [person1]
        state_code: AZ
  output:
    az_ccap_age_group: INFANT

- name: Case 2, toddler at age 1.
  period: 2026-01
