    people:
      person1:
        age: 40
        employment_income: 20_000
        rent: 10_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
        mn_renters_credit_crp_line_a_amount: 5_000
    families:
      family:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_renters_credit: 965.60004
