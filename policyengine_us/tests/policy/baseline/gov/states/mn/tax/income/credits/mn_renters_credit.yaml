- name: Case 1, standard renter's credit.
  absolute_error_margin: 10
  period: 2025
  input:
    people:
      person1:
        age: 40
        employment_income: 50_000
        pre_subsidy_rent: 10_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
        premium_tax_credit: 0
        mn_renters_credit_qualifying_crp: true
    families:
      family:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
        snap: 0
        tanf: 0
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_renters_credit: 455

- name: Case 2, assistance-paid rent prorates the credit.
  absolute_error_margin: 1
  period: 2025
  input:
    people:
      person1:
        age: 40
        employment_income: 20_000
        pre_subsidy_rent: 10_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
        mn_renters_credit_qualifying_crp: true
        mn_renters_credit_assistance_rent_paid: 5_000
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_renters_credit: 966

- name: Case 3, property-tax-exempt residence is ineligible.
  absolute_error_margin: 0.1
  period: 2025
  input:
    people:
      person1:
        age: 40
        employment_income: 20_000
        pre_subsidy_rent: 10_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
        mn_renters_credit_qualifying_crp: true
        mn_renters_credit_property_tax_exempt: true
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_renters_credit_eligible: false
    mn_renters_credit: 0
