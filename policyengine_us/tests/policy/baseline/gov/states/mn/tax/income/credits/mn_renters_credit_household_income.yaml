- name: Household income starts from Minnesota AGI and subtracts renter credit adjustments
  period: 2025
  input:
    people:
      person1:
        age: 66
        is_tax_unit_head: true
      dependent1:
        is_tax_unit_dependent: true
      dependent2:
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, dependent1, dependent2]
        adjusted_gross_income: 50_000
        mn_additions: 1_000
        mn_subtractions: 500
    households:
      household:
        members: [person1, dependent1, dependent2]
        state_code: MN
  output:
    mn_renters_credit_household_income: 31_260
