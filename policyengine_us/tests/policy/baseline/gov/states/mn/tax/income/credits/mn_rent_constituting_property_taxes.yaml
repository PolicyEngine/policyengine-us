- name: Case 1, rent constituting property taxes equals 17 percent of shared CRP rent.
  absolute_error_margin: 0.1
  period: 2025
  input:
    people:
      person1:
        is_tax_unit_head: true
        pre_subsidy_rent: 10_000
    tax_units:
      tax_unit:
        members: [person1]
        mn_renters_credit_shared_rent_fraction: 0.5
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_rent_constituting_property_taxes: 850

- name: Case 2, rent constituting property taxes use rent paid by renter when housing assistance is present.
  absolute_error_margin: 0.1
  period: 2025
  input:
    people:
      person1:
        is_tax_unit_head: true
        pre_subsidy_rent: 10_000
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
        housing_assistance: 4_000
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    rent: 6_000
    mn_rent_constituting_property_taxes: 1_020
