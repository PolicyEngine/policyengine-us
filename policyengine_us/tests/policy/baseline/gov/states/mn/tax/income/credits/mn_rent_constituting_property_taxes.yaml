- name: Rent constituting property taxes equals 17 percent of shared CRP rent
  period: 2025
  input:
    people:
      person1:
        is_tax_unit_head: true
        pre_subsidy_rent: 10_000
    tax_units:
      tax_unit:
        members: [person1]
        mn_renters_credit_shared_rent_fraction: 0.5
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_rent_constituting_property_taxes: 850
