# Tests MN CCAP countable income = gross income (earned + unearned sources)
# minus allowable deductions, floored at zero (Minn. Rules 3400.0170 subp. 4/6a;
# manual sections 6.6 and 6.18). The variable is monthly; annual income inputs
# divide by 12.
- name: Case 1, earnings only.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        employment_income: 36_000  # /year -> 3,000/month
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # 36,000 / 12 = 3,000 per month.
    mn_ccap_countable_income: 3_000

- name: Case 2, earned plus unearned income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        employment_income: 24_000  # 2,000/month
        social_security_retirement: 6_000  # 500/month (RSDI component)
        interest_income: 1_200  # 100/month
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # (24,000 + 6,000 + 1,200) / 12 = 2,600 per month.
    mn_ccap_countable_income: 2_600

- name: Case 3, income reduced by allowable deductions.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        employment_income: 36_000  # 3,000/month
        child_support_expense: 6_000  # 500/month paid out of household
        alimony_expense: 3_600  # 300/month spousal support paid out
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # (36,000 - 6,000 - 3,600) / 12 = 26,400 / 12 = 2,200 per month.
    mn_ccap_countable_income: 2_200

- name: Case 4, deductions exceeding gross income floor at zero.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        employment_income: 12_000  # 1,000/month
        child_support_expense: 24_000  # 2,000/month paid out
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # 12,000 - 24,000 = -12,000 -> floored to 0.
    mn_ccap_countable_income: 0

# Edge cases.
- name: Case 5, zero income yields zero countable income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_ccap_countable_income: 0

- name: Case 6, negative self-employment income with no deductions floors at zero.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        self_employment_income: -60_000  # business loss, no deductions
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # max(-60,000 - 0, 0) = 0; a loss must not produce negative countable income.
    mn_ccap_countable_income: 0

- name: Case 7, multiple unearned income sources are all counted.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        social_security_retirement: 12_000  # 1,000/month (RSDI component)
        unemployment_compensation: 6_000  # 500/month
        child_support_received: 3_600  # 300/month
        general_assistance: 2_400  # 200/month
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # (12,000 + 6,000 + 3,600 + 2,400) / 12 = 24,000 / 12 = 2,000 per month.
    mn_ccap_countable_income: 2_000
