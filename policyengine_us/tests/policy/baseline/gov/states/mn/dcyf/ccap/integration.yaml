        age: 30
        employment_income: 18_000
      person2:
        age: 0
        childcare_hours_per_week: 45  # weekly
        mn_ccap_provider_type: FAMILY_CHILD_CARE
        mn_ccap_quality_rating: ACCREDITED_OR_3STAR  # +15%
    spm_units:
      spm_unit:
        members: [person1, person2]
        mn_ccap_enrolled: false
        is_tanf_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1,000/month
    households:
      household:
        members: [person1, person2]
        state_code: MN
        county: BECKER_COUNTY_MN
  output:
    # Max rate 888.33 * 1.15 = 1,021.58; expenses 1,000/month cap the subsidy.
    # Copay 4.33. Subsidy = min(1,000, 1,021.58) - 4.33 = 995.67.
    mn_ccap_copay: 4.33
    mn_ccap: 995.67

- name: Case 13, large five-person family sums per-child rates across age groups.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 30_000
      person2:
        age: 33
      person3:
        age: 0  # infant
        childcare_hours_per_week: 45
        mn_ccap_provider_type: FAMILY_CHILD_CARE
        mn_ccap_quality_rating: NONE
      person4:
        age: 3  # preschool
        childcare_hours_per_week: 45
        mn_ccap_provider_type: FAMILY_CHILD_CARE
        mn_ccap_quality_rating: NONE
      person5:
        age: 6  # school age
        is_in_k12_school: true
        childcare_hours_per_week: 45
        mn_ccap_provider_type: FAMILY_CHILD_CARE
        mn_ccap_quality_rating: NONE
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5]
        mn_ccap_enrolled: false
        is_tanf_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 60_000  # 5,000/month, not capping
    households:
      household:
        members: [person1, person2, person3, person4, person5]
        state_code: MN
        county: BECKER_COUNTY_MN
  output:
    mn_ccap_eligible: true
    # Becker family weekly: infant 205, preschool 190, school-age 175.
    # Monthly max = (205 + 190 + 175) * 52 / 12 = 570 * 52 / 12 = 2,470.00.
    # Size-5 copay at 30,000 -> $2 biweekly -> 4.33/month.
    # Subsidy = min(5,000, 2,470.00) - 4.33 = 2,465.67.
    mn_ccap_copay: 4.33
    mn_ccap: 2_465.67

