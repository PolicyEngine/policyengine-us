      person1:
        age: 30
        employment_income: 18_000
      person2:
        age: 0
        childcare_hours_per_week: 20  # LNL is always paid hourly per section 9.9
        mn_ccap_provider_type: LEGAL_NON_LICENSED
        mn_ccap_quality_rating: NONE
    spm_units:
      spm_unit:
        members: [person1, person2]
        mn_ccap_enrolled: false
        is_tanf_enrolled: false
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1,000/month
    households:
      household:
        members: [person1, person2]
        state_code: MN
        county: BECKER_COUNTY_MN
  output:
    # Becker LNL infant hourly 3.69 * (20 * 52 / 12) = 3.69 * 86.6667 = 319.80/month.
    # Size-2 copay at 18,000 -> $2 biweekly -> 2 * 26 / 12 = 4.33/month.
    mn_ccap_copay: 4.33
    # Subsidy = min(1,000, 319.80) - 4.33 = 315.47.
    mn_ccap: 315.47

