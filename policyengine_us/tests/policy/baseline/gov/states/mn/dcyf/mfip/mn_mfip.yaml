- name: Case 1, no income receives full cash transitional standard.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
      person2:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 5_000
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Cash TS for 2: $642, Food: $445, Full TS: $1,087
    # FWL: 1087 * 1.1 = $1,195.7
    # Earned-based: min(1195.7-0, 1087) = $1,087
    # Gross: max(1087-0, 0) = $1,087
    # Cash benefit: max(1087-445, 0) = $642
    mn_mfip: 642

- name: Case 2, earned income reduces benefit.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 6_000  # $500/month
      person2:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 5_000
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Cash TS for 2: $642, Food: $445, Full TS: $1,087
    # FWL: $1,195.7
    # Gross earned: $500/month
    # Countable earned: (500-65)*0.5 = $217.50
    # Earned-based: min(1195.7-217.5, 1087) = min(978.2, 1087) = $978.20
    # Gross: max(978.2-0, 0) = $978.20
    # Cash benefit: max(978.2-445, 0) = $533.20
    mn_mfip: 533.2

