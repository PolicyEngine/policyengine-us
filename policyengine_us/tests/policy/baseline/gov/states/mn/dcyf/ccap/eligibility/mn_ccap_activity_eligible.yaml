# Tests MN CCAP parent activity eligibility (Minn. Stat. 142E.12, subd. 1(b);
# Minn. Rules 3400.0040). Each caretaker must be in an authorized activity: an
# employed caretaker must work at least 20 hours per week, while a full-time
# student must work at least 10 hours per week. A disabled caretaker is treated
# as meeting the requirement.
- name: Case 1, working parent is activity eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    mn_ccap_activity_eligible: true

# Edge cases. A caretaker meets the activity requirement when working at least
# 20 hours per week, when a full-time student working at least 10 hours per
# week, or when disabled. weekly_hours_worked_before_lsr defaults to 40 hours
# for adults, so inactive-caretaker cases set it to 0 explicitly.
- name: Case 2, single parent with no activity is not activity eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 0  # not working
        is_full_time_student: false
        is_disabled: false
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # No working/student/disabled caretaker -> not activity eligible.
    mn_ccap_activity_eligible: false

- name: Case 3, full-time student parent working at least 10 hours per week is activity eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 10  # meets the 10 hr/wk student floor
        is_full_time_student: true
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    mn_ccap_activity_eligible: true

- name: Case 4, disabled parent is activity eligible without working.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 0
        is_disabled: true
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    mn_ccap_activity_eligible: true

- name: Case 5, two-parent household with one inactive parent is not activity eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 32
        employment_income: 24_000  # working
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 0  # inactive caretaker
        is_full_time_student: false
        is_disabled: false
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MN
  output:
    # Both parents must be in an authorized activity; the inactive spouse fails.
    mn_ccap_activity_eligible: false

- name: Case 6, two-parent household with both parents working is activity eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 32
        employment_income: 24_000
      person2:
        age: 30
        employment_income: 20_000
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: MN
  output:
    mn_ccap_activity_eligible: true

- name: Case 7, full-time student parent working below the 10 hour floor is not activity eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 9  # below the 10 hr/wk student floor
        is_full_time_student: true
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    mn_ccap_activity_eligible: false

- name: Case 8, employed parent working below the 20 hour floor is not activity eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 19  # below the 20 hr/wk employment floor
        is_full_time_student: false
        is_disabled: false
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    mn_ccap_activity_eligible: false

- name: Case 9, employed parent working exactly the 20 hour floor is activity eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 20  # exactly the 20 hr/wk employment floor (inclusive)
        is_full_time_student: false
        is_disabled: false
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # "at least an average of 20 hours" is inclusive, so exactly 20 qualifies.
    mn_ccap_activity_eligible: true
