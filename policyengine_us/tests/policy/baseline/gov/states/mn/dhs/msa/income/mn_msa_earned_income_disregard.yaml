- name: Case 1, earnings above $20 + $65 with no unearned apply $85 plus half remainder.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_earned_income: 12_000  # $1,000/mo
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # No unearned -> $20 general rolls into earned: $85 flat + ($1,000 - $85) * 0.5 = $542.50.
    mn_msa_earned_income_disregard: 542.50

- name: Case 2, earnings with unearned consuming the $20 general apply only $65 plus half remainder.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_earned_income: 12_000  # $1,000/mo
        ssi_unearned_income: 1_200  # $100/mo, exceeds $20 general
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Unearned consumes $20 -> only $65 flat + ($1,000 - $65) * 0.5 = $532.50.
    mn_msa_earned_income_disregard: 532.50

- name: Case 3, earnings below $65 disregard yield disregard equal to earnings.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_earned_income: 600  # $50/mo
        ssi_unearned_income: 600  # $50/mo, exceeds $20 general
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Earnings $50 < flat $65; disregard caps at gross earnings: $50.
    mn_msa_earned_income_disregard: 50

- name: Case 4, zero earnings yields zero disregard.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi_earned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_msa_earned_income_disregard: 0
