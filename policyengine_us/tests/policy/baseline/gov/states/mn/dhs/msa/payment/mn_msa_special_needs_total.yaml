        mn_msa_housing_assistance_eligible: true
        pre_subsidy_rent: 12_000
        ssi_unearned_income: 24_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
