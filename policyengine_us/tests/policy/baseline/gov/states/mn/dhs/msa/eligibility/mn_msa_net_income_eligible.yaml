- name: Case 4, couple countable income above the couple standard is not net-income eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_unearned_income: 9_618  # $801.50/mo; minus $10 half-disregard = $791.50
      person2:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_unearned_income: 9_618  # $801.50/mo; minus $10 half-disregard = $791.50
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Couple countable income $1,583 > $1,582 couple standard.
    mn_msa_net_income_eligible: [false, false]
