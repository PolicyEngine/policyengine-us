- name: Case 7, Medicaid facility recipient with $30 FBR and $0 unearned passes net-income test.
  period: 2026-01
  input:
    people:
      person1:
        age: 80
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 200
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
        ssi: 360  # $30/mo FLA-D
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # FLA-D carve-out: disregard = 0. SSI track countable = $30 FBR + 0 unearned
    # = $30. Standard $132 PNA -> $30 <= $132 -> eligible.
    mn_msa_net_income_eligible: true
