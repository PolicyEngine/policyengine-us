- name: Case 4, couple countable income above the couple standard is not net-income eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_unearned_income: 9_618  # $801.50/mo
      person2:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_unearned_income: 9_618  # $801.50/mo
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Non-SSI couple: AU-aggregate raw unearned $1,603/mo - $20 general
    # disregard = $1,603 countable. $1,603 > $1,582 couple standard ->
    # ineligible for both spouses.
    mn_msa_net_income_eligible: [false, false]

- name: Case 5, non-SSI couple at exact-equal couple standard is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_unearned_income: 9_612  # $801/mo each = AU $1,602
      person2:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_unearned_income: 9_612
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # AU unearned $1,602/mo - $20 = $1,582 = couple standard -> eligible.
    mn_msa_net_income_eligible: [true, true]

