- name: Case 1, countable income exactly at MSA standard is net-income eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_unearned_income: 12_900  # $1,075/mo; minus $20 general = $1,055 countable
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Countable $1,055 <= $1,055 standard -> eligible.
    mn_msa_net_income_eligible: true

