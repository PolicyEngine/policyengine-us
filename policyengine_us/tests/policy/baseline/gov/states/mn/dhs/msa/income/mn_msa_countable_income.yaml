- name: Case 1, unearned income only adds directly to countable.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi_unearned_income: 7_200  # $600/mo
        ssi_earned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_msa_countable_income: 600

- name: Case 2, earned plus unearned income post-disregard.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi_unearned_income: 2_400  # $200/mo
        ssi_earned_income: 3_000  # $250/mo
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Unearned $200 + countable earned (250 - 65)/2 = $92.50 -> $292.50 total.
    mn_msa_countable_income: 292.50

- name: Case 3, negative net earnings floor at zero do not subtract from unearned.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi_unearned_income: 6_000  # $500/mo
        ssi_earned_income: 600  # $50/mo (below $65 disregard)
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Unearned $500 + earned floored at $0 = $500 (no negative spillover).
    mn_msa_countable_income: 500

- name: Case 4, extreme negative self-employment does not produce negative countable.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        self_employment_income: -12_000_000  # extreme negative
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Earned floored at 0; unearned 0; total countable = 0.
    mn_msa_countable_income: 0
