- name: Case 1, shelter need eligible person receives half of SSI individual FBR in 2026.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_shelter_need_eligible: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # 0.5 * $994 (2026 individual FBR) = $497.
    mn_msa_shelter_need_allowance: 497

- name: Case 2, person not flagged as shelter-need-eligible receives nothing.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_shelter_need_eligible: false
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_msa_shelter_need_allowance: 0
