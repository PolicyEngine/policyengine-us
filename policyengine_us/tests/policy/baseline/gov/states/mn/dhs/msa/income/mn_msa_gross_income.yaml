- name: Case 1, SSI recipient gross income includes the federal SSI payment per House Research.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi: 11_928  # $994/mo
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Federal SSI $994 counts as gross unearned for the MSA gross test.
    mn_msa_gross_income: 994

- name: Case 2, non-SSI track recipient gross income sums earned plus unearned only.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_earned_income: 6_000  # $500/mo
        ssi_unearned_income: 3_600  # $300/mo
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Earned $500 + unearned $300 + SSI $0 = $800.
    mn_msa_gross_income: 800

- name: Case 3, deemed-from-ineligible-spouse income aggregates into gross.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi: 11_928  # $994/mo
        ssi_earned_income: 1_200  # $100/mo
        ssi_unearned_income: 600  # $50/mo
        ssi_earned_income_deemed_from_ineligible_spouse: 2_400  # $200/mo deemed
        ssi_unearned_income_deemed_from_ineligible_spouse: 1_200  # $100/mo deemed
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Own earned $100 + own unearned $50 + SSI $994 + deemed earned $200 + deemed unearned $100 = $1,444.
    mn_msa_gross_income: 1_444

- name: Case 4, zero income across all components yields zero gross.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi: 0
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_msa_gross_income: 0
