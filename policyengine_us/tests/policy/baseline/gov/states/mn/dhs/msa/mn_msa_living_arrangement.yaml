- name: Case 1, single SSI-eligible person living alone.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_000
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi: 11_928  # $994/mo
        employment_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_msa_living_arrangement: INDIVIDUAL_LIVING_ALONE

