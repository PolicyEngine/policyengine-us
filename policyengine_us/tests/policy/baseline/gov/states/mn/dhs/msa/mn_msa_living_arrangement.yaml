- name: Case 3, married SSI-eligible couple living alone joint claim.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi_claim_is_joint: true
        ssi: 8_946  # half of couple FBR $1,491
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi_claim_is_joint: true
        ssi: 8_946
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    mn_msa_living_arrangement: [COUPLE_LIVING_ALONE, COUPLE_LIVING_ALONE]

