- name: Case 6, HCBS treated-as-living-alone overrides cohabitation.
  period: 2026-01
  input:
    people:
      person1:
        age: 60
        is_blind: false
        is_disabled: true
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_lives_with_others: true
        mn_msa_treated_as_living_alone: true
        ssi: 11_928
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Treated-as-living-alone forces INDIVIDUAL_LIVING_ALONE despite cohabitation.
    mn_msa_living_arrangement: INDIVIDUAL_LIVING_ALONE

- name: Case 7, non-categorically-eligible person defaults to NONE.
  period: 2026-01
  input:
    people:
      person1:
        age: 40
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
