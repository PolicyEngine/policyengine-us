        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Non-SSI track, no unearned: ($1,000 - $85)/2 = $457.50.
    mn_msa_countable_earned_income: 457.50
