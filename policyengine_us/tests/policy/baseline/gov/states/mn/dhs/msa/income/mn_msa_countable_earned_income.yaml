- name: Case 1, SSI-track recipient with earnings has zero MSA countable earned (federal SSI already disregards).
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi_earned_income: 3_000  # $250/mo
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # SSI > 0; federal $20 + $65 + 1/2 disregards already in ssi_countable_income.
    mn_msa_countable_earned_income: 0

- name: Case 2, non-SSI track earnings above $20 + $65 disregard apply remaining and half.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000  # above $2k SSI cap, not on SSI track
        ssi: 0
        ssi_earned_income: 3_000  # $250/mo
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Non-SSI track, no unearned: leftover $20 + $65 = $85 flat; ($250 - $85)/2 = $82.50.
    mn_msa_countable_earned_income: 82.50

- name: Case 3, non-SSI track earnings exactly at $20 + $65 boundary yield zero countable.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_earned_income: 1_020  # $85/mo
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Non-SSI track: $85 - $85 = $0; half of $0 = $0.
    mn_msa_countable_earned_income: 0

