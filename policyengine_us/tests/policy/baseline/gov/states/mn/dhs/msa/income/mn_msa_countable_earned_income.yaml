- name: Case 5, non-SSI track unearned income consumes the $20 general so only $65 disregards earned.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_earned_income: 792  # $66/mo
        ssi_unearned_income: 600  # $50/mo, exceeds $20 general
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # $20 fully consumed by unearned; only $65 applies to earned: ($66 - $65)/2 = $0.50.
    mn_msa_countable_earned_income: 0.50

- name: Case 6, non-SSI track large earnings apply $20 + $65 plus half remainder.
  period: 2026-01
  absolute_error_margin: 0.01
