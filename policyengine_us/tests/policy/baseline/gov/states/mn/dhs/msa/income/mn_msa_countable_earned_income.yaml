- name: Case 1, earnings below the $65 initial disregard yield zero countable earned.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi_earned_income: 600  # $50/mo (annual = $50 * 12)
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Earned $50, after $65 disregard = max(0, 50 - 65) = $0; no remainder to halve.
    mn_msa_countable_earned_income: 0

- name: Case 2, earnings above $65 disregard apply $65 plus half remainder.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi_earned_income: 3_000  # $250/mo
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Earned $250, less $65 = $185, halved = $92.50 countable.
    mn_msa_countable_earned_income: 92.50

