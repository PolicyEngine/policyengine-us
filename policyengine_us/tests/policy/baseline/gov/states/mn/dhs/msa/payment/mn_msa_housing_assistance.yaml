- name: Case 1, housing-assistance eligible person receives half of SSI individual FBR in 2026.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_blind: false
        is_disabled: true
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_housing_assistance_eligible: true
        pre_subsidy_rent: 6_000
        ssi: 11_928
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # 0.5 * $994 (2026 individual FBR) = $497.
    mn_msa_housing_assistance: 497

