- name: Case 3, 2024 housing assistance uses 2024 individual FBR.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_blind: false
        is_disabled: true
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_housing_assistance_eligible: true
        ssi: 943  # $943/mo (2024 individual FBR)
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # 0.5 × $943 = $471.50.
    mn_msa_housing_assistance: 471.50
