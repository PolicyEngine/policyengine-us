- name: Case 1, individual at exactly 300% of SSI FBR is gross-income eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        employment_income: 35_784  # $2,982/mo = 3 x $994
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Cap = 3 x $994 = $2,982 -> $2,982 <= $2,982 passes.
    mn_msa_gross_income_eligible: true

- name: Case 2, couple at exactly 600% of SSI FBR is gross-income eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        ssi_claim_is_joint: true
        employment_income: 35_784  # $2,982/mo
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        ssi_claim_is_joint: true
        employment_income: 35_784  # $2,982/mo -> couple total $5,964 = 6 x $994
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Couple cap = 6 x $994 = $5,964 -> $5,964 <= $5,964 passes.
    mn_msa_gross_income_eligible: [true, true]

