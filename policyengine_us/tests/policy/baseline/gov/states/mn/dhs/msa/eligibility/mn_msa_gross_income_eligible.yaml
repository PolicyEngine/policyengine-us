- name: Case 8, non-SSI aged couple uses the 600% couple cap regardless of joint claim.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 4_000
        ssi: 0
        ssi_claim_is_joint: false  # not on SSI -> no joint claim flag
        employment_income: 36_000  # $3,000/mo, above $2,982 individual cap
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 4_000
        ssi: 0
        ssi_claim_is_joint: false
        employment_income: 24_000  # $2,000/mo
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Both spouses are aged -> couple gross cap $5,964 applies.
    # Combined gross $5,000 < $5,964 -> both eligible (would have failed
    # under per-person individual $2,982 cap on the higher-earning spouse).
    mn_msa_gross_income_eligible: [true, true]
