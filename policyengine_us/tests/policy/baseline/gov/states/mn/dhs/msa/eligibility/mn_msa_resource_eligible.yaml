- name: Case 6, single SSI recipient with resources just below SSI $2,000 cap.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_999
        ssi: 11_928
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # SSI recipient: passes MSA resource test by virtue of receiving SSI.
    # The federal $2,000 cap is enforced upstream and is not exercised here.
    mn_msa_resource_eligible: true

- name: Case 7, SSI couple with combined resources just below $3,000 cap.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_499
        ssi_claim_is_joint: true
        ssi: 8_946
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_499
        ssi_claim_is_joint: true
        ssi: 8_946
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Both spouses are SSI recipients so they pass MSA's resource test.
    # The federal $3,000 couple cap is enforced upstream and not exercised.
    mn_msa_resource_eligible: [true, true]

- name: Case 8, person with high resources but ssi=0 falls back to non-SSI track.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 9_500  # > $2k SSI cap, < $10k non-SSI cap
        ssi: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # ssi=0 -> non-SSI track applies; $9,500 <= $10,000 -> eligible.
    mn_msa_resource_eligible: true

- name: Case 9, non-SSI couple with combined resources above $10,000 cap is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 6_000  # individually under $10k
        ssi: 0
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 6_000  # individually under $10k
        ssi: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # § 256P.02 Subd. 2 (applied via § 256D.425 Subd. 2(b)): $10,000 cap
    # applies to the assistance unit. Combined $12,000 > $10,000 -> both
    # spouses ineligible.
    mn_msa_resource_eligible: [false, false]

