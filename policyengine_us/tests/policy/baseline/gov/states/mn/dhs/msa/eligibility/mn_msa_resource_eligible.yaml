- name: Case 1, SSI recipient with low resources is resource eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_500
        ssi: 11_928
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # SSI recipients pass MSA's resource test by virtue of receiving SSI
    # (federal $2,000/$3,000 caps are enforced upstream in the SSI calc).
    mn_msa_resource_eligible: true

