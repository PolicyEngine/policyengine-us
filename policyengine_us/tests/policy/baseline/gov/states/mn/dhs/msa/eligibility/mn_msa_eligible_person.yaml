- name: Case 1, aged SSI recipient is eligible (SSI-receipt path).
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_000
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi: 11_928  # $994/mo
        employment_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_msa_eligible_person: true

- name: Case 2, SSI-eligible-except-for-income at MSA standard is eligible (non-SSI path).
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000  # below non-SSI $10k cap, above SSI $2k cap
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi: 0
        ssi_unearned_income: 12_000  # $1,000/mo unearned (above SSI FBR but below MSA standard)
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Income $1,000 < $1,055 individual living alone standard.
    # Gross < 300% FBR ($2,982).
    mn_msa_eligible_person: true

- name: Case 3, non-aged non-blind non-disabled adult is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 40
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_msa_eligible_person: false

- name: Case 4, income above MSA standard is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi: 0
        ssi_unearned_income: 24_000  # $2,000/mo > $1,055 standard
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Countable $2,000 > $1,055 standard -> not income eligible.
    mn_msa_eligible_person: false
