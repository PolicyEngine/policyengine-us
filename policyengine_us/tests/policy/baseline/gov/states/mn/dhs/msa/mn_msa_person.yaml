- name: Case 13, negative self-employment does not inflate the supplement.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi: 11_928  # $994/mo SSI
        self_employment_income: -12_000_000  # -$1M/mo extreme negative
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Negative earnings must not push supplement above the standard.
    # SSI-track countable floors at 0; supplement = $1,055 - max($994 - $20, 0) = $81.
    mn_msa_person: 81
