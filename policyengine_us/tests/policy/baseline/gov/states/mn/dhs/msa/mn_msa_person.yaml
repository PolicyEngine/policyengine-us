- name: Case 1, SSI-track aged person living alone with no countable income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi: 11_928  # $994/mo
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Need standard $1,055 - max($994 SSI - $20 general, 0) - countable $0 = $81.
    mn_msa_person: 81

- name: Case 2, non-SSI track aged person with $1,000/mo unearned income living alone.
  period: 2026-01
