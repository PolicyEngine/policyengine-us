        is_blind: false
        is_disabled: true
        immigration_status: CITIZEN
        mn_msa_living_arrangement: INDIVIDUAL_LIVING_WITH_OTHERS
        mn_msa_housing_assistance_eligible: true
        pre_subsidy_rent: 6_000
        ssi_countable_resources: 500
        ssi: 11_928
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Housing assistance switches the base standard from $755.33 to $1,055.
    # Base $81 plus housing allowance $497 = $578.
    mn_msa_payment_category: INDIVIDUAL_LIVING_ALONE
    mn_msa_person: 578

- name: Case 10, asymmetric SSI couple — only one spouse has extra unearned income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi_claim_is_joint: true
        ssi: 8_946  # $745.50/mo (couple FBR / 2)
        ssi_earned_income: 0
        ssi_unearned_income: 2_400  # $200/mo to spouse A only
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi_claim_is_joint: true
        ssi: 8_946
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Couple-level: SSI couple FBR $1,491 + $200 unearned - $20 disregard = $1,671 countable.
    # Standard $1,582 - $1,671 = floored at $0. Bug fix: no over-payment from per-spouse floor.
    mn_msa_person: [0, 0]

- name: Case 11, asymmetric non-SSI couple — only one spouse has earned income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi: 0
        ssi_earned_income: 12_000  # $1,000/mo to spouse A only
        ssi_unearned_income: 0
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi: 0
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Couple earned $1,000 - ($20 + $65) = $915 over flat; disregard = $85 + $915*0.5 = $542.50.
    # Couple countable = max($1,000 - $542.50, 0) = $457.50.
    # Couple supplement = max($1,582 - $457.50, 0) = $1,124.50, split 50/50 = $562.25 per spouse.
    mn_msa_person: [562.25, 562.25]

