- name: Case 7, marital unit of size 1 with ssi_claim_is_joint=true cannot trigger couple gate.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi_claim_is_joint: true  # spurious; marital_unit.sum cannot reach 2
        ssi: 11_928  # $994/mo
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Couple gate unreachable for size-1 marital unit -> individual rate.
    mn_msa_living_arrangement: INDIVIDUAL_LIVING_ALONE
    mn_msa_person: 61
