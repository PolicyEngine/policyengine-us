        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Standard $1,055 - countable ($1,000 - $20 general) = $1,055 - $980 = $75.
    mn_msa_person: 75

