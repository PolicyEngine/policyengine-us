- name: Case 1, SSI-track aged person living alone with no countable income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi: 11_928  # $994/mo
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Need standard $1,055 - max($994 SSI - $20 general, 0) - countable $0 = $81.
    mn_msa_person: 81

- name: Case 2, non-SSI track aged person with $1,000/mo unearned income living alone.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000
        ssi: 0
        ssi_unearned_income: 12_000  # $1,000/mo
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Standard $1,055 - countable ($1,000 - $20 general) = $1,055 - $980 = $75.
    mn_msa_person: 75

- name: Case 3, Medicaid facility recipient receives PNA-only state portion.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 80
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 200
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
        ssi: 360  # $30/mo FLA-D
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Standard $162 - federal SSI $30 - countable $0 = $132 (PNA only, state portion).
    mn_msa_person: 132

- name: Case 4, SSI couple living alone splits the couple-rate 50/50 across spouses.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi_claim_is_joint: true
        ssi: 8_946  # $745.50/mo (couple FBR $1,491 / 2)
        ssi_earned_income: 0
        ssi_unearned_income: 0
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi_claim_is_joint: true
        ssi: 8_946
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Per person: $1,582 / 2 = $791 standard - max($745.50 SSI - $20, 0) = $791 - $725.50 = $65.50.
    mn_msa_person: [65.50, 65.50]

- name: Case 5, asymmetric eligibility couple — only one spouse SSI-eligible.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        ssi_claim_is_joint: false
        ssi: 11_928  # eligible spouse, full FBR
        ssi_earned_income: 0
        ssi_unearned_income: 0
      person2:
        age: 40
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        ssi_claim_is_joint: false
        ssi: 0  # ineligible spouse, not aged/blind/disabled
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Eligible spouse defaults to INDIVIDUAL_LIVING_ALONE:
    # $1,055 - max($994 SSI - $20, 0) = $1,055 - $974 = $81.
    # Ineligible spouse zeroed by mn_msa_eligible_person filter.
    mn_msa_person: [81, 0]

