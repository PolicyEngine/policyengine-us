- name: Case 4, SSI couple living alone splits the couple-rate 50/50 across spouses.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi_claim_is_joint: true
        ssi: 8_946  # $745.50/mo (couple FBR $1,491 / 2)
        ssi_earned_income: 0
        ssi_unearned_income: 0
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_living_arrangement: COUPLE_LIVING_ALONE
        ssi_claim_is_joint: true
        ssi: 8_946
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Per person: $1,582 / 2 = $791 standard - max($745.50 SSI - $20/2, 0)
    # = $791 - $735.50 = $55.50. Couple total $111. (P2.1: $20 disregard
    # is applied once per couple, allocated half to each spouse.)
    mn_msa_person: [55.50, 55.50]

- name: Case 5, asymmetric eligibility couple — only one spouse SSI-eligible.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        ssi_claim_is_joint: false
        ssi: 11_928  # eligible spouse, full FBR
        ssi_earned_income: 0
        ssi_unearned_income: 0
      person2:
        age: 40
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        ssi_claim_is_joint: false
        ssi: 0  # ineligible spouse, not aged/blind/disabled
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Eligible spouse defaults to INDIVIDUAL_LIVING_ALONE:
    # $1,055 - max($994 SSI - $20, 0) = $1,055 - $974 = $81.
    # Ineligible spouse zeroed by mn_msa_eligible_person filter.
    mn_msa_person: [81, 0]

