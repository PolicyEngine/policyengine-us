      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_has_guardian: true
        ssi_unearned_income: 23_988  # $1,999/mo gross -> 5% = $99.95
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # min(5% of $1,999 = $99.95, $100 cap) = $99.95.
    mn_msa_guardian_fee: 99.95

