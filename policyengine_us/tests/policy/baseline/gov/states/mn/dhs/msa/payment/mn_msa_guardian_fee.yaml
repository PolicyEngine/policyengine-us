- name: Case 1, guardian fee bound by 5% of gross income (under $100 cap).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_has_guardian: true
        ssi_unearned_income: 24_000  # $2,000/mo gross
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # 5% of $2,000 = $100; min($100, $100 cap) = $100.
    mn_msa_guardian_fee: 100

