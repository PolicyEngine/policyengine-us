- name: Case 1, single SSI recipient living alone with no other income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_000
        ssi: 994  # $994/mo
        ssi_earned_income: 0
        ssi_unearned_income: 0
        employment_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_msa_living_arrangement: INDIVIDUAL_LIVING_ALONE
    mn_msa_assistance_standard: 1_055
    mn_msa_eligible_person: true
    # Need $1,055 - max($994 SSI - $20 general, 0) - countable $0 = $81.
    mn_msa_person: 81
    mn_msa: 81

- name: Case 2, SSI couple living with others gets the couple-rate gating.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_living_arrangement: COUPLE_LIVING_WITH_OTHERS
        ssi_claim_is_joint: true
        ssi: 745.50  # $745.50/mo (couple FBR $1,491 / 2)
        ssi_earned_income: 0
        ssi_unearned_income: 0
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_living_arrangement: COUPLE_LIVING_WITH_OTHERS
        ssi_claim_is_joint: true
        ssi: 745.50
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    mn_msa_living_arrangement: [COUPLE_LIVING_WITH_OTHERS, COUPLE_LIVING_WITH_OTHERS]
    mn_msa_assistance_standard: [1_058, 1_058]
    # Couple SSI track countable = $1,491 FBR + $0 unearned - $20 = $1,471.
    # Standard $1,058 < $1,471, so the net-income test fails -> not eligible
    # and no state supplement (couple FBR exceeds the CLWO standard).
    mn_msa_eligible_person: [false, false]
    mn_msa_person: [0, 0]
    mn_msa: 0

- name: Case 3, non-SSI track recipient with income above SSI but below MSA standard.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000  # above $2k SSI cap, below $10k non-SSI cap
        ssi: 0
        ssi_earned_income: 0
        ssi_unearned_income: 12_000  # $1,000/mo
        employment_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_msa_living_arrangement: INDIVIDUAL_LIVING_ALONE
    mn_msa_assistance_standard: 1_055
    mn_msa_eligible_person: true
    # Standard $1,055 - countable ($1,000 - $20 general) = $1,055 - $980 = $75.
    mn_msa_person: 75
    mn_msa: 75

- name: Case 4, Medicaid facility recipient receives PNA-only state portion.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 80
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 200
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
        ssi: 30  # $30/mo FLA-D
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # The bare-input mn_msa_living_arrangement defaults to INDIVIDUAL_LIVING_ALONE;
    # the federal medical-facility status is detected by mn_msa_payment_category,
    # which the assistance_standard formula reads.
    mn_msa_payment_category: MEDICAID_FACILITY
    mn_msa_assistance_standard: 132
    mn_msa_eligible_person: true
    # Combined PNA standard $132 - federal SSI FBR $30 = $102 state supplement.
    mn_msa_person: 102
    mn_msa: 102

