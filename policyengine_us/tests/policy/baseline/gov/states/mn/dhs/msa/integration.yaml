- name: Case 6, negative countable income does not inflate benefit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi: 11_928
        self_employment_income: -60_000_000  # extreme negative
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Countable income components are floored at 0; benefit cannot exceed need - SSI.
    mn_msa_assistance_standard: 1_055
    mn_msa_countable_income: 0
    mn_msa_person: 61
    mn_msa: 61

