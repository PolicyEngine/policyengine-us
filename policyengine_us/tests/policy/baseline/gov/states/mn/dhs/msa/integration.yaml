    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Not receiving SSI and not citizen/legal immigrant -> immigration test fails.
    mn_msa_eligible_person: false
    mn_msa_person: 0
    mn_msa: 0
