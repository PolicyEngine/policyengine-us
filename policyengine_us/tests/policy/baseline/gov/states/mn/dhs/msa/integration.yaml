- name: Case 11, recipient with representative payee fee and guardian fee combined.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        mn_msa_uses_representative_payee: true
        mn_msa_has_guardian: true
        ssi: 11_928  # $994/mo federal SSI
        ssi_earned_income: 0
        ssi_unearned_income: 12_000  # $1,000/mo gross unearned
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_msa_assistance_standard: 1_055
    mn_msa_representative_payee_fee: 57
    # Gross = SSI $994 + unearned $1,000 = $1,994; 5% = $99.70 < $100 cap.
    mn_msa_guardian_fee: 99.70
    # Base: max(0, $1,055 - $994 - $1,000 countable) = $0;
    # plus $57 payee fee + $99.70 guardian fee = $156.70.
    mn_msa_person: 156.70
    mn_msa: 156.70

