- name: Case 1, single SSI recipient living alone with no other income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_000
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi: 11_928  # $994/mo
        ssi_earned_income: 0
        ssi_unearned_income: 0
        employment_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_msa_living_arrangement: INDIVIDUAL_LIVING_ALONE
    mn_msa_assistance_standard: 1_055
    mn_msa_countable_income: 0
    mn_msa_eligible_person: true
    # Need $1,055 - federal SSI $994 - countable $0 = $61.
    mn_msa_person: 61
    mn_msa: 61

- name: Case 2, SSI couple living with others gets the couple-rate gating.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_lives_with_others: true
        mn_msa_treated_as_living_alone: false
        ssi_claim_is_joint: true
        ssi: 8_946  # $745.50/mo (couple FBR $1,491 / 2)
        ssi_earned_income: 0
        ssi_unearned_income: 0
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_lives_with_others: true
        mn_msa_treated_as_living_alone: false
        ssi_claim_is_joint: true
        ssi: 8_946
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    mn_msa_living_arrangement: [COUPLE_LIVING_WITH_OTHERS, COUPLE_LIVING_WITH_OTHERS]
    mn_msa_assistance_standard: [1_058, 1_058]
    mn_msa_eligible_person: [true, true]
    # COUPLE_LIVING_WITH_OTHERS $1,058 is the couple total; per person =
    # $529. Per spouse: max(0, $529 - $745.50 - $0) = $0 (couple SSI
    # exceeds the couple supplement standard for this living arrangement).
    mn_msa_person: [0, 0]
    mn_msa: 0

- name: Case 3, non-SSI track recipient with income above SSI but below MSA standard.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 5_000  # above $2k SSI cap, below $10k non-SSI cap
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi: 0
        ssi_earned_income: 0
        ssi_unearned_income: 12_000  # $1,000/mo
        employment_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_msa_living_arrangement: INDIVIDUAL_LIVING_ALONE
    mn_msa_assistance_standard: 1_055
    mn_msa_countable_income: 1_000
    mn_msa_eligible_person: true
    # Need $1,055 - countable $1,000 (no federal SSI to subtract) = $55.
    mn_msa_person: 55
    mn_msa: 55

