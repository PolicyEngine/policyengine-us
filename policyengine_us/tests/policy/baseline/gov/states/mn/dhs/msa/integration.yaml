        is_blind: false
        is_disabled: true
        meets_ssi_disability_criteria: true
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        mn_msa_housing_assistance_eligible: true
        ssi: 994
        ssi_earned_income: 0
        ssi_unearned_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    mn_msa_living_arrangement: INDIVIDUAL_LIVING_ALONE
    mn_msa_assistance_standard: 1_055
    mn_msa_housing_assistance: 497
    mn_msa_eligible_person: true
    # Base: $1,055 - max($994 SSI - $20, 0) = $81; plus $497 housing add-on = $578.
    mn_msa_person: 578
    mn_msa: 578

- name: Case 6, negative countable income does not inflate benefit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi: 994
        self_employment_income: -60_000_000  # extreme negative
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MN
  output:
    # Countable income components are floored at 0; benefit cannot exceed need - SSI.
    # $1,055 - max($994 SSI - $20 general, 0) = $1,055 - $974 = $81.
    mn_msa_assistance_standard: 1_055
    mn_msa_person: 81
    mn_msa: 81

