- name: Case 9, asymmetric eligibility couple — only one spouse SSI-eligible.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi_claim_is_joint: false
        ssi: 11_928  # eligible spouse, full FBR
        ssi_earned_income: 0
        ssi_unearned_income: 0
      person2:
        age: 40
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        mn_msa_lives_with_others: false
        mn_msa_treated_as_living_alone: false
        ssi_claim_is_joint: false
        ssi: 0  # ineligible spouse, not aged/blind/disabled
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    # Only one spouse is SSI-eligible -> individual rate, not couple rate.
    mn_msa_living_arrangement: [INDIVIDUAL_LIVING_ALONE, NONE]
    mn_msa_eligible_person: [true, false]
    # person1: $1,055 - $994 - $0 = $61.
    # person2: not categorically eligible.
    mn_msa_person: [61, 0]
    mn_msa: 61

