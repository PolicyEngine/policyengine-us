- name: Case 1, refund follows the state example.
  absolute_error_margin: 0.01
  period: 2025
  input:
    people:
      person1:
        age: 65
        rent: 9_600
    tax_units:
      tax_unit:
        members: [person1]
        nd_renters_refund_income: 35_000
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund: 520

