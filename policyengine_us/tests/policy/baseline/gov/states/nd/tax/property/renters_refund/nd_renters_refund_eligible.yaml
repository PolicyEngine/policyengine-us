- name: Case 1, senior renter with sufficient rent burden is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 65
        rent: 9_600
    tax_units:
      tax_unit:
        members: [person1]
        nd_renters_refund_income: 35_000
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: true

- name: Case 2, permanently disabled renter under age 65 is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 40
        is_permanently_and_totally_disabled: true
        rent: 9_600
    tax_units:
      tax_unit:
        members: [person1]
        nd_renters_refund_income: 35_000
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: true

- name: Case 3, income above the limit is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 65
        rent: 20_000
    tax_units:
      tax_unit:
        members: [person1]
        nd_renters_refund_income: 70_001
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: false

