- name: Case 1, senior renter with sufficient rent burden is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 65
        rent: 9_600
    tax_units:
      tax_unit:
        members: [person1]
        nd_renters_refund_income: 35_000
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: true

- name: Case 2, permanently disabled renter under age 65 is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 40
        is_permanently_and_totally_disabled: true
        rent: 9_600
    tax_units:
      tax_unit:
        members: [person1]
        nd_renters_refund_income: 35_000
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: true

- name: Case 3, income above the limit is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 65
        rent: 20_000
    tax_units:
      tax_unit:
        members: [person1]
        nd_renters_refund_income: 70_001
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: false

- name: Case 4, renter without sufficient rent burden is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 65
        rent: 4_000
    tax_units:
      tax_unit:
        members: [person1]
        nd_renters_refund_income: 35_000
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: false

- name: Case 5, non-senior renter without disability is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 64
        rent: 9_600
    tax_units:
      tax_unit:
        members: [person1]
        nd_renters_refund_income: 35_000
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: false

- name: Case 6, non-permanent disability does not qualify.
  period: 2025
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        rent: 9_600
    tax_units:
      tax_unit:
        members: [person1]
        nd_renters_refund_income: 35_000
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: false

- name: Case 7, taxable and nontaxable Social Security income counts.
  period: 2025
  input:
    people:
      person1:
        age: 65
        rent: 20_000
    tax_units:
      tax_unit:
        members: [person1]
        nd_renters_refund_income: 70_001
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: false

- name: Case 8, rent paid for property tax exempt quarters is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 65
        rent: 9_600
    tax_units:
      tax_unit:
        members: [person1]
        nd_renters_refund_income: 35_000
        nd_renters_refund_property_tax_exempt: true
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: false
