- name: Case 1, senior renter with sufficient rent burden is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 65
        rent: 9_600
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 35_000
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: true

- name: Case 2, disabled renter under age 65 is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        rent: 9_600
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 35_000
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: true

- name: Case 3, income above the limit is ineligible.
  period: 2026
  input:
    people:
      person1:
        age: 65
        rent: 20_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 70_001
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: false

- name: Case 4, renter without sufficient rent burden is ineligible.
  period: 2026
  input:
    people:
      person1:
        age: 65
        rent: 4_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 35_000
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: false

- name: Case 5, non-senior renter without disability is ineligible.
  period: 2026
  input:
    people:
      person1:
        age: 64
        rent: 9_600
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 35_000
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_renters_refund_eligible: false
