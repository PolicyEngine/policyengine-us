# Tests for nd_ccap_qris_step_bonus (Person, MONTH, USD).
# The QRIS step bonus is a separate provider payment equal to the base state
# maximum rate (full-time or part-time, excluding the special-needs +10%)
# times the quality-step bonus rate (400-28-100-30). It is date-varying:
#   2023-06-01 era: step 2 = +5%, step 3 = +10%, step 4 = +15%
#   2026-01-01 era: step 2 = +0%, step 3 = +5%,  step 4 = +10%
# The base state maximum rate is also date-varying: the 2022-10-01 DN 241
# schedule applies through 2025 (Center infant full-time = 913, part-time = 900)
# and the 2026-01-01 schedule applies from 2026 (Center infant full-time = 1,240,
# part-time = 546). So the 2025 cases pair the 2023-06-01 bonus percentages
# (+5/+10/+15) with the 2022 base rate. defined_for = nd_ccap_eligible_child.

# --- 2026 era (step 2 eliminated; step 3 +5%, step 4 +10%) ---

- name: Case 1, step 1 has no bonus.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5
        nd_ccap_provider_type: CENTER
        nd_ccap_provider_qris_step: STEP_1
        childcare_hours_per_week: 40
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_ccap_qris_step_bonus: 0

- name: Case 2, step 2 eliminated in 2026, no bonus.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5
        nd_ccap_provider_type: CENTER
        nd_ccap_provider_qris_step: STEP_2
        childcare_hours_per_week: 40
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_ccap_qris_step_bonus: 0

- name: Case 3, step 3 in 2026 is +5% of the base rate.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5
        nd_ccap_provider_type: CENTER
        nd_ccap_provider_qris_step: STEP_3
        childcare_hours_per_week: 40
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    # 1,240 * 0.05 = 62
    nd_ccap_qris_step_bonus: 62

- name: Case 4, step 4 in 2026 is +10% of the base rate.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5
        nd_ccap_provider_type: CENTER
        nd_ccap_provider_qris_step: STEP_4
        childcare_hours_per_week: 40
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    # 1,240 * 0.10 = 124
    nd_ccap_qris_step_bonus: 124

- name: Case 5, unrated provider has no bonus.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5
        nd_ccap_provider_type: CENTER
        childcare_hours_per_week: 40
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_ccap_qris_step_bonus: 0

- name: Case 6, step 4 part-time uses the part-time base rate.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5
        nd_ccap_provider_type: CENTER
        nd_ccap_provider_qris_step: STEP_4
        childcare_hours_per_week: 20  # part-time
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    # part-time base 546 * 0.10 = 54.6
    nd_ccap_qris_step_bonus: 54.6

# --- 2025 era (step 2 +5%, step 3 +10%, step 4 +15%) ---

