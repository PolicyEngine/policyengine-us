  input:
    people:
      person1:
        age: 0.5
        nd_ccap_provider_type: CENTER
        nd_ccap_provider_qris_step: STEP_4
        childcare_hours_per_week: 40
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    # 1,240 * 0.10 = 124
    nd_ccap_qris_step_bonus: 124

- name: Case 5, unrated provider has no bonus.
  period: 2026-01
