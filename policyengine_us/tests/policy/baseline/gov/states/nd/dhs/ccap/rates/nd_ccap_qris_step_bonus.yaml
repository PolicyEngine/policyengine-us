  input:
    people:
      person1:
        age: 0.5
        nd_ccap_provider_type: CENTER
        childcare_hours_per_week: 40
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_ccap_qris_step_bonus: 0

- name: Case 6, step 4 part-time uses the part-time base rate.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5
        nd_ccap_provider_type: CENTER
        nd_ccap_provider_qris_step: STEP_4
        childcare_hours_per_week: 20  # part-time
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    # part-time base 546 * 0.10 = 54.6
    nd_ccap_qris_step_bonus: 54.6

