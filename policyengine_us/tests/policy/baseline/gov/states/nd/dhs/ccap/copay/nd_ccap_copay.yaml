# Tests for nd_ccap_copay (SPMUnit, MONTH, USD).
# The family monthly co-payment is a flat amount per SMI band from the HHS
# "Individual Worksheet for Calculating Co-pay": copay = share(income/SMI) x
# monthly SMI, where the band share = band rate (2% for 30-50%, 4% for 50-60%,
# 6% for 60%+) x the band's lower SMI bound. Waived at or below 30% SMI or for
# TANF recipients (400-28-90-10/-20). The rate structure was validated against
# the worksheet for household sizes 1-8 on 2026-06-26.
#
# Period is 2025-01: at that period PolicyEngine's hhs_smi equals the real
# published FFY2025 SMI exactly (the uprating projection only applies after the
# last published value, 2025-10-01), so these cases use real-world SMI rather
# than the uprated calendar-2026 projection.
# ND 4-person annual SMI FFY2025 = $123,092. Monthly SMI by size:
#   2-person = 123,092 * 0.68 / 12 = $6,975.21 (30% = $2,092.56)
#   3-person = 123,092 * 0.84 / 12 = $8,616.44
# Countable income is set directly and the unit is made eligible so copay
# (defined_for = nd_ccap_eligible) is computed.

- name: Case 1, income at or below 30% SMI, co-payment waived.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
        nd_ccap_countable_income: 1_883  # ratio 0.2700, at or below 30% SMI
        nd_ccap_income_eligible: true
        is_ccdf_asset_eligible: true
        nd_ccap_activity_eligible: true
    households:
      household:
        members: [person1, person2]
        state_code: ND
  output:
    nd_ccap_copay: 0

