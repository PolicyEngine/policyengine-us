# Tests for nd_ccap_state_max_rate (Person, MONTH, USD).
# The monthly state maximum rate is looked up by provider type, age group, and
# level of care (full-time vs part-time), then multiplied by 1.10 for a
# disabled child at a QRIS step-2-or-higher provider (400-28-100-30). Rates are
# the statewide flat monthly maximums effective 2026-01-01. defined_for =
# nd_ccap_eligible_child, so each child is a citizen within the age limit.
# Full-time requires 25+ child care hours per week; part-time is under 25.
# Every provider type and age group is exercised at least once.

# --- Full-time, every provider type and age group ---

- name: Case 1, Center infant full-time.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5
        nd_ccap_provider_type: CENTER
        childcare_hours_per_week: 40
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    nd_ccap_state_max_rate: 1_240

