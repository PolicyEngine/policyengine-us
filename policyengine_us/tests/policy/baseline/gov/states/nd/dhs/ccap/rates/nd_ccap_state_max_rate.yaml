# --- Special-needs +10% (gated on disability AND QRIS step 2+) ---

- name: Case 14, disabled child at QRIS step 2 gets the +10% raise.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5
        is_disabled: true
        nd_ccap_provider_type: CENTER
        nd_ccap_provider_qris_step: STEP_2
        childcare_hours_per_week: 40
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    # Center infant full-time 1,240 * 1.10 = 1,364
    nd_ccap_state_max_rate: 1_364

- name: Case 15, disabled child at QRIS step 1 does not get the +10% raise.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5
        is_disabled: true
        nd_ccap_provider_type: CENTER
        nd_ccap_provider_qris_step: STEP_1
        childcare_hours_per_week: 40
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    # Step 1 fails the step-2-or-higher gate, so no +10%: still 1,240
    nd_ccap_state_max_rate: 1_240

- name: Case 16, non-disabled child at QRIS step 4 does not get the +10% raise.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5
        nd_ccap_provider_type: CENTER
        nd_ccap_provider_qris_step: STEP_4
        childcare_hours_per_week: 40
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    # Not disabled, so the special-needs gate fails: still 1,240
    nd_ccap_state_max_rate: 1_240

# --- Degenerate / edge inputs ---

- name: Case 17, child with zero child care hours falls to the part-time rate.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5
        nd_ccap_provider_type: CENTER
        childcare_hours_per_week: 0  # no hours in care
    households:
      household:
        members: [person1]
        state_code: ND
  output:
    # We do not track an explicit "not in care" flag, so a child with zero
    # hours is classified part-time (hours < 25) and receives the Center infant
    # part-time rate 546 rather than zero. Families with a child not in care
    # would supply zero pre-subsidy expenses, so the expense cap in
    # nd_ccap_base_subsidy keeps the benefit from counting unused capacity.
    nd_ccap_state_max_rate: 546
