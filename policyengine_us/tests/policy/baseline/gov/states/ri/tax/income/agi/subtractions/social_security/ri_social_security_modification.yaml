    people:
      person1:
        is_tax_unit_head: true
        social_security: 47_000
        taxable_social_security: 48_000
        birth_year: 1991
      person2:
        is_tax_unit_spouse: true
        social_security: 47_000
        taxable_social_security: 48_000
        birth_year: 1991
