# Tests for ri_ccap_countable_income
# Verifies the adds pattern sums all 16 income sources correctly.

- name: Countable income sums multiple income sources.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 30_000
        self_employment_income: 5_000
        social_security_retirement: 3_000
        interest_income: 500
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # (30_000 + 5_000 + 3_000 + 500) / 12 = 3_208.33
    ri_ccap_countable_income: 3_208.33

- name: Countable income with zero income returns zero.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_countable_income: 0
