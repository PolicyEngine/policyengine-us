- name: Case 1, single parent working 20 hours meets requirement.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 20
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_activity_eligible: true

- name: Case 2, single parent working 19 hours does not meet requirement.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 19
      person2:
        age: 5
    spm_units:
