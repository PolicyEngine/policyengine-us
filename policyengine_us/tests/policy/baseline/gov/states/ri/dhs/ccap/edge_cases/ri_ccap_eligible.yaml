# Edge cases for ri_ccap_eligible
# Tests activity requirements, degenerate cases

- name: Case 1, zero income family with eligible child is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # $0 income < 261% FPL, assets < $1M, weekly_hours_worked defaults to 40
    ri_ccap_eligible: true

- name: Case 2, parent not working enough hours is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
        weekly_hours_worked: 15
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # 15 hours < 20 minimum -> activity ineligible
    ri_ccap_eligible: false

- name: Case 3, single adult without child is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 10_000
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    ri_ccap_eligible: false

- name: Case 4, income eligible but assets ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_assets: 1_500_000
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # income ok, but assets 1.5M > 1M -> ineligible
    ri_ccap_eligible: false

- name: Case 5, assets eligible but income ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # FPG family of 2: 21_150
    # 261% FPL = 55_201.50
    # income 60_000 > 55_201.50 -> ineligible
    ri_ccap_eligible: false
