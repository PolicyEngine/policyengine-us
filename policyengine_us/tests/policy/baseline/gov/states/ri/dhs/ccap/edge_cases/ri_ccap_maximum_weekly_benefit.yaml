# Edge cases for ri_ccap_maximum_weekly_benefit
# Tests rate lookup at time category boundaries

- name: Case 1, center full time star 1 school age with exactly 30 hours.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 7
        is_in_k12_school: true
        childcare_hours_per_week: 30
        ri_ccap_provider_type: LICENSED_CENTER
        ri_ccap_star_rating: STAR_1
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # 30 hrs -> FULL_TIME, Center FT Star 1 School Age = $210
    ri_ccap_maximum_weekly_benefit: [0, 210]

