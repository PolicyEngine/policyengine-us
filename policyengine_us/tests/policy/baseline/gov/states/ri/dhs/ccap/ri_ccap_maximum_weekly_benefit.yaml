# Tests for ri_ccap_maximum_weekly_benefit
# Rates effective: center July 2024 until the July 2025 split, family July 2024, exempt Jan 2022
# Person-level variable; parent output is 0 (default), child gets rate

- name: Case 1, licensed center full time star 1 preschool.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_in_k12_school: false
        childcare_hours_per_week: 35
        ri_ccap_provider_type: LICENSED_CENTER
        ri_ccap_star_rating: STAR_1
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # Center FT Star 1 Preschool = $236
    ri_ccap_maximum_weekly_benefit: [0, 236]

