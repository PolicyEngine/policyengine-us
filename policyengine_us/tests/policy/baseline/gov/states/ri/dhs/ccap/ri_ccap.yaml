  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 15_000
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 35
        ri_ccap_provider_type: LICENSED_CENTER
        ri_ccap_star_rating: STAR_1
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 20_000
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # FPG family of 2: 21_150
    # FPL ratio = 15_000 / 21_150 = 0.709 -> 0% copay rate
    # copay = 0
    # max weekly = $236 (Center FT Star 1 Preschool)
    # max annual = 236 * 52 = 12_272
    # uncapped = max(20_000 - 0, 0) = 20_000
    # annual benefit = min(20_000, 12_272) = 12_272
    # monthly = 12_272 / 12 = 1_022.67
    ri_ccap: 1_022.67

