# 2025 FPG family of 3: 15_650 + 5_500 * 2 = 26_650

- name: Case 1, income at 200 percent FPL with 7 percent copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 53_300
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    # FPL ratio = 53,300 / 26,650 = 2.0 -> 7% rate
    # annual copay = 53,300 * 0.07 = 3,731
    # monthly copay = 3,731 / 12 = 310.92
    ri_ccap_copay: 310.92

- name: Case 2, family under 100 percent FPL pays zero copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    # FPG family of 3: 26_650
    # 20_000 / 26_650 = 75% FPL -> copay rate = 0%
    ri_ccap_copay: 0

