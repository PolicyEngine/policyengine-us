# RI CCAP Integration Tests
# 2025 FPG (Contiguous US):
#   first_person = 15_650, additional = 5_500
#   Family of 2: 21_150
#   Family of 3: 26_650
#   Family of 4: 32_150

- name: Case 1, basic eligible family with licensed center care.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 40_000
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 35
        ri_ccap_provider_type: LICENSED_CENTER
        ri_ccap_star_rating: STAR_3
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 13_000
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # === Eligibility ===
    # Child age 4 < 13 -> age eligible
    # Citizen -> immigration eligible
    # Dependent -> eligible child
    ri_ccap_eligible_child: [false, true]

    # FPG family of 2: 21_150
    # Income 40,000, 261% FPL = 21_150 * 2.61 = 55_201.50
    # 40,000 <= 55,201.50 -> income eligible
    ri_ccap_income_eligible: true

    # Assets default 0 <= 1,000,000 -> asset eligible
    is_ccdf_asset_eligible: true

    ri_ccap_eligible: true

    # === Copay ===
    # FPL ratio = 40,000 / 21,150 = 1.8913 -> 7% copay

    # annual copay = 40,000 * 0.07 = 2,800
    # monthly copay = 2,800 / 12 = 233.33
    ri_ccap_copay: 233.33

    # === Provider rates ===
    # Center age: 4 years, not in school -> PRESCHOOL
    ri_ccap_center_age_group: [PRESCHOOL, PRESCHOOL]
    # Parent: 0 hrs/wk -> QUARTER_TIME; Child: 35 hrs/wk -> FULL_TIME
    ri_ccap_time_category: [QUARTER_TIME, FULL_TIME]
    # Center FT Star 3 Preschool = $255
    ri_ccap_maximum_weekly_benefit: [0, 255]

    # === Benefit ===
    # max annual = 255 * 52 = 13,260
    # uncapped = max(13,000 - 2,800, 0) = 10,200
    # annual benefit = min(10,200, 13,260) = 10,200
    # monthly = 10,200 / 12 = 850
    ri_ccap: 850

- name: Case 2, low income family with zero copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 28
        employment_income: 18_000
        immigration_status: CITIZEN
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        ri_ccap_provider_type: LICENSED_CENTER
        ri_ccap_star_rating: STAR_2
      person3:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 30
        ri_ccap_provider_type: LICENSED_CENTER
        ri_ccap_star_rating: STAR_2
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 25_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    # === Eligibility ===
    ri_ccap_eligible_child: [false, true, true]

    # FPG family of 3: 26,650
    # 18,000 <= 26,650 * 2.61 = 69,556.50 -> eligible
    ri_ccap_income_eligible: true
    is_ccdf_asset_eligible: true
    ri_ccap_eligible: true

    # === Copay ===
    # FPL ratio = 18,000 / 26,650 = 0.6754 -> 0% copay

    ri_ccap_copay: 0

    # === Provider rates ===
    # child1 (age 1): INFANT center group, FT Star 2 = $341
    # child2 (age 5, not in school): PRESCHOOL center group, FT Star 2 = $247
    ri_ccap_center_age_group: [PRESCHOOL, INFANT, PRESCHOOL]
    # Parent: 0 hrs/wk -> QUARTER_TIME; Children: FT
    ri_ccap_time_category: [QUARTER_TIME, FULL_TIME, FULL_TIME]
    ri_ccap_maximum_weekly_benefit: [0, 341, 247]

    # === Benefit ===
    # max annual per child: 341*52 = 17,732 + 247*52 = 12,844 = 30,576
    # uncapped = max(25,000 - 0, 0) = 25,000
    # annual benefit = min(25,000, 30,576) = 25,000
    # monthly = 25,000 / 12 = 2,083.33
    ri_ccap: 2_083.33

- name: Case 3, enrolled family at transitional FPL level.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 72_000
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: LEGAL_PERMANENT_RESIDENT
        is_in_k12_school: false
        childcare_hours_per_week: 25
        ri_ccap_provider_type: LICENSED_FAMILY
        ri_ccap_star_rating: STAR_4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        ri_ccap_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # === Eligibility ===
    ri_ccap_eligible_child: [false, true]

    # FPG family of 2: 21,150
    # 261% = 55,201.50, 300% = 63,450
    # 72,000 > 55,201.50 but enrolled, so use 300%
    # 72,000 > 63,450 -> ineligible even for transitional
    ri_ccap_income_eligible: false

    is_ccdf_asset_eligible: true
    ri_ccap_eligible: false

    # === Benefit ===
    # Not eligible -> 0
    ri_ccap: 0

