- name: Case 10, zero income family at licensed family care gets full subsidy.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 35
        ri_ccap_provider_type: LICENSED_FAMILY
        ri_ccap_star_rating: STAR_3
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 15_000
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # === Eligibility ===
    # Age 4 < 13, dependent, citizen -> eligible child
    ri_ccap_eligible_child: [false, true]

    # FPG family of 2: 21,150
    # $0 income <= 55,201.50 (261% FPL) -> eligible
    ri_ccap_income_eligible: true
    is_ccdf_asset_eligible: true
    # weekly_hours_worked defaults to 40 >= 20 -> activity eligible
    ri_ccap_activity_eligible: true
    ri_ccap_eligible: true

    # === Copay ===
    # FPL ratio = 0 / 21,150 = 0 -> 0% copay rate

    # copay = 0 * 0 = 0
    ri_ccap_copay: 0

    # === Provider rates ===
    # Age 4 at licensed family -> PRESCHOOL (age >= 3, not in school)
    ri_ccap_family_age_group: [PRESCHOOL, PRESCHOOL]
    # Parent: 0 hrs/wk -> QUARTER_TIME; child: 35 hrs/wk -> FULL_TIME
    ri_ccap_time_category: [QUARTER_TIME, FULL_TIME]
    # Family FT Star 3 Preschool = $239.54/wk
    ri_ccap_maximum_weekly_benefit: [0, 239.54]

    # === Benefit ===
    # max annual = 239.54 * 52 = 12,456.08
    # uncapped = max(15,000 - 0, 0) = 15,000
    # annual benefit = min(15,000, 12,456.08) = 12,456.08
    # monthly = 12,456.08 / 12 = 1,038.01
    ri_ccap: 1_038.01
