      person1:
        age: 30
        employment_income: 30_000
        immigration_status: CITIZEN
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        ri_ccap_provider_type: LICENSED_CENTER
        ri_ccap_star_rating: STAR_4
      person3:
        age: 8
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_in_k12_school: true
        childcare_hours_per_week: 10
        ri_ccap_provider_type: LICENSE_EXEMPT
        ri_ccap_step_rating: STEP_1
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 15_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    # === Eligibility ===
    ri_ccap_eligible_child: [false, true, true]

    # FPG family of 3: 26,650
    # 30,000 <= 69,556.50 -> eligible
    ri_ccap_income_eligible: true
    ri_ccap_eligible: true

    # === Copay ===
    # FPL ratio = 30,000 / 26,650 = 1.1257 -> 2% copay

    # annual copay = 30,000 * 0.02 = 600
    # monthly copay = 600 / 12 = 50
    ri_ccap_copay: 50

    # === Provider rates ===
    # child1 (age 1): Center FT Star 4 Infant = $364
    # child2 (age 8, in school): Exempt HT Step 1 School Age = $29.40
    ri_ccap_center_age_group: [PRESCHOOL, INFANT, SCHOOL_AGE]
