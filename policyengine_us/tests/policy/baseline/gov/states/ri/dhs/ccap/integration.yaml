    ri_ccap_time_category: [QUARTER_TIME, FULL_TIME, HALF_TIME]
    ri_ccap_maximum_weekly_benefit: [0, 364, 29.40]

    # === Benefit ===
    # max annual = (364 + 29.40) * 52 = 393.40 * 52 = 20,456.80
    # uncapped = max(15,000 - 600, 0) = 14,400
    # annual benefit = min(14,400, 20,456.80) = 14,400
    # monthly = 14,400 / 12 = 1,200
    ri_ccap: 1_200

