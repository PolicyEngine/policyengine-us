- name: Case 5, housing insecure family with license exempt care.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 25
        employment_income: 35_000
        immigration_status: CITIZEN
      person2:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: REFUGEE
        childcare_hours_per_week: 15
        ri_ccap_provider_type: LICENSE_EXEMPT
        ri_ccap_step_rating: STEP_2
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 3_000
    households:
      household:
        members: [person1, person2]
        state_code: RI
        is_homeless: true
  output:
    # === Eligibility ===
    ri_ccap_eligible_child: [false, true]
    is_ccdf_immigration_eligible_child: [true, true]

    # FPG family of 2: 21,150
    # 35,000 <= 55,201.50 (261%) -> eligible
    ri_ccap_income_eligible: true
    is_ccdf_asset_eligible: true
    ri_ccap_eligible: true

    # === Copay ===
    # Housing insecure -> $0 copay
    ri_ccap_copay: 0

    # === Provider rates ===
    # Parent: not in school -> PRESCHOOL; Child age 2 -> INFANT_TODDLER
    ri_ccap_family_age_group: [PRESCHOOL, INFANT_TODDLER]
    # Parent: 0 hrs/wk -> QUARTER_TIME; Child: 15 hrs -> HALF_TIME
    ri_ccap_time_category: [QUARTER_TIME, HALF_TIME]
    # Exempt HT Step 2 Infant/Toddler = $50.98
    ri_ccap_maximum_weekly_benefit: [0, 50.98]

    # === Benefit ===
    # max annual = 50.98 * 52 = 2,650.96
    # uncapped = max(3,000 - 0, 0) = 3,000
    # annual benefit = min(3,000, 2,650.96) = 2,650.96
    # monthly = 2,650.96 / 12 = 220.91
    ri_ccap: 220.91

