# Edge cases for ri_ccap (top-level benefit)
# 2025 FPG family of 2: 21_150
# monthly benefit = min(max(pre_subsidy_childcare_expenses - copay, 0), max_weekly_benefit * 52) / 12

- name: Case 1, multiple children different providers aggregated.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 25_000
        immigration_status: CITIZEN
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        ri_ccap_provider_type: LICENSED_CENTER
        ri_ccap_star_rating: STAR_3
      person3:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 20
        ri_ccap_provider_type: LICENSED_FAMILY
        ri_ccap_star_rating: STAR_2
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 20_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    # FPG family of 3: 26_650
    # FPL ratio = 25_000 / 26_650 = 0.9381 -> 0% copay
    # copay = 0
    # child1: Center FT Star 3 Infant = $355/wk
    # child2: Family 3QT Star 2 Preschool = $173.35/wk
    # max annual = (355 + 173.35) * 52 = 528.35 * 52 = 27_474.20
    # uncapped = max(20_000 - 0, 0) = 20_000
    # annual benefit = min(20_000, 27_474.20) = 20_000
    # monthly = 20_000 / 12 = 1_666.67
    ri_ccap: 1_666.67

- name: Case 2, zero income family gets full subsidy with zero copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 35
        ri_ccap_provider_type: LICENSED_CENTER
        ri_ccap_star_rating: STAR_1
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 5_000
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # $0 income -> FPL ratio = 0 -> copay rate = 0% -> copay = 0
    # Center FT Star 1 Preschool = $236/wk
    # max annual = 236 * 52 = 12_272
    # uncapped = max(5_000 - 0, 0) = 5_000
    # annual benefit = min(5_000, 12_272) = 5_000
    # monthly = 5_000 / 12 = 416.67
    ri_ccap: 416.67

