    households:
      household:
        members: [person1, person2]
        state_code: RI
        is_homeless: true
  output:
    # FPG family of 2: 21_150
    # 261% = 55_201.50, income 45_000 <= 55_201.50 -> eligible
    # Housing insecure -> $0 copay
    # Center FT Star 1 Preschool = $236/wk
    # max annual = 236 * 52 = 12_272
    # uncapped = max(10_000 - 0, 0) = 10_000
    # annual benefit = min(10_000, 12_272) = 10_000
    # monthly = 10_000 / 12 = 833.33
    ri_ccap: 833.33

- name: Case 4, enrolled family between 261 and 300 percent FPL.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 55_500
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 35
        ri_ccap_provider_type: LICENSED_CENTER
        ri_ccap_star_rating: STAR_1
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        ri_ccap_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # FPG family of 2: 21_150
    # 261% = 55_201.50, 300% = 63_450
    # enrolled: 55_500 <= 63_450 -> eligible
    # FPL ratio = 55_500 / 21_150 = 2.6241 -> 7% copay
    # annual copay = 55_500 * 0.07 = 3_885
    # Center FT Star 1 Preschool = $236/wk
    # max annual = 236 * 52 = 12_272
    # uncapped = max(12_000 - 3_885, 0) = 8_115
    # annual benefit = min(8_115, 12_272) = 8_115
    # monthly = 8_115 / 12 = 676.25
    ri_ccap: 676.25

