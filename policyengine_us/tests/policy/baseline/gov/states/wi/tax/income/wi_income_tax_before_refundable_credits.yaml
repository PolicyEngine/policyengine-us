- name: WI income tax before refundable credits unit test 1
  absolute_error_margin: 0.01
  period: 2021
  input:
    wi_income_tax_before_credits: 800
    wi_non_refundable_credits: 600
    state_code: WI
  output:
    wi_income_tax_before_refundable_credits: 200

- name: WI income tax before refundable credits unit test 2
  absolute_error_margin: 0.01
  period: 2022
  input:
    wi_income_tax_before_credits: 800
    wi_non_refundable_credits: 900
    state_code: WI
  output:
    wi_income_tax_before_refundable_credits: 0

- name: WI income tax before refundable credits with retirement exclusion
  # This intermediate remains the standard pre-refundable-credit tax,
  # even when the exclusion path wins in wi_income_tax.
  # standard_before_refundable = max(0, 5000 - 500) = 4500
  absolute_error_margin: 0.01
  period: 2025
  input:
    wi_income_tax_before_credits: 5_000
    wi_non_refundable_credits: 500
    wi_retirement_income_exclusion_tax: 3_000
    wi_refundable_credits: 200
    state_code: WI
  output:
    wi_income_tax_before_refundable_credits: 4_500

- name: WI income tax before refundable credits - standard path lower
  # standard_before_refundable = max(0, 2000 - 500) = 1500
  absolute_error_margin: 0.01
  period: 2025
  input:
    wi_income_tax_before_credits: 2_000
    wi_non_refundable_credits: 500
    wi_retirement_income_exclusion_tax: 5_000
    wi_refundable_credits: 200
    state_code: WI
  output:
    wi_income_tax_before_refundable_credits: 1_500

- name: WI state income tax still follows the lower exclusion path
  absolute_error_margin: 0.01
  period: 2025
  input:
    wi_income_tax_before_credits: 5_000
    wi_non_refundable_credits: 500
    wi_retirement_income_exclusion_tax: 3_000
    wi_refundable_credits: 200
    state_code: WI
  output:
    wi_income_tax: 3_000
    state_income_tax: 3_000
