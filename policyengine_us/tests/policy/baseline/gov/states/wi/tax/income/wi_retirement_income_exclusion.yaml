- name: Exclusion beneficial - no credits, Line 16 reduces tax
  # standard_before_refundable = max(0, 350 - 0) = 350
  # exclusion_tax = 70 (from wi_retirement_income_exclusion_tax)
  # wi_income_tax = min(350 - 0, 70) = 70
  absolute_error_margin: 0.01
  period: 2025
  input:
    age: 68
    taxable_pension_income: 8_000
    is_tax_unit_head: true
    filing_status: SINGLE
    state_code: WI
    wi_taxable_income: 10_000
    wi_income_tax_before_credits: 350
    wi_non_refundable_credits: 0
    wi_retirement_income_exclusion_tax: 70
    wi_refundable_credits: 0
    wi_retirement_income_subtraction: 0
  output:
    wi_income_tax: 70

- name: Exclusion NOT beneficial - refundable credits make standard path better
  # standard_before_refundable = max(0, 350 - 0) = 350
  # exclusion_tax = 280
  # wi_income_tax = min(350 - 300, 280) = 50 (standard path wins)
  absolute_error_margin: 0.01
  period: 2025
  input:
    age: 68
    taxable_pension_income: 2_000
    is_tax_unit_head: true
    filing_status: SINGLE
    state_code: WI
    wi_taxable_income: 10_000
    wi_income_tax_before_credits: 350
    wi_non_refundable_credits: 0
    wi_retirement_income_exclusion_tax: 280
    wi_refundable_credits: 300
    wi_retirement_income_subtraction: 0
  output:
    wi_income_tax: 50

- name: Not eligible for exclusion - age 64, standard path used
  absolute_error_margin: 0.01
