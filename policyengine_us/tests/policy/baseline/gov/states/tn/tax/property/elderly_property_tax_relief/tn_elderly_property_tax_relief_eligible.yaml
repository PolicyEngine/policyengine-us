        real_estate_taxes: 1_000
        assessed_property_value: 25_000
    tax_units:
      tax_unit:
        members: [person1, person2]
        adjusted_gross_income: 30_000
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    tn_elderly_property_tax_relief_eligible: false
