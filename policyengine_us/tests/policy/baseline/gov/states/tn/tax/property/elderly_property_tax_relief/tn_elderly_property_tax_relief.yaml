        age: 70
        real_estate_taxes: 400
        assessed_property_value: 6_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 30_000
    households:
      household:
        members: [person1]
        state_code: TN
  output:
    tn_elderly_property_tax_relief: 400

