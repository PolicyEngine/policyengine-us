- name: Case 1, senior homeowner receives relief on the capped assessed value.
  period: 2026
  input:
    people:
      person1:
        age: 65
        real_estate_taxes: 1_000
        assessed_property_value: 25_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 38_470
    households:
      household:
        members: [person1]
        state_code: TN
  output:
    # Capped assessed value = 33,600 * 25% = 8,400.
    # Relief = 1,000 * 8,400 / 25,000.
    tn_elderly_property_tax_relief: 336

- name: Case 2, home below the value cap receives relief for all real estate taxes.
  period: 2026
  input:
    people:
