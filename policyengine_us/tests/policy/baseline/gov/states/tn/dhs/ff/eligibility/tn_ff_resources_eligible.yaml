# Tests for TN FF resources eligibility
# Resource limit: $2,000
# Vehicle exemption: $4,600

- name: Case 1, no assets is eligible.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
    households:
      household:
        members: [person1]
        state_code: TN
        household_vehicles_value: 0
  output:
    tn_ff_resources_eligible: true

- name: Case 2, assets at vehicle exemption is eligible.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 0
    households:
      household:
        members: [person1]
        state_code: TN
        household_vehicles_value: 4_600
  output:
    # Countable: $0 liquid assets + ($4,600 - $4,600 vehicle exclusion) = $0
    tn_ff_resources_eligible: true

- name: Case 3, assets exactly at limit after exemption.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 2_000
    households:
      household:
        members: [person1]
        state_code: TN
        household_vehicles_value: 4_600
  output:
    # Countable: $2,000 liquid assets + ($4,600 - $4,600 vehicle exclusion) = $2,000
    tn_ff_resources_eligible: true

- name: Case 4, assets one dollar over limit after exemption.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 2_000
    households:
      household:
        members: [person1]
        state_code: TN
        household_vehicles_value: 4_601
  output:
    # Countable: $2,000 liquid assets + ($4,601 - $4,600 vehicle exclusion) = $2,001
    tn_ff_resources_eligible: false

- name: Case 5, moderate assets is eligible.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 400
    households:
      household:
        members: [person1]
        state_code: TN
        household_vehicles_value: 4_600
  output:
    # Countable: $400 liquid assets + ($4,600 - $4,600 vehicle exclusion) = $400
    tn_ff_resources_eligible: true

- name: Case 6, high assets is ineligible.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_cash_assets: 3_000
    households:
      household:
        members: [person1]
        state_code: TN
        household_vehicles_value: 6_600
  output:
    # Countable: $3,000 liquid assets + ($6,600 - $4,600 vehicle exclusion) = $5,000
    tn_ff_resources_eligible: false
