- name: Case 1, eligible institutional SSI recipient gets $32.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
    households:
      household:
        members: [person1]
        state_code: KS
  output:
    ks_sspp_eligible: true
    ks_sspp: 32

- name: Case 2, not in medical facility ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        social_security: 4_800
    households:
      household:
        members: [person1]
        state_code: KS
  output:
    ks_sspp_eligible: false
    ks_sspp: 0

- name: Case 3, under 18 ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 17
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
    households:
      household:
        members: [person1]
        state_code: KS
  output:
    ks_sspp_eligible: false
    ks_sspp: 0

- name: Case 4, non-Kansas resident ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
    households:
      household:
        members: [person1]
        state_code: CA
  output:
    ks_sspp: 0

- name: Case 5, in facility but Medicaid does not pay majority ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: false
    households:
      household:
        members: [person1]
        state_code: KS
  output:
    # FLA is not MEDICAL_TREATMENT_FACILITY without Medicaid paying majority
    ks_sspp_eligible: false
    ks_sspp: 0

- name: Case 6, not on Medicaid ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
        medicaid_enrolled: false
    households:
      household:
        members: [person1]
        state_code: KS
  output:
    ks_sspp_eligible: false
    ks_sspp: 0
