- name: Kansas tier 1 tax unit pays 20 dollars monthly.
  period: 2024
  input:
    people:
      child:
        is_chip_eligible: true
        is_chip_eligible_child: true
    tax_units:
      tax_unit:
        members: [child]
        tax_unit_medicaid_income_level: 1.80
    households:
      household:
        members: [child]
        state_code: KS
  output:
    ks_chip_premium: 240

