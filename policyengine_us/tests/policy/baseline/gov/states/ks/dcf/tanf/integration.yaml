# Kansas TANF integration tests
# Tests the complete calculation pipeline from inputs to final benefit
# Key rules:
# - $90 work expense deduction (KEESM 7211)
# - 60% earned income disregard on remainder (KEESM Memo 2008-0326)
# - Dependent care deduction - no cap (KEESM 7224)
# - Gross income must be < 30% FPL (K.S.A. 39-709)
# - Combined payment standard by size, county group, and living arrangement
#   (Kansas TANF State Plan FFY 2024-2026 p.29), +$61/person. Non-shared, no
#   county (Group I): 1=$224, 2=$309, 3=$386, 4=$454, 5=$515. Group IV is the
#   default tier; with no county a household resolves to a Group I county.
#   is_shared_living (default false) selects the lower shared-living standard.
# - SSI recipients are excluded from the assistance-plan size (KEESM 4113).
# - Assigned child support is excluded from the payment amount
#   (KEESM 6220, Assigned Support Retained by CSS, TANF only).
# - Resource limit: $3,000

- name: Case 1, family of 3 with no income, receives full benefit.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 8
        is_tax_unit_dependent: true
      person3:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 1_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # Intermediate values (default Group I rural: 294 + 92 = 386)
    spm_unit_size: 3
    ks_tanf_maximum_benefit: 386
    ks_tanf_countable_income: 0
    # Eligibility
    ks_tanf_gross_income_eligible: true
    ks_tanf_income_eligible: true
    ks_tanf_resources_eligible: true
    ks_tanf_eligible: true
    # Benefit: 386 - 0 = 386
    ks_tanf: 386

- name: Case 2, family of 3 with low earned income.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        employment_income_before_lsr: 6_000  # $500/month
      person2:
        age: 10
        is_tax_unit_dependent: true
      person3:
        age: 7
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 500
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # Income calculation:
    # Gross earned: $6,000/year = $500/month
    # Work expense: $90
    # Remainder: $500 - $90 = $410
    # 60% disregard: $410 * 0.60 = $246
    # After deductions: $410 - $246 = $164
    ks_tanf_earned_income_after_deductions: [164, 0, 0]
    ks_tanf_countable_earned_income: 164
    ks_tanf_countable_income: 164
    ks_tanf_maximum_benefit: 386
    # Gross income ($500) < 30% FPL for family of 3 (~$670)
    ks_tanf_gross_income_eligible: true
    ks_tanf_income_eligible: true
    ks_tanf_resources_eligible: true
    ks_tanf_eligible: true
    # Benefit: 386 - 164 = 222
    ks_tanf: 222

- name: Case 3, family of 3 with net income exceeding limit.
  period: 2025-01
  input:
    people:
      person1:
        age: 32
        employment_income_before_lsr: 9_600  # $800/month
      person2:
        age: 6
        is_tax_unit_dependent: true
      person3:
        age: 3
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 200
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # Gross earned: $9,600/year = $800/month
    # Work expense: $90
    # Remainder: $800 - $90 = $710
    # After 60% disregard: $710 * 0.40 = $284
    ks_tanf_earned_income_after_deductions: [284, 0, 0]
    ks_tanf_countable_earned_income: 284
    ks_tanf_countable_income: 284
    ks_tanf_maximum_benefit: 386
    # Gross ($800) > 30% FPL for family of 3 (~$670)
    ks_tanf_gross_income_eligible: false
    ks_tanf_eligible: false
    ks_tanf: 0

- name: Case 4, family exceeding resource limit.
  period: 2025-01
  input:
    people:
      person1:
        age: 28
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 5_000  # Exceeds $3,000 limit
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    spm_unit_size: 2
    ks_tanf_maximum_benefit: 309
    # Resources: $5,000 > $3,000 limit
    ks_tanf_resources_eligible: false
    ks_tanf_eligible: false
    ks_tanf: 0

- name: Case 5, family of 2 with unearned income only.
  period: 2025-01
  input:
    people:
      person1:
        age: 40
        social_security: 2_400  # $200/month
      person2:
        age: 12
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 800
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # Unearned income has no disregard
    # Countable: $200/month
    ks_tanf_countable_income: 200
    ks_tanf_maximum_benefit: 309
    # Gross ($200) < 30% FPL for family of 2 (~$530)
    ks_tanf_gross_income_eligible: true
    ks_tanf_income_eligible: true
    ks_tanf_resources_eligible: true
    ks_tanf_eligible: true
    # Benefit: 309 - 200 = 109
    ks_tanf: 109

- name: Case 6, family with small benefit.
  period: 2025-01
  input:
    people:
      person1:
        age: 33
        employment_income_before_lsr: 4_800  # $400/month
      person2:
        age: 9
        is_tax_unit_dependent: true
      person3:
        age: 6
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 600
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # Gross earned: $4,800/year = $400/month
    # Work expense: $90
    # Remainder: $400 - $90 = $310
    # After 60% disregard: $310 * 0.40 = $124
    ks_tanf_earned_income_after_deductions: [124, 0, 0]
    ks_tanf_countable_earned_income: 124
    ks_tanf_countable_income: 124
    ks_tanf_maximum_benefit: 386
    # Gross ($400) < 30% FPL (~$670)
    ks_tanf_gross_income_eligible: true
    ks_tanf_income_eligible: true
    ks_tanf_eligible: true
    # Benefit: 386 - 124 = 262
    ks_tanf: 262

- name: Case 7, household with two earners.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 3_600  # $300/month
      person2:
        age: 28
        employment_income_before_lsr: 2_400  # $200/month
      person3:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 800
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # Two earners - deductions applied per person
    # Person1: $300 - $90 = $210, $210 * 0.40 = $84
    # Person2: $200 - $90 = $110, $110 * 0.40 = $44
    # Countable earned: $84 + $44 = $128
    spm_unit_size: 3
    ks_tanf_earned_income_after_deductions: [84, 44, 0]
    ks_tanf_countable_earned_income: 128
    ks_tanf_countable_income: 128
    ks_tanf_maximum_benefit: 386
    # Gross ($500) < 30% FPL for family of 3 (~$670)
    ks_tanf_gross_income_eligible: true
    ks_tanf_income_eligible: true
    ks_tanf_resources_eligible: true
    ks_tanf_eligible: true
    # Benefit: 386 - 128 = 258
    ks_tanf: 258

- name: Case 8, large family of 5.
  period: 2025-01
  input:
    people:
      adult1:
        age: 35
        employment_income_before_lsr: 7_200  # $600/month
      adult2:
        age: 32
      child1:
        age: 12
        is_tax_unit_dependent: true
      child2:
        age: 8
        is_tax_unit_dependent: true
      child3:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [adult1, adult2, child1, child2, child3]
        spm_unit_cash_assets: 1_500
    tax_units:
      tax_unit:
        members: [adult1, adult2, child1, child2, child3]
    households:
      household:
        members: [adult1, adult2, child1, child2, child3]
        state_code: KS
  output:
    # Large family tests the additional-person formula for 5+ members
    # Payment standard (Group I) for 5: 362 + 61 + 92 = 515
    # Gross earned: $7,200/year = $600/month
    # adult1: $600 - $90 = $510, $510 * 0.40 = $204
    spm_unit_size: 5
    ks_tanf_earned_income_after_deductions: [204, 0, 0, 0, 0]
    ks_tanf_countable_earned_income: 204
    ks_tanf_countable_income: 204
    ks_tanf_maximum_benefit: 515
    # Gross ($600) < 30% FPL for family of 5 (~$890)
    ks_tanf_gross_income_eligible: true
    ks_tanf_income_eligible: true
    ks_tanf_resources_eligible: true
    ks_tanf_eligible: true
    # Benefit: 515 - 204 = 311
    ks_tanf: 311

- name: Case 9, family with dependent care expenses.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 6_000  # $500/month
      person2:
        age: 4
        is_tax_unit_dependent: true
      person3:
        age: 2
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 500
        childcare_expenses: 1_200  # $100/month
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # Per KEESM 7224: Dependent care applied AFTER $90 and 60% disregards
    # There is NO cap on dependent care in Kansas TANF
    #
    # Gross earned: $6,000/year = $500/month
    # person1: $500 - $90 = $410, $410 * 0.40 = $164
    # Dependent care: $100/month (no cap)
    # Countable earned: $164 - $100 = $64
    spm_unit_size: 3
    ks_tanf_earned_income_after_deductions: [164, 0, 0]
    ks_tanf_countable_earned_income: 64
    ks_tanf_countable_income: 64
    ks_tanf_maximum_benefit: 386
    ks_tanf_gross_income_eligible: true
    ks_tanf_income_eligible: true
    ks_tanf_resources_eligible: true
    ks_tanf_eligible: true
    # Benefit: 386 - 64 = 322
    ks_tanf: 322

- name: Case 10, family of 3 in a Group III county (Sedgwick), no income.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 8
        is_tax_unit_dependent: true
      person3:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 1_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
        county: SEDGWICK_COUNTY_KS
  output:
    # Group III (Sedgwick) is higher than the rural default: 294 + 109 = 403
    spm_unit_size: 3
    ks_tanf_county_group: GROUP_III
    ks_tanf_maximum_benefit: 403
    ks_tanf_eligible: true
    # Benefit: 403 - 0 = 403
    ks_tanf: 403

- name: Case 11, SSI recipient excluded from the assistance-plan size.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        employment_income_before_lsr: 6_000  # $500/month
      person2:
        age: 8
        is_tax_unit_dependent: true
        ssi: 900  # SSI recipient: excluded from size, income not counted
      person3:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 500
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # SSI recipient (person2) excluded from the payment-standard size:
    # counted size = 3 - 1 = 2; Group I rural: 217 + 92 = 309
    spm_unit_size: 3
    ks_tanf_maximum_benefit: 309
    # SSI is not counted as TANF income; only person1's earnings count:
    # $500 - $90 = $410, $410 * 0.40 = $164
    ks_tanf_countable_income: 164
    ks_tanf_gross_income_eligible: true
    ks_tanf_income_eligible: true
    ks_tanf_eligible: true
    # Benefit: 309 - 164 = 145
    ks_tanf: 145

- name: Case 12, assigned child support counted for eligibility, excluded from benefit.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        child_support_received: 3_600  # $300/month
      person2:
        age: 9
        is_tax_unit_dependent: true
      person3:
        age: 6
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 500
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # Child support ($300/month) is counted in countable income for the
    # eligibility test (300 < 386 payment standard, so eligible)...
    spm_unit_size: 3
    ks_tanf_countable_income: 300
    ks_tanf_maximum_benefit: 386
    ks_tanf_gross_income_eligible: true
    ks_tanf_income_eligible: true
    ks_tanf_eligible: true
    # ...but excluded from the payment amount: 386 - (300 - 300) = 386
    ks_tanf: 386

- name: Case 13, all members on SSI leaves an empty assistance unit, ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        ssi: 900  # SSI recipient
      person2:
        age: 8
        is_tax_unit_dependent: true
        ssi: 900  # SSI recipient
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 500
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # Both members are SSI recipients, so the assistance unit size is 0:
    # the family is ineligible regardless of the other tests.
    ks_tanf_assistance_unit_size: 0
    ks_tanf_eligible: false
    ks_tanf: 0

- name: Case 14, child support pushes gross income over the limit, ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        child_support_received: 12_000  # $1,000/month
      person2:
        age: 9
        is_tax_unit_dependent: true
      person3:
        age: 6
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 500
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # Child support ($1,000/month) is the family's only income. It counts in
    # the gross-income test, pushing gross over 30% FPL (~$670) for a family of
    # 3, so the family is ineligible -- proving child support gates eligibility
    # even though it is excluded from the payment amount.
    ks_tanf_countable_income: 1_000
    ks_tanf_gross_income_eligible: false
    ks_tanf_eligible: false
    ks_tanf: 0

- name: Case 15, SSI member's earned and unearned income excluded from the unit.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 6_000  # $500/month
      person2:
        age: 35
        ssi: 900  # SSI recipient: excluded from the assistance unit
        employment_income_before_lsr: 7_200  # $600/month (excluded)
        social_security: 3_600  # $300/month unearned (excluded)
      person3:
        age: 8
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 500
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # person2 is an SSI recipient, excluded from the assistance unit:
    # size = 3 - 1 = 2; their $600 earnings and $300 unearned are not counted.
    ks_tanf_assistance_unit_size: 2
    ks_tanf_maximum_benefit: 309  # Group I, size 2: 217 + 92
    # Only person1's earnings count: $500 - $90 = $410, * 0.40 = $164
    ks_tanf_countable_income: 164
    ks_tanf_gross_income_eligible: true
    ks_tanf_income_eligible: true
    ks_tanf_eligible: true
    # Benefit: 309 - 164 = 145
    ks_tanf: 145

- name: Case 16, shared living arrangement uses the reduced payment standard.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 6_000  # $500/month
      person2:
        age: 8
        is_tax_unit_dependent: true
      person3:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 500
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
        is_shared_living: true
  output:
    # Shared living, Group I, size 3: 349 (vs 386 non-shared)
    ks_tanf_maximum_benefit: 349
    # person1 earnings $500 - $90 = $410, * 0.40 = $164
    ks_tanf_countable_income: 164
    ks_tanf_eligible: true
    # Benefit: 349 - 164 = 185
    ks_tanf: 185

- name: Case 17, working teenager's earned income is exempt.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        employment_income_before_lsr: 6_000  # $500/month
      person2:
        age: 8
        is_tax_unit_dependent: true
      person3:
        age: 16  # working teenager
        is_tax_unit_dependent: true
        employment_income_before_lsr: 3_600  # $300/month
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 500
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # Per KEESM 6410: person3 (age 16) is a child, so their $300/month earnings
    # are exempt as income -- excluded from both the gross-income test and
    # countable income. Without the exemption, gross income ($800) would exceed
    # 30% FPL for a family of 3 (~$670) and the family would be ineligible.
    # person1: $500 - $90 = $410, * 0.40 = $164
    # person3: $300 - $90 = $210, * 0.40 = $84 (computed, but exempt)
    spm_unit_size: 3
    ks_tanf_earned_income_after_deductions: [164, 0, 84]
    ks_tanf_countable_earned_income: 164
    ks_tanf_countable_income: 164
    ks_tanf_maximum_benefit: 386
    ks_tanf_gross_income_eligible: true
    ks_tanf_income_eligible: true
    ks_tanf_eligible: true
    # Benefit: 386 - 164 = 222
    ks_tanf: 222

- name: Case 18, incapacitated person care expenses reduce countable income.
  period: 2025-01
  input:
    people:
      person1:
        age: 40
        employment_income_before_lsr: 6_000  # $500/month
        care_expenses: 1_200  # $100/month, care of an incapacitated person
      person2:
        age: 8
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 500
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # Per K.A.R. 30-4-111(b)(3): care expenses for an incapacitated person are
    # deducted after the $90 and 60% disregards, with no cap.
    # person1: $500 - $90 = $410, * 0.40 = $164
    # Care expenses: $100/month -> countable earned: $164 - $100 = $64
    spm_unit_size: 2
    ks_tanf_earned_income_after_deductions: [164, 0]
    ks_tanf_countable_earned_income: 64
    ks_tanf_countable_income: 64
    ks_tanf_maximum_benefit: 309  # Group I, size 2: 217 + 92
    ks_tanf_gross_income_eligible: true
    ks_tanf_income_eligible: true
    ks_tanf_eligible: true
    # Benefit: 309 - 64 = 245
    ks_tanf: 245

# Cases 19 and 20 are a matched pair: identical household and identical $400/month
# earnings, differing only in whether the earner is a child. They isolate the
# KEESM 6410 child earned income exemption -- the child earner's family keeps the
# full benefit, while the non-student adult earner's family has that income counted.

- name: Case 19, child's $400/month earnings are fully exempt, benefit unreduced.
  period: 2025-01
  input:
    people:
      person1:  # parent, no income
        age: 35
      person2:  # young child, keeps the family demographically eligible
        age: 5
        is_tax_unit_dependent: true
      person3:  # working child (age 16)
        age: 16
        is_tax_unit_dependent: true
        employment_income_before_lsr: 4_800  # $400/month
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 500
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # person3 (age 16) is a child, so their $400/month is exempt as income
    # (KEESM 6410). The family has zero countable income and receives the full
    # Group I size-3 payment standard -- exactly as if the child earned nothing.
    spm_unit_size: 3
    ks_tanf_countable_earned_income: 0
    ks_tanf_countable_income: 0
    ks_tanf_gross_income_eligible: true
    ks_tanf_maximum_benefit: 386
    ks_tanf_eligible: true
    ks_tanf: 386

- name: Case 20, same earnings from a non-student adult are counted, benefit reduced.
  period: 2025-01
  input:
    people:
      person1:  # parent, no income
        age: 35
      person2:  # young child, keeps the family demographically eligible
        age: 5
        is_tax_unit_dependent: true
      person3:  # 18-year-old, not in school -> not a child
        age: 18
        is_in_secondary_school: false
        is_tax_unit_dependent: true
        employment_income_before_lsr: 4_800  # $400/month
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_cash_assets: 500
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # person3 (age 18, not in secondary school) is not a child, so their
    # $400/month is counted. Only the earner's status differs from Case 19.
    # person3: $400 - $90 = $310, * 0.40 = $124
    spm_unit_size: 3
    ks_tanf_countable_earned_income: 124
    ks_tanf_countable_income: 124
    ks_tanf_gross_income_eligible: true
    ks_tanf_maximum_benefit: 386
    ks_tanf_eligible: true
    # Benefit: 386 - 124 = 262 (vs the full 386 in Case 19)
    ks_tanf: 262

- name: Case 21, same household as Case 18 but with no care expenses.
  period: 2025-01
  input:
    people:
      person1:
        age: 40
        employment_income_before_lsr: 6_000  # $500/month
      person2:
        age: 8
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 500
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # Identical to Case 18 but with no care_expenses.
    # person1: $500 - $90 = $410, * 0.40 = $164 countable earned (no deduction).
    # Case 18's $100/month care deduction is exactly the $245 - $145 = $100
    # benefit difference, proving care_expenses reduces countable income.
    spm_unit_size: 2
    ks_tanf_earned_income_after_deductions: [164, 0]
    ks_tanf_countable_earned_income: 164
    ks_tanf_countable_income: 164
    ks_tanf_maximum_benefit: 309
    ks_tanf_eligible: true
    # Benefit: 309 - 164 = 145 (vs 245 in Case 18; the $100 gap is the care deduction)
    ks_tanf: 145
