# Child eligibility (KEESM 2810):
#   under 13 generally; under 19 if disabled / developmentally delayed
#   (the 14-18 special-needs extension). Must be CCDF-immigration-eligible.

- name: Case 1, citizen child under 13 is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    ks_ccap_eligible_child: [false, true]

- name: Case 2, child age 13 without special needs is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 13
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # 13 is not below the age-13 limit and there is no special-needs extension.
    ks_ccap_eligible_child: [false, false]

- name: Case 3, disabled child age 15 is eligible under the special-needs extension.
  period: 2025-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 15
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # 15 < 19 special-needs age limit.
    ks_ccap_eligible_child: [false, true]

- name: Case 4, child with developmental delay age 18 is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 45
      person2:
        age: 18
        has_developmental_delay: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # 18 < 19 special-needs age limit.
    ks_ccap_eligible_child: [false, true]

- name: Case 5, special-needs child age 19 is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 45
      person2:
        age: 19
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # 19 is not below the special-needs age-19 limit.
    ks_ccap_eligible_child: [false, false]

- name: Case 6, undocumented child under 13 is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: UNDOCUMENTED
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # Fails the CCDF immigration check despite being under 13.
    ks_ccap_eligible_child: [false, false]

# Edge case: age boundary at exactly the 13-year limit. A child at 12 is below
# the limit (eligible); Case 2 above already covers exactly 13 (ineligible).
- name: Case 7, child age 12 just under the limit is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 12
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # 12 < 13 age limit.
    ks_ccap_eligible_child: [false, true]

# Edge case: a non-special-needs child age 14 (in the 14-18 band) is ineligible
# because the extension only applies to disabled / developmentally delayed
# children; we don't track court supervision.
- name: Case 8, non-special-needs child age 14 is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 14
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # 14 is above the age-13 limit and has no special-needs extension.
    ks_ccap_eligible_child: [false, false]

# Edge case: degenerate SPM unit with no children — no member qualifies.
- name: Case 9, adult-only unit has no eligible child.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: KS
  output:
    ks_ccap_eligible_child: [false]
