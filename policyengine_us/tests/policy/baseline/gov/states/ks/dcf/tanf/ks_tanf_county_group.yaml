# Kansas TANF county group assignment test
# Per K.A.R. 30-4-101: counties fall into four groups by shelter allowance.
# Groups I, II, and III are explicitly listed; Group IV (most populous counties:
# Douglas, Harvey, Johnson, Wyandotte) is the default.

- name: Case 1, rural county is Group I.
  period: 2025-01
  input:
    state_code: KS
    county: SALINE_COUNTY_KS
  output:
    ks_tanf_county_group: GROUP_I

- name: Case 2, no county specified resolves to Group I.
  period: 2025-01
  input:
    state_code: KS
  output:
    ks_tanf_county_group: GROUP_I

- name: Case 3, high cost rural county is Group II.
  period: 2025-01
  input:
    state_code: KS
    county: FRANKLIN_COUNTY_KS
  output:
    ks_tanf_county_group: GROUP_II

- name: Case 4, high population county is Group III.
  period: 2025-01
  input:
    state_code: KS
    county: SEDGWICK_COUNTY_KS
  output:
    ks_tanf_county_group: GROUP_III

- name: Case 5, high cost high population county is Group IV.
  period: 2025-01
  input:
    state_code: KS
    county: JOHNSON_COUNTY_KS
  output:
    ks_tanf_county_group: GROUP_IV

- name: Case 6, Wyandotte County is Group IV.
  period: 2025-01
  input:
    state_code: KS
    county: WYANDOTTE_COUNTY_KS
  output:
    ks_tanf_county_group: GROUP_IV
