# Family share deduction (KEESM 7541 / Appendix F-1, eff. May 1, 2026):
#   looked up by family size and monthly gross income. Families below 100% FPL
#   owe $0; the deduction rises across the FPL tiers. Defined_for the eligible
#   unit, so each case sets up a fully eligible Kansas family.
# Tested at 2026-01: the family share is derived from the 2026 federal poverty
# guideline (the figures DCF used to build the published F-1 dollars), so the
# computed values match the published schedule exactly.

- name: Case 1, family of 2 below 100% FPL owes no deduction.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000  # $1,000/month, below the size-2 $1,803 floor
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # $1,000/month < $1,803.01 -> $0 deduction.
    ks_ccap_family_share: 0

