    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # $1,804.00 >= $1,803.01 -> first deduction band, $54.
    ks_ccap_family_share: 54

