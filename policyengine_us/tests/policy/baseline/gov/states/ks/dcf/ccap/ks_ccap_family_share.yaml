    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5]
    households:
      household:
        members: [person1, person2, person3, person4, person5]
        state_code: KS
  output:
    # Family of 5 monthly FPG = (15,960 + 4 x 5,680) / 12 = $3,223.33.
    # $9,000 / $3,223.33 = 2.792 -> above 185% FPL -> top band at the 5% rate,
    # and below the size-5 85% SMI ceiling ($9,278), so still eligible.
    # Tier floor = 1.85; bound = round(1.85 x 3,223.33) = $5,963.
    # FSD = round(5% x 5,963) = round(298.15) = $298 (matches published F-1
    # band $5,963.01-$9,278 -> $298).
    ks_ccap_family_share: 298

- name: Case 14, family of 2 above the 85% SMI ceiling is ineligible and owes no deduction.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 66_000  # $5,500/month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # Size-2 income ceiling = round(85% x 68% x $112,919 / 12) = $5,439.
    # $5,500 > $5,439 -> above 85% SMI -> not income eligible (F-1: "Families
    # with income above 85% of the State Median Income (SMI) are not
    # eligible"). The family share is defined_for the eligible unit, so no
    # deduction is assessed and no subsidy is paid.
    ks_ccap_income_eligible: false
    ks_ccap_family_share: 0
    ks_ccap: 0
