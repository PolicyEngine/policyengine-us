# Edge case: negative income (self-employment loss). The schedule's first
# bracket starts at 0, so .calc() on a negative income returns the $0 band; no
# benefit inflation, handled gracefully.
- name: Case 10, self-employment loss yields a zero deduction.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        self_employment_income: -24_000  # -$2,000/month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # Negative income maps to the first ($0) bracket -> $0.
    ks_ccap_family_share: 0

- name: Case 11, family of 6 with $5,000 monthly income owes the 140% FPL tier deduction.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 60_000  # $5,000/month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 33
      person3:
        age: 10
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person4:
        age: 8
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person5:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person6:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4, person5, person6]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5, person6]
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6]
        state_code: KS
  output:
    # Family of 6 monthly FPG = (15,960 + 5 x 5,680) / 12 = $3,696.67.
    # $5,000 / $3,696.67 = 1.353 -> 140% FPL tier (F-1 band $4,806.01-$5,175).
    # Tier floor = 1.3; bound = round(1.3 x 3,696.67) = $4,806.
    # FSD = round(3% x 4,806) = round(144.18) = $144 (matches published F-1).
    ks_ccap_family_share: 144

