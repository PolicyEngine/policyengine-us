# The F-1 brackets use .01 thresholds, so a family at exactly a tier's upper
# bound stays in the LOWER family-share band. The size-2 $0 band tops out at
# $1,803; the $54 band begins at $1,803.01.
- name: Case 5, family of 2 at exactly the 100% FPL bound stays at zero.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 21_636  # $1,803.00/month exactly
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # $1,803.00 < $1,803.01 -> stays in the $0 band.
    ks_ccap_family_share: 0

- name: Case 6, family of 2 just above the bound owes the first deduction.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 21_648  # $1,804.00/month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
