# Kansas TANF maximum benefit (payment standard) test
# Per K.A.R. 30-4-101: payment standard = basic standard (by size) + shelter
# allowance (by county group). Basic: 1=$132, 2=$217, 3=$294, 4=$362, +$61/person.
# Shelter: Group I=$92, II=$97, III=$109, IV=$135.
# Groups I, II, III are listed; Group IV (most populous counties) is the default.
# A household with no county specified resolves to a rural Group I county.
# SSI recipients are excluded from the household size.

# --- County tiers, family of 3 (basic $294) ---
- name: Case 1, family of 3, Group I rural county (no county specified).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    state_code: KS
    spm_unit_size: 3
  output:
    # 294 + 92 = 386
    ks_tanf_maximum_benefit: 386

- name: Case 2, family of 3, Group II high cost rural county (Franklin).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    state_code: KS
    county: FRANKLIN_COUNTY_KS
    spm_unit_size: 3
  output:
    # 294 + 97 = 391
    ks_tanf_maximum_benefit: 391

- name: Case 3, family of 3, Group III high population county (Sedgwick).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    state_code: KS
    county: SEDGWICK_COUNTY_KS
    spm_unit_size: 3
  output:
    # 294 + 109 = 403
    ks_tanf_maximum_benefit: 403

- name: Case 4, family of 3, Group IV high cost high population county (Johnson).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    state_code: KS
    county: JOHNSON_COUNTY_KS
    spm_unit_size: 3
  output:
    # 294 + 135 = 429
    ks_tanf_maximum_benefit: 429

