# Kansas TANF maximum benefit (payment standard) test
# Group IV non-shared living per K.A.R. 30-4-101: basic + $135 shelter.
# Group IV covers Douglas, Harvey, and Johnson counties — Johnson is the
# most populous county in Kansas, so this is the cross-state research
# convention used by CBPP and the Urban Welfare Rules Database.
# Family size 1: $267, 2: $352, 3: $429, 4: $497, 5+: $497 + $61/person.

- name: Case 1, family of 1.
  period: 2025-01
  input:
    state_code: KS
    spm_unit_size: 1
  output:
    ks_tanf_maximum_benefit: 267

- name: Case 2, family of 2.
  period: 2025-01
  input:
    state_code: KS
    spm_unit_size: 2
  output:
    ks_tanf_maximum_benefit: 352

- name: Case 3, family of 3.
  period: 2025-01
  input:
    state_code: KS
    spm_unit_size: 3
  output:
    ks_tanf_maximum_benefit: 429

- name: Case 4, family of 4.
  period: 2025-01
  input:
    state_code: KS
    spm_unit_size: 4
  output:
    ks_tanf_maximum_benefit: 497

- name: Case 5, family of 5.
  period: 2025-01
  input:
    state_code: KS
    spm_unit_size: 5
  output:
    # 497 + 61 = 558
    ks_tanf_maximum_benefit: 558

- name: Case 6, family of 6.
  period: 2025-01
  input:
    state_code: KS
    spm_unit_size: 6
  output:
    # 497 + 61*2 = 619
    ks_tanf_maximum_benefit: 619

- name: Case 7, family of 7.
  period: 2025-01
  input:
    state_code: KS
    spm_unit_size: 7
  output:
    # 497 + 61*3 = 680
    ks_tanf_maximum_benefit: 680

- name: Case 8, family of 8.
  period: 2025-01
  input:
    state_code: KS
    spm_unit_size: 8
  output:
    # 497 + 61*4 = 741
    ks_tanf_maximum_benefit: 741
