# Kansas TANF maximum benefit (payment standard) test
# Per the Kansas TANF State Plan (FFY 2024-2026) p.29 and K.A.R. 30-4-101: the
# combined payment standard depends on assistance unit size, county group, and
# living arrangement, plus $61 per additional person above size 4.
# Non-shared family of 3: Group I=386, II=391, III=403, IV=429.
# Shared family of 3:     Group I=349, II=352, III=359, IV=375.
# Groups I, II, III are listed; Group IV (Douglas, Harvey, Johnson) is the
# default. A household with no county specified resolves to a Group I county.
# SSI recipients are excluded from the assistance unit size; is_shared_living
# (default false) selects the shared standard.

# --- County tiers, family of 3 (basic $294) ---
- name: Case 1, family of 3, Group I rural county (no county specified).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 8
      person3:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # 294 + 92 = 386
    ks_tanf_maximum_benefit: 386

- name: Case 2, family of 3, Group II high cost rural county (Franklin).
  period: 2025-01
