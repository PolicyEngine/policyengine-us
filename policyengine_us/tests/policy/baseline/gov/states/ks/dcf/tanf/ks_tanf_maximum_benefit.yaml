    state_code: KS
    county: JOHNSON_COUNTY_KS
    spm_unit_size: 5
  output:
    # 362 + 61 + 135 = 558
    ks_tanf_maximum_benefit: 558

# --- SSI recipients excluded from household size ---
- name: Case 9, SSI recipient excluded from size, Group I.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 8
        ssi: 900  # SSI recipient, excluded from the assistance plan
      person3:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
  output:
    # Counted size = 3 - 1 SSI = 2; 217 + 92 = 309
    ks_tanf_maximum_benefit: 309

- name: Case 10, SSI recipient excluded, Group IV (Johnson).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 10
      person3:
        age: 7
      person4:
        age: 4
        ssi: 900  # SSI recipient, excluded from the assistance plan
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: KS
        county: JOHNSON_COUNTY_KS
  output:
    # Counted size = 4 - 1 SSI = 3; 294 + 135 = 429
    ks_tanf_maximum_benefit: 429
