# Edge case: negative income (self-employment loss) end-to-end. The family stays
# income eligible, the family share floors at $0, and the benefit is not
# inflated by the negative income.
- name: Case 14, negative income does not inflate the benefit end-to-end.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        self_employment_income: -60_000  # -$5,000/month loss
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 1  # center Toddler Group 3 = $5.26/hr
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: CENTER
        childcare_hours_per_week: 40
        pre_subsidy_childcare_expenses: 9_000  # $750/month
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 9_000
    households:
      household:
        members: [person1, person2]
        state_code: KS
        county: FINNEY_COUNTY_KS  # Group 3
  output:
    ks_ccap_income_eligible: true
    # FSD floors at $0 for negative income (first F-1 bracket).
    # Per-child = min($750, $911.73) = $750; benefit = max($750 - $0, 0) = $750,
    # capped at the $750 expense -> $750, NOT $750 + $5,000.
    ks_ccap_family_share: 0
    ks_ccap: 750
