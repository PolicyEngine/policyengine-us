# Kansas CCAP integration tests.
# Tested at 2027-01 so the Appendix F-1 income-limit and family-share schedule
# (effective May 1, 2026) and the C-18 provider rates (effective 10-1-2024)
# both apply. (No KS CCAP formula reads the federal poverty guideline, so the
# absence of a 2027 FPG entry does not affect these expected values.)
#
# Monthly hours = weekly hours * 52 / 12. Default childcare_hours_per_week in
# these cases is 40, giving 40 * 52 / 12 = 173.3333 monthly hours.
# Per-child benefit = min(monthly expense, hourly rate * monthly hours).
# Total benefit = max(sum of per-child reimbursements - family share, 0),
# capped at total monthly child care expenses.

- name: Case 1, family of 2 with center toddler, rate exceeds expense.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # $2,000/month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 1  # 12 months -> center Toddler
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: CENTER
        childcare_hours_per_week: 40
        pre_subsidy_childcare_expenses: 9_000  # $750/month
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 9_000
    households:
      household:
        members: [person1, person2]
        state_code: KS
        county: FINNEY_COUNTY_KS  # Group 3
  output:
    ks_ccap_eligible_child: [false, true]
    ks_ccap_income_eligible: true
    ks_ccap_activity_eligible: true
    ks_ccap_eligible: true
    # Center Group 3 Toddler = $5.26/hr; max rate = 5.26 * 173.3333 = $911.73.
    # Per-child = min($750 expense, $911.73) = $750.
    # FSD (size 2, $2,000/mo) = $60.
    # Benefit = max($750 - $60, 0) = $690, under the $750 expense cap.
    ks_ccap_family_share: 60
    ks_ccap: 690

