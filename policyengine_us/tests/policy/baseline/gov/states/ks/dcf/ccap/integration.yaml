# Edge case: in-home relative provider (the one provider type not exercised by
# the cases above). Flat $2.42/hr statewide; the 215-hour relative cap does not
# bind at 40 weekly hours (173.33 monthly).
- name: Case 12, in-home relative provider end-to-end.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # $2,000/month -> size-2 FSD $60
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 2  # in-home relative flat $2.42/hr
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: IN_HOME_RELATIVE
        childcare_hours_per_week: 40
        pre_subsidy_childcare_expenses: 9_000  # $750/month
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 9_000
    households:
      household:
        members: [person1, person2]
        state_code: KS
        county: FINNEY_COUNTY_KS  # Group 3
  output:
    ks_ccap_eligible: true
    # In-home relative flat $2.42/hr; max rate = 2.42 * 173.3333 = $419.47.
    # Per-child = min($750 expense, $419.47) = $419.47.
    # FSD (size 2, $2,000/mo) = $60; benefit = max($419.47 - $60, 0) = $359.47.
    ks_ccap_family_share: 60
    ks_ccap: 359.47

