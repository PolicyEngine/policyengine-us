        childcare_hours_per_week: 40
        pre_subsidy_childcare_expenses: 12_000  # $1,000/month
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
