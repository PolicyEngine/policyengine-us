# Cases 10-11 are a non-TANF vs TANF contrast pair on the SAME family, isolating
# the KEESM 7541 family-share waiver: the deduction is assessed only for Income
# Eligible (Non-TANF) clients, so a TANF family owes $0 and keeps the full
# reimbursement. Family of 3, $3,000/mo, Johnson County (Group 1), infant in
# center, $12,000/yr ($1,000/mo) expenses.
- name: Case 10, non-TANF family of 3 pays the family share.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # $3,000/month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 40
      person3:
        age: 0  # 0 months -> center Infant
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: CENTER
        childcare_hours_per_week: 40
        pre_subsidy_childcare_expenses: 12_000  # $1,000/month
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: KS
        county: JOHNSON_COUNTY_KS  # Group 1
  output:
    ks_ccap_eligible: true
    # Center Group 1 Infant = $7.33/hr; max rate = 7.33 * 173.3333 = $1,270.53.
    # Per-child = min($1,000 expense, $1,270.53) = $1,000 (expense binds).
    # FSD (size 3, $3,000/mo) = $89.
    # Benefit = max($1,000 - $89, 0) = $911.
    ks_ccap_family_share: 89
    ks_ccap: 911

