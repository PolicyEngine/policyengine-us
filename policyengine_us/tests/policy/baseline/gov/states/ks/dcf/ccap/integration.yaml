- name: Case 5, out-of-home relative care with rate cap binding.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # $2,000/month
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 4  # 48 months -> OOH relative over-18-months band
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: OUT_OF_HOME_RELATIVE
        childcare_hours_per_week: 60  # relative cap = 215 monthly hours
        pre_subsidy_childcare_expenses: 7_200  # $600/month
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 7_200
    households:
      household:
        members: [person1, person2]
        state_code: KS
        county: FINNEY_COUNTY_KS  # Group 3
  output:
    ks_ccap_eligible: true
    # OOH relative Group 3 over-18mo = $1.77/hr; relative monthly cap = 215 hours.
    # max rate = 1.77 * 215 = $380.55; per-child = min($600 expense, $380.55) = $380.55.
    # FSD (size 2, $2,000/mo) = $60.
    # Benefit = max($380.55 - $60, 0) = $320.55.
    ks_ccap_family_share: 60
    ks_ccap: 320.55

- name: Case 6, TANF-enrolled family eligible despite high income and no work hours.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 120_000  # $10,000/month, above the size-2 limit
        weekly_hours_worked_before_lsr: 0  # no work activity
      person2:
        age: 1  # 12 months -> center Toddler
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: CENTER
        childcare_hours_per_week: 40
        pre_subsidy_childcare_expenses: 12_000  # $1,000/month
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: KS
        county: FINNEY_COUNTY_KS  # Group 3
  output:
    # TANF bypass grants income and activity eligibility.
    ks_ccap_income_eligible: true
    ks_ccap_activity_eligible: true
    ks_ccap_eligible: true
    # Center Group 3 Toddler = $5.26/hr; max rate = $911.73.
    # Per-child = min($1,000 expense, $911.73) = $911.73.
    # KEESM 7541 assesses the family share only for Income Eligible (Non-TANF)
    # clients, so a TANF-enrolled family owes $0.
    # Benefit = max($911.73 - $0, 0) = $911.73.
    ks_ccap_family_share: 0
    ks_ccap: 911.73

