        weekly_hours_worked_before_lsr: 40
      person2:
        age: 0  # 0 months -> center Infant
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: CENTER
        childcare_hours_per_week: 40
        pre_subsidy_childcare_expenses: 6_000  # $500/month
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 6_000
    households:
      household:
        members: [person1, person2]
        state_code: KS
        county: FINNEY_COUNTY_KS  # Group 3
  output:
    ks_ccap_eligible: true
    # Center Group 3 Infant = $6.28/hr; max rate = 6.28 * 173.3333 = $1,088.53.
    # Per-child = min($500 expense, $1,088.53) = $500.
    # FSD (size 2, $1,000/mo below 100% FPL) = $0.
    # Benefit = max($500 - $0, 0) = $500, capped at $500 expenses.
    ks_ccap_family_share: 0
    ks_ccap: 500

