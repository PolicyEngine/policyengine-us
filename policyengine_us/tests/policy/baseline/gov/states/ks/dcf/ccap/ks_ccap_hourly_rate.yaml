# Maximum hourly provider rate (Appendix C-18).
# Rate is defined_for the eligible child, so each case sets up a Kansas
# citizen child under 13 and selects provider type, county (rate group),
# and age (age group).
#
# Verified C-18 rates (eff. 10-1-2024):
#   Center Group 3 Toddler = $5.26; Center Group 1 Infant = $7.33;
#   Center Group 2 School-Age = $3.65; Licensed Home Group 3 0-17mo = $2.88;
#   OOH Relative Group 1 under-18mo = $2.94; In-home relative = $2.42;
#   Enhanced special care = $7.34.

- name: Case 1, center Group 3 toddler.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 1  # 12 months -> Toddler
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
        county: FINNEY_COUNTY_KS  # Group 3
  output:
    ks_ccap_hourly_rate: [0, 5.26]

- name: Case 2, center Group 1 (Johnson) infant.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 0  # 0 months -> Infant
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
        county: JOHNSON_COUNTY_KS  # Group 1
  output:
    ks_ccap_hourly_rate: [0, 7.33]

