      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: IN_HOME_RELATIVE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
        county: JOHNSON_COUNTY_KS  # Group 1, but in-home is a flat statewide rate
  output:
    # Flat $2.42 regardless of rate group or age.
    ks_ccap_hourly_rate: [0, 2.42]

