# Authorized monthly hours (KEESM 7600):
#   monthly = weekly hours * 52 / 12, capped at 240 (standard) or 215 (relative
#   providers). Defined_for the eligible child.

- name: Case 1, 40 weekly hours under the standard cap.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: CENTER
        childcare_hours_per_week: 40
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # 40 * 52 / 12 = 173.3333, below the 240 cap.
    ks_ccap_monthly_hours: [0, 173.33]

- name: Case 2, high weekly hours capped at the standard 240.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: CENTER
        childcare_hours_per_week: 60
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # 60 * 52 / 12 = 260, capped at 240.
    ks_ccap_monthly_hours: [0, 240]

