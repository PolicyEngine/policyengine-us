  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: CENTER
        childcare_hours_per_week: 0
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    ks_ccap_monthly_hours: [0, 0]

# Edge case: weekly hours that convert to exactly the 240 standard cap.
# 55.384615 * 52 / 12 = 240.0.
- name: Case 6, hours converting to exactly the 240 standard cap.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: CENTER
        childcare_hours_per_week: 55.384615  # -> 240.0 monthly
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # 55.384615 * 52 / 12 = 240.0, exactly at the cap.
    ks_ccap_monthly_hours: [0, 240]

# Edge case: weekly hours just above the standard cap stay clamped at 240.
- name: Case 7, hours just above the standard cap stay at 240.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ks_ccap_provider_type: CENTER
        childcare_hours_per_week: 56  # 56 * 52 / 12 = 242.6667 -> capped at 240
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KS
  output:
    # 242.6667 capped at the 240 standard cap.
    ks_ccap_monthly_hours: [0, 240]
