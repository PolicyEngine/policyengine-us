- name: GA HB463 - TY 2026 multi-worker overtime applies per-person cap then aggregates
  # Two workers each with $3,000 of overtime — each capped at $1,750
  # individually, summed to $3,500. Validates that the cap is applied
  # BEFORE aggregation (per-employee), not after.
  period: 2026
  input:
    people:
      head:
        age: 38
        is_tax_unit_head: true
        is_paid_hourly: true
        employment_income: 50_000
        fsla_overtime_premium: 3_000
      spouse:
        age: 36
        is_tax_unit_spouse: true
        is_paid_hourly: true
        employment_income: 50_000
        fsla_overtime_premium: 3_000
    tax_units:
      tax_unit:
        members: [head, spouse]
        filing_status: JOINT
    households:
      household:
        members: [head, spouse]
        state_code: GA
  output:
    # 2 workers x $1,750 = $3,500.
    ga_qualified_overtime_exclusion: 3_500

- name: GA HB463 - TY 2028 last year overtime and tips still flow into ga_subtractions
  # Contrast case for the 2029 self-repeal test below. TY 2028 is the last
  # year both provisions apply, so the exclusions ARE summed into
  # ga_subtractions. Sanity-check that the variables themselves return
  # the expected $1,750 caps.
  period: 2028
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_paid_hourly: true
        employment_income: 50_000
        fsla_overtime_premium: 3_000
        tip_income: 4_000
        tip_income_deduction_occupation_requirement_met: true
    tax_units:
      tax_unit:
        members: [head]
        filing_status: SINGLE
    households:
      household:
        members: [head]
        state_code: GA
  output:
    ga_qualified_overtime_exclusion: 1_750
    ga_cash_tip_exclusion: 1_750

- name: GA HB463 - TY 2029 overtime/tips exclusions self-repealed; no subtraction flows
  # Both paragraphs stand repealed 12/31/2028; subtractions list drops both
  # at 2029-01-01. The variables themselves may still compute non-zero
  # values from the person-level inputs, but they should NOT contribute
  # to ga_subtractions because they are no longer in the list.
  period: 2029
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        employment_income: 50_000
        fsla_overtime_premium: 3_000
        tip_income: 4_000
        tip_income_deduction_occupation_requirement_met: true
    tax_units:
      tax_unit:
        members: [head]
        filing_status: SINGLE
    households:
      household:
        members: [head]
        state_code: GA
  output:
    # HB463 Section 2-4(16)(E) and (17)(E): both paragraphs stand repealed
    # and reserved on December 31, 2028. The subtractions list drops
    # ga_qualified_overtime_exclusion and ga_cash_tip_exclusion from
    # 2029-01-01, so neither flows through ga_subtractions.
    ga_subtractions: 0

