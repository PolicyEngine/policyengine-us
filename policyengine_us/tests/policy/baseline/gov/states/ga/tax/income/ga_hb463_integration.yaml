- name: GA HB463 - TY 2026 single filer gets the new $15,000 standard deduction
  period: 2026
  input:
    employment_income: 50_000
    filing_status: SINGLE
    age_head: 35
    state_code: GA
  output:
    # Standard deduction increased from $12,000 to $15,000 by HB463 Section 2-3.
    ga_standard_deduction: 15_000

- name: GA HB463 - TY 2026 joint filer gets the new $30,000 standard deduction
  period: 2026
  input:
    employment_income: 80_000
    filing_status: JOINT
    age_head: 40
    age_spouse: 38
    state_code: GA
  output:
    ga_standard_deduction: 30_000

- name: GA HB463 - TY 2026 head of household gets the new $15,000 standard deduction
  period: 2026
  input:
    employment_income: 50_000
    filing_status: HEAD_OF_HOUSEHOLD
    age_head: 35
    state_code: GA
  output:
    ga_standard_deduction: 15_000

- name: GA HB463 - TY 2026 separate filer gets the new $15,000 standard deduction
  period: 2026
  input:
    employment_income: 40_000
    filing_status: SEPARATE
    age_head: 38
    state_code: GA
  output:
    ga_standard_deduction: 15_000

- name: GA HB463 - TY 2026 surviving spouse gets the $30,000 standard deduction (JOINT-tier conformity)
  # Bill enumerates only (i) joint and (ii) single/HoH/separate. We map
  # SURVIVING_SPOUSE to the joint tier consistent with federal qualifying-
  # widow(er) treatment.
  period: 2026
  input:
    employment_income: 60_000
    filing_status: SURVIVING_SPOUSE
    age_head: 40
    state_code: GA
  output:
    ga_standard_deduction: 30_000

- name: GA HB463 - TY 2026 dependent exemption is $5,000 per dependent
  period: 2026
  input:
    people:
      head:
        age: 35
        employment_income: 50_000
        is_tax_unit_head: true
      child:
        age: 10
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [head, child]
        filing_status: HEAD_OF_HOUSEHOLD
    households:
      household:
        members: [head, child]
        state_code: GA
  output:
    # HB463 Section 2-2: dependent exemption raised from $4,000 to $5,000.
    ga_exemptions: 5_000

- name: GA HB463 - TY 2026 multi-dependent exemption scales linearly
  period: 2026
  input:
    people:
      head:
        age: 35
        employment_income: 60_000
        is_tax_unit_head: true
      child1:
        age: 8
        is_tax_unit_dependent: true
      child2:
        age: 10
        is_tax_unit_dependent: true
      child3:
        age: 12
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [head, child1, child2, child3]
        filing_status: HEAD_OF_HOUSEHOLD
    households:
      household:
        members: [head, child1, child2, child3]
        state_code: GA
  output:
    # 3 dependents x $5,000 = $15,000 (plus filer exemption if any from p.taxpayer).
    ga_exemptions: 15_000

- name: GA HB463 - TY 2026 age-65+ retirement cap is still $65,000 (cap raise applies TY 2027+)
  # Locks the 2026 vs 2027 boundary. The bill raises the cap to $70,000
  # effective TY 2027, not TY 2026 — so a 2026 age-65+ filer with $70,000
  # of taxable pension income is capped at $65,000.
  period: 2026
  input:
    people:
      head:
        age: 67
        taxable_pension_income: 70_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [head]
        filing_status: SINGLE
    households:
      household:
        members: [head]
        state_code: GA
  output:
    ga_retirement_exclusion: 65_000

- name: GA HB463 - TY 2027 retirement income exclusion for age 65+ raised to $70,000
  period: 2027
  input:
    people:
      head:
        age: 67
        taxable_pension_income: 80_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [head]
        filing_status: SINGLE
    households:
      household:
        members: [head]
        state_code: GA
  output:
    # HB463 Section 2-3: age-65+ retirement exclusion cap raised from
    # $65,000 to $70,000 effective TY 2027.
    ga_retirement_exclusion: 70_000

