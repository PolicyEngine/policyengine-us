# GA CAPS age groups:
#   INFANT: age < 1
#   TODDLER: 1 <= age < 3
#   PRESCHOOL: 3 <= age < 6
#   SCHOOL_AGE: age >= 6
# Age group only computed for eligible children (defined_for = ga_caps_eligible_child).
# Non-eligible persons get default PRESCHOOL.

- name: Case 1, infant age 0.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 0

        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    ga_caps_age_group: [PRESCHOOL, INFANT]

