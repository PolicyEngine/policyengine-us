# GA CAPS activity eligibility
# Parent must average 24 hours/week in approved activities
# (employment or full-time student).
# All cases pin meets_ccdf_activity_test: false to isolate the GA-specific
# 24-hour rule from the federal CCDF fallback (added in ga_caps_activity_eligible.py).

- name: Case 1, single parent working 24 hours meets requirement.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 24
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: false
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    ga_caps_activity_eligible: true

- name: Case 2, single parent working 23 hours does not meet requirement.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 23
        is_full_time_student: false
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: false
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    ga_caps_activity_eligible: false

- name: Case 3, full time student parent qualifies.
  period: 2026-01
  input:
