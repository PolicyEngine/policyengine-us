# GA CAPS Integration Tests
#
# 2026 FPG (Contiguous US):
#   first_person = 15,960, additional = 5,680
#   Family of 2: 21,640
#   Family of 3: 27,320
#   Family of 4: 33,000
#
# GA SMI 4-person at 2026-01: $116,773.19 (uprated)
#   Family of 2: 116,773.19 * 0.68 = $79,405.77 -> 50% = $39,702.88
#   Family of 3: 116,773.19 * 0.84 = $98,089.48 -> 50% = $49,044.74
#   Family of 4: 116,773.19 * 1.00 = $116,773.19 -> 50% = $58,386.59

- name: Case 1, basic eligible family with Zone 1 center care.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 30_000
        immigration_status: CITIZEN
      person2:
        age: 4

        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 11_000
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: FULTON_COUNTY_GA
  output:
    # === Eligibility ===
    # Child age 4 < 13 -> age eligible
    # Citizen -> immigration eligible
    ga_caps_eligible_child: [false, true]

    # income 30,000 <= 39,702.88 (50% SMI for family of 2) -> income eligible
    ga_caps_income_eligible: true
    is_ccdf_asset_eligible: true
    ga_caps_eligible: true

    # === Zone and rate ===
    # Fulton County -> Zone 1
    ga_caps_zone: ZONE_1
    # Age 4 -> PRESCHOOL
    ga_caps_age_group: [PRESCHOOL, PRESCHOOL]
    # Zone 1, Center, Preschool, Full-time = $221/week
    ga_caps_maximum_weekly_benefit: [0, 221]

    # === Family fee ===
    # FPG family of 2: $21,640
    # FPL ratio = 30,000 / 21,640 = 1.386 -> 7% rate
    # weekly fee = floor(30,000 * 0.07 / 52) = floor(40.38) = $40
    # monthly fee = 40 * 52 / 12 = $173.33
    ga_caps_family_fee: 173.33

    # === Benefit ===
    # base_max_monthly = 221 * 52 / 12 = $957.67
    # pre_subsidy_monthly = 11,000 / 12 = $916.67
    # base_payment = min(916.67, 957.67) = $916.67
    # net_base = max(916.67 - 173.33, 0) = $743.33
    # no quality bonus (NONE rating)
    # subsidy = $743.33
    ga_caps: 743.33

