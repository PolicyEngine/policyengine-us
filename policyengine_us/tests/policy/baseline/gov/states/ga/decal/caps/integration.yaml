    # FPL ratio = 60,000 / 21,640 = 2.773 -> 7% rate
    # weekly fee = floor(60,000 * 0.07 / 52) = floor(80.77) = $80
    # monthly fee = 80 * 52 / 12 = $346.67
    ga_caps_family_fee: 346.67

    # === Benefit ===
    # base_max_monthly = 160 * 52 / 12 = $693.33
    # pre_subsidy_monthly = 12,000 / 12 = $1,000
    # base_payment = min(1,000, 693.33) = $693.33
    # net_base = max(693.33 - 346.67, 0) = $346.67
    # effective_bonus = (160 * 0.10) / 160 = 0.10
    # subsidy = 346.67 * 1.10 = $381.33
