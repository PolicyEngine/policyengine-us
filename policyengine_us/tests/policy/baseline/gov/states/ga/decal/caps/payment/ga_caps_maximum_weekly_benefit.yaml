# GA CAPS maximum reimbursement rate lookup
# Rates from Appendix C (effective March 2, 2026)
# Person-level variable; parent output is 0, child gets rate

- name: Case 1, Zone 1 center full-time infant.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 0
        ga_caps_provider_type: CENTER
        ga_caps_care_type: FULL_TIME
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: FULTON_COUNTY_GA
  output:
    # Zone 1, Center, Infant, Full-time = $260/week
    ga_caps_maximum_weekly_benefit: [0, 260]

