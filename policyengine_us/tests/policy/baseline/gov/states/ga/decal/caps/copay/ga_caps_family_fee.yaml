- name: Case 8, FPL ratio just above 10 percent boundary still in zero tier.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # 10% of FPG for family of 2 = 21,640 * 0.10 = $2,164
        # Just above: $2,165
        employment_income: 2_165
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # FPL ratio = 2,165 / 21,640 = 0.10005 -> < 0.1001 (still in 0% tier)
    ga_caps_family_fee: 0

