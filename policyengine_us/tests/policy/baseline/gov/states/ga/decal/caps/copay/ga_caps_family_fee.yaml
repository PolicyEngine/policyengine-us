        state_code: GA
  output:
    # FPL ratio = 2,167 / 21,640 = 0.10014 -> >= 0.1001 -> 3% rate
    # weekly fee = floor(2,167 * 0.03 / 52) = floor(1.25) = $1
    # monthly fee = 1 * 52 / 12 = $4.33
    ga_caps_family_fee: 4.33

