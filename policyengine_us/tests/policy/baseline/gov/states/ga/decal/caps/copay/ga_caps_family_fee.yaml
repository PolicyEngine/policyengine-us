  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # 0.1001 * 21,640 = $2,166.16. So income $2,167 crosses.
        employment_income: 2_167
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
