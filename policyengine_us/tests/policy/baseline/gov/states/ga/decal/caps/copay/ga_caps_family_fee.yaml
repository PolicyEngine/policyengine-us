  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # 10% of FPG for family of 2 = 21,640 * 0.10 = $2,164
        # One dollar above: $2,165
        employment_income: 2_165
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # FPL ratio = 2,165 / 21,640 = 0.10005 -> > 0.1 -> 3% rate
    # weekly fee = floor(2,165 * 0.03 / 52) = floor(1.25) = $1
    # monthly fee = 1 * 52 / 12 = $4.33
    ga_caps_family_fee: 4.33

