# GA CAPS child eligibility
# Standard: age < 13 (12 or younger)
# Disabled: age <= 17
# Must be immigration eligible (CCDF)

- name: Case 1, child under 13 who is a citizen.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    ga_caps_eligible_child: [false, true]

- name: Case 2, child age 12 is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 12
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # age 12 < 13 -> eligible
    ga_caps_eligible_child: [false, true]

