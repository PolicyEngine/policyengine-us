# GA CAPS benefit
# Subsidy = max(min(expenses, sum_of_max_rates) - fee, 0) * (1 + weighted_quality_bonus_rate)
#
# 2026 FPG (Contiguous US):
#   first_person = 15,960, additional = 5,680
#   Family of 2: 21,640
#   Family of 3: 27,320
#
# GA SMI 4-person at 2026-01: $116,773.19 (uprated)
#   Family of 2: 116,773.19 * 0.68 = $79,405.77 -> 50% = $39,702.88

- name: Case 1, subsidy zero when fee exceeds expenses.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 35_000
        immigration_status: CITIZEN
      person2:
        age: 4

        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 2_000
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: FULTON_COUNTY_GA
  output:
    ga_caps_eligible: true
    # FPG family of 2: $21,640
    # FPL ratio = 35,000 / 21,640 = 1.617 -> 7% rate
    # weekly fee = floor(35,000 * 0.07 / 52) = floor(47.12) = $47
    # monthly fee = 47 * 52 / 12 = $203.67
    ga_caps_family_fee: 203.67
    # max annual = 221 * 52 = $11,492
    # annual fee = 47 * 52 = $2,444
    # uncapped = max(2,000 - 2,444, 0) = $0 (fee > expenses)
    # base_subsidy = min(0, 11,492) = 0
    # quality bonus = 0 (base_subsidy is 0)
    ga_caps: 0

- name: Case 2, quality bonus 1-star gives zero bonus.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
      person2:
        age: 4

        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: ONE_STAR
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: FULTON_COUNTY_GA
  output:
    ga_caps_eligible: true
    # FPG family of 2: $21,640
    # FPL ratio = 20,000 / 21,640 = 0.9242 -> 5% rate
    # weekly fee = floor(20,000 * 0.05 / 52) = floor(19.23) = $19
    # monthly fee = 19 * 52 / 12 = $82.33
    ga_caps_family_fee: 82.33
    # max annual = 221 * 52 = $11,492
    # annual fee = 19 * 52 = $988
    # uncapped = max(10,000 - 988, 0) = $9,012
    # base_subsidy = min(9,012, 11,492) = $9,012
    # 1-star bonus rate = 0% (threshold = 2 for 5%, 3 for 10%)
    # quality_enhanced = 221 * (1 + 0) = 221/wk
    # quality_max_monthly = 221 * 52 / 12 = $957.67
    # quality_bonus = 957.67 - 957.67 = 0
    # total = 9,012 / 12 + 0 = $751.00
    ga_caps: 751.00

