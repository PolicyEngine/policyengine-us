# GA CAPS zone assignment
# Zone 1: 14 counties (Fulton, Cobb, DeKalb, etc.)
# Zone 2: 46 counties (Chatham, Bibb, etc.)
# Zone 3: ~99 remaining Georgia counties (Appling, etc.) — residual default

- name: Case 1, Fulton County is Zone 1.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: GA
        county_str: FULTON_COUNTY_GA
  output:
    ga_caps_zone: ZONE_1

