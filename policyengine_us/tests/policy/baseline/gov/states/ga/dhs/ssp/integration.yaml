- name: Case 1, single eligible individual in current period.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        ga_ssp_in_nursing_home_or_institutionalized_hospice: true
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: GA
  output:
    ssi_federal_living_arrangement: [MEDICAL_TREATMENT_FACILITY]
    ga_ssp_eligible_person: [true]
    ssi: [30]
    # $40/month per eligible individual (effective 2019-07-01)
    ga_ssp_person: [40]
    # SPM unit total = $40
    ga_ssp: 40
    # Verify ga_ssp flows into spm_unit_benefits (includes ssi + ga_ssp + snap + others)
    spm_unit_benefits: 361.25

- name: Case 2, couple both eligible in current period.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        ga_ssp_in_nursing_home_or_institutionalized_hospice: true
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
      person2:
        is_ssi_eligible: true
        ga_ssp_in_nursing_home_or_institutionalized_hospice: true
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    ssi_federal_living_arrangement: [MEDICAL_TREATMENT_FACILITY, MEDICAL_TREATMENT_FACILITY]
    ga_ssp_eligible_person: [true, true]
    ssi: [30, 30]
    # Each person gets $40/month
    ga_ssp_person: [40, 40]
    # SPM unit total = $40 + $40 = $80
    ga_ssp: 80

- name: Case 3, one eligible and one not SSI-eligible in couple.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        ga_ssp_in_nursing_home_or_institutionalized_hospice: true
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
      person2:
        is_ssi_eligible: true
        ga_ssp_in_nursing_home_or_institutionalized_hospice: false
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # person2 has ssi_medicaid_pays_majority_of_care=true but not in GA nursing home
    ssi_federal_living_arrangement: [MEDICAL_TREATMENT_FACILITY, MEDICAL_TREATMENT_FACILITY]
    ga_ssp_eligible_person: [true, false]
    ga_ssp_person: [40, 0]
    # SPM unit total = $40 + $0 = $40
    ga_ssp: 40

