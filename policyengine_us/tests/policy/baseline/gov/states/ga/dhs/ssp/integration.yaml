# Income-based integration tests
- name: Case 9, couple both SSI-eligible but both with income too high.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        ga_ssp_in_nursing_home_or_institutionalized_hospice: true
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
        uncapped_ssi: -500
      person2:
        ga_ssp_in_nursing_home_or_institutionalized_hospice: true
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
        uncapped_ssi: -2_000
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    ssi_federal_living_arrangement: [MEDICAL_TREATMENT_FACILITY, MEDICAL_TREATMENT_FACILITY]
    # Both pass is_ssi_eligible but neither actually receives SSI
    ga_ssp_eligible_person: [false, false]
    ga_ssp_person: [0, 0]
    ga_ssp: 0

- name: Case 10, declining SSI blocks Georgia SSP even if uncapped SSI is positive.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        ga_ssp_in_nursing_home_or_institutionalized_hospice: true
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
        takes_up_ssi_if_eligible: false
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: GA
  output:
    ssi_federal_living_arrangement: [MEDICAL_TREATMENT_FACILITY]
    ssi: [0]
    ga_ssp_eligible_person: [false]
    ga_ssp_person: [0]
    ga_ssp: 0
