- name: State income tax subtracts refundable credits
  period: 2021
  input:
    state_income_tax_before_refundable_credits: 1_000
    state_refundable_credits: 300
  output:
    state_income_tax: 700

- name: State income tax can be negative after refundable credits
  period: 2021
  input:
    state_income_tax_before_refundable_credits: 0
    state_refundable_credits: 300
  output:
    state_income_tax: -300

- name: Case 3, New Jersey income tax uses filing-threshold zero-out.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        taxable_interest_income: 9_611.82
        short_term_capital_gains: 42.93
        long_term_capital_gains: 314.91
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: NJ
  output:
    nj_income_tax: 0
    state_income_tax: 0
