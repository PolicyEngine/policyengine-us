- name: AGI ineligible (at or below $25,000)
  period: 2006
  input:
    adjusted_gross_income: 25_000
    cdcc: 1_000
    state_code: LA
  output:
    la_non_refundable_cdcc: 0

- name: 30% match of federal credit claimed (AGI $25,001-$35,000)
  period: 2023
  input:
    adjusted_gross_income: 25_001
    cdcc: 1_000
    state_code: LA
  output:
    la_non_refundable_cdcc: 300

- name: Match over 60k capped at $25
  period: 2023
  input:
    adjusted_gross_income: 60_001
    cdcc: 1_000
    state_code: LA
  output:
    la_non_refundable_cdcc: 25

- name: Match over 60k, uncapped
  period: 2023
  input:
    adjusted_gross_income: 60_001
    cdcc: 100
    state_code: LA
  output:
    la_non_refundable_cdcc: 10

- name: 10% match of federal credit claimed (AGI $35,001-$60,000)
  period: 2023
  input:
    adjusted_gross_income: 35_001
    cdcc: 100
    state_code: LA
  output:
    la_non_refundable_cdcc: 10
