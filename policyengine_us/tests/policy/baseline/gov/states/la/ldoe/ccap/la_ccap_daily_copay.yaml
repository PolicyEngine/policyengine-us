# January 2026 uses the 2025 sliding fee scale (effective February 3, 2025).
# Two-person bands: $0 to $3,474; $2 to $3,746; $3 to $4,017; $8 to $4,289;
# $10 to $4,614.
- name: Case 1, income below 65% SMI has no co-payment.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 40_800  # $3,400/month, in the $0 band.
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_daily_copay: 0

- name: Case 2, income in the second band pays $2 per day.
  period: 2026-01
  absolute_error_margin: 0.01
