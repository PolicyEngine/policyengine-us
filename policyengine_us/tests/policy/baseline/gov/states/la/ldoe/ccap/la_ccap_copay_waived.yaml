# CCDF State Plan FFY 2025-2027 Section 3.3.1 waives co-payments for families
# experiencing homelessness, children with disabilities, and categorically
# eligible households (foster care, STEP). Generic Head Start / Early Head
# Start enrollment is not a waiver category; only Early Head Start-Child Care
# Partnership (EHS-CCP) families are waived, which we do not track.
- name: Case 1, family with a disabled child has the co-payment waived.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 2
        is_disabled: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_copay_waived: true

- name: Case 2, generic Head Start enrollment does not waive the co-payment.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 2
        is_enrolled_in_head_start: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    # Only EHS-CCP, not generic Head Start, is a waiver category, and EHS-CCP
    # is not tracked, so an ordinary Head Start enrollee is not waived.
    la_ccap_copay_waived: false

- name: Case 3, homeless family has the co-payment waived.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
        is_homeless: true
  output:
    la_ccap_copay_waived: true

- name: Case 4, TANF-enrolled household has the co-payment waived.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_copay_waived: true

- name: Case 5, family with no waiver category pays the scale co-payment.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_copay_waived: false

- name: Case 6, a disabled adult does not trigger the child waiver.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        is_disabled: true
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_copay_waived: false
