# Sliding fee scale footnote: co-payments are waived for families
# experiencing homelessness, children enrolled in Early Head Start-Child
# Care Partnerships, children with disabilities, and STEP participants.
- name: Case 1, family with a disabled child has the co-payment waived.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 2
        is_disabled: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_copay_waived: true

- name: Case 2, child enrolled in Head Start has the co-payment waived.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 2
        is_enrolled_in_head_start: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_copay_waived: true

- name: Case 3, homeless family has the co-payment waived.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
        is_homeless: true
  output:
    la_ccap_copay_waived: true

- name: Case 4, TANF-enrolled household has the co-payment waived.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_copay_waived: true

- name: Case 5, family with no waiver category pays the scale co-payment.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_copay_waived: false

- name: Case 6, a disabled adult does not trigger the child waiver.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        is_disabled: true
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_copay_waived: false
