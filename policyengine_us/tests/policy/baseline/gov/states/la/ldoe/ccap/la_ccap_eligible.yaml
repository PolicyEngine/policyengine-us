- name: Case 1, working family below the income limit is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 40_800  # $3,400/month vs $4,614 two-person limit.
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_eligible: true

- name: Case 2, income above the limit without categorical eligibility fails.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000  # $5,000/month vs $4,614 two-person limit.
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_eligible: false

- name: Case 3, TANF enrollment bypasses the income and activity tests.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_eligible: true

- name: Case 4, household without an eligible child fails.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 40_800
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 14
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_eligible: false

- name: Case 5, assets above the CCDF limit fail.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 40_800
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_assets: 1_500_000
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_eligible: false

- name: Case 6, failing the activity test without categorical eligibility fails.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 40_800
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: LA
  output:
    la_ccap_eligible: false
