# State maximum daily rates per LAC 28:CLXV.515.A (LR 48:1270, May 20, 2022).
- name: Case 1, infant in a Type III early learning center.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0.5
        la_ccap_provider_type: TYPE_III_EARLY_LEARNING_CENTER
    households:
      household:
        members: [person1]
        state_code: LA
  output:
    la_ccap_daily_rate: 68

