- name: Case 1, child age 5 is under 13 and age-eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
    households:
      household:
        members: [person1, person2]
        state_code: AR
  output:
    is_ar_sra_age_eligible: [false, true]

- name: Case 2, child age 12 at boundary is age-eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 12
        is_tax_unit_dependent: true
    households:
      household:
        members: [person1, person2]
        state_code: AR
  output:
    is_ar_sra_age_eligible: [false, true]

- name: Case 3, child age 13 is not age-eligible (strict less than).
