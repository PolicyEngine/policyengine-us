        members: [person1, person2]
        state_code: AR
  output:
    is_ar_sra_age_eligible: [false, true]

- name: Case 6, non-disabled child age 15 is not age-eligible (over 13).
  period: 2026-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 15
        is_tax_unit_dependent: true
        is_disabled: false
    households:
      household:
        members: [person1, person2]
        state_code: AR
  output:
    is_ar_sra_age_eligible: [false, false]

- name: Case 7, disabled child age 18 is age-eligible (disability extension covers under 19).
  period: 2026-01
  input:
    people:
      person1:
        age: 45
      person2:
        age: 18
        is_tax_unit_dependent: true
        is_disabled: true
    households:
      household:
        members: [person1, person2]
        state_code: AR
  output:
    # FSU §5.6.1 / CCDF State Plan §2.2.1: disabled children eligible
    # "under nineteen (19)".
    is_ar_sra_age_eligible: [false, true]

- name: Case 8, disabled child age 19 is at the disability extension boundary and not age-eligible (strict less than).
  period: 2026-01
  input:
    people:
      person1:
        age: 45
      person2:
        age: 19
        is_tax_unit_dependent: true
        is_disabled: true
    households:
      household:
        members: [person1, person2]
        state_code: AR
  output:
    is_ar_sra_age_eligible: [false, false]

- name: Case 9, disabled child age 13 is age-eligible (disability extension activates at the standard cutoff).
  period: 2026-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 13
        is_tax_unit_dependent: true
        is_disabled: true
    households:
      household:
        members: [person1, person2]
        state_code: AR
  output:
    # Confirms the disability extension picks up where the standard 13-year
    # cutoff leaves off; a disabled 13-year-old remains eligible (< 19).
    is_ar_sra_age_eligible: [false, true]
