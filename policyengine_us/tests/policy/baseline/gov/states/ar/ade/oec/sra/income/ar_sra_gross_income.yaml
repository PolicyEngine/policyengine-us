# ar_sra_gross_income sums income across ALL household members (children
# included), unlike ar_sra_countable_income which excludes child income.
# It feeds the 4% copay-cap denominator under CCDF State Plan §3.1.1.

- name: Case 1, adult-only earnings flow through to gross income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AR
  output:
    # 24,000 / 12 = 2,000 monthly
    ar_sra_gross_income: 2_000

- name: Case 2, child SSI is INCLUDED in gross income (contrast with countable).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 5
        ssi: 11_604  # /year (federal SSI max)
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AR
  output:
    # Gross: (24,000 + 11,604) / 12 = 2,967
    ar_sra_gross_income: 2_967
    # Countable excludes child SSI: 24,000 / 12 = 2,000
    ar_sra_countable_income: 2_000

- name: Case 3, child SSDI (social_security_disability) is INCLUDED in gross.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 36_000
      person2:
        age: 10
        social_security_disability: 9_000
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AR
  output:
    # Gross: (36,000 + 9,000) / 12 = 3,750
    ar_sra_gross_income: 3_750
    # Countable excludes child SS-disability: 36,000 / 12 = 3,000
    ar_sra_countable_income: 3_000

- name: Case 4, non-AR household yields zero gross (defined_for guard).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    ar_sra_gross_income: 0
