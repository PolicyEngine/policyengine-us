# Daily family copay per child = daily_base_rate * (1 - state_share).

- name: Case 1, Toddler Statewide FT at LE_40 SMI has zero copay (share 1.00).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 28
        # 30% SMI -> LE_40 tier
        employment_income: 18_417
        immigration_status: CITIZEN
      person2:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AR
        county_str: PULASKI_COUNTY_AR
  output:
    # Statewide / Toddler / REGULAR / FT base = $35.00, share = 1.00
    # daily copay = $35 * (1 - 1.00) = $0.00
    ar_sra_daily_copay: [0, 0.00]

