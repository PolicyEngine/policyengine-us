# Income tiers (% SMI):
#   LE_40: <= 40% SMI
#   GT_40_LE_60: > 40%, <= 60% SMI
#   GT_60: > 60% SMI
#
# Arkansas SMI (period 2026 -> 2025-10-01 entry): $90,280
# 2-person SPM (parent + child): SMI = 90,280 * 0.68 = $61,390.40 annual

- name: Case 1, family at 30 percent SMI is in the LE_40 tier.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        # 61,390.40 * 0.30 = $18,417.12
        employment_income: 18_417
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AR
  output:
    ar_sra_income_tier: LE_40

