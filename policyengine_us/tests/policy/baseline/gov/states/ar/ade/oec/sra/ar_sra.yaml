# ar_sra unit tests — exercise the top-level formula's clamps and 4% cap.
#
# Reference parameters (Nov 1, 2025 rate sheet):
#   AR SMI (FFY 2026, uprated to 2026-01-01, 4-person): $95,201.95/year
# All cases use a single eligible toddler with 22 attending days/month.

- name: Case 1, baseline LI eligible family at LE_40 SMI tier, no copay.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 28
        weekly_hours_worked: 35
        employment_income: 18_000
        immigration_status: CITIZEN
      person2:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 22
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 20_000
    households:
      household:
        members: [person1, person2]
        state_code: AR
        county_str: PULASKI_COUNTY_AR
  output:
    is_ar_sra_eligible: true
    # Toddler Statewide FT LE_40: state share 1.00, copay 0.
    # daily_state_payment = 35; monthly = 35 * 22 = 770.
    ar_sra: 770

- name: Case 2, total_expense clamp - state payment exceeds actual expenses.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 28
        weekly_hours_worked: 35
        employment_income: 18_000
        immigration_status: CITIZEN
      person2:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 22
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        # State payment alone would be $770; cap at actual expense.
        spm_unit_pre_subsidy_childcare_expenses: 6_000
    households:
      household:
        members: [person1, person2]
        state_code: AR
        county_str: PULASKI_COUNTY_AR
  output:
    is_ar_sra_eligible: true
    # Annual expense $6,000 -> monthly $500. Subsidy capped at $500.
    ar_sra: 500

- name: Case 3, zero expense clamps subsidy to zero (even with positive state payment).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 28
        weekly_hours_worked: 35
        employment_income: 18_000
        immigration_status: CITIZEN
      person2:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 22
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 0
    households:
      household:
        members: [person1, person2]
        state_code: AR
        county_str: PULASKI_COUNTY_AR
  output:
    is_ar_sra_eligible: true
    ar_sra: 0

- name: Case 4, 4% cap binds - rate-sheet copay exceeds 4% of gross.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 28
        weekly_hours_worked: 35
        # GT_40_LE_60 tier: rate-sheet copay = $7/day = $154/month.
        employment_income: 30_695
        immigration_status: CITIZEN
      person2:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 22
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 20_000
    households:
      household:
        members: [person1, person2]
        state_code: AR
        county_str: PULASKI_COUNTY_AR
  output:
    is_ar_sra_eligible: true
    # Monthly gross = 30,695 / 12 = $2,557.92
    # 4% cap = $102.32; rate-sheet copay $154 exceeds cap.
    # cap_savings = $154 - $102.32 = $51.68
    # uncapped subsidy = daily_state_payment * 22 = $28 * 22 = $616
    # ar_sra = $616 + $51.68 = $667.68
    ar_sra: 667.68

- name: Case 5, negative gross income is clamped at zero before applying 4% cap.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 28
        weekly_hours_worked: 35
        # Self-employment loss exceeds wages; gross_income would be negative.
        self_employment_income: -20_000
        employment_income: 5_000
        immigration_status: CITIZEN
      person2:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 22
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 20_000
    households:
      household:
        members: [person1, person2]
        state_code: AR
        county_str: PULASKI_COUNTY_AR
  output:
    is_ar_sra_eligible: true
    # Net income < 0 -> LE_40 tier (state share 1.00, copay 0).
    # No copay so 4% cap is moot; full state payment.
    # ar_sra = $35 * 22 = $770. Without the max_(gross, 0) clamp,
    # cap_savings could become negative and corrupt the subsidy.
    ar_sra: 770
