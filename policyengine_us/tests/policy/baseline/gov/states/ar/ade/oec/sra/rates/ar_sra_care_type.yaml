# ar_sra_care_type is a bare-input enum variable; default is REGULAR.
# Verify each enum value round-trips correctly.

- name: Case 1, default ar_sra_care_type is REGULAR.
  period: 2026-01
  input:
    people:
      person1:
        age: 2
    households:
      household:
        members: [person1]
        state_code: AR
  output:
    ar_sra_care_type: REGULAR

