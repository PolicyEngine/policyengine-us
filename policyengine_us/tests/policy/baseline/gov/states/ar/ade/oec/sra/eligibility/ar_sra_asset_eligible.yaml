# Arkansas SRA asset limit: $1,000,000 (2025-10-01).
# Comparison is `assets <= limit` (inclusive at boundary).

- name: Case 1, assets of $500,000 are below the limit and asset-eligible.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_assets: 500_000
    households:
      household:
        members: [person1, person2]
        state_code: AR
  output:
    is_ar_sra_asset_eligible: true

- name: Case 2, assets of exactly $1,000,000 are at the limit and asset-eligible.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_assets: 1_000_000
    households:
      household:
        members: [person1, person2]
        state_code: AR
  output:
    is_ar_sra_asset_eligible: true

- name: Case 3, assets of $1,000,001 exceed the limit and are not asset-eligible.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_assets: 1_000_001
    households:
      household:
        members: [person1, person2]
        state_code: AR
  output:
    is_ar_sra_asset_eligible: false
