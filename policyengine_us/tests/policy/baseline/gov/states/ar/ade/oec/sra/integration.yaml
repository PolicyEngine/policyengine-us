- name: Case 10, low pre-subsidy expense binds before state payment cap.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 28
        weekly_hours_worked: 35
        employment_income: 18_417
        immigration_status: CITIZEN
      person2:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        childcare_attending_days_per_month: 22
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        # Annual $3,600 = $300/month, well below the $770 monthly cap
        spm_unit_pre_subsidy_childcare_expenses: 3_600
    households:
      household:
        members: [person1, person2]
        state_code: AR
        county_str: PULASKI_COUNTY_AR
  output:
    is_ar_sra_eligible: true
    # Toddler Statewide FT LE_40: cap = $770/mo, copay = $0
    # subsidy = min(max(300 - 0, 0), 770) = $300 (expense binds)
    ar_sra: 300

