# Arkansas SRA integration tests
#
# Reference parameters (Nov 1, 2025 rate sheet):
#   AR SMI (FFY 2026, uprated to 2026-01-01, 4-person): $95,201.95/year
#   SMI(2)=95,201.95*0.68=$64,737.33; SMI(3)=95,201.95*0.84=$79,969.64
#   85% income limit: SMI*0.85
#   Tier percentages in test comments are computed against the uprated SMI.
#
# Income tier brackets (% SMI): LE_40 (<=40), GT_40_LE_60 (40<x<=60), GT_60 (>60)
# Daily base rates (Statewide REGULAR): Infant FT $36, Toddler FT $35,
#   Preschool FT $33, School-Aged FT $28; PT half (Infant $18, Toddler $17.50,
#   Preschool $16.50, School-Aged $14).
# Daily base rates (Benton/Washington REGULAR): Infant FT $38, Toddler FT $37,
#   Preschool FT $33, School-Aged FT $28; PT (Infant $19, Toddler $18.50, etc.).
# State share % by (age_category, time, tier):
#   Toddler/Preschool/Infant FT: 1.00 / 0.80 / 0.70 (Preschool FT mid-tier 0.70)
#   School-Aged FT: 0.80 / 0.50 / 0.30 (always copay)
#
# All scenarios use childcare_attending_days_per_month = 22 (typical weekday count).
# Pre-subsidy expenses are set high enough that the state-payment cap binds.
#
# 4% copay cap (CCDF State Plan §3.1.1): family copay sum is capped at 4% of
# monthly countable income. When the rate-sheet copays exceed the cap, the
# state covers the gap (cap_savings added to subsidy).

- name: Case 1, LI single mother, 1 toddler, full-time, Statewide.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 28
        weekly_hours_worked: 35
        # 90,280 * 0.68 * 0.50 = $30,695 (50% SMI -> GT_40_LE_60 tier)
        employment_income: 30_695
        immigration_status: CITIZEN
      person2:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 22
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 20_000
    households:
      household:
        members: [person1, person2]
        state_code: AR
        county_str: PULASKI_COUNTY_AR
  output:
    is_ar_sra_eligible: true
    # Toddler FT GT_40_LE_60, Statewide:
    #   daily_state_payment = $28, monthly = $616 (uncapped subsidy at cap)
    #   monthly_copay = $7 * 22 = $154
    #   monthly countable income = $30,695 / 12 = $2,557.92
    #   4% cap = $102.32 -> cap_savings = $154 - $102.32 = $51.68
    #   ar_sra = $616 + $51.68 = $667.68
    ar_sra: 667.68

