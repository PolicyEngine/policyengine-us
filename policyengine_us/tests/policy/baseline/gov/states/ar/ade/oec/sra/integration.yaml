    households:
      household:
        members: [person1, person2, person3]
        state_code: AR
        county_str: BENTON_COUNTY_AR
  output:
    is_ar_sra_eligible: true
    # Infant, Benton/Washington, FT, GT_60:
    #   base = $38, share = 0.70, daily state payment = $26.60
    #   monthly state payment = 26.60 * 22 = $585.20
    ar_sra: 585.20

