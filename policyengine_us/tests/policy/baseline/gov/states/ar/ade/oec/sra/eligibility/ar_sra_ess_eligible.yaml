- name: Case 9, a working teen does not satisfy the activity threshold when no adult does.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 10
      person2:
        age: 16
        is_tax_unit_dependent: true
        weekly_hours_worked: 30
      person3:
        age: 2
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        ar_was_tea_recipient: true
        ar_months_since_tea_exit: 6
        ar_tea: 0
    households:
      household:
        members: [person1, person2, person3]
        state_code: AR
  output:
    # Teen's 30 hours is masked out; adult max = 10 hr, below Year-1 threshold (20)
    is_ar_sra_ess_eligible: false

