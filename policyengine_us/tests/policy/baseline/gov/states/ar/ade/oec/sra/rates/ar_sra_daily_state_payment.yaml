# Daily state payment per child = daily_base_rate * state_share.
#
# Arkansas SMI (2025-10-01, FFY 2026, 4-person): $90,280/year
# 2-person SPM: SMI = $61,390.40 annual

- name: Case 1, Toddler Statewide FT at LE_40 SMI pays full base rate (no-copay).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 28
        # 30% SMI -> LE_40 tier
        employment_income: 18_417
        immigration_status: CITIZEN
      person2:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AR
        county_str: PULASKI_COUNTY_AR
  output:
    # Statewide / Toddler / REGULAR / FT base = $35.00; share = 1.00
    # daily state payment = $35.00 * 1.00 = $35.00
    ar_sra_daily_state_payment: [0, 35.00]

