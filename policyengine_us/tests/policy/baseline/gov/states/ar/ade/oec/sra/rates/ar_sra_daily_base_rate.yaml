# Daily base rates from rates/base_rate.yaml lookup
# Keyed by (zone, age_category, care_type, time_category).
# Care type defaults to REGULAR; verified by parameter breakdown.
#
# Selected verified values for testing (Nov 1, 2025 rate sheet):
#   STATEWIDE / INFANT / REGULAR / FT   = $36.00
#   STATEWIDE / TODDLER / REGULAR / FT  = $35.00
#   STATEWIDE / PRESCHOOL / REGULAR / FT = $33.00
#   STATEWIDE / SCHOOL_AGED / REGULAR / FT = $28.00
#   BENTON_WASHINGTON / INFANT / REGULAR / FT = $38.00
#   BENTON_WASHINGTON / TODDLER / REGULAR / FT = $37.00
#   STATEWIDE / INFANT / REGULAR / PT = $18.00
#   BENTON_WASHINGTON / INFANT / REGULAR / PT = $19.00

- name: Case 1, Statewide infant full time base rate is 36.00.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0
        childcare_hours_per_week: 40
    households:
      household:
        members: [person1]
        county_str: PULASKI_COUNTY_AR
        state_code: AR
  output:
    ar_sra_daily_base_rate: 36.00

