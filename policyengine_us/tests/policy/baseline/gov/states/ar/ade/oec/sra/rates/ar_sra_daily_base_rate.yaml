- name: Case 14, Statewide infant Night/Weekend with part-time hours uses the PT Night/Weekend rate (19.80 = PT REGULAR 18 x 1.10).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 0
        childcare_hours_per_day: 4
        ar_sra_care_type: NIGHT_WEEKEND
    households:
      household:
        members: [person1]
        county_str: PULASKI_COUNTY_AR
        state_code: AR
  output:
    # Per OEC Oct 7 2025 Provider Call ("Weekend and night time rates are set
    # at a standard 10% increase of typical rates"), PT Night/Weekend
    # = PT REGULAR x 1.10 = 18 x 1.10 = 19.80.
    ar_sra_daily_base_rate: 19.80

