- name: Arkansas active-duty military service pay excluded from gross income
  period: 2024
  input:
    people:
      person1:
        irs_employment_income: 50_000
        military_service_income: 10_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AR
  output:
    ar_gross_income_indiv: 50_000
