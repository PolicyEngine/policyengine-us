- name: Case 1, reduction equals the property tax on the exempt share of value.
  period: 2025
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 200_000
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_homestead_property_tax_reduction: 500

- name: Case 2, reduction cannot exceed property taxes.
  period: 2025
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 40_000
        real_estate_taxes: 800
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_homestead_property_tax_reduction: 800

- name: Case 3, ineligible filer gets no reduction.
  period: 2025
  input:
    people:
      person1:
        age: 64
        assessed_property_value: 200_000
        real_estate_taxes: 2_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_homestead_property_tax_reduction: 0
