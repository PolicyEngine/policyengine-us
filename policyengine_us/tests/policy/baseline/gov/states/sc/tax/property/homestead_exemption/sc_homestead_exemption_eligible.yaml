- name: Case 1, senior homeowner is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_homestead_exemption_eligible: true

- name: Case 2, disabled homeowner under age 65 is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_homestead_exemption_eligible: true

- name: Case 3, blind homeowner under age 65 is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 40
        is_blind: true
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_homestead_exemption_eligible: true

- name: Case 4, non-senior homeowner without disability or blindness is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 64
        assessed_property_value: 200_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_homestead_exemption_eligible: false

- name: Case 5, senior without assessed property is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 65
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_homestead_exemption_eligible: false
