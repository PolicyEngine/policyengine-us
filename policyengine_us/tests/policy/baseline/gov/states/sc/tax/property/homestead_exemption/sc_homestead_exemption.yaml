- name: Case 1, exemption is capped at the statutory amount.
  period: 2025
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 8_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_homestead_exemption: 2_000

- name: Case 2, exemption is limited to assessed property value.
  period: 2025
  input:
    people:
      person1:
        age: 65
        assessed_property_value: 1_600
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_homestead_exemption: 1_600
