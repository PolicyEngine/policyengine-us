        filing_status: HEAD_OF_HOUSEHOLD
    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    # AGI $55k < phase-out start $60k, full SCIAD
    sc_sciad: 22_500

- name: SCIAD is zero before 2026
  period: 2025
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        employment_income: 35_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    # SCIAD doesn't exist before 2026
    sc_sciad: 0

# Tax Rate Tests

- name: Tax at 1.99% rate for income under $30k (2026)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 20_000
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    # AGI $20k < SCIAD $15k phase-out, so SCIAD = $15k (below $40k AGI)
    # Actually AGI $20k means full SCIAD of $15k
    # SC taxable income = $20k - $15k = $5k
    # Tax = $5k * 1.99% = $99.50
    sc_income_tax_before_non_refundable_credits: 99.5

- name: Tax calculation with new rates above $30k threshold (2026)
  period: 2026
  absolute_error_margin: 1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        employment_income: 100_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    # AGI $100k, SCIAD $0 (fully phased out)
    # Taxable income = $100k
    # Tax = $30k * 1.99% + $70k * 5.21% = $597 + $3,647 = $4,244
    sc_income_tax_before_non_refundable_credits: 4_244

# Taxable Income Tests

- name: SC taxable income starts from AGI in 2026
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        employment_income: 50_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    # AGI $50k, SCIAD phased out partially
    # Excess = $50k - $40k = $10k
    # Phase-out fraction = $10k / $55k = 0.18182
    # Reduction = $15,000 * 0.18182 = $2,727.27, rounded to $2,720
    # SCIAD = $15,000 - $2,720 = $12,280
    # But wait - formula is: reduction = base * fraction, then round DOWN to $10
    # reduction = $15,000 * 0.18182 = $2,727.27 -> floor($2,727.27/10)*10 = $2,720
    # SCIAD = max(0, $15,000 - $2,720) = $12,280
    sc_sciad: 12_280

- name: Zero income results in zero tax (2026)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        employment_income: 0
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_sciad: 15_000
    sc_taxable_income: 0
    sc_income_tax_before_non_refundable_credits: 0

- name: Non-SC resident gets zero for SC variables
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        employment_income: 50_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: NY
  output:
    sc_sciad: 0
    sc_eitc: 0
    sc_taxable_income: 0
    sc_income_tax_before_non_refundable_credits: 0
