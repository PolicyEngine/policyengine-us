    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    # Pre-2024: no FPL exemption, all families pay at least $6/wk.
    # SMI for FS 2 (SC, 2023-10-01): 89,725 * 0.68 = 61,013/yr = 5,084/mo
