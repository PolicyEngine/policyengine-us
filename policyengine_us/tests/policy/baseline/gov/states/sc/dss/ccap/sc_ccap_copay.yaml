# SC CCAP copay tests
# sc_ccap_copay is SPMUnit, MONTH (total monthly copay for the unit)
#
# Fee Scale 2025-2026, family size 4 (monthly income brackets):
#   $0 - $4,019 -> $0/wk
#   $4,020 - $4,668 -> $6/wk
#   $4,669 - $5,317 -> $11/wk
#   $5,318 - $5,966 -> $14/wk
#   $5,967 - $6,615 -> $17/wk
#   $6,616 - $7,263 -> $20/wk
#
# 2025 FPG family of 4: 15,650 + 5,500 * 3 = 32,150
# 150% FPG family of 4: 32,150 * 1.50 = 48,225/yr = 4,018.75/mo

- name: Case 1, family size 4 in zero copay tier.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000
      person2:
        age: 28
      person3:
        age: 5
        is_tax_unit_dependent: true
      person4:
        age: 3
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: SC
  output:
    # Monthly income = 36,000 / 12 = 3,000 < 4,020 -> $0/wk tier
    # $0/wk * 2 eligible children * (52/12) = $0/mo
    sc_ccap_copay: 0

- name: Case 2, family size 4 in $6 copay tier.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 50_400
      person2:
        age: 28
      person3:
        age: 5
        is_tax_unit_dependent: true
        childcare_hours_per_week: 30
      person4:
        age: 3
        is_tax_unit_dependent: true
        childcare_hours_per_week: 30
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        tanf: 0
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: SC
  output:
    # Monthly income = 50,400 / 12 = 4,200
    # 4,020 <= 4,200 <= 4,668 -> $6/wk per child
    # $6/wk * 2 children in care * (52/12) = $52.00/mo
    sc_ccap_copay: 52

