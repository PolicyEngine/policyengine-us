# SC CCAP geography tests
# sc_ccap_geography is Household (enum: URBAN, RURAL)
# Based on county mapping to Appendix 4 designations

- name: Case 1, Richland County is urban.
  period: 2025
  input:
    people:
      person1:
        age: 5
    households:
      household:
        members: [person1]
        state_code: SC
        county_fips: "45079"
  output:
    sc_ccap_geography: [URBAN]

