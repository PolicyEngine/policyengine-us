# SC CCAP age group tests
# sc_ccap_age_group is Person (enum)

- name: Case 1, infant under 1.
  period: 2025
  input:
    people:
      person1:
        age: 0
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_ccap_age_group: [UNDER_1]

- name: Case 2, toddler age 1.
  period: 2025
  input:
    people:
      person1:
        age: 1
    households:
      household:
        members: [person1]
        state_code: SC
  output:
