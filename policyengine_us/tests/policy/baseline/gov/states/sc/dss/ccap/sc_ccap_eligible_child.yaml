# SC CCAP eligible child tests

- name: Case 1, eligible child under 13.
  period: 2025
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    sc_ccap_eligible_child: [false, true]

