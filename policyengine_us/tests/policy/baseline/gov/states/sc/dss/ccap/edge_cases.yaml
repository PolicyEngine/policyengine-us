        sc_ccap_quality_level: C
      person3:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
      person4:
        age: 8
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        spm_unit_pre_subsidy_childcare_expenses: 30_000
        tanf: 0
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: SC
  output:
    # Family size 4, monthly income = 53,772 / 12 = $4,481
    # Fee scale family_size_4: $4,020-$4,668 -> $6/wk per child
    # 2% cap: 4,481 * 0.02 * 12 / 52 = $20.68/wk
    # min(6, 20.68) = $6/wk per child -> cap does not bind
    # $6/wk * 3 eligible children * (52/12) = $78.00/mo
    # Annual copay (MONTH var at YEAR period) = $78 * 12 = $936
    sc_ccap_copay: 936
    sc_ccap_eligible: true

