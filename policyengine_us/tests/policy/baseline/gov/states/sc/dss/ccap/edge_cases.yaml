# SC CCAP Edge Case Tests
# Tests boundary conditions for income, copay, age, hours, rates, surcharges.
#
# 2025 Key Values:
#   SC SMI base (4-person, 2024-10-01): $98,172
#   SMI adj: first=0.52, 2nd-6th=+0.16, 7th+=+0.03
#   85% SMI size 2: 98,172 * 0.68 * 0.85 = $56,743.416
#   Fee scale family_size_2 thresholds (monthly):
#     $0 -> $0, $2,645 -> $6, $3,104 -> $11,
#     $3,563 -> $14, $4,022 -> $17, $4,481 -> $20
#   Activity hours: >= 15 hrs/wk
#   Time category: < 25 hrs = HT, >= 25 hrs = FT
#   CCDF age limit: age < 13
#
# Note: sc_ccap_copay is entity=SPMUnit, definition_period=MONTH.
# The copay formula returns total monthly copay for the SPM unit.

# ============================================================
# INCOME THRESHOLD EDGE CASES
# ============================================================

- name: Case 1, income exactly at 85 percent SMI threshold.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 56_743
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
        tanf: 0
    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    # 85% SMI size 2 = 98,172 * 0.68 * 0.85 = 56,743.416
    # Monthly countable = 56,743 / 12 = 4,728.583
    # Monthly 85% SMI = 66,756.96 / 12 * 0.85 = 4,728.618
    # 4,728.583 <= 4,728.618 -> eligible (just barely)
    sc_ccap_income_eligible: true
    sc_ccap_eligible: true

- name: Case 2, income one dollar above 85 percent SMI threshold.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 56_744
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    # Monthly countable = 56,744 / 12 = 4,728.667
    # Monthly 85% SMI = 4,728.618
    # 4,728.667 > 4,728.618 -> ineligible
    sc_ccap_income_eligible: false
    sc_ccap_eligible: false
    sc_ccap: 0

- name: Case 3, zero income family.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 25
        employment_income: 0
        immigration_status: CITIZEN
        is_full_time_student: true
      person2:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 8_000
    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    # Zero income -> income eligible, $0 copay, student -> activity eligible
    # Center C Rural (default) FT Age 2 = $130/wk
    # Annual max = $130 * 52 = $6,760
    # Benefit = min(8,000 - 0, 6,760) = 6,760
    sc_ccap_income_eligible: true
    sc_ccap_eligible: true
    sc_ccap: 6_760

# ============================================================
# COPAY BRACKET BOUNDARY EDGE CASES
# ============================================================

- name: Case 4, income at first copay bracket boundary family size 2.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # Monthly income exactly at $2,645 (first non-zero tier)
        employment_income: 31_740
        immigration_status: CITIZEN
        weekly_hours_worked: 20
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
        tanf: 0
    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    # Monthly income = 31,740 / 12 = $2,645 -> $6/wk per child
    # $6/wk * 1 eligible child * (52/12) = $26.00/mo
    # Annual copay (MONTH var at YEAR period) = $26 * 12 = $312
    # Center C Rural FT Age 3 = $127/wk
    # Monthly max rate = $127 * 52 / 12 = $550.33
    # Monthly expenses = $12,000 / 12 = $1,000
    # Monthly uncapped = max(1,000 - 26, 0) = $974
    # Monthly benefit = min(974, 550.33) = $550.33
    # Annual benefit = $550.33 * 12 = $6,604
    sc_ccap_copay: 312
    sc_ccap_eligible: true
    sc_ccap: 6_604

