    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    # Monthly income = 31,728 / 12 = $2,644.00
    # Family size 2: below $2,645 threshold -> $0/wk
    sc_ccap_copay: 0
    sc_ccap_eligible: true

- name: Case 6, income at highest copay bracket family size 2.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # Monthly income $4,481 -> highest tier = $20/wk
        employment_income: 53_772
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
        tanf: 0
    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    # Family size 2: $4,481+ -> $20/wk per child
    # 2% cap: 4,481 * 0.02 * 12 / 52 = $20.68/wk -> $20 < $20.68 -> fee applies
    # $20/wk * 1 eligible child * (52/12) = $86.67/mo
    # Annual copay (MONTH var at YEAR period) = $86.67 * 12 = $1,040
    sc_ccap_copay: 1_040
    sc_ccap_eligible: true

