# SC CCAP benefit tests
# sc_ccap is SPMUnit, MONTH
# Annual benefit = sum over 12 months of per-child monthly benefits

- name: Case 1, basic benefit calculation.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
        tanf: 0
    households:
      household:
        members: [person1, person2]
        state_code: SC
        sc_ccap_geography: URBAN
  output:
    # Family size 2, income 36,000/yr = 3,000/mo
    # 85% SMI family size 2 = $56,743/yr -> eligible
    # Monthly income $3,000 >= $2,645 -> $6/wk copay tier
    # Monthly copay = $6 * 1 child * (52/12) = $26.00
    # Max weekly rate: Center C Urban FT Age 3 = $195/wk
    # Monthly max = $195 * 52 / 12 = $845
    # Monthly expenses = $10,000 / 12 = $833.33
    # Uncapped = max(833.33 - 26, 0) = $807.33
    # Monthly benefit = min(807.33, 845) = $807.33
    # Annual benefit = $807.33 * 12 = $9,688
    sc_ccap: 9_688

- name: Case 2, ineligible family gets zero.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 90_000
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: SC
        sc_ccap_geography: URBAN
  output:
    # Family size 2, 85% SMI = $56,743/yr
    # 90,000 > 56,743 -> ineligible -> $0
    sc_ccap: 0

- name: Case 3, benefit capped at max rate.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000
        immigration_status: CITIZEN
        weekly_hours_worked: 30
      person2:
        age: 8
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 20
        sc_ccap_provider_type: FFN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 5_000
    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    # Family size 2, 36,000/yr = 3,000/mo -> $0 copay
    # FFN, HT, school age = $24/wk
    # Annual max = $24 * 52 = $1,248
    # Uncapped benefit = max(5,000 - 0, 0) = 5,000
    # Annual benefit = min(5,000, 1,248) = 1,248
    sc_ccap: 1_248
