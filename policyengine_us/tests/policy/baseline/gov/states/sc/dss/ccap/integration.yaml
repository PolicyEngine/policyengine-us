    sc_ccap_income_eligible: true
    sc_ccap_eligible: true

    # === Copay ===
    # Monthly income = 30,000 / 12 = 2,500
    # Family size 2: $0-$2,644 -> $0/wk
    # 2,500 < 2,645 -> $0 tier
    sc_ccap_copay: 0

