    # === Benefit ===
    # Annual max = $50 * 52 = $2,600
    # Uncapped benefit = max(5,000 - 0, 0) = 5,000
    # Annual benefit = min(5,000, 2,600) = 2,600
    sc_ccap: 2_600

- name: Case 5, special needs child with surcharge.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 40_000
        immigration_status: CITIZEN
        weekly_hours_worked: 35
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        is_disabled: true
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
        tanf: 0
    households:
      household:
        members: [person1, person2]
        state_code: SC
        sc_ccap_geography: URBAN
  output:
    # === Eligibility ===
    # Disabled child age 5 < 19 -> eligible
    sc_ccap_eligible_child: [false, true]

    # Family size 2, income 40,000 <= 56,743 -> eligible
    sc_ccap_income_eligible: true
    sc_ccap_eligible: true

    # === Copay ===
    # Disabled child in family -> exempt from copay ($0)
    sc_ccap_copay: 0

    # === Provider rates ===
    # person1 (adult, 0 hrs): HT; person2 (child, 30 hrs): FT
    sc_ccap_time_category: [HALF_TIME, FULL_TIME]

    # === Benefit (MONTH formula, YEAR test period) ===
    # Age 5 defaults in-school (is_in_k12_school True for ages 5-17)
    # Center C, Urban, FT, Age 5-12 in school = $165 + $20 surcharge = $185/wk
    # Monthly max rate = $185 * 52 / 12 = $801.67
    # Monthly expenses = $12,000 / 12 = $1,000
    # Monthly uncapped = max(1,000 - 0, 0) = $1,000
    # Monthly benefit = min(1,000, 801.67) = $801.67
    # Annual benefit = $801.67 * 12 = $9,620
    sc_ccap: 9_620

