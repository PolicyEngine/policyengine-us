# SC CCAP countable income tests
# Countable income uses sources.yaml pattern — sums listed income variables
# sc_ccap_countable_income is SPMUnit, MONTH

- name: Case 1, employment income included.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 40_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_ccap_countable_income: 40_000

- name: Case 2, SSI excluded from countable income.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000
        ssi: 10_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    # SSI is excluded per Policy Manual 2.1.15
    # Only employment_income counts
    sc_ccap_countable_income: 30_000

- name: Case 3, multiple included income sources.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 25_000
        self_employment_income: 10_000
        social_security: 5_000
        child_support_received: 3_600
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    # 25,000 + 10,000 + 5,000 + 3,600 = 43,600
    sc_ccap_countable_income: 43_600

- name: Case 4, two person household income summed.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 30_000
      person2:
        age: 33
        employment_income: 20_000
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    # 30,000 + 20,000 = 50,000
    sc_ccap_countable_income: 50_000

- name: Case 5, zero income family.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    sc_ccap_countable_income: 0

- name: Case 6, SNAP excluded from countable income.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
    spm_units:
      spm_unit:
        members: [person1]
        snap: 3_600
    households:
      household:
        members: [person1]
        state_code: SC
  output:
    # SNAP is excluded per Policy Manual 2.1.15
    sc_ccap_countable_income: 20_000
