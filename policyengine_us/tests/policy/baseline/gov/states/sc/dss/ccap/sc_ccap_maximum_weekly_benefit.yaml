        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SC
        sc_ccap_geography: URBAN
  output:
    # child_index 1 (youngest and only) -> no discount despite rate being set
    # Base rate: Center C, Urban, FT, Age 3 = $195
    sc_ccap_maximum_weekly_benefit: [0, 195]

- name: Case 12, no discount when provider does not offer one.
