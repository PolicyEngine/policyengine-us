        members: [person1, person2, person3]
        state_code: SC
        sc_ccap_geography: URBAN
  output:
    # No sc_ccap_second_child_discount_rate set -> defaults to 0 -> no discount
    # person2 (age 3): Center C, Urban, FT, Age 3 = $195
    # person3 (age 0): Center C, Urban, FT, Under 1 = $213
    sc_ccap_maximum_weekly_benefit: [0, 195, 213]

- name: Case 13, three children with discount on oldest two.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
        sc_ccap_second_child_discount_rate: 0.15
      person3:
        age: 2
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
        sc_ccap_second_child_discount_rate: 0.15
      person4:
        age: 0
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
        sc_ccap_second_child_discount_rate: 0.15
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: SC
        sc_ccap_geography: URBAN
  output:
    # person2 (age 4) = child_index 3 -> discount: $191 * (1 - 0.15) = $162.35
    # person3 (age 2) = child_index 2 -> discount: $205 * (1 - 0.15) = $174.25
    # person4 (age 0) = child_index 1 (youngest) -> no discount: $213
    sc_ccap_maximum_weekly_benefit: [0, 162.35, 174.25, 213]
