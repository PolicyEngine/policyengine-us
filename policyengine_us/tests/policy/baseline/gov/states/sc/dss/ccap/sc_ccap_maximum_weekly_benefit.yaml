# SC CCAP maximum weekly benefit tests
# sc_ccap_maximum_weekly_benefit is Person, MONTH
# Sample rates from Maximum Payments FFY2023:
#   Level C Center, Urban, FT: Under 1=$213, Age 3=$195, 5-12 in school=$165
#   FFN (any location, FT): Under 1-2=$50, Age 3-12=$46
#   FFN HT: Under 3=$30, School age=$24
# Special needs surcharge: $20/wk
# Foster care surcharge: $30/wk

- name: Case 1, level C center urban full time infant.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 30
      person2:
        age: 0
        is_tax_unit_dependent: true
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SC
        sc_ccap_geography: URBAN
  output:
    # Center, Level C, Urban, FT, Under 1 = $213/wk
    sc_ccap_maximum_weekly_benefit: [0, 213]

