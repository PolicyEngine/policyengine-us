# Second child discount tests
# Per Policy Manual 5.11, the discount is provider-determined and applies
# to all children except the youngest.

- name: Case 10, second child discount with two children.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
        sc_ccap_second_child_discount_rate: 0.10
      person3:
        age: 0
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
        sc_ccap_second_child_discount_rate: 0.10
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: SC
        sc_ccap_geography: URBAN
  output:
    # person2 (age 3) = child_index 2 (older) -> discount applies
    # Base rate: Center C, Urban, FT, Age 3 = $195
    # Discounted: $195 * (1 - 0.10) = $175.50
    # person3 (age 0) = child_index 1 (youngest) -> no discount
    # Base rate: Center C, Urban, FT, Under 1 = $213
    sc_ccap_maximum_weekly_benefit: [0, 175.50, 213]

- name: Case 11, no discount when only one child.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3
        childcare_hours_per_week: 30
        sc_ccap_provider_type: CENTER
        sc_ccap_quality_level: C
        sc_ccap_second_child_discount_rate: 0.10
    tax_units:
