# Oklahoma Child Care/Child Tax Credit Tests
# Per Form 511 instructions ("20% of the credit for child care expenses
# allowed by the IRC") and Schedule 511-F worksheet.
# Credit = GREATER of:
#   - 5% of federal CTC
#   - 20% of the federal CDCC ALLOWED (cdcc, after the federal tax limit)
# AGI limit: $100,000 (MFJ)
# Prorated for part-year residents by OK AGI / Federal AGI ratio

- name: OK CTC/CDCC - 2021 - CDCC higher than CTC
  period: 2021
  input:
    adjusted_gross_income: 40_000
    ok_agi: 20_000
    cdcc: 2_000
    ok_federal_ctc: 3_000
    state_code: OK
  output:
    # 5% CTC: $3,000 * 0.05 = $150
    # 20% CDCC: $2,000 * 0.20 = $400
    # Greater is CDCC: $400
    # Part-year ratio: 20,000 / 40,000 = 0.5
    # Final credit: $400 * 0.5 = $200
    ok_child_care_child_tax_credit: 2_000 * 0.20 * (20_000 / 40_000)

# 2025 Child Care/Child Tax Credit Tests

- name: OK CTC/CDCC - 2025 - CTC higher than CDCC
  period: 2025
  input:
    adjusted_gross_income: 50_000
    ok_agi: 50_000
    cdcc: 500
    ok_federal_ctc: 4_000
    state_code: OK
  output:
    # 5% CTC: $4,000 * 0.05 = $200
    # 20% CDCC: $500 * 0.20 = $100
    # Greater is CTC: $200
    # Full-year resident (ratio = 1)
    ok_child_care_child_tax_credit: 200

- name: OK CTC/CDCC - 2025 - CDCC higher than CTC
  period: 2025
  input:
    adjusted_gross_income: 60_000
    ok_agi: 60_000
    cdcc: 3_000
    ok_federal_ctc: 2_000
    state_code: OK
  output:
    # 5% CTC: $2,000 * 0.05 = $100
    # 20% CDCC: $3,000 * 0.20 = $600
    # Greater is CDCC: $600
    ok_child_care_child_tax_credit: 600

- name: OK CTC/CDCC - 2025 - over $100k AGI limit
  period: 2025
  input:
    adjusted_gross_income: 120_000
    ok_agi: 120_000
    cdcc: 2_000
    ok_federal_ctc: 4_000
    state_code: OK
  output:
    # AGI $120,000 > $100,000 limit = no credit
    ok_child_care_child_tax_credit: 0

- name: OK CTC/CDCC - 2025 - exactly at $100k limit
  period: 2025
  input:
    adjusted_gross_income: 100_000
    ok_agi: 100_000
    cdcc: 1_500
    ok_federal_ctc: 3_000
    state_code: OK
  output:
    # AGI exactly at $100,000 limit = eligible
    # 5% CTC: $3,000 * 0.05 = $150
    # 20% CDCC: $1,500 * 0.20 = $300
    # Greater is CDCC: $300
    ok_child_care_child_tax_credit: 300

- name: OK CTC/CDCC - 2025 - no children (no credit)
  period: 2025
  input:
    adjusted_gross_income: 45_000
    ok_agi: 45_000
    cdcc: 0
    ok_federal_ctc: 0
    state_code: OK
  output:
    ok_child_care_child_tax_credit: 0

- name: OK CTC/CDCC - 2025 - part-year resident
  period: 2025
  input:
    adjusted_gross_income: 80_000
    ok_agi: 40_000
    cdcc: 2_000
    ok_federal_ctc: 4_000
    state_code: OK
  output:
    # 5% CTC: $4,000 * 0.05 = $200
    # 20% CDCC: $2,000 * 0.20 = $400
    # Greater is CDCC: $400
    # Part-year ratio: 40,000 / 80,000 = 0.5
    # Final credit: $400 * 0.5 = $200
    ok_child_care_child_tax_credit: 200

# Regression test for #8775/#8776: the OK credit must use the federal CDCC
# ALLOWED (cdcc), not the pre-tax-limit potential (cdcc_potential). Here the
# allowed credit (518.45) is far below the potential (1,680); using the
# potential would overstate the credit to $336 instead of the correct $197.
- name: OK CTC/CDCC - 2025 - uses allowed federal CDCC, not the potential
  period: 2025
  absolute_error_margin: 0.1
  input:
    adjusted_gross_income: 28_810
    ok_agi: 28_810
    cdcc: 518.45
    cdcc_potential: 1_680
    ok_federal_ctc: 3_946.43
    state_code: OK
  output:
    # 20% CDCC allowed: 518.45 * 0.20 = 103.69
    # 5% CTC: 3,946.43 * 0.05 = 197.32
    # Greater is CTC: 197.32 (would be 336 if it used cdcc_potential)
    ok_child_care_child_tax_credit: 197.32
    taxsim_ok_child_tax_credit_component: 197.32

- name: OK CTC includes federal non-refundable CTC used against unearned-income tax
  period: 2025
  absolute_error_margin: 1
  input:
    people:
      head:
        age: 40
        taxable_interest_income: 79_445
        real_estate_taxes: 30_000
        deductible_mortgage_interest: 20_000
        is_tax_unit_head: true
      child1:
        age: 11
        is_tax_unit_dependent: true
      child2:
        age: 2
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [head, child1, child2]
    marital_units:
      marital_unit:
        members: [head]
      child1_marital_unit:
        members: [child1]
      child2_marital_unit:
        members: [child2]
    families:
      family:
        members: [head, child1, child2]
    spm_units:
      spm_unit:
        members: [head, child1, child2]
    households:
      household:
        members: [head, child1, child2]
        state_code: OK
  output:
    ctc_value: 0
    ok_federal_ctc: 2_799
    ok_child_care_child_tax_credit: 140
    taxsim_ok_child_tax_credit_component: 140
