# Integration tests for Oklahoma Unemployment Insurance (OK UI).
# End-to-end scenarios checking ok_ui together with intermediate variables.
# References: 40 O.S. §§1-202, 1-218, 1-223, 1-231, 2-102, 2-104, 2-105, 2-106, 2-207;
# OESC Claimant Handbook OES-339 (Rev. 05-2025); OESC Important Numbers 2024/2025/2026.

- name: Case 1, eligible single claimant with mid-range wages in 2024.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 11_500
        ok_ui_base_period_taxable_wages: 11_500
        ok_ui_base_period_total_wages: 35_000
        ok_ui_gross_weekly_earnings: 0
        weeks_unemployed: 16
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # Test A: taxable $11,500 >= $1,500 (ok); total $35,000 >= 1.5 * $11,500 = $17,250 -> passes.
        ok_ui_meets_high_quarter_test: true
        ok_ui_monetarily_eligible: true
        # WBA: floor($11,500 / 23) = $500; within 2024 [$16, $519] -> $500.
        ok_ui_weekly_benefit_rate: 500
        # Earnings $0 -> full WBA paid.
        ok_ui_weekly_payable: 500
        # 2024 max_weeks = 16 (post-2023); MBA = $500 * 16 = $8,000.
        ok_ui_maximum_benefit_amount: 8_000
        # Annual: min($500 * 16, $8,000) = $8,000.
        ok_ui: 8_000

- name: Case 2, ineligible claimant - wages too low in 2024.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        ok_ui_high_quarter_taxable_wages: 5_000
        ok_ui_base_period_taxable_wages: 500
        ok_ui_base_period_total_wages: 5_000
        ok_ui_gross_weekly_earnings: 0
        weeks_unemployed: 12
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # Test A: taxable $500 < $1,500 -> fails.
        ok_ui_meets_high_quarter_test: false
        # Test B: total $5,000 < $27,400 (2024 wage base) -> fails.
        ok_ui_meets_alternate_wages_test: false
        ok_ui_monetarily_eligible: false
        # defined_for gate -> $0.
        ok_ui: 0

- name: Case 3, high earner in 2025 capped at $541 max WBA.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 45
        ok_ui_high_quarter_taxable_wages: 30_000
        ok_ui_base_period_taxable_wages: 30_000
        ok_ui_base_period_total_wages: 90_000
        ok_ui_gross_weekly_earnings: 0
        weeks_unemployed: 16
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # Test A: taxable $30,000 >= $1,500; total $90,000 >= 1.5 * $30,000 = $45,000 -> passes.
        ok_ui_monetarily_eligible: true
        # WBA: floor($30,000 / 23) = floor($1,304.35) = $1,304; clamped to $541 (2025 max).
        ok_ui_weekly_benefit_rate: 541
        ok_ui_weekly_payable: 541
        # MBA = $541 * 16 = $8,656.
        ok_ui_maximum_benefit_amount: 8_656
        # Annual: min($541 * 16, $8,656) = $8,656.
        ok_ui: 8_656

- name: Case 4, partial benefit week - claimant works part-time.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        # HQW $9,200 -> WBA = $400.
        ok_ui_high_quarter_taxable_wages: 9_200
        ok_ui_base_period_taxable_wages: 9_200
        ok_ui_base_period_total_wages: 30_000
        ok_ui_gross_weekly_earnings: 200
        weeks_unemployed: 10
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # Test A: taxable $9,200 >= $1,500; total $30,000 >= 1.5 * $9,200 = $13,800 -> passes.
        ok_ui_monetarily_eligible: true
        # WBA: floor($9,200 / 23) = $400; within 2025 [$16, $541] -> $400.
        ok_ui_weekly_benefit_rate: 400
        # Earnings offset: max(0, $200 - $100) = $100.
        # Partial: max(0, $400 - $100) = $300.
        ok_ui_weekly_payable: 300
        # MBA = $400 * 16 = $6,400.
        ok_ui_maximum_benefit_amount: 6_400
        # Annual: min($300 * 10, $6,400) = min($3,000, $6,400) = $3,000.
        ok_ui: 3_000

- name: Case 5, pre-2023 regime - 26-week max_weeks doubles MBA.
  period: 2022
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 38
        # HQW $6,900 -> WBA = $300.
        ok_ui_high_quarter_taxable_wages: 6_900
        ok_ui_base_period_taxable_wages: 6_900
        ok_ui_base_period_total_wages: 20_700
        ok_ui_gross_weekly_earnings: 0
        weeks_unemployed: 26
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # Test A: taxable $6,900 >= $1,500; total $20,700 >= 1.5 * $6,900 = $10,350 -> passes.
        ok_ui_monetarily_eligible: true
        # WBA: floor($6,900 / 23) = $300.
        ok_ui_weekly_benefit_rate: 300
        ok_ui_weekly_payable: 300
        # Pre-2023 max_weeks = 26; MBA = $300 * 26 = $7,800.
        ok_ui_maximum_benefit_amount: 7_800
        # Annual: min($300 * 26, $7,800) = $7,800.
        ok_ui: 7_800

- name: Case 6, Test B prong - low taxable but high total wages in 2025.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        ok_ui_high_quarter_taxable_wages: 20_000
        ok_ui_base_period_taxable_wages: 2_000
        ok_ui_base_period_total_wages: 28_500
        ok_ui_gross_weekly_earnings: 0
        weeks_unemployed: 16
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # Test A: taxable $2,000 >= $1,500 (ok); total $28,500 < 1.5 * $20,000 = $30,000 -> fails.
        ok_ui_meets_high_quarter_test: false
        # Test B: taxable $2,000 > $0 (ok); total $28,500 >= $28,200 (2025 wage base) -> passes.
        ok_ui_meets_alternate_wages_test: true
        ok_ui_monetarily_eligible: true
        # WBA: floor($20,000 / 23) = floor($869.57) = $869; clamped to $541 (2025 max).
        ok_ui_weekly_benefit_rate: 541
        ok_ui_weekly_payable: 541
        # MBA = $541 * 16 = $8,656.
        ok_ui_maximum_benefit_amount: 8_656
        # Annual: min($541 * 16, $8,656) = $8,656.
        ok_ui: 8_656

- name: Case 7, out-of-state claimant - state gate yields zero benefit.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 11_500
        ok_ui_base_period_taxable_wages: 11_500
        ok_ui_base_period_total_wages: 35_000
        ok_ui_gross_weekly_earnings: 0
        weeks_unemployed: 16
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    people:
      person1:
        # state_code TX != OK -> defined_for = StateCode.OK gate -> $0.
        # Note: intermediate variables (eligibility, WBA, etc.) may still
        # compute, but the top-level ok_ui is gated to OK households only.
        ok_ui: 0
