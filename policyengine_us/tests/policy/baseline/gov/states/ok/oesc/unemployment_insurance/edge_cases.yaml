# Edge case tests for Oklahoma Unemployment Insurance (OK UI).
# Boundary conditions for the monetary eligibility tests (§ 2-207),
# the WBA clamp (§ 2-104), the partial-benefit subtraction (§ 2-105),
# the MBA / max_weeks transition (§ 2-106, HB 1933), and the
# defined_for state gate.

# --- Test A boundary (§ 2-207(A)): taxable >= $1,500 AND total >= 1.5 * HQW ---

- name: Case 1, Test A taxable wages exactly at $1,500 threshold.
  period: 2024
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 1_000
        ok_ui_base_period_taxable_wages: 1_500
        ok_ui_base_period_total_wages: 1_500
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # Test A taxable prong: $1,500 >= $1,500 -> passes (>= operator).
        # Test A multiplier prong: $1,500 >= 1.5 * $1,000 = $1,500 -> passes (>=).
        # Test A: both prongs pass.
        ok_ui_meets_high_quarter_test: true
        # Test B: total $1,500 < $27,400 (2024 wage base) -> fails.
        ok_ui_meets_alternate_wages_test: false
        ok_ui_monetarily_eligible: true

- name: Case 2, Test A taxable wages one dollar below threshold.
  period: 2024
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 1_000
        ok_ui_base_period_taxable_wages: 1_499
        ok_ui_base_period_total_wages: 1_500
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # Test A taxable prong: $1,499 < $1,500 -> fails.
        ok_ui_meets_high_quarter_test: false
        # Test B: $1,499 > 0 but total $1,500 < $27,400 -> fails.
        ok_ui_meets_alternate_wages_test: false
        ok_ui_monetarily_eligible: false

- name: Case 3, Test A total wages exactly at 1.5x HQW boundary.
  period: 2024
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 10_000
        ok_ui_base_period_taxable_wages: 5_000
        ok_ui_base_period_total_wages: 15_000
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # Test A multiplier prong: $15,000 >= 1.5 * $10,000 = $15,000 -> passes (>= operator).
        # Test A taxable prong: $5,000 >= $1,500 -> passes.
        ok_ui_meets_high_quarter_test: true
        ok_ui_monetarily_eligible: true

- name: Case 4, Test A total wages one dollar below 1.5x HQW boundary.
  period: 2024
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 10_000
        ok_ui_base_period_taxable_wages: 5_000
        ok_ui_base_period_total_wages: 14_999
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # Test A multiplier prong: $14,999 < 1.5 * $10,000 = $15,000 -> fails.
        ok_ui_meets_high_quarter_test: false
        # Test B: total $14,999 < $27,400 -> fails.
        ok_ui_meets_alternate_wages_test: false
        ok_ui_monetarily_eligible: false

# --- Test B boundary (§ 2-207(B)): taxable > 0 AND total >= wage base ---

- name: Case 5, Test B total wages exactly at 2025 taxable wage base.
  period: 2025
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 20_000
        ok_ui_base_period_taxable_wages: 2_000
        ok_ui_base_period_total_wages: 28_200
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # Test A: $28,200 < 1.5 * $20,000 = $30,000 -> fails.
        ok_ui_meets_high_quarter_test: false
        # Test B: taxable $2,000 > $0 AND $28,200 >= $28,200 (2025 wage base) -> passes (>=).
        ok_ui_meets_alternate_wages_test: true
        ok_ui_monetarily_eligible: true

- name: Case 6, Test B total wages one dollar below 2025 taxable wage base.
  period: 2025
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 20_000
        ok_ui_base_period_taxable_wages: 2_000
        ok_ui_base_period_total_wages: 28_199
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # Test A: $28,199 < $30,000 -> fails.
        ok_ui_meets_high_quarter_test: false
        # Test B: $28,199 < $28,200 -> fails.
        ok_ui_meets_alternate_wages_test: false
        ok_ui_monetarily_eligible: false

# --- WBA clamp boundaries (§ 2-104(A): floor(HQW / 23), clamped to [$16, max]) ---

- name: Case 7, WBA below minimum - HQW $367 clamped up to $16 floor.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 367
        ok_ui_base_period_taxable_wages: 1_500
        ok_ui_base_period_total_wages: 2_250
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # floor($367 / 23) = floor($15.957) = $15 -> below $16 minimum -> clamped to $16.
        ok_ui_weekly_benefit_rate: 16

- name: Case 8, WBA exactly at minimum - HQW $368 yields $16.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 368
        ok_ui_base_period_taxable_wages: 1_500
        ok_ui_base_period_total_wages: 2_250
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # floor($368 / 23) = floor($16.0) = $16 -> exactly at minimum.
        ok_ui_weekly_benefit_rate: 16

- name: Case 9, WBA exactly at 2024 maximum - HQW $11,937 yields $519.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 11_937
        ok_ui_base_period_taxable_wages: 11_937
        ok_ui_base_period_total_wages: 30_000
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # 519 * 23 = $11,937 exactly; floor($11,937 / 23) = $519.
        # 2024 max is $519 -> no clamp needed, exactly at boundary.
        ok_ui_weekly_benefit_rate: 519

- name: Case 10, WBA still at 2024 max - HQW $11,938 yields $519.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 11_938
        ok_ui_base_period_taxable_wages: 11_938
        ok_ui_base_period_total_wages: 30_000
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # floor($11,938 / 23) = floor($519.043) = $519 -> at 2024 max, no clamp.
        ok_ui_weekly_benefit_rate: 519

- name: Case 11, WBA clamped down at 2024 max - HQW $11,960 yields $520 raw, clamped to $519.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 11_960
        ok_ui_base_period_taxable_wages: 11_960
        ok_ui_base_period_total_wages: 30_000
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # 520 * 23 = $11,960 exactly; floor($11,960 / 23) = $520.
        # $520 > $519 (2024 max) -> clamped down to $519.
        ok_ui_weekly_benefit_rate: 519

- name: Case 12, very high HQW clamped to 2025 max $541.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 100_000
        ok_ui_base_period_taxable_wages: 100_000
        ok_ui_base_period_total_wages: 300_000
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # floor($100,000 / 23) = floor($4,347.83) = $4,347 -> far above $541 (2025 max) -> clamped to $541.
        ok_ui_weekly_benefit_rate: 541

# --- Zero income / zero weeks ---

- name: Case 13, all wages zero - both tests fail, no benefit.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 0
        ok_ui_base_period_taxable_wages: 0
        ok_ui_base_period_total_wages: 0
        ok_ui_gross_weekly_earnings: 0
        weeks_unemployed: 16
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        # Test A: $0 < $1,500 -> fails. Test B: $0 not > 0 -> fails.
        ok_ui_monetarily_eligible: false
        # defined_for gate -> $0.
        ok_ui: 0

- name: Case 14, eligible but zero weeks unemployed - annual benefit zero.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 9_200
        ok_ui_base_period_taxable_wages: 9_200
        ok_ui_base_period_total_wages: 30_000
        ok_ui_gross_weekly_earnings: 0
        weeks_unemployed: 0
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        ok_ui_monetarily_eligible: true
        # WBA: floor($9,200 / 23) = $400.
        ok_ui_weekly_benefit_rate: 400
        # MBA = $400 * 16 = $6,400 (defined regardless of weeks worked).
        ok_ui_maximum_benefit_amount: 6_400
        # Annual: min($400 * 0, $6,400) = $0.
        ok_ui: 0

# --- Partial benefit edge cases (§ 2-105) ---

- name: Case 15, weekly earnings exactly at $100 disregard - full WBA paid.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 9_200
        ok_ui_base_period_taxable_wages: 9_200
        ok_ui_base_period_total_wages: 30_000
        ok_ui_gross_weekly_earnings: 100
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        ok_ui_weekly_benefit_rate: 400
        # earnings_reduction = max(0, $100 - $100) = $0; payable = max(0, $400 - 0) = $400.
        ok_ui_weekly_payable: 400

- name: Case 16, weekly earnings one dollar above disregard - WBA reduced by $1.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 9_200
        ok_ui_base_period_taxable_wages: 9_200
        ok_ui_base_period_total_wages: 30_000
        ok_ui_gross_weekly_earnings: 101
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        ok_ui_weekly_benefit_rate: 400
        # earnings_reduction = max(0, $101 - $100) = $1; payable = max(0, $400 - $1) = $399.
        ok_ui_weekly_payable: 399

- name: Case 17, weekly earnings exactly at WBA + disregard - payable zero.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 9_200
        ok_ui_base_period_taxable_wages: 9_200
        ok_ui_base_period_total_wages: 30_000
        ok_ui_gross_weekly_earnings: 500
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        ok_ui_weekly_benefit_rate: 400
        # earnings_reduction = max(0, $500 - $100) = $400; payable = max(0, $400 - $400) = $0.
        ok_ui_weekly_payable: 0

- name: Case 18, weekly earnings above WBA + disregard - payable floored at zero.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 9_200
        ok_ui_base_period_taxable_wages: 9_200
        ok_ui_base_period_total_wages: 30_000
        ok_ui_gross_weekly_earnings: 501
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        ok_ui_weekly_benefit_rate: 400
        # earnings_reduction = max(0, $501 - $100) = $401; raw payable = $400 - $401 = -$1 -> max(0, -1) = $0.
        ok_ui_weekly_payable: 0

# --- max_weeks transition (§ 2-106, HB 1933): 26 pre-2023, 16 from 2023-01-01 ---

- name: Case 19, year 2022 - pre-2023 max_weeks of 26.
  period: 2022
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        # HQW $6,900 -> floor($6,900 / 23) = $300.
        ok_ui_high_quarter_taxable_wages: 6_900
        ok_ui_base_period_taxable_wages: 6_900
        ok_ui_base_period_total_wages: 20_700
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        ok_ui_weekly_benefit_rate: 300
        # 2022 max_weeks = 26; MBA = $300 * 26 = $7,800.
        ok_ui_maximum_benefit_amount: 7_800

- name: Case 20, year 2024 - post-2023 max_weeks of 16.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        # Same HQW as Case 19 to isolate the max_weeks change.
        ok_ui_high_quarter_taxable_wages: 6_900
        ok_ui_base_period_taxable_wages: 6_900
        ok_ui_base_period_total_wages: 20_700
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        ok_ui_weekly_benefit_rate: 300
        # 2024 max_weeks = 16; MBA = $300 * 16 = $4,800.
        ok_ui_maximum_benefit_amount: 4_800

# --- State gate (defined_for = "ok_ui_monetarily_eligible" with StateCode.OK) ---

- name: Case 21, non-OK state with otherwise eligible inputs - benefit zeroed.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 11_500
        ok_ui_base_period_taxable_wages: 11_500
        ok_ui_base_period_total_wages: 35_000
        ok_ui_gross_weekly_earnings: 0
        weeks_unemployed: 16
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    people:
      person1:
        # state_code TX: StateCode.OK gate on upstream variables and the
        # ok_ui_monetarily_eligible defined_for cascade returns $0.
        ok_ui: 0

- name: Case 22, OK state with same inputs as Case 21 - benefit positive.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        ok_ui_high_quarter_taxable_wages: 11_500
        ok_ui_base_period_taxable_wages: 11_500
        ok_ui_base_period_total_wages: 35_000
        ok_ui_gross_weekly_earnings: 0
        weeks_unemployed: 16
    households:
      household:
        members: [person1]
        state_code: OK
  output:
    people:
      person1:
        ok_ui_monetarily_eligible: true
        # WBA: floor($11,500 / 23) = $500; within 2024 [$16, $519] -> $500.
        ok_ui_weekly_benefit_rate: 500
        # MBA = $500 * 16 = $8,000; annual = min($500 * 16, $8,000) = $8,000.
        ok_ui: 8_000
