- name: 2025 joint elderly couple, each gets half basic + own additional.
  period: 2025
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 65
        is_tax_unit_head: true
      person2:
        age: 71
        is_tax_unit_spouse: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: JOINT
    households:
      household:
        members: [person1, person2]
        state_code: IA
  output:
    # Each: $15,750 (half of JOINT basic) + $1,600 (elderly) = $17,350
    ia_standard_deduction_indiv: [17_350, 17_350]

