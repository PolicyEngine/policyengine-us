# ia_cca_exit_fee_level: SPMUnit, int index 0-3, MONTH (REQ-029).
# Selects the CCA Exit fee level (A=0 .. D=3) from monthly income and family size,
# using the basic thresholds for a basic-care family and the special-needs
# thresholds when the family includes a special-needs child.
# Family-of-3 exit basic thresholds: A 4_842, B 5_057, C 5_272, D 5_380.
# Family-of-3 exit special-needs thresholds: A 4_842, B 5_272, C 5_703, D 5_918.

- name: Low exit income lands at Level A index 0.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 57_600
      coparent:
        age: 30
      child:
        age: 4
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # Family of 3 basic; income 4_800/mo <= A (4_842) -> index 0
    # (This income alone is not in the exit tier; the index is still defined.)
    ia_cca_exit_fee_level: 0

- name: Exit income between A and B is Level B index 1.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 60_000
      coparent:
        age: 30
      child:
        age: 4
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # Income 5_000/mo: > A (4_842), <= B (5_057) -> index 1
    ia_cca_exit_fee_level: 1

- name: Exit income between C and D is Level D index 3.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 64_200
      coparent:
        age: 30
      child:
        age: 4
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # Income 5_350/mo: > A, > B, > C (5_272), <= D (5_380) -> index 3
    ia_cca_exit_fee_level: 3

- name: Special-needs family uses the higher special-needs thresholds.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 63_600
      coparent:
        age: 30
      child:
        age: 4
        is_disabled: true
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # Income 5_300/mo with a special-needs child uses SN thresholds:
    # > A (4_842), <= B (5_272)? 5_300 > 5_272 -> > B, <= C (5_703) -> index 2.
    # Under the basic thresholds the same income would be index 3 (> D 5_380? no,
    # > C 5_272 -> index 3). The SN table keeps it at index 2 -> proves SN routing.
    ia_cca_exit_fee_level: 2

# === Edge cases ===
# The exit-threshold tables also run by family size 1-13 with the formula clipping
# size to 13, so a unit of 14+ uses the size-13 column. Size-13 exit-basic
# thresholds: A 11_329, B 15_592.

- name: Exit fee family of thirteen uses the size-13 thresholds.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 40
        employment_income: 144_000
      c1: {age: 4}
      c2: {age: 4}
      c3: {age: 4}
      c4: {age: 4}
      c5: {age: 4}
      c6: {age: 4}
      c7: {age: 4}
      c8: {age: 4}
      c9: {age: 4}
      c10: {age: 4}
      c11: {age: 4}
      c12: {age: 4}
    spm_units:
      spm_unit:
        members: [parent, c1, c2, c3, c4, c5, c6, c7, c8, c9, c10, c11, c12]
    households:
      household:
        members: [parent, c1, c2, c3, c4, c5, c6, c7, c8, c9, c10, c11, c12]
        state_code: IA
  output:
    # Family of 13 basic; income 12_000/mo: > A (11_329), <= B (15_592) -> index 1
    ia_cca_exit_fee_level: 1

- name: Exit fee family of fourteen uses the size-13 column at the same level.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 40
        employment_income: 144_000
      c1: {age: 4}
      c2: {age: 4}
      c3: {age: 4}
      c4: {age: 4}
      c5: {age: 4}
      c6: {age: 4}
      c7: {age: 4}
      c8: {age: 4}
      c9: {age: 4}
      c10: {age: 4}
      c11: {age: 4}
      c12: {age: 4}
      c13: {age: 4}
    spm_units:
      spm_unit:
        members: [parent, c1, c2, c3, c4, c5, c6, c7, c8, c9, c10, c11, c12, c13]
    households:
      household:
        members: [parent, c1, c2, c3, c4, c5, c6, c7, c8, c9, c10, c11, c12, c13]
        state_code: IA
  output:
    # Family of 14 clips to size 13 -> same thresholds, same income -> index 1
    ia_cca_exit_fee_level: 1
