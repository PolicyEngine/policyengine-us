- name: Mixed basic and special-needs children pay different per-child exit percentages.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      parent:
        age: 30
        employment_income: 74_400
      coparent:
        age: 30
      basic_child:
        age: 8
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        pre_subsidy_childcare_expenses: 9_600
      sn_child:
        age: 4
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        pre_subsidy_childcare_expenses: 9_600
    tax_units:
      tax_unit:
        members: [parent, coparent, basic_child, sn_child]
    spm_units:
      spm_unit:
        members: [parent, coparent, basic_child, sn_child]
        ia_cca_enrolled: true
    households:
      household:
        members: [parent, coparent, basic_child, sn_child]
        state_code: IA
  output:
    # Family of 4; income 6_200/mo > 225% FPL (32_150/yr -> 6_028.13/mo)
    # -> exit tier. The basic child uses the family-4 basic table: >= B floor
    # (6_110), < C floor (6_370) -> Level B -> 45%. The SN child uses the
    # family-4 SN table: >= A floor (5_850), < B floor (6_370) -> Level A
    # -> 33%. Expenses 9_600/yr -> 800/mo each;
    # copay = 0.45 * 800 + 0.33 * 800 = 624
    ia_cca_copay: 624

# ===== Copay exemption for the no-income-test population =====

- name: Foster family pays no copay despite income in the fee range.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      parent:
        age: 30
        employment_income: 25_200
      child:
        age: 4
        is_in_foster_care: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
    tax_units:
      tax_unit:
        members: [parent, child]
    spm_units:
      spm_unit:
        members: [parent, child]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent, child]
        state_code: IA
  output:
    # Foster child -> income exception -> copay forced to 0 regardless of level
    ia_cca_copay: 0

- name: FIP-enrolled family pays no copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      parent:
        age: 30
        employment_income: 25_200
      child:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
    tax_units:
      tax_unit:
        members: [parent, child]
    spm_units:
      spm_unit:
        members: [parent, child]
        ia_cca_enrolled: false
        is_tanf_enrolled: true
    households:
      household:
        members: [parent, child]
        state_code: IA
  output:
    # FIP/TANF recipient -> income exception -> copay 0
    ia_cca_copay: 0

# ===== Edge cases =====

- name: No children in care produces a zero copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      parent:
        age: 30
        employment_income: 25_200
        is_tax_unit_head_or_spouse: true
      child:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 0
    tax_units:
      tax_unit:
        members: [parent, child]
    spm_units:
      spm_unit:
        members: [parent, child]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent, child]
        state_code: IA
  output:
    # Income lands at a non-zero sliding-fee level, but with no child in care the
    # focal_units max is 0, so the per-unit fee multiplies to 0 (degenerate; the
    # copay must not crash or produce a stray fee with nobody in care)
    ia_cca_copay: 0
