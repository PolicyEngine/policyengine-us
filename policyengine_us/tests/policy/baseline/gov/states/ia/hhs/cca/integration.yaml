# === Case 9: Non-Iowa household — defined_for zeroes the benefit ===
- name: Case 9, identical household outside Iowa receives no benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      parent:
        age: 28
        employment_income: 24_000
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
      preschooler:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        pre_subsidy_childcare_expenses: 900
        ia_cca_provider_type: LICENSED_CENTER
        ia_cca_quality_rating: NO_RATING
    tax_units:
      tax_unit:
        members: [parent, preschooler]
    spm_units:
      spm_unit:
        members: [parent, preschooler]
        ia_cca_enrolled: false
        spm_unit_assets: 5_000
    households:
      household:
        members: [parent, preschooler]
        state_code: NE
  output:
    # Nebraska household -> ia_cca defined_for StateCode.IA zeroes the benefit
    # and ia_cca_eligible is false.
    ia_cca_eligible: false
    ia_cca: 0

# === Edge cases ===

# === Case 10: Eligible child with zero care hours — eligible but no benefit ===
- name: Case 10, eligible child with zero care hours yields a zero benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
      child:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 0
        pre_subsidy_childcare_expenses: 12_000
        ia_cca_provider_type: LICENSED_CENTER
        ia_cca_quality_rating: NO_RATING
    tax_units:
      tax_unit:
        members: [parent, child]
    spm_units:
      spm_unit:
        members: [parent, child]
        ia_cca_enrolled: false
        spm_unit_assets: 5_000
    households:
      household:
        members: [parent, child]
        state_code: IA
  output:
    # The family is eligible (age/dependency/immigration), but the child is not in
    # care (0 hours) -> the per-child contribution is gated to $0 -> benefit 0.
    ia_cca_eligible: true
    ia_cca_children_in_care: 0
    ia_cca: 0

