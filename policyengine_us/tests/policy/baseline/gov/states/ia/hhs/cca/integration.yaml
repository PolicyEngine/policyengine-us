# === Case 12: Adult-only unit with no children — degenerate, no benefit ===
- name: Case 12, adult-only unit with no children receives no benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      parent:
        age: 30
        employment_income: 24_000
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [parent]
    spm_units:
      spm_unit:
        members: [parent]
        ia_cca_enrolled: false
        spm_unit_assets: 5_000
    households:
      household:
        members: [parent]
        state_code: IA
  output:
