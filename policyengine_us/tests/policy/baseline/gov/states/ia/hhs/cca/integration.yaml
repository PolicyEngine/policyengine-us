        age: 13
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        pre_subsidy_childcare_expenses: 600
        ia_cca_provider_type: LICENSED_CENTER
        ia_cca_quality_rating: NO_RATING
    tax_units:
      tax_unit:
        members: [parent, teen]
    spm_units:
      spm_unit:
        members: [parent, teen]
        ia_cca_enrolled: false
        spm_unit_assets: 5_000
    households:
      household:
