# ===== Table 5: In-Home provider (minimum wage), only with 3+ children in care =====

- name: In-home provider rate applies when three children are in care.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      parent:
        age: 30
      it:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        ia_cca_provider_type: IN_HOME
      pre:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        ia_cca_provider_type: IN_HOME
      sa:
        age: 8
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        ia_cca_provider_type: IN_HOME
    tax_units:
      tax_unit:
        members: [parent, it, pre, sa]
    spm_units:
      spm_unit:
        members: [parent, it, pre, sa]
    households:
      household:
        members: [parent, it, pre, sa]
        state_code: IA
  output:
    # 3 children in care -> in-home allowed; flat 36.25 per unit for all ages
    # (parent is not an eligible child -> max_rate not defined -> 0)
    ia_cca_max_rate: [0, 36.25, 36.25, 36.25]

- name: In-home provider rate is zero when fewer than three children are in care.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      parent:
        age: 30
      it:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        ia_cca_provider_type: IN_HOME
      pre:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        ia_cca_provider_type: IN_HOME
    tax_units:
      tax_unit:
        members: [parent, it, pre]
    spm_units:
      spm_unit:
        members: [parent, it, pre]
    households:
      household:
        members: [parent, it, pre]
        state_code: IA
  output:
    # Only 2 children in care -> in-home not allowed -> rate zeroed
    ia_cca_max_rate: [0, 0, 0]
