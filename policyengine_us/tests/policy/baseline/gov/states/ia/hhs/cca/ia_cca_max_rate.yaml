# ia_cca_max_rate: Person, USD per half-day unit, MONTH.
# Looks up the maximum half-day-unit rate by provider type x quality rating x
# age group (with the special-needs variant baked into the age-group enum). Only
# defined for an eligible child (defined_for = ia_cca_eligible_child), so each
# person here is an age-/dependency-/immigration-eligible child. In-home care is
# paid only when at least three children in the family need care, so the in-home
# cases use a family of three children in care; with fewer the rate is zeroed.
# Rates effective 2024-07-01 (IAC 441-170.4(7) Tables 1-5).

# ===== Table 1: Licensed Center (4 quality tiers x 3 age groups x Basic/SN) =====

- name: Licensed center, no rating, all age groups, basic and special needs.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      it:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ia_cca_provider_type: LICENSED_CENTER
        ia_cca_quality_rating: NO_RATING
      pre:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ia_cca_provider_type: LICENSED_CENTER
        ia_cca_quality_rating: NO_RATING
      sa:
        age: 8
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ia_cca_provider_type: LICENSED_CENTER
        ia_cca_quality_rating: NO_RATING
      it_sn:
        age: 1
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ia_cca_provider_type: LICENSED_CENTER
        ia_cca_quality_rating: NO_RATING
      pre_sn:
        age: 4
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ia_cca_provider_type: LICENSED_CENTER
        ia_cca_quality_rating: NO_RATING
      sa_sn:
        age: 8
        is_disabled: true
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ia_cca_provider_type: LICENSED_CENTER
        ia_cca_quality_rating: NO_RATING
    tax_units:
      tax_unit:
        members: [it, pre, sa, it_sn, pre_sn, sa_sn]
    households:
      household:
        members: [it, pre, sa, it_sn, pre_sn, sa_sn]
        state_code: IA
  output:
    # INFANT_TODDLER 25.66 / PRESCHOOL 19.50 / SCHOOL_AGE 16.50
    # SN: INFANT_TODDLER_SN 51.94 / PRESCHOOL_SN 30.43 / SCHOOL_AGE_SN 30.34
    ia_cca_max_rate: [25.66, 19.50, 16.50, 51.94, 30.43, 30.34]

