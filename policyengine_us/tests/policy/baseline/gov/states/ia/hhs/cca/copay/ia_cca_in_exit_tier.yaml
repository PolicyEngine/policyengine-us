# ia_cca_in_exit_tier: SPMUnit, bool, MONTH (dispatch).
# True when the family is enrolled AND monthly income exceeds the ongoing CCA Plus
# ceiling — the lesser of 225% FPL and 85% of Iowa median family income
# (IAC 441-170.2(1)"a"(2)). These families pay the percentage-of-cost CCA Exit fee
# rather than the sliding unit fee. The 85% MFI cap binds below 225% FPL only at
# very large family sizes (10+ with current parameters). 2025 family-of-3 225% FPL
# monthly = 4_996.88 (annual 59_962.50); 2025 family-of-10 figures: 85% SMI
# monthly = 11_582.00, 225% FPL monthly = 12_215.62.

- name: Enrolled family above 225 percent FPL is in the exit tier.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 60_000
      coparent:
        age: 30
      child:
        age: 4
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
        ia_cca_enrolled: true
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # Income 5_000/mo > 4_996.88 (225% FPL) and enrolled -> exit tier
    ia_cca_in_exit_tier: true

- name: Enrolled family below 225 percent FPL is not in the exit tier.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 57_600
      coparent:
        age: 30
      child:
        age: 4
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
        ia_cca_enrolled: true
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # Income 4_800/mo <= 4_996.88 (225% FPL) -> CCA Plus, not exit tier
    ia_cca_in_exit_tier: false

- name: Applicant above 225 percent FPL is not in the exit tier.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 60_000
      coparent:
        age: 30
      child:
        age: 4
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # Same income but not enrolled -> the exit tier requires enrollment -> false
    ia_cca_in_exit_tier: false

# === Edge cases ===
# The exit-tier dispatch turns on at exactly 225% FPL (family of 3; 225% annual =
# 59_962.50). We bracket the boundary +-12.50/yr; the exact round-trip is
# float-fragile so we do not assert at it.

- name: Enrolled family 12.50 dollars below 225 percent FPL is not in the exit tier.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 59_950
      coparent:
        age: 30
      child:
        age: 4
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
        ia_cca_enrolled: true
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # 59_950 (-$12.50/yr under 59_962.50) -> not over 225% FPL -> CCA Plus, not exit
    ia_cca_in_exit_tier: false

- name: Enrolled family 12.50 dollars above 225 percent FPL is in the exit tier.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 59_975
      coparent:
        age: 30
      child:
        age: 4
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
        ia_cca_enrolled: true
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # 59_975 (+$12.50/yr over 59_962.50) and enrolled -> exit tier
    ia_cca_in_exit_tier: true

- name: Large enrolled family between the 85 percent MFI cap and 225 percent FPL is in the exit tier.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 35
        employment_income: 141_600
      coparent:
        age: 35
      c1: {age: 6}
      c2: {age: 6}
      c3: {age: 6}
      c4: {age: 6}
      c5: {age: 6}
      c6: {age: 6}
      c7: {age: 6}
      c8: {age: 6}
    spm_units:
      spm_unit:
        members: [parent, coparent, c1, c2, c3, c4, c5, c6, c7, c8]
        ia_cca_enrolled: true
    households:
      household:
        members: [parent, coparent, c1, c2, c3, c4, c5, c6, c7, c8]
        state_code: IA
  output:
    # Family of 10; income 11_800/mo. The CCA Plus ceiling is
    # min(225% FPL 12_215.62, 85% MFI 11_582.00) = 11_582.00, so income
    # above the MFI cap moves the family into the exit tier even though it
    # is below 225% FPL.
    ia_cca_in_exit_tier: true

- name: Large enrolled family below the 85 percent MFI cap stays on the sliding fee.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 35
        employment_income: 138_000
      coparent:
        age: 35
      c1: {age: 6}
      c2: {age: 6}
      c3: {age: 6}
      c4: {age: 6}
      c5: {age: 6}
      c6: {age: 6}
      c7: {age: 6}
      c8: {age: 6}
    spm_units:
      spm_unit:
        members: [parent, coparent, c1, c2, c3, c4, c5, c6, c7, c8]
        ia_cca_enrolled: true
    households:
      household:
        members: [parent, coparent, c1, c2, c3, c4, c5, c6, c7, c8]
        state_code: IA
  output:
    # Family of 10; income 11_500/mo <= min(12_215.62, 11_582.00)
    # -> CCA Plus sliding fee, not exit tier
    ia_cca_in_exit_tier: false
