# ia_cca_in_exit_tier: SPMUnit, bool, MONTH (dispatch).
# True when the family is enrolled AND monthly income exceeds the ongoing CCA Plus
# limit (225% FPL). These families pay the percentage-of-cost CCA Exit fee rather
# than the sliding unit fee. 2025 family-of-3 225% FPL monthly = 4_996.88
# (annual 59_962.50).

- name: Enrolled family above 225 percent FPL is in the exit tier.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 60_000
      coparent:
        age: 30
      child:
        age: 4
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
        ia_cca_enrolled: true
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # Income 5_000/mo > 4_996.88 (225% FPL) and enrolled -> exit tier
    ia_cca_in_exit_tier: true

- name: Enrolled family below 225 percent FPL is not in the exit tier.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 57_600
      coparent:
        age: 30
      child:
        age: 4
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
        ia_cca_enrolled: true
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # Income 4_800/mo <= 4_996.88 (225% FPL) -> CCA Plus, not exit tier
    ia_cca_in_exit_tier: false

- name: Applicant above 225 percent FPL is not in the exit tier.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 60_000
      coparent:
        age: 30
      child:
        age: 4
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # Same income but not enrolled -> the exit tier requires enrollment -> false
    ia_cca_in_exit_tier: false

# === Edge cases ===
# The exit-tier dispatch turns on at exactly 225% FPL (family of 3; 225% annual =
# 59_962.50). We bracket the boundary +-12/yr; the exact round-trip is float-fragile
# so we do not assert at it.

- name: Enrolled family 12 dollars below 225 percent FPL is not in the exit tier.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 59_950
      coparent:
        age: 30
      child:
        age: 4
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
        ia_cca_enrolled: true
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # 59_950 (-$1/mo under 59_962.50) -> not over 225% FPL -> CCA Plus, not exit
    ia_cca_in_exit_tier: false

- name: Enrolled family 12 dollars above 225 percent FPL is in the exit tier.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 59_975
      coparent:
        age: 30
      child:
        age: 4
    spm_units:
      spm_unit:
        members: [parent, coparent, child]
        ia_cca_enrolled: true
    households:
      household:
        members: [parent, coparent, child]
        state_code: IA
  output:
    # 59_975 (+$1/mo over 59_962.50) and enrolled -> exit tier
    ia_cca_in_exit_tier: true
