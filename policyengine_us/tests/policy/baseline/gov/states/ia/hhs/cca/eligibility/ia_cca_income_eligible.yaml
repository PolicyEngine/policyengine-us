# === 85% MFI cap genuinely binds (only for very large families) ===
# The federal SMI household-size adjustment caps at 6 persons, so 85% MFI plateaus
# while 160% FPL keeps rising. The cap therefore binds only at family size 16+. A
# 20-person unit puts 85% MFI ($13,994.91/mo) below 160% FPL ($16,020/mo), so income
# in that window fails the initial test even though it is below 160% FPL. (The
# existing family-of-4 case above never reaches the cap because its income exceeds
# both limits; these two cases exercise the min(FPL, 85% MFI) selection directly.)

- name: Applicant large family between 85 percent MFI and 160 percent FPL is not eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 40
        employment_income: 180_000
      c1: {age: 4}
      c2: {age: 4}
      c3: {age: 4}
      c4: {age: 4}
      c5: {age: 4}
      c6: {age: 4}
      c7: {age: 4}
      c8: {age: 4}
      c9: {age: 4}
      c10: {age: 4}
      c11: {age: 4}
      c12: {age: 4}
      c13: {age: 4}
      c14: {age: 4}
      c15: {age: 4}
      c16: {age: 4}
      c17: {age: 4}
      c18: {age: 4}
      c19: {age: 4}
    spm_units:
      spm_unit:
        members: [parent, c1, c2, c3, c4, c5, c6, c7, c8, c9, c10, c11, c12, c13, c14, c15, c16, c17, c18, c19]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent, c1, c2, c3, c4, c5, c6, c7, c8, c9, c10, c11, c12, c13, c14, c15, c16, c17, c18, c19]
        state_code: IA
  output:
    # Family of 20; 15_000/mo income > 85% MFI (13_994.91/mo) but < 160% FPL
    # (16_020/mo). initial limit = min(160% FPL, 85% MFI) = 85% MFI -> ineligible.
    ia_cca_income_eligible: false

