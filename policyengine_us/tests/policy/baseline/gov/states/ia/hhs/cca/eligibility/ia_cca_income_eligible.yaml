# === 85% MFI cap binds for the initial limit on a higher-income family ===

- name: Applicant family above the 85 percent MFI cap is not eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent1:
        age: 40
        employment_income: 130_000
      parent2:
        age: 40
      child1:
        age: 2
      child2:
        age: 4
    spm_units:
      spm_unit:
        members: [parent1, parent2, child1, child2]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent1, parent2, child1, child2]
        state_code: IA
  output:
    # Family of 4; initial limit = min(160% FPL = 51_440, 85% MFI = 100_138).
    # 130_000 exceeds both -> ineligible. Confirms the min(FPL, 85% MFI) cap is
    # applied on the initial limit.
    ia_cca_income_eligible: false

# === Edge cases ===
# Boundary tests use the MODEL's own monthly FPG (printed above). The income test
# compares monthly countable income (annual employment_income / 12) to monthly FPG
# (auto-divided) * rate. At EXACTLY the boundary the float32 round-trip
# (annual -> /12 income vs annual FPG -> /12 limit) drifts by a few thousandths,
# and the drift direction is value-dependent, so we never assert at the exact
# boundary; we bracket it +-12/yr (= +-$1/mo) instead. The existing +-100/yr cases
# above are loose; these tighten the band to the smallest reliable offset.

- name: Applicant family of three 12 dollars below 160 percent FPL is eligible (tight boundary).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent1:
        age: 30
        employment_income: 42_628
      parent2:
        age: 30
      child:
        age: 2
    spm_units:
      spm_unit:
        members: [parent1, parent2, child]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent1, parent2, child]
        state_code: IA
  output:
    # 160% FPL annual = 42_640; 42_628 (-$1/mo) -> just below -> eligible
    ia_cca_income_eligible: true

- name: Applicant family of three 12 dollars above 160 percent FPL is not eligible (tight boundary).
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent1:
        age: 30
        employment_income: 42_652
      parent2:
        age: 30
      child:
        age: 2
    spm_units:
      spm_unit:
        members: [parent1, parent2, child]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent1, parent2, child]
        state_code: IA
  output:
    # 42_652 (+$1/mo over the 42_640 limit) -> just above -> ineligible
    ia_cca_income_eligible: false

- name: Applicant family of three with zero income is income eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent1:
        age: 30
        employment_income: 0
      parent2:
        age: 30
      child:
        age: 2
    spm_units:
      spm_unit:
        members: [parent1, parent2, child]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent1, parent2, child]
        state_code: IA
  output:
    # 0 income is below every limit -> eligible (degenerate low boundary)
    ia_cca_countable_income: 0
    ia_cca_income_eligible: true

- name: Applicant family with very high income is not eligible under any tier.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent1:
        age: 30
        employment_income: 500_000
      parent2:
        age: 30
      child:
        age: 2
    spm_units:
      spm_unit:
        members: [parent1, parent2, child]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent1, parent2, child]
        state_code: IA
  output:
    # 500_000/yr far exceeds the 160% FPL initial limit -> ineligible (degenerate
    # high boundary; even the enrolled 250% ceiling could not reach this income)
    ia_cca_income_eligible: false

