# ia_cca_income_eligible: SPMUnit, bool, MONTH.
# Three income tiers selected by the ia_cca_enrolled boolean input:
#   - Applicants (not enrolled): initial limit = 160% FPL basic / 200% FPL special-needs.
#   - Enrolled (ongoing): CCA Exit 250% FPL basic / 275% FPL special-needs.
# Each initial limit is capped at 85% of Iowa median family income when lower
# (smi_rate.yaml = 0.85); for the small families below the FPL limit always binds
# (85% MFI is far higher), so these cases test the FPL boundary directly.
# The comparison is MONTHLY: ia_cca_countable_income (employment_income / 12) is
# compared to spm_unit_fpg (auto-divided to monthly) * rate. Because both sides
# are divided by 12, an annual employment_income of (annual FPG * rate) lands
# exactly on the monthly limit, so the annual figures below equal the FPL band.
# 2025 FPG (CONTIGUOUS_US): first_person 15_650, additional_person 5_500.
#   Family of 2 FPG = 21_150; 160% = 33_840.
#   Family of 3 FPG = 26_650; 160% = 42_640; 200% = 53_300; 225% = 59_962.50;
#     250% = 66_625; 275% = 73_287.50.
# A family with a non-disabled child uses the basic limits; a family with a
# special-needs (disabled) child uses the special-needs limits. Only one parent
# earns, so countable income is that parent's employment income alone.

# === Tier 1: initial applicant, basic 160% FPL ===

- name: Applicant family of two above 160 percent FPL is not income eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        age: 30
        employment_income: 42_000
      child:
        age: 2
    spm_units:
      spm_unit:
        members: [parent, child]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent, child]
        state_code: IA
  output:
    # Family of 2; 160% FPL = 33_840 (annual basis); 42_000 > 33_840 -> ineligible
    ia_cca_income_eligible: false

- name: Applicant family of three below 160 percent FPL is income eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent1:
        age: 30
        employment_income: 42_000
      parent2:
        age: 30
      child:
        age: 2
    spm_units:
      spm_unit:
        members: [parent1, parent2, child]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent1, parent2, child]
        state_code: IA
  output:
    # Family of 3; 160% FPL = 42_640; 42_000 < 42_640 -> eligible
    ia_cca_income_eligible: true

- name: Applicant family of three just below 160 percent FPL is income eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent1:
        age: 30
        employment_income: 42_600
      parent2:
        age: 30
      child:
        age: 2
    spm_units:
      spm_unit:
        members: [parent1, parent2, child]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent1, parent2, child]
        state_code: IA
  output:
    # 42_600 < 42_640 (160% FPL) -> eligible (boundary, just below)
    ia_cca_income_eligible: true

- name: Applicant family of three just above 160 percent FPL is not income eligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent1:
        age: 30
        employment_income: 42_700
      parent2:
        age: 30
      child:
        age: 2
    spm_units:
      spm_unit:
        members: [parent1, parent2, child]
        ia_cca_enrolled: false
    households:
      household:
        members: [parent1, parent2, child]
        state_code: IA
  output:
    # 42_700 > 42_640 (160% FPL) -> ineligible (not enrolled, basic child)
    ia_cca_income_eligible: false

