    marital_units:
      first_marital_unit:
        members: [person1, person2]
      second_marital_unit:
        members: [person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IA
  output:
    # Combined SS $28,800/yr - $240 disregard = $28,560/yr countable couple.
    # Combined monthly = $2,380 > couple FBR $1,450, so the supplement
    # phases out: max(0, $1,953 standard - max($2,380, $1,450)) = $0.
