# ============================================================================
# IHHRC (In-Home Health-Related Care) supplement tests (IAC 441—177).
# ============================================================================
# IAC 441—177.10(2)(a): payment = max(0, min(cost, per-person cap) -
#   client participation), where client participation is marital-unit
#   countable income minus the basic SSI standard disregard (the applicable
#   FBR for a single or joint claim), split evenly across the marital unit.
# IAC 441—177.10(3): IHHRC max benefit payable is $480.55 per person, inclusive
#   of all services for all providers. The $961.10 in 441—177.4(1)(f) is the
#   combined couple income cap, NOT a per-person payment cap.
# IAC 441—177.4(1)(c): recipient must live in own home (not in RCF or FLH).
