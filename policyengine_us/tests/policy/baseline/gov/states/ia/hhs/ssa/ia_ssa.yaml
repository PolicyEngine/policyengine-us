# ============================================================================
# SMME (Supplement for Medicare and Medicaid Eligibles) tests (IAC 441—52.1(7)).
# ============================================================================
# SMME is a $1/month technical SSP pathway for people who meet all SSI
# categorical eligibility (aged/blind/disabled, resources, immigration) but
# whose income exceeds the federal SSI benefit rate. Per IAC 441—51.7(6),
# income must exceed 120% of the federal poverty level. 2025 FPL (1 person,
# contiguous US) = $15,650; 120% = $18,780/year or $1,565/month.

- name: Case 1, aged Iowan with income above 120% FPL, full Medicaid and Part B.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        social_security_retirement: 24_000  # $2,000/month
        ia_ssa_has_full_medicaid: true
        ia_ssa_has_medicare_part_b: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Income $2,000/mo; countable $1,980 after $20 exclusion;
    # 120% FPL for 1 person (2025, contiguous) = $1,565/mo; exceeds threshold.
    # No SSI (countable > FBR $967). SMME pays $1.
    is_ssi_eligible: [true]
    ssi: [0]
    ia_ssa_eligible: [true]
    ia_ssa_living_arrangement: [SMME]
    ia_ssa: [1]

- name: Case 2, aged Iowan with low income (below 120% FPL) is not SMME-eligible.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        social_security_retirement: 12_000  # $1,000/month
        ia_ssa_has_full_medicaid: true
        ia_ssa_has_medicare_part_b: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Income $1,000/mo; countable $980 after $20 exclusion; below 120% FPL
    # $1,565/mo. SMME-ineligible; person gets regular SSI instead
    # (FBR $967 - countable $980 < 0, so no federal SSI either).
    ia_ssa_living_arrangement: [NONE]
    ia_ssa: [0]

