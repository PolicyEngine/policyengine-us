        members: [person1, person2]
      second_marital_unit:
        members: [person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IA
  output:
    # 2026 DP standard $2,031 minus 2026 couple FBR $1,491 = $540.
    ia_ssa_living_arrangement: [DP, NONE, NONE]
    ia_ssa: [540, 0, 0]

- name: Case 5, aged client with aged spouse and dependent child integration.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_dp_configuration: AGED_OR_DISABLED_WITH_SPOUSE_AND_DEPENDENT
        ia_ssa_dp_has_eligible_dependent: true
        ia_ssa_dp_dependent_countable_income: 0
      person2:
        age: 68
        employment_income: 0
        ia_ssa_dp_configuration: NONE
      person3:
        age: 10
        employment_income: 0
    marital_units:
      first_marital_unit:
        members: [person1, person2]
      second_marital_unit:
        members: [person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IA
  output:
    # person1: aged + aged-spouse + dependent. Standard $1,953, couple FBR
    # $1,450: max(0, 1953 - max(0, 1450)) = $503.
    # person2: aged with no DP configuration; for SMME income must exceed
    # 120% FPL for one person ($1,565/mo with the new 1-person/2-person
    # FPG sizing); income is $0, so not SMME-eligible -> NONE.
    # person3: child -> NONE.
    ia_ssa_living_arrangement: [DP, NONE, NONE]
    ia_ssa: [503, 0, 0]

- name: Case 6, dependent income above limit disqualifies DP supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_dp_configuration: AGED_OR_DISABLED_WITH_DEPENDENT
        ia_ssa_dp_has_eligible_dependent: true
        ia_ssa_dp_dependent_countable_income: 600  # > $503 limit
    marital_units:
      marital_unit:
