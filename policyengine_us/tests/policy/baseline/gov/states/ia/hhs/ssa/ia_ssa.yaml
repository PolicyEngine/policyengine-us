# Iowa SSA consolidated payment tests.
#
# ia_ssa is computed by selecting over ia_ssa_living_arrangement and applying
# the category-specific payment formula. Tests here exercise each arrangement's
# math (Blind, DP, FLH, RCF, IHHRC, SMME) plus multi-category integrations.
# Routing priority (RCF > IHHRC > FLH > DP > BLIND > SMME > NONE) is verified
# separately in ia_ssa_living_arrangement.yaml.

# ============================================================================
# BLIND supplement tests (IAC 441—52.1(4): flat $22, frozen since 2011).
# ============================================================================
- name: Case 1, blind aged Iowan receives flat 22 dollar supplement plus federal SSI.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_blind: true
        employment_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    is_ssi_eligible: [true]
    ssi: [967]
    ia_ssa_eligible: [true]
    ia_ssa_living_arrangement: [BLIND]
    ia_ssa: [22]

- name: Case 2, non-blind aged Iowan receives no blind supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        employment_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa: [0]

- name: Case 3, blind person with excess resources receives no supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 40
        is_blind: true
        employment_income: 0
        ssi_countable_resources: 5_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Resources $5,000 > single limit $2,000 -> ia_ssa_resources_eligible false
    ia_ssa_resources_eligible: [false]
    ia_ssa_eligible: [false]
    ia_ssa: [0]

- name: Case 4, blind RCF resident routed to RCF (IAC 441-52.1(4) exclusivity).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: true
        employment_income: 0
        ia_ssa_living_arrangement_input: RESIDENTIAL_CARE_FACILITY
        ia_ssa_rcf_cost_per_diem: 37.60
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Per IAC 441-52.1(4) blind is not paid concurrently with another SSA
    # arrangement. RCF outranks BLIND in the priority cascade, so the person
    # is paid as RCF: 31 * $37.60 - ($967 SSI - $126 PNA) = $324.60.
    ia_ssa_living_arrangement: [RCF]
    ia_ssa: [324.60]

- name: Case 5, blind Iowan with earnings still gets blind supplement.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_blind: true
        # Earned income: $500/mo; after blind/disabled working student?
        # The blind supplement has no income test at the category level
        # beyond SSI categorical eligibility (which ignores income).
        employment_income: 6_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Still ssi_eligible (passes ABD + resources + immigration).
    is_ssi_eligible: [true]
    ia_ssa_eligible: [true]
    ia_ssa_living_arrangement: [BLIND]
    ia_ssa: [22]

- name: Case 6, blind person at 2026 still receives frozen 22 dollar supplement.
  period: 2026-01
  input:
    people:
      person1:
        age: 40
        is_blind: true
        employment_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Blind supplement frozen at $22 since 2017.
    ia_ssa: [22]

- name: Case 7, blind person with income above FBR plus state standard gets zero supplement.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: true
        social_security_retirement: 14_400  # $1,200/mo gross
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # $1,200/mo SS gross -> $1,180/mo countable (after $20 disregard).
    # FBR $967, blind state standard $22, total $989. Countable $1,180
    # exceeds $989 -> blind income gate in ia_ssa_living_arrangement excludes,
    # so category drops to NONE and supplement is $0.
    ia_ssa_living_arrangement: [NONE]
    ia_ssa: [0]

- name: Case 8, blind person with income just above FBR gets partial supplement.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: true
        social_security_retirement: 12_000  # $1,000/mo gross
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # $1,000/mo SS gross -> $980/mo countable (after $20 disregard).
    # FBR $967, blind state standard $22, total $989.
    # Federally-administered formula: max(0, 989 - max(980, 967)) = 9.
    ia_ssa_living_arrangement: [BLIND]
    ia_ssa: [9]

# ============================================================================
# DP (Dependent Person) supplement tests (IAC 441—52.1(2): 5 configurations).
# ============================================================================
# IAC 441—52.1(2): DP is federally-administered per POMS SI 01415.050.F.
# Iowa GL 6-B-46 p. 22 publishes a per-configuration assistance standard.
# Per the manual ("Only the income of the eligible person or eligible couple
# is subtracted from the applicable assistance standard"), the supplement is:
#   supplement = max(0, assistance_standard - max(countable, applicable_FBR))
# where applicable_FBR is the couple FBR for configurations that include an
# eligible spouse, and the individual FBR otherwise.
# Also requires dependent's countable income < dependent_income_limit
# (enforced in ia_ssa_living_arrangement).

- name: Case 1, person with no DP configuration gets zero supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_dp_configuration: NONE
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa: [0]

- name: Case 2, person with excess resources gets zero DP supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ssi_countable_resources: 5_000
        ia_ssa_dp_configuration: AGED_OR_DISABLED_WITH_DEPENDENT
        ia_ssa_dp_has_eligible_dependent: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Resources $5,000 > single limit $2,000 -> ia_ssa_resources_eligible false
    ia_ssa_eligible: [false]
    ia_ssa: [0]

- name: Case 3, blind client with aged spouse and dependent child receives DP at couple-FBR-based standard.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: true
        employment_income: 0
        ia_ssa_dp_configuration: BLIND_WITH_AGED_OR_DISABLED_SPOUSE_AND_DEPENDENT
        ia_ssa_dp_has_eligible_dependent: true
        ia_ssa_dp_dependent_countable_income: 0
      person2:
        age: 68
        is_blind: false
        employment_income: 0
        ia_ssa_dp_configuration: NONE
      person3:
        age: 10
        employment_income: 0
    marital_units:
      first_marital_unit:
        members: [person1, person2]
      second_marital_unit:
        members: [person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IA
  output:
    # person1: DP standard $1,975 minus couple FBR $1,450 = $525.
    # person2: aged spouse with no DP/BLIND/SMME qualification -> NONE.
    # person3: child -> NONE.
    ia_ssa_living_arrangement: [DP, NONE, NONE]
    ia_ssa: [525, 0, 0]

- name: Case 4, blind client with aged spouse and dependent child at 2026 rates.
  period: 2026-01
