  input:
    people:
      person1:
        age: 70
        is_blind: true
        employment_income: 0
        ia_ssa_dp_configuration: BLIND_WITH_AGED_OR_DISABLED_SPOUSE_AND_DEPENDENT
        ia_ssa_dp_has_eligible_dependent: true
        ia_ssa_dp_dependent_countable_income: 0
      person2:
        age: 68
        is_blind: false
        employment_income: 0
