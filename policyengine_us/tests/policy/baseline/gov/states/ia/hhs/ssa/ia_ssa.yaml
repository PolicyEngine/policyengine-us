# ============================================================================
# FLH (Family-Life Home) supplement tests (IAC 441—52.1(1)).
# ============================================================================
# IAC 441—52.1(1): FLH is federally-administered per POMS SI 01415.050.F.
# Federally-administered SSP formula:
#   base      = min(max(0, (FBR + state_supplement) - max(countable, FBR)),
#                    max_supplement)
#   extra     = max(0, state_supplement - max_supplement) if countable == 0
#   supplement = base + extra
# $142 cap on the federally-administered portion; the Department pays the
# extra directly when SSA's $20 general-income disregard goes unused on an
# SSI-only recipient.

- name: Case 1, aged FLH resident with zero income receives capped supplement plus Department top-up.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_living_arrangement_input: FAMILY_LIFE_HOME
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Federal SSI fills to FBR $967; state supplement $162, capped at $142.
    # With no other income the SSI $20 general-income disregard goes unused,
    # so Iowa HHS pays the remaining $20 as a Department top-up, totaling
    # $162 — bringing federal + state payments to the full $1,129 standard.
    is_ssi_eligible: [true]
    ssi: [967]
    ia_ssa_eligible: [true]
    ia_ssa_living_arrangement: [FLH]
    ia_ssa: [162]

