    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Dependent income exceeds the limit -> DP category gate fails. Person
    # is 70 with no other qualifying category -> NONE -> supplement 0.
    ia_ssa_living_arrangement: [NONE]
    ia_ssa: [0]

