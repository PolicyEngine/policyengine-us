- name: Case 13 RCF earned-income, no-disregard add-back applies the leftover-20 dollars to earnings at half rate.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 6_000  # $500/mo earned, no unearned
        ia_ssa_living_arrangement_input: RESIDENTIAL_CARE_FACILITY
        ia_ssa_rcf_cost_per_diem: 37.60
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # $500/mo earned, $0 unearned. SSI exclusions: $20 general falls into
    # the earned flat ($65 + $20 = $85), then 50% of remainder. SSI
    # countable_earned = ($500 - $85) * 0.5 = $207.50. SSI fills to
    # $967 - $207.50 = $759.50. For RCF (no $20 disregard): add back
    # $20 * 0.5 = $10 (the leftover applied to earned, halved by the 50%
    # earned-share rule). Iowa countable = $217.50 (matches GL 6-B-46 p.
    # 55: "an SSI recipient ... with earned income of more than $85 per
    # month will commonly have countable income ... equal to the SSI
    # payment standard plus $10 ($977)"). Total RCF income $977; client
    # participation $977 - $126 = $851. Cost-of-care 31 * $37.60 =
    # $1,165.60. Supplement = $1,165.60 - $851 = $314.60.
    ia_ssa: [314.60]
