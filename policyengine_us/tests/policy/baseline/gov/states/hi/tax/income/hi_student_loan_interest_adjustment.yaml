- name: Hawaii adds back part of the federal student loan deduction when Hawaii's deduction is smaller
  period: 2025
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        employment_income: 60_000
        student_loan_interest: 2_500
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [head]
        filing_status: SINGLE
    spm_units:
      spm_unit:
        members: [head]
    households:
      household:
        members: [head]
        state_code: HI
  output:
    hi_student_loan_interest_adjustment: -1250
    hi_agi: 58_750

- name: Hawaii subtracts more than federal when Hawaii AGI excludes pension income
  period: 2025
  absolute_error_margin: 0.2
  input:
    people:
      head:
        age: 30
        employment_income: 60_000
        taxable_pension_income: 40_000
        student_loan_interest: 2_500
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [head]
        filing_status: SINGLE
    spm_units:
      spm_unit:
        members: [head]
    households:
      household:
        members: [head]
        state_code: HI
  output:
    hi_student_loan_interest_adjustment: 833.33
    hi_agi: 19_166.67
