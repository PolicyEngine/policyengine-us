- name: Case 1, family of 3 matches CBPP $610 figure (work-required tier).
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: HI
  output:
    # SON (size 3): 1590
    # SOA = 1590 * 0.48 = 763.20
    # After 20% mandatory-work reduction: 763.20 * 0.80 = 610.56
    hi_tanf_max_benefit_standard: 610.56

