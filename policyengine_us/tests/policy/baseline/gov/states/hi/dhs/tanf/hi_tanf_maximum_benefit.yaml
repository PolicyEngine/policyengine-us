# Hawaii TANF maximum benefit reflects the steady-state mandatory-work
# Standard of Assistance: SON × SOA rate (0.48) × (1 - mandatory-work
# reduction (0.20)). This matches the figure reported by CBPP and the
# Urban Welfare Rules Database (CBPP "Continued Increases in TANF
# Benefit Levels", May 2024 / Feb 2025) and Hawaii TANF State Plan
# 11.1, footnote 4.
#
# Modeling note: PolicyEngine cannot track cumulative months of TANF
# receipt or work-eligibility status, so the steady-state mandatory-work
# rate (SON × 0.48 × 0.80) is applied unconditionally. Households exempt
# from work requirements (per HRS § 346-71) and households in their
# first two months of receipt are under-reported relative to the State
# Plan; a future enhancement could branch on a `hi_tanf_work_exempt` or
# `hi_tanf_initial_two_months` input.

- name: Case 1, single person household.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    # 939 × 0.48 × 0.80 = 360.576
    hi_tanf_maximum_benefit: 360.576

- name: Case 2, family of 2.
  period: 2024-01
