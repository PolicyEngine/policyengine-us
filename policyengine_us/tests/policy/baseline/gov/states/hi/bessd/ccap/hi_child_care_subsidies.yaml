# HI child care subsidies aggregator (YEAR), adds hi_ccap and feeds the
# federal child_care_subsidies total.

- name: Case 1, monthly subsidy sums to the annual aggregator and feeds federal total.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 30
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 18_000
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # hi_ccap 740/month x 12 = 8,880/year
    hi_child_care_subsidies: 8_880
    # Federal aggregator includes the registered HI program
    child_care_subsidies: 8_880

- name: Case 2, non-Hawaii household contributes nothing.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        weekly_hours_worked: 40
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 18_000
    households:
      household:
        members: [person1, person2]
        state_code: NV
  output:
    hi_child_care_subsidies: 0
