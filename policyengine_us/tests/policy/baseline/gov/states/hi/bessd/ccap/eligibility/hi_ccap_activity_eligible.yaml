# HI CCAP caretaker-activity tests (HAR 17-798.2-9(b)(2)).
# Each head/spouse must be employed (hours > 0 or income > 0), a full-time
# student, disabled, or receiving protective services. In a two-parent
# family, BOTH caretakers must be in an approved activity.

- name: Case 1, single employed caretaker is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_activity_eligible: true

- name: Case 2, single caretaker with no activity is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 0
        employment_income: 0
        is_full_time_student: false
        is_disabled: false
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_activity_eligible: false

- name: Case 3, single full-time student is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 25
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 0
        employment_income: 0
        is_full_time_student: true
        is_disabled: false
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_activity_eligible: true

- name: Case 4, single idle disabled caretaker is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 0
        employment_income: 0
        is_full_time_student: false
        is_disabled: true
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    # HAR 17-798.2-9(b)(2)(H)/(I): disability is not a standalone activity. A
    # single idle disabled caretaker qualifies only via an activity link to
    # another head/spouse in an approved activity, which is absent here.
    hi_ccap_activity_eligible: false

- name: Case 5, two-parent family with both employed is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
      person2:
        age: 33
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    hi_ccap_activity_eligible: true

- name: Case 6, two-parent family with one idle parent is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
      person2:
        age: 33
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 0
        employment_income: 0
        is_full_time_student: false
        is_disabled: false
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    hi_ccap_activity_eligible: false

- name: Case 7, single caretaker receiving protective services is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 0
        employment_income: 0
        is_full_time_student: false
        is_disabled: false
        receives_or_needs_protective_services: true
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    # Active via the protective-services branch, not employment/school.
    hi_ccap_activity_eligible: true

- name: Case 8, single caretaker with employment income but zero hours is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 0
        employment_income: 24_000
        is_full_time_student: false
        is_disabled: false
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    # Active via the income-only sub-branch of is_employed
    # (employment_income > 0) even with zero weekly hours worked.
    hi_ccap_activity_eligible: true

- name: Case 9, one employed parent plus an idle disabled parent is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
      person2:
        age: 33
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 0
        employment_income: 0
        is_full_time_student: false
        is_disabled: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # HAR 17-798.2-9(b)(2)(H): the idle disabled parent is covered via the
    # activity link because the other head/spouse is in a real activity (work).
    hi_ccap_activity_eligible: true

- name: Case 10, two idle disabled parents are ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 0
        employment_income: 0
        is_full_time_student: false
        is_disabled: true
      person2:
        age: 33
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked_before_lsr: 0
        employment_income: 0
        is_full_time_student: false
        is_disabled: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # No head/spouse is in a real activity, so neither disabled parent has an
    # activity link. Disability alone does not qualify the family.
    hi_ccap_activity_eligible: false
