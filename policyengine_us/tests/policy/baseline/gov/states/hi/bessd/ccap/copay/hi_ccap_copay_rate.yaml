# HI CCAP co-payment rate by FPG band (Exhibit II, HAR 17-798.2-14(b)(4)).
# The rate is a function of monthly gross income as a share of the federal
# poverty guidelines, independent of family size. Bands (income above X%):
#   0-100% -> 0%, 101-115% -> 1%, 116-130% -> 2%, 131-145% -> 3%,
#   146-160% -> 4%, 161-175% -> 5%, 176-190% -> 6%, 191-205% -> 7%,
#   206-230% -> 8%, 231%+ (to 85% SMI) -> 9%.
#
# All cases are a family of 2 (one adult + one child). 2025 HI FPG for a
# family of 2 = 24,320/year = 2,026.67/month. Annual employment_income is
# converted to monthly; the implied FPG ratio is noted per case.

- name: Case 1, income below 100 percent FPG has no copay.
  period: 2025-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000  # 1,000/mo, ratio 0.49
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    hi_ccap_copay_rate: 0

- name: Case 2, income exactly at 100 percent FPG has no copay.
  period: 2025-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
        employment_income: 24_320  # 2,026.67/mo, ratio exactly 1.00
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # Band top at exactly 100% FPG stays in the 0% band
    hi_ccap_copay_rate: 0

