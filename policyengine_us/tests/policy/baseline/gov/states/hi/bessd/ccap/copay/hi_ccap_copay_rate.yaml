# === Edge cases: zero and negative countable income ===

- name: Case 13, exactly zero countable income has no copay.
  period: 2025-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
        employment_income: 0  # ratio 0.00 -> 0% band
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    hi_ccap_countable_income: 0
    hi_ccap_copay_rate: 0

- name: Case 14, negative countable income floors at the 0 percent band.
  period: 2025-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
        # Self-employment loss with no offsetting income -> negative
        # countable income; the FPG ratio is negative, so the bracket's
        # lowest band (0%) applies (no negative-band lookup).
        self_employment_income: -120_000  # -10,000/mo
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    hi_ccap_copay_rate: 0
