# HI CCAP maximum monthly rate lookup (Exhibit I Table A, eff. 2017-08-01).
# Rate = lesser-of input is handled downstream; this variable is the raw
# Exhibit I rate by provider category x hours tier. Every one of the 9
# provider categories and all 4 hours tiers is covered below.
#
# Weekly hours map to monthly via x 52/12 = x 4.3333.
# Standard tier anchors: FULL_TIME 120mo (27.6923 wk), TWO_THIRDS 80mo
#   (18.4615 wk), ONE_THIRD 40mo (9.2308 wk), CASUAL 20mo (4.6154 wk).
# Before/after tier anchors: FULL_TIME 50mo (11.5385 wk), TWO_THIRDS 35mo
#   (8.0769 wk), ONE_THIRD 20mo (4.6154 wk), CASUAL 10mo (2.3077 wk).
# All children are citizens under 13 so hi_ccap_eligible_child is true.

# === Center-based infant/toddler (1,490 / 1,328 / 830 / 332) ===

- name: Case 1, center infant toddler full-time.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 1
        immigration_status: CITIZEN
        childcare_hours_per_week: 27.6923
        hi_ccap_provider_category: CENTER_INFANT_TODDLER
    households:
      household:
        members: [person1]
        state_code: HI
