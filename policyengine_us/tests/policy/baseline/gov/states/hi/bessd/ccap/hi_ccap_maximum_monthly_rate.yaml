# HI CCAP maximum monthly rate lookup (Exhibit I, HAR 17-798.3, eff.
# 2020-01-02). Rate = Exhibit I rate keyed by provider category x age group x
# hours tier. The age group (infant/toddler vs older) is DERIVED from the
# child's age (under 36 months = infant/toddler, HAR 17-798.3-2), so the tests
# below set the child's age to drive which rate applies rather than encoding
# the age in the provider category.
#
# Weekly hours map to monthly via x 52/12 = x 4.3333.
# Standard tier bands: FULL_TIME 87+ monthly, PART_TIME 1-86 monthly.
#   FULL_TIME: 40 weekly -> 173.33 monthly (>= 87).
#   PART_TIME: 10 weekly -> 43.33 monthly (1-86).
# Before/after-school bands (LICENSED/EXEMPT before-after only):
#   FULL_TIME 45+ monthly, PART_TIME 1-44 monthly.
#   FULL_TIME: 11 weekly -> 47.67 monthly (>= 45).
#   PART_TIME: 8 weekly -> 34.67 monthly (1-44).
# A single child with no caretaker has unbounded activity hours, so the
# child's own care hours set the tier. All children are citizens under 13
# (or disabled/school-age) so hi_ccap_eligible_child is true.

# === Licensed center or group home: infant/toddler 1,733; older 795 ===
# Same provider category; the rate differs because age drives the age group.

- name: Case 1, licensed center infant/toddler (age drives I/T) full-time.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 1  # < 36 months -> INFANT_TODDLER
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_maximum_monthly_rate: 1_733

- name: Case 2, licensed center infant/toddler part-time.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 1  # INFANT_TODDLER
        immigration_status: CITIZEN
        childcare_hours_per_week: 10
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_maximum_monthly_rate: 1_733

- name: Case 3, licensed center older (age drives older) full-time.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 4  # >= 36 months -> OLDER
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_maximum_monthly_rate: 795

- name: Case 4, licensed center older part-time.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 4  # OLDER
        immigration_status: CITIZEN
        childcare_hours_per_week: 10
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_maximum_monthly_rate: 795

