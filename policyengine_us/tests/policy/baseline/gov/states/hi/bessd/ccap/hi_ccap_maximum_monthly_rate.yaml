# HI CCAP maximum monthly rate lookup (Exhibit I, HAR 17-798.3, eff.
# 2020-01-02). Rate = raw Exhibit I rate by provider category x hours tier.
# The lesser-of cap against actual expenses is handled downstream; this
# variable is the per-child Exhibit I rate. All 12 provider categories x
# both hours tiers (FULL_TIME / PART_TIME) are covered below (24 cells).
#
# Weekly hours map to monthly via x 52/12 = x 4.3333.
# Standard tier bands: FULL_TIME 87+ monthly, PART_TIME 1-86 monthly.
#   FULL_TIME: 40 weekly -> 173.33 monthly (>= 87).
#   PART_TIME: 10 weekly -> 43.33 monthly (1-86).
# Before/after-school bands (LICENSED/EXEMPT before-after only):
#   FULL_TIME 45+ monthly, PART_TIME 1-44 monthly.
#   FULL_TIME: 11 weekly -> 47.67 monthly (>= 45).
#   PART_TIME: 8 weekly -> 34.67 monthly (1-44).
# A single child with no caretaker has unbounded activity hours, so the
# child's own care hours set the tier. All children are citizens under 13
# (or disabled school-age) so hi_ccap_eligible_child is true.

# === Licensed center infant/toddler (1,733 / 1,733) ===

- name: Case 1, licensed center infant toddler full-time.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 1
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        hi_ccap_provider_category: LICENSED_CENTER_INFANT_TODDLER
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_maximum_monthly_rate: 1_733

- name: Case 2, licensed center infant toddler part-time.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 1
        immigration_status: CITIZEN
        childcare_hours_per_week: 10
        hi_ccap_provider_category: LICENSED_CENTER_INFANT_TODDLER
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_maximum_monthly_rate: 1_733

