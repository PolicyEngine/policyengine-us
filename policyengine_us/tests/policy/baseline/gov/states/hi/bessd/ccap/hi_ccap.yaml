# HI CCAP monthly subsidy (HAR 17-798.2-13(a), 17-798.2-14(b)).
# subsidy = max(min(max_rate, pre_subsidy_expenses) - copay, 0).
# Family of 2, HI 2025 unless noted. Parents are employed (activity
# eligible) and income keeps families income-eligible.

- name: Case 1, rate caps the subsidy below actual expenses.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000  # low income -> 0% copay
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 30  # ~130 monthly hours -> full-time
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 18_000  # 1,500/mo
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # max rate 795 < 1,500 expenses -> capped at 795; copay 0
    # subsidy = 795 - 0 = 795
    hi_ccap: 795

- name: Case 2, actual expenses cap the subsidy below the rate.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
      person2:
        age: 1  # < 36 months -> INFANT_TODDLER rate
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 6_000  # 500/mo
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # expenses 500 < rate 1,733 -> capped at 500; copay 0
    # subsidy = 500 - 0 = 500
    hi_ccap: 500

- name: Case 3, copay reduces the subsidy.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 56_000  # 4,666.67/mo, FPG ratio 2.30+ -> 9%
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 30
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1,000/mo
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # capped = min(1,000, 795) = 795; copay = 795 x 0.09 = 71.55
    # subsidy = 795 - 71.55 = 723.45
    hi_ccap: 723.45

- name: Case 4, two children sum their rates.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
      person2:
        age: 1  # < 36 months -> INFANT_TODDLER rate
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
      person3:
        age: 4  # >= 36 months -> OLDER rate
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 30
        hi_ccap_provider_category: REGISTERED_FAMILY
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 30_000  # 2,500/mo
    households:
      household:
        members: [person1, person2, person3]
        state_code: HI
  output:
    # rates 1,733 + 600 = 2,333; expenses 2,500 -> capped at 2,333; copay 0
    # subsidy = 2,333 - 0 = 2,333
    hi_ccap: 2_333

- name: Case 5, negative countable income does not inflate the subsidy.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        self_employment_income: -600_000  # large monthly loss
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 30
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 18_000
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # Negative income -> 0% copay band; subsidy capped at rate 795, not inflated
    hi_ccap: 795

- name: Case 6, ineligible family receives no subsidy.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 0
        weekly_hours_worked_before_lsr: 0
        is_full_time_student: false
        is_disabled: false
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
        childcare_hours_per_week: 30
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # No approved caretaker activity -> not eligible -> no subsidy
    hi_ccap_eligible: false
    hi_ccap: 0

# === Edge cases: lesser-of cap and copay floor ===

- name: Case 7, provider charge below the rate caps the subsidy at the charge with a copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 56_000  # 4,666.67/mo, FPG ratio 2.30+ -> 9%
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 30
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 6_000  # 500/mo charge
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # capped = min(500 charge, 795 rate) = 500
    # copay = 795 x 0.09 = 71.55 (always on the dept max rate)
    # subsidy = max(500 - 71.55, 0) = 428.45 (lesser is the charge, not rate)
    hi_ccap: 428.45

- name: Case 8, copay larger than the lesser-of amount floors the subsidy at zero.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 56_000  # 4,666.67/mo, FPG ratio 2.30+ -> 9%
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 30
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12  # 1/mo charge
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # capped = min(1 charge, 795 rate) = 1; copay = 795 x 0.09 = 71.55
    # subsidy = max(1 - 71.55, 0) = 0 (no negative benefit)
    hi_ccap: 0

- name: Case 9, household with no children produces a graceful zero.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_pre_subsidy_childcare_expenses: 0
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    # No eligible child -> not eligible -> no subsidy, no error
    hi_ccap_eligible: false
    hi_ccap: 0

# === Zero-care-hours gate and activity-hours cap ===

- name: Case 10, otherwise-eligible child with zero care hours receives no subsidy.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000  # low income -> 0% copay
        weekly_hours_worked_before_lsr: 40
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 0  # no care need
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 18_000
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # Family is eligible, but the child's 0 care hours gate the rate to 0,
    # so the subsidy is 0 (FIX A: effective monthly care hours < 1).
    hi_ccap_eligible: true
    hi_ccap_maximum_monthly_rate: [0, 0]
    hi_ccap: 0

- name: Case 11, low caretaker activity hours cap the rate tier below full-time.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000  # low income -> 0% copay
        weekly_hours_worked_before_lsr: 10  # 10 x 52/12 = 43.33 monthly
        immigration_status: CITIZEN
      person2:
        age: 4
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 40  # 40 x 52/12 = 173.33 monthly care hours
        # Registered family rate differs by tier (FT 600 / PT 334), so the
        # activity-hours cap visibly drops the rate.
        hi_ccap_provider_category: REGISTERED_FAMILY
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 18_000
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # FIX B (HAR 17-798.2-14(b)(1)): effective hours = min(173.33 care,
    # 43.33 activity) = 43.33 monthly -> standard PART_TIME band (1-86),
    # not FULL_TIME. Registered family PART_TIME rate = 334 (vs FT 600).
    hi_ccap_monthly_care_hours: [0, 43.333332]
    hi_ccap_hours_tier: [PART_TIME, PART_TIME]
    hi_ccap_maximum_monthly_rate: [0, 334]
    # subsidy = min(1,500 expenses, 334 rate) - 0 copay = 334
    hi_ccap: 334

- name: Case 12, activity cap drops a before/after-school child to part-time.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000  # low income -> 0% copay
        weekly_hours_worked_before_lsr: 10  # 10 x 52/12 = 43.33 monthly
        immigration_status: CITIZEN
      person2:
        age: 8  # school-age, OLDER age group
        immigration_status: CITIZEN
        childcare_hours_per_week: 12  # 12 x 52/12 = 52 monthly care hours
        hi_ccap_provider_category: LICENSED_BEFORE_AFTER_SCHOOL
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1,000/mo
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    # Effective hours = min(52 care, 43.33 activity) = 43.33 monthly. On the
    # before/after-school band (FULL_TIME 45+, PART_TIME 1-44), 43.33 < 45 ->
    # PART_TIME (would be FULL_TIME at 45+). Before/after OLDER rate:
    # PART_TIME = 86 (vs FULL_TIME 155). Proves the activity cap works on the
    # before/after-school band path.
    hi_ccap_monthly_care_hours: [0, 43.333332]
    hi_ccap_hours_tier: [PART_TIME, PART_TIME]
    hi_ccap_maximum_monthly_rate: [0, 86]
    # subsidy = min(1,000 expenses, 86 rate) - 0 copay = 86
    hi_ccap: 86
