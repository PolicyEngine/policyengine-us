# HI CCAP hours-tier classification (Exhibit I, HAR 17-798.2-12).
# The formula converts the weekly hours-in-care input to monthly hours
# (weekly x 52/12 = weekly x 4.3333), then classifies into a tier.
#
# Standard care bands (all rows except before/after-school):
#   FULL_TIME 97+, TWO_THIRDS 61-96, ONE_THIRD 25-60, CASUAL 1-24 monthly.
# Before/after-school bands:
#   FULL_TIME 45+, TWO_THIRDS 30-44, ONE_THIRD 15-29, CASUAL 1-14 monthly.
# weekly = target_monthly x 12/52. Boundaries are inclusive lower bounds.
# At an inclusive lower bound (e.g., 97 monthly hours -> FULL_TIME), the
# weekly input is nudged ~0.2 monthly hours into the band so the float
# conversion does not drift just below the threshold.

# === Standard care scheme (provider category not before/after-school) ===

- name: Case 1, standard full-time at 97 monthly hours.
  period: 2025-01
  input:
    people:
      person1:
        age: 4
        # 97.2 monthly / 4.3333 = 22.4308 weekly (just inside FULL_TIME)
        childcare_hours_per_week: 22.4308
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_hours_tier: FULL_TIME

- name: Case 2, standard two-thirds at 96 monthly hours.
  period: 2025-01
  input:
    people:
      person1:
        age: 4
