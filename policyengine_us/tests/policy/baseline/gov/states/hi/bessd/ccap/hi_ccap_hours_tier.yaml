# HI CCAP hours-tier classification (Exhibit I, HAR 17-798.3, eff.
# 2020-01-02). The formula converts the weekly hours-in-care input to monthly
# hours (weekly x 52/12 = weekly x 4.3333), then classifies into a tier.
#
# Standard care bands (all rows except before/after-school):
#   FULL_TIME 87+ monthly, PART_TIME 1-86 monthly.
# Before/after-school bands (LICENSED/EXEMPT before-after only):
#   FULL_TIME 45+ monthly, PART_TIME 1-44 monthly.
# weekly = target_monthly x 12/52. Boundaries are inclusive lower bounds.
# At an inclusive lower bound (e.g., 87 monthly hours -> FULL_TIME), the
# weekly input is nudged ~0.2 monthly hours into the band so the float
# conversion does not drift just below the threshold.
# A single child with no caretaker has unbounded activity hours, so the
# child's own care hours set the tier.

# === Standard care scheme (provider category not before/after-school) ===

- name: Case 1, standard full-time just above 87 monthly hours.
  period: 2025-01
  input:
    people:
      person1:
        age: 4
        # 87.2 monthly / 4.3333 = 20.1231 weekly (just inside FULL_TIME)
        childcare_hours_per_week: 20.1231
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_hours_tier: FULL_TIME

- name: Case 2, standard full-time at the 87-monthly-hour inclusive lower bound.
  period: 2025-01
  input:
    people:
      person1:
        age: 4
        # Inclusive lower bound 87 monthly. Nudged ~0.02 monthly into the band
        # (20.0808 weekly -> 87.02 monthly) so the float32 conversion does not
        # drift just below 87 and fall into PART_TIME.
        childcare_hours_per_week: 20.0808
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_hours_tier: FULL_TIME

- name: Case 3, standard part-time just below 87 monthly hours (86).
  period: 2025-01
  input:
    people:
      person1:
        age: 4
        # 86.0 monthly / 4.3333 = 19.8462 weekly (top of PART_TIME band)
        childcare_hours_per_week: 19.8462
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_hours_tier: PART_TIME

- name: Case 4, standard part-time at low hours.
  period: 2025-01
  input:
    people:
      person1:
        age: 4
        # 10 weekly -> 43.33 monthly (1-86) -> PART_TIME
        childcare_hours_per_week: 10
        hi_ccap_provider_category: LICENSED_CENTER_OR_GROUP_HOME
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_hours_tier: PART_TIME

- name: Case 5, standard part-time at zero hours.
  period: 2025-01
  input:
    people:
      person1:
        age: 4
        childcare_hours_per_week: 0
        hi_ccap_provider_category: LICENSED_CENTER_INFANT_TODDLER
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    # 0 monthly hours falls in the 1-86 PART_TIME band (index 1)
    hi_ccap_hours_tier: PART_TIME

# === Before/after-school scheme (LICENSED/EXEMPT before-after only) ===

- name: Case 6, before-after full-time just above 45 monthly hours.
  period: 2025-01
  input:
    people:
      person1:
        age: 8
        is_in_k12_school: true
        # 45.2 monthly / 4.3333 = 10.4308 weekly (just inside FULL_TIME)
        childcare_hours_per_week: 10.4308
        hi_ccap_provider_category: LICENSED_BEFORE_AFTER_SCHOOL
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_hours_tier: FULL_TIME

- name: Case 7, before-after full-time at the 45-monthly-hour inclusive lower bound.
  period: 2025-01
  input:
    people:
      person1:
        age: 8
        is_in_k12_school: true
        # Inclusive lower bound 45 monthly. Nudged ~0.03 monthly into the band
        # (10.392 weekly -> 45.03 monthly) so the float32 conversion does not
        # drift just below 45 and fall into PART_TIME.
        childcare_hours_per_week: 10.392
        hi_ccap_provider_category: LICENSED_BEFORE_AFTER_SCHOOL
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_hours_tier: FULL_TIME

- name: Case 8, before-after part-time just below 45 monthly hours (44).
  period: 2025-01
  input:
    people:
      person1:
        age: 8
        is_in_k12_school: true
        # 44.0 monthly / 4.3333 = 10.1538 weekly (top of PART_TIME band)
        childcare_hours_per_week: 10.1538
        hi_ccap_provider_category: EXEMPT_BEFORE_AFTER_SCHOOL
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_hours_tier: PART_TIME

- name: Case 9, before-after part-time at low hours.
  period: 2025-01
  input:
    people:
      person1:
        age: 8
        is_in_k12_school: true
        # 8 weekly -> 34.67 monthly (1-44) -> PART_TIME
        childcare_hours_per_week: 8
        hi_ccap_provider_category: EXEMPT_BEFORE_AFTER_SCHOOL
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_hours_tier: PART_TIME

# === School-age intersession/summer uses STANDARD bands, not before/after ===

- name: Case 10, school-age intersession at 44 monthly hours is part-time (standard band).
  period: 2025-01
  input:
    people:
      person1:
        age: 8
        is_in_k12_school: true
        # 44 monthly hours: PART_TIME under STANDARD bands (would be PART_TIME
        # under before/after bands too, but verifies standard-band routing).
        # 50 weekly -> 216.67 monthly is FULL_TIME; use a mid value instead.
        childcare_hours_per_week: 10  # 43.33 monthly -> PART_TIME (standard)
        hi_ccap_provider_category: LICENSED_SCHOOL_AGE_INTERSESSION_SUMMER
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_hours_tier: PART_TIME

- name: Case 11, school-age intersession at 50 monthly hours is part-time (standard band, not before/after).
  period: 2025-01
  input:
    people:
      person1:
        age: 8
        is_in_k12_school: true
        # 50 monthly / 4.3333 = 11.5385 weekly. Under STANDARD bands 50 < 87
        # -> PART_TIME. Under before/after bands 50 >= 45 would be FULL_TIME,
        # so this case confirms intersession/summer uses the STANDARD scheme.
        childcare_hours_per_week: 11.5385
        hi_ccap_provider_category: LICENSED_SCHOOL_AGE_INTERSESSION_SUMMER
    households:
      household:
        members: [person1]
        state_code: HI
  output:
    hi_ccap_hours_tier: PART_TIME
