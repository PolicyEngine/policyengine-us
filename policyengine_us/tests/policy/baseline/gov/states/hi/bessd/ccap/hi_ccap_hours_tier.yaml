# === Edge cases: exact band-top boundaries (one hour below the next tier) ===
# These verify the inclusive lower bound holds at the TOP of each band: a
# value just under the next tier's threshold stays in the lower tier. Same
# nudge convention as above (~0.2 monthly hours inside the band).

- name: Case 14, standard two-thirds just below the full-time band top.
  period: 2025-01
  input:
    people:
      person1:
        age: 4
        # 96.8 monthly / 4.3333 = 22.3385 weekly (just under FULL_TIME 97)
        childcare_hours_per_week: 22.3385
