      household:
        members: [person1]
        state_code: UT
  output:
    people:
      person1:
        # Test 1: $5,299 < $5,300 (2024 minimum) -> fails.
        ut_ui_monetarily_eligible: false

- name: Case 29, 2024 base wages exactly at $5,300 floor pass the minimum test.
  period: 2024
  input:
    people:
      person1:
        age: 35
        ut_ui_base_period_wages: 5_300
        ut_ui_high_quarter_wages: 3_200
        ut_ui_quarters_with_wages: 4
    households:
      household:
        members: [person1]
        state_code: UT
  output:
    people:
      person1:
        # Test 1: $5,300 >= $5,300 (2024 minimum).
        # Test 2: 4 quarters >= 2.
        # Test 3: $5,300 >= 1.5*$3,200 = $4,800.
        # All tests pass -> monetarily eligible.
        ut_ui_monetarily_eligible: true

- name: Case 30, 2026 base wages one dollar below $5,500 floor fail minimum test.
  period: 2026
  input:
    people:
      person1:
        age: 35
