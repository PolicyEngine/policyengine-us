- name: Case 9, other adult household income affects the renter credit.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 66
        employment_income: 10_000
        pre_subsidy_rent: 10_000
        is_tax_unit_head: true
      person2:
        age: 40
        employment_income: 15_058
        is_tax_unit_head: true
    tax_units:
      tax_unit1:
        members: [person1]
      tax_unit2:
        members: [person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: UT
  output:
    ut_homeowner_renter_relief: [550, 0]
