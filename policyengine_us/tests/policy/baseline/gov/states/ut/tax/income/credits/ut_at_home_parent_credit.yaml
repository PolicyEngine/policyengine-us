- name: 1 eligible parent with 1 child
  period: 2022
  input:
    people:
      person1:
        age: 45
        is_tax_unit_dependent: false
        ut_at_home_parent_credit_earned_income_eligible_person: true
      person2:
        age: 0
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members:
        - person1
        - person2
        ut_at_home_parent_credit_agi_eligible: true
        ut_income_tax_before_non_refundable_credits: 1000000
    households:
      household:
        members:
        - person1
        - person2
        state_code: UT
  output:
    ut_at_home_parent_credit: 100
