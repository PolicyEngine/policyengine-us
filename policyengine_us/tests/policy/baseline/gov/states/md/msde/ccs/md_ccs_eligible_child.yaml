- name: Case 5, child age 12 at boundary is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
      person2:
        age: 12
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # person2: age 12 < 13 -> true
    md_ccs_eligible_child: [false, true]
