# Tests for md_ccs (main benefit variable)
# Benefit = min(max(expenses - annual_copay, 0), max_reimbursement) / 12
# COMAR 13A.14.06.11

- name: Case 1, eligible family with expenses under rate cap.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 50_000
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        md_ccs_provider_type: LICENSED_CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # Provider: LICENSED_CENTER (set), default county: Allegany = Region Z
    # age 5 = REGULAR, 8hrs = UNIT_3
    # weekly rate: $207, annual max reimbursement: $207 * 52 = $10,764
    # weekly copay: $3, annual copay: $3 * 52 = $156
    # uncapped: max(12,000 - 156, 0) = 11,844
    # capped: min(11,844, 10,764) = 10,764
    # monthly: 10,764 / 12 = 897
    md_ccs: 793

- name: Case 2, ineligible family gets zero benefit.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 50_000
        is_tax_unit_head_or_spouse: true
      person2:
        age: 15
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        md_ccs_provider_type: LICENSED_CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # child age 15 >= 13, not disabled -> no eligible child -> not eligible
    md_ccs: 0

- name: Case 3, TCA family with zero copay gets full benefit.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        md_ccs_provider_type: LICENSED_CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # TCA: copay $0
    # weekly rate: $207 (default center, Allegany = Region Z, regular, unit 3)
    # annual max reimbursement: $207 * 52 = $10,764
    # uncapped: max(10,000 - 0, 0) = 10,000
    # capped: min(10,000, 10,764) = 10,000
    # monthly: 10,000 / 12 = 833.33
    md_ccs: 793

- name: Case 4, benefit capped at max reimbursement rate.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 40_000
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 4
        md_ccs_provider_type: LICENSED_FAMILY
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 20_000
    households:
      household:
        members: [person1, person2]
        state_code: MD
        county: ALLEGANY_COUNTY_MD
  output:
    # Provider: LICENSED_FAMILY, Region Z (Allegany), REGULAR (age 5), UNIT_2 (4hrs)
    # weekly rate: $114
    # annual max reimbursement: $114 * 52 = $5,928
    # weekly copay: $3 (part-time), annual copay: $3 * 52 = $156
    # uncapped: max(20,000 - 156, 0) = 19,844
    # capped: min(19,844, 5,928) = 5,928
    # monthly: 5,928 / 12 = 494
    md_ccs: 433.33

- name: Case 5, informal provider rate by county.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 40_000
        is_tax_unit_head_or_spouse: true
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        md_ccs_provider_type: INFORMAL
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 20_000
    households:
      household:
        members: [person1, person2]
        state_code: MD
        county: HOWARD_COUNTY_MD
  output:
    # Provider: INFORMAL, Howard County, INFANT (age 1 = 12 months < 24), UNIT_3 (8hrs)
    # weekly rate: $195
    # annual max reimbursement: $195 * 52 = $10,140
    # weekly copay: $3, annual copay: $3 * 52 = $156
    # uncapped: max(20,000 - 156, 0) = 19,844
    # capped: min(19,844, 10,140) = 10,140
    # monthly: 10,140 / 12 = 845
    md_ccs: 845
