# Tests for md_ccs_payment_rate (weekly rate lookup)
# Formal rates by region/age/unit, informal rates by county/age/unit

- name: Licensed center, Region X (Howard), regular age, full-time.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 40_000
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        md_ccs_provider_type: LICENSED_CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MD
        county: HOWARD_COUNTY_MD
  output:
    # 2026-01 uses 5/23/22 historical schedule (current schedule effective 2026-03-01).
    # Region X, Center, REGULAR (age 5), UNIT_3 (8hrs): $381/week
    md_ccs_payment_rate: [0, 381]

