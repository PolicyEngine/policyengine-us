# Tests for md_ccs_region (Household-level, Enum)
# Verifies the 23-county-plus-Baltimore-City mapping into 7 rate regions.

- name: Cecil County maps to Region U.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: MD
        county: CECIL_COUNTY_MD
  output:
    md_ccs_region: REGION_U

