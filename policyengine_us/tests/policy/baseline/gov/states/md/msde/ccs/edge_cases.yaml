        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        md_ccs_enrolled: false
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # Not enrolled -> initial threshold (75% SMI)
    # monthly countable: 80,000 / 12 = 6,666.67
    # monthly 75% SMI: 6,343.08
    # 6,666.67 > 6,343.08 -> not eligible
