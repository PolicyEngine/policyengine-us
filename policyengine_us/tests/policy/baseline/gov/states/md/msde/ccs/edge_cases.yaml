      person1:
        age: 30
        # 80,000 is between 75% SMI (76,117) and 85% SMI (86,266) for fam 2
        employment_income: 80_000
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
