    md_ccs_weekly_copay: 1

# === Benefit floor at zero: copay exceeds expenses ===

- name: Case 37, negative countable income from self-employment does not inflate benefit.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        self_employment_income: -60_000_000
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        md_ccs_provider_type: LICENSED_CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # TCA -> copay exempt -> $0 copay
    # benefit = max(10,000 - 0, 0) = 10,000
    # monthly: 10,000 / 12 = 833.33
    # Negative self-employment income does not inflate benefit (benefit formula
    # uses expenses - copay, not income-based formula)
    md_ccs: 793
