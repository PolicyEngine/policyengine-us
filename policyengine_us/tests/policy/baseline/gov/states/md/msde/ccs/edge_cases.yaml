# Maryland CCS Edge Case Tests
# Tests boundary conditions for eligibility, copayment, and benefit calculations.
# FY2025 MD SMI base: $149,249
#
# SMI by family size:
#   Fam 1: 149,249 * 0.52 = 77,609.48
#   Fam 2: 149,249 * 0.68 = 101,489.32
#   Fam 7: 149,249 * (0.52 + 0.16*5 + 0.03) = 149,249 * 1.35 = 201,486.15
#   Fam 8: 149,249 * (0.52 + 0.16*5 + 0.03*2) = 149,249 * 1.38 = 205,963.62
#
# 75% SMI (initial): Fam 1 = 58,207.11, Fam 2 = 76,116.99
# 85% SMI (continuation): Fam 2 = 86,265.92

# === Income threshold boundary: 75% SMI ===

- name: Case 1, income just below 75 percent SMI threshold for family of 2.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # 75% SMI for fam 2 ~ 76,116.99 annually
        # Use 76,116 to stay just below threshold (avoids float precision)
        employment_income: 76_116
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        md_ccs_provider_type: LICENSED_CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # monthly countable: 76,116 / 12 = 6,343.00
    # monthly 75% SMI: ~6,343.08
    # 6,343.00 <= 6,343.08 -> eligible
    md_ccs_income_eligible: true

- name: Case 2, income one dollar above 75 percent SMI threshold for family of 2.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 76_118
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        md_ccs_provider_type: LICENSED_CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # monthly countable: 76,118 / 12 = 6,343.17
    # monthly 75% SMI: 6,343.08
    # 6,343.17 > 6,343.08 -> not eligible
    md_ccs_income_eligible: false

