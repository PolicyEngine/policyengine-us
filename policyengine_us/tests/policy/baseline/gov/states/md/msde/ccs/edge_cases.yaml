# === Copay federal cap edge cases ===

- name: Case 21, copay exactly at 7 percent federal cap.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # Target: 7% of weekly income = $3/week (full-time copay)
        # weekly income = $3 / 0.07 = $42.86/week
        # annual = $42.86 * 52 = $2,228.57
        # Need income where 7% cap = $3/week exactly
        employment_income: 2_229
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
        md_ccs_provider_type: LICENSED_CENTER
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # monthly countable = 2,229 / 12 = 185.75
    # weekly income = 185.75 * 12 / 52 = 42.87
    # 7% cap = 42.87 * 0.07 = 3.00
    # raw copay = $3/week (full-time)
    # min($3, $3.00) = $3 -> cap does not reduce copay
    md_ccs_weekly_copay: 3

- name: Case 22, copay below 7 percent federal cap with very low income.
