# Tests for md_ccs_income_eligible
# Initial applicants: income <= 75% SMI
# Continuing families (md_ccs_enrolled): income <= 85% SMI
# TCA/SSI recipients: income test waived
#
# For MD family of 4 in 2025 (FY2025 SMI base = $149,249):
#   hhs_smi = 149,249 * (0.52 + 0.16 * 3) = 149,249
#   75% SMI = 149,249 * 0.75 = 111,936.75 annual
#   85% SMI = 149,249 * 0.85 = 126,861.65 annual

- name: Case 1, family of 4 with income below 75 percent SMI is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        employment_income: 100_000
      person2:
        age: 33
      person3:
        age: 8
      person4:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: MD
  output:
    # Monthly countable income: 100,000 / 12 = 8,333.33
    # Monthly 75% SMI threshold: 149,249 * 0.75 / 12 = 9,328.06
    # 8,333.33 <= 9,328.06 -> eligible
    md_ccs_income_eligible: true

- name: Case 2, family of 4 with income above 75 percent SMI is not eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        employment_income: 120_000
      person2:
        age: 33
      person3:
        age: 8
      person4:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: MD
  output:
    # Monthly countable income: 120,000 / 12 = 10,000
    # Monthly 75% SMI threshold: 149,249 * 0.75 / 12 = 9,328.06
    # 10,000 > 9,328.06 -> not eligible (new applicant)
    md_ccs_income_eligible: false

- name: Case 3, enrolled family of 4 with income between 75 and 85 percent SMI is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        employment_income: 120_000
      person2:
        age: 33
      person3:
        age: 8
      person4:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        md_ccs_enrolled: true
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: MD
  output:
    # Monthly countable income: 120,000 / 12 = 10,000
    # Monthly 85% SMI threshold: 149,249 * 0.85 / 12 = 10,571.81
    # 10,000 <= 10,571.81 -> eligible (continuation)
    md_ccs_income_eligible: true

- name: Case 4, enrolled family of 4 with income above 85 percent SMI is not eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        employment_income: 130_000
      person2:
        age: 33
      person3:
        age: 8
      person4:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        md_ccs_enrolled: true
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: MD
  output:
    # Monthly countable income: 130,000 / 12 = 10,833.33
    # Monthly 85% SMI threshold: 149,249 * 0.85 / 12 = 10,571.81
    # 10,833.33 > 10,571.81 -> not eligible
    md_ccs_income_eligible: false

- name: Case 5, frozen SMI is converted to monthly before comparing income.
  period: 2024-01
  input:
    people:
      person1:
        age: 35
        employment_income: 100_000
      person2:
        age: 33
      person3:
        age: 8
      person4:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: MD
  output:
    # Monthly countable income: 100,000 / 12 = 8,333.33
    # Frozen FY2024 four-person SMI uses 2021 MD SMI: 124,807
    # Monthly 75% SMI threshold: 124,807 * 0.75 / 12 = 7,800.44
    # 8,333.33 > 7,800.44 -> not eligible
    md_ccs_income_eligible: false
