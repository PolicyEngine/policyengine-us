# Tests for md_ccs_weekly_copay
# Weekly copay by service units:
#   Full-time (>=6 hrs/day, 3 units): $3/week
#   Part-time (>3 to <6 hrs/day, 2 units): $2/week
#   Hourly (<=3 hrs/day, 1 unit): $1/week
# Exempt: TCA, SSI, SNAP, WIC recipients pay $0
# Federal 7% cap: annual copay cannot exceed 7% of countable income
# Copay assessed for up to 3 children
# COMAR 13A.14.06.12; Chapter 717 of 2024; 45 CFR 98.45(k)

- name: Case 1, standard family with full-time care.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 50_000
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # child hours/day = 8 >= 6 -> 3 units (full-time) -> $3/week
    # annual copay: $3 * 52 = $156 -> well below 7% of $50,000 ($3,500)
    md_ccs_weekly_copay: 3

- name: Case 2, standard family with part-time care.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
