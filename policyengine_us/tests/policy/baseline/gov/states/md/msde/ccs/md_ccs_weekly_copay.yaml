        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 5
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # child hours/day = 5, >3 and <6 -> 2 units (part-time) -> $2/week
    md_ccs_weekly_copay: 2

