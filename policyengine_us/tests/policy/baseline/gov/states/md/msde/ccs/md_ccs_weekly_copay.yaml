- name: Case 8, federal 7 percent cap on very low income family.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 2_000
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_day: 8
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # Full-time -> $3/week raw copay
    # Annual raw copay: $3 * 52 = $156
    # 7% of annual income: $2,000 * 0.07 = $140
    # $156 > $140 -> 7% cap applies
    # Capped weekly: $140 / 52 = $2.69
    md_ccs_weekly_copay: 2.69
