# Tests for md_paa_countable_unearned_income variable.
# Formula: max(ssi + ssi_unearned_income + deemed - $20, 0).
# Per PAA Manual §500.8 and AT 23-02, the SSI cash payment counts as
# unearned income for PAA. ssi is YEAR-defined so input is annual.
# All cases use ssi = $9,600/yr ($800/mo) to gate eligibility.

- name: Case 1, no other unearned income beyond SSI.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 9_600  # $800/mo SSI is the only unearned income
        ssi_unearned_income: 0
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # unearned = $800 (SSI). countable = max(800 - 20, 0) = 780.
    md_paa_countable_unearned_income: 780

- name: Case 2, additional $20/mo unearned (boundary at unearned disregard).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 9_600
        # $20/mo * 12 = $240/yr.
        ssi_unearned_income: 240
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # unearned = 800 + 20 = 820. countable = max(820 - 20, 0) = 800.
    md_paa_countable_unearned_income: 800

- name: Case 3, additional $300/mo unearned.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 9_600
        # $300/mo * 12 = $3,600/yr.
        ssi_unearned_income: 3_600
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # unearned = 800 + 300 = 1100. countable = max(1100 - 20, 0) = 1080.
    md_paa_countable_unearned_income: 1_080

# Boundary cases around the $20 unearned disregard. The $1 difference
# between Case 4 and Case 5 verifies the disregard is applied at the margin.
- name: Case 4, $19/mo non-SSI unearned just below $20 increment.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 9_600
        # $19/mo * 12 = $228/yr.
        ssi_unearned_income: 228
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # unearned = 800 + 19 = 819. countable = max(819 - 20, 0) = 799.
    md_paa_countable_unearned_income: 799

- name: Case 5, $21/mo non-SSI unearned just above $20 increment.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 9_600
        # $21/mo * 12 = $252/yr.
        ssi_unearned_income: 252
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # unearned = 800 + 21 = 821. countable = max(821 - 20, 0) = 801.
    md_paa_countable_unearned_income: 801
