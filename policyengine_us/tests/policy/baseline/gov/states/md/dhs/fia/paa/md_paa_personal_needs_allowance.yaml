# Tests for md_paa_personal_needs_allowance variable.
# Tests parameter values across the timeline:
# 2023-01-01: $93 (AT 23-02)
# 2025-07-01: $106 (IM 26-04)
# The interim $102 value is omitted from the YAML pending verification of
# its issuing transmittal — the manifest's IM 26-04 confirms $102 was the
# prior PNA but does not name the originating transmittal.

- name: Case 1, 2023 PNA.
  period: 2023-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 9_600  # gates md_paa_eligible
        ssi_countable_resources: 1_000
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_personal_needs_allowance: 93

- name: Case 2, 2025 January PNA reflects $102 (placeholder effective date).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 9_600
        ssi_countable_resources: 1_000
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # 2025-01-01: 102 is a placeholder effective date — see parameter file.
    md_paa_personal_needs_allowance: 102

- name: Case 3, 2026 January PNA (after 2025-07-01 effective date).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 9_600
        ssi_countable_resources: 1_000
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_personal_needs_allowance: 106

- name: Case 4, January 2024 PNA still 93.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 9_600
        ssi_countable_resources: 1_000
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_personal_needs_allowance: 93

# Pre-2023 dates use forward-fill: parameter starts 2023-01-01 with $93,
# so any earlier period also returns $93.
- name: Case 5, pre-2023 PNA uses forward-filled value.
  period: 2022-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 9_600
        ssi_countable_resources: 1_000
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_personal_needs_allowance: 93
