- name: Case 14, pending §300.5 applicant with no income in CARE_HOME_LEVEL_C — positive PAA.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70  # Categorically aged.
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi: 0
        social_security: 0
        social_security_disability: 0
        ssi_countable_resources: 1_000
        employment_income: 0
        md_paa_living_arrangement: CARE_HOME_LEVEL_C
        md_paa_pending_federal_benefit: true
    marital_units:
      marital_unit:
