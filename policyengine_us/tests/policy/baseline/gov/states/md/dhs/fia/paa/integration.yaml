    is_ssi_eligible: [true]
    ssi: [994]
    md_paa_eligible: [false]
    md_paa: [0]

- name: Case 7, countable income equals total cost of care yields zero benefit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        # $1001/mo unearned: countable = 1001 - 20 = 981 = total cost of care
        # for CARE_HOME_LEVEL_B (875 + 106 = 981).
        social_security: 12_012
        employment_income: 0
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # --- Federal SSI ---
    # Countable unearned = 1001 - 20 = 981 > 994 FBR? No: 981 < 994 → SSI = 13.
    is_ssi_eligible: [true]
    ssi: [13]

    # --- PAA ---
    # countable_unearned = max(1001 - 20, 0) = 981.
    # total_cost_of_care = 875 + 106 = 981.
    # PAA = max(981 - 981, 0) = 0 (exactly at threshold).
    md_paa_eligible: [true]
    md_paa_countable_unearned_income: [981]
    md_paa_total_cost_of_care: [981]
    md_paa: [0]

- name: Case 8, COMAR 07.03.07.08(A)(3) cascade with both earned and unearned income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        # $185/mo earned ($2,220/yr) and $300/mo unearned ($3,600/yr).
        ssi_earned_income: 2_220
        ssi_unearned_income: 3_600
        ssi: 9_600  # gates md_paa_eligible
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_eligible: [true]
    # Per COMAR 07.03.07.08(A)(3): unearned >= $20 → leftover_general = 0,
    # effective earned disregard = $65 (NOT $85).
    # countable_earned = max(185 - 65, 0) * 0.5 = 120 * 0.5 = 60.
    # countable_unearned = max(300 - 20, 0) = 280.
    md_paa_countable_earned_income: [60]
    md_paa_countable_unearned_income: [280]
    md_paa_countable_income: [340]
    # provider_rate(875) + PNA(106) = 981 total cost of care.
    # PAA = max(981 - 340, 0) = 641.
    md_paa: [641]

- name: Case 9, COMAR 07.03.07.08(A)(1) earned-only with no unearned ($85 disregard).
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        # $185/mo earned with zero unearned income.
        ssi_earned_income: 2_220
        ssi_unearned_income: 0
        ssi: 9_600  # gates md_paa_eligible
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_eligible: [true]
    # Per COMAR 07.03.07.08(A)(1): no unearned → leftover_general = $20,
    # effective earned disregard = $85.
    # countable_earned = max(185 - 85, 0) * 0.5 = 100 * 0.5 = 50.
    md_paa_countable_earned_income: [50]
    md_paa_countable_unearned_income: [0]
    md_paa_countable_income: [50]
    # provider_rate(875) + PNA(106) = 981 total cost of care.
    # PAA = max(981 - 50, 0) = 931.
    md_paa: [931]
