# Integration tests for Maryland Public Assistance to Adults (PAA).
# Verifies the SSA cascade method (state SSP = combined need - federal SSI -
# residual countable income). Period 2026-01: federal individual FBR = $994,
# couple FBR = $1,491, medical-facility rate = $30, PNA = $106.

- name: Case 1, single SSI in CARE_HOME_LEVEL_B — federal SSI exceeds combined need.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_000
        employment_income: 0
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    is_ssi_eligible: [true]
    ssi: [994]
    md_paa_eligible: [true]
    # combined_need = 875 + 106 = 981. federal_max = 994.
    # state_supp_max = max(981 - 994, 0) = 0. PAA = 0.
    md_paa_provider_rate: [875]
    md_paa_personal_needs_allowance: [106]
    md_paa_total_cost_of_care: [981]
    md_paa: [0]

- name: Case 2, SSI recipient with $200/mo earned income in CARE_HOME_LEVEL_C.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        employment_income: 2_400  # $200/mo
        md_paa_living_arrangement: CARE_HOME_LEVEL_C
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # Federal countable = max(0, 200 - 65 - 20) * 0.5 = 57.50.
    # SSI = 994 - 57.50 = 936.50.
    is_ssi_eligible: [true]
    ssi: [936.50]
    md_paa_eligible: [true]
    # combined_need = 1173 + 106 = 1279. state_supp_max = 1279 - 994 = 285.
    # countable = 57.50; income_excess = max(57.50 - 994, 0) = 0. PAA = 285.
    md_paa_total_cost_of_care: [1_279]
    md_paa: [285]

- name: Case 3, SSI recipient with $400/mo OASI in ASSISTED_LIVING.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        social_security: 4_800  # $400/mo OASI
        employment_income: 0
        md_paa_living_arrangement: ASSISTED_LIVING
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # Federal countable unearned = 400 - 20 = 380. SSI = 994 - 380 = 614.
    is_ssi_eligible: [true]
    ssi: [614]
    md_paa_eligible: [true]
    # combined = 894 + 106 = 1000. state_supp_max = 1000 - 994 = 6.
    # countable = 380; income_excess = max(380 - 994, 0) = 0. PAA = 6.
    md_paa_total_cost_of_care: [1_000]
    md_paa: [6]

- name: Case 4, REHAB_RESIDENCE recipient — state fills gap from $30 medical SSI to PNA.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        employment_income: 0
        md_paa_living_arrangement: REHAB_RESIDENCE
        # MDH rehab is a Title XIX medical treatment facility for SSI;
        # federal SSI is capped at $30/mo. md_paa_eligible requires both.
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    is_ssi_eligible: [true]
    # Federal SSI = $30/mo medical-facility rate (annualized $360).
    ssi: [30]
    md_paa_eligible: [true]
    # combined = 0 + 106 = 106. federal_max = $30. state_supp_max = 76.
    # countable = 0; income_excess = 0. PAA = 76.
    md_paa_provider_rate: [0]
    md_paa_personal_needs_allowance: [106]
    md_paa: [76]

- name: Case 5, married couple both SSI-eligible in CARE_HOME_LEVEL_A.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_000
        employment_income: 0
        md_paa_living_arrangement: CARE_HOME_LEVEL_A
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_000
        employment_income: 0
        md_paa_living_arrangement: CARE_HOME_LEVEL_A
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # Federal SSI uses couple_FBR/2 = $1,491 / 2 = $745.50 per spouse, but
    # per COMAR 07.03.07.04 (rate schedule per recipient) the PAA cascade
    # uses the individual FBR ($994) per spouse — never couple_FBR/2.
    # combined per person = 776 + 106 = 882; state_supp_max = max(882 -
    # 994, 0) = 0 per spouse. The couple is left at federal $745.50 + state
    # $0 = $745.50 per spouse — Maryland does not top up to fill the
    # federal couple-FBR reduction.
    ssi_amount_if_eligible: [745.50, 745.50]
    ssi_countable_income: [0, 0]
    md_paa_eligible: [true, true]
    md_paa: [0, 0]

