        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        employment_income: 0
        md_paa_living_arrangement: NONE
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    is_ssi_eligible: [true]
    ssi: [994]
    md_paa_eligible: [false]
    md_paa: [0]

- name: Case 7, applicant with only earned income (no SSA receipt) is ineligible.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi: 0
        social_security: 0
        social_security_disability: 0
        employment_income: 36_000  # $3,000/mo
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # No federal cash benefit (SSI / SSDI / OASI) → PAA-ineligible per
    # PAA Manual §300.1.B.
    md_paa_eligible: [false]
    md_paa: [0]

- name: Case 8, SSDI-only recipient in CARE_HOME_LEVEL_B is PAA-eligible.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 60
        is_blind: false
        is_disabled: true
        immigration_status: CITIZEN
        ssi: 0  # Set explicitly to disable federal SSI calc and isolate SSDI path.
        ssi_countable_resources: 500
        social_security_disability: 12_000  # $1,000/mo SSDI
        employment_income: 0
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_eligible: [true]
    # ssi=0; unearned for PAA = 0 + ssi_unearned_income(1000 from SSDI) = 1000.
    # countable_unearned = max(1000 - 20, 0) = 980.
    md_paa_countable_unearned_income: [980]
    # provider_rate(875) + PNA(106) - 980 = 1.
    md_paa: [1]

- name: Case 9, asymmetric married couple — only one spouse PAA-eligible.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi: 8_400  # $700/mo SSI input
        ssi_countable_resources: 1_000
        employment_income: 0
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
      person2:
        age: 60
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi: 0
        ssi_countable_resources: 0
        employment_income: 0
        md_paa_living_arrangement: NONE
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # Only person1 is PAA-eligible (in CARE_HOME and receiving SSI). person2
    # is not in a PAA facility and does not receive SSI/SSDI. Verifies the
    # asymmetric-eligibility code path through md_paa_eligible.
    md_paa_eligible: [true, false]
    md_paa_personal_needs_allowance: [106, 0]
    md_paa_provider_rate: [875, 0]
    # person1: countable_unearned = max(700 - 20, 0) = 680.
    # PAA = max(875 + 106 - 680, 0) = 301.
    # person2's PAA fields are zero (defined_for filters out).
    md_paa: [301, 0]
