- name: Case 7, applicant with only earned income (no SSA receipt) is ineligible.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ssi: 0
        social_security: 0
        social_security_disability: 0
        employment_income: 36_000  # $3,000/mo
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # No federal cash benefit (SSI / SSDI / OASI) → PAA-ineligible per
    # PAA Manual §300.1.B.
    md_paa_eligible: [false]
    md_paa: [0]

- name: Case 8, SSDI recipient with $1,000/mo SSDI in CARE_HOME_LEVEL_C.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 60
        is_blind: false
        is_disabled: true
        immigration_status: CITIZEN
        ssi: 0  # Force off; SSDI alone gates eligibility.
        ssi_countable_resources: 500
        social_security_disability: 12_000  # $1,000/mo
        employment_income: 0
        md_paa_living_arrangement: CARE_HOME_LEVEL_C
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_eligible: [true]
    # combined = 1173 + 106 = 1279. federal_max = 994. state_supp_max = 285.
    # countable = 1000 - 20 = 980. income_excess = max(980 - 994, 0) = 0.
    # PAA = 285 - 0 = 285.
    md_paa: [285]

- name: Case 9, asymmetric married couple — only one spouse PAA-eligible.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi: 9_600  # gates eligibility
        ssi_countable_resources: 1_000
        employment_income: 0
        md_paa_living_arrangement: CARE_HOME_LEVEL_C
      person2:
        age: 60
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi: 0
        ssi_countable_resources: 0
        employment_income: 0
        md_paa_living_arrangement: NONE
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # person2 not in PAA facility → ineligible. person1 eligible via SSI.
    md_paa_eligible: [true, false]
    md_paa_provider_rate: [1_173, 0]
    md_paa_personal_needs_allowance: [106, 0]
