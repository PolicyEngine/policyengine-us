    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_eligible: [true]
    # combined = 1173 + 106 = 1279. federal_max = 994. state_supp_max = 285.
    # countable = 1000 - 20 = 980. income_excess = max(980 - 994, 0) = 0.
    # PAA = 285.
    md_paa: [285]

