# Integration tests for Maryland Public Assistance to Adults (PAA).
# Verifies the full federal SSI → state PAA chain. Per PAA Manual §500.8
# and AT 23-02, the SSI cash payment counts as unearned income for PAA
# (with the $20 disregard). All scenarios use 2026-01 (PNA = $106).
# 2026 SSI individual FBR = $994/mo.

- name: Case 1, single SSI recipient in CARE_HOME_LEVEL_B with no other income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_000
        employment_income: 0
        md_paa_living_arrangement: CARE_HOME_LEVEL_B
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # --- Federal SSI ---
    is_ssi_eligible: [true]
    ssi: [994]

    # --- PAA ---
    md_paa_eligible: [true]
    # countable_unearned = max(994 - 20, 0) = 974 (SSI counts as income).
    md_paa_countable_unearned_income: [974]
    md_paa_countable_earned_income: [0]
    md_paa_countable_income: [974]
    # provider_rate(875) + PNA(106) = 981 total cost of care.
    # PAA = max(981 - 974, 0) = 7.
    md_paa_provider_rate: [875]
    md_paa_personal_needs_allowance: [106]
    md_paa_total_cost_of_care: [981]
    md_paa: [7]

- name: Case 2, SSI recipient with $200/mo earned income in CARE_HOME_LEVEL_C.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        employment_income: 2_400  # $200/mo
        md_paa_living_arrangement: CARE_HOME_LEVEL_C
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # --- Federal SSI ---
    # Federal countable = max(0, 200 - 65 - 20) * 0.5 = 115 * 0.5 = 57.50.
    # SSI = 994 - 57.50 = 936.50/mo.
    is_ssi_eligible: [true]
    ssi: [936.50]

    # --- PAA ---
    md_paa_eligible: [true]
    # unearned = 936.50 (SSI) → countable_unearned = max(936.50 - 20, 0) = 916.50.
    # leftover_general = 0. effective earned disregard = $65.
    # countable_earned = max(200 - 65, 0) * 0.5 = 67.50.
    md_paa_countable_unearned_income: [916.50]
    md_paa_countable_earned_income: [67.50]
    md_paa_countable_income: [984]
    # provider_rate(1173) + PNA(106) = 1279.
    # PAA = max(1279 - 984, 0) = 295.
    md_paa_provider_rate: [1_173]
    md_paa_total_cost_of_care: [1_279]
    md_paa: [295]

- name: Case 3, SSI recipient with $400/mo non-SSI unearned income in ASSISTED_LIVING.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 800
        social_security: 4_800  # $400/mo OASI
        employment_income: 0
        md_paa_living_arrangement: ASSISTED_LIVING
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # --- Federal SSI ---
    # Federal countable unearned = 400 - 20 = 380/mo.
    # SSI = max(994 - 380, 0) = 614/mo.
    is_ssi_eligible: [true]
    ssi: [614]

    # --- PAA ---
    md_paa_eligible: [true]
    # unearned for PAA = ssi(614) + ssi_unearned_income(400 from social_security) = 1014.
    # countable_unearned = max(1014 - 20, 0) = 994.
    # Assisted Living → no earned disregard, but earned = 0 here.
    md_paa_countable_unearned_income: [994]
    md_paa_countable_earned_income: [0]
    md_paa_countable_income: [994]
    # provider_rate(894) + PNA(106) = 1000.
    # PAA = max(1000 - 994, 0) = 6.
    md_paa_provider_rate: [894]
    md_paa_total_cost_of_care: [1_000]
    md_paa: [6]

- name: Case 4, REHAB_RESIDENCE recipient with only SSI receives only the PNA.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        employment_income: 0
        md_paa_living_arrangement: REHAB_RESIDENCE
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # --- Federal SSI ---
    is_ssi_eligible: [true]
    ssi: [994]

    # --- PAA ---
    # post_disregard_income = max(994 - 20, 0) = 974.
    # cost_of_need_ceiling = $54 * 30 = 1620.
    # rehab_countable = max(974 - 1620, 0) = 0.
    # PAA = provider_rate(0) + PNA(106) - countable(0) = 106.
    md_paa_eligible: [true]
    md_paa_countable_income: [0]
    md_paa_provider_rate: [0]
    md_paa_personal_needs_allowance: [106]
    md_paa: [106]

- name: Case 5, married couple both SSI-eligible in CARE_HOME_LEVEL_A treated as two individuals.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi: 8_946  # $745.50/mo (couple FBR $1,491 / 2) as input
        ssi_countable_resources: 1_000
        employment_income: 0
        md_paa_living_arrangement: CARE_HOME_LEVEL_A
      person2:
        age: 68
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi: 8_946
        ssi_countable_resources: 1_000
        employment_income: 0
        md_paa_living_arrangement: CARE_HOME_LEVEL_A
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MD
  output:
    # Per SSA 2011: Maryland treats couples as two individuals.
    # Each spouse: countable_unearned = max(745.50 - 20, 0) = 725.50.
    # PAA per spouse = max(776 + 106 - 725.50, 0) = 156.50.
    md_paa_eligible: [true, true]
    md_paa_provider_rate: [776, 776]
    md_paa_personal_needs_allowance: [106, 106]
    md_paa_countable_unearned_income: [725.50, 725.50]
    md_paa: [156.50, 156.50]

