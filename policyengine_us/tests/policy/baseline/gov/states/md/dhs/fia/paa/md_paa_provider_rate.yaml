- name: Case 6, REHAB_RESIDENCE provider rate is zero.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 9_600  # gates md_paa_eligible (defined_for on this variable)
        md_paa_living_arrangement: REHAB_RESIDENCE
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    # Per PAA Manual §400 and §900.3, MDH pays the provider directly for
    # Rehabilitative Residence cases, so PAA's provider rate is zero. PAA
    # contributes only the personal needs allowance.
    md_paa_provider_rate: 0

- name: Case 7, NONE living arrangement returns zero.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        md_paa_living_arrangement: NONE
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_provider_rate: 0

# Pre-2021 dates use the 2011 cost-of-care derivation (SSA 2011 combined
# need minus the $82 PNA inferred from REHAB combined). Values forward-fill
# from 2011 until the 2021 update from AT 23-02.
- name: Case 8, pre-2021 period uses 2011-derived CARE_HOME_LEVEL_C rate.
  period: 2020-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 9_600  # gates md_paa_eligible (defined_for on this variable)
        md_paa_living_arrangement: CARE_HOME_LEVEL_C
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_provider_rate: 1_055

