        members: [person1]
        state_code: MD
  output:
    md_paa_provider_rate: 858

# Pre/post 2018-01-01 transition: the test runner only supports January
# (or whole-year) periods, so the rate jump first documented in AT 18-11
# is verified by pairing 2010-01 (Cases 8 and 9 above) with 2018-01 below.
- name: Case 10, 2018-01 CARE_HOME_LEVEL_C jumps to $1,173 (AT 18-11 effective).
  period: 2018-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 800  # gates md_paa_eligible (defined_for on this variable)
