# Pre-2021 dates use forward-fill: rates were first set 2021-01-01 in the
# parameter file, so PolicyEngine returns the 2021 value for any earlier
# period (rates have been frozen since 2021).
- name: Case 8, pre-2021 period uses forward-filled CARE_HOME_LEVEL_C rate.
  period: 2020-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 9_600  # gates md_paa_eligible (defined_for on this variable)
        md_paa_living_arrangement: CARE_HOME_LEVEL_C
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_provider_rate: 1_173

