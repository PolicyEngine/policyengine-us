# Tests for md_paa_provider_rate variable.
# Rate is determined by md_paa_living_arrangement enum.
# Each tier has at least one test (per testing-patterns: every dimension value).
# Current rates effective 2018-01-01 onwards (per AT 18-11; unchanged through
# every subsequent COLA Mass Mod including AT 23-02).

- name: Case 1, CARE_HOME_LEVEL_A.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 800  # gates md_paa_eligible (defined_for on this variable)
        md_paa_living_arrangement: CARE_HOME_LEVEL_A
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_provider_rate: 776

