        md_paa_living_arrangement: NONE
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_provider_rate: 0

# Pre-2018 dates use the COMAR 07.03.07.04(B)(2)/(C)(2) "Effective
# January 1, 2009" schedule. Values forward-fill from 2009 until the
# 2018 update first documented in AT 18-11.
- name: Case 8, pre-2018 period uses COMAR 2009 CARE_HOME_LEVEL_C rate.
  period: 2010-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 800  # gates md_paa_eligible (defined_for on this variable)
        md_paa_living_arrangement: CARE_HOME_LEVEL_C
    households:
      household:
        members: [person1]
        state_code: MD
  output:
    md_paa_provider_rate: 1_137

- name: Case 9, pre-2018 period uses COMAR 2009 ASSISTED_LIVING rate.
  period: 2010-01
