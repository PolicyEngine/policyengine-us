- name: Households that are in pregnant category are eligible.
  period: 2018-01
  input:
    wic_food_package_str: PREGNANT_SINGLETON
    is_wic_eligible: true
    would_claim_wic: true
  output:
    wic: 39.12

- name: Amount is 0 if not passing the wic_eligible test.
  period: 2022-01
  input:
    wic_food_package_str: INFANT_AVERAGE
    is_wic_eligible: false
  output:
    wic: 0

- name: Households that are in postpartum category are eligible.
  period: 2018-01
  input:
    wic_food_package_str: POSTPARTUM_NON_BREASTFEEDING
    is_wic_eligible: true
    would_claim_wic: true
  output:
    wic: 32.27

- name: Meets eligible test but not one of the WIC demographic categories.
  period: 2022-01
  input:
    wic_food_package_str: NONE
    is_wic_eligible: true
  output:
    wic: 0

- name: Eligible breastfeeding individuals. Verifies uprating.
  period: 2022-01
  input:
    wic_food_package_str: FULLY_BREASTFEEDING
    is_wic_eligible: true
    would_claim_wic: true
  output:
    # Multiply by ratio of 2022-01 to 2018-01 CPI-U.
    wic: 48.92 * 281.148 / 247.867

- name: Current child packages use the current cash-value benefit amount.
  period: 2024-01
  input:
    wic_food_package_str: CHILD_24_59_MONTHS
    is_wic_eligible: true
    would_claim_wic: true
  output:
    # 2018 package value less the uprated embedded $8 CVB, plus the FY 2024 $26 CVB.
    wic: 33.65 * 309.794 / 247.867 - 8 * 309.794 / 247.867 + 26

- name: Multiple-fetus pregnancy package uses the package V-B cash-value benefit amount.
  period: 2024-01
  input:
    wic_food_package_str: PREGNANT_MULTIPLE_FETUSES
    is_wic_eligible: true
    would_claim_wic: true
  output:
    # Food Package V-B uses the breastfeeding/partially breastfeeding CVB amount.
    wic: 39.12 * 309.794 / 247.867 - 11 * 309.794 / 247.867 + 52
