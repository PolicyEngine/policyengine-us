- name: Case 1, has dependent child, meets both work requirements.
  period: 2022
  input:
    meets_snap_general_work_requirements: true
    meets_snap_abawd_work_requirements: true
    monthly_age: 17
    is_tax_unit_dependent: true
  output: 
    meets_snap_work_requirements: true

- name: Case 2, has dependent child, meets the general work requirements.
  period: 2022
  input:
    meets_snap_general_work_requirements: true
    meets_snap_abawd_work_requirements: false
    monthly_age: 17
    is_tax_unit_dependent: true
  output: 
    meets_snap_work_requirements: true

- name: Case 3, no dependent child, meets only one work requirements.
  period: 2022
  input:
    meets_snap_general_work_requirements: false
    meets_snap_abawd_work_requirements: true
    monthly_age: 18
    is_tax_unit_dependent: false
  output: 
    meets_snap_work_requirements: false

- name: Case 4, no dependent child, meets both work requirements.
  period: 2022
  input:
    meets_snap_general_work_requirements: true
    meets_snap_abawd_work_requirements: true
    monthly_age: 18
    is_tax_unit_dependent: false
  output:
    meets_snap_work_requirements: true

- name: Case 5, CA pre-HR1 age 55 exempt flows through SPM.
  period: 2026-01
  input:
    people:
      person1:
        age: 55
        weekly_hours_worked_before_lsr: 1
        is_disabled: false
        meets_snap_general_work_requirements: true
    spm_units:
      spm_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CA
  output:
    meets_snap_work_requirements: true

- name: Case 6, non-CA post-HR1 age 55 not exempt.
  period: 2026-01
  input:
    people:
      person1:
        age: 55
        weekly_hours_worked_before_lsr: 1
        is_disabled: false
        meets_snap_general_work_requirements: true
    spm_units:
      spm_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    meets_snap_work_requirements: false

- name: Case 7, two adults remain eligible when one adult passes.
  period: 2024-01
  input:
    people:
      person1:
        monthly_age: 35
        is_tax_unit_dependent: false
        meets_snap_general_work_requirements: true
        meets_snap_abawd_work_requirements: true
      person2:
        monthly_age: 30
        is_tax_unit_dependent: false
        meets_snap_general_work_requirements: false
        meets_snap_abawd_work_requirements: false
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    meets_snap_work_requirements: true

- name: Case 8, two adults are ineligible when both adults fail.
  period: 2024-01
  input:
    people:
      person1:
        monthly_age: 35
        is_tax_unit_dependent: false
        meets_snap_general_work_requirements: false
        meets_snap_abawd_work_requirements: false
      person2:
        monthly_age: 30
        is_tax_unit_dependent: false
        meets_snap_general_work_requirements: false
        meets_snap_abawd_work_requirements: false
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    meets_snap_work_requirements: false

- name: Case 9, two adults remain eligible when both adults pass.
  period: 2024-01
  input:
    people:
      person1:
        monthly_age: 35
        is_tax_unit_dependent: false
        meets_snap_general_work_requirements: true
        meets_snap_abawd_work_requirements: true
      person2:
        monthly_age: 30
        is_tax_unit_dependent: false
        meets_snap_general_work_requirements: true
        meets_snap_abawd_work_requirements: true
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    meets_snap_work_requirements: true

- name: Case 10, work program participant passes the general check but not the ABAWD check.
  period: 2024-01
  input:
    people:
      person1:
        monthly_age: 30
        is_tax_unit_dependent: false
        is_snap_work_program_participant: true
        weekly_hours_worked_before_lsr: 0
    spm_units:
      spm_unit:
        members: [person1]
  output:
    meets_snap_general_work_requirements: true
    meets_snap_abawd_work_requirements: false
    meets_snap_work_requirements: false

- name: Case 11, non-working parent of a teenager fails without the work program flag.
  period: 2024-01
  input:
    people:
      person1:
        monthly_age: 30
        is_tax_unit_dependent: false
        is_snap_work_program_participant: false
        weekly_hours_worked_before_lsr: 0
      person2:
        monthly_age: 17
        is_tax_unit_dependent: true
        weekly_hours_worked_before_lsr: 0
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    # Neither member passes the general check: the parent is non-exempt
    # and not working, and the 17-year-old is past the under-16 age
    # exemption.
    meets_snap_general_work_requirements: [false, false]
    meets_snap_work_requirements: false

- name: Case 12, the work program flag makes the same household pass.
  period: 2024-01
  input:
    people:
      person1:
        monthly_age: 30
        is_tax_unit_dependent: false
        is_snap_work_program_participant: true
        weekly_hours_worked_before_lsr: 0
      person2:
        monthly_age: 17
        is_tax_unit_dependent: true
        weekly_hours_worked_before_lsr: 0
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    # The dependent child under 18 waives the ABAWD check (pre-HR1), so
    # the parent's work program participation alone flips the unit from
    # failing to passing.
    meets_snap_general_work_requirements: [true, false]
    meets_snap_work_requirements: true
