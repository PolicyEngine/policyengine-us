- name: Case 1, has dependent child, meets both work requirements.
  period: 2022
  input:
    meets_snap_general_work_requirements: true
    meets_snap_abawd_work_requirements: true
    monthly_age: 17
    is_tax_unit_dependent: true
  output: 
    meets_snap_work_requirements: true

- name: Case 2, has dependent child, meets the general work requirements.
  period: 2022
  input:
    meets_snap_general_work_requirements: true
    meets_snap_abawd_work_requirements: false
    monthly_age: 17
    is_tax_unit_dependent: true
  output: 
    meets_snap_work_requirements: true

- name: Case 3, no dependent child, meets only one work requirements.
  period: 2022
  input:
    meets_snap_general_work_requirements: false
    meets_snap_abawd_work_requirements: true
    monthly_age: 18
    is_tax_unit_dependent: false
  output: 
    meets_snap_work_requirements: false

- name: Case 4, no dependent child, meets both work requirements.
  period: 2022
  input:
    meets_snap_general_work_requirements: true
    meets_snap_abawd_work_requirements: true
    monthly_age: 18
    is_tax_unit_dependent: false
  output:
    meets_snap_work_requirements: true

- name: Case 5, CA pre-HR1 age 55 exempt flows through SPM.
  period: 2026-01
  input:
    people:
      person1:
        age: 55
        weekly_hours_worked_before_lsr: 1
        is_disabled: false
        meets_snap_general_work_requirements: true
    spm_units:
      spm_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CA
  output:
    meets_snap_work_requirements: true

- name: Case 6, non-CA post-HR1 age 55 not exempt.
  period: 2026-01
  input:
    people:
      person1:
        age: 55
        weekly_hours_worked_before_lsr: 1
        is_disabled: false
        meets_snap_general_work_requirements: true
    spm_units:
      spm_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    meets_snap_work_requirements: false

- name: Case 7, two adults, one passes one fails, unit eligible (per-person disqualification).
  # Per 7 CFR 273.7(f)(1), the non-compliant adult is individually
  # disqualified and excluded; the remaining member continues.
  period: 2024-01
  input:
    people:
      adult_a:
        age: 35
        weekly_hours_worked_before_lsr: 40
      adult_b:
        age: 30
        weekly_hours_worked_before_lsr: 0
    spm_units:
      spm_unit:
        members: [adult_a, adult_b]
    tax_units:
      tax_unit:
        members: [adult_a, adult_b]
    households:
      household:
        members: [adult_a, adult_b]
        state_code: CA
  output:
    meets_snap_work_requirements: true

- name: Case 8, two adults, both fail, unit ineligible.
  period: 2024-01
  input:
    people:
      adult_a:
        age: 35
        weekly_hours_worked_before_lsr: 0
      adult_b:
        age: 30
        weekly_hours_worked_before_lsr: 0
    spm_units:
      spm_unit:
        members: [adult_a, adult_b]
    tax_units:
      tax_unit:
        members: [adult_a, adult_b]
    households:
      household:
        members: [adult_a, adult_b]
        state_code: CA
  output:
    meets_snap_work_requirements: false

- name: Case 9, two adults both pass, unit eligible (regression guard).
  period: 2024-01
  input:
    people:
      adult_a:
        age: 35
        weekly_hours_worked_before_lsr: 40
      adult_b:
        age: 30
        weekly_hours_worked_before_lsr: 35
    spm_units:
      spm_unit:
        members: [adult_a, adult_b]
    tax_units:
      tax_unit:
        members: [adult_a, adult_b]
    households:
      household:
        members: [adult_a, adult_b]
        state_code: CA
  output:
    meets_snap_work_requirements: true
