- name: No assets
  period: 2024
  input:
    people:
      person:
        bank_account_assets: 0
        stock_assets: 0
        bond_assets: 0
    spm_units:
      spm_unit:
        members: [person]
  output:
    snap_assets: 0

- name: Bank account only
  period: 2024
  input:
    people:
      person:
        bank_account_assets: 1_500
        stock_assets: 0
        bond_assets: 0
    spm_units:
      spm_unit:
        members: [person]
  output:
    snap_assets: 1_500

- name: All liquid asset types
  period: 2024
  input:
    people:
      person:
        bank_account_assets: 1_000
        stock_assets: 500
        bond_assets: 200
    spm_units:
      spm_unit:
        members: [person]
  output:
    snap_assets: 1_700

- name: Multiple people in SPM unit
  period: 2024
  input:
    people:
      person1:
        bank_account_assets: 1_000
        stock_assets: 300
        bond_assets: 0
      person2:
        bank_account_assets: 500
        stock_assets: 0
        bond_assets: 200
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    snap_assets: 2_000
