- name: Case 6, wrong allowance type returns zero for LUA.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    snap_utility_allowance_type: SUA
    snap_utility_region_str: CO
  output:
    snap_limited_utility_allowance: 0
    # LUA formula returns 0 when allowance type is not LUA

- name: Case 7, NC household-size-varying LUA FY2019.
  period: 2019-01
  absolute_error_margin: 0.01
  input:
    snap_utility_allowance_type: LUA
    snap_utility_region_str: NC
    spm_unit_size: 3
    phone_expense: 20
    water_expense: 1
  output:
    snap_limited_utility_allowance: 297
    # NC size 3 LUA = 297 per FY2019 SNAP QC Tech Doc Table F.7

