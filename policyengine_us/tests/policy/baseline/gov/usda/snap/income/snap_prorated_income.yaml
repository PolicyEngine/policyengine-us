        child_support_expense: 2_400
        is_snap_immigration_status_eligible: false
    spm_units:
      spm_unit:
        members: [a, b]
    tax_units:
      tax_unit:
        members: [a, b]
    households:
      household:
        members: [a, b]
        state_code: CA
  output:
    # a: $200/mo × share 1.0 = $200; b: $200/mo × share 0.5 = $100; total $300
    snap_child_support_expense: 300

- name: Work-requirement-disqualified member's income counts in full (entirety treatment under (c)(1)).
  period: 2024-01
  input:
    people:
      a:
        age: 35
        is_snap_immigration_status_eligible: true
        weekly_hours_worked_before_lsr: 40
        employment_income: 24_000
      b:
        age: 30
        is_snap_immigration_status_eligible: true
        weekly_hours_worked_before_lsr: 0
        employment_income: 24_000
    spm_units:
      spm_unit:
        members: [a, b]
    tax_units:
      tax_unit:
        members: [a, b]
    households:
      household:
        members: [a, b]
        state_code: CA
  output:
    snap_unit_size: 1                              # b excluded from size
    snap_prorated_earned_income_reduction: 0       # (c)(1) entirety, no reduction
    snap_earned_income: 4_000                      # full $2k/mo each
