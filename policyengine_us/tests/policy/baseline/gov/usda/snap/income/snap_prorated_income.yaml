# Tests for SNAP income and expense proration under 7 CFR 273.11(c)(2) / (c)(3)
# for members disqualified under the "prorated" treatment (ABAWDs who exceed
# the time limit, immigration-ineligible members). For each prorated member, income
# is divided evenly among all household members and only the portion that
# would go to eligible members is counted.

- name: No prorated-disqualified members — no proration.
  period: 2024-01
  input:
    people:
      a:
        age: 40
        is_snap_immigration_status_eligible: true
        weekly_hours_worked_before_lsr: 40
        employment_income: 24_000
      b:
        age: 38
        is_snap_immigration_status_eligible: true
        weekly_hours_worked_before_lsr: 40
        employment_income: 12_000
    spm_units:
      spm_unit:
        members: [a, b]
    tax_units:
      tax_unit:
        members: [a, b]
    households:
      household:
        members: [a, b]
        state_code: CA
  output:
    snap_prorated_earned_income_reduction: 0
    snap_prorated_unearned_income_reduction: 0
    snap_earned_income: 3_000   # $36k annual / 12

- name: 4-person household with 1 immigration-ineligible member — 1/4 of their earned income excluded.
  period: 2024-01
  input:
    people:
      a:
        age: 40
        is_snap_immigration_status_eligible: true
        weekly_hours_worked_before_lsr: 40
        employment_income: 24_000
      b:
        age: 38
        is_snap_immigration_status_eligible: true
        weekly_hours_worked_before_lsr: 40
        employment_income: 24_000
      c:
        age: 20
        is_snap_immigration_status_eligible: true
        weekly_hours_worked_before_lsr: 40
        employment_income: 24_000
      d:
        age: 19
        weekly_hours_worked_before_lsr: 40
        employment_income: 24_000
        is_snap_immigration_status_eligible: false
    spm_units:
      spm_unit:
        members: [a, b, c, d]
    tax_units:
      tax_unit:
        members: [a, b, c, d]
    households:
      household:
        members: [a, b, c, d]
        state_code: CA
  output:
    snap_unit_size: 3
    snap_prorated_earned_income_reduction: 500   # $2k/mo × 1/4
    snap_earned_income: 7_500                    # $8k raw − $500

- name: 2-person household with 1 immigration-ineligible member — 1/2 of their income excluded.
  period: 2024-01
  input:
    people:
      a:
        age: 40
        is_snap_immigration_status_eligible: true
        weekly_hours_worked_before_lsr: 40
        employment_income: 12_000
      b:
        age: 19
        weekly_hours_worked_before_lsr: 40
        employment_income: 12_000
        is_snap_immigration_status_eligible: false
    spm_units:
      spm_unit:
        members: [a, b]
    tax_units:
      tax_unit:
        members: [a, b]
    households:
      household:
        members: [a, b]
        state_code: CA
  output:
    snap_unit_size: 1
    snap_prorated_earned_income_reduction: 500   # b's $1k/mo × 1/2
    snap_earned_income: 1_500                    # $2k raw − $500

- name: ABAWD time-limit failure uses prorated treatment.
  period: 2024-01
  input:
    people:
      a:
        age: 40
        is_snap_immigration_status_eligible: true
        employment_income: 12_000
        meets_snap_general_work_requirements: true
        meets_snap_abawd_work_requirements: true
      b:
        age: 30
        is_snap_immigration_status_eligible: true
        employment_income: 12_000
        meets_snap_general_work_requirements: true
        meets_snap_abawd_work_requirements: false
    spm_units:
      spm_unit:
        members: [a, b]
    tax_units:
      tax_unit:
        members: [a, b]
    households:
      household:
        members: [a, b]
        state_code: CA
  output:
    snap_unit_size: 1
    snap_prorated_earned_income_reduction: 500
    snap_earned_income: 1_500

