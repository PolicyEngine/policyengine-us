- name: Federal work study participant income is excluded from SNAP earned income
  period: 2024-01
  input:
    employment_income: 12_000
    is_federal_work_study_participant: true
  output:
    snap_countable_earner: false
    snap_earned_income: 0

- name: Non-work study participant income is counted in SNAP earned income
  period: 2024-01
  input:
    employment_income: 12_000
    is_federal_work_study_participant: false
  output:
    snap_countable_earner: true
    snap_earned_income: 1_000

- name: Work study participant meets student work exception
  period: 2024
  input:
    is_federal_work_study_participant: true
  output:
    meets_snap_work_exception: true

- name: Case 4, work-requirement-ineligible adult earned income is prorated.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        monthly_age: 35
        is_tax_unit_dependent: false
        meets_snap_general_work_requirements: true
        meets_snap_abawd_work_requirements: true
      person2:
        monthly_age: 30
        is_tax_unit_dependent: false
        employment_income:
          2024: 12_000
        meets_snap_general_work_requirements: false
        meets_snap_abawd_work_requirements: false
    spm_units:
      spm_unit:
        members: [person1, person2]
  output:
    snap_work_requirement_income_proration_fraction: [1, 0.5]
    snap_earned_income: 500
