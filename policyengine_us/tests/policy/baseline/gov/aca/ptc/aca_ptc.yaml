- name: ACA PTC returns zero before 2024
  absolute_error_margin: 0.01
  period: 2023
  input:
    is_aca_ptc_eligible: true
    slcsp: 1_200
    aca_magi: 25_000
    aca_required_contribution_percentage: 0.04
  output:
    aca_ptc: 0

- name: ACA PTC calculated for 2025
  absolute_error_margin: 0.01
  period: 2025
  input:
    is_aca_ptc_eligible: true
    slcsp: 1_200
    aca_magi: 25_000
    aca_required_contribution_percentage: 0.04
    tax_unit_is_filer: true
  output:
    aca_ptc: 200  # 1200 - 0.04 * 25000 = 200

- name: ACA PTC floors at zero when contribution exceeds plan cost
  absolute_error_margin: 0.01
  period: 2025
  input:
    is_aca_ptc_eligible: true
    slcsp: 1_200
    aca_magi: 25_000
    aca_required_contribution_percentage: 0.05
  output:
    aca_ptc: 0  # 1200 - 0.05 * 25000 = -50, floored to 0

- name: ACA PTC zero when not eligible
  absolute_error_margin: 0.01
  period: 2025
  input:
    is_aca_ptc_eligible: false
    slcsp: 1_200
    aca_magi: 25_000
    aca_required_contribution_percentage: 0.04
  output:
    aca_ptc: 0

- name: ACA PTC remains available even when an eligible tax unit does not take it up
  absolute_error_margin: 0.01
  period: 2025
  input:
    is_aca_ptc_eligible: true
    slcsp: 1_200
    aca_magi: 25_000
    aca_required_contribution_percentage: 0.04
    takes_up_aca_if_eligible: false
    tax_unit_is_filer: true
  output:
    aca_ptc: 200

- name: ACA PTC is zero for non-filers (IRC 36B(a) requires filing Form 8962)
  absolute_error_margin: 0.01
  period: 2025
  input:
    is_aca_ptc_eligible: true
    slcsp: 1_200
    aca_magi: 25_000
    aca_required_contribution_percentage: 0.04
    tax_unit_is_filer: false
  output:
    aca_ptc: 0

- name: ACA PTC is paid to eligible filers (regression of filer gate)
  absolute_error_margin: 0.01
  period: 2025
  input:
    is_aca_ptc_eligible: true
    slcsp: 1_200
    aca_magi: 25_000
    aca_required_contribution_percentage: 0.04
    tax_unit_is_filer: true
  output:
    aca_ptc: 200
