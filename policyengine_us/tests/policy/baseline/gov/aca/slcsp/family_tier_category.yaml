- name: NY single adult
  period: 2023
  input:
    people:
      person1:
        age: 30
        pays_aca_premium: true
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code_str: NY
        state_fips: 36
  output:
    slcsp_family_tier_category: ONE_ADULT

