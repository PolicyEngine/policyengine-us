# =============================================================================
# Helper Variable Direct Assertions
# =============================================================================

- name: ARPA - Direct helper variable assertion for adult count
  period: 2021
  input:
    people:
      spouse1:
        age: 30
        ssn_card_type: CITIZEN
      spouse2:
        age: 30
        ssn_card_type: OTHER_NON_CITIZEN
      child:
        age: 10
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [spouse1, spouse2, child]
        filing_status: JOINT
  output:
    # Direct assertions on helper variables
    rrc_adult_count_with_valid_ssn: 1
    rrc_arpa_dependents_with_valid_ssn: 1
    # Final credit: 1 adult * $1,400 + 1 dependent * $1,400 = $2,800
    rrc_arpa: 2_800
