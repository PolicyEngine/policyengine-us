        age: 30
        ssn_card_type: CITIZEN
        employment_income: 85_000
    tax_units:
      tax_unit:
        members: [person]
  output:
    # $10,000 above threshold * 5% rate = $500 reduction
    # $1,200 - $500 = $700
    rrc_cares: 700

- name: CARES - Single filer with SSN fully phased out
  period: 2020
  input:
    people:
