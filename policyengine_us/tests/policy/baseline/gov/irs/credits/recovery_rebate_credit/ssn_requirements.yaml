        ssn_card_type: CITIZEN
        employment_income: 99_000
    tax_units:
      tax_unit:
        members: [person]
  output:
    # $24,000 above threshold * 5% rate = $1,200 reduction
    # $1,200 - $1,200 = $0
    rrc_cares: 0

- name: CARES - Joint with one SSN partial phase-out
  period: 2020
  input:
    people:
