- name: Pre-tax contributions exceed employment income.
  period: 2024
  input:
    employment_income: 100
    pre_tax_contributions: 200
  output:
    irs_employment_income: 0

- name: Pre-tax contributions do not exceed employment income.
  period: 2024
  input:
    employment_income: 100
    pre_tax_contributions: 30
  output:
    irs_employment_income: 70

- name: Health insurance premiums do not reduce IRS employment income.
  period: 2024
  input:
    employment_income: 100
    health_insurance_premiums_without_medicare_part_b: 20
    medicare_part_b_premiums: 30
  output:
    pre_tax_contributions: 0
    irs_employment_income: 100

- name: Explicit pre-tax health insurance premiums reduce IRS employment income.
  period: 2024
  input:
    employment_income: 100
    pre_tax_health_insurance_premiums: 20
  output:
    pre_tax_contributions: 20
    irs_employment_income: 80

- name: Retirement and HSA payroll deductions reduce IRS employment income.
  period: 2024
  input:
    employment_income: 100
    traditional_401k_contributions: 10
    traditional_403b_contributions: 5
    health_savings_account_payroll_contributions: 3
  output:
    pre_tax_contributions: 18
    irs_employment_income: 82
