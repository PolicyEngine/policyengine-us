        unemployment_compensation: 4_000
      spouse:
        age: 48
        employment_income: 20_000
        unemployment_compensation: 12_000
    tax_units:
      tax_unit:
        members: [head, spouse]
    marital_units:
      marital_unit:
        members: [head, spouse]
    families:
      family:
        members: [head, spouse]
    spm_units:
      spm_unit:
        members: [head, spouse]
    households:
      household:
        members: [head, spouse]
