- name: Case 1, post-2018 alimony payments are excluded from above-the-line deductions.
  period: 2026
  input:
    people:
      person1:
        is_tax_unit_head: true
        employment_income: 100_000
        alimony_expense: 10_000
        divorce_year: 2020
      person2:
        alimony_expense: 1_000
        divorce_year: 2018
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    alimony_expense_ald: 1_000
    above_the_line_deductions: 1_000
    adjusted_gross_income: 99_000

- name: Case 2, 2027 divorce agreements are not deductible by the payer.
  period: 2027
  input:
    people:
      person1:
        is_tax_unit_head: true
        employment_income: 100_000
        alimony_expense: 10_000
        divorce_year: 2027
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    alimony_expense_ald: 0
    above_the_line_deductions: 0
    adjusted_gross_income: 100_000
