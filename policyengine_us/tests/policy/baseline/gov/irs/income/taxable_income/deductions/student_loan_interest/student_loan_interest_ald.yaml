- name: One person with capped student loan interest, pre-reduction
  period: 2021
  input:
    people:
      person1:
        student_loan_interest: 3_000
        partnership_s_corp_income: 80_000
        student_loan_interest_ald_eligible: true
      person2:
        student_loan_interest: 0
        self_employment_income: 60_000
        student_loan_interest_ald_eligible: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: JOINT
  output:
    student_loan_interest_ald: [2_500, 0]

- name: Two people with student loan interest, with reduction
  period: 2021
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        student_loan_interest: 3_000
        student_loan_interest_ald_eligible: true
        irs_employment_income: 80_000
        is_tax_unit_dependent: false
      person2:
        student_loan_interest: 1_000
        self_employment_income: 80_000
        self_employment_tax_ald_person: 1_000
        is_tax_unit_dependent: false
        student_loan_interest_ald_eligible: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: JOINT
  # Joint return cap is $2,500 total (IRC § 221(b)(1)). With $4,000 of
  # combined interest, each spouse's share of the cap is proportional
  # to their interest: 75% / 25%. After the MAGI phase-out the residual
  # is ~36.67% on each spouse's capped share.
  output:
    student_loan_interest_ald: [687.5, 229.16]

