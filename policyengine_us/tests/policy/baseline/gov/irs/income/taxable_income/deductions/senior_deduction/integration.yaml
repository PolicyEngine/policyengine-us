- name: Issue 8110 - per-senior phase-out at AGI $246,188
  period: 2025
  input:
    people:
      person1:
        age: 65
        is_tax_unit_head_or_spouse: true
        ssn_card_type: CITIZEN
      person2:
        age: 65
        is_tax_unit_head_or_spouse: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: JOINT
        adjusted_gross_income: 246_188
        salt_deduction: 0
        standard_deduction: 0
  output:
    # Excess MAGI: $246,188 - $150,000 = $96,188
    # Phase-out: 6% * $96,188 = $5,771.28
    # Per senior: max($6,000 - $5,771.28, 0) = $228.72
    # Total: $228.72 * 2 = $457.44
    additional_senior_deduction: 457.44

- name: Puerto Rico excluded income is added back for senior deduction MAGI
  period: 2025
  input:
    people:
      person1:
        age: 65
        employment_income: 84_000
        is_tax_unit_head_or_spouse: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 74_000
        puerto_rico_income: 10_000
        salt_deduction: 0
        standard_deduction: 0
  output:
    # MAGI = AGI + excluded Puerto Rico income = $84,000
    # Phase-out: 6% * ($84,000 - $75,000) = $540
    additional_senior_deduction_magi: 84_000
    additional_senior_deduction: 5_460

