- name: Social Security retirement benefits are an input variable
  period: 2024
  input:
    social_security_retirement: 18_000
  output:
    social_security_retirement: 18_000

- name: Social Security retirement benefits default to zero
  period: 2024
  output:
    social_security_retirement: 0

- name: SSA calculation internals do not flow into reported retirement benefits
  period: 2024
  input:
    ss_retirement_benefit_before_earnings_test: 24_000
  output:
    social_security_retirement: 0
