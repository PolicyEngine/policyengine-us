- name: Disabled
  period: 2024
  input:
    is_disabled: true
    ssi_engaged_in_sga: false
  output:
    is_ssi_disabled: true

- name: Engaged in SGA
  period: 2024
  input:
    is_disabled: true
    ssi_engaged_in_sga: true
  output:
    is_ssi_disabled: false

- name: Reported SSI does not imply disability in the model
  period: 2024
  input:
    ssi_reported: true
    is_disabled: false
    ssi_engaged_in_sga: false
  output:
    is_ssi_disabled: false

- name: Reported SSI and engaged in SGA
  period: 2024
  input:
    ssi_reported: true
    is_disabled: false
    ssi_engaged_in_sga: true
  output:
    is_ssi_disabled: false

- name: Blind status alone does not imply SSI disabled
  period: 2024
  input:
    is_blind: true
    is_disabled: false
    ssi_engaged_in_sga: false
  output:
    is_ssi_disabled: false

- name: Aged status alone does not imply SSI disabled
  period: 2024
  input:
    is_ssi_aged: true
    is_disabled: false
    ssi_engaged_in_sga: false
  output:
    is_ssi_disabled: false
