- name: Case 11, couple both eligible with PMV shelter support.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 67
        is_tax_unit_head: true
        ssi_receives_outside_shelter_support: true
      person2:
        age: 66
        is_tax_unit_spouse: true
        ssi_receives_outside_shelter_support: true
    marital_units:
      marital_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
  output:
    ssi_federal_living_arrangement: [OWN_HOUSEHOLD, OWN_HOUSEHOLD]
    # Couple FBR = 1,450/month. Each gets couple/2 = 725.
    ssi_amount_if_eligible: [725, 725]
    # Couple PMV = 1/3 x 1,450 + 20 = 503.33/month (per POMS SI 00835.901)
    ssi_pmv_amount: [503.33, 503.33]
    # Couple countable ISM = 503.33 - 20 = 483.33
    # Split: 483.33 / 2 = 241.67 each
    ssi_countable_income: [241.67, 241.67]
    # uncapped = 725 - 241.67 = 483.33
    uncapped_ssi: [483.33, 483.33]
    ssi: [483.33, 483.33]

- name: Case 12, deeming with PMV shelter support.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        is_tax_unit_head: true
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        is_ssi_spousal_deeming_applies: true
        ssi_receives_outside_shelter_support: true
        ssi_income_deemed_from_ineligible_spouse: 2_160
      person2:
        age: 38
        is_tax_unit_spouse: true
        is_ssi_aged_blind_disabled: false
    marital_units:
      marital_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
  output:
    # Per POMS SI 01320.150: deeming PMV = 1/6 x 1,450 + 10 = 251.67/month
    # Person2 (ineligible, no shelter) gets individual PMV (irrelevant, ISM = 0)
    ssi_pmv_amount: [251.67, 342.33]
    ssi_in_kind_support_and_maintenance: [251.67, 0]
    # Person1 countable:
    #   ISM = 251.67, after $20 exclusion = 231.67
    #   Spousal deemed = 2,160/12 = 180/month
    #   Total = 231.67 + 180 = 411.67
    ssi_countable_income: [411.67, 0]

- name: Case 13, PMV rebuttal with actual shelter value above PMV.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        ssi_receives_outside_shelter_support: true
        # Actual annual shelter value $6,000 exceeds PMV ($4,108)
        ssi_shelter_support_value: 6_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
  output:
    ssi_federal_living_arrangement: OWN_HOUSEHOLD
    ssi_pmv_applies: true
    # PMV annual = 342.33 * 12 = 4,108
    # Actual = 6,000 > PMV → capped at PMV
    # ISM monthly = 342.33 (PMV, not 500)
    ssi_in_kind_support_and_maintenance: 342.33
    # Countable = 342.33 - 20 = 322.33
    ssi_countable_income: 322.33
    # uncapped = 967 - 322.33 = 644.67
    uncapped_ssi: 644.67
    ssi: 644.67

