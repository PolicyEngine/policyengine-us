- name: Case A, single disabled parent with non eligible dependent child.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_disabled: true
      person2:
        age: 4
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
  output:
    ssi_amount_if_eligible: [967, 967]

