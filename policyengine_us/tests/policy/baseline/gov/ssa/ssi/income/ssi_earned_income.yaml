- name: Defaults to zero
  period: 2022
  output:
    ssi_earned_income: 0

- name: Otherwise sums across sources.
  period: 2022
  input:
    employment_income: 1
    self_employment_income: 1
    dividend_income: 5
  output:
    ssi_earned_income: 2

- name: Includes SSTB self-employment income.
  period: 2024
  input:
    sstb_self_employment_income: 100_000
  output:
    ssi_earned_income: 100_000
