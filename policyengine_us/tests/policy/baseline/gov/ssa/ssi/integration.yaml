- name: Case A, single filer with a child, only child disabled. 
  period: 2022
  input:
    people:
      person1:
        age: 34
        employment_income: 0
      person2:
        age: 12
        is_tax_unit_dependent: true
        is_ssi_aged_blind_disabled: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
  output:
    ssi: [0, 15_132]

- name: Case A1, single filer with a child, both disabled. 
  period: 2022
  input:
    people:
      person1:
        age: 34
        employment_income: 0
        is_ssi_aged_blind_disabled: true
      person2:
        age: 12
        is_tax_unit_dependent: true
        is_ssi_aged_blind_disabled: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
  output:
    ssi: [15_132, 15_132]

