- name: Case 1, disabled and not engaged in substantial gainful activity.
  period: 2024
  input:
    is_disabled: true
    ssi_engaged_in_sga: false
  output:
    meets_ssi_disability_criteria: true

- name: Case 2, disabled but engaged in substantial gainful activity.
  period: 2024
  input:
    is_disabled: true
    ssi_engaged_in_sga: true
  output:
    meets_ssi_disability_criteria: true

- name: Case 3, not disabled and not engaged in substantial gainful activity.
  period: 2024
  input:
    is_disabled: false
    ssi_engaged_in_sga: false
  output:
    meets_ssi_disability_criteria: false

- name: Data-provided SSA disability screen can identify SSI disability criteria
  period: 2024
  input:
    would_pass_ssa_disability_screen: true
    is_disabled: false
  output:
    meets_ssi_disability_criteria: true

- name: Data-provided SSA disability screen can exclude broad disability
  period: 2024
  input:
    would_pass_ssa_disability_screen: false
    is_disabled: true
  output:
    meets_ssi_disability_criteria: false
