- name: unit test 1 - surviving spouse, no extra premium
  period: 2025
  input:
    age: 65
    filing_status: SURVIVING_SPOUSE
    adjusted_gross_income:
      2023: 80_000  # IRMAA uses income from 2 years prior
    tax_exempt_interest_income:
      2023: 0
    is_medicare_eligible: true
    msp_income_eligible: false
    msp_asset_eligible: false
  output:
    medicare_part_b_premium: 2_220  # $185 * 12 months

