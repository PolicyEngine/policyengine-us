    state_code: CA
    age: 67
    is_medicare_eligible: true
    medicaid_enrolled: false
    msp_category: QMB
    base_part_a_premium: 0
    base_part_b_premium: 2_434.8
  output:
    # CA regular FMAP is 50%; total MSP cost is $5,334.80.
    msp_federal_cost: 2_667.4
    msp_state_cost: 2_667.4

