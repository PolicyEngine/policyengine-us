- name: Case 1, DC TANF work compliance is reused.
  period: 2026-01
  input:
    people:
      person1:
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked: 30
      person2:
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: DC
  output:
    meets_tanf_work_requirements: true

