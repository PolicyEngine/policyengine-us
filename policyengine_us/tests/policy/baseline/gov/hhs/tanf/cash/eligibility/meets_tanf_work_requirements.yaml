- name: Case 3, no modeled state TANF work compliance defaults false.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        weekly_hours_worked: 40
    spm_units:
      spm_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CA
  output:
