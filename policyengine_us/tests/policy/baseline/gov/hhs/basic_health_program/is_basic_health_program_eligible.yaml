# Regression: income below the 133% FPL BHP floor must fail eligibility
# even if the person is flagged as Medicaid-ineligible. Without an explicit
# floor, a low-income adult in a non-expansion state (or anyone whose
# Medicaid eligibility was overridden to false) would incorrectly qualify.
- name: BHP floor at 133 percent FPL excludes low-income adults even if Medicaid-ineligible
  period: 2025
  input:
    people:
      person:
        age: 30
        immigration_status: CITIZEN
        medicaid_income_level: 1.2
        is_medicaid_eligible: false
        is_chip_eligible: false
        is_aca_eshi_eligible: false
        is_medicare_eligible: false
    households:
      household:
        members: [person]
        state_code: MN
  output:
    is_basic_health_program_eligible: [false]

