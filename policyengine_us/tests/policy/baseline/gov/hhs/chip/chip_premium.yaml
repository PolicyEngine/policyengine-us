- name: Federal chip_premium defaults to zero for a state without a premium implementation.
  period: 2024
  input:
    people:
      child:
        is_chip_eligible: true
        is_chip_eligible_child: true
    tax_units:
      tax_unit:
        members: [child]
        tax_unit_medicaid_income_level: 2.00
    households:
      household:
        members: [child]
        state_code: VA
  output:
    chip_premium: 0

- name: Federal chip_premium aggregates Texas enrollment fee.
  period: 2024
  input:
    people:
      child:
        is_chip_eligible: true
        is_chip_eligible_child: true
    tax_units:
      tax_unit:
        members: [child]
        medicaid_magi: 100_000
        tax_unit_medicaid_income_level: 1.70
    households:
      household:
        members: [child]
        state_code: TX
  output:
    chip_premium: 35

