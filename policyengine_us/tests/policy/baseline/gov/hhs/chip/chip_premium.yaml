- name: Federal chip_premium defaults to zero for a state without a premium implementation.
  period: 2024
  input:
    people:
      child:
        is_chip_eligible: true
        is_chip_eligible_child: true
    tax_units:
      tax_unit:
        members: [child]
        tax_unit_medicaid_income_level: 2.00
    households:
      household:
        members: [child]
        state_code: VA
  output:
    chip_premium: 0

- name: Federal chip_premium aggregates Texas enrollment fee.
  period: 2024
  input:
    people:
      child:
        is_chip_eligible: true
        is_chip_eligible_child: true
    tax_units:
      tax_unit:
        members: [child]
        tax_unit_medicaid_income_level: 1.70
    households:
      household:
        members: [child]
        state_code: TX
  output:
    chip_premium: 35

- name: Federal chip_premium aggregates New York per-child premium.
  period: 2024
  input:
    people:
      child:
        is_chip_eligible: true
        is_chip_eligible_child: true
    tax_units:
      tax_unit:
        members: [child]
        tax_unit_medicaid_income_level: 2.40
    households:
      household:
        members: [child]
        state_code: NY
  output:
    chip_premium: 180

- name: Federal chip_premium aggregates Missouri family-size premium.
  period: 2024
  input:
    people:
      p:
        is_chip_eligible: false
      c1:
        is_chip_eligible: true
        is_chip_eligible_child: true
      c2:
        is_chip_eligible: true
        is_chip_eligible_child: true
    tax_units:
      tax_unit:
        members: [p, c1, c2]
        tax_unit_medicaid_income_level: 1.70
    households:
      household:
        members: [p, c1, c2]
        state_code: MO
  output:
    chip_premium: 372
