- name: Federal chip_premium defaults to zero for states without an implementation.
  period: 2024
  input:
    people:
      child:
        is_chip_eligible: true
    tax_units:
      tax_unit:
        members: [child]
        tax_unit_medicaid_income_level: 1.70
    households:
      household:
        members: [child]
        state_code: CA
  output:
    chip_premium: 0

- name: Federal chip_premium picks up the Texas enrollment fee.
  period: 2024
  input:
    people:
      child:
        is_chip_eligible: true
    tax_units:
      tax_unit:
        members: [child]
        tax_unit_medicaid_income_level: 1.70
    households:
      household:
        members: [child]
        state_code: TX
  output:
    chip_premium: 35
