- name: Case 1, federal Medicaid premium includes Michigan Healthy Michigan contributions.
  period: 2023
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
    tax_units:
      tax_unit:
        members: [person1]
        medicaid_magi: 18_000
        tax_unit_medicaid_income_level: 1.20
    households:
      household:
        members: [person1]
        state_code: MI
  output:
    medicaid_premium: 360

