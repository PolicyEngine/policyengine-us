- name: Case 1, SSI recipient in California qualifies through Section 1634.
  period: 2022
  input:
    ssi: 1
  output:
    is_ssi_recipient_for_medicaid: true

- name: Case 2, SSI recipient in Connecticut qualifies through 209(b) rules.
  period: 2026
  input:
    state_code: CT
    ssi: 12_000
    is_optional_senior_or_disabled_income_eligible: true
    is_optional_senior_or_disabled_asset_eligible: true
  output:
    is_ssi_recipient_for_medicaid: true

- name: Case 3, SSI recipient in Connecticut fails 209(b) income rules.
  period: 2026
  input:
    state_code: CT
    ssi: 12_000
    is_optional_senior_or_disabled_income_eligible: false
    tax_unit_fpg: 20_000
    medicaid_optional_senior_or_disabled_countable_income: 30_000
    medicaid_medically_needy_medical_expenses: 5_000
    is_optional_senior_or_disabled_asset_eligible: true
  output:
    is_ssi_recipient_for_medicaid: false

- name: Case 4, SSI recipient in Alaska qualifies through SSI criteria.
  period: 2026
  input:
    ssi: 1
    state_code: AK
  output:
    is_ssi_recipient_for_medicaid: true

- name: Case 6, SSI recipient in Illinois qualifies through 209(b) spenddown.
  period: 2026
  input:
    ssi: 12_000
    state_code: IL
    is_optional_senior_or_disabled_income_eligible: false
    tax_unit_fpg: 20_000
    medicaid_optional_senior_or_disabled_countable_income: 30_000
    medicaid_medically_needy_medical_expenses: 11_000
    is_optional_senior_or_disabled_asset_eligible: true
  output:
    is_ssi_recipient_for_medicaid: true

- name: Case 7, SSI recipient child in Missouri remains excluded from 209(b).
  period: 2026
  input:
    ssi: 12_000
    state_code: MO
    age: 10
    is_blind: false
    is_optional_senior_or_disabled_income_eligible: true
    is_optional_senior_or_disabled_asset_eligible: true
  output:
    is_ssi_recipient_for_medicaid: false

- name: Case 5, SSI recipient in Oklahoma qualifies through SSI criteria.
  period: 2026
  input:
    ssi: 1
    state_code: OK
  output:
    is_ssi_recipient_for_medicaid: true
