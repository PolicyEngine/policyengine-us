- name: No dependents, ineligible
  period: 2022
  input:
    tax_unit_count_dependents: 0
  output:
    is_parent_for_medicaid: false

- name: 1 dependent, under FPL limit, eligible in CA
  period: 2022
  input:
    tax_unit_count_dependents: 1
    medicaid_income_level: 1.13
  output:
    is_parent_for_medicaid: true

- name: 1 dependent, over FPL limit, ineligible in CA
  period: 2022
  input:
    tax_unit_count_dependents: 1
    medicaid_income_level: 1.15
  output:
    is_parent_for_medicaid: false

- name: Two-parent household under the income limit is eligible in TX
  period: 2025
  input:
    people:
      head:
        is_tax_unit_head: true
        is_tax_unit_dependent: false
        medicaid_income_level: 0.1
      spouse:
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        medicaid_income_level: 0.1
      child:
        is_tax_unit_dependent: true
        medicaid_income_level: 0.1
    tax_units:
      tax_unit:
        members: [head, spouse, child]
        filing_status: JOINT
        tax_unit_count_dependents: 1
    households:
      household:
        members: [head, spouse, child]
        state_code: TX
  output:
    is_parent_for_medicaid: [true, true, false]

- name: DC parent above the Medicaid ceiling is not parent-eligible after Healthy DC Plan starts
  period: 2026
  input:
    people:
      person1:
        age: 34
        medicaid_income_level: 1.5
    tax_units:
      tax_unit:
        members: [person1]
        tax_unit_count_dependents: 1
    households:
      household:
        members: [person1]
        state_code: DC
  output:
    is_parent_for_medicaid: [false]
