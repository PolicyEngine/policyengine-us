- name: Case 1, SNAP household member subject to work rules passes through.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 35
    spm_units:
      spm_unit:
        members: [person1]
        snap: 100
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    medicaid_community_engagement_pass_through_eligible: true

- name: Case 2, TANF work compliance passes through without SNAP.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 0
    spm_units:
      spm_unit:
        members: [person1]
        is_tanf_enrolled: true
        meets_tanf_work_requirements: true
    households:
      household:
        members: [person1]
        state_code: DC
  output:
    medicaid_community_engagement_pass_through_eligible: true

- name: Case 3, no SNAP or TANF pass-through fails.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 35
    spm_units:
      spm_unit:
        members: [person1]
        snap: 0
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    medicaid_community_engagement_pass_through_eligible: false

- name: Case 4, SNAP member exempt from work registration does not pass through.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        is_disabled: true
        weekly_hours_worked_before_lsr: 0
    spm_units:
      spm_unit:
        members: [person1]
        snap: 100
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    medicaid_community_engagement_pass_through_eligible: false

- name: Case 5, child in SNAP household is exempt from work rules.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 35
      person2:
        age: 10
        is_tax_unit_dependent: true
        weekly_hours_worked_before_lsr: 0
    spm_units:
      spm_unit:
        members: [person1, person2]
        snap: 100
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    medicaid_community_engagement_pass_through_eligible: [true, false]
