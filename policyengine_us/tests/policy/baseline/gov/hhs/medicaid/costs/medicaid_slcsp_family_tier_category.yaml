- name: Case 1, New York child-only unit uses child-only tier.
  period: 2026
  input:
    people:
      person1:
        age: 10
        is_tax_unit_dependent: true
        medicaid_enrolled: true
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: NY
  output:
    medicaid_slcsp_family_tier_category: CHILD_ONLY

- name: Case 2, Vermont child-only unit remains age rated.
  period: 2026
  input:
    people:
      person1:
        age: 10
        is_tax_unit_dependent: true
        medicaid_enrolled: true
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: VT
  output:
    medicaid_slcsp_family_tier_category: INDIVIDUAL_AGE_RATED

- name: Case 3, New York adult with child uses one-adult-with-children tier.
  period: 2026
  input:
    people:
      person1:
        age: 35
        medicaid_enrolled: true
      person2:
        age: 10
        is_tax_unit_dependent: true
        medicaid_enrolled: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NY
  output:
    medicaid_slcsp_family_tier_category: ONE_ADULT_AND_ONE_OR_MORE_CHILDREN

- name: Case 4, New York counts an age-29 tax dependent as a child, not a second adult.
  period: 2026
  input:
    people:
      person1:
        age: 50
        medicaid_enrolled: true
      person2:
        age: 29
        is_tax_unit_dependent: true
        medicaid_enrolled: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NY
  output:
    medicaid_slcsp_family_tier_category: ONE_ADULT_AND_ONE_OR_MORE_CHILDREN

- name: Case 5, New York child with non-Medicaid parents uses child-only tier.
  period: 2026
  input:
    people:
      person1:
        age: 10
        is_tax_unit_dependent: true
        medicaid_enrolled: true
      person2:
        age: 40
      person3:
        age: 40
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NY
  output:
    medicaid_slcsp_family_tier_category: CHILD_ONLY
