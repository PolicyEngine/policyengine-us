- name: Medicaid cost if enrolled is a data input.
  period: 2026
  input:
    medicaid_cost_if_enrolled: 12_000
  output: 
    medicaid_cost_if_enrolled: 12_000

- name: Medicaid cost remains zero when not enrolled.
  period: 2026
  input:
    medicaid_cost_if_enrolled: 12_000
    is_medicaid_eligible: false
  output: 
    medicaid_cost: 0

- name: Medicaid cost uses input when enrolled.
  period: 2026
  input:
    medicaid_cost_if_enrolled: 12_000
    is_medicaid_eligible: true
    takes_up_medicaid_if_eligible: true
  output: 
    medicaid_cost: 12_000

- name: A lone Texas enrollee's cost equals state per-capita Medicaid spending.
  period: 2026
  absolute_error_margin: 1
  input:
    people:
      person1:
        age: 40
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    # For a single household the cost index cancels, leaving TX spending / enrollment.
    medicaid_cost_if_enrolled: 13_708.50
