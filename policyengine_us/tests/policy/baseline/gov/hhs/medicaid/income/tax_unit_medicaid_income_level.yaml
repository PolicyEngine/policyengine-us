- name: Multiple people with income
  period: 2024
  input:
    people:
      head:
        current_pregnancies: 0
      spouse:
        current_pregnancies: 0
    tax_units:
      tax_unit:
        medicaid_magi: 20_440
        tax_unit_size: 2
        members: [head, spouse]
    households:
      household:
        state_group_str: CONTIGUOUS_US
  output:
    tax_unit_medicaid_income_level: 1

