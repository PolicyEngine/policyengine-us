- name: Medical-expense premiums use direct input when supplied.
  period: 2025
  input:
    health_insurance_premiums: 1_000
    health_insurance_premiums_without_medicare_part_b: 1_200
    medicare_part_b_premium: 2_400
  output:
    medical_expense_health_insurance_premiums: 1_000

- name: Medical-expense premiums fall back to non-Medicare and Medicare Part B premiums.
  period: 2025
  input:
    age: 65
    is_medicare_eligible: true
    medicare_enrolled: true
    health_insurance_premiums_without_medicare_part_b: 1_200
    medicare_part_b_premium: 2_400
  output:
    medical_expense_health_insurance_premiums: 3_600
