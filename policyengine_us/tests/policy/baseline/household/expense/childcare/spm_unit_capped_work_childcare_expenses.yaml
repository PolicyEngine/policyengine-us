- name: Combined work and childcare expenses are capped at the lower earner
  period: 2024
  absolute_error_margin: 0.001
  input:
    people:
      head:
        age: 35
        weeks_worked: 10
        employment_income: 40_000
        is_tax_unit_head: true
      spouse:
        age: 33
        weeks_worked: 20
        employment_income: 2_000
        is_tax_unit_spouse: true
      child:
        age: 8
    spm_units:
      spm_unit:
        members: [head, spouse, child]
        spm_unit_pre_subsidy_childcare_expenses: 2_000
  output:
    spm_unit_capped_work_childcare_expenses: 2_000

- name: Single-head units are capped at the head's earnings
  period: 2024
  absolute_error_margin: 0.001
  input:
    people:
      head:
        age: 41
        weeks_worked: 52
        employment_income: 1_500
        is_tax_unit_head: true
      child:
        age: 5
    spm_units:
      spm_unit:
        members: [head, child]
        spm_unit_pre_subsidy_childcare_expenses: 3_000
  output:
    spm_unit_capped_work_childcare_expenses: 1_500
