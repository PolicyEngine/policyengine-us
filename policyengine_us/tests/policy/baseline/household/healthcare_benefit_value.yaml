- name: AZ child
  period: 2023
  absolute_error_margin: 0.1
  input:
    households:
      household:
        state_code: AZ
        members: [person]
    people:
      person:
        is_infant_for_medicaid: true
        is_medicaid_eligible: true
        medicaid_cost_if_enrolled: 3_564.1
  output: 
    healthcare_benefit_value: 3_564.1

- name: Case 2, MSP limited-benefit cost is a healthcare benefit value.
  period: 2026
  absolute_error_margin: 0.01
  input:
    medicaid_cost: 0
    msp_cost: 2_434.8
  output:
    healthcare_benefit_value: 2_434.8

- name: Case 3, enrolled CHIP value is included in healthcare benefit value.
  period: 2026
  absolute_error_margin: 0.01
  input:
    state_code: AL
    is_chip_eligible: true
    takes_up_chip_if_eligible: true
    medicaid_cost: 0
    msp_cost: 0
    assigned_aca_ptc: 0
    co_omnisalud: 0
    or_healthier_oregon_cost: 0
  output:
    chip: 2_209.43
    healthcare_benefit_value: 2_209.43

- name: Case 4, CHIP-eligible non-enroller has no healthcare benefit value.
  period: 2026
  input:
    state_code: AL
    is_chip_eligible: true
    takes_up_chip_if_eligible: false
    medicaid_cost: 0
    msp_cost: 0
    assigned_aca_ptc: 0
    co_omnisalud: 0
    or_healthier_oregon_cost: 0
  output:
    chip: 0
    healthcare_benefit_value: 0

- name: Case 5, CHIP-ineligible person has no healthcare benefit value.
  period: 2026
  input:
    state_code: AL
    is_chip_eligible: false
    takes_up_chip_if_eligible: true
    medicaid_cost: 0
    msp_cost: 0
    assigned_aca_ptc: 0
    co_omnisalud: 0
    or_healthier_oregon_cost: 0
  output:
    chip: 0
    healthcare_benefit_value: 0
