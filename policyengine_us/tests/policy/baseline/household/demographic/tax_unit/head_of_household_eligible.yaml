- name: Default is single with no dependents.
  period: 2022
  output:
    head_of_household_eligible: false

- name: Unmarried with qualifying child is eligible for HOH.
  period: 2024
  input:
    people:
      parent:
        age: 40
        is_tax_unit_head: true
      child:
        age: 10
    tax_units:
      tax_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
  output:
    head_of_household_eligible: true

- name: Unmarried parent with 19-year-old non-student child (low income) qualifies for HOH.
  period: 2024
  input:
    people:
      parent:
        age: 45
        is_tax_unit_head: true
        employment_income: 50_000
      adult_child:
        age: 19
        is_full_time_student: false
        is_tax_unit_dependent: true
        is_tax_unit_spouse: false
        # Low income under $5,050 threshold
        employment_income: 3_000
    tax_units:
      tax_unit:
        members: [parent, adult_child]
    households:
      household:
        members: [parent, adult_child]
  output:
    # 19-year-old non-student fails qualifying child test but is a qualifying
    # relative with income below $5,050 threshold
    head_of_household_eligible: true

- name: Adult child with income over threshold does not qualify parent for HOH.
  period: 2024
  input:
    people:
      parent:
        age: 45
        is_tax_unit_head: true
        employment_income: 50_000
      adult_child:
        age: 19
        is_full_time_student: false
        is_tax_unit_dependent: true
        is_tax_unit_spouse: false
        # Income over $5,050 threshold
        employment_income: 10_000
    tax_units:
      tax_unit:
        members: [parent, adult_child]
    households:
      household:
        members: [parent, adult_child]
  output:
    # 19-year-old with income over threshold fails qualifying relative test
    head_of_household_eligible: false

- name: Married person does not qualify for head of household.
  period: 2024
  input:
    people:
      person1:
        age: 40
        is_tax_unit_head: true
      person2:
        age: 38
        is_tax_unit_spouse: true
      child:
        age: 10
    tax_units:
      tax_unit:
        members: [person1, person2, child]
    households:
      household:
        members: [person1, person2, child]
  output:
    head_of_household_eligible: false

- name: Person with no dependents does not qualify for head of household.
  period: 2024
  input:
    people:
      single_person:
        age: 35
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [single_person]
    households:
      household:
        members: [single_person]
  output:
    head_of_household_eligible: false

- name: Unrelated qualifying relative does not qualify for HOH per IRC 2(b)(3).
  period: 2024
  input:
    people:
      head:
        age: 40
        is_tax_unit_head: true
      unrelated_person:
        age: 25
        is_tax_unit_dependent: true
        is_tax_unit_spouse: false
        is_related_to_head_or_spouse: false
        employment_income: 1_000
    tax_units:
      tax_unit:
        members: [head, unrelated_person]
    households:
      household:
        members: [head, unrelated_person]
  output:
    # Unrelated household members are qualifying relatives under IRC 152(d)
    # but do not count for HOH purposes per IRC 2(b)(3)
    head_of_household_eligible: false

- name: Separated married filer with a qualifying child is treated as unmarried per IRC 7703(b).
  period: 2024
  input:
    people:
      parent:
        age: 38
        is_tax_unit_head: true
        is_separated: true
      child:
        age: 6
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [parent, child]
        # Filing as married filing separately while living apart from spouse.
    households:
      household:
        members: [parent, child]
  output:
    # IRC 7703(b)(1) "considered unmarried" path: separated filer with a child
    # qualifying-person abode qualifies for HOH.
    head_of_household_eligible: true

- name: Separated married filer with only a qualifying relative does not qualify per IRC 7703(b)(1).
  period: 2024
  input:
    people:
      head:
        age: 40
        is_tax_unit_head: true
        is_separated: true
      grandparent:
        age: 78
        is_tax_unit_dependent: true
        is_related_to_head_or_spouse: true
        employment_income: 1_000
    tax_units:
      tax_unit:
        members: [head, grandparent]
    households:
      household:
        members: [head, grandparent]
  output:
    # IRC 7703(b)(1) refers to "a child (within the meaning of section 152(f)(1))".
    # A qualifying relative alone is not sufficient for the treated-unmarried path,
    # so the separated filer does not qualify for HOH.
    head_of_household_eligible: false

- name: Surviving spouse takes precedence over the separated-with-qualifying-child HoH path
  period: 2024
  input:
    people:
      head:
        age: 38
        is_tax_unit_head: true
        is_separated: true
      child:
        age: 6
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [head, child]
        surviving_spouse_eligible: true
    households:
      household:
        members: [head, child]
  output:
    # head_of_household_eligible returns false when surviving_spouse_eligible
    # is true, even when the separated-with-qualifying-child path would
    # otherwise grant HoH.
    head_of_household_eligible: false

- name: Separated JOINT filer with qualifying child is NOT eligible for HoH
  # IRC 7703(b)(1) "considered unmarried" path requires filing a separate
  # return. A JOINT filer who happens to be separated forfeits the
  # treated-unmarried route by choosing joint filing status.
  period: 2024
  input:
    people:
      parent:
        age: 38
        is_tax_unit_head: true
        is_separated: true
      spouse:
        age: 36
        is_tax_unit_spouse: true
      child:
        age: 6
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [parent, spouse, child]
        filing_status: JOINT
    households:
      household:
        members: [parent, spouse, child]
  output:
    head_of_household_eligible: false
