- name: has_tin follows canonical has_tin input
  period: 2024
  input:
    has_tin: false
  output:
    has_tin: false

- name: has_tin derives true from taxpayer_id_type other TIN
  period: 2024
  input:
    taxpayer_id_type: OTHER_TIN
  output:
    has_tin: true

- name: has_tin derives false from taxpayer_id_type none
  period: 2024
  input:
    taxpayer_id_type: NONE
  output:
    has_tin: false

- name: has_tin does not infer TIN from other non-citizen SSN card type
  period: 2024
  input:
    ssn_card_type: OTHER_NON_CITIZEN
  output:
    has_tin: false

- name: has_tin stays true when canonical has_tin input is true
  period: 2024
  input:
    has_tin: true
  output:
    has_tin: true

- name: has_tin still follows legacy has_itin input during migration
  period: 2024
  input:
    has_itin: false
  output:
    has_tin: false

- name: has_tin stays true when legacy has_itin input is true
  period: 2024
  input:
    has_itin: true
  output:
    has_tin: true
