- name: has_valid_ssn follows canonical input
  period: 2024
  input:
    has_valid_ssn: false
  output:
    has_valid_ssn: false

- name: has_valid_ssn derives true from taxpayer_id_type valid SSN
  period: 2024
  input:
    taxpayer_id_type: VALID_SSN
  output:
    has_valid_ssn: true

- name: has_valid_ssn derives false from taxpayer_id_type other TIN
  period: 2024
  input:
    taxpayer_id_type: OTHER_TIN
  output:
    has_valid_ssn: false

- name: has_valid_ssn derives false from other non-citizen SSN card type
  period: 2024
  input:
    ssn_card_type: OTHER_NON_CITIZEN
  output:
    has_valid_ssn: false
