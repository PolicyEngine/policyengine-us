- name: SPM unit net income is market income plus benefits minus taxes.
  period: 2021
  input:
    spm_unit_market_income: 3
    spm_unit_benefits: 2
    spm_unit_taxes: 1
  output:
    spm_unit_net_income: 3 + 2 - 1

- name: SPM unit net income includes ACP and EBB broadband subsidies directly.
  period: 2022
  input:
    spm_unit_market_income: 3
    spm_unit_benefits: 0
    acp: 2
    ebb: 4
    spm_unit_taxes: 1
    spm_unit_spm_expenses: 0
  output:
    spm_unit_net_income: 3 + 2 + 4 - 1

- name: SPM unit net income includes Census SPM cash support leaves.
  period: 2024
  input:
    age: 30
    spm_unit_market_income: 0
    child_support_received: 1
    workers_compensation: 2
    educational_assistance: 3
    financial_assistance: 4
    survivor_benefits: 5
    spm_unit_energy_subsidy: 6
    social_security: 0
    ssi: 0
    ca_cvrp: 0
    snap: 0
    wic: 0
    free_school_meals: 0
    reduced_price_school_meals: 0
    tanf: 0
    high_efficiency_electric_home_rebate: 0
    residential_efficiency_electrification_rebate: 0
    unemployment_compensation: 0
    basic_income: 0
    acp: 0
    ebb: 0
    spm_unit_taxes: 0
    spm_unit_spm_expenses: 0
  output:
    spm_unit_net_income: 1 + 2 + 3 + 4 + 5 + 6
