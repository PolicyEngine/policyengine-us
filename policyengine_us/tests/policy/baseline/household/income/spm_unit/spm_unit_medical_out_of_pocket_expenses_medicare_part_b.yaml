- name: SPM unit MOOP includes residual premiums and rules-based Medicare Part B.
  period: 2024
  input:
    people:
      retiree:
        age: 70
        is_medicare_eligible: true
        health_insurance_premium_residual: 500
        income_adjusted_part_b_premium: 2_220
    tax_units:
      tax_unit:
        members: [retiree]
    spm_units:
      spm_unit:
        members: [retiree]
    households:
      household:
        members: [retiree]
        state_code: CA
  output:
    spm_unit_health_insurance_premiums: 2_720
    spm_unit_medical_out_of_pocket_expenses: 2_720

