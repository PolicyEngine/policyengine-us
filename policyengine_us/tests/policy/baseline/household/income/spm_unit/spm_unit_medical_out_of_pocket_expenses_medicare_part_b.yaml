- name: SPM unit MOOP includes other health insurance premiums and Medicare Part B.
  period: 2024
  input:
    people:
      retiree:
        age: 70
        is_medicare_eligible: true
        other_health_insurance_premiums: 500
        base_part_a_premium: 0
        medicare_part_b_premium: 2_220
    tax_units:
      tax_unit:
        members: [retiree]
    spm_units:
      spm_unit:
        members: [retiree]
    households:
      household:
        members: [retiree]
        state_code: CA
  output:
    spm_unit_health_insurance_premiums: 2_720
    spm_unit_medical_out_of_pocket_expenses: 2_720

