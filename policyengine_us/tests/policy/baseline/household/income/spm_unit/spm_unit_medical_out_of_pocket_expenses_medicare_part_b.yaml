      retiree:
        age: 70
        medicare_enrolled: true
        other_health_insurance_premiums: 500
        base_part_a_premium: 6_780
        msp_part_a_premium_coverage: 0
        medicare_part_b_premium: 4_654.80
        income_adjusted_part_d_premium_surcharge: 423.60
    tax_units:
      tax_unit:
        members: [retiree]
    spm_units:
