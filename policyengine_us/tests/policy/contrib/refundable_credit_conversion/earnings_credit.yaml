- name: Earnings credit applies per worker up to the per-worker cap
  period: 2026
  absolute_error_margin: 0.01
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.earnings_credit.use_earnings_credit: true
    gov.contrib.refundable_credit_conversion.earnings_credit.rate: 0.2
    gov.contrib.refundable_credit_conversion.earnings_credit.cap: 5_000
    people:
      filer:
        age: 35
        employment_income: 3_000
      spouse:
        age: 33
        employment_income: 10_000
    tax_units:
      tax_unit:
        members: [filer, spouse]
        filing_status: JOINT
  output:
    flat_refundable_credit: 1_600  # 0.2 * (3_000 + min(10_000, 5_000)) = 1_600

- name: Earnings credit toggle off — rate and cap ignored
  period: 2026
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.earnings_credit.use_earnings_credit: false
    gov.contrib.refundable_credit_conversion.earnings_credit.rate: 0.2
    gov.contrib.refundable_credit_conversion.earnings_credit.cap: 5_000
    people:
      filer:
        age: 35
        employment_income: 50_000
    tax_units:
      tax_unit:
        members: [filer]
        filing_status: SINGLE
  output:
    flat_refundable_credit: 0

