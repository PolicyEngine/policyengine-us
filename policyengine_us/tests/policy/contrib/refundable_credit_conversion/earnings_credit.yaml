- name: Combined wages and self-employment on one worker — sum then cap
  # earned_income includes employment_income + self_employment_income, so
  # cap applies to the per-worker total of $3,000 + $3,000 = $6,000,
  # capped at $5,000.
  period: 2026
  absolute_error_margin: 0.01
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.earnings_credit.use_earnings_credit: true
    gov.contrib.refundable_credit_conversion.earnings_credit.rate: 0.2
    gov.contrib.refundable_credit_conversion.earnings_credit.cap: 5_000
    people:
      filer:
        age: 35
        employment_income: 3_000
        self_employment_income: 3_000
    tax_units:
      tax_unit:
        members: [filer]
        filing_status: SINGLE
  output:
    flat_refundable_credit: 1_000  # 0.2 * min(6_000, 5_000)

- name: Dependent with earnings — credited under per-tax-unit aggregation
  # Pins the current behavior: every tax unit member's earnings, capped
  # individually, feed into the credit. A teen dependent with summer
  # wages contributes their own capped credit.
  period: 2026
  absolute_error_margin: 0.01
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.earnings_credit.use_earnings_credit: true
    gov.contrib.refundable_credit_conversion.earnings_credit.rate: 0.2
    gov.contrib.refundable_credit_conversion.earnings_credit.cap: 5_000
    people:
      filer:
        age: 35
        employment_income: 5_000
      teen:
        age: 16
        employment_income: 2_000
    tax_units:
      tax_unit:
        members: [filer, teen]
        filing_status: SINGLE
  output:
    flat_refundable_credit: 1_400  # 0.2 * (5_000 + 2_000)
