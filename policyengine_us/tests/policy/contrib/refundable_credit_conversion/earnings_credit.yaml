- name: Both workers above cap — per-person cap applies before aggregation
  # Regression guard for the sum(min(earnings, cap)) vs min(sum(earnings), cap)
  # ordering. If the cap were applied to the tax-unit total instead of
  # per-worker, this case would return 0.2 * 5_000 = 1_000 instead of 2_000.
  period: 2026
  absolute_error_margin: 0.01
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.earnings_credit.use_earnings_credit: true
    gov.contrib.refundable_credit_conversion.earnings_credit.rate: 0.2
    gov.contrib.refundable_credit_conversion.earnings_credit.cap: 5_000
    people:
      filer:
        age: 35
        employment_income: 50_000
      spouse:
        age: 33
        employment_income: 80_000
    tax_units:
      tax_unit:
        members: [filer, spouse]
        filing_status: JOINT
  output:
    flat_refundable_credit: 2_000  # 0.2 * (5_000 + 5_000)

