- name: Reform integration — flat refundable credit fires end-to-end
  # Smoke test that the reform applies and the flat credit computes to
  # its expected value across taxpayer + CTC-dependent + household
  # components.
  period: 2026
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.credit.use_taxpayer_credit: true
    gov.contrib.refundable_credit_conversion.credit.use_ctc_dependent_credit: true
    gov.contrib.refundable_credit_conversion.credit.use_household_credit: true
    gov.contrib.refundable_credit_conversion.credit.per_taxpayer: 1_000
    gov.contrib.refundable_credit_conversion.credit.per_ctc_dependent: 500
    gov.contrib.refundable_credit_conversion.credit.per_household: 200
    people:
      filer:
        age: 35
      spouse:
        age: 33
      child:
        age: 5
    tax_units:
      tax_unit:
        members: [filer, spouse, child]
        filing_status: JOINT
  output:
    flat_refundable_credit: 2_700  # 2 * 1_000 + 1 * 500 + 200

# Note on testing scope: we intentionally do NOT assert on
# income_tax_refundable_credits anywhere in this file. Evaluating that
# variable forces every federal refundable credit (eitc / refundable_ctc
# / aotc / recovery rebate / refundable payroll tax credit /
# cdcc-in-2021) to materialize, which (a) requires loading HuggingFace-
# backed datasets the YAML test runner does not need otherwise, and (b)
# pushes peak memory past the CI runner cap, surfacing as a "shutdown
# signal" mid-batch. The override's wiring is exercised in production
# via the federal income-tax calculation; the unit tests above pin down
# the flat_refundable_credit values themselves.

- name: All use_* toggles default to false — flat credit stays zero
  # Force-applies the reform but leaves every use_* toggle at its default
  # false. Confirms the formula returns zero with no components
  # contributing. The `in_effect: false` here does NOT gate the reform
  # (the YAML `reforms:` directive bypasses the autoloader); the
  # autoloader's None return is exercised in test_refundable_credit_conversion_autoloader.py.
  period: 2026
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: false
    people:
      filer:
        age: 35
        employment_income: 40_000
    tax_units:
      tax_unit:
        members: [filer]
        filing_status: SINGLE
  output:
    flat_refundable_credit: 0

- name: HEAD_OF_HOUSEHOLD filer counts as one taxpayer
  period: 2026
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.credit.use_taxpayer_credit: true
    gov.contrib.refundable_credit_conversion.credit.per_taxpayer: 1_000
    people:
      filer:
        age: 35
      child:
        age: 5
    tax_units:
      tax_unit:
        members: [filer, child]
        filing_status: HEAD_OF_HOUSEHOLD
  output:
    flat_refundable_credit: 1_000  # 1 * 1_000 — HoH is one taxpayer

