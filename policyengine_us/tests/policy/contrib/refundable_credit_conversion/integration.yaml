- name: Full reform — all repeals on, $3k per filer/dep, $0 household, no wage credit
  period: 2026
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.repeals.itemized: true
    gov.contrib.refundable_credit_conversion.repeals.standard_deduction: true
    gov.contrib.refundable_credit_conversion.repeals.head_of_household: true
    gov.contrib.refundable_credit_conversion.repeals.above_the_line_deductions: true
    gov.contrib.refundable_credit_conversion.repeals.ctc: true
    gov.contrib.refundable_credit_conversion.repeals.cdcc: true
    gov.contrib.refundable_credit_conversion.repeals.eitc: true
    gov.contrib.refundable_credit_conversion.credit.per_taxpayer: 3_000
    gov.contrib.refundable_credit_conversion.credit.per_dependent: 3_000
    gov.contrib.refundable_credit_conversion.credit.per_household: 0
    people:
      filer:
        age: 35
        employment_income: 40_000
      spouse:
        age: 33
      child:
        age: 5
    tax_units:
      tax_unit:
        members: [filer, spouse, child]
        filing_status: JOINT
  output:
    standard_deduction: 0
    itemized_taxable_income_deductions: 0
    above_the_line_deductions: 0
    flat_refundable_credit: 9_000  # 2 * 3_000 + 1 * 3_000

- name: Reform inactive (in_effect false) — baseline behavior preserved
  period: 2026
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: false
    people:
      filer:
        age: 35
        employment_income: 40_000
    tax_units:
      tax_unit:
        members: [filer]
        filing_status: SINGLE
  output:
    flat_refundable_credit: 0
