- name: Dependent definition eitc_child counts EITC-qualifying children only
  period: 2026
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.credit.per_taxpayer: 0
    gov.contrib.refundable_credit_conversion.credit.per_dependent: 1_000
    gov.contrib.refundable_credit_conversion.credit.dependent_definition: 0
    people:
      filer:
        age: 35
      child:
        age: 5
    tax_units:
      tax_unit:
        members: [filer, child]
        filing_status: SINGLE
  output:
    flat_refundable_credit: 1_000

- name: Dependent definition all_dependents counts every claimed dependent
  period: 2026
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.credit.per_taxpayer: 0
    gov.contrib.refundable_credit_conversion.credit.per_dependent: 1_000
    gov.contrib.refundable_credit_conversion.credit.dependent_definition: 2
    people:
      filer:
        age: 35
      child:
        age: 5
        is_tax_unit_dependent: true
      adult_dependent:
        age: 22
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [filer, child, adult_dependent]
        filing_status: SINGLE
  output:
    flat_refundable_credit: 2_000  # both dependents counted

- name: Dependent definition ctc_child counts CTC-qualifying children
  period: 2026
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.credit.per_taxpayer: 0
    gov.contrib.refundable_credit_conversion.credit.per_dependent: 1_000
    gov.contrib.refundable_credit_conversion.credit.dependent_definition: 1
    people:
      filer:
        age: 35
      child:
        age: 5
        is_tax_unit_dependent: true
      adult_dependent:
        age: 22
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [filer, child, adult_dependent]
        filing_status: SINGLE
  output:
    flat_refundable_credit: 1_000  # only the CTC-qualifying child counted
