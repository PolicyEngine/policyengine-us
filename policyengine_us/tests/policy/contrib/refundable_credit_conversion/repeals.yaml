- name: Head of Household repeal makes filer ineligible
  period: 2026
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.repeals.head_of_household: true
    people:
      filer:
        age: 35
      child:
        age: 5
    tax_units:
      tax_unit:
        members: [filer, child]
  output:
    head_of_household_eligible: false

- name: CTC repeal removes both refundable and non-refundable CTC from federal credit lists
  period: 2026
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.repeals.ctc: true
    people:
      filer:
        age: 35
        employment_income: 40_000
      child:
        age: 5
    tax_units:
      tax_unit:
        members: [filer, child]
        filing_status: SINGLE
  output:
    income_tax_refundable_credits: 0
    income_tax_non_refundable_credits: 0

- name: EITC repeal removes EITC from federal refundable credits
  period: 2026
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.repeals.eitc: true
    gov.contrib.refundable_credit_conversion.repeals.ctc: true
    people:
      filer:
        age: 35
        employment_income: 20_000
      child:
        age: 5
    tax_units:
      tax_unit:
        members: [filer, child]
        filing_status: SINGLE
  output:
    income_tax_refundable_credits: 0
