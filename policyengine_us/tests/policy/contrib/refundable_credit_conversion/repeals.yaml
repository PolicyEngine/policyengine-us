- name: Standard deduction repeal sets it to zero
  period: 2026
  reforms: policyengine_us.reforms.refundable_credit_conversion.refundable_credit_conversion
  input:
    gov.contrib.refundable_credit_conversion.in_effect: true
    gov.contrib.refundable_credit_conversion.repeals.standard_deduction: true
    people:
      filer:
        age: 35
    tax_units:
      tax_unit:
        members: [filer]
        filing_status: SINGLE
  output:
    standard_deduction: 0

- name: Itemized deductions repeal sets them to zero
  period: 2026
