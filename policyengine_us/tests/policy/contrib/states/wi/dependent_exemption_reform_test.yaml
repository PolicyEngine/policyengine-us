- name: WI dependent exemption reform - default amount reproduces baseline (no-op)
  period: 2025
  reforms: policyengine_us.reforms.states.wi.dependent_exemption.wi_dependent_exemption_reform.wi_dependent_exemption_reform
  input:
    gov.contrib.states.wi.dependent_exemption.in_effect: true
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: WI}}
  output: {wi_base_exemption: 2_100}

- name: WI dependent exemption reform - amount zero removes dependent portion only
  period: 2025
  reforms: policyengine_us.reforms.states.wi.dependent_exemption.wi_dependent_exemption_reform.wi_dependent_exemption_reform
  input:
    gov.contrib.states.wi.dependent_exemption.in_effect: true
    gov.contrib.states.wi.dependent_exemption.amount: 0
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: WI}}
  output: {wi_base_exemption: 700}

- name: WI dependent exemption reform - childless single unaffected
  period: 2025
  reforms: policyengine_us.reforms.states.wi.dependent_exemption.wi_dependent_exemption_reform.wi_dependent_exemption_reform
  input:
    gov.contrib.states.wi.dependent_exemption.in_effect: true
    gov.contrib.states.wi.dependent_exemption.amount: 0
    people: {parent: {age: 40, employment_income: 60_000}}
    tax_units: {tax_unit: {members: [parent], filing_status: SINGLE}}
    households: {household: {members: [parent], state_name: WI}}
  output: {wi_base_exemption: 700}

- name: WI dependent exemption reform - age limit excludes over-age dependent
  period: 2025
  reforms: policyengine_us.reforms.states.wi.dependent_exemption.wi_dependent_exemption_reform.wi_dependent_exemption_reform
  input:
    gov.contrib.states.wi.dependent_exemption.in_effect: true
    gov.contrib.states.wi.dependent_exemption.amount: 0
    gov.contrib.states.wi.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.wi.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 20, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: WI}}
  output: {wi_base_exemption: 1_400}

- name: WI dependent exemption reform - joint two-adult unit splits head/spouse from dependents
  period: 2025
  reforms: policyengine_us.reforms.states.wi.dependent_exemption.wi_dependent_exemption_reform.wi_dependent_exemption_reform
  input:
    gov.contrib.states.wi.dependent_exemption.in_effect: true
    gov.contrib.states.wi.dependent_exemption.amount: 0
    people:
      parent1: {age: 40, employment_income: 60_000}
      parent2: {age: 38}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent1, parent2, child1, child2], filing_status: JOINT}}
    households: {household: {members: [parent1, parent2, child1, child2], state_name: WI}}
  # 2 head/spouse personal units (count 4 - 2 dependents) * 700 = 1,400.
  # Dependent portion removed (amount 0). Confirms no off-by-one in a 2-adult unit.
  output: {wi_base_exemption: 1_400}

- name: WI dependent exemption reform - dependent at age limit boundary minus one is eligible
  period: 2025
  reforms: policyengine_us.reforms.states.wi.dependent_exemption.wi_dependent_exemption_reform.wi_dependent_exemption_reform
  input:
    gov.contrib.states.wi.dependent_exemption.in_effect: true
    gov.contrib.states.wi.dependent_exemption.amount: 0
    gov.contrib.states.wi.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.wi.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 17, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1], filing_status: SINGLE}}
    households: {household: {members: [parent, child1], state_name: WI}}
  # age 17 < 18: dependent is eligible, gets the (zeroed) dependent exemption and
  # is removed from the personal count. Personal = parent only = 1 * 700 = 700.
  output: {wi_base_exemption: 700}

- name: WI dependent exemption reform - dependent at age limit boundary is excluded
  period: 2025
  reforms: policyengine_us.reforms.states.wi.dependent_exemption.wi_dependent_exemption_reform.wi_dependent_exemption_reform
  input:
    gov.contrib.states.wi.dependent_exemption.in_effect: true
    gov.contrib.states.wi.dependent_exemption.amount: 0
    gov.contrib.states.wi.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.wi.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 18, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1], filing_status: SINGLE}}
    households: {household: {members: [parent, child1], state_name: WI}}
  # age 18 is not < 18: dependent is excluded and falls back to the personal
  # count. Personal = parent + over-age dependent = 2 * 700 = 1,400.
  output: {wi_base_exemption: 1_400}

- name: WI dependent exemption reform - default flows through to income tax (downstream end-to-end)
  period: 2025
  reforms: policyengine_us.reforms.states.wi.dependent_exemption.wi_dependent_exemption_reform.wi_dependent_exemption_reform
  absolute_error_margin: 0.1
  input:
    gov.contrib.states.wi.dependent_exemption.in_effect: true
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: WI}}
  # End-to-end: with the default (no-op) amount the base exemption stays at
  # $2,100 (1 personal + 2 dependents), so WI income tax matches baseline.
  output: {wi_income_tax: 2032.42}

- name: WI dependent exemption reform - amount zero raises income tax (downstream end-to-end)
  period: 2025
  reforms: policyengine_us.reforms.states.wi.dependent_exemption.wi_dependent_exemption_reform.wi_dependent_exemption_reform
  absolute_error_margin: 0.1
  input:
    gov.contrib.states.wi.dependent_exemption.in_effect: true
    gov.contrib.states.wi.dependent_exemption.amount: 0
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: WI}}
  # End-to-end: removing the dependent portion (amount 0) drops the base
  # exemption from $2,100 to $700 ($1,400 of taxable income added), raising WI
  # income tax from 2,032.42 to 2,094.02 (about +61.60).
  output: {wi_income_tax: 2094.02}
