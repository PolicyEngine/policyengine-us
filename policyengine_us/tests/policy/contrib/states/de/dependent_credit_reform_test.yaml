    gov.contrib.states.de.dependent_credit.phaseout.threshold.JOINT: 100_000
    gov.contrib.states.de.dependent_credit.phaseout.rate: 0.01
    people:
      head:
        age: 40
        employment_income: 80_000
      spouse:
        age: 38
        employment_income: 80_000
      child:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
