# Test Maine LD 229 Income Tax Bracket Expansion Reform
# Expands from 3 brackets to 5 brackets for 2026+

- name: ME LD 229 - single filer, income in 4th bracket
  period: 2026
  reforms: policyengine_us.reforms.states.me.ld229.me_ld229_reform.me_ld229
  input:
    gov.contrib.states.me.ld229.in_effect: true
    people:
      person1:
        age: 40
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SINGLE
        me_taxable_income: 200_000
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    # .055*27450 + .0675*(64950-27450) + .0715*(144500-64950) + .0775*(200000-144500)
    # = 1509.75 + 2531.25 + 5687.825 + 4301.25 = 14030.075
    me_income_tax_before_credits: 14_030.075

