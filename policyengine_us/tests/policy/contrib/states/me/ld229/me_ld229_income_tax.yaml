- name: Maine LD 229 lowers the bottom rate for single filers.
  period: 2026
  reforms: policyengine_us.reforms.states.me.ld229.me_ld229_income_tax_reform.me_ld229
  input:
    gov.contrib.states.me.ld229.in_effect: true
    people:
      person1:
        age: 45
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SINGLE
        me_taxable_income: 20_000
    households:
      household:
        members: [person1]
        state_code: ME
  output:
    me_income_tax_before_credits: 1_100

