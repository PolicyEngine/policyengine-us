# Non-MT Resident Test

- name: Case 27, non-MT resident gets zero.
  period: 2027
  absolute_error_margin: 0.01
  reforms: policyengine_us.reforms.states.mt.newborn_credit.mt_newborn_credit.mt_newborn_credit
  input:
    gov.contrib.states.mt.newborn_credit.in_effect: true
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        employment_income: 40_000
        ssn_card_type: CITIZEN
      person2:
        age: 0
        is_tax_unit_dependent: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SINGLE
    households:
      household:
        members: [person1, person2]
        state_code: NY
  output:
    mt_newborn_credit: [0, 0]

