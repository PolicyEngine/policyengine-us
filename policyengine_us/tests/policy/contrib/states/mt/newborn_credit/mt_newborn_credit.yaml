- name: Case 31, MFJ full phase-out boundary at $140k.
  period: 2027
  absolute_error_margin: 0.01
  reforms: policyengine_us.reforms.states.mt.newborn_credit.mt_newborn_credit.mt_newborn_credit
  input:
    gov.contrib.states.mt.newborn_credit.in_effect: true
    people:
      person1:
        age: 35
        is_tax_unit_head: true
        employment_income: 80_000
        ssn_card_type: CITIZEN
      person2:
        age: 33
        is_tax_unit_spouse: true
        employment_income: 60_000
        ssn_card_type: CITIZEN
      person3:
        age: 0
        is_tax_unit_dependent: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
        filing_status: JOINT
    households:
      household:
        members: [person1, person2, person3]
        state_code: MT
  output:
    # AGI $140k, excess = $20k, ceil($20k/$1k) = 20, reduction = $1,000
    mt_newborn_credit: [0, 0, 0]

