# Montana Newborn Credit Tests

# Basic Eligibility Tests

- name: Case 1, single filer with newborn under income threshold.
  period: 2027
  absolute_error_margin: 1
  reforms: policyengine_us.reforms.states.mt.newborn_credit.mt_newborn_credit.mt_newborn_credit
  input:
    gov.contrib.states.mt.newborn_credit.in_effect: true
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        employment_income: 40_000
        ssn_card_type: CITIZEN
      person2:
        age: 0
        is_tax_unit_dependent: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SINGLE
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    mt_newborn_credit: [1_000, 0]
    # Refundable credit reduces tax liability (baseline ~$696, minus $1,000 credit)
    mt_income_tax: -304

- name: Case 2, MFJ with newborn under income threshold.
  period: 2027
  absolute_error_margin: 1
  reforms: policyengine_us.reforms.states.mt.newborn_credit.mt_newborn_credit.mt_newborn_credit
  input:
    gov.contrib.states.mt.newborn_credit.in_effect: true
    people:
      person1:
        age: 35
        is_tax_unit_head: true
        employment_income: 60_000
        ssn_card_type: CITIZEN
      person2:
        age: 33
        is_tax_unit_spouse: true
        employment_income: 40_000
        ssn_card_type: CITIZEN
      person3:
        age: 0
        is_tax_unit_dependent: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
        filing_status: JOINT
    households:
      household:
        members: [person1, person2, person3]
        state_code: MT
  output:
    # AGI $100k < $120k threshold for MFJ
    mt_newborn_credit: [1_000, 0, 0]
    # Baseline mt_income_tax ~$3,147 minus $1,000 refundable credit
    mt_income_tax: 2_147

