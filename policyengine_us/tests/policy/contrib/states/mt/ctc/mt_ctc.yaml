        members: [head, child1, child2, child3]
        state_code: MT
  output:
    mt_ctc: [4_800, 0, 0, 0]
    # 1800 + 1500 + 1500

# Earned income requirement tests
- name: Earned income required - eligible with $1 income
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    gov.contrib.states.mt.ctc.earned_income_requirement.in_effect: true
    tax_unit_earned_income: 1
    adjusted_gross_income: 1
    ctc_qualifying_children: 1
    state_code: MT
  output:
    mt_ctc_eligible: true

- name: Earned income required - ineligible with $0 income
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    gov.contrib.states.mt.ctc.earned_income_requirement.in_effect: true
    tax_unit_earned_income: 0
    adjusted_gross_income: 50_000
    ctc_qualifying_children: 1
    state_code: MT
  output:
    mt_ctc_eligible: false

- name: Earned income NOT required - eligible with $0 income
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    gov.contrib.states.mt.ctc.earned_income_requirement.in_effect: false
    tax_unit_earned_income: 0
    adjusted_gross_income: 50_000
    ctc_qualifying_children: 1
    state_code: MT
  output:
    mt_ctc_eligible: true

# AGI phase-out tests (single filer, threshold $60k)
- name: AGI at reduction threshold - no reduction (single)
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 30
      child:
        age: 3
    tax_units:
      tax_unit:
        members: [head, child]
        mt_ctc_eligible: true
        adjusted_gross_income: 60_000
        filing_status: SINGLE
    households:
      household:
        members: [head, child]
        state_code: MT
  output:
    mt_ctc: [1_800, 0]

- name: AGI $1k above threshold - first reduction (single)
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 30
      child:
        age: 3
    tax_units:
      tax_unit:
        members: [head, child]
        mt_ctc_eligible: true
        adjusted_gross_income: 61_000
        filing_status: SINGLE
    households:
      household:
        members: [head, child]
        state_code: MT
  output:
    mt_ctc: [1_750, 0]
    # 1800 - 1*50 = 1750

- name: AGI $500 above threshold - ceiling triggers reduction
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 30
      child:
        age: 3
    tax_units:
      tax_unit:
        members: [head, child]
        mt_ctc_eligible: true
        adjusted_gross_income: 60_500
        filing_status: SINGLE
    households:
      household:
        members: [head, child]
        state_code: MT
  output:
    mt_ctc: [1_750, 0]
    # 1800 - ceil(500/1000)*50 = 1800 - 50 = 1750

- name: AGI $5k above threshold - 5 reductions (single)
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 30
