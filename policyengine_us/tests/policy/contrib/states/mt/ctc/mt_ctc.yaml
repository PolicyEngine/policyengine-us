# Tests for flexible Montana Child Tax Credit reform

# Age bracket tests
- name: Child age 0-5 gets $1,800
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 30
      child:
        age: 3
    tax_units:
      tax_unit:
        members: [head, child]
        mt_ctc_eligible: true
        adjusted_gross_income: 40_000
    households:
      household:
        members: [head, child]
        state_code: MT
  output:
    mt_ctc: [1_800, 0]

- name: Child age 6-17 gets $1,500
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
