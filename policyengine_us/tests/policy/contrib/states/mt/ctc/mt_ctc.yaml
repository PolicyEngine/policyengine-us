    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 30
        employment_income: 40_000
        is_tax_unit_dependent: false
      child:
        age: 3
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [head, child]
    households:
      household:
        members: [head, child]
