- name: IN dependent exemption reform - default amount reproduces baseline (no-op)
  period: 2025
  reforms: policyengine_us.reforms.states.in.dependent_exemption.in_dependent_exemption_reform.in_dependent_exemption_reform
  input:
    gov.contrib.states.in.dependent_exemption.in_effect: true
    people:
      parent:
        age: 40
        employment_income: 60_000
      child1:
        age: 10
        is_tax_unit_dependent: true
      child2:
        age: 12
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [parent, child1, child2]
        filing_status: SINGLE
    households:
      household:
        members: [parent, child1, child2]
        state_name: IN
  output:
    # 1 personal + 2 dependents, all at $1,000 = $3,000 (matches baseline)
    in_base_exemptions: 3_000

- name: IN dependent exemption reform - amount zero removes dependent portion only
  period: 2025
  reforms: policyengine_us.reforms.states.in.dependent_exemption.in_dependent_exemption_reform.in_dependent_exemption_reform
  input:
    gov.contrib.states.in.dependent_exemption.in_effect: true
    gov.contrib.states.in.dependent_exemption.amount: 0
    people:
      parent:
        age: 40
        employment_income: 60_000
      child1:
        age: 10
        is_tax_unit_dependent: true
      child2:
        age: 12
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [parent, child1, child2]
        filing_status: SINGLE
    households:
      household:
        members: [parent, child1, child2]
        state_name: IN
  output:
    # Personal exemption kept ($1,000), dependent portion removed
    in_base_exemptions: 1_000

- name: IN dependent exemption reform - childless single unaffected
  period: 2025
  reforms: policyengine_us.reforms.states.in.dependent_exemption.in_dependent_exemption_reform.in_dependent_exemption_reform
  input:
    gov.contrib.states.in.dependent_exemption.in_effect: true
    gov.contrib.states.in.dependent_exemption.amount: 0
    people:
      parent:
        age: 40
        employment_income: 60_000
    tax_units:
      tax_unit:
        members: [parent]
        filing_status: SINGLE
    households:
      household:
        members: [parent]
        state_name: IN
  output:
    in_base_exemptions: 1_000

- name: IN dependent exemption reform - age limit excludes over-age dependent
  period: 2025
  reforms: policyengine_us.reforms.states.in.dependent_exemption.in_dependent_exemption_reform.in_dependent_exemption_reform
  input:
    gov.contrib.states.in.dependent_exemption.in_effect: true
    gov.contrib.states.in.dependent_exemption.amount: 0
    gov.contrib.states.in.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.in.dependent_exemption.age_limit.threshold: 18
    people:
      parent:
        age: 40
        employment_income: 60_000
      child1:
        age: 10
        is_tax_unit_dependent: true
      child2:
        age: 20
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [parent, child1, child2]
        filing_status: SINGLE
    households:
      household:
        members: [parent, child1, child2]
        state_name: IN
  output:
    # Over-age dependent (20) falls back to personal count: 2 personal units * $1,000
    # Eligible dependent (10) gets $0 dependent exemption
    in_base_exemptions: 2_000
