- name: AL HB527 - AGI capped at zero when deduction exceeds income
  absolute_error_margin: 0.1
  period: 2025
  reforms: policyengine_us.reforms.states.al.hb527.al_hb527_overtime_deduction.al_hb527_overtime_deduction
  input:
    gov.contrib.states.al.hb527.in_effect: true
    people:
      person:
        age: 35
        irs_employment_income: 5_000
    tax_units:
      tax_unit:
        members: [person]
        filing_status: SINGLE
        # Provide deduction directly to test AGI floor at 0
        al_hb527_overtime_deduction: 10_000
    households:
      household:
        members: [person]
        state_name: AL
  output:
    # Deduction ($10k) exceeds base AGI ($5k), result should be capped at 0
    al_agi: 0
