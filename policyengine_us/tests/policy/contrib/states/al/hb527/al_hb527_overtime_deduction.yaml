- name: AL HB527 - Single filer with overtime under cap
  absolute_error_margin: 0.1
  period: 2025
  reforms: policyengine_us.reforms.states.al.hb527.al_hb527_overtime_deduction.al_hb527_overtime_deduction
  input:
    gov.contrib.states.al.hb527.in_effect: true
    gov.contrib.states.al.hb527.cap: 1_000
    people:
      person:
        age: 35
        employment_income: 52_000
        hours_worked_last_week: 50  # 10 hours overtime per week
    tax_units:
      tax_unit:
        members: [person]
        filing_status: SINGLE
    households:
      household:
        members: [person]
        state_name: AL
  output:
    # With 50 hours/week and 52k income, overtime premium is calculated by fsla_overtime_premium
    # Deduction should be capped at $1,000 for single filer
    al_hb527_overtime_deduction: 1_000

