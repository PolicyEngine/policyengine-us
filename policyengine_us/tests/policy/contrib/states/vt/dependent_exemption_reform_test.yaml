- name: VT dependent exemption reform - default amount reproduces baseline (no-op)
  period: 2025
  reforms: policyengine_us.reforms.states.vt.dependent_exemption.vt_dependent_exemption_reform.vt_dependent_exemption_reform
  input:
    gov.contrib.states.vt.dependent_exemption.in_effect: true
    people:
      parent:
        age: 40
        employment_income: 60_000
      child1:
        age: 10
        is_tax_unit_dependent: true
      child2:
        age: 12
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [parent, child1, child2]
        filing_status: SINGLE
    households:
      household:
        members: [parent, child1, child2]
        state_name: VT
  output:
    # 1 personal + 2 dependents, all at $5,300 = $15,900 (matches baseline)
    vt_personal_exemptions: 15_900

- name: VT dependent exemption reform - amount zero removes dependent portion only
  period: 2025
  reforms: policyengine_us.reforms.states.vt.dependent_exemption.vt_dependent_exemption_reform.vt_dependent_exemption_reform
  input:
    gov.contrib.states.vt.dependent_exemption.in_effect: true
    gov.contrib.states.vt.dependent_exemption.amount: 0
    people:
      parent:
        age: 40
        employment_income: 60_000
      child1:
        age: 10
        is_tax_unit_dependent: true
      child2:
        age: 12
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [parent, child1, child2]
        filing_status: SINGLE
    households:
      household:
        members: [parent, child1, child2]
        state_name: VT
  output:
    # Personal exemption kept ($5,300), dependent portion removed
    vt_personal_exemptions: 5_300

- name: VT dependent exemption reform - childless single unaffected
  period: 2025
  reforms: policyengine_us.reforms.states.vt.dependent_exemption.vt_dependent_exemption_reform.vt_dependent_exemption_reform
  input:
    gov.contrib.states.vt.dependent_exemption.in_effect: true
    gov.contrib.states.vt.dependent_exemption.amount: 0
    people:
      parent:
        age: 40
        employment_income: 60_000
    tax_units:
      tax_unit:
        members: [parent]
        filing_status: SINGLE
    households:
      household:
        members: [parent]
        state_name: VT
  output:
    vt_personal_exemptions: 5_300

- name: VT dependent exemption reform - age limit excludes over-age dependent
  period: 2025
  reforms: policyengine_us.reforms.states.vt.dependent_exemption.vt_dependent_exemption_reform.vt_dependent_exemption_reform
  input:
    gov.contrib.states.vt.dependent_exemption.in_effect: true
    gov.contrib.states.vt.dependent_exemption.amount: 0
    gov.contrib.states.vt.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.vt.dependent_exemption.age_limit.threshold: 18
    people:
      parent:
        age: 40
        employment_income: 60_000
      child1:
        age: 10
        is_tax_unit_dependent: true
      child2:
        age: 20
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [parent, child1, child2]
        filing_status: SINGLE
    households:
      household:
        members: [parent, child1, child2]
        state_name: VT
  output:
    # Over-age dependent (20) falls back to personal count: 2 personal units * $5,300
    # Eligible dependent (10) gets $0 dependent exemption
    vt_personal_exemptions: 10_600
