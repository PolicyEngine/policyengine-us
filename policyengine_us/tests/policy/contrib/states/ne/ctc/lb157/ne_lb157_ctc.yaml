        age: 30
        is_tax_unit_head: true
      child:
        age: 3
        is_tax_unit_dependent: true
        has_itin: true
    tax_units:
      tax_unit:
        members: [parent, child]
        filing_status: SINGLE
        adjusted_gross_income: 100_000
    households:
      household:
        members: [parent, child]
        state_code: NE
  output:
    # $100,000 AGI exceeds $75,000 threshold by $25,000
    # Ceiling($25,000 / $1,000) = 25 increments
    # Reduction = $1,000 * 5% * 25 = $1,250 (capped at $1,000)
    # Credit = max($1,000 - $1,250, 0) = $0
    ne_lb157_ctc: 0

