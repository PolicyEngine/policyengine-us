- name: Single filer with one qualifying child under income threshold
  period: 2026
  absolute_error_margin: 0.1
  reforms: policyengine_us.reforms.states.ne.ctc.lb157.ne_lb157_ctc.ne_lb157_ctc
  input:
    gov.contrib.states.ne.ctc.lb157.in_effect: true
    people:
      parent:
        age: 30
        is_tax_unit_head: true
      child:
        age: 3
        is_tax_unit_dependent: true
        has_itin: true
    tax_units:
      tax_unit:
        members: [parent, child]
        filing_status: SINGLE
        adjusted_gross_income: 50_000
    households:
      household:
        members: [parent, child]
        state_code: NE
  output:
    ne_lb157_ctc: 1_000

- name: MFJ with two qualifying children under income threshold
