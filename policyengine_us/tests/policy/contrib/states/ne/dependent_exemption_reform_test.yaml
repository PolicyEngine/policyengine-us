- name: NE dependent exemption reform - default amount reproduces baseline (no-op)
  period: 2025
  reforms: policyengine_us.reforms.states.ne.dependent_exemption.ne_dependent_exemption_reform.ne_dependent_exemption_reform
  input:
    gov.contrib.states.ne.dependent_exemption.in_effect: true
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: NE}}
  output: {ne_exemptions: 513}

- name: NE dependent exemption reform - amount zero removes dependent portion only
  period: 2025
  reforms: policyengine_us.reforms.states.ne.dependent_exemption.ne_dependent_exemption_reform.ne_dependent_exemption_reform
  input:
    gov.contrib.states.ne.dependent_exemption.in_effect: true
    gov.contrib.states.ne.dependent_exemption.amount: 0
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: NE}}
  output: {ne_exemptions: 171}

- name: NE dependent exemption reform - childless single unaffected
  period: 2025
  reforms: policyengine_us.reforms.states.ne.dependent_exemption.ne_dependent_exemption_reform.ne_dependent_exemption_reform
  input:
    gov.contrib.states.ne.dependent_exemption.in_effect: true
    gov.contrib.states.ne.dependent_exemption.amount: 0
    people: {parent: {age: 40, employment_income: 60_000}}
    tax_units: {tax_unit: {members: [parent], filing_status: SINGLE}}
    households: {household: {members: [parent], state_name: NE}}
  output: {ne_exemptions: 171}

- name: NE dependent exemption reform - age limit excludes over-age dependent
  period: 2025
  reforms: policyengine_us.reforms.states.ne.dependent_exemption.ne_dependent_exemption_reform.ne_dependent_exemption_reform
  input:
    gov.contrib.states.ne.dependent_exemption.in_effect: true
    gov.contrib.states.ne.dependent_exemption.amount: 0
    gov.contrib.states.ne.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.ne.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 20, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: NE}}
  output: {ne_exemptions: 342}

- name: NE dependent exemption reform - joint two-adult unit splits head/spouse from dependents
  period: 2025
  reforms: policyengine_us.reforms.states.ne.dependent_exemption.ne_dependent_exemption_reform.ne_dependent_exemption_reform
  input:
    gov.contrib.states.ne.dependent_exemption.in_effect: true
    gov.contrib.states.ne.dependent_exemption.amount: 0
    people:
      parent1: {age: 40, employment_income: 60_000}
      parent2: {age: 38}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent1, parent2, child1, child2], filing_status: JOINT}}
    households: {household: {members: [parent1, parent2, child1, child2], state_name: NE}}
  # 2 head/spouse personal units (size 4 - 2 dependents) * 171 = 342.
  # Dependent portion removed (amount 0). Confirms no off-by-one in a 2-adult unit.
  output: {ne_exemptions: 342}

- name: NE dependent exemption reform - dependent at age limit boundary minus one is eligible
  period: 2025
  reforms: policyengine_us.reforms.states.ne.dependent_exemption.ne_dependent_exemption_reform.ne_dependent_exemption_reform
  input:
    gov.contrib.states.ne.dependent_exemption.in_effect: true
    gov.contrib.states.ne.dependent_exemption.amount: 0
    gov.contrib.states.ne.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.ne.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 17, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1], filing_status: SINGLE}}
    households: {household: {members: [parent, child1], state_name: NE}}
  # age 17 < 18: dependent is eligible, gets the (zeroed) dependent exemption and
  # is removed from the personal count. Personal = parent only = 1 * 171 = 171.
  output: {ne_exemptions: 171}

- name: NE dependent exemption reform - dependent at age limit boundary is excluded
  period: 2025
  reforms: policyengine_us.reforms.states.ne.dependent_exemption.ne_dependent_exemption_reform.ne_dependent_exemption_reform
  input:
    gov.contrib.states.ne.dependent_exemption.in_effect: true
    gov.contrib.states.ne.dependent_exemption.amount: 0
    gov.contrib.states.ne.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.ne.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 18, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1], filing_status: SINGLE}}
    households: {household: {members: [parent, child1], state_name: NE}}
  # age 18 is not < 18: dependent is excluded and falls back to the personal
  # count. Personal = parent + over-age dependent = 2 * 171 = 342.
  output: {ne_exemptions: 342}

- name: NE dependent exemption reform - default flows through to income tax (downstream end-to-end)
  period: 2025
  reforms: policyengine_us.reforms.states.ne.dependent_exemption.ne_dependent_exemption_reform.ne_dependent_exemption_reform
  absolute_error_margin: 0.1
  input:
    gov.contrib.states.ne.dependent_exemption.in_effect: true
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: NE}}
  # End-to-end: with the default (no-op) amount the exemption credit is
  # preserved (3 * 171 = 513), so NE income tax matches the unreformed baseline.
  output: {ne_income_tax: 1681.83}

- name: NE dependent exemption reform - amount zero raises income tax (downstream end-to-end)
  period: 2025
  reforms: policyengine_us.reforms.states.ne.dependent_exemption.ne_dependent_exemption_reform.ne_dependent_exemption_reform
  absolute_error_margin: 0.1
  input:
    gov.contrib.states.ne.dependent_exemption.in_effect: true
    gov.contrib.states.ne.dependent_exemption.amount: 0
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: NE}}
  # End-to-end: removing the dependent portion (amount 0) drops the exemption
  # credit from 513 to 171 (the two $171 dependent credits are lost), raising NE
  # income tax by 342, from 1,681.83 to 2,023.83.
  output: {ne_income_tax: 2023.83}
