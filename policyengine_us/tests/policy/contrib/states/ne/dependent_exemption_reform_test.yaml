- name: NE dependent exemption reform - age limit excludes over-age dependent
  period: 2025
  reforms: policyengine_us.reforms.states.ne.dependent_exemption.ne_dependent_exemption_reform.ne_dependent_exemption_reform
  input:
    gov.contrib.states.ne.dependent_exemption.in_effect: true
    gov.contrib.states.ne.dependent_exemption.amount: 0
    gov.contrib.states.ne.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.ne.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 20, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: NE}}
  output: {ne_exemptions: 342}
