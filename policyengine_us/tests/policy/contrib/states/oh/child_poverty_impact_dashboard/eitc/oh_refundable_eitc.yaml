# The reform makes the Ohio EITC fully refundable. It pays the uncapped
# potential credit (oh_eitc_potential = rate * federal_eitc), so these tests
# drive the credit from the federal EITC rather than injecting the capped
# oh_eitc. The OH EITC rate is 30% of the federal EITC (constant since 2020).

- name: Case 1 - OH EITC is fully refundable (uncapped) when reform active
  period: 2024
  reforms: policyengine_us.reforms.states.oh.eitc.oh_refundable_eitc
  input:
    state_code: OH
    eitc: 2_000
    oh_income_tax_before_non_refundable_credits: 0
  output:
    oh_eitc_potential: 600  # 2,000 * 0.3
    oh_eitc: 0  # capped at zero tax liability
    oh_refundable_eitc: 600  # full potential paid as a refund
    oh_non_refundable_eitc: 0

- name: Case 2 - OH refundable credits include EITC when reform active
  period: 2024
  reforms: policyengine_us.reforms.states.oh.eitc.oh_refundable_eitc
  input:
    state_code: OH
    eitc: 3_000
    oh_income_tax_before_non_refundable_credits: 0
  output:
    oh_refundable_eitc: 900  # 3,000 * 0.3
    oh_refundable_credits: 900

- name: Case 3 - OH refundable EITC is 0 when the federal EITC is 0
  period: 2024
  reforms: policyengine_us.reforms.states.oh.eitc.oh_refundable_eitc
  input:
    state_code: OH
    eitc: 0
  output:
    oh_refundable_eitc: 0
    oh_non_refundable_eitc: 0

- name: Case 4 - OH refundable EITC is 0 for non-OH residents
  period: 2024
  reforms: policyengine_us.reforms.states.oh.eitc.oh_refundable_eitc
  input:
    state_code: TX
    eitc: 2_000
  output:
    oh_refundable_eitc: 0
    oh_non_refundable_eitc: 0
