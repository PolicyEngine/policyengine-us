    households: {household: {members: [parent, child1, child2], state_name: HI}}
  output: {hi_regular_exemptions: 4_576}  # (3 + 1 aged) * 1,144

- name: HI dependent exemption reform - joint two-adult unit splits head/spouse from dependents
  period: 2025
  reforms: policyengine_us.reforms.states.hi.dependent_exemption.hi_dependent_exemption_reform.hi_dependent_exemption_reform
  input:
    gov.contrib.states.hi.dependent_exemption.in_effect: true
    gov.contrib.states.hi.dependent_exemption.amount: 0
    people:
      parent1: {age: 40, employment_income: 60_000}
      parent2: {age: 38}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent1, parent2, child1, child2], filing_status: JOINT}}
    households: {household: {members: [parent1, parent2, child1, child2], state_name: HI}}
  # 2 head/spouse personal units (exemptions_count 4 - 2 dependents) * 1,144 = 2,288.
  # Dependent portion removed (amount 0). Confirms no off-by-one in a 2-adult unit.
  output: {hi_regular_exemptions: 2_288}

- name: HI dependent exemption reform - dependent at age limit boundary minus one is eligible
  period: 2025
  reforms: policyengine_us.reforms.states.hi.dependent_exemption.hi_dependent_exemption_reform.hi_dependent_exemption_reform
  input:
    gov.contrib.states.hi.dependent_exemption.in_effect: true
    gov.contrib.states.hi.dependent_exemption.amount: 0
    gov.contrib.states.hi.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.hi.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 17, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1], filing_status: SINGLE}}
    households: {household: {members: [parent, child1], state_name: HI}}
  # age 17 < 18: dependent is eligible, gets the (zeroed) dependent exemption and
  # is removed from the personal count. Personal = parent only = 1 * 1,144.
  output: {hi_regular_exemptions: 1_144}

- name: HI dependent exemption reform - dependent at age limit boundary is excluded
  period: 2025
  reforms: policyengine_us.reforms.states.hi.dependent_exemption.hi_dependent_exemption_reform.hi_dependent_exemption_reform
  input:
    gov.contrib.states.hi.dependent_exemption.in_effect: true
    gov.contrib.states.hi.dependent_exemption.amount: 0
    gov.contrib.states.hi.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.hi.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 18, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1], filing_status: SINGLE}}
    households: {household: {members: [parent, child1], state_name: HI}}
  # age 18 is not < 18: dependent is excluded and falls back to the personal
  # count. Personal = parent + over-age dependent = 2 * 1,144 = 2,288.
  output: {hi_regular_exemptions: 2_288}

- name: HI dependent exemption reform - default flows through to income tax (downstream end-to-end)
  period: 2025
  reforms: policyengine_us.reforms.states.hi.dependent_exemption.hi_dependent_exemption_reform.hi_dependent_exemption_reform
  absolute_error_margin: 0.1
  input:
    gov.contrib.states.hi.dependent_exemption.in_effect: true
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: HI}}
  # End-to-end: with the default (no-op) amount the dependent exemption is
  # preserved (3 * 1,144 = 3,432 regular exemptions), so HI income tax matches
  # the unreformed baseline.
  output: {hi_income_tax: 2855.97}

- name: HI dependent exemption reform - amount zero raises income tax (downstream end-to-end)
  period: 2025
  reforms: policyengine_us.reforms.states.hi.dependent_exemption.hi_dependent_exemption_reform.hi_dependent_exemption_reform
  absolute_error_margin: 0.1
  input:
    gov.contrib.states.hi.dependent_exemption.in_effect: true
    gov.contrib.states.hi.dependent_exemption.amount: 0
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: HI}}
  # End-to-end: removing the dependent portion (amount 0) drops regular
  # exemptions from 3,432 to 1,144, widening taxable income and raising HI
  # income tax from 2,855.97 to 3,029.86 (about +173.89).
  output: {hi_income_tax: 3029.86}
