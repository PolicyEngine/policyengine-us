- name: Joint filer with income below 0% bracket threshold pays no tax
  period: 2026
  reforms: policyengine_us.reforms.states.ny.s9110.ny_s9110
  input:
    gov.contrib.states.ny.s9110.in_effect: true
    people:
      person1:
        age: 40
        is_tax_unit_head: true
      person2:
        age: 38
        is_tax_unit_spouse: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: JOINT
        ny_taxable_income: 8_000
    households:
      household:
        members: [person1, person2]
        state_code: NY
  output:
    # Income $8,000 < $10,000 (0% bracket threshold for 2026 joint)
    ny_main_income_tax: 0
    ny_supplemental_tax: 0

- name: Joint filer with income in 4% bracket
  period: 2026
  reforms: policyengine_us.reforms.states.ny.s9110.ny_s9110
  input:
    gov.contrib.states.ny.s9110.in_effect: true
    people:
      person1:
        age: 40
        is_tax_unit_head: true
      person2:
        age: 38
        is_tax_unit_spouse: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: JOINT
        ny_taxable_income: 15_000
    households:
      household:
        members: [person1, person2]
        state_code: NY
  output:
    # 0% on first $10,000 = $0
    # 4% on ($15,000 - $10,000) = $5,000 * 0.04 = $200
    ny_main_income_tax: 200

