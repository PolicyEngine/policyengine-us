- name: WV dependent exemption reform - default amount reproduces baseline (no-op)
  period: 2025
  reforms: policyengine_us.reforms.states.wv.dependent_exemption.wv_dependent_exemption_reform.wv_dependent_exemption_reform
  input:
    gov.contrib.states.wv.dependent_exemption.in_effect: true
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: WV}}
  output: {wv_personal_exemption: 6_000}

- name: WV dependent exemption reform - amount zero removes dependent portion only
  period: 2025
  reforms: policyengine_us.reforms.states.wv.dependent_exemption.wv_dependent_exemption_reform.wv_dependent_exemption_reform
  input:
    gov.contrib.states.wv.dependent_exemption.in_effect: true
    gov.contrib.states.wv.dependent_exemption.amount: 0
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: WV}}
  output: {wv_personal_exemption: 2_000}

- name: WV dependent exemption reform - childless single unaffected
  period: 2025
  reforms: policyengine_us.reforms.states.wv.dependent_exemption.wv_dependent_exemption_reform.wv_dependent_exemption_reform
  input:
    gov.contrib.states.wv.dependent_exemption.in_effect: true
    gov.contrib.states.wv.dependent_exemption.amount: 0
    people: {parent: {age: 40, employment_income: 60_000}}
    tax_units: {tax_unit: {members: [parent], filing_status: SINGLE}}
    households: {household: {members: [parent], state_name: WV}}
  output: {wv_personal_exemption: 2_000}

- name: WV dependent exemption reform - age limit excludes over-age dependent
  period: 2025
  reforms: policyengine_us.reforms.states.wv.dependent_exemption.wv_dependent_exemption_reform.wv_dependent_exemption_reform
  input:
    gov.contrib.states.wv.dependent_exemption.in_effect: true
    gov.contrib.states.wv.dependent_exemption.amount: 0
    gov.contrib.states.wv.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.wv.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 20, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: WV}}
  output: {wv_personal_exemption: 4_000}

- name: WV dependent exemption reform - joint two-adult unit splits head/spouse from dependents
  period: 2025
  reforms: policyengine_us.reforms.states.wv.dependent_exemption.wv_dependent_exemption_reform.wv_dependent_exemption_reform
  input:
    gov.contrib.states.wv.dependent_exemption.in_effect: true
    gov.contrib.states.wv.dependent_exemption.amount: 0
    people:
      parent1: {age: 40, employment_income: 60_000}
      parent2: {age: 38}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent1, parent2, child1, child2], filing_status: JOINT}}
    households: {household: {members: [parent1, parent2, child1, child2], state_name: WV}}
  # 2 head/spouse personal units (size 4 - 2 dependents) * 2,000 = 4,000.
  # Dependent portion removed (amount 0). Confirms no off-by-one in a 2-adult unit.
  output: {wv_personal_exemption: 4_000}

- name: WV dependent exemption reform - dependent at age limit boundary minus one is eligible
  period: 2025
  reforms: policyengine_us.reforms.states.wv.dependent_exemption.wv_dependent_exemption_reform.wv_dependent_exemption_reform
  input:
    gov.contrib.states.wv.dependent_exemption.in_effect: true
    gov.contrib.states.wv.dependent_exemption.amount: 0
    gov.contrib.states.wv.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.wv.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 17, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1], filing_status: SINGLE}}
    households: {household: {members: [parent, child1], state_name: WV}}
  # age 17 < 18: dependent is eligible, gets the (zeroed) dependent exemption and
  # is removed from the personal count. Personal = parent only = 1 * 2,000 = 2,000.
  output: {wv_personal_exemption: 2_000}

- name: WV dependent exemption reform - dependent at age limit boundary is excluded
  period: 2025
  reforms: policyengine_us.reforms.states.wv.dependent_exemption.wv_dependent_exemption_reform.wv_dependent_exemption_reform
  input:
    gov.contrib.states.wv.dependent_exemption.in_effect: true
    gov.contrib.states.wv.dependent_exemption.amount: 0
    gov.contrib.states.wv.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.wv.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 18, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1], filing_status: SINGLE}}
    households: {household: {members: [parent, child1], state_name: WV}}
  # age 18 is not < 18: dependent is excluded and falls back to the personal
  # count. Personal = parent + over-age dependent = 2 * 2,000 = 4,000.
  output: {wv_personal_exemption: 4_000}
