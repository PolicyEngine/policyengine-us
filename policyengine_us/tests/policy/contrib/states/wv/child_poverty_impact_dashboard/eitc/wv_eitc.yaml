- name: Case 5 - WV EITC is 0 for non-WV residents
  period: 2024
  reforms: policyengine_us.reforms.states.wv.eitc.wv_eitc
  input:
    gov.contrib.states.wv.child_poverty_impact_dashboard.eitc.match: 0.1
