- name: KS dependent exemption reform - default amount reproduces baseline (no-op)
  period: 2025
  reforms: policyengine_us.reforms.states.ks.dependent_exemption.ks_dependent_exemption_reform.ks_dependent_exemption_reform
  input:
    gov.contrib.states.ks.dependent_exemption.in_effect: true
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: KS}}
  # Personal (SINGLE base) 9,160 + 2 dependents * 2,320 = 13,800 (matches baseline).
  output: {ks_exemptions: 13_800}

- name: KS dependent exemption reform - amount zero removes dependent portion only
  period: 2025
  reforms: policyengine_us.reforms.states.ks.dependent_exemption.ks_dependent_exemption_reform.ks_dependent_exemption_reform
  input:
    gov.contrib.states.ks.dependent_exemption.in_effect: true
    gov.contrib.states.ks.dependent_exemption.amount: 0
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: KS}}
  # Dependent portion removed; personal (SINGLE base) 9,160 preserved.
  output: {ks_exemptions: 9_160}

- name: KS dependent exemption reform - childless single unaffected
  period: 2025
  reforms: policyengine_us.reforms.states.ks.dependent_exemption.ks_dependent_exemption_reform.ks_dependent_exemption_reform
  input:
    gov.contrib.states.ks.dependent_exemption.in_effect: true
    gov.contrib.states.ks.dependent_exemption.amount: 0
    people: {parent: {age: 40, employment_income: 60_000}}
    tax_units: {tax_unit: {members: [parent], filing_status: SINGLE}}
    households: {household: {members: [parent], state_name: KS}}
  output: {ks_exemptions: 9_160}

- name: KS dependent exemption reform - age limit excludes over-age dependent
  period: 2025
  reforms: policyengine_us.reforms.states.ks.dependent_exemption.ks_dependent_exemption_reform.ks_dependent_exemption_reform
  input:
    gov.contrib.states.ks.dependent_exemption.in_effect: true
    gov.contrib.states.ks.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.ks.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 20, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: KS}}
  # Only the under-18 dependent gets the exemption. The over-age dependent falls
  # back to the personal treatment, which is nothing in this KS regime.
  # 9,160 personal + 1 eligible dependent * 2,320 = 11,480.
  output: {ks_exemptions: 11_480}

- name: KS dependent exemption reform - joint two-adult unit splits head/spouse from dependents
  period: 2025
  reforms: policyengine_us.reforms.states.ks.dependent_exemption.ks_dependent_exemption_reform.ks_dependent_exemption_reform
  input:
    gov.contrib.states.ks.dependent_exemption.in_effect: true
    gov.contrib.states.ks.dependent_exemption.amount: 0
    people:
      parent1: {age: 40, employment_income: 60_000}
      parent2: {age: 38}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent1, parent2, child1, child2], filing_status: JOINT}}
    households: {household: {members: [parent1, parent2, child1, child2], state_name: KS}}
  # JOINT base 18,320 personal preserved; dependent portion removed (amount 0).
  output: {ks_exemptions: 18_320}

- name: KS dependent exemption reform - age at limit threshold is excluded
  period: 2025
  reforms: policyengine_us.reforms.states.ks.dependent_exemption.ks_dependent_exemption_reform.ks_dependent_exemption_reform
  absolute_error_margin: 0.01
  input:
    gov.contrib.states.ks.dependent_exemption.in_effect: true
    gov.contrib.states.ks.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.ks.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 18, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1], filing_status: SINGLE}}
    households: {household: {members: [parent, child1], state_name: KS}}
  # Dependent at the age limit (18 == threshold) is excluded; only the personal
  # (SINGLE base) 9,160 remains.
  output: {ks_exemptions: 9_160}

- name: KS dependent exemption reform - age one below threshold is included
  period: 2025
  reforms: policyengine_us.reforms.states.ks.dependent_exemption.ks_dependent_exemption_reform.ks_dependent_exemption_reform
  absolute_error_margin: 0.01
  input:
    gov.contrib.states.ks.dependent_exemption.in_effect: true
    gov.contrib.states.ks.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.ks.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 17, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1], filing_status: SINGLE}}
    households: {household: {members: [parent, child1], state_name: KS}}
  # Dependent one year under the limit (17 < 18) gets the exemption.
  # 9,160 personal + 1 eligible dependent * 2,320 = 11,480.
  output: {ks_exemptions: 11_480}
