- name: Single filer with moderate rent and income gets credit
  absolute_error_margin: 1
  period: 2027
  reforms: policyengine_us.reforms.states.ct.hb5114.ct_hb5114.ct_hb5114
  input:
    gov.contrib.states.ct.hb5114.in_effect: true
    people:
      person1:
        age: 35
        employment_income: 50_000
        rent: 15_000
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SINGLE
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Credit = 20% of $15,000 - 4% of $50,000
    # Credit = $3,000 - $2,000 = $1,000
    ct_hb5114_eligible: true
    ct_hb5114_renters_credit: 1_000

