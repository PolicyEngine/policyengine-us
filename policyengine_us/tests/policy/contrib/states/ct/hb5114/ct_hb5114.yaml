- name: Head of household with moderate rent gets credit
  absolute_error_margin: 1
  period: 2027
  reforms: policyengine_us.reforms.states.ct.hb5114.ct_hb5114.ct_hb5114
  input:
    gov.contrib.states.ct.hb5114.in_effect: true
