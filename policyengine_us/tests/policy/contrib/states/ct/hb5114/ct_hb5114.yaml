  output:
    # HOH income $60,000 < threshold $75,000
    # Credit = 20% of $18,000 - 4% of $60,000
    # Credit = $3,600 - $2,400 = $1,200
    ct_hb5114_eligible: true
    ct_hb5114_renters_credit: 1_200

- name: Credit formula - AGI reduction exceeds rent portion results in zero credit
  absolute_error_margin: 1
  period: 2027
  reforms: policyengine_us.reforms.states.ct.hb5114.ct_hb5114.ct_hb5114
  input:
    gov.contrib.states.ct.hb5114.in_effect: true
    people:
      person1:
        age: 35
        employment_income: 70_000
        rent: 6_000
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SINGLE
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Income $70,000 < threshold $75,000 - eligible
    # Credit = 20% of $6,000 - 4% of $70,000
    # Credit = $1,200 - $2,800 = -$1,600, floored at $0
    ct_hb5114_eligible: true
    ct_hb5114_renters_credit: 0

