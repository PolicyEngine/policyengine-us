      person1:
        age: 35
        employment_income: 60_000
        rent: 18_000
      child:
        age: 10
    tax_units:
      tax_unit:
        members: [person1, child]
        filing_status: HEAD_OF_HOUSEHOLD
    households:
      household:
        members: [person1, child]
