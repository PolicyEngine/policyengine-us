- name: MI dependent exemption reform - default amount reproduces baseline (no-op)
  period: 2025
  reforms: policyengine_us.reforms.states.mi.dependent_exemption.mi_dependent_exemption_reform.mi_dependent_exemption_reform
  input:
    gov.contrib.states.mi.dependent_exemption.in_effect: true
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units:
      tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}
    households:
      household: {members: [parent, child1, child2], state_name: MI}
  output:
    mi_personal_exemptions: 17_400  # 3 * 5,800

- name: MI dependent exemption reform - amount zero removes dependent portion only
  period: 2025
  reforms: policyengine_us.reforms.states.mi.dependent_exemption.mi_dependent_exemption_reform.mi_dependent_exemption_reform
  input:
    gov.contrib.states.mi.dependent_exemption.in_effect: true
    gov.contrib.states.mi.dependent_exemption.amount: 0
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units:
      tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}
    households:
      household: {members: [parent, child1, child2], state_name: MI}
  output:
