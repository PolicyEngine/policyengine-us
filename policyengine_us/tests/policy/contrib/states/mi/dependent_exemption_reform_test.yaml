- name: MI dependent exemption reform - age limit excludes over-age dependent
  period: 2025
  reforms: policyengine_us.reforms.states.mi.dependent_exemption.mi_dependent_exemption_reform.mi_dependent_exemption_reform
  input:
    gov.contrib.states.mi.dependent_exemption.in_effect: true
    gov.contrib.states.mi.dependent_exemption.amount: 0
    gov.contrib.states.mi.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.mi.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 20, is_tax_unit_dependent: true}
    tax_units:
      tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}
    households:
      household: {members: [parent, child1, child2], state_name: MI}
  output:
    mi_personal_exemptions: 11_600  # 2 personal units (over-age dep falls back) * 5,800

- name: MI dependent exemption reform - joint two-adult unit splits head/spouse from dependents
  period: 2025
  reforms: policyengine_us.reforms.states.mi.dependent_exemption.mi_dependent_exemption_reform.mi_dependent_exemption_reform
  input:
    gov.contrib.states.mi.dependent_exemption.in_effect: true
    gov.contrib.states.mi.dependent_exemption.amount: 0
    people:
      parent1: {age: 40, employment_income: 60_000}
      parent2: {age: 38}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units:
      tax_unit: {members: [parent1, parent2, child1, child2], filing_status: JOINT}
    households:
      household: {members: [parent1, parent2, child1, child2], state_name: MI}
  output:
    # 2 head/spouse personal units (size 4 - 2 dependents) * 5,800 = 11,600.
    # Dependent portion removed (amount 0). Confirms no off-by-one in a 2-adult unit.
    mi_personal_exemptions: 11_600

- name: MI dependent exemption reform - default flows through to taxable income (downstream)
  period: 2025
  reforms: policyengine_us.reforms.states.mi.dependent_exemption.mi_dependent_exemption_reform.mi_dependent_exemption_reform
  input:
    gov.contrib.states.mi.dependent_exemption.in_effect: true
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units:
      tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}
    households:
      household: {members: [parent, child1, child2], state_name: MI}
  # Downstream: mi_taxable_income = AGI + additions - subtractions - exemptions.
  # Plain wages: AGI 60,000, additions 0, subtractions 0.
  # Exemptions = mi_personal_exemptions = 3 * 5,800 = 17,400 (default no-op).
  # 60,000 - 17,400 = 42,600.
  output:
    mi_taxable_income: 42_600

- name: MI dependent exemption reform - amount zero raises taxable income (downstream)
  period: 2025
  reforms: policyengine_us.reforms.states.mi.dependent_exemption.mi_dependent_exemption_reform.mi_dependent_exemption_reform
  input:
    gov.contrib.states.mi.dependent_exemption.in_effect: true
    gov.contrib.states.mi.dependent_exemption.amount: 0
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units:
      tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}
    households:
      household: {members: [parent, child1, child2], state_name: MI}
  # Downstream: removing the dependent portion drops exemptions to 5,800
  # (personal only), so taxable income rises: 60,000 - 5,800 = 54,200.
  # The 11,600 taxable-income increase is taxed at MI's flat rate.
  output:
    mi_taxable_income: 54_200

- name: MI dependent exemption reform - dependent at age limit boundary minus one is eligible
  period: 2025
  reforms: policyengine_us.reforms.states.mi.dependent_exemption.mi_dependent_exemption_reform.mi_dependent_exemption_reform
  input:
    gov.contrib.states.mi.dependent_exemption.in_effect: true
    gov.contrib.states.mi.dependent_exemption.amount: 0
    gov.contrib.states.mi.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.mi.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 17, is_tax_unit_dependent: true}
    tax_units:
      tax_unit: {members: [parent, child1], filing_status: SINGLE}
    households:
      household: {members: [parent, child1], state_name: MI}
  # age 17 < 18: dependent is eligible, gets the (zeroed) dependent exemption and
  # is removed from the personal count. Personal = parent only = 1 * 5,800.
  output:
    mi_personal_exemptions: 5_800

- name: MI dependent exemption reform - dependent at age limit boundary is excluded
  period: 2025
  reforms: policyengine_us.reforms.states.mi.dependent_exemption.mi_dependent_exemption_reform.mi_dependent_exemption_reform
  input:
    gov.contrib.states.mi.dependent_exemption.in_effect: true
    gov.contrib.states.mi.dependent_exemption.amount: 0
    gov.contrib.states.mi.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.mi.dependent_exemption.age_limit.threshold: 18
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 18, is_tax_unit_dependent: true}
    tax_units:
      tax_unit: {members: [parent, child1], filing_status: SINGLE}
    households:
      household: {members: [parent, child1], state_name: MI}
  # age 18 is not < 18: dependent is excluded and falls back to the personal
  # count. Personal = parent + over-age dependent = 2 * 5,800 = 11,600.
  output:
    mi_personal_exemptions: 11_600
