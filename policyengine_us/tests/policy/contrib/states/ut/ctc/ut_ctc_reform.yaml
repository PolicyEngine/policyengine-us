- name: Default reform cap refunds 800 dollars of unused CTC for one child.
  period: 2026
  absolute_error_margin: 1
  reforms: policyengine_us.reforms.states.ut.ctc.ut_ctc_reform.ut_ctc_reform
  input:
    gov.contrib.states.ut.ctc.in_effect: true
    people:
      person1:
        age: 35
        ctc_qualifying_child: false
        tax_exempt_interest_income: 0
      person2:
        age: 3
        ctc_qualifying_child: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: HEAD_OF_HOUSEHOLD
        ut_total_income: 20_000
        ut_income_tax_before_non_refundable_credits: 0
    households:
      household:
        members: [person1, person2]
        state_code: UT
  output:
    ut_ctc_eligible_children: 1
    ut_ctc_potential: 1_000
    ut_ctc: 0
    ut_refundable_ctc: 800
    ut_income_tax: -800

