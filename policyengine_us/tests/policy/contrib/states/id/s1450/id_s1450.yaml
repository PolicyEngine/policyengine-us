# Idaho S1450 - Extends Idaho CTC indefinitely by removing the 2026 sunset.
# The Idaho CTC provides $205 per qualifying child (under 17).
# Without this reform, the credit expires after 2025.

- name: Case 1, single child in 2026.
  # One qualifying child under 17, credit = $205
  period: 2026
  absolute_error_margin: 1
  reforms: policyengine_us.reforms.states.id.s1450.s1450.id_s1450
  input:
    gov.contrib.states.id.s1450.in_effect: true
    people:
      person1:
        age: 35
        is_tax_unit_head: true
      person2:
        age: 10
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SINGLE
    households:
      household:
        members: [person1, person2]
        state_code: ID
  output:
    # 1 qualifying child * $205 = $205
    id_ctc: 205

