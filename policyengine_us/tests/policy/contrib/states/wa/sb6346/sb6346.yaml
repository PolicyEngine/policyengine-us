- name: Case 20, WFTC offsets WA income tax when refundable credits are smaller than tax due.
  period: 2029
  absolute_error_margin: 10
  reforms: policyengine_us.reforms.states.wa.sb6346.sb6346.wa_sb6346
  input:
    gov.contrib.states.wa.sb6346.in_effect: true
    people:
      person1:
        age: 22
        employment_income: 10_000
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SINGLE
        wa_capital_gains_tax: 500
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # Base income is below the $1M standard deduction, so SSB 6346 tax is $0.
    wa_income_tax_taxable_income: 0
    # A direct capital gains tax input creates positive WA tax before refundable credits.
    wa_income_tax_before_refundable_credits: 500
    # Age 22 + earned income triggers the expanded WFTC path.
    wa_working_families_tax_credit: 367
    # Final WA income tax remains positive because tax due exceeds the refundable credit.
    wa_income_tax: 133.3

