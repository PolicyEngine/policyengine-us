      tax_unit:
        members: [person1]
        filing_status: SINGLE
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # Age 22 < 25 so no federal EITC, but SSB 6346 expands WFTC to age 18+.
    # With $10,000 earned income and 0 children, should receive the maximum WFTC for childless filers.
    wa_working_families_tax_credit: 367

