    wa_income_tax_base_income: 3_000_000
    # Charitable: $40,000 + $40,000 = $80,000 < $100,000 joint cap
    wa_income_tax_charitable_deduction: 80_000
    # Standard deduction: $1,000,000
    wa_income_tax_standard_deduction: 1_000_000
    # Taxable: $3,000,000 - $80,000 - $1,000,000 = $1,920,000
    wa_income_tax_taxable_income: 1_920_000
    # Tax: $1,920,000 * 0.099 = $190,080
