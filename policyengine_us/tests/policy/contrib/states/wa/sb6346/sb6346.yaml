# WA SSB 6346 Income Tax Reform Tests
# Tests the 9.9% income tax on Washington taxable income:
#   tax = max(0, AGI - charitable_deduction - standard_deduction) * 0.099
# Standard deduction: $1,000,000 (same for single and married)
# Charitable deduction cap: $100,000 individual, $100,000 joint

- name: Case 1, single high earner with charitable below cap.
  period: 2028
  absolute_error_margin: 1
  reforms: policyengine_us.reforms.states.wa.sb6346.sb6346.wa_sb6346
  input:
    gov.contrib.states.wa.sb6346.in_effect: true
    people:
      person1:
        age: 40
        employment_income: 2_000_000
        charitable_cash_donations: 50_000
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SINGLE
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # AGI = $2,000,000
    wa_income_tax_base_income: 2_000_000
    # Charitable: $50,000 < $100,000 cap -> full $50,000
    wa_income_tax_charitable_deduction: 50_000
    # Standard deduction: $1,000,000
    wa_income_tax_standard_deduction: 1_000_000
    # Taxable: $2,000,000 - $50,000 - $1,000,000 = $950,000
    wa_income_tax_taxable_income: 950_000
    # Tax: $950,000 * 0.099 = $94,050
    wa_income_tax: 94_050

