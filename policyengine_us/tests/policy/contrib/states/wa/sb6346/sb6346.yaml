- name: Case 18, capital gains combined with SSB 6346 income tax.
  period: 2028
  absolute_error_margin: 0.01
  reforms: policyengine_us.reforms.states.wa.sb6346.sb6346.wa_sb6346
  input:
    gov.contrib.states.wa.sb6346.in_effect: true
    people:
      person1:
        age: 40
        employment_income: 2_000_000
        long_term_capital_gains: 1_500_000
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SINGLE
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # AGI includes employment + LTCG = $3,500,000
    wa_income_tax_base_income: 3_500_000
    # SSB 6346 taxable: $3,500,000 - $0 charitable - $1,000,000 std = $2,500,000
    wa_income_tax_taxable_income: 2_500_000
    # SSB 6346 income tax: $2,500,000 * 0.099 = $247,500
    # WA capital gains tax on the same return is $89,998 in 2028 under current parameters.
    wa_capital_gains_tax: 89_998
    # before_credits = $247,500 + $89,998 = $337,498
    wa_income_tax_before_refundable_credits: 337_498
    # WFTC = $0 (income far above EITC limit)
    # wa_income_tax = before_credits - 0 = before_credits
    wa_income_tax: 337_498

