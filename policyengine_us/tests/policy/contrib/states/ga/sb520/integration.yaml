- name: Case 1, single filer with 2026 provisions.
  period: 2026
  absolute_error_margin: 0.1
  reforms: policyengine_us.reforms.states.ga.sb520.ga_sb520
  input:
    gov.contrib.states.ga.sb520.in_effect: true
    people:
      person1:
        age: 30
        employment_income: 50_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: GA
  output:
    ga_standard_deduction: 17_000

- name: Case 2, joint filers with 2026 provisions and children.
  period: 2026
  absolute_error_margin: 0.1
  reforms: policyengine_us.reforms.states.ga.sb520.ga_sb520
  input:
    gov.contrib.states.ga.sb520.in_effect: true
    people:
      person1:
        age: 35
        employment_income: 80_000
      person2:
        age: 33
      child1:
        age: 5
      child2:
        age: 8
    tax_units:
      tax_unit:
        members: [person1, person2, child1, child2]
    households:
      household:
        members: [person1, person2, child1, child2]
        state_code: GA
  output:
    ga_standard_deduction: 34_000
    # Only child1 (age 5) qualifies - GA CTC age threshold is under 6
    ga_ctc: 1_250

- name: Case 3, standard deduction phase-out.
  period: 2026
  absolute_error_margin: 0.1
  reforms: policyengine_us.reforms.states.ga.sb520.ga_sb520
  input:
    gov.contrib.states.ga.sb520.in_effect: true
    people:
      person1:
        age: 45
        employment_income: 320_000
      person2:
        age: 43
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # AGI: 320,000
    # Excess: 320,000 - 280,000 = 40,000
    # Phase-out: 40,000 * 0.25 = 10,000
    # Deduction: 34,000 - 10,000 = 24,000
    ga_standard_deduction: 24_000

- name: Case 4, Georgia EITC with federal EITC.
  period: 2026
  absolute_error_margin: 1
  reforms: policyengine_us.reforms.states.ga.sb520.ga_sb520
  input:
    gov.contrib.states.ga.sb520.in_effect: true
    people:
      person1:
        age: 30
        employment_income: 25_000
      child1:
        age: 5
    tax_units:
      tax_unit:
        members: [person1, child1]
    households:
      household:
        members: [person1, child1]
        state_code: GA
  output:
    # GA EITC = 20% of federal EITC
    # Federal EITC for single parent with 1 child earning $25,000 is approximately $4,249
    # GA EITC = $4,249 * 0.20 = $850
    ga_eitc: 850

- name: Case 5, 2027 progressive brackets for single filer.
  period: 2027
  absolute_error_margin: 1
  reforms: policyengine_us.reforms.states.ga.sb520.ga_sb520
  input:
    gov.contrib.states.ga.sb520.in_effect: true
    gov.contrib.states.ga.sb520.brackets.in_effect: true
    people:
      person1:
        age: 30
        employment_income: 50_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: GA
  output:
    # With SB520 deduction of 17,000:
    # Taxable income: 50,000 - 17,000 = 33,000
    # Tax: 15,000 * 0.02 + 15,000 * 0.04 + 3,000 * 0.06
    # = 300 + 600 + 180 = 1,080
    ga_income_tax_before_non_refundable_credits: 1_080

- name: Case 6, standard deduction fully phased out.
  period: 2026
  absolute_error_margin: 0.1
  reforms: policyengine_us.reforms.states.ga.sb520.ga_sb520
  input:
    gov.contrib.states.ga.sb520.in_effect: true
    people:
      person1:
        age: 40
        employment_income: 500_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: GA
  output:
    # AGI: 500,000
    # Threshold for single: 140,000
    # Excess: 500,000 - 140,000 = 360,000
    # Phase-out: 360,000 * 0.25 = 90,000
    # Deduction: max(17,000 - 90,000, 0) = 0
    ga_standard_deduction: 0

- name: Case 7, CTC with no qualifying children (all above age 6).
  period: 2026
  absolute_error_margin: 0.1
  reforms: policyengine_us.reforms.states.ga.sb520.ga_sb520
  input:
    gov.contrib.states.ga.sb520.in_effect: true
    people:
      person1:
        age: 40
        employment_income: 60_000
      child1:
        age: 10
      child2:
        age: 14
    tax_units:
      tax_unit:
        members: [person1, child1, child2]
    households:
      household:
        members: [person1, child1, child2]
        state_code: GA
  output:
    # No children under age 6, so no GA CTC
    ga_ctc: 0

- name: Case 8, high income single filer with no EITC.
  period: 2026
  absolute_error_margin: 0.1
  reforms: policyengine_us.reforms.states.ga.sb520.ga_sb520
  input:
    gov.contrib.states.ga.sb520.in_effect: true
    people:
      person1:
        age: 35
        employment_income: 100_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: GA
  output:
    # Income too high for federal EITC, so no GA EITC
    ga_eitc: 0

- name: Case 9, income exactly at phase-out threshold.
  period: 2026
  absolute_error_margin: 0.1
  reforms: policyengine_us.reforms.states.ga.sb520.ga_sb520
  input:
    gov.contrib.states.ga.sb520.in_effect: true
    people:
      person1:
        age: 40
        employment_income: 140_000
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: GA
  output:
    # AGI exactly at threshold (140,000 for single)
    # No phase-out yet
    ga_standard_deduction: 17_000
