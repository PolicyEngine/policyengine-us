- name: Case 9, married couple where spouse is senior triggers senior tier.
  period: 2027
  absolute_error_margin: 0.01
  reforms: policyengine_us.reforms.states.nj.anchor.nj_anchor_reform.nj_anchor_budget_reform
  input:
    gov.contrib.states.nj.anchor.in_effect: true
    people:
      person1:
        age: 60
        employment_income: 100_000
        real_estate_taxes: 5_000
        is_tax_unit_head: true
      person2:
        age: 70
        is_tax_unit_spouse: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_tenure_type: OWNER_WITH_MORTGAGE
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # greater_age_head_spouse = max(60, 70) = 70 >= 65: senior
    # Senior homeowner, income $100K <= $150K (lower tier)
    # Reform amount: $1,500
    nj_anchor: 1_500
