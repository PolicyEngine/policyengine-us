# ANCHOR Senior Homeowner Bonus Expiry Reform Tests
# Reform removes $250 senior homeowner bonus that was added for FY2024-FY2026
# Senior homeowner amounts revert: $1,750 -> $1,500 (lower), $1,250 -> $1,000 (upper)
# All other amounts (non-senior homeowner, renter) are unchanged

- name: Case 1, senior homeowner lower income gets $1,500 not $1,750.
  period: 2027
  absolute_error_margin: 0.01
  reforms: policyengine_us.reforms.states.nj.anchor.nj_anchor_reform.nj_anchor_budget_reform
  input:
    gov.contrib.states.nj.anchor.in_effect: true
    people:
      person1:
        age: 70
        employment_income: 100_000
        real_estate_taxes: 5_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_tenure_type: OWNER_WITH_MORTGAGE
    households:
      household:
        members: [person1]
        state_code: NJ
  output:
    # Senior homeowner, income $100K <= $150K (lower tier)
    # Reform amount: $1,500 (baseline with bonus would be $1,750)
    nj_anchor: 1_500

