- name: Case 7, both StayNJ and ANCHOR reforms active simultaneously.
  period: 2027
  absolute_error_margin: 0.01
  reforms:
    - policyengine_us.reforms.states.nj.stay_nj.nj_stay_nj_reform.nj_stay_nj_budget_reform
    - policyengine_us.reforms.states.nj.anchor.nj_anchor_reform.nj_anchor_budget_reform
  input:
    gov.contrib.states.nj.stay_nj.in_effect: true
    gov.contrib.states.nj.anchor.in_effect: true
    people:
      person1:
        age: 70
        employment_income: 100_000
        real_estate_taxes: 12_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_tenure_type: OWNER_WITH_MORTGAGE
    households:
      household:
        members: [person1]
        state_code: NJ
  output:
    # Both reforms active: StayNJ max = $4,000, ANCHOR senior lower = $1,500
    # StayNJ target = min($12,000 * 50%, $4,000) = min($6,000, $4,000) = $4,000
    # ANCHOR (reform) = $1,500 (senior homeowner, income $100K <= $150K)
    # StayNJ = max($4,000 - $1,500 - $0, 0) = $2,500
    nj_anchor: 1_500
    nj_staynj: 2_500

