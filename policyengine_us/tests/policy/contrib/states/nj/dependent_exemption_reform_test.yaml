- name: NJ dependent exemption reform - default amount reproduces baseline (no-op)
  period: 2025
  reforms: policyengine_us.reforms.states.nj.dependent_exemption.nj_dependent_exemption_reform.nj_dependent_exemption_reform
  input:
    gov.contrib.states.nj.dependent_exemption.in_effect: true
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 5, is_tax_unit_dependent: true}
      child2: {age: 15, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: NJ}}
  output: {nj_dependents_exemption: 3_000}  # 2 * 1,500

- name: NJ dependent exemption reform - amount zero eliminates the exemption
  period: 2025
  reforms: policyengine_us.reforms.states.nj.dependent_exemption.nj_dependent_exemption_reform.nj_dependent_exemption_reform
  input:
    gov.contrib.states.nj.dependent_exemption.in_effect: true
    gov.contrib.states.nj.dependent_exemption.amount: 0
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 5, is_tax_unit_dependent: true}
      child2: {age: 15, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: NJ}}
  output: {nj_dependents_exemption: 0}

- name: NJ dependent exemption reform - age limit re-prices only young dependents; older keep baseline
  period: 2025
  reforms: policyengine_us.reforms.states.nj.dependent_exemption.nj_dependent_exemption_reform.nj_dependent_exemption_reform
  input:
    gov.contrib.states.nj.dependent_exemption.in_effect: true
    gov.contrib.states.nj.dependent_exemption.amount: 0
    gov.contrib.states.nj.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.nj.dependent_exemption.age_limit.threshold: 13
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 5, is_tax_unit_dependent: true}
      child2: {age: 15, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: NJ}}
  output: {nj_dependents_exemption: 1_500}  # under-13 child eliminated; age-15 child keeps baseline 1,500

- name: NJ dependent exemption reform - college-dependent exemption is unchanged
  period: 2025
  reforms: policyengine_us.reforms.states.nj.dependent_exemption.nj_dependent_exemption_reform.nj_dependent_exemption_reform
  input:
    gov.contrib.states.nj.dependent_exemption.in_effect: true
    gov.contrib.states.nj.dependent_exemption.amount: 0
    people:
      parent: {age: 40, employment_income: 60_000}
      college_kid:
        age: 20
        is_tax_unit_dependent: true
        is_full_time_college_student: true
    tax_units: {tax_unit: {members: [parent, college_kid], filing_status: SINGLE}}
    households: {household: {members: [parent, college_kid], state_name: NJ}}
  output:
    nj_dependents_exemption: 0  # main exemption eliminated
    nj_dependents_attending_college_exemption: 1_000  # college exemption untouched

- name: NJ dependent exemption reform - age at limit threshold is excluded
  period: 2025
  reforms: policyengine_us.reforms.states.nj.dependent_exemption.nj_dependent_exemption_reform.nj_dependent_exemption_reform
  absolute_error_margin: 0.01
  input:
    gov.contrib.states.nj.dependent_exemption.in_effect: true
    gov.contrib.states.nj.dependent_exemption.amount: 0
    gov.contrib.states.nj.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.nj.dependent_exemption.age_limit.threshold: 13
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 13, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1], filing_status: SINGLE}}
    households: {household: {members: [parent, child1], state_name: NJ}}
  # Dependent at the age limit (13 == threshold) keeps the baseline 1,500.
  output: {nj_dependents_exemption: 1_500}

- name: NJ dependent exemption reform - age one below threshold is included
  period: 2025
  reforms: policyengine_us.reforms.states.nj.dependent_exemption.nj_dependent_exemption_reform.nj_dependent_exemption_reform
  absolute_error_margin: 0.01
  input:
    gov.contrib.states.nj.dependent_exemption.in_effect: true
    gov.contrib.states.nj.dependent_exemption.amount: 0
    gov.contrib.states.nj.dependent_exemption.age_limit.in_effect: true
    gov.contrib.states.nj.dependent_exemption.age_limit.threshold: 13
    people:
      parent: {age: 40, employment_income: 60_000}
      child1: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1], filing_status: SINGLE}}
    households: {household: {members: [parent, child1], state_name: NJ}}
  # Dependent one year under the limit (12 < 13) is re-priced to the reform amount (0).
  output: {nj_dependents_exemption: 0}
