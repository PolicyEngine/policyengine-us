      senior2:
        age: 69
    tax_units:
      tax_unit:
        members: [senior1, senior2]
        filing_status: JOINT
        adjusted_gross_income: 100_000
        tax_unit_itemizes: true
        itemized_taxable_income_deductions: 30_000
        qualified_business_income_deduction: 5_000
        wagering_losses_deduction: 0
    households:
      household:
