# === Alternative Maximum Tax Calculation ===

- name: Alternative max tax for single filer at 60K AGI
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 60_000
    filing_status: SINGLE
  output:
    # (60_000 - 46_000) * 0.255 = 14_000 * 0.255 = 3_570
    watca_alternative_max_tax: 3_570

- name: Alternative max tax for single filer below exemption
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 30_000
    filing_status: SINGLE
  output:
    # max(0, 30_000 - 46_000) * 0.255 = 0
    watca_alternative_max_tax: 0

- name: Alternative max tax for joint filer at 120K AGI
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 120_000
    filing_status: JOINT
  output:
    # (120_000 - 92_000) * 0.255 = 28_000 * 0.255 = 7_140
    watca_alternative_max_tax: 7_140

- name: Alternative max tax for joint filer below exemption
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 80_000
    filing_status: JOINT
  output:
    # max(0, 80_000 - 92_000) * 0.255 = 0
    watca_alternative_max_tax: 0

- name: Alternative max tax for HOH filer above exemption
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 80_000
    filing_status: HEAD_OF_HOUSEHOLD
  output:
    # (80_000 - 64_400) * 0.255 = 15_600 * 0.255 = 3_978
    watca_alternative_max_tax: 3_978

- name: Alternative max tax for separate filer
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 60_000
    filing_status: SEPARATE
  output:
    # (60_000 - 46_000) * 0.255 = 3_570
    watca_alternative_max_tax: 3_570

- name: Alternative max tax for surviving spouse
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 120_000
    filing_status: SURVIVING_SPOUSE
  output:
    # (120_000 - 92_000) * 0.255 = 7_140
    watca_alternative_max_tax: 7_140

# === Millionaire Surtax ===

- name: Single filer below $1M (no surtax)
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 500_000
    filing_status: SINGLE
  output:
    watca_millionaire_surtax: 0

- name: Single filer at $1.5M (in 5% bracket)
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 1_500_000
    filing_status: SINGLE
  output:
    # (1_500_000 - 1_000_000) * 0.05 = 25_000
    watca_millionaire_surtax: 25_000

- name: Single filer at $3M (spans 5% and 10% brackets)
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 3_000_000
    filing_status: SINGLE
  output:
    # (2_000_000 - 1_000_000) * 0.05 + (3_000_000 - 2_000_000) * 0.10 = 50_000 + 100_000 = 150_000
    watca_millionaire_surtax: 150_000

- name: Joint filer at $2M (in 5% bracket)
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 2_000_000
    filing_status: JOINT
  output:
    # (2_000_000 - 1_500_000) * 0.05 = 25_000
    watca_millionaire_surtax: 25_000

- name: Joint filer at $10M (all brackets)
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 10_000_000
    filing_status: JOINT
  output:
    # (3_000_000 - 1_500_000) * 0.05 + (7_500_000 - 3_000_000) * 0.10 + (10_000_000 - 7_500_000) * 0.12
    # = 75_000 + 450_000 + 300_000 = 825_000
    watca_millionaire_surtax: 825_000

- name: Surviving spouse uses joint surtax brackets
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 2_000_000
    filing_status: SURVIVING_SPOUSE
  output:
    watca_millionaire_surtax: 25_000

- name: Separate filer uses single surtax brackets
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 1_500_000
    filing_status: SEPARATE
  output:
    watca_millionaire_surtax: 25_000

- name: Single filer at $6M (in 12% bracket)
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 6_000_000
    filing_status: SINGLE
  output:
    # (2M-1M)*0.05 + (5M-2M)*0.10 + (6M-5M)*0.12 = 50_000 + 300_000 + 120_000 = 470_000
    watca_millionaire_surtax: 470_000

- name: Single filer at exactly $1M boundary (no surtax)
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 1_000_000
    filing_status: SINGLE
  output:
    watca_millionaire_surtax: 0

- name: Joint filer below $1.5M (no surtax)
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 1_400_000
    filing_status: JOINT
  output:
    watca_millionaire_surtax: 0

- name: HOH filer uses single surtax brackets
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 1_500_000
    filing_status: HEAD_OF_HOUSEHOLD
  output:
    # HOH is not JOINT/SURVIVING_SPOUSE, so uses single brackets
    # (1_500_000 - 1_000_000) * 0.05 = 25_000
    watca_millionaire_surtax: 25_000

# === Modified AGI Tests ===

- name: Alternative tax MAGI includes foreign earned income
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 70_000
    foreign_earned_income_exclusion: 10_000
    filing_status: SINGLE
  output:
    # MAGI = 70_000 + 10_000 = 80_000
    watca_alternative_tax_magi: 80_000

- name: Alternative tax MAGI includes non-taxable Social Security
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 50_000
    tax_unit_social_security: 20_000
    tax_unit_taxable_social_security: 5_000
    filing_status: SINGLE
  output:
    # MAGI = 50_000 + (20_000 - 5_000) = 65_000
    watca_alternative_tax_magi: 65_000

- name: Alternative tax MAGI includes specified possession income
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 60_000
    specified_possession_income: 5_000
    filing_status: SINGLE
  output:
    watca_alternative_tax_magi: 65_000

- name: Alternative tax MAGI includes Puerto Rico income
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 60_000
    puerto_rico_income: 8_000
    filing_status: SINGLE
  output:
    watca_alternative_tax_magi: 68_000

- name: Surtax MAGI reduces by investment interest
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    employment_income: 2_000_000
    investment_interest_expense: 50_000
    filing_status: SINGLE
  output:
    # Surtax MAGI = 2_000_000 - 50_000 = 1_950_000
    watca_surtax_magi: 1_950_000
    # Surtax = (1_950_000 - 1_000_000) * 0.05 = 47_500
    watca_millionaire_surtax: 47_500

- name: Surtax MAGI floors at zero when investment interest exceeds AGI
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 20_000
    investment_interest_expense: 50_000
    filing_status: SINGLE
  output:
    # max(0, 20_000 - 50_000) = 0
    watca_surtax_magi: 0

# === Integration: income_tax_before_credits ===

- name: Eligible filer income tax capped at alternative max
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    employment_income: 60_000
    filing_status: SINGLE
  output:
    # MAGI = 60K < 80_500 threshold => eligible
    # Alternative max = (60_000 - 46_000) * 0.255 = 3_570
    # Standard tax on ~45K taxable income > 3_570, so cap binds
    watca_alternative_tax_eligible: true
    income_tax_before_credits: 3_570

- name: Ineligible filer tax equals standard tax plus surtax
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    employment_income: 100_000
    filing_status: SINGLE
  output:
    # AGI of 100K > 80_500 threshold => not eligible, no cap applied
    # No surtax (below $1M)
    # income_tax_before_credits = income_tax_main_rates + cap_gains + AMT
    watca_alternative_tax_eligible: false
    watca_millionaire_surtax: 0

# === Dependent Exclusion Tests ===

- name: Dependent claimed elsewhere not eligible for alternative tax
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 30_000
    filing_status: SINGLE
    head_is_dependent_elsewhere: true
  output:
    # Even though income is below limit, not eligible because claimed as dependent
    watca_alternative_tax_eligible: false

- name: Spouse claimed as dependent elsewhere not eligible
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 30_000
    filing_status: JOINT
    spouse_is_dependent_elsewhere: true
  output:
    watca_alternative_tax_eligible: false

# === Edge Cases ===

- name: Zero income filer eligible for alternative tax
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 0
    filing_status: SINGLE
  output:
    watca_alternative_tax_eligible: true
    watca_alternative_max_tax: 0
    watca_alternative_tax_magi: 0

- name: Negative AGI floors alternative max tax at zero
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: -10_000
    filing_status: SINGLE
  output:
    watca_alternative_tax_eligible: true
    # max(0, -10_000 - 46_000) * 0.255 = 0
    watca_alternative_max_tax: 0

- name: MAGI add-backs push filer over eligibility threshold
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 75_000
    foreign_earned_income_exclusion: 6_000
    filing_status: SINGLE
  output:
    # MAGI = 75_000 + 6_000 = 81_000 > 80_500 threshold
    watca_alternative_tax_magi: 81_000
    watca_alternative_tax_eligible: false

- name: Investment interest pushes millionaire below surtax threshold
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    employment_income: 1_050_000
    investment_interest_expense: 100_000
    filing_status: SINGLE
  output:
    # Surtax MAGI = 1_050_000 - 100_000 = 950_000 < $1M threshold
    watca_surtax_magi: 950_000
    watca_millionaire_surtax: 0

- name: Combined MAGI add-backs all non-zero
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 50_000
    foreign_earned_income_exclusion: 5_000
    specified_possession_income: 3_000
    puerto_rico_income: 2_000
    tax_unit_social_security: 10_000
    tax_unit_taxable_social_security: 4_000
    filing_status: SINGLE
  output:
    # MAGI = 50_000 + 5_000 + 3_000 + 2_000 + (10_000 - 4_000) = 66_000
    watca_alternative_tax_magi: 66_000

- name: Both head and spouse claimed as dependents
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    adjusted_gross_income: 30_000
    filing_status: JOINT
    head_is_dependent_elsewhere: true
    spouse_is_dependent_elsewhere: true
  output:
    watca_alternative_tax_eligible: false

# === Surtax Toggle Test ===

- name: Surtax disabled via surtax.in_effect parameter
  period: 2026
  reforms: policyengine_us.reforms.congress.watca.working_americans_tax_cut_act.watca_reform_object
  input:
    gov.contrib.congress.watca.in_effect: true
    gov.contrib.congress.watca.surtax.in_effect: false
    employment_income: 2_000_000
    filing_status: SINGLE
  output:
    # Surtax variable still computes but income_tax_before_credits should not include it
    watca_alternative_tax_eligible: false
    watca_millionaire_surtax: 50_000
