- name: Case 13, Single parent, higher income, benefits from increased max.
  period: 2026
  absolute_error_margin: 1
  reforms: policyengine_us.reforms.congress.mcdonald_rivet.working_parents_tax_relief_act
  input:
    gov.contrib.congress.mcdonald_rivet.working_parents_tax_relief_act.in_effect: true
    people:
      parent:
        age: 28
        is_tax_unit_dependent: false
        employment_income: 15_000
      child:
        age: 2
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [parent, child]
        filing_status: SINGLE
    households:
      household:
        members: [parent, child]
        state_code: TX
  output:
    # Per IRC §32(b): max = credit_percentage × earned_income_amount
    # Baseline: max = 34% × $13,020 = $4,427
    # Reform: max = 76.24% × $13,020 = $9,927 (ratio: 76.24/34 = 2.242)
    # Phased-in = $15,000 × 76.24% = $11,436 > new max $9,927
    # EITC = $9,927 (NOT $4,427 - the max increased!)
    eitc: 9927

