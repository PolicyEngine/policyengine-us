        employment_income: 21_000
      child_1:
        age: 10
        is_tax_unit_dependent: False
      child_2:
        age: 5
        is_tax_unit_dependent: False
      dependent_adult:
        age: 65
        is_tax_unit_dependent: True
        is_tax_unit_spouse: False
    tax_units:
      tax_unit:
        members: [head, child_1, child_2, dependent_adult]
  output:
    eitc: 0
    refundable_ctc: 0
    non_refundable_ctc: 500

- name: Baseline test, head of household with two children
  period: 2024
  input:
    # ECPA parameters.
    # Household.
    people:
      head:
        age: 36
        is_tax_unit_head: True
        is_tax_unit_dependent: False
        employment_income: 21_000
      child_1:
        age: 10
        is_tax_unit_dependent: true
      child_2:
        age: 18
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [head, child_1, child_2]
        filing_status: HEAD_OF_HOUSEHOLD
    spm_units:
      spm_unit:
        members: [head, child_1, child_2]
        free_school_meals: 0
        snap: 0
        ca_capi: 0
        takes_up_tanf_if_eligible: false
    households:
      household:
        members: [head, child_1, child_2]
        state_code_str: FL
  output:
    non_refundable_ctc: 800
    household_benefits: 0
    spm_unit_benefits: 0

